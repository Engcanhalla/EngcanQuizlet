<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hackers1_U3.4_sen</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans KR',sans-serif;background:linear-gradient(135deg,#0f172a 0%,#1e3a5f 50%,#0f172a 100%);min-height:100vh;padding:16px;display:flex;align-items:center;justify-content:center}
.container{max-width:720px;width:100%;background:#fff;border-radius:24px;box-shadow:0 25px 80px rgba(0,0,0,.4);overflow:hidden;animation:slideUp .6s cubic-bezier(.16,1,.3,1)}
@keyframes slideUp{from{opacity:0;transform:translateY(40px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes pop{0%{transform:scale(.85);opacity:0}60%{transform:scale(1.03)}100%{transform:scale(1);opacity:1}}
@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-6px)}40%,80%{transform:translateX(6px)}}
@keyframes chipIn{from{opacity:0;transform:scale(.8)}to{opacity:1;transform:scale(1)}}
@keyframes confetti{0%{transform:translateY(0) rotate(0deg);opacity:1}100%{transform:translateY(500px) rotate(720deg);opacity:0}}
.header{background:linear-gradient(135deg,#1e3a5f 0%,#2d5a87 50%,#1e3a5f 100%);padding:32px 28px;color:#fff;text-align:center}
.header h1{font-size:1.4rem;font-weight:800;margin-bottom:4px}
.header p{opacity:.85;font-size:.88rem}
.content{padding:28px 24px}
.progress-bar{height:6px;background:#e2e8f0;border-radius:3px;margin-bottom:20px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,#2d5a87,#4a90d9);border-radius:3px;transition:width .5s}
.q-counter{text-align:center;font-size:.82rem;color:#64748b;margin-bottom:6px;font-weight:500}
.round-badge{display:inline-block;background:#eff6ff;color:#2563eb;padding:4px 12px;border-radius:20px;font-size:.78rem;font-weight:600;margin-bottom:12px}
.phase-badge{display:inline-block;padding:4px 12px;border-radius:20px;font-size:.78rem;font-weight:600;margin-bottom:12px;margin-left:6px}
.phase-badge.p1{background:#fef3c7;color:#b45309}
.phase-badge.p2{background:#ede9fe;color:#6d28d9}
.korean-sentence{text-align:center;font-size:1.2rem;font-weight:600;color:#1e293b;margin:18px 0;padding:18px;background:#f8fafc;border-radius:14px;border:2px solid #e2e8f0;line-height:1.6}
.word-chips{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin:14px 0;padding:16px;background:#f8fafc;border-radius:12px;border:1px solid #e2e8f0;min-height:52px}
.word-chip{display:inline-block;padding:7px 14px;background:#fff;border:2px solid #cbd5e1;border-radius:9px;font-size:.9rem;font-weight:500;color:#334155;box-shadow:0 1px 3px rgba(0,0,0,.06);transition:all .2s;cursor:default}
.word-chip.clickable{cursor:pointer}
.word-chip.clickable:hover{border-color:#2d5a87;background:#eff6ff;transform:translateY(-1px)}
.word-chip.used{opacity:.3;transform:scale(.9);pointer-events:none;border-style:dashed}
.answer-zone{min-height:52px;padding:12px 16px;background:#fff;border:2px dashed #cbd5e1;border-radius:12px;margin:10px 0;display:flex;flex-wrap:wrap;gap:6px;align-items:center;transition:all .3s}
.answer-zone.has-items{border-style:solid;border-color:#2d5a87;background:#f0f7ff}
.answer-zone.correct{border-color:#059669;background:#ecfdf5;border-style:solid}
.answer-zone.wrong{border-color:#dc2626;background:#fef2f2;border-style:solid}
.answer-chip{display:inline-block;padding:6px 12px;background:#2d5a87;color:#fff;border-radius:7px;font-size:.88rem;font-weight:500;cursor:pointer;animation:chipIn .2s;transition:all .15s}
.answer-chip:hover{background:#dc2626;transform:scale(.96)}
.answer-chip.locked{cursor:default;pointer-events:none}
.answer-chip.locked:hover{background:#2d5a87;transform:none}
.answer-placeholder{color:#94a3b8;font-size:.85rem;font-style:italic}
.answer-input{width:100%;padding:14px 18px;border:2px solid #cbd5e1;border-radius:12px;font-size:1rem;font-family:inherit;outline:none;transition:all .3s;background:#fff;margin-top:16px}
.answer-input:focus{border-color:#2d5a87;box-shadow:0 0 0 3px rgba(45,90,135,.15)}
.answer-input.correct{border-color:#059669;background:#ecfdf5}
.answer-input.wrong{border-color:#dc2626;background:#fef2f2}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:12px 24px;border:none;border-radius:10px;font-size:.95rem;font-weight:600;cursor:pointer;transition:all .25s;font-family:inherit}
.btn:hover{transform:translateY(-1px)}
.btn-primary{background:linear-gradient(135deg,#2d5a87,#4a90d9);color:#fff;box-shadow:0 4px 12px rgba(45,90,135,.3)}
.btn-secondary{background:#f1f5f9;color:#475569}
.btn-success{background:linear-gradient(135deg,#059669,#10b981);color:#fff}
.btn-block{width:100%}
.btn-clue{background:#fefce8;color:#92400e;border:2px solid #facc15;padding:9px 18px;font-size:.82rem;border-radius:9px}
.clue-display{text-align:center;margin-top:8px;padding:10px 16px;background:#fefce8;border:1px solid #fde68a;border-radius:10px;font-size:.95rem;font-weight:600;color:#92400e;animation:pop .3s}
.feedback{text-align:center;padding:16px;border-radius:12px;margin-top:14px;animation:pop .3s;font-weight:600}
.feedback.correct{background:#ecfdf5;color:#065f46;border:1px solid #a7f3d0}
.feedback.wrong{background:#fef2f2;color:#991b1b;border:1px solid #fecaca}
.feedback .correct-answer{font-weight:400;margin-top:8px;font-size:.86rem;line-height:1.6;word-break:break-word}
.summary-card{background:#f8fafc;border-radius:14px;padding:20px;margin:12px 0;border:1px solid #e2e8f0}
.summary-card h3{font-size:1rem;font-weight:700;margin-bottom:10px;color:#1e293b}
.stat-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #e2e8f0;font-size:.88rem}
.stat-row:last-child{border-bottom:none}
.stat-label{color:#64748b}
.stat-value{font-weight:600;color:#1e293b}
.stat-value.pass{color:#059669}
.stat-value.fail{color:#dc2626}
.wrong-item{display:flex;flex-direction:column;padding:12px 14px;background:#fff;border-radius:10px;margin-bottom:6px;border:1px solid #fecaca;font-size:.83rem;gap:4px}
.wrong-item .eng{font-weight:600;color:#059669;font-size:.88rem;line-height:1.4}
.wrong-item .user-ans{color:#dc2626;text-decoration:line-through;font-size:.82rem}
.wrong-item .kor{color:#64748b;font-size:.78rem}
.celebration{text-align:center;padding:16px 0}
.celebration .emoji{font-size:3.5rem;margin-bottom:12px;animation:pop .5s}
.celebration h2{font-size:1.4rem;font-weight:800;color:#1e293b;margin-bottom:6px}
.celebration p{color:#64748b;font-size:.9rem;line-height:1.5}
.score-circle{width:120px;height:120px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:16px auto;font-size:2rem;font-weight:800;border:5px solid}
.score-circle.pass{border-color:#059669;color:#059669;background:#ecfdf5}
.score-circle.fail{border-color:#dc2626;color:#dc2626;background:#fef2f2}
.start-info{text-align:center;padding:8px 0}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:20px 0}
.info-card{background:#f8fafc;border-radius:12px;padding:16px;text-align:center;border:1px solid #e2e8f0}
.info-card .label{font-size:.78rem;color:#64748b;margin-bottom:3px}
.info-card .value{font-size:1rem;font-weight:700;color:#1e293b}
.confetti-container{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:1000;overflow:hidden}
.confetti-piece{position:absolute;width:9px;height:9px;top:-9px;animation:confetti 3s ease-in forwards}
.buttons-row{display:flex;gap:10px;margin-top:16px;justify-content:center;flex-wrap:wrap}
.chunk-nav{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;margin:10px 0}
.chunk-btn{padding:8px 14px;border:2px solid #e2e8f0;border-radius:9px;background:#fff;cursor:pointer;font-family:inherit;font-size:.82rem;font-weight:500;transition:all .2s;color:#475569}
.chunk-btn:hover{border-color:#2d5a87;background:#eff6ff}
.chunk-btn.active{border-color:#2d5a87;background:#2d5a87;color:#fff}
.chunk-btn.done{border-color:#059669;background:#ecfdf5;color:#065f46}
@media(max-width:480px){
  .header h1{font-size:1.15rem}
  .korean-sentence{font-size:1rem;padding:14px}
  .word-chip{padding:5px 10px;font-size:.82rem}
  .info-grid{grid-template-columns:1fr!important}
}
</style>
</head>

      '<div class="info-card"><div class="label">규칙</div><div class="value" style="font-size:.78rem">2단계 통과 필수</div></div></div>'+
      ci+
      '<button class="btn btn-primary btn-block" data-action="showPhaseSelect" style="margin-top:16px;font-size:1.05rem;padding:14px">시작하기</button></div>'
    );
    this.chunkMode=false;
  },

  modeAll:function(){
    this.chunkMode=false;
    var a=document.getElementById('mode-all'),b=document.getElementById('mode-chunk'),d=document.getElementById('chunk-detail');
    if(a)a.classList.add('active');if(b)b.classList.remove('active');if(d)d.style.display='none';
  },
  modeChunk:function(){
    this.chunkMode=true;
    var a=document.getElementById('mode-all'),b=document.getElementById('mode-chunk'),d=document.getElementById('chunk-detail');
    if(a)a.classList.remove('active');if(b)b.classList.add('active');if(d)d.style.display='block';
  },

  showPhaseSelect:function(){
    this.setTitle(CONFIG.title);this.setSub('테스트 단계 선택');
    var p1tag=this.p1Done
      ?'<span style="display:inline-block;margin-top:6px;padding:2px 8px;border-radius:10px;font-size:.7rem;background:#ecfdf5;color:#065f46">✅ 완료 (다시 연습 가능)</span>'
      :'<span style="display:inline-block;margin-top:6px;padding:2px 8px;border-radius:10px;font-size:.7rem;background:#fef3c7;color:#b45309">연습 (스킵 가능)</span>';
    this.render(
      '<div style="animation:fadeIn .4s">'+
      '<h3 style="font-size:1rem;font-weight:700;color:#475569;margin-bottom:12px;text-align:center">어떤 단계를 연습할까요?</h3>'+
      '<div style="display:flex;flex-direction:column;gap:10px">'+
      '<div style="padding:18px;border:2px solid #e2e8f0;border-radius:14px;cursor:pointer;transition:all .2s" onclick="T.startPhase1()" onmouseover="this.style.borderColor=&apos;#b45309&apos;;this.style.background=&apos;#fffbeb&apos;" onmouseout="this.style.borderColor=&apos;#e2e8f0&apos;;this.style.background=&apos;#fff&apos;">'+
      '<div style="font-size:1.5rem;margin-bottom:6px">🔀</div>'+
      '<div style="font-size:.98rem;font-weight:700;color:#1e293b;margin-bottom:3px">1단계: 단어 배열</div>'+
      '<div style="font-size:.8rem;color:#64748b;line-height:1.5">섞인 단어 카드를 올바른 순서로 배열하기</div>'+
      p1tag+
      '</div>'+
      '<div style="padding:18px;border:2px solid #e2e8f0;border-radius:14px;cursor:pointer;transition:all .2s" onclick="T.startPhase2()" onmouseover="this.style.borderColor=&apos;#6d28d9&apos;;this.style.background=&apos;#faf5ff&apos;" onmouseout="this.style.borderColor=&apos;#e2e8f0&apos;;this.style.background=&apos;#fff&apos;">'+
      '<div style="font-size:1.5rem;margin-bottom:6px">✍️</div>'+
      '<div style="font-size:.98rem;font-weight:700;color:#1e293b;margin-bottom:3px">2단계: 직접 쓰기</div>'+
      '<div style="font-size:.8rem;color:#64748b;line-height:1.5">한글 해석을 보고 영어 문장을 직접 타이핑</div>'+
      '<span style="display:inline-block;margin-top:6px;padding:2px 8px;border-radius:10px;font-size:.7rem;background:#ede9fe;color:#6d28d9">최종 평가</span>'+
      '</div></div>'+
      (this.chunkMode?'<button class="btn btn-secondary btn-block" style="margin-top:10px" data-action="showChunkSel">세트 선택</button>':'')+
      '</div>'
    );
  },

  startPhase1:function(){
    this.phase=1;this.round=0;this.mastered=new Set();this.wrongHist=[];this.roundHist=[];
    this.active=this.chunkMode?this.chunks[this.chunkIdx]:this.all;
    this.items=this.active.slice();
    this.beginRound();
  },
  startPhase2:function(){
    this.phase=2;this.round=0;this.mastered=new Set();this.wrongHist=[];this.roundHist=[];
    this.active=this.chunkMode?this.chunks[this.chunkIdx]:this.all;
    this.items=this.active.slice();
    this.beginRound();
  },

  beginRound:function(){
    this.round++;this.qi=0;this.rCorrect=[];this.rWrong=[];this.p1selected=[];this.p1used=null;
    this.showQ();
  },

  showChunkSel:function(){
    this.setTitle(CONFIG.title);this.setSub('세트 선택');
    var self=this;
    var btns=this.chunks.map(function(c,i){
      var pct=self.chunkResults[i];
      var cls=pct>=self.pass?'done':i===self.chunkIdx?'active':'';
      return '<button class="chunk-btn '+cls+'" onclick="T.selectChunk('+i+')">세트 '+(i+1)+'<br><span style="font-size:.72rem">'+(pct!=null?pct+'%':'미완료')+'</span></button>';
    }).join('');
    this.render('<div style="animation:fadeIn .4s"><h3 style="font-size:1rem;font-weight:700;color:#1e293b;margin-bottom:12px;text-align:center">세트 선택</h3><div class="chunk-nav">'+btns+'</div><button class="btn btn-secondary btn-block" style="margin-top:10px" data-action="showPhaseSelect">← 단계 선택</button></div>');
  },
  selectChunk:function(i){this.chunkIdx=i;this.showPhaseSelect();},

  showQ:function(){
    if(this.qi>=this.items.length){this.endRound();return;}
    var it=this.items[this.qi];
    var pct=Math.round((this.mastered.size/(this.chunkMode?this.active.length:this.all.length))*100);
    var prog='<div class="progress-bar"><div class="progress-fill" style="width:'+pct+'%"></div></div>';
    var cnt='<div class="q-counter">'+(this.qi+1)+' / '+this.items.length+'문항 (누적 '+this.mastered.size+'개 정복)</div>';
    var rnd='<span class="round-badge">'+this.round+'라운드</span>';
    var ph=this.phase===1?'<span class="phase-badge p1">1단계 배열</span>':'<span class="phase-badge p2">2단계 쓰기</span>';
    this.answered=false;this.clueUsed=false;
    var pLabel=this.phase===1?'1단계':'2단계';
    this.setTitle(CONFIG.title);this.setSub(pLabel+' · '+this.round+'라운드 · '+(this.qi+1)+'/'+this.items.length);
    if(this.phase===1) this.renderP1(it,prog,cnt,rnd,ph);
    else this.renderP2(it,prog,cnt,rnd,ph);
  },

  renderP1:function(it,prog,cnt,rnd,ph){
    var chips=it.shuffledGroups.map(function(g,i){
      return '<span class="word-chip clickable" data-chip-idx="'+i+'">'+esc(g)+'</span>';
    }).join('');
    this.render(
      '<div>'+prog+cnt+rnd+ph+
      '<div class="korean-sentence">'+esc(it.korean)+'</div>'+
      '<div class="word-chips" id="chip-pool">'+chips+'</div>'+
      '<div class="answer-zone" id="answer-zone"><span class="answer-placeholder">단어를 클릭하여 문장을 만드세요</span></div>'+
      '<div id="clue-area"></div>'+
      '<div style="display:flex;gap:8px;margin-top:12px;flex-wrap:wrap" id="p1-actions">'+
      '<button class="btn-clue" id="clue-btn" data-action="showClue">💡 힌트</button>'+
      '<button style="padding:9px 18px;background:#f1f5f9;border:none;border-radius:9px;cursor:pointer;font-size:.82rem;color:#64748b;font-family:inherit" data-action="p1Clear">지우기</button>'+
      '<button class="btn btn-primary" style="flex:1;padding:10px" data-action="p1Submit">제출</button></div></div>'
    );
    this.p1selected=[];this.p1used=new Array(it.shuffledGroups.length).fill(false);
  },

  p1ClickChip:function(i){
    if(this.p1used&&this.p1used[i]) return;
    this.p1selected.push({idx:i,text:this.items[this.qi].shuffledGroups[i]});
    if(this.p1used) this.p1used[i]=true;
    var pool=document.getElementById('chip-pool');
    if(pool){var chips=pool.querySelectorAll('[data-chip-idx]');if(chips[i]) chips[i].classList.add('used');}
    var zone=document.getElementById('answer-zone');
    if(zone){
      if(zone.querySelector('.answer-placeholder')) zone.innerHTML='';
      zone.classList.add('has-items');
      var ac=document.createElement('span');
      ac.className='answer-chip';ac.dataset.ansIdx=this.p1selected.length-1;
      ac.textContent=this.items[this.qi].shuffledGroups[i];
      zone.appendChild(ac);
    }
  },

  p1RemoveChip:function(ansIdx){
    if(this.answered) return;
    var chip=this.p1selected[ansIdx];if(!chip) return;
    this.p1selected.splice(ansIdx,1);
    if(this.p1used) this.p1used[chip.idx]=false;
    var pool=document.getElementById('chip-pool');
    if(pool){var chips=pool.querySelectorAll('[data-chip-idx]');if(chips[chip.idx]) chips[chip.idx].classList.remove('used');}
    var zone=document.getElementById('answer-zone');
    if(zone){
      var ans=zone.querySelectorAll('[data-ans-idx]');
      zone.innerHTML='';
      if(this.p1selected.length===0){zone.classList.remove('has-items');zone.innerHTML='<span class="answer-placeholder">단어를 클릭하여 문장을 만드세요</span>';return;}
      this.p1selected.forEach(function(sel,i){
        var ac=document.createElement('span');ac.className='answer-chip';ac.dataset.ansIdx=i;
        ac.textContent=sel.text;zone.appendChild(ac);
      });
    }
  },

  p1Clear:function(){
    if(this.answered) return;
    this.p1selected=[];
    if(this.p1used) this.p1used=this.p1used.map(function(){return false;});
    var pool=document.getElementById('chip-pool');
    if(pool) pool.querySelectorAll('[data-chip-idx]').forEach(function(c){c.classList.remove('used');});
    var zone=document.getElementById('answer-zone');
    if(zone){zone.classList.remove('has-items');zone.innerHTML='<span class="answer-placeholder">단어를 클릭하여 문장을 만드세요</span>';}
  },

  p1Submit:function(){
    if(this.answered) return;
    var it=this.items[this.qi];
    var built=this.p1selected.map(function(s){return s.text;}).join(' ');
    var norm=function(s){return s.replace(/[^a-zA-Z0-9]/g,'').toLowerCase();};
    var isCorrect=norm(built)===norm(it.english)||(it.reconstructed&&norm(built)===norm(it.reconstructed));
    this.answered=true;
    if(isCorrect){this.rCorrect.push(it);if(this.mastered)this.mastered.add(normalize(it.english));}else{this.rWrong.push({english:it.english,korean:it.korean,userAnswer:built});this.wrongHist.push({english:it.english,korean:it.korean,userAnswer:built,round:this.round});}
    var zone=document.getElementById('answer-zone');
    if(zone){zone.className='answer-zone '+(isCorrect?'correct':'wrong');zone.querySelectorAll('.answer-chip').forEach(function(c){c.classList.add('locked');});}
    document.getElementById('p1-actions').style.display='none';
    var cb=document.getElementById('clue-btn');if(cb)cb.style.display='none';
    var fb=isCorrect?'<div class="feedback correct">정답입니다! ✅</div>':'<div class="feedback wrong">오답입니다 ❌<div class="correct-answer">정답: <strong>'+esc(it.english)+'</strong></div></div>';
    var nb='<div style="text-align:center;margin-top:12px"><button class="btn btn-primary" data-action="nextQ">다음 문제</button></div>';
    var d=document.createElement('div');d.innerHTML=fb+nb;this.app.querySelector('div').appendChild(d);
  },

  renderP2:function(it,prog,cnt,rnd,ph){
    var chips=(it.shuffledGroups&&it.shuffledGroups.length>0)
      ?'<div style="margin:12px 0 4px"><div style="font-size:.75rem;font-weight:600;color:#94a3b8;letter-spacing:.04em;text-transform:uppercase;margin-bottom:8px;text-align:center">단어 참고</div>'+
        '<div style="display:flex;flex-wrap:wrap;gap:6px;justify-content:center;padding:14px 12px;background:#f8fafc;border-radius:12px;border:1px dashed #cbd5e1">'+
        it.shuffledGroups.map(function(g){return '<span style="display:inline-block;padding:5px 12px;background:#fff;border:1.5px solid #e2e8f0;border-radius:8px;font-size:.85rem;color:#475569;font-weight:500;box-shadow:0 1px 2px rgba(0,0,0,.04)">'+esc(g)+'</span>';}).join('')+
        '</div></div>'
      :'';
    this.render(
      '<div>'+prog+cnt+rnd+ph+
      '<div class="korean-sentence">'+esc(it.korean)+'</div>'+
      chips+
      '<div id="clue-area"></div>'+
      '<input id="answer-input" class="answer-input" placeholder="영어 문장을 입력하세요..." autocomplete="off">'+
      '<div style="display:flex;gap:8px;margin-top:10px;flex-wrap:wrap">'+
      '<button class="btn-clue" id="clue-btn" data-action="showClue">💡 힌트</button>'+
      '<button class="btn btn-primary" style="flex:1" data-action="submitAnswer">제출</button></div></div>'
    );
    setTimeout(function(){var inp=document.getElementById('answer-input');if(inp)inp.focus();},100);
  },

  submitAnswer:function(){
    if(this.answered) return;
    var inp=document.getElementById('answer-input');if(!inp) return;
    var ans=inp.value.trim();if(!ans) return;
    this.answered=true;
    var it=this.items[this.qi];
    var norm=function(s){return s.replace(/[^a-zA-Z0-9]/g,'').toLowerCase();};
    var isCorrect=norm(ans)===norm(it.english)||(it.reconstructed&&norm(ans)===norm(it.reconstructed));
    if(isCorrect){this.rCorrect.push(it);if(this.mastered)this.mastered.add(normalize(it.english));}
    else{this.rWrong.push({english:it.english,korean:it.korean,userAnswer:ans});this.wrongHist.push({english:it.english,korean:it.korean,userAnswer:ans,round:this.round});}
    var cb=document.getElementById('clue-btn');if(cb)cb.style.display='none';
    inp.disabled=true;inp.classList.add(isCorrect?'correct':'wrong');
    var sb=this.app.querySelector('[data-action="submitAnswer"]');if(sb)sb.style.display='none';
    var fb=isCorrect?'<div class="feedback correct">정답입니다! ✅</div>':'<div class="feedback wrong">오답입니다 ❌<div class="correct-answer">정답: <strong>'+esc(it.english)+'</strong></div></div>';
    var nb='<div style="text-align:center;margin-top:12px"><button class="btn btn-primary" data-action="nextQ">다음 문제</button></div>';
    var d=document.createElement('div');d.innerHTML=fb+nb;this.app.querySelector('div').appendChild(d);
  },

  showClue:function(){
    if(this.clueUsed) return;this.clueUsed=true;
    var it=this.items[this.qi];
    var ca=document.getElementById('clue-area');
    if(ca) ca.innerHTML='<div class="clue-display">힌트 — 2번째 단어: <strong>'+esc(it.clueWord)+'</strong></div>';
    var b=document.getElementById('clue-btn');if(b){b.disabled=true;b.textContent='💡 힌트 사용됨';}
  },

  nextQ:function(){this.qi++;this.showQ();},

  endRound:function(){
    var ac=this.chunkMode?this.active.length:this.all.length;
    var pct=Math.round(this.mastered.size/ac*100);
    this.roundHist.push({round:this.round,tested:this.items.length,correct:this.rCorrect.length,wrong:this.rWrong.length,pct:pct});
    if(pct>=this.pass) this.showPassed(pct); else this.showRoundSum(pct);
  },

  showRoundSum:function(pct){
    var ac=this.chunkMode?this.active.length:this.all.length;
    var pLabel=this.phase===1?'1단계':'2단계';
    var rem=ac-this.mastered.size;
    this.setSub(pLabel+' — '+this.round+'R 결과');
    this.render(
      '<div style="animation:fadeIn .4s">'+
      '<div class="score-circle fail">'+pct+'%</div>'+
      '<div style="text-align:center;margin:12px 0"><h3 style="font-size:1.05rem;font-weight:700;color:#1e293b;margin-bottom:4px">'+pLabel+' '+this.round+'R 결과</h3>'+
      '<p style="color:#64748b;font-size:.85rem">통과 기준: '+this.pass+'%</p></div>'+
      '<div class="summary-card">'+
      '<div class="stat-row"><span class="stat-label">이번 라운드</span><span class="stat-value">'+this.items.length+'문항</span></div>'+
      '<div class="stat-row"><span class="stat-label">정답</span><span class="stat-value pass">'+this.rCorrect.length+'</span></div>'+
      '<div class="stat-row"><span class="stat-label">오답</span><span class="stat-value fail">'+this.rWrong.length+'</span></div>'+
      '<div class="stat-row"><span class="stat-label">누적 정답</span><span class="stat-value">'+this.mastered.size+'/'+ac+'</span></div></div>'+
      '<div style="text-align:center;margin:10px 0;padding:12px;background:#fef2f2;border-radius:10px;border:1px solid #fecaca">'+
      '<p style="color:#991b1b;font-weight:600;font-size:.88rem">틀린 '+rem+'개로 재시험</p></div>'+
      '<button class="btn btn-primary btn-block" style="margin-top:12px" data-action="nextRound">다음 라운드 ('+rem+'문항)</button>'+
      (this.phase===1&&this.p1Done?'<button class="btn btn-block" data-action="bypassToPhase2" style="margin-top:8px;background:#7c3aed;color:#fff">✍️ 2단계로 이동 →</button>':'')+
      '</div>'
    );
  },

  nextRound:function(){
    var self=this;
    this.items=this.rWrong.map(function(w){
      var f=self.all.find(function(s){return normalize(s.english)===normalize(w.english);});
      return f||{english:w.english,korean:w.korean,groups:[],shuffledGroups:[],clueWord:''};
    });
    this.beginRound();
  },

  showPassed:function(pct){
    var ac=this.chunkMode?this.active.length:this.all.length;
    var pLabel=this.phase===1?'1단계':'2단계';
    this.setTitle(pLabel+' 통과! 🎉');this.setSub(pct+'%');
    if(this.phase===1){this.p1Done=true;this.saveP1Done();}
    if(this.chunkMode){this.chunkResults[this.chunkIdx]=pct;}
    this.showConfetti();
    var hw=this.wrongHist.length>0,wl='';
    if(hw){wl='<div style="margin-top:12px"><h3 style="font-size:.9rem;font-weight:700;color:#1e293b;margin-bottom:8px">틀렸던 문제</h3>';
      this.wrongHist.forEach(function(w){wl+='<div class="wrong-item"><div class="kor">'+esc(w.korean)+' ('+w.round+'R)</div><div class="user-ans">'+esc(w.userAnswer)+'</div><div class="eng">정답: '+esc(w.english)+'</div></div>';});wl+='</div>';}
    var rsh='';
    if(this.roundHist.length>1){rsh='<div class="summary-card" style="margin-top:10px"><h3>라운드별</h3>';
      this.roundHist.forEach(function(r){rsh+='<div class="stat-row"><span class="stat-label">'+r.round+'R ('+r.tested+')</span><span class="stat-value">정답 '+r.correct+'/오답 '+r.wrong+'</span></div>';});rsh+='</div>';}
    var btns='<div class="buttons-row">';
    if(this.chunkMode) btns+='<button class="btn btn-secondary" data-action="showChunkSel">세트 선택</button>';
    if(this.phase===1) btns+='<button class="btn btn-primary" data-action="goPhase2">2단계로 이동 →</button>';
    btns+='<button class="btn btn-secondary" data-action="showPhaseSelect">단계 선택</button></div>';
    this.render(
      '<div style="animation:fadeIn .5s">'+
      '<div class="celebration"><div class="emoji">🎉</div><h2>'+pLabel+' 통과!</h2>'+
      '<p>'+this.pass+'% 기준 달성'+(this.phase===1?'<br><strong>2단계를 통과해야 최종 완료</strong>':'')+'</p></div>'+
      '<div class="score-circle pass">'+pct+'%</div>'+
      '<div class="summary-card"><h3>결과</h3>'+
      '<div class="stat-row"><span class="stat-label">라운드</span><span class="stat-value">'+this.round+'회</span></div>'+
      '<div class="stat-row"><span class="stat-label">성취도</span><span class="stat-value pass">'+pct+'%</span></div>'+
      '<div class="stat-row"><span class="stat-label">총 오답</span><span class="stat-value '+(hw?'fail':'pass')+'">'+this.wrongHist.length+'회</span></div></div>'+
      rsh+wl+btns+'</div>'
    );
  },

  goPhase2:function(){this.startPhase2();},
  bypassToPhase2:function(){this.startPhase2();},

  showConfetti:function(){
    var c=document.createElement('div');c.className='confetti-container';
    var cols=['#2d5a87','#4a90d9','#f59e0b','#059669','#dc2626','#ec4899','#8b5cf6'];
    for(var i=0;i<50;i++){
      var p=document.createElement('div');p.className='confetti-piece';
      p.style.left=Math.random()*100+'%';p.style.background=cols[Math.floor(Math.random()*cols.length)];
      p.style.animationDelay=Math.random()*2+'s';p.style.animationDuration=(2+Math.random()*2)+'s';
      var sz=6+Math.random()*8;p.style.width=sz+'px';p.style.height=sz+'px';
      p.style.borderRadius=Math.random()>.5?'50%':'2px';c.appendChild(p);}
    document.body.appendChild(c);setTimeout(function(){if(c.parentNode)c.parentNode.removeChild(c);},5000);
  }
};
try{T.init();}catch(e){
  var app=document.getElementById('app');
  if(app) app.innerHTML='<div style="padding:24px;text-align:center"><h2 style="color:#dc2626;font-size:1rem;margin-bottom:8px">⚠️ 오류</h2><p style="color:#64748b;font-size:.85rem;margin-bottom:8px">Chrome 또는 Safari 브라우저로 열어주세요.</p><p style="font-size:.72rem;color:#94a3b8">'+esc(e.message||String(e))+'</p></div>';
}
</script>
</body>
</html>
