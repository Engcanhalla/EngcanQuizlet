    var synHtml=syns.length?syns.map(function(s){return '<span class="chip-syn">'+esc(s.en)+(s.ko?'<span class="chip-ko"> '+esc(s.ko)+'</span>':'')+'</span>';}).join(''):'<span style="opacity:.45;font-size:.8rem">없음</span>';
    var antHtml=ants.length?ants.map(function(a){return '<span class="chip-ant">'+esc(a.en)+(a.ko?'<span class="chip-ko"> '+esc(a.ko)+'</span>':'')+'</span>';}).join(''):'<span style="opacity:.45;font-size:.8rem">없음</span>';

      '<button class="btn btn-ghost" onclick="T.showFlashMap()" style="margin-top:8px;font-size:.85rem;padding:10px">&#8592; 목록으로</button>'

  markKnown:function(){this.fKnown.push(this.fIdx);this._nextCard();},

      h+='<div class="sc-w"><div class="'+cls+'" onclick="T.startSet('+i+')">'+

  startSet:function(idx){
    this.tCurSet=idx;this.roundNum=1;
    this.tCorrect=0;this.tWrong=0;this.tWrongWords=[];

  _buildQs:function(words){
    var allPool=[];
    function addUniq(arr,item){if(!arr.find(function(x){return x.en===item.en;}))arr.push(item);}
    T.allWords.forEach(function(w){
      synList(w).forEach(function(s){addUniq(allPool,s);});
      antList(w).forEach(function(a){addUniq(allPool,a);});
    });
    var qs=[];
    words.forEach(function(w){
      var syns=synList(w),ants=antList(w),sent=w.sentence||'';

      /* 원본 단어 객체 (보기에 강제 포함, 정답 아님) */
      var origChip={en:w.word,ko:w.definition};

      /* ── 유의어 문제: 정답 2~4개 유동 ── */
      if(syns.length>=1){
        /* origChip 이 항상 정답에 추가되므로 유의어 정답은 최대 3개 → 전체 정답 최대 4개, 오답 최소 1개 보장 */
        var maxC=Math.min(syns.length,3),minC=Math.min(syns.length,2);
        var synCnt=minC+Math.floor(Math.random()*(maxC-minC+1));
        var correctSyns=sample(syns,synCnt);
        /* 원본 단어 제외한 나머지 슬롯을 distractors로 채움 (5개 총합) */
        var synPool=allPool.filter(function(p){
          return p.en!==w.word&&
                 !correctSyns.find(function(x){return x.en===p.en;})&&
                 !syns.find(function(x){return x.en===p.en;});
        });
        var synFillers=sample(synPool,5-correctSyns.length-1);
        var synChoices=shuffle(correctSyns.concat([origChip]).concat(synFillers));
        var synCorrectSet=correctSyns.map(function(s){return s.en;}).concat([w.word]);
        qs.push({word:w.word,definition:w.definition,sentence:sent,qtype:'syn',
          choices:synChoices,correctSet:synCorrectSet});
      }

      /* ── 반의어 문제: 정답 1~2개 유동 ── */
      if(ants.length>=1){
        var antCnt=1+Math.floor(Math.random()*Math.min(ants.length,2));
        var correctAnts=sample(ants,antCnt);
        var antPool=allPool.filter(function(p){
          return p.en!==w.word&&
                 !correctAnts.find(function(x){return x.en===p.en;})&&
                 !ants.find(function(x){return x.en===p.en;})&&
                 !syns.find(function(x){return x.en===p.en;});
        });
        var antFillers=sample(antPool,5-correctAnts.length-1);
        var antChoices=shuffle(correctAnts.concat([origChip]).concat(antFillers));
        qs.push({word:w.word,definition:w.definition,sentence:sent,qtype:'ant',
          choices:antChoices,correctSet:correctAnts.map(function(a){return a.en;})});
      }
    });
    return qs;
  },
  showQuestion:function(){
    this.qSelected=[];this.qAnswered=false;
    var q=this.roundQuestions[this.qIdx],tot=this.roundQuestions.length;
    var pct=Math.round(this.qIdx/tot*100);
    var tagCls=q.qtype==='syn'?'round-tag':'round-tag ant';
    var self=this;
    var opts=q.choices.map(function(c,i){
      return '<button class="opt-btn" id="opt'+i+'" onclick="T._toggle('+i+')" data-qtype="'+q.qtype+'">'+esc(c.en)+'</button>';
    }).join('');
    this.setTitle('세트 '+(this.tCurSet+1)+' 테스트');
    this.setSub((this.qIdx+1)+' / '+tot+'  &#183;  '+this.roundNum+'라운드');
    this.render(
      '<div class="q-counter">'+this.qIdx+' / '+tot+' 완료 &nbsp;&#183;&nbsp; 정답 '+this.tCorrect+'</div>'+
      '<div class="prog-bar"><div class="prog-fill" style="width:'+pct+'%"></div></div>'+
      '<div style="text-align:center"><span class="'+tagCls+'">'+esc(q.qtype==='syn'?'유의어 찾기':'반의어 찾기')+'</span></div>'+
      '<div class="kor-word">'+esc(q.definition)+'</div>'+
      (q.sentence?(function(){
        var re=new RegExp('\\b'+q.word.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+'(?:s|es|ed|ing|d|er|est)?\\b','gi');
        var blanked=q.sentence.replace(re,'<strong>___________</strong>');
        return '<div class="sent-blank">'+blanked+'</div>';
      })():'')+
      '<div class="q-hint">다음 중 <strong>'+esc(q.qtype==='syn'?'유의어':'반의어')+'</strong>를 <strong>모두</strong> 고르시오'+(T.showCountEnabled?' <span style="font-size:.8rem;color:#94a3b8">(정답 '+q.correctSet.length+'개)</span>':'')+'</div>'+
      '<div class="opts" id="opts">'+opts+'</div>'+
      '<button class="btn btn-accent" id="sub-btn" onclick="T._submit()" disabled style="margin-top:12px">제출</button>'
    );
  },
  _toggle:function(idx){
    if(this.qAnswered)return;
    var q=this.roundQuestions[this.qIdx];
    var pos=this.qSelected.indexOf(idx);
    var btn=document.getElementById('opt'+idx);
    var selCls=q.qtype==='syn'?'sel-syn':'sel-ant';
    if(pos>=0){
      this.qSelected.splice(pos,1);
      if(btn){btn.classList.remove('sel-syn');btn.classList.remove('sel-ant');}
    }else{
      this.qSelected.push(idx);
      if(btn)btn.classList.add(selCls);
    }
    var sub=document.getElementById('sub-btn');
    if(sub)sub.disabled=this.qSelected.length===0;
  },
  _submit:function(){
    this.qAnswered=true;
    var q=this.roundQuestions[this.qIdx];
    var selWords=this.qSelected.map(function(i){return q.choices[i].en;});
    var allOk=q.correctSet.every(function(w){return selWords.indexOf(w)>=0;});
    var noWrong=selWords.every(function(w){return q.correctSet.indexOf(w)>=0;});
    var isCorrect=allOk&&noWrong;
    if(isCorrect){
      this.tCorrect++;
    }else{
      this.tWrong++;
      var origWord=T.allWords.find(function(ow){return ow.word===q.word;})||
        {word:q.word,definition:q.definition,sentence:q.sentence,synonyms:[],antonyms:[]};
      if(!T.tWrongWords.find(function(ow){return ow.word===origWord.word;}))
        T.tWrongWords.push(origWord);
      if(!T.tAllWrongWords.find(function(ow){return ow.word===origWord.word;}))
        T.tAllWrongWords.push(origWord);
    }
    var sel=this.qSelected;
    var opts=q.choices.map(function(c,i){
      var isCor=q.correctSet.indexOf(c.en)>=0,isSel=sel.indexOf(i)>=0;
      var cls='opt-btn'+(isCor&&isSel?' correct':(!isCor&&isSel?' wrong':(isCor&&!isSel?' reveal':'')));
      var icon=isCor?'&#9989; ':'&#10060; ';
      var koTxt=c.ko?'<span style="display:block;font-size:.75rem;color:#64748b;margin-top:2px">'+esc(c.ko)+'</span>':'';
      return '<button class="'+cls+'" disabled>'+icon+'<strong>'+esc(c.en)+'</strong>'+koTxt+'</button>';
    }).join('');
    var fb=isCorrect?
      '<div class="fb ok">&#9989; 정답입니다!<div style="font-size:.8rem;font-weight:400;margin-top:3px">정답: '+esc(q.correctSet.join(', '))+'</div></div>':
      '<div class="fb ng">&#10060; 오답입니다<div style="font-size:.8rem;font-weight:400;margin-top:3px">정답: '+esc(q.correctSet.join(', '))+'</div></div>';
    var nxt=this.qIdx+1<this.roundQuestions.length?'다음 문제 &#8594;':'결과 보기';
    document.getElementById('opts').innerHTML=opts;
    document.getElementById('sub-btn').outerHTML=fb+
      '<button class="btn btn-primary" onclick="T._nextQ()" style="margin-top:10px">'+nxt+'</button>';
  },
  _nextQ:function(){
    this.qIdx++;
    if(this.qIdx<this.roundQuestions.length)this.showQuestion();else this._endSet();
  },
  _endSet:function(){
    var tot=this.roundQuestions.length,pct=Math.round(this.tCorrect/tot*100);
    this.tSetResults[this.tCurSet]={done:true,pct:pct};
    this.setTitle('세트 '+(this.tCurSet+1)+' 완료');this.setSub('결과');
    var h='<div class="fade celeb"><div class="em">&#127919;</div>'+
      '<h2>세트 '+(this.tCurSet+1)+' 완료!</h2>'+
      '<p>'+this.tCorrect+' / '+tot+' 정답</p></div>'+
      '<div class="sc '+(pct>=70?'g':'r')+'">'+pct+'%</div>'+
      '<div class="card"><h3>세트 결과</h3>'+
      '<div class="sr"><span class="sl">문항 수</span><span class="sv">'+tot+'개</span></div>'+
      '<div class="sr"><span class="sl">정답</span><span class="sv g">'+this.tCorrect+'개</span></div>'+
      '<div class="sr"><span class="sl">오답</span><span class="sv r">'+this.tWrong+'개</span></div>'+
      '<div class="sr"><span class="sl">정확도</span><span class="sv '+(pct>=70?'g':'r')+'">'+pct+'%</span></div>'+
      '</div>';
    /* 틀린 단어 재도전 버튼 */
    if(pct<100&&this.tWrongWords.length>0){
      h+='<div class="alert alert-r">&#10060; 틀린 단어 '+this.tWrongWords.length+'개</div>'+
        '<button class="btn btn-accent" onclick="T._retryWrongSet()">틀린 단어만 다시 테스트 ('+this.tWrongWords.length+'개)</button>';
    }
    var allDone=this.tSetResults.every(function(r){return r.done;});
    if(allDone){
      h+='<div class="alert alert-g" style="margin-top:10px">&#127881; 모든 세트 완료!</div>'+
        '<button class="btn btn-primary" onclick="T._showFinal()" style="margin-top:10px">최종 결과 보기</button>';
    }else{
      var nx=-1;
      for(var i=0;i<this.sets.length;i++){if(!this.tSetResults[i].done){nx=i;break;}}
      if(nx>=0)h+='<button class="btn btn-secondary" onclick="T.startSet('+nx+')" style="margin-top:10px">다음 세트 &#8594;</button>';
      h+='<button class="btn btn-ghost" onclick="T.showSetMap()" style="margin-top:10px">세트 목록으로</button>';
    }
    this.render(h);
  },
  _showFinal:function(){
    var rs=this.tSetResults,avg=Math.round(rs.reduce(function(s,r){return s+r.pct;},0)/rs.length);
    this.setTitle('최종 결과');this.setSub(CONFIG.title);
    var h='<div class="fade celeb"><div class="em">&#127881;</div>'+
      '<h2>테스트 완료!</h2><p>모든 세트의 테스트를 마쳤습니다</p></div>'+
      '<div class="sc '+(avg>=70?'g':'r')+'">'+avg+'%</div>'+
      '<div class="card"><h3>최종 결과</h3>'+
      '<div class="sr"><span class="sl">총 단어</span><span class="sv">'+this.allWords.length+'개</span></div>'+
      '<div class="sr"><span class="sl">세트 수</span><span class="sv">'+this.sets.length+'세트</span></div>'+
      '<div class="sr"><span class="sl">평균 정확도</span><span class="sv '+(avg>=70?'g':'r')+'">'+avg+'%</span></div>'+
      '</div><div class="card"><h3>세트별 결과</h3>';
    rs.forEach(function(r,i){
      h+='<div class="sr"><span class="sl">세트 '+(i+1)+'</span><span class="sv '+(r.pct>=70?'g':'r')+'">'+r.pct+'%</span></div>';
    });
    h+='</div>';
    if(this.tAllWrongWords.length>0){
      h+='<div class="alert alert-r">&#10060; 전체 틀린 단어 '+this.tAllWrongWords.length+'개</div>'+
        '<button class="btn btn-accent" onclick="T._retryWrongAll()" style="margin-top:10px">틀린 단어만 다시 테스트 ('+this.tAllWrongWords.length+'개)</button>';
    }
    h+='<button class="btn btn-secondary" onclick="T.startTest()" style="margin-top:10px">처음부터 다시</button>'+
      '<button class="btn btn-ghost" onclick="T.showHome()" style="margin-top:10px">&#8592; 홈으로</button>';
    this.render(h);
  },

  _retryWrongSet:function(){
    var wrongWords=this.tWrongWords.slice();
    this.tCorrect=0;this.tWrong=0;this.tWrongWords=[];
    this.roundNum++;
    this.roundQuestions=shuffle(this._buildQs(wrongWords));
    this.qIdx=0;
    this.showQuestion();
  },

  _retryWrongAll:function(){
    var wrongWords=this.tAllWrongWords.slice();
    this.tAllWrongWords=[];
    /* 틀린 단어들을 1개 세트로 재편성 */
    this.sets=[wrongWords];
    this.tSetResults=[{done:false,pct:0}];
    this.tCurSet=0;this.roundNum=1;
    this.tCorrect=0;this.tWrong=0;this.tWrongWords=[];
    this.roundQuestions=shuffle(this._buildQs(wrongWords));
    this.qIdx=0;
    this.showQuestion();
  },

  _toggleCount:function(){
    this.showCountEnabled=!this.showCountEnabled;
    this.showHome();
  }
};
try{T.init();}catch(e){var app=document.getElementById('app');if(app)app.innerHTML='<div style="padding:20px;text-align:center;color:#dc2626">오류: '+esc(e.message||String(e))+'</div>';}
</script>
</body>
</html>
