<style>*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}

.source-box{margin:10px 0 4px;padding:12px 14px;background:#f9fafb;border-left:3px solid #a78bfa;border-radius:0 10px 10px 0;font-size:.82rem;color:#4b5563;line-height:1.65;font-style:italic}
.source-label{display:block;font-size:.68rem;color:#7c3aed;font-weight:700;text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px;font-style:normal}
.ox-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:16px}
.ox-btn{padding:18px 10px;border:2px solid #e5e7eb;background:#fff;border-radius:16px;font-size:1rem;font-weight:800;color:#1e293b;cursor:pointer;font-family:inherit;transition:all .18s;touch-action:manipulation;-webkit-user-select:none;user-select:none;min-height:84px}

.ox-btn.x{color:#dc2626}
.ox-btn.dunno{grid-column:1 / span 2;padding:14px;font-size:.92rem;color:#64748b;font-weight:700;min-height:0}
.ox-btn.sel.o{background:linear-gradient(135deg,#ecfdf5,#d1fae5);border-color:#10b981}
.ox-btn.sel.x{background:linear-gradient(135deg,#fff1f2,#fecdd3);border-color:#ef4444}
.ox-btn.sel.dunno{background:#f1f5f9;border-color:#94a3b8}
.ox-btn.correct{background:linear-gradient(135deg,#ecfdf5,#d1fae5);border-color:#10b981;color:#065f46}
.ox-btn.wrong{background:linear-gradient(135deg,#fff1f2,#fecdd3);border-color:#ef4444;color:#7f1d1d}
.ox-btn[disabled]{cursor:default;opacity:.85}
.ox-icon{display:block;font-size:1.6rem;margin-bottom:4px}
.fb{text-align:center;padding:14px 16px;border-radius:14px;margin-top:14px;font-weight:700;font-size:.92rem;line-height:1.5}

.nav-btn.prev,.nav-btn.home{background:#f1f5f9;color:#374151;border:1.5px solid #e2e8f0}
.nav-btn.next{background:linear-gradient(135deg,#8b5cf6,#a78bfa);color:#fff}
.nav-btn:disabled{opacity:.3;cursor:default}
.set-list{display:grid;gap:10px;margin-top:8px}
.set-card{background:#fff;border:2px solid #e5e7eb;border-radius:16px;padding:16px 20px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;transition:all .2s}
.set-card:hover{border-color:#8b5cf6;background:#faf5ff;transform:translateY(-2px)}
.set-card.done{border-color:#8b5cf6;background:linear-gradient(135deg,#faf5ff,#f3e8ff)}
.score-circle{width:110px;height:110px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:16px auto;font-size:1.8rem;font-weight:800;border:6px solid}
.score-circle.pass{border-color:#10b981;color:#059669;background:linear-gradient(135deg,#ecfdf5,#d1fae5)}
.score-circle.fail{border-color:#f43f5e;color:#e11d48;background:linear-gradient(135deg,#fff1f2,#fecdd3)}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.fade{animation:fadeIn .15s ease-out}

<script>
var CONFIG={"title":"1Go2025.30_33","passThreshold":90,"level":"high1","levelLabel":"고1 3월 · CEFR B1","passages":[{"id":1,"title":"Honest Promotion","body":"Promotion deals with consumer psychology. We can't force people to think one way or another, and the clever marketer knows that promotion is used to provide information in the most clear, honest, and simple fashion possible. By doing so, the possibility of increasing sales goes up. Gone are the days when promotions were done in order to fool the consumer into purchasing something. The long-term effect of getting a consumer to buy something they did not really want or need wasn't good. In fact, consumers fooled once can do damage to sales as they relate their experience to others. Instead, marketers now know that their goal is to identify the consumers who are most likely to appreciate a good or service, and to promote that good or service in a way that makes the value clear to the consumer. Therefore, marketers must know where the interested consumers are, and how to reach them."},{"id":2,"title":"Form of Beauty","body":"Plato argued that when you see something that strikes you as beautiful, you are really just seeing a partial reflection of true beauty, just as a painting or even a photograph only captures part of the real thing. True beauty, or what Plato calls the Form of Beauty, has no particular color, shape, or size. Rather, it is an abstract idea, like the number five. You can make drawings of the number five in blue or red ink, big or small, but the number five itself is none of those things. It has no physical form. Think of the idea of a triangle, for example. Although it has no particular color or size, it somehow lies within each and every triangle you see. Plato thought the same was true of beauty. The Form of Beauty somehow lies within each and every beautiful thing you see."},{"id":3,"title":"Listening to Children","body":"As you listen to your child in an emotional moment, be aware that sharing simple observations usually works better than asking questions to get a conversation rolling. You may ask your child \"Why do you feel sad?\" and she may not have a clue. As a child, she may not have an answer on the tip of her tongue. Maybe she's feeling sad about her parents' arguments, or because she feels overtired, or she's worried about a piano recital. But she may or may not be able to explain any of this. And even when she does come up with an answer, she might be worried that the answer is not good enough to justify the feeling. Under these circumstances, a series of questions can just make a child silent. It's better to simply reflect what you notice. You can say, \"You seem a little tired today,\" or, \"I noticed that you frowned when I mentioned the recital,\" and wait for her response."},{"id":4,"title":"Skin and Emotion","body":"Our skin conducts electricity more or less efficiently, depending on our emotions. We know that when we're emotionally stimulated - stressed, sad, any intense emotion, really - our bodies sweat a tiny bit, so little we might not even notice. And when those tiny drops of sweat appear, our skin gets more electrically conductive. This change in sweat gland activity happens completely without your conscious mind having much say in the matter. If you feel emotionally intense, you're going to notice an increase in sweat gland activity. This is particularly useful from a scientific viewpoint, because it allows us to put an objective value on a subjective state of mind. We can actually measure your emotional state by tracking how your body subconsciously sweats, by running a bit of electricity through your skin. We can then turn the subjective, subconscious experience of emotional intensity into an objective number by figuring out how good your skin gets at transferring an electrical current."}],"questions":[{"questionNumber":1,"passageId":1,"passageTitle":"Honest Promotion","type":"ko_detail","typeLabel":"부분 내용 (한글)","statement":"본문은 영리한 마케터가 소비자를 교묘하게 설득해 원치 않는 제품을 구매하도록 유도하는 것이 장기적으로 가장 효과적인 판매 전략이라고 주장한다.","sourceSentence":"The long-term effect of getting a consumer to buy something they did not really want or need wasn't good.","answer":"X","explanation":"본문은 정반대로 말한다. 소비자가 원하지도 필요하지도 않는 것을 사도록 만드는 것의 장기적 효과는 '좋지 않았다'고 명시하며, 그런 시대는 '이미 지나갔다(Gone are the days)'고 선언한다."},{"questionNumber":2,"passageId":1,"passageTitle":"Honest Promotion","type":"ko_detail","typeLabel":"부분 내용 (한글)","statement":"한 번이라도 속임을 당한 소비자는 자신의 경험을 주변에 이야기하면서 해당 브랜드의 매출에 부정적인 영향을 미칠 수 있다.","sourceSentence":"In fact, consumers fooled once can do damage to sales as they relate their experience to others.","answer":"O","explanation":"본문은 '한 번 속임을 당한 소비자는 자신의 경험을 다른 사람들에게 전달하면서 매출에 피해를 줄 수 있다'고 명시한다. 이는 부정직한 프로모션이 장기적으로 역효과를 낸다는 근거이다."},{"questionNumber":3,"passageId":1,"passageTitle":"Honest Promotion","type":"en_main","typeLabel":"전반 내용 (영어)","statement":"Smart marketers today focus on reaching the right audience with a transparent message rather than misleading people into unwanted purchases.","sourceSentence":null,"answer":"O","explanation":"본문의 핵심 주장은 '현대 마케터의 목표는 해당 상품의 가치를 가장 잘 알아볼 소비자를 파악하고, 그들에게 명확한 가치를 전달하는 방식으로 홍보하는 것'이다. 제시된 문장은 이 요지를 paraphrase 한 것이다."},{"questionNumber":4,"passageId":1,"passageTitle":"Honest Promotion","type":"en_main","typeLabel":"전반 내용 (영어)","statement":"The most powerful promotional strategy is to shape how consumers think by guiding their decision-making process in the marketer's favor.","sourceSentence":null,"answer":"X","explanation":"본문의 첫 문장은 '사람들이 어느 방향으로 생각하도록 강요할 수 없다(We can't force people to think one way or another)'고 명확히 말한다. 소비자의 사고를 조종하는 것이 핵심 전략이라는 진술은 본문의 전제와 정면으로 충돌한다."},{"questionNumber":5,"passageId":1,"passageTitle":"Honest Promotion","type":"en_twist","typeLabel":"원문 교묘한 Paraphrasing","statement":"A skilled marketer understands that delivering honest, clear, and straightforward information raises the likelihood of boosting sales.","sourceSentence":"The clever marketer knows that promotion is used to provide information in the most clear, honest, and simple fashion possible. By doing so, the possibility of increasing sales goes up.","answer":"O","explanation":"'clear, honest, and simple'을 'honest, clear, and straightforward'로, 'possibility of increasing sales goes up'을 'raises the likelihood of boosting sales'로 동의어 치환했을 뿐 의미는 원문과 동일하다."},{"questionNumber":6,"passageId":1,"passageTitle":"Honest Promotion","type":"en_twist","typeLabel":"원문 교묘한 Paraphrasing","statement":"Tricking consumers into purchasing items they don't truly need has proven to be a reliable method for building lasting customer loyalty.","sourceSentence":"The long-term effect of getting a consumer to buy something they did not really want or need wasn't good.","answer":"X","explanation":"원문은 원치 않는 것을 사도록 속이는 전략의 장기적 효과가 '좋지 않았다'고 말한다. 제시된 문장은 이를 '신뢰할 수 있는 방법'이자 '지속적인 고객 충성도를 만들 수 있다'고 정반대로 왜곡했다."},{"questionNumber":7,"passageId":1,"passageTitle":"Honest Promotion","type":"thats_why","typeLabel":"That's why 인과","statement":"More people hear positive things about a brand and sales keep rising. That's why consumers who were fooled once go on to share their negative experience with those around them.","sourceSentence":null,"answer":"X","explanation":"본문의 실제 인과는 '속임을 당한 소비자가 경험을 주변에 전달한다(원인) → 매출에 피해가 생긴다(결과)'이다. 제시된 진술은 결과(매출 증가·긍정적 입소문)를 원인 자리에, 원인(부정적 경험 공유)을 결과 자리에 놓아 방향을 완전히 역전시켰다."},{"questionNumber":8,"passageId":1,"passageTitle":"Honest Promotion","type":"this_leads","typeLabel":"This leads 인과","statement":"A marketer promotes a good or service in a way that makes its value clear to those most likely to appreciate it. This leads to a higher possibility of increasing sales.","sourceSentence":null,"answer":"O","explanation":"본문은 '상품의 가치를 소비자에게 명확히 전달하는 방식으로 홍보(원인) → 판매 가능성 증가(결과)'라는 인과 흐름을 제시한다. 제시된 진술의 원인·결과 방향이 본문과 정확히 일치한다."},{"questionNumber":9,"passageId":1,"passageTitle":"Honest Promotion","type":"ko_cause","typeLabel":"한국어 인과","statement":"판매량이 꾸준히 오르고 있기 때문에, 마케터는 정보를 가능한 한 명확하고 정직하게 전달하는 것을 자신의 목표로 삼게 된다.","sourceSentence":null,"answer":"X","explanation":"본문의 인과 방향은 '명확하고 정직한 정보 전달(원인) → 판매 가능성 증가(결과)'이다. 제시된 진술은 결과를 원인 자리에, 원인을 결과 자리에 놓아 두 요소의 위치를 뒤바꿨다."},{"questionNumber":10,"passageId":1,"passageTitle":"Honest Promotion","type":"ko_cause","typeLabel":"한국어 인과","statement":"소비자가 원하지도 않는 것을 사도록 속임을 당하면, 그 경험을 타인에게 전달하기 때문에 결국 해당 상품의 매출에 손해가 발생한다.","sourceSentence":null,"answer":"O","explanation":"본문은 '속임을 당한 소비자가 경험을 다른 사람에게 전달(원인) → 매출 피해(결과)'라는 인과를 명확히 제시한다. 제시된 진술의 원인·결과 배열이 본문과 정확히 일치한다."},{"questionNumber":11,"passageId":2,"passageTitle":"Form of Beauty","type":"ko_detail","typeLabel":"부분 내용 (한글)","statement":"플라톤에 따르면 진정한 아름다움은 고유한 색깔·형태·크기를 지닌 실체로서 존재하며, 우리가 보는 아름다운 것들이 바로 그 진정한 아름다움 자체이다.","sourceSentence":"True beauty, or what Plato calls the Form of Beauty, has no particular color, shape, or size.","answer":"X","explanation":"본문은 정반대를 말한다. 진정한 아름다움(아름다움의 형상)은 '특정한 색깔·모양·크기가 없는' 추상적 개념이다. 우리가 보는 아름다운 것들은 그 형상의 '부분적 반영'일 뿐이다."},{"questionNumber":12,"passageId":2,"passageTitle":"Form of Beauty","type":"ko_detail","typeLabel":"부분 내용 (한글)","statement":"플라톤은 삼각형의 개념이 우리가 보는 모든 삼각형 안에 깃들어 있듯이, 아름다움의 형상도 아름다운 모든 사물 안에 내재한다고 생각했다.","sourceSentence":"Plato thought the same was true of beauty. The Form of Beauty somehow lies within each and every beautiful thing you see.","answer":"O","explanation":"본문은 삼각형의 예를 들어 추상적 개념이 개별 사례 안에 내재하는 방식을 설명한 뒤, 아름다움의 형상도 마찬가지로 '우리가 보는 아름다운 모든 것 안에 어떻게든 깃들어 있다'고 말한다."},{"questionNumber":13,"passageId":2,"passageTitle":"Form of Beauty","type":"en_main","typeLabel":"전반 내용 (영어)","statement":"For Plato, genuine beauty is a formless, abstract concept that can only be partially glimpsed through concrete beautiful objects we encounter.","sourceSentence":null,"answer":"O","explanation":"본문의 핵심 주장은 플라톤의 이데아론이다. 진정한 아름다움(아름다움의 형상)은 물리적 형태가 없는 추상적 개념이며, 우리가 보는 아름다운 것들은 그것의 부분적 반영에 불과하다는 내용이다. 제시된 문장은 이를 정확히 paraphrase 했다."},{"questionNumber":14,"passageId":2,"passageTitle":"Form of Beauty","type":"en_main","typeLabel":"전반 내용 (영어)","statement":"Physical objects such as paintings and photographs can fully capture the complete essence of true beauty, leaving nothing out.","sourceSentence":null,"answer":"X","explanation":"본문은 그림이나 사진은 '실제의 일부만을 담아낼 뿐'이라고 말한다. 시각적 매체가 진정한 아름다움을 '완전히(fully)' 포착할 수 있다는 진술은 본문의 핵심 논지를 정반대로 왜곡한 것이다."},{"questionNumber":15,"passageId":2,"passageTitle":"Form of Beauty","type":"en_twist","typeLabel":"원문 교묘한 Paraphrasing","statement":"The number five has no physical form of its own; you can write it large or small, in any color, yet the concept itself stays the same regardless of how it appears.","sourceSentence":"You can make drawings of the number five in blue or red ink, big or small, but the number five itself is none of those things. It has no physical form.","answer":"O","explanation":"'blue or red ink'를 'any color'로, 'is none of those things'를 'stays the same regardless of how it appears'로 paraphrase 했을 뿐, '숫자 5는 물리적 형태가 없으며 색깔이나 크기에 의해 규정되지 않는다'는 의미는 원문과 동일하다."},{"questionNumber":16,"passageId":2,"passageTitle":"Form of Beauty","type":"en_twist","typeLabel":"원문 교묘한 Paraphrasing","statement":"True beauty, like the number five, takes on a different physical form depending on the color, size, and shape in which it appears.","sourceSentence":"True beauty, or what Plato calls the Form of Beauty, has no particular color, shape, or size. Rather, it is an abstract idea, like the number five.","answer":"X","explanation":"원문은 진정한 아름다움이 숫자 5처럼 '특정한 색깔·모양·크기가 없는' 추상적 개념이라고 말한다. 제시된 문장은 이를 '색깔·크기·모양에 따라 다른 물리적 형태를 띤다'고 정반대로 뒤집었다."},{"questionNumber":17,"passageId":2,"passageTitle":"Form of Beauty","type":"thats_why","typeLabel":"That's why 인과","statement":"The Form of Beauty is present within each and every beautiful thing we encounter. That's why a painting can only show us a small part of what makes something truly beautiful.","sourceSentence":null,"answer":"X","explanation":"본문의 인과 방향은 '진정한 아름다움이 추상적·비물질적 형상이기 때문에(원인) → 그림·사진은 그것의 일부만 담을 수 있다(결과)'이다. 제시된 진술은 '형상이 각 사물 안에 있기 때문에 그림이 일부만 보여준다'로 원인을 형상의 내재성으로 뒤바꾸어, 본래의 인과 관계를 왜곡했다."},{"questionNumber":18,"passageId":2,"passageTitle":"Form of Beauty","type":"this_leads","typeLabel":"This leads 인과","statement":"True beauty has no particular color, shape, or size and exists as a purely abstract idea. This leads to any physical representation of beauty — a painting or a photograph — capturing only part of it.","sourceSentence":null,"answer":"O","explanation":"본문은 '진정한 아름다움은 추상적 형상이다(원인) → 그림·사진은 그것의 일부만 담는다(결과)'는 인과 흐름을 제시한다. 제시된 진술의 원인·결과 방향이 본문과 정확히 일치한다."},{"questionNumber":19,"passageId":2,"passageTitle":"Form of Beauty","type":"ko_cause","typeLabel":"한국어 인과","statement":"그림이나 사진이 아름다운 실제의 일부만을 담아내기 때문에, 진정한 아름다움은 특정한 색깔·크기처럼 물리적 속성을 갖게 된다.","sourceSentence":null,"answer":"X","explanation":"본문의 논리는 반대 방향이다. 진정한 아름다움이 추상적이고 물리적 속성이 없기 때문에 그림이 일부만 담는 것이지, 그림이 일부만 담는다는 이유로 진정한 아름다움이 물리적 속성을 갖게 되는 것이 아니다. 원인과 결과가 뒤집혔으며 결론 자체도 본문과 반대이다."},{"questionNumber":20,"passageId":2,"passageTitle":"Form of Beauty","type":"ko_cause","typeLabel":"한국어 인과","statement":"진정한 아름다움은 색깔이나 형태가 없는 추상적 개념이기 때문에, 그것을 담아내려는 그림이나 사진은 언제나 원본의 일부만을 포착할 수밖에 없다.","sourceSentence":null,"answer":"O","explanation":"본문은 '아름다움의 형상이 추상적이고 비물질적이다(원인) → 그림·사진은 그 실체의 일부만 담는다(결과)'는 논리 구조를 가진다. 제시된 진술의 원인·결과 방향이 본문과 일치한다."},{"questionNumber":21,"passageId":3,"passageTitle":"Listening to Children","type":"ko_detail","typeLabel":"부분 내용 (한글)","statement":"본문에 따르면, 슬픈 이유를 물어보면 감정적인 순간의 아이들은 대부분 자신의 감정에 대해 즉각적이고 명확하게 설명할 수 있다.","sourceSentence":"You may ask your child \"Why do you feel sad?\" and she may not have a clue.","answer":"X","explanation":"본문은 아이에게 '왜 슬프니?'라고 물어도 아이가 '아무런 실마리가 없을 수도 있다(may not have a clue)'고 말한다. 즉각적이고 명확한 설명이 '대부분' 가능하다는 진술은 본문의 내용과 반대이다."},{"questionNumber":22,"passageId":3,"passageTitle":"Listening to Children","type":"ko_detail","typeLabel":"부분 내용 (한글)","statement":"아이는 어렵게 답을 떠올리더라도, 그 답이 자신의 감정을 충분히 정당화하지 못할까봐 걱정하여 오히려 말문이 막힐 수 있다.","sourceSentence":"And even when she does come up with an answer, she might be worried that the answer is not good enough to justify the feeling.","answer":"O","explanation":"본문은 아이가 답을 생각해냈더라도 '그 답이 자신의 감정을 정당화하기에 충분하지 않다는 걱정'을 할 수 있다고 말한다. 이것이 연속된 질문이 아이를 침묵하게 만드는 이유 중 하나이다."},{"questionNumber":23,"passageId":3,"passageTitle":"Listening to Children","type":"en_main","typeLabel":"전반 내용 (영어)","statement":"When a child is upset, quietly reflecting what you observe tends to spark conversation more effectively than pressing them with multiple questions.","sourceSentence":null,"answer":"O","explanation":"본문의 핵심 조언은 '감정적 순간에는 질문보다 단순한 관찰 공유가 대화를 여는 데 더 효과적이다'이다. 제시된 문장은 이를 paraphrase 한 것으로, 핵심 의미가 일치한다."},{"questionNumber":24,"passageId":3,"passageTitle":"Listening to Children","type":"en_main","typeLabel":"전반 내용 (영어)","statement":"The passage recommends that parents ask a series of targeted questions to help children pinpoint the exact source of their emotional distress.","sourceSentence":null,"answer":"X","explanation":"본문은 정반대를 권고한다. '연속된 질문은 아이를 침묵하게 만들 수 있다'고 경고하며, 대신 '자신이 관찰한 것을 단순히 반영하는 것이 낫다'고 말한다."},{"questionNumber":25,"passageId":3,"passageTitle":"Listening to Children","type":"en_twist","typeLabel":"원문 교묘한 Paraphrasing","statement":"Offering calm, simple observations about what you notice in your child often proves more helpful than pressing them with questions when they are going through an emotional moment.","sourceSentence":"Sharing simple observations usually works better than asking questions to get a conversation rolling.","answer":"O","explanation":"'sharing simple observations'를 'offering calm, simple observations about what you notice'로, 'works better than asking questions'를 'proves more helpful than pressing them with questions'로 paraphrase 했을 뿐 의미는 원문과 동일하다."},{"questionNumber":26,"passageId":3,"passageTitle":"Listening to Children","type":"en_twist","typeLabel":"원문 교묘한 Paraphrasing","statement":"When a child is struggling emotionally, asking a series of well-chosen questions usually helps unlock their feelings more effectively than simply reflecting what you observe.","sourceSentence":"Under these circumstances, a series of questions can just make a child silent. It's better to simply reflect what you notice.","answer":"X","explanation":"원문은 '연속된 질문은 아이를 침묵하게 만들 뿐'이며 '자신이 관찰한 것을 반영하는 것이 낫다'고 말한다. 제시된 문장은 질문이 효과적이고 관찰 반영보다 낫다고 두 요소를 정반대로 뒤집었다."},{"questionNumber":27,"passageId":3,"passageTitle":"Listening to Children","type":"thats_why","typeLabel":"That's why 인과","statement":"A child grows more willing to open up and share her feelings freely. That's why asking \"Why do you feel sad?\" tends to leave her without any clear answer.","sourceSentence":null,"answer":"X","explanation":"본문의 인과는 '아이가 자신의 감정을 즉각 설명하기 어렵다(원인) → 질문이 오히려 아이를 침묵하게 만든다(결과)'이다. 제시된 진술은 아이가 '더 개방적으로 공유하려 하는 것(결과 방향의 상태)'을 원인으로 놓고, '답을 못한다'를 그 결과로 연결하여 원인과 결과의 방향을 역전시켰다."},{"questionNumber":28,"passageId":3,"passageTitle":"Listening to Children","type":"this_leads","typeLabel":"This leads 인과","statement":"A child faces a string of questions about why she feels sad and worries that her answer may not be good enough to justify her emotion. This leads to the child falling silent rather than opening up.","sourceSentence":null,"answer":"O","explanation":"본문은 '연속된 질문 + 답의 충분성에 대한 걱정(원인) → 아이의 침묵(결과)'이라는 인과를 제시한다. 제시된 진술의 원인·결과 배열이 본문과 정확히 일치한다."},{"questionNumber":29,"passageId":3,"passageTitle":"Listening to Children","type":"ko_cause","typeLabel":"한국어 인과","statement":"연속된 질문을 받으면 아이가 침묵하기 때문에, 부모는 질문을 던지는 것이 단순한 관찰을 공유하는 것보다 훨씬 효과적인 대화 방식이라는 결론을 내린다.","sourceSentence":null,"answer":"X","explanation":"본문은 '연속된 질문 → 아이 침묵'이라는 부정적 인과를 제시하고 따라서 질문 대신 관찰 공유를 권장한다. 제시된 진술은 이 결과로부터 '질문이 더 효과적'이라는 정반대의 결론을 도출해냄으로써 인과 관계의 방향과 결론 모두를 왜곡했다."},{"questionNumber":30,"passageId":3,"passageTitle":"Listening to Children","type":"ko_cause","typeLabel":"한국어 인과","statement":"아이는 자신의 감정을 즉각 설명하지 못하거나, 떠오른 답이 감정을 정당화하기에 부족할지 모른다는 걱정을 하기 때문에, 연속된 질문이 오히려 말문을 닫게 만들 수 있다.","sourceSentence":null,"answer":"O","explanation":"본문은 '설명 능력 부족 + 답의 충분성에 대한 걱정(원인) → 연속된 질문이 아이를 침묵하게 만듦(결과)'이라는 인과를 명확히 제시한다. 제시된 진술의 원인·결과 방향이 본문과 정확히 일치한다."},{"questionNumber":31,"passageId":4,"passageTitle":"Skin and Emotion","type":"ko_detail","typeLabel":"부분 내용 (한글)","statement":"본문에 따르면 땀샘 활동의 변화는 의식적인 정신의 통제 아래 일어나며, 우리가 의지를 갖고 조절할 수 있다.","sourceSentence":"This change in sweat gland activity happens completely without your conscious mind having much say in the matter.","answer":"X","explanation":"본문은 정반대를 말한다. 땀샘 활동의 변화는 '의식적인 정신이 거의 관여하지 않는 상태에서(without your conscious mind having much say) 완전히 일어난다'고 명시한다."},{"questionNumber":32,"passageId":4,"passageTitle":"Skin and Emotion","type":"ko_detail","typeLabel":"부분 내용 (한글)","statement":"감정 자극을 받을 때 몸이 분비하는 미세한 땀이 피부의 전기 전도도를 높이며, 이 원리를 이용하면 주관적 감정 상태를 객관적인 수치로 표현할 수 있다.","sourceSentence":"And when those tiny drops of sweat appear, our skin gets more electrically conductive.","answer":"O","explanation":"본문은 '미세한 땀 → 피부 전도도 증가'라는 인과와, 이를 과학적으로 활용하면 '주관적 감정 상태에 객관적 수치를 부여할 수 있다'고 명시한다. 진술은 이 두 내용을 정확히 반영하고 있다."},{"questionNumber":33,"passageId":4,"passageTitle":"Skin and Emotion","type":"en_main","typeLabel":"전반 내용 (영어)","statement":"A person's emotional state can be objectively measured through the body's unconscious sweating response, which changes how efficiently the skin carries electrical current.","sourceSentence":null,"answer":"O","explanation":"본문의 핵심 주장은 '무의식적인 땀 분비가 피부 전도도를 변화시키고, 이를 통해 감정 강도라는 주관적 경험을 객관적 수치로 바꿀 수 있다'는 것이다. 제시된 문장은 이를 정확하게 paraphrase 했다."},{"questionNumber":34,"passageId":4,"passageTitle":"Skin and Emotion","type":"en_main","typeLabel":"전반 내용 (영어)","statement":"Tracking sweat gland activity is a purely subjective approach and therefore cannot generate reliable scientific data about a person's emotional state.","sourceSentence":null,"answer":"X","explanation":"본문은 땀 분비 추적이 과학적으로 특히 유용한 이유를 '주관적 마음 상태에 객관적 수치를 부여할 수 있기 때문'이라고 명시한다. 이 방법이 '순전히 주관적'이며 '신뢰할 수 없다'는 진술은 본문과 정반대이다."},{"questionNumber":35,"passageId":4,"passageTitle":"Skin and Emotion","type":"en_twist","typeLabel":"원문 교묘한 Paraphrasing","statement":"When a person experiences emotional arousal — whether stress, sadness, or another powerful feeling — the body releases tiny amounts of perspiration that may go completely unnoticed.","sourceSentence":"We know that when we're emotionally stimulated - stressed, sad, any intense emotion, really - our bodies sweat a tiny bit, so little we might not even notice.","answer":"O","explanation":"'emotionally stimulated'를 'emotional arousal'로, 'sweat a tiny bit'를 'releases tiny amounts of perspiration'으로, 'we might not even notice'를 'may go completely unnoticed'로 paraphrase 했을 뿐 의미는 원문과 동일하다."},{"questionNumber":36,"passageId":4,"passageTitle":"Skin and Emotion","type":"en_twist","typeLabel":"원문 교묘한 Paraphrasing","statement":"When the tiny drops of sweat produced by emotional stimulation appear on the skin's surface, our skin becomes less electrically conductive.","sourceSentence":"And when those tiny drops of sweat appear, our skin gets more electrically conductive.","answer":"X","explanation":"원문은 미세한 땀방울이 나타나면 피부가 '더(more) 전기 전도성이 높아진다'고 말한다. 제시된 문장은 'more'를 'less'로 바꾸어 전도성의 방향을 정반대로 왜곡했다."},{"questionNumber":37,"passageId":4,"passageTitle":"Skin and Emotion","type":"thats_why","typeLabel":"That's why 인과","statement":"Our skin's ability to conduct electricity increases significantly. That's why the body produces tiny, barely noticeable amounts of sweat in response to an intense emotion.","sourceSentence":null,"answer":"X","explanation":"본문의 인과는 '감정 자극 → 미세한 땀 분비(원인) → 피부 전도도 증가(결과)'이다. 제시된 진술은 이 순서를 역전시켜 '피부 전도도 증가(결과)가 땀 분비(원인)의 이유'인 것처럼 표현했다."},{"questionNumber":38,"passageId":4,"passageTitle":"Skin and Emotion","type":"this_leads","typeLabel":"This leads 인과","statement":"When emotionally stimulated, the body releases tiny amounts of sweat that we may not even be aware of. This leads to our skin becoming more capable of conducting electricity.","sourceSentence":null,"answer":"O","explanation":"본문은 '감정 자극 → 미세한 땀 분비(원인) → 피부 전기 전도도 증가(결과)'라는 인과 흐름을 명확히 제시한다. 제시된 진술의 원인·결과 방향이 본문과 정확히 일치한다."},{"questionNumber":39,"passageId":4,"passageTitle":"Skin and Emotion","type":"ko_cause","typeLabel":"한국어 인과","statement":"피부의 전기 전도도가 측정 가능한 수치로 나타나기 때문에, 감정적 자극을 받은 몸이 의식 없이 미세한 땀을 분비하게 된다.","sourceSentence":null,"answer":"X","explanation":"본문의 인과 순서는 '감정 자극 → 무의식적 땀 분비(원인) → 전도도 증가 → 객관적 수치(결과)'이다. 제시된 진술은 결과(전도도 수치)를 원인 자리에, 원인(무의식적 땀 분비)을 결과 자리에 놓아 인과 방향을 역전시켰다."},{"questionNumber":40,"passageId":4,"passageTitle":"Skin and Emotion","type":"ko_cause","typeLabel":"한국어 인과","statement":"몸이 의식의 통제 없이 분비하는 미세한 땀이 피부의 전기 전도도를 높이기 때문에, 전류를 이용해 감정 강도를 객관적인 수치로 측정할 수 있다.","sourceSentence":null,"answer":"O","explanation":"본문은 '무의식적 땀 분비 → 전도도 증가(원인 사슬) → 전류를 통한 객관적 수치 측정(결과)'이라는 인과 구조를 제시한다. 제시된 진술의 원인·결과 방향이 본문과 정확히 일치한다."}]};
var QS=CONFIG.questions||[];
var TOTAL=QS.length;
var SET_SIZE=10;
var SETS=(function(){var s=[];for(var i=0;i<TOTAL;i+=SET_SIZE)s.push(QS.slice(i,i+SET_SIZE));return s;})();
var answers={};var currentSet=0;
function esc(s){if(s==null)return"";var d=document.createElement("div");d.textContent=String(s);return d.innerHTML}
function setH(t,sub){var h=document.getElementById("hTitle");var p=document.getElementById("hSub");if(h)h.textContent=t;if(p)p.textContent=sub}
function gi(si,pi){return si*SET_SIZE+pi}
function showIndex(){
  setH(CONFIG.title,"OX 문제 테스트");
  var chips=SETS.map(function(sq,si){
    var base=si*SET_SIZE;var done=0,correct=0;
    for(var i=0;i<sq.length;i++){var a=answers[base+i];if(a){done++;if(a.isCorrect)correct++;}}
    var allDone=(done===sq.length);
    var pct=done>0?Math.round(correct/sq.length*100):null;
    var passed=pct!==null&&pct>=CONFIG.passThreshold;
    var scoreHTML=pct===null
      ?"<span style='font-size:.78rem;color:#9ca3af'>미응시</span>"
      :(allDone?"<span style='font-weight:700;color:"+(passed?"#10b981":"#ef4444")+"'>"+(passed?"✅ ":"❌ ")+pct+"%</span>"
             :"<span style='font-weight:700;color:#8b5cf6'>📝 "+done+"/"+sq.length+"</span>");
    return "<div class='set-card"+(allDone?" done":"")+"' onclick='enterSet("+si+")'>"
           +"<div><div style='font-weight:700'>세트 "+(si+1)+" <span style='font-size:.8rem;color:#6b7280;font-weight:400'>("+sq.length+"문제)</span></div></div>"
           +"<div>"+scoreHTML+"</div></div>";
  }).join("");
  var app=document.getElementById("app");if(!app)return;
  app.innerHTML="<div class='fade' style='text-align:center;padding:16px 0'>"
    +"<div style='font-size:2.5rem;margin-bottom:8px'>📱</div>"
    +"<h2 style='font-size:1.2rem;font-weight:700;color:#1f2937;margin-bottom:4px'>OX 문제 테스트</h2>"
    +"<p style='color:#6b7280;font-size:.85rem;margin-bottom:16px'>전체 "+TOTAL+"문제 · "+CONFIG.passThreshold+"% 이상 통과 · 몰라요는 오답 처리</p>"
    +"</div><div class='set-list'>"+chips+"</div>";
}
function enterSet(si){currentSet=si;showQ(0)}
function showQ(pos){
  try{window.scrollTo(0,0)}catch(e){}
  var si=currentSet;var qs=SETS[si];
  if(!qs||pos<0||pos>=qs.length){showIndex();return;}
  var gidx=gi(si,pos);var q=qs[pos];var answered=answers[gidx];
  setH("세트 "+(si+1),"문제 "+(pos+1)+"/"+qs.length);
  var pct=Math.round((pos+1)/qs.length*100);
  function btnClass(which){
    if(!answered)return "ox-btn "+which;
    if(answered.picked===which){
      if(which==="dunno")return "ox-btn dunno sel dunno wrong";
      return "ox-btn "+which+" "+(answered.isCorrect?"correct":"wrong");
    }
    return "ox-btn "+which;
  }
  var sourceHTML="";
  if(q.sourceSentence){sourceHTML="<div class='source-box'><span class='source-label'>원문</span>"+esc(q.sourceSentence)+"</div>";}
  var fbHTML="";
  if(answered){
    var cls=answered.picked==="dunno"?"dunno":(answered.isCorrect?"ok":"ng");
    var msg=answered.picked==="dunno"?"🤔 몰라요 — 해설을 학습하세요":(answered.isCorrect?"✅ 정답!":"❌ 오답");
    fbHTML="<div class='fb "+cls+"'>"+msg+"</div>"
      +"<div class='explain-box'><div class='ex-title'>📖 정답 & 해설</div>"
      +"<div class='ex-body'><span class='ex-answer "+q.answer+"'>"+q.answer+"</span>"+esc(q.explanation)+"</div></div>";
  }
  var app=document.getElementById("app");if(!app)return;
  app.innerHTML="<div class='fade'>"
    +"<div class='q-counter'>"+(pos+1)+" / "+qs.length+"</div>"
    +"<div class='prog-bar'><div class='prog-fill' style='width:"+pct+"%'></div></div>"
    +"<div class='title-box'><div class='ptitle'>"+esc(q.passageTitle)+"</div>"
    +"<span class='tlabel'>"+esc(q.typeLabel||"")+"</span></div>"
    +"<div class='statement'>"+esc(q.statement)+"</div>"
    +sourceHTML
    +"<div class='ox-grid'>"
    +"<button class='"+btnClass("o")+"' onclick='pick("+pos+",&quot;o&quot;)' "+(answered?"disabled":"")+"><span class='ox-icon'>⭕</span>O (맞음)</button>"
    +"<button class='"+btnClass("x")+"' onclick='pick("+pos+",&quot;x&quot;)' "+(answered?"disabled":"")+"><span class='ox-icon'>❌</span>X (틀림)</button>"
    +"<button class='"+btnClass("dunno")+"' onclick='pick("+pos+",&quot;dunno&quot;)' "+(answered?"disabled":"")+">🤔 몰라요 (정답·해설 보기)</button>"
    +"</div>"
    +fbHTML
    +"<div class='nav-bar'>"
    +"<button class='nav-btn prev' onclick='showQ("+(pos-1)+")' "+(pos<=0?"disabled":"")+">← 이전</button>"
    +"<button class='nav-btn home' onclick='showIndex()'>목록</button>"
    +"<button class='nav-btn next' onclick='"+(pos<qs.length-1?"showQ("+(pos+1)+")":"showSetResult()")+"'>"+(pos<qs.length-1?"다음 →":"결과")+"</button>"
    +"</div></div>";
}
function pick(pos,which){
  var gidx=gi(currentSet,pos);
  if(answers[gidx])return;
  var q=SETS[currentSet][pos];
  var isCorrect=false;
  if(which==="dunno"){isCorrect=false;}
  else{isCorrect=(which==="o"&&q.answer==="O")||(which==="x"&&q.answer==="X");}
  answers[gidx]={picked:which,isCorrect:isCorrect};
  showQ(pos);
}
function showSetResult(){
  var si=currentSet;var qs=SETS[si];var base=si*SET_SIZE;
  var total=qs.length;var correct=0,dunno=0;
  for(var i=0;i<total;i++){var a=answers[base+i];if(a&&a.isCorrect)correct++;if(a&&a.picked==="dunno")dunno++;}
  var pct=Math.round(correct/total*100);var passed=pct>=CONFIG.passThreshold;
  setH("세트 "+(si+1)+" 결과",passed?"통과":"미달");
  var app=document.getElementById("app");if(!app)return;
  app.innerHTML="<div class='fade' style='text-align:center;padding:16px 0'>"
    +"<div class='score-circle "+(passed?"pass":"fail")+"'>"+pct+"%</div>"
    +"<p style='font-size:1.1rem;font-weight:700;color:"+(passed?"#10b981":"#ef4444")+"'>"+(passed?"통과!":"미달")+"</p>"
    +"<p style='color:#6b7280;font-size:.88rem;margin-top:8px'>"+correct+"/"+total+"문제 정답 · 몰라요 "+dunno+"개 · 기준 "+CONFIG.passThreshold+"%</p>"
    +"</div>"
    +"<div style='margin-top:16px'><button class='nav-btn next' style='width:100%;padding:14px' onclick='showIndex()'>목록으로</button></div>";
}
try{history.pushState(null,"",location.href);
window.addEventListener("popstate",function(){history.pushState(null,"",location.href);showIndex();});}catch(e){}
showIndex();
</script>
</body>
</html>
