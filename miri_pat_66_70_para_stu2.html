<head>

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans KR',sans-serif;background:linear-gradient(135deg,#1e3a5f 0%,#2d5a87 50%,#1a4a6e 100%);min-height:100vh;padding:16px;display:flex;align-items:center;justify-content:center}
.container{max-width:720px;width:100%;background:#fff;border-radius:24px;box-shadow:0 20px 60px rgba(0,0,0,.3);overflow:hidden}
.header{background:linear-gradient(135deg,#1e3a5f 0%,#2d5a87 100%);padding:28px 24px;color:#fff;text-align:center}
.header h1{font-size:1.4rem;font-weight:700;margin-bottom:4px}
.header p{opacity:.85;font-size:.85rem}
.content{padding:24px}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes pop{0%{transform:scale(.8);opacity:0}50%{transform:scale(1.05)}100%{transform:scale(1);opacity:1}}
@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-8px)}40%,80%{transform:translateX(8px)}}
@keyframes confetti{0%{transform:translateY(0) rotate(0deg);opacity:1}100%{transform:translateY(400px) rotate(720deg);opacity:0}}
.q-grid{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;padding:12px 0}
.q-chip{width:48px;height:48px;border-radius:12px;border:2px solid #e5e7eb;background:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:1rem;color:#374151;cursor:pointer;transition:all .2s}
.q-chip:hover{border-color:#3b82f6;background:#eff6ff;transform:translateY(-2px)}
.q-chip.correct{border-color:#10b981;background:#ecfdf5;color:#065f46}
.q-chip.wrong{border-color:#ef4444;background:#fef2f2;color:#991b1b}
.q-chip.current{border-color:#3b82f6;background:#3b82f6;color:#fff}
.q-chip.unanswered{border-color:#e5e7eb}
.progress-bar{height:6px;background:#e5e7eb;border-radius:3px;margin-bottom:16px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,#1e3a5f,#3b82f6);border-radius:3px;transition:width .4s ease}
.q-counter{text-align:center;font-size:.85rem;color:#6b7280;margin-bottom:8px;font-weight:500}
.source-badge{display:inline-block;background:#fef3c7;color:#b45309;padding:4px 12px;border-radius:20px;font-size:.8rem;font-weight:600;margin-bottom:12px}
.key-box{text-align:center;margin:16px 0;padding:22px;background:linear-gradient(135deg,#f0f7ff,#e8f0fe);border-radius:16px;border:2px solid #bfdbfe}
.key-box .expr{font-size:1.5rem;font-weight:800;color:#1e3a5f;margin-bottom:6px;line-height:1.4}
.key-box .qtext{font-size:1rem;color:#374151;font-weight:500}
.key-box .qtext .hl{color:#ef4444;font-weight:800}
.passage-box{margin:12px 0;padding:14px 18px;background:#f9fafb;border-left:4px solid #3b82f6;border-radius:0 12px 12px 0;font-size:.9rem;color:#4b5563;line-height:1.7;font-style:italic}
.show-passage-btn{margin:4px auto 12px;display:block;padding:6px 14px;background:#eff6ff;color:#3b82f6;border:1px solid #bfdbfe;border-radius:8px;font-size:.8rem;cursor:pointer;font-family:inherit;font-weight:500;transition:all .2s}
.show-passage-btn:hover{background:#dbeafe}
.options{display:grid;gap:10px;margin-top:16px}
.option-btn{padding:16px 20px;background:#fff;border:2px solid #e5e7eb;border-radius:14px;font-size:1.15rem;font-weight:500;cursor:pointer;transition:all .2s;text-align:left;font-family:inherit;color:#1f2937;display:flex;align-items:center;gap:12px}
.option-btn .num{width:34px;height:34px;border-radius:50%;background:#f3f4f6;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:1rem;color:#6b7280;flex-shrink:0;transition:all .2s}
.option-btn:hover{border-color:#3b82f6;background:#f0f7ff;transform:translateY(-1px)}
.option-btn:hover .num{background:#3b82f6;color:#fff}
.option-btn.correct{border-color:#10b981;background:#ecfdf5;color:#065f46;animation:pop .3s ease}
.option-btn.correct .num{background:#10b981;color:#fff}
.option-btn.wrong{border-color:#ef4444;background:#fef2f2;color:#991b1b;animation:shake .4s ease}
.option-btn.wrong .num{background:#ef4444;color:#fff}
.option-btn.reveal{border-color:#10b981;background:#ecfdf5;color:#065f46}
.option-btn.reveal .num{background:#10b981;color:#fff}
.option-btn:disabled{cursor:default;opacity:.85}
.feedback{text-align:center;padding:14px;border-radius:14px;margin-top:14px;animation:pop .3s ease;font-weight:600;font-size:1rem}
.feedback.correct-fb{background:#ecfdf5;color:#065f46;border:1px solid #a7f3d0}
.feedback.wrong-fb{background:#fef2f2;color:#991b1b;border:1px solid #fecaca}
.explain-box{margin-top:12px;padding:14px 16px;background:#f9fafb;border-radius:12px;border:1px solid #e5e7eb}
.explain-box .ex-title{font-size:1rem;font-weight:700;color:#374151;margin-bottom:8px}
.explain-box .ex-item{padding:8px 0;border-bottom:1px solid #f3f4f6;font-size:1rem;line-height:1.7}
.explain-box .ex-item:last-child{border-bottom:none}
.explain-box .ex-item strong{font-size:1.05rem}
.explain-box .ex-item .tag-w{color:#ef4444;font-weight:700;font-size:.85rem}
.explain-box .ex-item .tag-o{color:#10b981;font-size:.85rem}
.explain-box .ex-item .trans{color:#6b7280;font-size:.95rem}
.nav-bar{display:flex;justify-content:space-between;align-items:center;margin-top:20px;padding-top:16px;border-top:1px solid #e5e7eb}
.nav-btn{padding:10px 22px;border:none;border-radius:10px;font-size:.95rem;font-weight:600;cursor:pointer;transition:all .2s;font-family:inherit}
.nav-btn:hover{transform:translateY(-1px)}
.nav-btn:disabled{opacity:.3;cursor:default;transform:none}
.nav-btn.prev{background:#f3f4f6;color:#374151}
.nav-btn.next{background:linear-gradient(135deg,#1e3a5f,#3b82f6);color:#fff}
.nav-btn.home{background:#f3f4f6;color:#374151}
.nav-counter{font-size:.85rem;color:#6b7280;font-weight:500}
.score-circle{width:120px;height:120px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:20px auto;font-size:2rem;font-weight:800;border:6px solid}
.score-circle.pass{border-color:#10b981;color:#10b981;background:#ecfdf5}
.score-circle.fail{border-color:#ef4444;color:#ef4444;background:#fef2f2}
.summary-card{background:#f9fafb;border-radius:16px;padding:24px;margin:16px 0;border:1px solid #e5e7eb}
.summary-card h3{font-size:1.1rem;font-weight:700;margin-bottom:12px;color:#1f2937}
.stat-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #e5e7eb;font-size:.9rem}
.stat-row:last-child{border-bottom:none}
.stat-label{color:#6b7280}.stat-value{font-weight:600;color:#1f2937}
.stat-value.pass{color:#10b981}.stat-value.fail{color:#ef4444}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:14px 28px;border:none;border-radius:12px;font-size:1rem;font-weight:600;cursor:pointer;transition:all .2s;font-family:inherit}
.btn:hover{transform:translateY(-2px)}
.btn-primary{background:linear-gradient(135deg,#1e3a5f,#3b82f6);color:#fff;box-shadow:0 4px 12px rgba(30,58,95,.35)}
.btn-block{width:100%}
.confetti-container{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:1000;overflow:hidden}
.confetti-piece{position:absolute;width:10px;height:10px;top:-10px;animation:confetti 3s ease-in forwards}
@media(max-width:480px){.q-chip{width:40px;height:40px;font-size:.85rem}.option-btn{padding:14px 16px;font-size:1rem}}
</style>

const CONFIG = {"title":"miri_pat_66_70_para_stu","passThreshold":80,"questions":[{"questionNumber":1,"sourceQuestion":"1-1번","keyExpression":"traditional livelihoods have been pushed aside by progress","questionText":"다음 중 'traditional livelihoods have been pushed aside by progress'를 잘못 paraphrasing한 것은?","options":[{"text":"modern innovations have preserved established careers","isCorrect":true,"explanation":"잘못된 paraphrasing — pushed aside(밀어냈다)와 preserved(보존했다)는 정반대 의미. progress와 modern innovations는 유사하나 핵심 동사의 의미가 반대","translation":"현대 혁신이 확립된 직업들을 보존했다"},{"text":"conventional jobs have been replaced by technological advancement","isCorrect":false,"explanation":"올바른 paraphrasing — traditional=conventional, pushed aside=replaced, progress=technological advancement로 자연스럽게 대응","translation":"전통적 직업들이 기술 발전에 의해 대체되었다"},{"text":"progress has eliminated old ways of making a living","isCorrect":false,"explanation":"올바른 paraphrasing — livelihoods=ways of making a living, pushed aside=eliminated로 의미 일치","translation":"진보가 오래된 생계 방식들을 제거했다"},{"text":"advancement has displaced customary forms of work","isCorrect":false,"explanation":"올바른 paraphrasing — progress=advancement, pushed aside=displaced, traditional livelihoods=customary forms of work로 정확히 대응","translation":"발전이 관습적 노동 형태들을 대체했다"},{"text":"technological development has marginalized time-honored occupations","isCorrect":false,"explanation":"올바른 paraphrasing — progress=technological development, pushed aside=marginalized, traditional=time-honored로 고급 어휘 활용","translation":"기술 발전이 전통적 직업들을 주변부로 밀어냈다"}],"passage":"Thousands of traditional livelihoods have been pushed aside by progress, and the lifestyles around those jobs removed."},{"questionNumber":2,"sourceQuestion":"1-1번","keyExpression":"mass education and media train humans to avoid low-tech physical work","questionText":"다음 중 'mass education and media train humans to avoid low-tech physical work'를 잘못 paraphrasing한 것은?","options":[{"text":"public education and information channels teach people to seek technologically simple jobs","isCorrect":true,"explanation":"잘못된 paraphrasing — avoid(피하다)와 seek(찾다)는 정반대 의미. 원문은 low-tech 일을 피하라고 가르치는데, 이 보기는 찾으라고 가르친다는 의미","translation":"공교육과 정보 채널이 사람들에게 기술적으로 단순한 일을 찾도록 가르친다"},{"text":"popular education and media outlets instruct people to steer clear of hands-on work","isCorrect":false,"explanation":"올바른 paraphrasing — mass=popular, train=instruct, avoid=steer clear of, low-tech physical work=hands-on work로 관용구를 활용한 정확한 대응","translation":"대중 교육과 미디어 매체가 사람들에게 직접 손을 쓰는 일을 피하도록 지시한다"},{"text":"widespread schooling and communication systems condition people to shun manual labor","isCorrect":false,"explanation":"올바른 paraphrasing — mass education=widespread schooling, media=communication systems, train=condition, avoid=shun, low-tech physical work=manual labor로 자연스럽게 대응","translation":"광범위한 교육과 소통 체계가 사람들이 육체노동을 기피하도록 조건화한다"},{"text":"educational systems and media influence people to reject work requiring physical effort","isCorrect":false,"explanation":"올바른 paraphrasing — mass education=educational systems, train=influence, avoid=reject, low-tech physical work=work requiring physical effort로 의미 일치","translation":"교육 시스템과 미디어가 사람들이 육체적 노력을 요구하는 일을 거부하도록 영향을 준다"},{"text":"mainstream education and media platforms guide people away from non-digital occupations","isCorrect":false,"explanation":"올바른 paraphrasing — mass=mainstream, train=guide, avoid=away from, low-tech=non-digital로 문맥상 디지털과 대비되는 의미로 정확히 표현","translation":"주류 교육과 미디어 플랫폼이 사람들을 비디지털 직업으로부터 멀어지도록 안내한다"}],"passage":"At the same time, mass education and media train humans to avoid low-tech physical work, to seek jobs working in the digital world."},{"questionNumber":3,"sourceQuestion":"1-1번","keyExpression":"sedentary nature of the best-paying jobs","questionText":"다음 중 'sedentary nature of the best-paying jobs'를 잘못 paraphrasing한 것은?","options":[{"text":"the sitting-based aspect of top-earning careers","isCorrect":false,"explanation":"올바른 paraphrasing — sedentary=sitting-based, nature=aspect, best-paying=top-earning로 핵심 의미 유지","translation":"최고 소득 직업들의 앉아서 하는 측면"},{"text":"the mobile lifestyle required by well-compensated professions","isCorrect":true,"explanation":"잘못된 paraphrasing — sedentary(앉아서 하는, 정주하는)와 mobile(이동성 있는)은 정반대 개념. best-paying=well-compensated는 맞지만 핵심 형용사가 반대 의미","translation":"고액 보수 전문직들이 요구하는 이동성 있는 생활방식"},{"text":"the desk-bound quality of the most lucrative occupations","isCorrect":false,"explanation":"올바른 paraphrasing — sedentary=desk-bound, nature=quality, best-paying=most lucrative로 구체적 이미지 활용","translation":"가장 수익성 좋은 직업들의 책상에 묶인 특성"},{"text":"the stationary characteristic of highly-paid work","isCorrect":false,"explanation":"올바른 paraphrasing — sedentary=stationary, nature=characteristic, best-paying=highly-paid로 간결하게 표현","translation":"고액 연봉 일의 정지된 특성"},{"text":"the physically inactive character of highest-salary positions","isCorrect":false,"explanation":"올바른 paraphrasing — sedentary=physically inactive, nature=character, best-paying=highest-salary, jobs=positions로 정확히 대응","translation":"최고 급여 직위들의 신체적으로 비활동적인 특성"}],"passage":"Indeed, the sedentary nature of the best-paying jobs is a health risk — for body and mind."},{"questionNumber":4,"sourceQuestion":"2-1번","keyExpression":"senses cannot be clearly divided into a limited number of specific kinds","questionText":"다음 중 'senses cannot be clearly divided into a limited number of specific kinds'를 잘못 paraphrasing한 것은?","options":[{"text":"senses defy organization into a restricted set of distinct categories","isCorrect":false,"explanation":"올바른 paraphrasing — cannot be divided=defy organization, limited number=restricted set, specific kinds=distinct categories로 고급 어휘 활용","translation":"감각들은 제한된 세트의 명확한 범주들로의 조직화를 거부한다"},{"text":"sensory systems resist neat categorization into fixed types","isCorrect":false,"explanation":"올바른 paraphrasing — cannot be clearly divided=resist neat categorization, limited number=fixed, specific kinds=types로 의미 일치","translation":"감각 체계들은 고정된 유형으로의 깔끔한 분류를 거부한다"},{"text":"sensory modalities can be systematically classified into well-defined groups","isCorrect":true,"explanation":"잘못된 paraphrasing — cannot be clearly divided(명확히 나눌 수 없다)와 can be systematically classified(체계적으로 분류될 수 있다)는 정반대. 부정문을 긍정문으로 바꿔 의미 왜곡","translation":"감각 양식들은 잘 정의된 그룹들로 체계적으로 분류될 수 있다"},{"text":"senses cannot be compartmentalized into a small number of defined classes","isCorrect":false,"explanation":"올바른 paraphrasing — divided=compartmentalized, limited=small number, specific kinds=defined classes로 직접적 대응","translation":"감각들은 소수의 정의된 부류들로 구획화될 수 없다"},{"text":"it is impossible to neatly sort senses into a finite number of precise varieties","isCorrect":false,"explanation":"올바른 paraphrasing — cannot be clearly divided=impossible to neatly sort, limited=finite, specific kinds=precise varieties로 문장 구조 변환","translation":"감각들을 유한한 수의 정확한 종류들로 깔끔하게 분류하는 것은 불가능하다"}],"passage":"These examples tell us that 'senses cannot be clearly divided into a limited number of specific kinds,' Macpherson wrote in The Senses."},{"questionNumber":5,"sourceQuestion":"2-1번","keyExpression":"Aristotle missed a few in humans","questionText":"다음 중 'Aristotle missed a few in humans'를 잘못 paraphrasing한 것은?","options":[{"text":"Aristotle neglected to account for a handful of human senses","isCorrect":false,"explanation":"올바른 paraphrasing — missed=neglected to account for, a few=a handful of로 관용적 표현 활용","translation":"아리스토텔레스는 소수의 인간 감각들을 설명하는 것을 소홀히 했다"},{"text":"Aristotle left out certain human sensory capabilities","isCorrect":false,"explanation":"올바른 paraphrasing — missed=left out, a few=certain, 명사를 sensory capabilities로 확장하여 구체화","translation":"아리스토텔레스는 특정 인간 감각 능력들을 빠뜨렸다"},{"text":"Aristotle comprehensively documented all human senses","isCorrect":true,"explanation":"잘못된 paraphrasing — missed(놓쳤다)와 comprehensively documented(포괄적으로 기록했다)는 정반대 의미. 'a few'(일부)를 'all'(전부)로 바꿔 의미 완전 역전","translation":"아리스토텔레스는 모든 인간 감각들을 포괄적으로 기록했다"},{"text":"Aristotle failed to identify some senses in people","isCorrect":false,"explanation":"올바른 paraphrasing — missed=failed to identify, a few=some, humans=people로 의미 보존","translation":"아리스토텔레스는 사람들의 일부 감각들을 식별하지 못했다"},{"text":"Aristotle overlooked several human senses","isCorrect":false,"explanation":"올바른 paraphrasing — missed=overlooked, a few=several로 간결한 동의어 치환","translation":"아리스토텔레스는 여러 인간 감각들을 간과했다"}],"passage":"However, according to the philosopher Fiona Macpherson, there are reasons to doubt it. For a start, Aristotle missed a few in humans: the perception of your own body which is different from touch and the sense of balance which has links to both touch and vision."},{"questionNumber":6,"sourceQuestion":"2-1번","keyExpression":"study them for what they are","questionText":"다음 중 'study them for what they are'를 잘못 paraphrasing한 것은?","options":[{"text":"examine senses according to their actual characteristics","isCorrect":false,"explanation":"올바른 paraphrasing — study=examine, for what they are=according to their actual characteristics로 구체화","translation":"감각들을 그것들의 실제 특성에 따라 조사하다"},{"text":"investigate senses as they truly exist","isCorrect":false,"explanation":"올바른 paraphrasing — study=investigate, for what they are=as they truly exist로 본질적 의미 유지","translation":"감각들을 실제로 존재하는 그대로 탐구하다"},{"text":"observe senses without imposing artificial categories","isCorrect":false,"explanation":"올바른 paraphrasing — study=observe, for what they are를 without imposing artificial categories로 대조 구조로 표현하여 맥락 반영","translation":"인위적 범주를 부과하지 않고 감각들을 관찰하다"},{"text":"analyze senses based on their inherent nature","isCorrect":false,"explanation":"올바른 paraphrasing — study=analyze, for what they are=based on their inherent nature로 철학적 표현 사용","translation":"감각들을 고유한 본성에 기초하여 분석하다"},{"text":"force senses into predetermined theoretical frameworks","isCorrect":true,"explanation":"잘못된 paraphrasing — for what they are(있는 그대로)와 force into predetermined frameworks(미리 정해진 틀에 강제로 맞추다)는 정반대. 원문은 자연스러운 관찰을 의미하나 이 보기는 강제적 분류를 의미","translation":"감각들을 미리 정해진 이론적 틀에 강제로 맞추다"}],"passage":"Instead of trying to push animal senses into Aristotelian buckets, we should study them for what they are."},{"questionNumber":7,"sourceQuestion":"1-1번","keyExpression":"work at jobs they hate, producing things they have no love for","questionText":"다음 중 'work at jobs they hate, producing things they have no love for'를 잘못 paraphrasing한 것은?","options":[{"text":"hold positions they resent while fabricating items they're indifferent to","isCorrect":false,"explanation":"올바른 paraphrasing — work at=hold, jobs=positions, hate=resent, producing=fabricating, have no love for=indifferent to로 다양한 동의어 활용","translation":"그들이 분개하는 직위를 유지하면서 그들이 무관심한 물품들을 제작한다"},{"text":"labor in occupations they despise, creating products they don't care about","isCorrect":false,"explanation":"올바른 paraphrasing — work at=labor in, jobs=occupations, hate=despise, producing=creating, have no love for=don't care about으로 자연스럽게 대응","translation":"그들이 경멸하는 직업에서 일하며, 그들이 관심 없는 제품들을 만든다"},{"text":"toil at careers they loathe, manufacturing goods that hold no meaning for them","isCorrect":false,"explanation":"올바른 paraphrasing — work at=toil at, jobs=careers, hate=loathe, have no love for=hold no meaning for로 강한 부정 표현 사용","translation":"그들이 혐오하는 직업에서 고된 노동을 하며, 그들에게 의미가 없는 상품들을 제조한다"},{"text":"perform tasks they find fulfilling, generating goods they deeply appreciate","isCorrect":true,"explanation":"잘못된 paraphrasing — hate(싫어하다)와 find fulfilling(보람차다고 여기다), have no love for(애정이 없다)와 deeply appreciate(깊이 감사하다)는 정반대 감정. 의미 완전 역전","translation":"그들이 보람차다고 여기는 일을 수행하며, 그들이 깊이 감사하는 상품들을 생산한다"},{"text":"engage in employment they detest while making items they feel no passion for","isCorrect":false,"explanation":"올바른 paraphrasing — work at=engage in, jobs=employment, hate=detest, producing=making, have no love for=feel no passion for로 감정 표현 강화","translation":"그들이 혐오하는 고용에 종사하면서 열정을 느끼지 못하는 물건들을 만든다"}],"passage":"Hundreds of millions of humans today work at jobs they hate, producing things they have no love for."},{"questionNumber":1,"sourceQuestion":"2-2번","keyExpression":"Those who are in a higher vibration","questionText":"다음 중 'Those who are in a higher vibration'을 잘못 paraphrasing한 것은?","options":[{"text":"Those operating at a higher level of consciousness","isCorrect":false,"explanation":"올바른 paraphrasing — 부정적 생각에서 자유롭고 긍정적 생각을 가진 상태는 더 높은 의식 수준을 의미","translation":"더 높은 의식 수준에서 활동하는 사람들"},{"text":"People who have achieved a superior social status","isCorrect":true,"explanation":"잘못된 paraphrasing — 'higher vibration'은 에너지/정신적 수준을 의미하지, 사회적 지위(social status)를 의미하지 않음. 'higher'를 물리적/사회적 높이로 오해","translation":"우월한 사회적 지위를 달성한 사람들"},{"text":"Persons who resonate with more uplifting energy","isCorrect":false,"explanation":"올바른 paraphrasing — 'vibration'을 'resonate'로, 'higher'를 'uplifting'으로 자연스럽게 변환. 긍정적 에너지와 공명하는 의미","translation":"더 고양시키는 에너지와 공명하는 사람들"},{"text":"Individuals who maintain a more positive frequency","isCorrect":false,"explanation":"올바른 paraphrasing — 'higher vibration'은 긍정적 주파수/파장과 연결되며, 문맥상 긍정적 사고 형태를 가진 사람들을 지칭","translation":"더 긍정적인 주파수를 유지하는 개인들"},{"text":"People who exist at an elevated energetic state","isCorrect":false,"explanation":"올바른 paraphrasing — 'higher vibration'을 'elevated energetic state'로 바꿔 표현했으며, 에너지 수준이 높은 상태를 의미","translation":"고양된 에너지 상태에 있는 사람들"}],"passage":"Those who are in a higher vibration are free of the energy from their negative thoughts and have energized positive thought forms."},{"questionNumber":2,"sourceQuestion":"2-2번","keyExpression":"free of the energy from their negative thoughts","questionText":"다음 중 'free of the energy from their negative thoughts'를 잘못 paraphrasing한 것은?","options":[{"text":"liberated from the influence of pessimistic thinking patterns","isCorrect":false,"explanation":"올바른 paraphrasing — 'free of'='liberated from', 'negative thoughts'='pessimistic thinking patterns'로 적절히 변환","translation":"비관적 사고 패턴의 영향으로부터 해방된"},{"text":"released from the drain of negativity-based mental energy","isCorrect":false,"explanation":"올바른 paraphrasing — 'free of the energy'='released from the drain', 부정적 생각의 에너지가 소진시키는 영향에서 벗어남","translation":"부정성 기반 정신 에너지의 소모로부터 해방된"},{"text":"no longer burdened by the weight of harmful thought forms","isCorrect":false,"explanation":"올바른 paraphrasing — 'free of'='no longer burdened by', 'energy from negative thoughts'='weight of harmful thought forms'","translation":"해로운 생각 형태의 무게에 더 이상 짓눌리지 않는"},{"text":"unaffected by the force of their destructive mental states","isCorrect":false,"explanation":"올바른 paraphrasing — 'free of the energy'='unaffected by the force', 'negative thoughts'='destructive mental states'","translation":"파괴적인 정신 상태의 힘에 영향받지 않는"},{"text":"fully energized by removing all mental activities","isCorrect":true,"explanation":"잘못된 paraphrasing — 'free of negative thoughts'는 부정적 생각 제거를 의미하지, '모든 정신 활동(all mental activities)' 제거가 아님. 오히려 긍정적 생각은 활성화함","translation":"모든 정신 활동을 제거하여 완전히 활력을 얻은"}],"passage":"Those who are in a higher vibration are free of the energy from their negative thoughts and have energized positive thought forms."},{"questionNumber":3,"sourceQuestion":"2-2번","keyExpression":"resolved the problem with which we struggle","questionText":"다음 중 'resolved the problem with which we struggle'를 잘못 paraphrasing한 것은?","options":[{"text":"found a solution to the challenge we face","isCorrect":false,"explanation":"올바른 paraphrasing — 'resolved the problem'='found a solution to the challenge', 'struggle with'='face'","translation":"우리가 직면한 과제에 대한 해결책을 찾은"},{"text":"conquered the obstacle that we contend with","isCorrect":false,"explanation":"올바른 paraphrasing — 'resolved the problem'='conquered the obstacle', 'struggle with'='contend with'","translation":"우리가 맞서 싸우는 장애물을 정복한"},{"text":"successfully avoided the issue we are dealing with","isCorrect":true,"explanation":"잘못된 paraphrasing — 'resolved'는 문제를 '해결했다'는 의미인데, 'avoided'는 '회피했다'로 정반대 개념. 문제와 씨름하다가 해결한 것이지 피한 것이 아님","translation":"우리가 다루는 문제를 성공적으로 회피한"},{"text":"overcome the difficulty that troubles us","isCorrect":false,"explanation":"올바른 paraphrasing — 'resolved'='overcome', 'problem with which we struggle'='difficulty that troubles us'","translation":"우리를 괴롭히는 어려움을 극복한"},{"text":"worked through the issue that we grapple with","isCorrect":false,"explanation":"올바른 paraphrasing — 'resolved'='worked through', 'struggle with'='grapple with' (둘 다 씨름하다/고군분투하다)","translation":"우리가 씨름하는 문제를 해결한"}],"passage":"One valuable technique for getting out of helplessness and depression is to choose to be with other persons who have resolved the problem with which we struggle."},{"questionNumber":4,"sourceQuestion":"2-2번","keyExpression":"Merely to be in their presence is beneficial","questionText":"다음 중 'Merely to be in their presence is beneficial'을 잘못 paraphrasing한 것은?","options":[{"text":"Simply being around them has positive effects","isCorrect":false,"explanation":"올바른 paraphrasing — 'merely to be in their presence'='simply being around them', 'beneficial'='has positive effects'","translation":"단순히 그들 주변에 있는 것이 긍정적 효과가 있다"},{"text":"Their company alone offers helpful influence","isCorrect":false,"explanation":"올바른 paraphrasing — 'merely to be in their presence'='their company alone', 'beneficial'='offers helpful influence'","translation":"그들과 함께하는 것만으로도 도움이 되는 영향을 제공한다"},{"text":"The mere fact of being with them brings advantages","isCorrect":false,"explanation":"올바른 paraphrasing — 'merely'='the mere fact', 'in their presence'='being with them', 'beneficial'='brings advantages'","translation":"그들과 함께 있다는 단순한 사실이 이점을 가져온다"},{"text":"Just spending time near them proves advantageous","isCorrect":false,"explanation":"올바른 paraphrasing — 'merely to be in their presence'='just spending time near them', 'beneficial'='advantageous'","translation":"그들 근처에서 시간을 보내는 것만으로도 유익하다고 입증된다"},{"text":"Only by actively engaging with them can benefits occur","isCorrect":true,"explanation":"잘못된 paraphrasing — 'merely to be in their presence'는 '단지 함께 있기만 해도'라는 수동적 상태인데, 'only by actively engaging'은 '적극적으로 참여해야만'이라는 능동적 조건. 의미 정반대","translation":"오직 그들과 적극적으로 교류해야만 이점이 발생할 수 있다"}],"passage":"Those who are in a higher vibration are free of the energy from their negative thoughts and have energized positive thought forms. Merely to be in their presence is beneficial."},{"questionNumber":5,"sourceQuestion":"3-1번","keyExpression":"gently challenge the group's opinion","questionText":"다음 중 'gently challenge the group's opinion'을 잘못 paraphrasing한 것은?","options":[{"text":"tactfully introduce doubt about the consensus","isCorrect":false,"explanation":"올바른 paraphrasing — 'gently'='tactfully', 'challenge'='introduce doubt', 'group's opinion'='consensus'","translation":"합의에 대한 의문을 요령있게 제기하다"},{"text":"carefully raise objections to the majority view","isCorrect":false,"explanation":"올바른 paraphrasing — 'gently'='carefully', 'challenge'='raise objections', 'group's opinion'='majority view'","translation":"다수의 견해에 대해 신중하게 이의를 제기하다"},{"text":"mildly dispute the prevailing group stance","isCorrect":false,"explanation":"올바른 paraphrasing — 'gently'='mildly', 'challenge'='dispute', 'group's opinion'='prevailing group stance'","translation":"지배적인 집단 입장에 대해 온건하게 이의를 제기하다"},{"text":"softly question the collective viewpoint","isCorrect":false,"explanation":"올바른 paraphrasing — 'gently'='softly', 'challenge'='question', 'group's opinion'='collective viewpoint'","translation":"집단적 관점을 부드럽게 질문하다"},{"text":"forcefully reject the team's shared belief","isCorrect":true,"explanation":"잘못된 paraphrasing — 'gently'는 부드럽게인데 'forcefully'는 강력하게로 반대. 'challenge'는 의문 제기인데 'reject'는 거부로 더 강한 표현. 원문의 온화한 접근과 정반대","translation":"팀의 공유된 믿음을 강력하게 거부하다"}],"passage":"But when everyone agrees without questioning, the group can make bad decisions. To avoid this, gently challenge the group's opinion with a little doubt."},{"questionNumber":6,"sourceQuestion":"3-1번","keyExpression":"a single moment of doubt","questionText":"다음 중 'a single moment of doubt'를 잘못 paraphrasing한 것은?","options":[{"text":"a solitary expression of questioning","isCorrect":false,"explanation":"올바른 paraphrasing — 'single moment'='solitary expression', 'doubt'='questioning' (의문을 제기하는 행위)","translation":"의문을 제기하는 단 한 번의 표현"},{"text":"an extended period of complete skepticism","isCorrect":true,"explanation":"잘못된 paraphrasing — 'single moment'는 짧은 한 순간인데 'extended period'는 연장된 기간. 'doubt'는 가벼운 의문인데 'complete skepticism'은 완전한 회의주의로 과도하게 강함","translation":"완전한 회의주의의 연장된 기간"},{"text":"one small seed of reservation","isCorrect":false,"explanation":"올바른 paraphrasing — 'single moment'='one small seed' (작은 시작), 'doubt'='reservation' (유보적 태도/의구심)","translation":"유보의 작은 씨앗 하나"},{"text":"just one occasion of hesitation","isCorrect":false,"explanation":"올바른 paraphrasing — 'single moment'='just one occasion', 'doubt'='hesitation' (확신하지 못하고 주저함)","translation":"주저하는 단 한 번의 기회"},{"text":"one brief instance of uncertainty","isCorrect":false,"explanation":"올바른 paraphrasing — 'single moment'='one brief instance', 'doubt'='uncertainty'","translation":"불확실성의 한 순간"}],"passage":"Often, a single moment of doubt can change everything. Once you open the door a little, others might gain the courage to follow."},{"questionNumber":7,"sourceQuestion":"3-1번","keyExpression":"afraid of looking foolish","questionText":"다음 중 'afraid of looking foolish'를 잘못 paraphrasing한 것은?","options":[{"text":"anxious about coming across as incompetent","isCorrect":false,"explanation":"올바른 paraphrasing — 'afraid of'='anxious about', 'looking foolish'='coming across as incompetent' (무능해 보임)","translation":"무능해 보일까 불안해하는"},{"text":"fearful of appearing ridiculous","isCorrect":false,"explanation":"올바른 paraphrasing — 'afraid of'='fearful of', 'looking foolish'='appearing ridiculous'","translation":"우스꽝스러워 보일까 두려워하는"},{"text":"scared of being perceived as naive","isCorrect":false,"explanation":"올바른 paraphrasing — 'afraid of'='scared of', 'looking foolish'='being perceived as naive' (순진하거나 어리석게 보임)","translation":"순진하게 인식될까 두려워하는"},{"text":"worried about seeming stupid","isCorrect":false,"explanation":"올바른 paraphrasing — 'afraid of'='worried about', 'looking foolish'='seeming stupid'","translation":"어리석어 보일까 걱정하는"},{"text":"confident about demonstrating wisdom","isCorrect":true,"explanation":"잘못된 paraphrasing — 'afraid of looking foolish'는 부정적 감정(두려움)인데, 'confident about demonstrating wisdom'은 긍정적 감정(자신감). 의미가 완전히 반대","translation":"지혜를 보여주는 것에 자신감이 있는"}],"passage":"People stay quiet in groups because they don't know what others are thinking. We're afraid of looking foolish, so we don't speak up."},{"questionNumber":8,"sourceQuestion":"3-1번","keyExpression":"gain the courage to follow","questionText":"다음 중 'gain the courage to follow'를 잘못 paraphrasing한 것은?","options":[{"text":"lose the hesitation to remain silent","isCorrect":true,"explanation":"잘못된 paraphrasing — 'gain courage'는 용기를 '얻다'인데 'lose hesitation'은 주저함을 '잃다'. 또한 'follow'는 따라 행동하다인데 'remain silent'는 침묵을 유지하다로 정반대 행동","translation":"침묵을 유지하려는 주저함을 잃다"},{"text":"find the strength to express their views too","isCorrect":false,"explanation":"올바른 paraphrasing — 'gain courage'='find the strength', 'follow'='express their views too' (따라서 의견을 표현하다)","translation":"그들의 견해도 표현할 힘을 찾다"},{"text":"develop the confidence to speak up as well","isCorrect":false,"explanation":"올바른 paraphrasing — 'gain'='develop', 'courage'='confidence', 'follow'='speak up as well' (따라서 말하다)","translation":"역시 말할 수 있는 자신감을 기르다"},{"text":"become emboldened to voice their thoughts likewise","isCorrect":false,"explanation":"올바른 paraphrasing — 'gain the courage'='become emboldened', 'follow'='voice their thoughts likewise' (마찬가지로 생각을 말하다)","translation":"마찬가지로 생각을 말할 용기를 갖게 되다"},{"text":"acquire the bravery to join in","isCorrect":false,"explanation":"올바른 paraphrasing — 'gain'='acquire', 'courage'='bravery', 'follow'='join in' (함께 참여하다)","translation":"함께 참여할 용기를 얻다"}],"passage":"Once you open the door a little, others might gain the courage to follow."},{"questionNumber":9,"sourceQuestion":"3-1번","keyExpression":"without directly disagreeing","questionText":"다음 중 'without directly disagreeing'를 잘못 paraphrasing한 것은?","options":[{"text":"in a way that doesn't confront head-on","isCorrect":false,"explanation":"올바른 paraphrasing — 'without directly disagreeing'='doesn't confront head-on', 정면으로 맞서지 않는 방식으로","translation":"정면으로 맞서지 않는 방식으로"},{"text":"by explicitly rejecting the group consensus","isCorrect":true,"explanation":"잘못된 paraphrasing — 'without directly disagreeing'는 직접 반대하지 '않으면서'인데, 'by explicitly rejecting'은 명시적으로 거부'함으로써'로 정반대. 부정→긍정으로 의미 왜곡","translation":"집단 합의를 명시적으로 거부함으로써"},{"text":"while avoiding outright opposition","isCorrect":false,"explanation":"올바른 paraphrasing — 'without directly disagreeing'='while avoiding outright opposition', 직접적 반대를 피하면서","translation":"노골적인 반대를 피하면서"},{"text":"without openly contradicting","isCorrect":false,"explanation":"올바른 paraphrasing — 'directly disagreeing'='openly contradicting', 공개적으로 모순되지 않으면서","translation":"공개적으로 모순되지 않으면서"},{"text":"without stating clear objection","isCorrect":false,"explanation":"올바른 paraphrasing — 'directly disagreeing'='stating clear objection', 명확한 반대를 진술하지 않으면서","translation":"명확한 반대를 진술하지 않으면서"}],"passage":"For example, you can say, 'I'm not sure yet,' or 'I can see both sides of this issue.' You can also suggest other ideas by saying things like, 'I know someone who...' or 'I read that...' This way, you can question the group's opinion without directly disagreeing."},{"questionNumber":10,"sourceQuestion":"3-1번","keyExpression":"everyone agrees without questioning","questionText":"다음 중 'everyone agrees without questioning'을 잘못 paraphrasing한 것은?","options":[{"text":"there is uniform agreement without challenge","isCorrect":false,"explanation":"올바른 paraphrasing — 'everyone agrees'='uniform agreement', 'without questioning'='without challenge' (이의 제기 없이)","translation":"이의 제기 없이 일치된 동의가 있다"},{"text":"participants unanimously support with examination","isCorrect":true,"explanation":"잘못된 paraphrasing — 'without questioning'은 질문/검토 '없이'인데, 'with examination'은 검토를 '하면서'로 정반대. without↔with 전치사 오류","translation":"참가자들이 검토하면서 만장일치로 지지하다"},{"text":"people concur blindly without raising doubts","isCorrect":false,"explanation":"올바른 paraphrasing — 'everyone agrees'='people concur', 'without questioning'='blindly without raising doubts'","translation":"사람들이 의문을 제기하지 않고 맹목적으로 동의하다"},{"text":"all members accept the view uncritically","isCorrect":false,"explanation":"올바른 paraphrasing — 'everyone agrees'='all members accept the view', 'without questioning'='uncritically' (비판 없이)","translation":"모든 구성원이 비판 없이 견해를 수용하다"},{"text":"the group reaches consensus without scrutiny","isCorrect":false,"explanation":"올바른 paraphrasing — 'everyone agrees'='the group reaches consensus', 'without questioning'='without scrutiny' (검토 없이)","translation":"집단이 검토 없이 합의에 도달하다"}],"passage":"But when everyone agrees without questioning, the group can make bad decisions."},{"questionNumber":1,"sourceQuestion":"3-2번","keyExpression":"the second arrow","questionText":"다음 중 'the second arrow'를 잘못 paraphrasing한 것은?","options":[{"text":"dwelling on how unfair the situation is","isCorrect":false,"explanation":"올바른 paraphrasing — 'didn't make it worse by dwelling on how unfair it was'에서 second arrow를 피하는 반대 행동으로 제시됨","translation":"상황이 얼마나 불공평한지에 대해 곰곰이 생각하는 것"},{"text":"making your suffering worse through your reaction","isCorrect":false,"explanation":"올바른 paraphrasing — 'didn't make it worse'의 반대 개념으로, second arrow의 효과를 정확히 표현","translation":"당신의 반응을 통해 고통을 더 악화시키는 것"},{"text":"your emotional response to the first event","isCorrect":false,"explanation":"올바른 paraphrasing — 지문에서 'The second arrow, your emotional response to the first event'로 직접 정의됨","translation":"첫 번째 사건에 대한 당신의 감정적 반응"},{"text":"the initial bad event that causes pain","isCorrect":true,"explanation":"잘못된 paraphrasing — 이것은 'the first arrow'에 대한 설명임. 지문에서 'the first arrow is like a bad event that causes pain'으로 명시됨","translation":"고통을 야기하는 최초의 나쁜 사건"},{"text":"the additional pain you create yourself","isCorrect":false,"explanation":"올바른 paraphrasing — 'adds more pain'과 'the second is up to us'에서 스스로 만드는 추가 고통을 의미","translation":"당신이 스스로 만들어내는 추가적인 고통"}],"passage":"The second arrow, your emotional response to the first event, adds more pain. In life, we can't always stop the first arrow, but the second is up to us."},{"questionNumber":2,"sourceQuestion":"3-2번","keyExpression":"didn't make it worse by dwelling on how unfair it was","questionText":"다음 중 'didn't make it worse by dwelling on how unfair it was'를 잘못 paraphrasing한 것은?","options":[{"text":"refrained from obsessing over the injustice of being sick","isCorrect":false,"explanation":"올바른 paraphrasing — 'dwelling on'은 'obsessing over'와 유사하고, 'how unfair'는 'injustice'로 표현 가능","translation":"아픈 것의 부당함에 집착하는 것을 자제했다"},{"text":"accepted the situation without emotional complaints","isCorrect":false,"explanation":"올바른 paraphrasing — 불공평함에 대해 생각하지 않은 것은 감정적 불평 없이 받아들인 것과 동일","translation":"감정적 불평 없이 상황을 받아들였다"},{"text":"kept dwelling on their illness until they felt better","isCorrect":true,"explanation":"잘못된 paraphrasing — 원문은 'didn't dwell'(집착하지 않음)인데, 이 선지는 'kept dwelling'(계속 집착함)으로 정반대 의미","translation":"기분이 나아질 때까지 그들의 병에 대해 계속 생각했다"},{"text":"avoided adding extra suffering through negative thoughts","isCorrect":false,"explanation":"올바른 paraphrasing — 'make it worse'는 고통을 추가하는 것이고, 'dwelling on unfairness'는 부정적 사고를 의미","translation":"부정적인 생각을 통해 추가 고통을 더하는 것을 피했다"},{"text":"evaded the second arrow successfully","isCorrect":false,"explanation":"올바른 paraphrasing — 지문에서 이 행동이 바로 'evading the second arrow'의 실례로 제시됨","translation":"두 번째 화살을 성공적으로 피했다"}],"passage":"They didn't like being sick but didn't make it worse by dwelling on how unfair it was. My friend realized her sons had mastered evading the second arrow."},{"questionNumber":3,"sourceQuestion":"3-2번","keyExpression":"the second is up to us","questionText":"다음 중 'the second is up to us'를 잘못 paraphrasing한 것은?","options":[{"text":"the choice to add more pain is ours","isCorrect":false,"explanation":"올바른 paraphrasing — 'up to us'는 선택권이 우리에게 있다는 것이고, second arrow는 추가 고통을 의미","translation":"더 많은 고통을 추가할지의 선택은 우리에게 있다"},{"text":"we can control our emotional response","isCorrect":false,"explanation":"올바른 paraphrasing — 'up to us'는 우리의 통제 하에 있다는 의미이고, second arrow는 감정적 반응","translation":"우리는 감정적 반응을 통제할 수 있다"},{"text":"our reaction is within our power to manage","isCorrect":false,"explanation":"올바른 paraphrasing — 'up to us'는 'within our power'로, second arrow(반응)를 관리할 수 있다는 의미","translation":"우리의 반응은 관리할 수 있는 우리의 능력 범위 내에 있다"},{"text":"we cannot prevent the second arrow from happening","isCorrect":true,"explanation":"잘못된 paraphrasing — 원문은 second arrow가 우리에게 달려있다(통제 가능)고 했는데, 이 선지는 막을 수 없다(통제 불가능)고 주장","translation":"우리는 두 번째 화살이 일어나는 것을 막을 수 없다"},{"text":"we have agency over how we respond","isCorrect":false,"explanation":"올바른 paraphrasing — 'up to us'는 주체성(agency)을 가진다는 의미이고, 어떻게 반응할지에 대한 것","translation":"우리는 어떻게 반응할지에 대한 주체성을 가지고 있다"}],"passage":"In life, we can't always stop the first arrow, but the second is up to us."},{"questionNumber":4,"sourceQuestion":"3-2번","keyExpression":"played when they had energy and rested when they didn't","questionText":"다음 중 'played when they had energy and rested when they didn't'를 잘못 paraphrasing한 것은?","options":[{"text":"responded naturally to their physical condition","isCorrect":false,"explanation":"올바른 paraphrasing — 에너지가 있을 때/없을 때에 따라 행동한 것은 신체 상태에 자연스럽게 반응한 것","translation":"그들의 신체 상태에 자연스럽게 반응했다"},{"text":"forced themselves to stay active despite being tired","isCorrect":true,"explanation":"잘못된 paraphrasing — 원문은 에너지가 없을 때 쉬었다고 했는데, 이 선지는 피곤해도 억지로 활동했다는 반대 의미","translation":"피곤함에도 불구하고 계속 활동하도록 스스로를 강요했다"},{"text":"listened to their bodies without overthinking","isCorrect":false,"explanation":"올바른 paraphrasing — 에너지 상태에 따라 단순하게 행동한 것은 과도하게 생각하지 않고 몸의 소리를 들은 것","translation":"지나치게 생각하지 않고 그들의 몸의 소리를 들었다"},{"text":"adjusted their activities based on how they felt","isCorrect":false,"explanation":"올바른 paraphrasing — 에너지 유무에 따라 놀거나 쉰 것은 기분에 따라 활동을 조정한 것","translation":"기분에 따라 활동을 조정했다"},{"text":"alternated between activity and rest as needed","isCorrect":false,"explanation":"올바른 paraphrasing — 놀고 쉬는 것을 번갈아 한 것은 필요에 따라 활동과 휴식을 교대한 것","translation":"필요에 따라 활동과 휴식을 번갈아 했다"}],"passage":"She felt upset and thought it was unfair, but her sons simply played when they had energy and rested when they didn't."},{"questionNumber":5,"sourceQuestion":"4-1번","keyExpression":"Your identity is like a sculpture, shaped and defined by the material that surrounds it","questionText":"다음 중 'Your identity is like a sculpture, shaped and defined by the material that surrounds it'를 잘못 paraphrasing한 것은?","options":[{"text":"The world around you creates who you become","isCorrect":false,"explanation":"올바른 paraphrasing — 'shaped and defined by the material that surrounds it'은 주변 세계가 당신을 만든다는 의미","translation":"당신 주변의 세계가 당신이 될 사람을 만든다"},{"text":"Your sense of self is molded by external factors","isCorrect":false,"explanation":"올바른 paraphrasing — 'shaped and defined'는 'molded'로, 'material that surrounds'는 'external factors'로 표현 가능","translation":"당신의 자아 의식은 외부 요인들에 의해 형성된다"},{"text":"Your experiences and surroundings determine your character","isCorrect":false,"explanation":"올바른 paraphrasing — 'material that surrounds'는 경험과 환경을 포함하고, 'shaped and defined'는 성격을 결정함을 의미","translation":"당신의 경험과 환경이 당신의 성격을 결정한다"},{"text":"Who you are is formed by everything around you","isCorrect":false,"explanation":"올바른 paraphrasing — 'shaped and defined by the material that surrounds it'은 주변의 모든 것에 의해 형성된다는 의미","translation":"당신이 누구인지는 당신 주변의 모든 것에 의해 형성된다"},{"text":"Identity exists independently of one's environment","isCorrect":true,"explanation":"잘못된 paraphrasing — 원문은 정체성이 주변 환경에 의해 형성된다고 했는데, 이 선지는 환경과 독립적으로 존재한다는 반대 의미","translation":"정체성은 환경과 독립적으로 존재한다"}],"passage":"Your identity is like a sculpture, shaped and defined by the material that surrounds it. A sculpture cannot exist without its block of marble."},{"questionNumber":6,"sourceQuestion":"4-1번","keyExpression":"there's really no way to separate yourself from the world around you","questionText":"다음 중 'there's really no way to separate yourself from the world around you'를 잘못 paraphrasing한 것은?","options":[{"text":"you are inextricably linked to everything around you","isCorrect":false,"explanation":"올바른 paraphrasing — 'no way to separate'는 'inextricably linked'(불가분하게 연결됨)와 동일한 의미","translation":"당신은 주변의 모든 것과 불가분하게 연결되어 있다"},{"text":"one can easily distinguish oneself from external influences","isCorrect":true,"explanation":"잘못된 paraphrasing — 원문은 분리할 수 없다('no way to separate')고 했는데, 이 선지는 쉽게 구별할 수 있다는 반대 의미","translation":"외부 영향으로부터 자신을 쉽게 구별할 수 있다"},{"text":"you and the world are fundamentally interconnected","isCorrect":false,"explanation":"올바른 paraphrasing — 분리할 수 없다는 것은 근본적으로 연결되어 있다는 의미","translation":"당신과 세계는 근본적으로 상호 연결되어 있다"},{"text":"you are inseparable from your environment","isCorrect":false,"explanation":"올바른 paraphrasing — 'no way to separate'는 'inseparable'과 동일한 의미","translation":"당신은 환경과 분리될 수 없다"},{"text":"your self cannot be isolated from surrounding contexts","isCorrect":false,"explanation":"올바른 paraphrasing — 'no way to separate'는 'cannot be isolated'로, 'world around you'는 'surrounding contexts'로 표현 가능","translation":"당신의 자아는 주변 맥락으로부터 고립될 수 없다"}],"passage":"But who you are comes from everything around you — your experiences, friends, enemies, culture, and beliefs. There's really no way to separate yourself from the world around you."},{"questionNumber":7,"sourceQuestion":"4-1번","keyExpression":"who you are comes from everything around you","questionText":"다음 중 'who you are comes from everything around you'를 잘못 paraphrasing한 것은?","options":[{"text":"your identity originates from your surroundings","isCorrect":false,"explanation":"올바른 paraphrasing — 'comes from'은 'originates from'과 동일하고, 'everything around you'는 'surroundings'로 표현 가능","translation":"당신의 정체성은 당신의 환경으로부터 비롯된다"},{"text":"what defines you emerges from your context","isCorrect":false,"explanation":"올바른 paraphrasing — 'who you are'는 'what defines you'로, 'comes from everything around you'는 'emerges from your context'로 표현 가능","translation":"당신을 규정하는 것은 당신의 맥락으로부터 나타난다"},{"text":"your sense of self is derived from external elements","isCorrect":false,"explanation":"올바른 paraphrasing — 'comes from'은 'is derived from'으로, 'everything around you'는 'external elements'로 표현 가능","translation":"당신의 자아 의식은 외부 요소들로부터 파생된다"},{"text":"your character is shaped by your experiences and culture","isCorrect":false,"explanation":"올바른 paraphrasing — 지문에서 'experiences, culture'를 명시하고 'comes from'은 'is shaped by'로 표현 가능","translation":"당신의 성격은 당신의 경험과 문화에 의해 형성된다"},{"text":"your personality is innate and unaffected by others","isCorrect":true,"explanation":"잘못된 paraphrasing — 원문은 정체성이 외부에서 온다고 했는데, 이 선지는 타고난 것이며 타인의 영향을 받지 않는다는 반대 의미","translation":"당신의 성격은 타고난 것이며 타인의 영향을 받지 않는다"}],"passage":"But who you are comes from everything around you — your experiences, friends, enemies, culture, and beliefs."},{"questionNumber":8,"sourceQuestion":"4-1번","keyExpression":"each of us shares responsibility for everyone's well-being","questionText":"다음 중 'each of us shares responsibility for everyone's well-being'를 잘못 paraphrasing한 것은?","options":[{"text":"we are all collectively accountable for others' welfare","isCorrect":false,"explanation":"올바른 paraphrasing — 'shares responsibility'는 'collectively accountable'로, 'everyone's well-being'은 'others' welfare'로 표현 가능","translation":"우리 모두는 타인의 복지에 대해 집단적으로 책임이 있다"},{"text":"every person has a duty to care for the common good","isCorrect":false,"explanation":"올바른 paraphrasing — 'each of us shares responsibility'는 모든 사람이 의무를 가진다는 의미이고, 'everyone's well-being'은 공동선과 연결됨","translation":"모든 사람은 공동선을 돌볼 의무가 있다"},{"text":"the welfare of all is a shared concern among us","isCorrect":false,"explanation":"올바른 paraphrasing — 'each of us shares'는 'shared among us'로, 'responsibility for everyone's well-being'은 'concern for welfare of all'로 표현 가능","translation":"모든 이의 복지는 우리 사이의 공유된 관심사이다"},{"text":"only certain individuals are responsible for society's problems","isCorrect":true,"explanation":"잘못된 paraphrasing — 원문은 '각자 모두'('each of us')가 책임을 공유한다고 했는데, 이 선지는 '특정 개인만' 책임이 있다는 반대 의미","translation":"특정 개인들만 사회 문제에 책임이 있다"},{"text":"we all have a stake in the happiness of others","isCorrect":false,"explanation":"올바른 paraphrasing — 'shares responsibility'는 'have a stake'로, 'everyone's well-being'은 'happiness of others'로 표현 가능","translation":"우리 모두는 타인의 행복에 이해관계가 있다"}],"passage":"The theme was that each of us shares responsibility for everyone's well-being."},{"questionNumber":1,"sourceQuestion":"4-2번","keyExpression":"figuring out what counts as literature is hard","questionText":"다음 중 'figuring out what counts as literature is hard'를 잘못 paraphrasing한 것은?","options":[{"text":"creating literature that meets established criteria is demanding","isCorrect":true,"explanation":"잘못된 paraphrasing — 원문은 '문학을 정의/판단하는 것'이 어렵다는 의미인데, 이 선지는 '기준에 맞는 문학을 창작하는 것'으로 완전히 다른 의미가 됨. 'figuring out'(알아내기)과 'creating'(창작하기)은 전혀 다른 행위","translation":"확립된 기준에 맞는 문학을 창작하는 것은 까다롭다"},{"text":"identifying the standards for literature is challenging","isCorrect":false,"explanation":"올바른 paraphrasing — 'figuring out what counts as'='identifying the standards for'로 기준을 찾는 의미 유지, 'hard'='challenging'","translation":"문학의 기준을 식별하는 것은 도전적이다"},{"text":"understanding which works are considered literature is not easy","isCorrect":false,"explanation":"올바른 paraphrasing — 'figuring out'='understanding', 'counts as'='are considered', 'hard'='not easy'로 이중부정 활용","translation":"어떤 작품이 문학으로 여겨지는지 이해하는 것은 쉽지 않다"},{"text":"determining what qualifies as literature is difficult","isCorrect":false,"explanation":"올바른 paraphrasing — 'figuring out'='determining', 'counts as'='qualifies as', 'hard'='difficult'로 완벽히 대응됨","translation":"무엇이 문학으로 자격을 갖추는지 결정하는 것은 어렵다"},{"text":"defining what should be regarded as literature is complex","isCorrect":false,"explanation":"올바른 paraphrasing — 'figuring out'='defining', 'counts as'='should be regarded as', 'hard'='complex'로 의미 보존","translation":"무엇이 문학으로 간주되어야 하는지 정의하는 것은 복잡하다"}],"passage":"So, figuring out what counts as literature is hard. It might just be what a society at a certain time considers it to be."},{"questionNumber":2,"sourceQuestion":"4-2번","keyExpression":"There's no special quality","questionText":"다음 중 'There's no special quality'를 잘못 paraphrasing한 것은?","options":[{"text":"It possesses no unique excellence or merit","isCorrect":true,"explanation":"잘못된 paraphrasing — 원문은 '특별한 속성/특징이 없다'(중립적 의미)인데, 이 선지는 '우수성이나 장점이 없다'로 부정적 가치판단을 포함함. 'quality'를 '품질/우수성'으로 해석하여 의미가 왜곡됨","translation":"그것은 독특한 우수성이나 장점을 가지고 있지 않다"},{"text":"It has no inherent characteristic","isCorrect":false,"explanation":"올바른 paraphrasing — 'no special quality'='no inherent characteristic', 본질적 속성이 없다는 의미 동일","translation":"그것은 본질적인 특성이 없다"},{"text":"No essential attribute sets it apart","isCorrect":false,"explanation":"올바른 paraphrasing — 'no special quality'='no essential attribute sets it apart', 구별 짓는 본질적 속성이 없음","translation":"그것을 구별하는 본질적 속성이 없다"},{"text":"It lacks any distinctive feature","isCorrect":false,"explanation":"올바른 paraphrasing — 'no special quality'='lacks any distinctive feature', 특별한 특징이 없음을 표현","translation":"그것은 어떤 독특한 특징도 결여하고 있다"},{"text":"There is no intrinsic property that defines it","isCorrect":false,"explanation":"올바른 paraphrasing — 'no special quality'를 'no intrinsic property'로 확장하여 정의하는 내재적 속성이 없다는 의미 전달","translation":"그것을 정의하는 내재적 속성이 없다"}],"passage":"For example, what makes a plant a weed? There's no special quality; it's just a plant gardeners don't want."},{"questionNumber":3,"sourceQuestion":"4-2번","keyExpression":"study the culture and beliefs of why different groups don't want certain plants","questionText":"다음 중 'study the culture and beliefs of why different groups don't want certain plants'를 잘못 paraphrasing한 것은?","options":[{"text":"understand the cultural perspectives that make certain plants undesirable to different groups","isCorrect":false,"explanation":"올바른 paraphrasing — 'study'='understand', 'culture and beliefs'='cultural perspectives', 'why don't want'='make undesirable'로 인과관계 유지","translation":"특정 식물을 다양한 집단에게 바람직하지 않게 만드는 문화적 관점을 이해하다"},{"text":"investigate the social values that lead distinct societies to avoid particular plants","isCorrect":false,"explanation":"올바른 paraphrasing — 'study'='investigate', 'culture and beliefs'='social values', 'different groups'='distinct societies', 'don't want'='avoid'","translation":"특정 사회가 특별한 식물을 피하도록 만드는 사회적 가치를 조사하다"},{"text":"analyze how different groups cultivate plants based on their cultural traditions","isCorrect":true,"explanation":"잘못된 paraphrasing — 원문은 '왜 특정 식물을 원치 않는가'에 대한 문화/신념 연구인데, 이 선지는 '식물을 재배하는 방법'으로 의미가 정반대로 바뀜. 'don't want'≠'cultivate'(재배하다)","translation":"다양한 집단이 문화적 전통에 기반하여 식물을 재배하는 방법을 분석하다"},{"text":"examine the cultural reasons behind various communities' rejection of specific plants","isCorrect":false,"explanation":"올바른 paraphrasing — 'study'='examine', 'culture and beliefs of why'='cultural reasons behind', 'different groups'='various communities', 'don't want'='rejection'","translation":"다양한 공동체가 특정 식물을 거부하는 뒤의 문화적 이유를 검토하다"},{"text":"explore the belief systems explaining why various groups reject certain plant species","isCorrect":false,"explanation":"올바른 paraphrasing — 'study'='explore', 'culture and beliefs'='belief systems', 'why don't want'='explaining why reject', 의미 구조 유지","translation":"다양한 집단이 특정 식물 종을 거부하는 이유를 설명하는 신념 체계를 탐구하다"}],"passage":"To understand weeds, you'd need to study the culture and beliefs of why different groups in different places don't want certain plants."},{"questionNumber":4,"sourceQuestion":"4-2번","keyExpression":"what a society at a certain time considers it to be","questionText":"다음 중 'what a society at a certain time considers it to be'를 잘못 paraphrasing한 것은?","options":[{"text":"how a culture at a given moment defines it","isCorrect":false,"explanation":"올바른 paraphrasing — 'society'='culture', 'certain time'='given moment', 'considers'='defines', 의미 동일","translation":"주어진 순간에 문화가 그것을 정의하는 방식"},{"text":"whatever a particular society at a given time views as literature","isCorrect":false,"explanation":"올바른 paraphrasing — 'society at a certain time'='particular society at a given time', 'considers it to be'='views as', 명시적으로 'literature' 추가하여 문맥 명확화","translation":"주어진 시간에 특정 사회가 문학으로 보는 무엇이든"},{"text":"what people in a specific era deem it to be","isCorrect":false,"explanation":"올바른 paraphrasing — 'society'='people', 'certain time'='specific era', 'considers'='deem', 구조 유지","translation":"특정 시대의 사람들이 그것이라고 간주하는 것"},{"text":"whatever a community regards as such during a particular period","isCorrect":false,"explanation":"올바른 paraphrasing — 'society'='community', 'at a certain time'='during a particular period', 'considers it to be'='regards as such'","translation":"특정 시기 동안 공동체가 그렇다고 여기는 무엇이든"},{"text":"the unchanging standards that societies have always used to classify it","isCorrect":true,"explanation":"잘못된 paraphrasing — 원문은 '특정 시간의 사회가 여기는 것'으로 시대/문화에 따라 변할 수 있음을 암시하는데, 이 선지는 '불변하는 기준'('unchanging standards', 'always used')으로 정반대 의미. 문맥상 문학 정의는 시대마다 다르다는 것이 핵심","translation":"사회가 그것을 분류하기 위해 항상 사용해온 불변의 기준"}],"passage":"So, figuring out what counts as literature is hard. It might just be what a society at a certain time considers it to be."},{"questionNumber":5,"sourceQuestion":"5-1번","keyExpression":"the horse suddenly feels a strong urge to jump over and explore beyond","questionText":"다음 중 'the horse suddenly feels a strong urge to jump over and explore beyond'를 잘못 paraphrasing한 것은?","options":[{"text":"the horse immediately experiences a powerful desire to leap across and investigate what lies beyond","isCorrect":false,"explanation":"올바른 paraphrasing — 'suddenly'='immediately', 'feels a strong urge'='experiences a powerful desire', 'jump over and explore beyond'='leap across and investigate what lies beyond'","translation":"말은 즉시 건너뛰어 너머에 있는 것을 조사하고자 하는 강력한 욕구를 경험한다"},{"text":"the horse gradually develops the patience to stay within the enclosed area","isCorrect":true,"explanation":"잘못된 paraphrasing — 원문은 '울타리가 생기자 갑자기 넘고 싶고 탐험하고 싶은 강한 충동을 느낀다'인데, 이 선지는 '점차 울타리 안에 머물 인내심을 기른다'로 의미가 정반대. 'suddenly'≠'gradually', 'urge to jump over'≠'patience to stay within'","translation":"말은 점차적으로 둘러싸인 영역 내에 머무는 인내심을 발달시킨다"},{"text":"the horse is instantly compelled to cross the barrier and discover the other side","isCorrect":false,"explanation":"올바른 paraphrasing — 'suddenly'='instantly', 'feels a strong urge'='is compelled', 'jump over'='cross the barrier', 'explore beyond'='discover the other side'","translation":"말은 즉각적으로 장벽을 넘어 다른 쪽을 발견하도록 강요받는다"},{"text":"the horse becomes motivated at once to overcome the obstacle and see what's on the far side","isCorrect":false,"explanation":"올바른 paraphrasing — 'suddenly'='at once', 'feels a strong urge'='becomes motivated', 'jump over'='overcome the obstacle', 'explore beyond'='see what's on the far side'","translation":"말은 즉시 장애물을 극복하고 저 너머에 무엇이 있는지 보도록 동기부여된다"},{"text":"the horse abruptly develops a compelling impulse to vault over and venture beyond","isCorrect":false,"explanation":"올바른 paraphrasing — 'suddenly'='abruptly', 'feels a strong urge'='develops a compelling impulse', 'jump over'='vault over', 'explore beyond'='venture beyond'","translation":"말은 갑자기 뛰어넘어 너머로 모험하고자 하는 강렬한 충동을 발달시킨다"}],"passage":"However, when a fence is put up, the horse suddenly feels a strong urge to jump over and explore beyond."},{"questionNumber":6,"sourceQuestion":"5-1번","keyExpression":"the creative field shrinks","questionText":"다음 중 'the creative field shrinks'를 잘못 paraphrasing한 것은?","options":[{"text":"the boundaries of creative possibility contract","isCorrect":false,"explanation":"올바른 paraphrasing — 'creative field'='boundaries of creative possibility', 'shrinks'='contract', 수축/축소 의미 유지","translation":"창의적 가능성의 경계가 수축한다"},{"text":"the area for creative thinking becomes more confined","isCorrect":false,"explanation":"올바른 paraphrasing — 'creative field'='area for creative thinking', 'shrinks'='becomes more confined', 제한되는 의미 전달","translation":"창의적 사고를 위한 영역이 더 제한된다"},{"text":"the scope for creativity becomes narrower","isCorrect":false,"explanation":"올바른 paraphrasing — 'creative field'='scope for creativity', 'shrinks'='becomes narrower', 범위가 좁아지는 의미 동일","translation":"창의성의 범위가 더 좁아진다"},{"text":"the space for creative exploration gets smaller","isCorrect":false,"explanation":"올바른 paraphrasing — 'creative field'='space for creative exploration', 'shrinks'='gets smaller', 공간이 줄어드는 의미","translation":"창의적 탐구를 위한 공간이 더 작아진다"},{"text":"the creative opportunities multiply and expand","isCorrect":true,"explanation":"잘못된 paraphrasing — 원문은 '창의적 영역이 줄어든다'인데, 이 선지는 '창의적 기회가 증가하고 확장된다'로 정반대 의미. 'shrinks'(줄어들다)≠'multiply and expand'(증가하고 확장되다)","translation":"창의적 기회들이 증가하고 확장된다"}],"passage":"But when a fence is put up ― like writing a poem about your house ― the creative field shrinks, and the horse starts walking."},{"questionNumber":7,"sourceQuestion":"5-1번","keyExpression":"spark your imagination","questionText":"다음 중 'spark your imagination'을 잘못 paraphrasing한 것은?","options":[{"text":"kindle your creative thought process","isCorrect":false,"explanation":"올바른 paraphrasing — 'spark'='kindle'(불을 지피다), 'imagination'='creative thought process', 창의적 사고 과정을 시작하게 하는 의미","translation":"당신의 창의적 사고 과정에 불을 지피다"},{"text":"ignite your creative thinking","isCorrect":false,"explanation":"올바른 paraphrasing — 'spark'='ignite'(불을 붙이다), 'imagination'='creative thinking', 둘 다 창의적 사고를 촉발하는 의미","translation":"당신의 창의적 사고에 불을 붙이다"},{"text":"suppress your creative impulses","isCorrect":true,"explanation":"잘못된 paraphrasing — 원문은 '상상력을 촉발/자극하다'인데, 이 선지는 '창의적 충동을 억압하다'로 정반대 의미. 'spark'(촉발하다)≠'suppress'(억압하다), 문맥상 제약이 상상력을 자극한다는 것이 핵심","translation":"당신의 창의적 충동을 억압하다"},{"text":"stimulate your imaginative capacity","isCorrect":false,"explanation":"올바른 paraphrasing — 'spark'='stimulate'(자극하다), 'imagination'='imaginative capacity', 상상력을 활성화하는 의미","translation":"당신의 상상력 능력을 자극하다"},{"text":"trigger your inventive ideas","isCorrect":false,"explanation":"올바른 paraphrasing — 'spark'='trigger'(촉발하다), 'imagination'='inventive ideas', 상상력을 자극하는 의미 유지","translation":"당신의 독창적인 아이디어를 촉발하다"}],"passage":"What if you added a limit: write a poem from your house's perspective about you. This is much more likely to spark your imagination."},{"questionNumber":8,"sourceQuestion":"5-1번","keyExpression":"it's a challenge, not an easy task","questionText":"다음 중 'it's a challenge, not an easy task'를 잘못 paraphrasing한 것은?","options":[{"text":"it involves complexity as opposed to simplicity","isCorrect":false,"explanation":"올바른 paraphrasing — 'challenge'='involves complexity', 'not an easy task'='as opposed to simplicity', 복잡함과 단순함의 대조","translation":"그것은 단순함과 반대로 복잡함을 포함한다"},{"text":"it is a simple assignment that anyone can complete quickly","isCorrect":true,"explanation":"잘못된 paraphrasing — 원문은 '도전이지 쉬운 과제가 아니다'인데, 이 선지는 '누구나 빨리 완수할 수 있는 간단한 과제'로 정반대 의미. 'challenge'≠'simple assignment', 'not an easy task'≠'anyone can complete quickly'","translation":"그것은 누구나 빨리 완수할 수 있는 간단한 과제이다"},{"text":"it demands work, not something straightforward","isCorrect":false,"explanation":"올바른 paraphrasing — 'challenge'='demands work', 'easy task'='something straightforward', 도전적임을 표현","translation":"그것은 간단한 것이 아니라 작업을 요구한다"},{"text":"it requires effort instead of being effortless","isCorrect":false,"explanation":"올바른 paraphrasing — 'challenge'='requires effort', 'not an easy task'='instead of being effortless', 노력이 필요함 vs 쉬움의 대조","translation":"그것은 수월한 것이 아니라 노력을 요구한다"},{"text":"it presents a difficulty rather than being simple","isCorrect":false,"explanation":"올바른 paraphrasing — 'challenge'='presents a difficulty', 'not an easy task'='rather than being simple', 대조 구조 유지","translation":"그것은 단순한 것이 아니라 어려움을 제시한다"}],"passage":"And that's what happens, because it's a challenge, not an easy task."},{"questionNumber":1,"sourceQuestion":"5-2번","keyExpression":"is on a different mountain, across the valley from you","questionText":"다음 중 'is on a different mountain, across the valley from you'를 잘못 paraphrasing한 것은?","options":[{"text":"has a perspective from a different circumstance than yours","isCorrect":false,"explanation":"올바른 paraphrasing — 'different mountain'은 다른 상황/경험에서 나온 관점을 은유하며, 'different circumstance'는 이를 직접적으로 표현","translation":"당신과 다른 상황에서 나온 관점을 가지고 있다"},{"text":"stands at the summit observing your struggles from above","isCorrect":true,"explanation":"잘못된 paraphrasing — 지문은 'can't do this by just standing at the top of your mountain'이라고 명시하며, 같은 산 꼭대기에서 내려다보는 것을 부정함. 'different mountain'은 다른 산에 있다는 의미","translation":"정상에 서서 위에서 당신의 고군분투를 관찰한다"},{"text":"maintains a separate position from your personal situation","isCorrect":false,"explanation":"올바른 paraphrasing — 'different mountain'은 상담자가 내담자와 다른 위치/경험을 유지함을 의미하므로, 'separate position'은 적절한 의역","translation":"당신의 개인적 상황과 분리된 위치를 유지한다"},{"text":"does not share identical experiences with you","isCorrect":false,"explanation":"올바른 paraphrasing — 직후 문장 'without identical experiences'와 정확히 일치하는 표현","translation":"당신과 동일한 경험을 공유하지 않는다"},{"text":"occupies a distinct vantage point separate from yours","isCorrect":false,"explanation":"올바른 paraphrasing — 'across the valley'는 물리적·경험적 거리를 나타내며, 'distinct vantage point'는 다른 관점/위치를 의미","translation":"당신과 분리된 독특한 유리한 지점을 차지한다"}],"passage":"A counselor can't do this by just standing at the top of your mountain and looking down. That's why you go to someone who is on a different mountain, across the valley from you."},{"questionNumber":2,"sourceQuestion":"5-2번","keyExpression":"offer you valuable advice and support without identical experiences","questionText":"다음 중 'offer you valuable advice and support without identical experiences'를 잘못 paraphrasing한 것은?","options":[{"text":"deliver effective assistance even though their journey differs from yours","isCorrect":false,"explanation":"올바른 paraphrasing — 'without identical experiences'를 'even though their journey differs'로 양보 표현하며, 'valuable support'는 'effective assistance'와 유사","translation":"그들의 여정이 당신과 다름에도 효과적인 도움을 전달한다"},{"text":"contribute useful insights though not having walked the same path","isCorrect":false,"explanation":"올바른 paraphrasing — 'not having walked the same path'는 'without identical experiences'의 은유적 표현이며, 'valuable advice'는 'useful insights'로 적절히 대체","translation":"같은 길을 걸어보지 않았음에도 유용한 통찰을 기여한다"},{"text":"supply meaningful recommendations regardless of lacking matching life events","isCorrect":false,"explanation":"올바른 paraphrasing — 'without'을 'regardless of lacking'으로, 'identical experiences'를 'matching life events'로 적절히 변환","translation":"일치하는 인생 사건이 부족함에도 의미 있는 권고를 제공한다"},{"text":"provide helpful guidance despite not having the same personal background","isCorrect":false,"explanation":"올바른 paraphrasing — 'without identical experiences'를 'despite not having the same background'로 정확히 표현하며, 'valuable advice'는 'helpful guidance'와 동의","translation":"같은 개인적 배경을 갖지 않았음에도 도움이 되는 안내를 제공한다"},{"text":"give you useful counsel only after going through similar challenges","isCorrect":true,"explanation":"잘못된 paraphrasing — 'without identical experiences'는 같은 경험 없이도 가능함을 의미하는데, 'only after going through similar challenges'는 반대로 비슷한 경험을 거친 후에만 가능하다는 조건을 붙임","translation":"비슷한 어려움을 겪은 후에만 유용한 조언을 준다"}],"passage":"By being on a different mountain, they can offer you valuable advice and support without identical experiences."},{"questionNumber":3,"sourceQuestion":"5-2번","keyExpression":"spot where people often struggle","questionText":"다음 중 'spot where people often struggle'를 잘못 paraphrasing한 것은?","options":[{"text":"pinpoint locations where people have already succeeded in overcoming obstacles","isCorrect":true,"explanation":"잘못된 paraphrasing — 'struggle'은 어려움을 겪는 것인데, 'succeeded in overcoming'은 이미 극복에 성공했다는 반대 의미. 상담자는 사람들이 힘들어하는 곳을 찾는 것이지 성공한 곳을 찾는 게 아님","translation":"사람들이 이미 장애물을 극복하는 데 성공한 위치들을 정확히 찾아낸다"},{"text":"detect areas where most individuals repeatedly experience hardship","isCorrect":false,"explanation":"올바른 paraphrasing — 'spot'을 'detect'로, 'often'을 'repeatedly'로, 'struggle'을 'experience hardship'으로 변환하며 의미 유지","translation":"대부분의 개인들이 반복적으로 고난을 경험하는 영역을 탐지한다"},{"text":"identify the points at which individuals commonly face difficulties","isCorrect":false,"explanation":"올바른 paraphrasing — 'spot'을 'identify'로, 'struggle'을 'face difficulties'로 자연스럽게 변환","translation":"개인들이 흔히 어려움에 직면하는 지점들을 식별한다"},{"text":"recognize the stages where clients typically encounter challenges","isCorrect":false,"explanation":"올바른 paraphrasing — 'spot'을 'recognize'로, 'people'을 문맥상 'clients'로, 'struggle'을 'encounter challenges'로 적절히 변환","translation":"내담자들이 전형적으로 도전에 마주치는 단계들을 인지한다"},{"text":"notice the sections where people frequently get stuck or confused","isCorrect":false,"explanation":"올바른 paraphrasing — 'struggle'을 'get stuck or confused'로 구체화하며, 'spot'을 'notice'로 자연스럽게 변환","translation":"사람들이 자주 막히거나 혼란스러워하는 부분들을 알아차린다"}],"passage":"The counselor's job is to spot where people often struggle, and offer direction to help you avoid getting hurt."},{"questionNumber":4,"sourceQuestion":"5-2번","keyExpression":"Overcoming tough experiences is like climbing a really difficult, steep mountain","questionText":"다음 중 'Overcoming tough experiences is like climbing a really difficult, steep mountain'를 잘못 paraphrasing한 것은?","options":[{"text":"Navigating adversity is analogous to ascending a demanding, precipitous terrain","isCorrect":false,"explanation":"올바른 paraphrasing — 'overcoming tough experiences'를 'navigating adversity'로, 'difficult, steep'을 'demanding, precipitous'로 격식 높은 어휘로 변환","translation":"역경을 헤쳐나가는 것은 까다롭고 가파른 지형을 오르는 것과 유사하다"},{"text":"Conquering difficult situations is comparable to scaling an arduous incline","isCorrect":false,"explanation":"올바른 paraphrasing — 'overcoming'을 'conquering'으로, 'really difficult, steep'을 'arduous incline'로 압축하며 의미 보존","translation":"어려운 상황들을 정복하는 것은 힘든 경사를 오르는 것과 비교될 수 있다"},{"text":"Working through challenging experiences mirrors the process of reaching a summit effortlessly","isCorrect":true,"explanation":"잘못된 paraphrasing — 'difficult, steep mountain'은 힘든 과정을 강조하는데, 'effortlessly'(손쉽게)는 정반대 의미. 원문은 어려움의 은유이지 쉬움이 아님","translation":"도전적인 경험들을 해결하는 것은 손쉽게 정상에 도달하는 과정을 반영한다"},{"text":"Surmounting hard trials can be likened to tackling a formidable, abrupt peak","isCorrect":false,"explanation":"올바른 paraphrasing — 'overcoming'을 'surmounting'으로, 'tough experiences'를 'hard trials'로, 'steep'을 'abrupt'로 변환하며 은유 구조 유지","translation":"힘든 시련들을 극복하는 것은 만만치 않고 급격한 봉우리를 다루는 것에 비유될 수 있다"},{"text":"Getting through hardships resembles ascending a challenging, vertical slope","isCorrect":false,"explanation":"올바른 paraphrasing — 'overcoming'을 'getting through'로, 'tough experiences'를 'hardships'로, 'climbing'을 'ascending'으로 적절히 변환하며 은유 유지","translation":"역경을 헤쳐나가는 것은 도전적이고 수직인 비탈을 오르는 것과 닮았다"}],"passage":"Overcoming tough experiences is like climbing a really difficult, steep mountain."},{"questionNumber":5,"sourceQuestion":"5-2번","keyExpression":"offer direction to help you avoid getting hurt","questionText":"다음 중 'offer direction to help you avoid getting hurt'를 잘못 paraphrasing한 것은?","options":[{"text":"give instructions that ensure you experience every difficulty firsthand","isCorrect":true,"explanation":"잘못된 paraphrasing — 'avoid getting hurt'는 피해를 피하게 돕는 것인데, 'experience every difficulty firsthand'는 모든 어려움을 직접 경험하게 한다는 반대 의미","translation":"당신이 모든 어려움을 직접 경험하도록 보장하는 지시를 제공한다"},{"text":"present counsel to support you in evading damage","isCorrect":false,"explanation":"올바른 paraphrasing — 'offer'를 'present'로, 'direction'을 'counsel'로, 'avoid getting hurt'를 'evading damage'로 자연스럽게 변환","translation":"피해를 회피하는 데 당신을 지원하기 위한 상담을 제시한다"},{"text":"supply advice to enable you to sidestep potential injury","isCorrect":false,"explanation":"올바른 paraphrasing — 'direction'을 'advice'로, 'avoid'를 'sidestep'으로, 'getting hurt'를 'potential injury'로 적절히 변환","translation":"잠재적 상처를 피해가도록 당신이 할 수 있게 조언을 제공한다"},{"text":"provide guidance to assist you in preventing harm","isCorrect":false,"explanation":"올바른 paraphrasing — 'offer direction'을 'provide guidance'로, 'avoid getting hurt'를 'preventing harm'으로 명확히 변환","translation":"피해를 예방하는 데 당신을 돕기 위한 안내를 제공한다"},{"text":"deliver recommendations aimed at helping you steer clear of harm","isCorrect":false,"explanation":"올바른 paraphrasing — 'direction'을 'recommendations'로, 'avoid'를 'steer clear of'(관용표현)로 효과적으로 변환","translation":"피해를 피하도록 당신을 돕는 것을 목표로 한 권고사항을 전달한다"}],"passage":"The counselor's job is to spot where people often struggle, and offer direction to help you avoid getting hurt."},{"questionNumber":6,"sourceQuestion":"5-2번","keyExpression":"can't do this by just standing at the top of your mountain and looking down","questionText":"다음 중 'can't do this by just standing at the top of your mountain and looking down'를 잘못 paraphrasing한 것은?","options":[{"text":"cannot accomplish this merely by positioning themselves at your summit and observing from above","isCorrect":false,"explanation":"올바른 paraphrasing — 'just standing'을 'merely positioning'으로, 'looking down'을 'observing from above'로 정확히 변환","translation":"단지 당신의 정상에 자리잡고 위에서 관찰함으로써는 이를 달성할 수 없다"},{"text":"fails to do this through merely being stationed at your crest and viewing below","isCorrect":false,"explanation":"올바른 paraphrasing — 'can't'를 'fails to'로, 'standing'을 'being stationed'으로, 'top'을 'crest'로 변환하며 부정 의미 보존","translation":"단지 당신의 정점에 배치되어 아래를 바라봄으로써는 이를 하는 데 실패한다"},{"text":"cannot succeed in this by only occupying your mountaintop and peering down","isCorrect":false,"explanation":"올바른 paraphrasing — 'do this'를 'succeed in this'로, 'standing at the top'을 'occupying your mountaintop'으로 변환하며 의미 유지","translation":"오직 당신의 산꼭대기를 차지하고 아래를 들여다봄으로써는 이에 성공할 수 없다"},{"text":"effectively helps by staying at the summit of your personal challenge and supervising","isCorrect":true,"explanation":"잘못된 paraphrasing — 원문은 'can't do this'로 부정하는데, 'effectively helps'는 긍정적 효과를 나타냄. 지문은 같은 산 꼭대기에서 내려다보는 것만으로는 안 된다는 의미","translation":"당신의 개인적 도전의 정상에 머물며 감독함으로써 효과적으로 돕는다"},{"text":"is unable to achieve this by simply remaining at your peak and gazing downward","isCorrect":false,"explanation":"올바른 paraphrasing — 'can't'를 'is unable to'로, 'just standing'을 'simply remaining'으로, 'looking down'을 'gazing downward'로 자연스럽게 변환","translation":"단순히 당신의 봉우리에 머물러 아래를 응시함으로써는 이를 달성할 수 없다"}],"passage":"A counselor can't do this by just standing at the top of your mountain and looking down. That's why you go to someone who is on a different mountain, across the valley from you."}]};
const QS = CONFIG.questions;
const TOTAL = QS.length;

function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML;}

const answers={};// idx -> {selected, isCorrect}
let showingPassage=false;

function setH(t,s){document.getElementById('hTitle').textContent=t;document.getElementById('hSub').textContent=s;}

function showIndex(){
  setH(CONFIG.title,'Paraphrasing 표현 테스트');
  const done=Object.keys(answers).length;
  const correctCount=Object.values(answers).filter(a=>a.isCorrect).length;
  const pct=TOTAL>0?Math.round(done/TOTAL*100):0;
  const chips=QS.map(function(q,i){
    const a=answers[i];
    let cls='unanswered';
    if(a){cls=a.isCorrect?'correct':'wrong';}
    return '<div class="q-chip '+cls+'" onclick="showQ('+i+')">'+(i+1)+'</div>';
  }).join('');
  document.getElementById('app').innerHTML=
    '<div style="text-align:center;padding:16px 0;animation:fadeIn .4s">'+
    '<div style="font-size:3rem;margin-bottom:8px">📝</div>'+
    '<h2 style="font-size:1.2rem;font-weight:700;color:#1f2937;margin-bottom:4px">Paraphrasing 테스트</h2>'+
    '<p style="color:#6b7280;font-size:.85rem;margin-bottom:16px">총 '+TOTAL+'문제 · '+done+'문제 풀이됨 · '+correctCount+'문제 정답</p>'+
    '<div class="progress-bar"><div class="progress-fill" style="width:'+pct+'%"></div></div>'+
    '</div>'+
    '<div class="q-grid">'+chips+'</div>'+
    (done===TOTAL?'<div style="text-align:center;margin-top:20px"><button class="btn btn-primary btn-block" onclick="showResult()">🏆 결과 보기</button></div>':'');
}

function showQ(idx){
  if(idx<0||idx>=TOTAL)return;
  showingPassage=false;
  const q=QS[idx];
  if(!q||!q.options)return; // null guard
  setH((idx+1)+'/'+TOTAL,q.sourceQuestion||'');
  const already=answers[idx];
  const pct=Math.round((idx+1)/TOTAL*100);

  if(already){
    showAnswered(idx);
    return;
  }

  const shuffled=q.options;
  const optsHTML=shuffled.map(function(opt,i){
    return '<button class="option-btn" onclick="pick('+idx+','+i+')"><span class="num">'+String.fromCharCode(9312+i)+'</span><span>'+esc(opt.text)+'</span></button>';
  }).join('');

  document.getElementById('app').innerHTML=
    '<div style="animation:fadeIn .3s">'+
    '<div class="q-counter">'+(idx+1)+' / '+TOTAL+'</div>'+
    '<div class="progress-bar"><div class="progress-fill" style="width:'+pct+'%"></div></div>'+
    '<div><span class="source-badge">'+esc(q.sourceQuestion)+'</span></div>'+
    '<div class="key-box"><div class="expr">“'+esc(q.keyExpression)+'”</div><div class="qtext">위 표현을 <span class="hl">잘못</span> paraphrasing 한 것은?</div></div>'+
    '<div style="text-align:center"><button class="show-passage-btn" onclick="toggleP('+idx+')">📖 지문 보기</button></div>'+
    '<div id="pArea"></div>'+
    '<div class="options" id="opts">'+optsHTML+'</div>'+
    '<div id="fbArea"></div>'+
    '<div class="nav-bar">'+
      '<button class="nav-btn prev" onclick="showQ('+(idx-1)+')"'+(idx<=0?' disabled':'')+'>← 이전문제</button>'+
      '<button class="nav-btn home" onclick="showIndex()">목록</button>'+
      '<button class="nav-btn next" onclick="showQ('+(idx+1)+')"'+(idx>=TOTAL-1?' disabled':'')+'>다음문제 →</button>'+
    '</div>'+
    '</div>';

  window._currentIdx=idx;
}

function toggleP(idx){
  const area=document.getElementById('pArea');
  if(!area)return;
  showingPassage=!showingPassage;
  area.innerHTML=showingPassage?'<div class="passage-box" style="animation:fadeIn .3s">'+esc(QS[idx].passage)+'</div>':'';
}

function pick(idx,optIdx){
  if(answers[idx])return;
  const q=QS[idx];
  if(!q||!q.options||!q.options[optIdx])return; // null guard
  const selected=q.options[optIdx];
  const isCorrect=!!selected.isCorrect;
  const correctOpt=q.options.find(function(o){return o.isCorrect;})||q.options[0];
  const correctIdx=q.options.indexOf(correctOpt);

  answers[idx]={selected:optIdx,isCorrect:isCorrect};

  var btns=document.querySelectorAll('.option-btn');
  btns.forEach(function(btn,i){
    btn.disabled=true;
    btn.onclick=null;
    if(i===correctIdx)btn.classList.add(isCorrect?'correct':'reveal');
    else if(i===optIdx&&!isCorrect)btn.classList.add('wrong');
  });

  var fbHTML=isCorrect
    ?'<div class="feedback correct-fb">정답입니다! ✅</div>'
    :'<div class="feedback wrong-fb">오답입니다 ❌ — 정답: <strong>'+esc(correctOpt.text)+'</strong></div>';

  var exHTML=q.options.map(function(opt,i){
    var mark=opt.isCorrect?'<span class="tag-w">[오답 — 잘못된 paraphrasing]</span>':'<span class="tag-o">[올바른 paraphrasing]</span>';
    var trans=opt.translation||opt.explanation||'';
    return '<div class="ex-item"><strong>'+String.fromCharCode(9312+i)+' '+esc(opt.text)+'</strong> '+mark+'<br><span class="trans">→ '+esc(trans)+'</span></div>';
  }).join('');

  document.getElementById('fbArea').innerHTML=fbHTML+'<div class="explain-box"><div class="ex-title">📝 보기 해석</div>'+exHTML+'</div>';
}

function showAnswered(idx){
  var q=QS[idx];
  var a=answers[idx];
  if(!q||!q.options||!a)return; // null guard
  var correctOpt=q.options.find(function(o){return o.isCorrect;})||q.options[0];
  var correctIdx=q.options.indexOf(correctOpt);
  var pct=Math.round((idx+1)/TOTAL*100);

  var optsHTML=q.options.map(function(opt,i){
    var cls='';
    if(i===correctIdx)cls=a.isCorrect?'correct':'reveal';
    else if(i===a.selected&&!a.isCorrect)cls='wrong';
    return '<button class="option-btn '+cls+'" disabled><span class="num">'+String.fromCharCode(9312+i)+'</span><span>'+esc(opt.text)+'</span></button>';
  }).join('');

  var fbHTML=a.isCorrect
    ?'<div class="feedback correct-fb">정답입니다! ✅</div>'
    :'<div class="feedback wrong-fb">오답입니다 ❌ — 정답: <strong>'+esc(correctOpt.text)+'</strong></div>';

  var exHTML=q.options.map(function(opt,i){
    var mark=opt.isCorrect?'<span class="tag-w">[오답 — 잘못된 paraphrasing]</span>':'<span class="tag-o">[올바른 paraphrasing]</span>';
    var trans=opt.translation||opt.explanation||'';
    return '<div class="ex-item"><strong>'+String.fromCharCode(9312+i)+' '+esc(opt.text)+'</strong> '+mark+'<br><span class="trans">→ '+esc(trans)+'</span></div>';
  }).join('');

  document.getElementById('app').innerHTML=
    '<div style="animation:fadeIn .3s">'+
    '<div class="q-counter">'+(idx+1)+' / '+TOTAL+'</div>'+
    '<div class="progress-bar"><div class="progress-fill" style="width:'+pct+'%"></div></div>'+
    '<div><span class="source-badge">'+esc(q.sourceQuestion)+'</span></div>'+
    '<div class="key-box"><div class="expr">“'+esc(q.keyExpression)+'”</div><div class="qtext">위 표현을 <span class="hl">잘못</span> paraphrasing 한 것은?</div></div>'+
    (q.passage?'<div class="passage-box">'+esc(q.passage)+'</div>':'')+
    '<div class="options">'+optsHTML+'</div>'+
    fbHTML+
    '<div class="explain-box"><div class="ex-title">📝 보기 해석</div>'+exHTML+'</div>'+
    '<div class="nav-bar">'+
      '<button class="nav-btn prev" onclick="showQ('+(idx-1)+')"'+(idx<=0?' disabled':'')+'>← 이전문제</button>'+
      '<button class="nav-btn home" onclick="showIndex()">목록</button>'+
      '<button class="nav-btn next" onclick="showQ('+(idx+1)+')"'+(idx>=TOTAL-1?' disabled':'')+'>다음문제 →</button>'+
    '</div>'+
    '</div>';
}

function showResult(){
  var correct=Object.values(answers).filter(function(a){return a.isCorrect;}).length;
  var wrong=TOTAL-correct;
  var pct=Math.round(correct/TOTAL*100);
  var passed=pct>=CONFIG.passThreshold;
  setH('테스트 완료!','성취도 '+pct+'%');
  if(passed)showConfetti();
  document.getElementById('app').innerHTML=
    '<div style="animation:fadeIn .5s;text-align:center">'+
    '<div style="font-size:4rem;margin:12px 0">'+(passed?'🎉':'💪')+'</div>'+
    '<h2 style="font-size:1.4rem;font-weight:800;color:#1f2937;margin-bottom:8px">'+(passed?'축하합니다!':'다시 도전해보세요!')+'</h2>'+
    '<div class="score-circle '+(passed?'pass':'fail')+'">'+pct+'%</div>'+
    '<div class="summary-card"><h3>최종 결과</h3>'+
      '<div class="stat-row"><span class="stat-label">총 문항 수</span><span class="stat-value">'+TOTAL+'개</span></div>'+
      '<div class="stat-row"><span class="stat-label">정답</span><span class="stat-value pass">'+correct+'개</span></div>'+
      '<div class="stat-row"><span class="stat-label">오답</span><span class="stat-value fail">'+wrong+'개</span></div>'+
      '<div class="stat-row"><span class="stat-label">성취도</span><span class="stat-value '+(passed?'pass':'fail')+'">'+pct+'%</span></div>'+
    '</div>'+
    '<div style="margin-top:20px"><button class="btn btn-primary btn-block" onclick="resetAll()">처음부터 다시 풀기</button></div>'+
    '<div style="margin-top:10px"><button class="nav-btn home" onclick="showIndex()" style="width:100%;padding:12px">문제 목록 보기</button></div>'+
    '</div>';
}

function resetAll(){for(var k in answers)delete answers[k];showIndex();}

function showConfetti(){
  var c=document.createElement('div');c.className='confetti-container';
  var colors=['#1e3a5f','#3b82f6','#f59e0b','#10b981','#ef4444','#ec4899','#8b5cf6'];
  for(var i=0;i<25;i++){var p=document.createElement('div');p.className='confetti-piece';p.style.left=Math.random()*100+'%';p.style.background=colors[Math.floor(Math.random()*colors.length)];p.style.animationDelay=(Math.random()*2)+'s';p.style.animationDuration=(2+Math.random()*2)+'s';var sz=6+Math.random()*8;p.style.width=sz+'px';p.style.height=sz+'px';p.style.borderRadius=Math.random()>.5?'50%':'2px';c.appendChild(p);}

}
