s enjoy being surprised by clever promotions","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: fool의 부정적 함의를 긍정적 surprise로 대체하고 소비자가 그것을 즐긴다고 왜곡","translation":"오늘날 소비자들은 영리한 판촉에 놀라는 것을 즐긴다"},{"text":"the era of deceiving buyers through advertising is over","isCorrect":true,"optionType":"correct","explanation":"올바름: Gone are the days=is over, fool=deceiving, consumer=buyers로 대체하여 시대 종료 의미 유지","translation":"광고를 통해 구매자를 속이던 시대는 끝났다"},{"text":"promotions that trick consumers are becoming more popular","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: 소비자를 속이는 판촉이 사라졌다는 원문과 정반대로 더 인기를 끌고 있다고 서술 — 인과 역전","translation":"소비자를 속이는 판촉이 점점 더 인기를 얻고 있다"}],"sourceQuestion":"5번 지문"},{"keyExpression":"a caring relationship is a crucial basis from which to begin","passage":"If we are trying to motivate others, a caring relationship is a crucial basis from which to begin.","passageTranslation":"우리가 다른 사람들에게 동기를 부여하려 할 때, 배려하는 관계가 시작의 핵심적인 토대이다.","qType":"correct","questionText":"'a caring relationship is a crucial basis from which to begin'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"genuine concern for others is the vital groundwork","isCorrect":true,"optionType":"correct","explanation":"올바름: caring relationship의 본질을 genuine concern for others로, basis=groundwork로 재구성하여 의미 유지","translation":"타인에 대한 진정한 관심이 핵심 토대이다"},{"text":"a warm connection forms the necessary foundation","isCorrect":true,"optionType":"correct","explanation":"올바름: caring=warm, crucial basis=necessary foundation으로 핵심 의미 보존","translation":"따뜻한 연결이 필요한 토대를 형성한다"},{"text":"strict discipline is the most effective motivational tool","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: 배려 관계가 엄격한 훈육으로 대체되어 지문의 핵심 주장이 왜곡됨","translation":"엄격한 규율이 가장 효과적인 동기부여 도구이다"},{"text":"a caring relationship is merely a secondary factor","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: crucial(핵심적인)이 merely secondary(단순한 부차적)로 바뀌어 중요성이 완전히 반전됨","translation":"배려하는 관계는 단지 부차적인 요소일 뿐이다"}],"sourceQuestion":"3번 지문"},{"keyExpression":"enhance a sense of connectedness to others","passage":"And when we are trying to motivate ourselves, doing things to enhance a sense of connectedness to others can be crucial to long-term persistence.","passageTranslation":"그리고 우리가 스스로에게 동기를 부여하려 할 때, 다른 사람들과의 연결감을 높이기 위한 행동을 하는 것이 장기적인 지속성에 결정적일 수 있다.","qType":"correct","questionText":"'enhance a sense of connectedness to others'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"reduce one's dependence on social interactions","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: enhance→reduce로 반의어 대체하고 connectedness→dependence on social interactions로 왜곡해 의미 역전됨","translation":"사회적 상호작용에 대한 의존성을 줄이다"},{"text":"limit emotional attachment to close friends only","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: enhance→limit으로 반의어 대체하고 others를 close friends only로 좁혀 범위를 왜곡함","translation":"친한 친구들만을 향한 정서적 애착을 제한하다"},{"text":"deepen one's emotional ties with other people","isCorrect":true,"optionType":"correct","explanation":"올바름: enhance→deepen, sense of connectedness→emotional ties, others→other people으로 환언하여 원문 함의 유지","translation":"다른 사람들과의 정서적 유대를 깊게 하다"},{"text":"build up a greater feeling of social closeness","isCorrect":true,"optionType":"correct","explanation":"올바름: enhance→build up, connectedness→social closeness를 구체적 표현으로 전환하며 의미 보존","translation":"더 큰 사회적 친밀감을 쌓아가다"}],"sourceQuestion":"2번 지문"},{"keyExpression":"the possibility of increasing sales goes up","passage":"By doing so, the possibility of increasing sales goes up.","passageTranslation":"그렇게 함으로써 판매를 늘릴 가능성이 높아진다.","qType":"correct","questionText":"'the possibility of increasing sales goes up'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"the risk of declining sales becomes unavoidable","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: increasing→declining으로 반의어 대체, goes up→unavoidable로 인과 역전","translation":"판매 감소의 위험이 불가피해진다"},{"text":"the certainty of losing customers is reduced","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: possibility of increasing=긍정 가능성 증가인데 losing customers=부정 결과로 방향 왜곡","translation":"고객을 잃을 확실성이 줄어든다"},{"text":"prospects for improved sales performance rise accordingly","isCorrect":true,"optionType":"correct","explanation":"올바름: possibility=prospects, increasing=improved, goes up=rise로 핵심 의미 보존","translation":"향상된 판매 실적에 대한 전망이 그에 따라 높아진다"},{"text":"there is a higher likelihood that more products will be sold","isCorrect":true,"optionType":"correct","explanation":"올바름: possibility=likelihood, increasing sales=more products sold로 추상→구체 전환","translation":"더 많은 제품이 판매될 가능성이 높아진다"}],"sourceQuestion":"4번 지문"},{"keyExpression":"marketers must know where the interested consumers are, and how to reach them","passage":"Therefore, marketers must know where the interested consumers are, and how to reach them.","passageTranslation":"따라서 마케터는 관심 있는 소비자들이 어디에 있는지, 그리고 어떻게 그들에게 도달할 수 있는지 알아야 한다.","qType":"correct","questionText":"'marketers must know where the interested consumers are, and how to reach them'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"understanding where likely customers gather and how to engage them is essential","isCorrect":true,"optionType":"correct","explanation":"올바름: must know=is essential, interested consumers=likely customers, reach=engage로 대체하여 필수 지식 의미 유지","translation":"잠재 고객이 어디에 모이는지, 그리고 어떻게 그들을 참여시킬지 이해하는 것이 필수적이다"},{"text":"businesses should wait for consumers to discover their products naturally","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: must know how to reach them(적극적 접근)을 wait for consumers to discover(수동적 대기)로 인과 역전 — 능동/수동 전략 혼동","translation":"기업은 소비자들이 자연스럽게 제품을 발견할 때까지 기다려야 한다"},{"text":"sellers need to locate their target audience and find ways to contact them","isCorrect":true,"optionType":"correct","explanation":"올바름: marketers=sellers, where they are=locate, how to reach=find ways to contact로 대체하여 전략적 접근 의미 유지","translation":"판매자는 목표 대상을 찾아내고 연락할 방법을 알아야 한다"},{"text":"marketers should focus only on increasing production to meet growing demand","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: where consumers are/how to reach them이라는 소통 전략을 생산 증대 전략으로 완전히 대체하여 주제 왜곡","translation":"마케터는 늘어나는 수요를 충족하기 위해 생산 증가에만 집중해야 한다"}],"sourceQuestion":"5번 지문"},{"keyExpression":"We can't force people to think one way or another","passage":"We can't force people to think one way or another, and the clever marketer knows that promotion is used to provide information in the most clear, honest, and simple fashion possible.","passageTranslation":"우리는 사람들이 어떤 방식으로든 생각하도록 강요할 수 없으며, 영리한 마케터는 판촉이 가능한 한 가장 명확하고 정직하며 단순한 방식으로 정보를 제공하는 데 사용된다는 것을 알고 있다.","qType":"correct","questionText":"'We can't force people to think one way or another'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"no one can compel buyers to hold a particular point of view","isCorrect":true,"optionType":"correct","explanation":"올바름: can't force=no one can compel, people=buyers, think one way or another=hold a particular point of view로 대체하여 동일 제한 의미 유지","translation":"누구도 구매자가 특정 관점을 갖도록 강요할 수 없다"},{"text":"training programs help people adopt the correct way of thinking","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: can't force=help adopt (가능하다는 뜻으로 역전), 마케팅 맥락을 training programs로 대체하고 correct way 삽입으로 의미 왜곡","translation":"훈련 프로그램은 사람들이 올바른 사고방식을 채택하도록 도와준다"},{"text":"marketers can easily shape how consumers perceive any product","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: can't force(강요할 수 없다)를 can easily shape(쉽게 형성할 수 있다)로 반의어 대체하여 정반대 주장 생성","translation":"마케터는 소비자가 어떤 제품을 어떻게 인식하는지 쉽게 형성할 수 있다"},{"text":"consumers ultimately make up their own minds regardless of pressure","isCorrect":true,"optionType":"correct","explanation":"올바름: can't force to think=make up their own minds, one way or another=regardless of pressure로 함의 재구성하여 자율적 판단 의미 보존","translation":"소비자들은 결국 압박에 상관없이 스스로 생각을 결정한다"}],"sourceQuestion":"5번 지문"},{"keyExpression":"be there as a support for others as they take on challenges","passage":"So exercise with a friend, call someone when you have a difficult decision to make, and be there as a support for others as they take on challenges.","passageTranslation":"그러므로 친구와 함께 운동하고, 어려운 결정을 내려야 할 때 누군가에게 전화하며, 다른 사람들이 도전에 직면할 때 지원으로서 곁에 있어라.","qType":"correct","questionText":"'be there as a support for others as they take on challenges'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"assign challenges to others to test their abilities","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: 지원자의 역할이 도전을 부여하는 평가자의 역할로 왜곡되어 관계가 역전됨","translation":"다른 사람들의 능력을 시험하기 위해 도전을 부과하는"},{"text":"step aside and let others handle their own problems","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: be there as a support(지원으로 곁에 있는)가 step aside(물러서는)로 의미가 완전히 반전됨","translation":"물러서서 다른 사람들이 스스로 문제를 해결하도록 두는"},{"text":"stand by others when they attempt tough tasks","isCorrect":true,"optionType":"correct","explanation":"올바름: be there=stand by, take on challenges=attempt tough tasks로 행동적 지원의 핵심 의미 보존","translation":"다른 사람들이 어려운 과제를 시도할 때 곁에 있어 주는"},{"text":"offer backing to people when they face difficulties","isCorrect":true,"optionType":"correct","explanation":"올바름: be there as a support=offer backing, take on challenges=face difficulties로 구체적 행위의 의미 유지","translation":"사람들이 어려움에 직면할 때 지원을 제공하는"},{"text":"serve as a source of encouragement for those overcoming obstacles","isCorrect":true,"optionType":"correct","explanation":"올바름: support=encouragement, take on challenges=overcoming obstacles로 추상적 개념을 구체화하여 의미 유지","translation":"장애물을 극복하는 사람들에게 격려의 원천이 되는"}],"sourceQuestion":"3번 지문"},{"keyExpression":"a caring relationship is a crucial basis from which to begin","passage":"If we are trying to motivate others, a caring relationship is a crucial basis from which to begin.","passageTranslation":"우리가 다른 사람들에게 동기를 부여하려 할 때, 배려하는 관계가 시작의 핵심적인 토대이다.","qType":"correct","questionText":"'a caring relationship is a crucial basis from which to begin'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"a supportive bond serves as the essential starting point","isCorrect":true,"optionType":"correct","explanation":"올바름: caring relationship=supportive bond, crucial basis=essential starting point로 의미 완전 유지","translation":"지지적인 유대가 필수적인 출발점 역할을 한다"},{"text":"strict discipline is the most effective motivational tool","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: 배려 관계가 엄격한 훈육으로 대체되어 지문의 핵심 주장이 왜곡됨","translation":"엄격한 규율이 가장 효과적인 동기부여 도구이다"},{"text":"a caring relationship is merely a secondary factor","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: crucial(핵심적인)이 merely secondary(단순한 부차적)로 바뀌어 중요성이 완전히 반전됨","translation":"배려하는 관계는 단지 부차적인 요소일 뿐이다"}],"sourceQuestion":"3번 지문"},{"keyExpression":"the possibility of increasing sales goes up","passage":"By doing so, the possibility of increasing sales goes up.","passageTranslation":"그렇게 함으로써 매출이 증가할 가능성이 높아진다.","qType":"correct","questionText":"'the possibility of increasing sales goes up'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"the chance of boosting revenue becomes higher","isCorrect":true,"optionType":"correct","explanation":"올바름: possibility=chance, increasing sales=boosting revenue로 대체하여 동일 인과 관계 유지","translation":"수익을 높일 가능성이 커진다"},{"text":"prospects for improved sales performance rise","isCorrect":true,"optionType":"correct","explanation":"올바름: possibility=prospects, increasing sales=improved sales performance로 추상→구체 전환","translation":"판매 실적 향상의 전망이 높아진다"},{"text":"the number of marketing campaigns goes down","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: goes up을 goes down으로 반의어 대체하고 주체를 sales에서 campaigns로 바꿔 정반대 의미 생성","translation":"마케팅 캠페인의 수가 줄어든다"},{"text":"the risk of losing customers decreases sharply","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: 판매 증가 가능성 상승을 고객 손실 위험 감소로 대체 — 논리적으로 유사해 보이지만 원문에 없는 위험 개념을 삽입하여 의미 왜곡","translation":"고객을 잃을 위험이 급격히 감소한다"}],"sourceQuestion":"5번 지문"},{"keyExpression":"promote that good or service in a way that makes the value clear to the consumer","passage":"their goal is to identify the consumers who are most likely to appreciate a good or service, and to promote that good or service in a way that makes the value clear to the consumer.","passageTranslation":"그들의 목표는 상품이나 서비스를 가장 높이 평가할 가능성이 높은 소비자를 파악하고, 그 가치를 소비자에게 명확하게 전달하는 방식으로 그 상품이나 서비스를 홍보하는 것이다.","qType":"correct","questionText":"'promote that good or service in a way that makes the value clear to the consumer'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"hide the true cost of a product from potential consumers","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: makes the value clear=가치를 명확히 하는 것인데 hide the true cost=비용을 숨기는 반의 행위","translation":"잠재 소비자에게 제품의 실제 비용을 숨기다"},{"text":"market the offering in a manner that highlights its benefits for customers","isCorrect":true,"optionType":"correct","explanation":"올바름: promote=market, makes the value clear=highlights its benefits, consumer=customers로 의미 재구성","translation":"고객에게 혜택을 강조하는 방식으로 제품을 마케팅하다"},{"text":"sell products only to consumers who already know their value","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: makes the value clear=가치를 알려주는 행위인데 already know=이미 안다는 전제로 마케팅 목적 무효화","translation":"이미 가치를 알고 있는 소비자에게만 제품을 판매하다"}],"sourceQuestion":"4번 지문"},{"keyExpression":"provide information in the most clear, honest, and simple fashion possible","passage":"the clever marketer knows that promotion is used to provide information in the most clear, honest, and simple fashion possible.","passageTranslation":"영리한 마케터는 판촉이 가능한 한 가장 명확하고 정직하며 단순한 방식으로 정보를 제공하는 데 사용된다는 것을 안다.","qType":"correct","questionText":"'provide information in the most clear, honest, and simple fashion possible'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"share only the most impressive and dramatic facts","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: honest/simple을 impressive/dramatic으로 대체하여 과장·선별 의도를 삽입 — 원문의 정직하고 단순한 전달과 반대 의미","translation":"가장 인상적이고 극적인 사실만 공유하다"},{"text":"hide unnecessary details to keep consumers interested","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: 정보를 완전히 제공하라는 원문과 달리 정보를 감추는 행위를 긍정적으로 서술 — 인과 역전","translation":"소비자의 관심을 유지하기 위해 불필요한 세부 사항을 숨기다"},{"text":"present content without confusion or deception","isCorrect":true,"optionType":"correct","explanation":"올바름: clear/honest의 부정적 반의어(confusion, deception)를 부정함으로써 동일 함의 재구성","translation":"혼란이나 기만 없이 내용을 제시하다"}],"sourceQuestion":"5번 지문"},{"keyExpression":"the possibility of increasing sales goes up","passage":"By doing so, the possibility of increasing sales goes up.","passageTranslation":"그렇게 함으로써 판매를 늘릴 가능성이 높아진다.","qType":"correct","questionText":"'the possibility of increasing sales goes up'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"the certainty of losing customers is reduced","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: possibility of increasing=긍정 가능성 증가인데 losing customers=부정 결과로 방향 왜곡","translation":"고객을 잃을 확실성이 줄어든다"},{"text":"the chance of boosting revenue becomes greater","isCorrect":true,"optionType":"correct","explanation":"올바름: possibility=chance, increasing=boosting, goes up=becomes greater로 인과 구조 유지","translation":"수익을 높일 가능성이 더 커진다"},{"text":"the risk of declining sales becomes unavoidable","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: increasing→declining으로 반의어 대체, goes up→unavoidable로 인과 역전","translation":"판매 감소의 위험이 불가피해진다"}],"sourceQuestion":"4번 지문"},{"keyExpression":"provide information in the most clear, honest, and simple fashion possible","passage":"the clever marketer knows that promotion is used to provide information in the most clear, honest, and simple fashion possible.","passageTranslation":"영리한 마케터는 판촉이 가능한 한 가장 명확하고 정직하며 단순한 방식으로 정보를 제공하는 데 사용된다는 것을 안다.","qType":"correct","questionText":"'provide information in the most clear, honest, and simple fashion possible'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"share only the most impressive and dramatic facts","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: honest/simple을 impressive/dramatic으로 대체하여 과장·선별 의도를 삽입 — 원문의 정직하고 단순한 전달과 반대 의미","translation":"가장 인상적이고 극적인 사실만 공유하다"},{"text":"deliver facts as transparently and plainly as possible","isCorrect":true,"optionType":"correct","explanation":"올바름: fashion=manner로, clear/honest/simple을 transparently/plainly로 바꿔 핵심 의미 유지","translation":"가능한 한 투명하고 명확하게 사실을 전달하다"},{"text":"hide unnecessary details to keep consumers interested","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: 정보를 완전히 제공하라는 원문과 달리 정보를 감추는 행위를 긍정적으로 서술 — 인과 역전","translation":"소비자의 관심을 유지하기 위해 불필요한 세부 사항을 숨기다"}],"sourceQuestion":"5번 지문"},{"keyExpression":"lower their lifetime risk of heart disease or cancer","passage":"Should we begin editing genes in unborn children to lower their lifetime risk of heart disease or cancer?","passageTranslation":"태어나지 않은 아이들의 평생 심장병이나 암 위험을 낮추기 위해 그들의 유전자를 편집하기 시작해야 할까?","qType":"correct","questionText":"'lower their lifetime risk of heart disease or cancer'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"decrease the probability of major disease over one's lifespan","isCorrect":true,"optionType":"correct","explanation":"올바름: lower→decrease, lifetime→over one's lifespan으로 의미 유지하며 구조 변환","translation":"평생에 걸쳐 주요 질병의 확률을 낮추다"},{"text":"increase resistance to minor ailments during childhood","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: lower risk→increase resistance로 반의어 방향, lifetime→childhood로 범위 축소, major→minor로 심각도 왜곡","translation":"어린 시절 경미한 질환에 대한 저항력을 높이다"},{"text":"reduce the chance of developing serious illness throughout life","isCorrect":true,"optionType":"correct","explanation":"올바름: lower→reduce, lifetime risk→chance throughout life, heart disease or cancer→serious illness로 상위 개념화","translation":"평생 동안 심각한 질병에 걸릴 가능성을 줄이다"},{"text":"cut the long-term likelihood of life-threatening conditions","isCorrect":true,"optionType":"correct","explanation":"올바름: lower→cut, lifetime→long-term, heart disease or cancer→life-threatening conditions으로 함축 재구성","translation":"생명을 위협하는 질환의 장기적 가능성을 줄이다"},{"text":"eliminate the possibility of any disease from birth","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: lower(낮추다)를 eliminate(완전 제거)로 과장하고, from birth로 시간적 범위 왜곡","translation":"태어날 때부터 어떤 질병의 가능성도 완전히 없애다"}],"sourceQuestion":"1번 지문"},{"keyExpression":"feel valued and respected by peers and coworkers","passage":"And it is not just those people with power — we need to feel valued and respected by peers and coworkers.","passageTranslation":"그리고 권력을 가진 사람들만이 아니라 — 우리는 동료와 직장 동료들에게도 가치 있고 존중받는다고 느낄 필요가 있다.","qType":"correct","questionText":"'feel valued and respected by peers and coworkers'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"be ignored and dismissed by our equals","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: valued/respected의 반의어인 ignored/dismissed로 대체되어 의미 역전","translation":"동등한 사람들에게 무시되고 묵살되는"},{"text":"be appreciated and recognized by those around us","isCorrect":true,"optionType":"correct","explanation":"올바름: valued=appreciated, respected=recognized, peers/coworkers=those around us로 의미 유지","translation":"주변 사람들에게 인정받고 존중받는"},{"text":"compete against and outperform our coworkers","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: 협력적 인정이 아닌 경쟁과 능가라는 전혀 다른 관계로 의미 왜곡","translation":"동료들과 경쟁하고 능가하는"}],"sourceQuestion":"3번 지문"},{"keyExpression":"promote that good or service in a way that makes the value clear to the consumer","passage":"their goal is to identify the consumers who are most likely to appreciate a good or service, and to promote that good or service in a way that makes the value clear to the consumer.","passageTranslation":"그들의 목표는 상품이나 서비스를 가장 높이 평가할 가능성이 높은 소비자를 파악하고, 그 가치를 소비자에게 명확하게 전달하는 방식으로 그 상품이나 서비스를 홍보하는 것이다.","qType":"correct","questionText":"'promote that good or service in a way that makes the value clear to the consumer'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"hide the true cost of a product from potential consumers","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: makes the value clear=가치를 명확히 하는 것인데 hide the true cost=비용을 숨기는 반의 행위","translation":"잠재 소비자에게 제품의 실제 비용을 숨기다"},{"text":"sell products only to consumers who already know their value","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: makes the value clear=가치를 알려주는 행위인데 already know=이미 안다는 전제로 마케팅 목적 무효화","translation":"이미 가치를 알고 있는 소비자에게만 제품을 판매하다"},{"text":"present the product to buyers in a way that communicates its usefulness directly","isCorrect":true,"optionType":"correct","explanation":"올바름: promote=present, makes the value clear=communicates its usefulness directly, consumer=buyers로 핵심 의미 보존","translation":"유용성을 직접적으로 전달하는 방식으로 구매자에게 제품을 제시하다"}],"sourceQuestion":"4번 지문"},{"keyExpression":"a caring relationship is a crucial basis from which to begin","passage":"If we are trying to motivate others, a caring relationship is a crucial basis from which to begin.","passageTranslation":"우리가 다른 사람들에게 동기를 부여하려 한다면, 배려하는 관계가 시작하기 위한 중요한 토대이다.","qType":"correct","questionText":"'a caring relationship is a crucial basis from which to begin'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"a warm connection is the fundamental foundation to build on","isCorrect":true,"optionType":"correct","explanation":"올바름: caring→warm, relationship→connection, crucial basis→fundamental foundation으로 구체적 환언","translation":"따뜻한 연결이 구축할 근본적인 토대가 된다"},{"text":"a competitive relationship is a natural outcome to expect","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: caring→competitive로 왜곡하고 basis from which to begin→outcome to expect로 출발점이 결과물로 인과 역전됨","translation":"경쟁적 관계는 기대할 수 있는 자연스러운 결과이다"},{"text":"a strict relationship is an optional add-on to consider","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: caring→strict로 반의어 대체하고 crucial basis→optional add-on으로 필수→선택으로 의미 역전됨","translation":"엄격한 관계는 고려할 선택적 부가 요소이다"},{"text":"a supportive bond serves as an essential starting point","isCorrect":true,"optionType":"correct","explanation":"올바름: caring relationship→supportive bond, crucial basis→essential starting point로 의미 보존","translation":"지지적인 유대가 필수적인 출발점이 된다"}],"sourceQuestion":"2번 지문"},{"keyExpression":"correct disease-causing mutations at the earliest possible stage of life","passage":"it might seem logical, even preferable, to correct disease-causing mutations at the earliest possible stage of life, before harmful genes begin causing serious problems.","passageTranslation":"해로운 유전자가 심각한 문제를 일으키기 시작하기 전에, 가능한 한 가장 이른 생애 단계에서 질병을 유발하는 돌연변이를 교정하는 것이 논리적이고 심지어 바람직해 보일 수도 있다.","qType":"correct","questionText":"'correct disease-causing mutations at the earliest possible stage of life'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"prevent only mild genetic variations from spreading","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: disease-causing(질병 유발)을 mild(경미한)로 왜곡하고 spreading이라는 무관한 개념 삽입","translation":"경미한 유전적 변이만 확산되지 않도록 막다"},{"text":"treat genetic flaws at the very beginning of development","isCorrect":true,"optionType":"correct","explanation":"올바름: earliest possible stage of life→very beginning of development로 추상→구체 전환","translation":"발달의 아주 초기에 유전적 결함을 치료하다"},{"text":"delay treatment of mutations until symptoms appear","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: earliest possible stage(조기)와 정반대로 증상 발현 후 치료를 의미하여 인과 역전","translation":"증상이 나타날 때까지 돌연변이 치료를 미루다"}],"sourceQuestion":"1번 지문"},{"keyExpression":"be there as a support for others as they take on challenges","passage":"So exercise with a friend, call someone when you have a difficult decision to make, and be there as a support for others as they take on challenges.","passageTranslation":"그러므로 친구와 함께 운동하고, 어려운 결정을 내려야 할 때 누군가에게 전화하며, 다른 사람들이 도전에 맞설 때 그들의 지지자로 곁에 있어 주어라.","qType":"correct","questionText":"'be there as a support for others as they take on challenges'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"stand by others when they tackle demanding tasks","isCorrect":true,"optionType":"correct","explanation":"올바름: be there→stand by, as a support를 함의하고 take on challenges→tackle demanding tasks로 환언","translation":"사람들이 힘든 과제에 맞설 때 곁에 있어 주다"},{"text":"provide assistance to those attempting hard things","isCorrect":true,"optionType":"correct","explanation":"올바름: be there as a support→provide assistance, take on challenges→attempting hard things로 구체적으로 전환하며 의미 보존","translation":"어려운 것을 시도하는 사람들에게 도움을 제공하다"},{"text":"step back and let others handle challenges alone","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: be there as a support의 지지 행동을 step back/handle alone으로 대체하여 지원→방임으로 의미 역전됨","translation":"물러서서 다른 사람들이 혼자 도전을 처리하게 두다"},{"text":"compete with others when they face new challenges","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: be there as a support(지원하다)를 compete with(경쟁하다)로 대체하여 협력이 경쟁으로 의미 왜곡됨","translation":"다른 사람들이 새로운 도전에 직면할 때 그들과 경쟁하다"},{"text":"offer encouragement to people when they face difficulties","isCorrect":true,"optionType":"correct","explanation":"올바름: be there as a support→offer encouragement, take on challenges→face difficulties로 의미 보존","translation":"사람들이 어려움에 직면할 때 격려를 제공하다"}],"sourceQuestion":"2번 지문"},{"keyExpression":"provided that support for autonomy and competence are also there","passage":"Thus, when the need for relatedness is met, motivation and internalization are fueled, provided that support for autonomy and competence are also there.","passageTranslation":"따라서 관계성에 대한 욕구가 충족될 때, 자율성과 유능감에 대한 지지도 함께 있다는 전제 하에 동기와 내면화가 촉진된다.","qType":"correct","questionText":"'provided that support for autonomy and competence are also there'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"as long as freedom and skill are likewise encouraged","isCorrect":true,"optionType":"correct","explanation":"올바름: provided that→as long as, autonomy→freedom, competence→skill로 환언하며 조건 함의 유지","translation":"자유와 기술이 마찬가지로 장려되는 한"},{"text":"unless autonomy and competence are restricted","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: provided that(~한다면)을 unless(~하지 않으면)로 바꾸고 support→restricted로 반의어 대체해 조건이 역전됨","translation":"자율성과 유능감이 제한되지 않는 한"},{"text":"even if support for dependence and weakness exists","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: autonomy→dependence, competence→weakness로 반의어 대체하여 핵심 개념이 완전히 왜곡됨","translation":"의존성과 나약함에 대한 지지가 존재하더라도"},{"text":"on condition that independence and ability are also backed","isCorrect":true,"optionType":"correct","explanation":"올바름: provided that→on condition that, autonomy→independence, competence→ability, support→backed로 조건 의미 보존","translation":"독립성과 능력 또한 뒷받침된다는 조건 하에"}],"sourceQuestion":"2번 지문"},{"keyExpression":"provide information in the most clear, honest, and simple fashion possible","passage":"the clever marketer knows that promotion is used to provide information in the most clear, honest, and simple fashion possible.","passageTranslation":"영리한 마케터는 홍보가 가능한 한 가장 명확하고 정직하며 단순한 방식으로 정보를 제공하는 데 사용된다는 것을 알고 있다.","qType":"correct","questionText":"'provide information in the most clear, honest, and simple fashion possible'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"present complex data using technical and advanced language","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: simple/clear과 반대되는 complex/technical language로 핵심 속성 역전","translation":"기술적이고 고급스러운 언어로 복잡한 데이터를 제시하다"},{"text":"deliver facts as transparently and plainly as possible","isCorrect":true,"optionType":"correct","explanation":"올바름: fashion=방식, clear/honest=transparently, simple=plainly로 구체적 행위 유지","translation":"가능한 한 투명하고 명확하게 정보를 전달하다"},{"text":"share details in the most straightforward and truthful way","isCorrect":true,"optionType":"correct","explanation":"올바름: honest=truthful, simple/clear=straightforward로 의미 보존","translation":"가장 직접적이고 진실된 방식으로 세부 사항을 공유하다"},{"text":"hide details to avoid confusing the consumer","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: 정보를 제공하는 것이 아니라 숨긴다는 반의 행위로 의미 왜곡","translation":"소비자를 혼란시키지 않도록 세부 사항을 숨기다"},{"text":"communicate messages without deception or unnecessary complexity","isCorrect":true,"optionType":"correct","explanation":"올바름: honest=without deception, simple=without unnecessary complexity로 함축 의미 재구성","translation":"속임수나 불필요한 복잡함 없이 메시지를 전달하다"}],"sourceQuestion":"4번 지문"},{"keyExpression":"crucial to long-term persistence","passage":"And when we are trying to motivate ourselves, doing things to enhance a sense of connectedness to others can be crucial to long-term persistence.","passageTranslation":"그리고 우리 스스로에게 동기를 부여하려 할 때, 타인과의 연결감을 높이는 일을 하는 것이 장기적인 지속에 핵심적일 수 있다.","qType":"correct","questionText":"'crucial to long-term persistence'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"helpful only at the very beginning of a task","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: long-term(장기적)이 very beginning(초기)으로 시간적 범위가 반대로 왜곡됨","translation":"과제의 바로 초반에만 도움이 되는"},{"text":"unnecessary for achieving short-term goals","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: crucial(필수적)이 unnecessary(불필요한)로, long-term이 short-term으로 둘 다 역전됨","translation":"단기 목표 달성에는 불필요한"},{"text":"essential for sustaining effort over time","isCorrect":true,"optionType":"correct","explanation":"올바름: crucial=essential, long-term persistence=sustaining effort over time으로 핵심 의미 유지","translation":"시간이 지나도 노력을 유지하는 데 필수적인"}],"sourceQuestion":"3번 지문"},{"keyExpression":"motivation and internalization are fueled","passage":"Thus, when the need for relatedness is met, motivation and internalization are fueled, provided that support for autonomy and competence are also there.","passageTranslation":"따라서 관계성에 대한 욕구가 충족될 때, 자율성과 유능감에 대한 지지도 함께 있다는 전제 하에 동기와 내면화가 촉진된다.","qType":"correct","questionText":"'motivation and internalization are fueled'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"drive and self-regulation are strengthened","isCorrect":true,"optionType":"correct","explanation":"올바름: motivation→drive, internalization→self-regulation, fueled→strengthened로 의미 보존","translation":"추진력과 자기 조절이 강화된다"},{"text":"motivation and internalization are weakened","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: fueled(촉진된다)를 weakened(약화된다)로 반의어 대체하여 인과 방향이 완전히 역전됨","translation":"동기와 내면화가 약화된다"},{"text":"resistance and avoidance are triggered","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: motivation→resistance, internalization→avoidance로 반의어 대체하고 fueled→triggered로 바꿔 원문과 반대 의미 생성","translation":"저항과 회피가 촉발된다"}],"sourceQuestion":"2번 지문"},{"keyExpression":"consumers fooled once can do damage to sales as they relate their experience to others","passage":"In fact, consumers fooled once can do damage to sales as they relate their experience to others.","passageTranslation":"사실, 한 번 속은 소비자들은 다른 사람들에게 자신의 경험을 전함으로써 판매에 해를 끼칠 수 있다.","qType":"correct","questionText":"'consumers fooled once can do damage to sales as they relate their experience to others'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"consumers who buy twice tend to become loyal to the brand","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: fooled once→buy twice로 맥락 왜곡, do damage→loyal로 인과 관계 완전 역전","translation":"두 번 구매하는 소비자들은 브랜드에 충성하는 경향이 있다"},{"text":"buyers who were deceived may harm a business by sharing their bad experience","isCorrect":true,"optionType":"correct","explanation":"올바름: fooled=deceived, do damage=harm, relate their experience=sharing their bad experience로 추상→구체 전환","translation":"속은 구매자들이 나쁜 경험을 공유함으로써 사업에 해를 끼칠 수 있다"},{"text":"satisfied customers naturally recommend products to their friends","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: fooled→satisfied로 반의 상황 대체, do damage→recommend로 결과 역전","translation":"만족한 고객들은 자연스럽게 친구들에게 제품을 추천한다"}],"sourceQuestion":"4번 지문"},{"keyExpression":"the long-term effect of getting a consumer to buy something they did not really want or need wasn't good","passage":"The long-term effect of getting a consumer to buy something they did not really want or need wasn't good.","passageTranslation":"소비자가 실제로 원하거나 필요로 하지 않는 것을 구매하게 만드는 것의 장기적인 효과는 좋지 않았다.","qType":"correct","questionText":"'the long-term effect of getting a consumer to buy something they did not really want or need wasn't good'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"offering discounts on desired products improves long-term customer loyalty","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: did not want or need=원하지 않는 것인데 desired=원하는 것으로 반의 상황 대체, wasn't good→improves로 결과 역전","translation":"원하는 제품에 할인을 제공하면 장기적인 고객 충성도가 향상된다"},{"text":"pushing buyers to purchase unwanted items leads to negative results over time","isCorrect":true,"optionType":"correct","explanation":"올바름: getting a consumer to buy=pushing buyers to purchase, did not really want or need=unwanted, long-term effect wasn't good=negative results over time으로 구체화","translation":"원하지 않는 물건을 구매하도록 구매자를 압박하면 시간이 지남에 따라 부정적인 결과로 이어진다"},{"text":"convincing people to buy unnecessary products ultimately proves harmful to business","isCorrect":true,"optionType":"correct","explanation":"올바름: getting a consumer to buy=convincing people to buy, did not really need=unnecessary, long-term effect wasn't good=ultimately harmful로 의미 보존","translation":"불필요한 제품을 사도록 사람들을 설득하는 것은 결국 사업에 해롭다는 것이 증명된다"},{"text":"consumers who buy what they need always return for more purchases","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: did not really want or need=필요하지 않은 것인데 buy what they need=필요한 것을 구매로 핵심 조건 역전","translation":"필요한 것을 구매하는 소비자들은 항상 더 많이 구매하러 돌아온다"}],"sourceQuestion":"4번 지문"},{"keyExpression":"promote that good or service in a way that makes the value clear to the consumer","passage":"their goal is to identify the consumers who are most likely to appreciate a good or service, and to promote that good or service in a way that makes the value clear to the consumer.","passageTranslation":"그들의 목표는 상품이나 서비스를 가장 높이 평가할 가능성이 높은 소비자를 파악하고, 그 가치를 소비자에게 명확하게 전달하는 방식으로 그 상품이나 서비스를 홍보하는 것이다.","qType":"correct","questionText":"'promote that good or service in a way that makes the value clear to the consumer'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"hide the true cost of a product from potential consumers","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: makes the value clear=가치를 명확히 하는 것인데 hide the true cost=비용을 숨기는 반의 행위","translation":"잠재 소비자에게 제품의 실제 비용을 숨기다"},{"text":"sell products only to consumers who already know their value","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: makes the value clear=가치를 알려주는 행위인데 already know=이미 안다는 전제로 마케팅 목적 무효화","translation":"이미 가치를 알고 있는 소비자에게만 제품을 판매하다"},{"text":"advertise the product so that its worth is obvious to buyers","isCorrect":true,"optionType":"correct","explanation":"올바름: promote=advertise, good or service=product, makes the value clear=worth is obvious로 구체화","translation":"제품의 가치가 구매자에게 분명하도록 광고하다"}],"sourceQuestion":"4번 지문"},{"keyExpression":"Promotion deals with consumer psychology","passage":"Promotion deals with consumer psychology.","passageTranslation":"홍보는 소비자 심리를 다룬다.","qType":"correct","questionText":"'Promotion deals with consumer psychology'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"advertising departments operate independently of consumer behavior","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: deals with=연관된다는 의미인데 operate independently=독립적으로 운영으로 관계 부정","translation":"광고 부서는 소비자 행동과 독립적으로 운영된다"},{"text":"marketing activities are fundamentally about understanding customer mindsets","isCorrect":true,"optionType":"correct","explanation":"올바름: promotion=marketing activities, deals with=about, consumer psychology=customer mindsets로 핵심 의미 재구성","translation":"마케팅 활동은 근본적으로 고객의 사고방식을 이해하는 것에 관한 것이다"},{"text":"promotion is mainly concerned with setting competitive prices","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: consumer psychology=심리적 측면인데 setting competitive prices=가격 책정으로 핵심 개념 대체","translation":"홍보는 주로 경쟁력 있는 가격 설정에 관련된다"}],"sourceQuestion":"4번 지문"},{"keyExpression":"transform an embryo's mutated genes into 'normal' ones","passage":"Yet once it becomes possible to transform an embryo's mutated genes into 'normal' ones, there will certainly be temptations to upgrade normal genes to superior versions.","passageTranslation":"그러나 일단 배아의 돌연변이 유전자를 '정상' 유전자로 바꾸는 것이 가능해지면, 정상 유전자를 더 우월한 버전으로 업그레이드하려는 유혹이 분명히 생겨날 것이다.","qType":"correct","questionText":"'transform an embryo's mutated genes into 'normal' ones'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"copy an embryo's healthy genes and distribute them widely","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: transform→copy and distribute로 완전히 다른 행위로 왜곡, 핵심 교정 의미 소실","translation":"배아의 건강한 유전자를 복제하여 널리 배포하다"},{"text":"observe mutated genes in embryos without making changes","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: transform(변환)을 observe without changes(변화 없이 관찰)로 행위의 핵심 반전","translation":"배아의 돌연변이 유전자를 변화 없이 관찰하다"},{"text":"replace abnormal genes with functioning ones at the embryo stage","isCorrect":true,"optionType":"correct","explanation":"올바름: transform into→replace with로 구문 변환, mutated→abnormal, normal→functioning으로 재구성","translation":"배아 단계에서 비정상 유전자를 기능하는 것으로 대체하다"}],"sourceQuestion":"1번 지문"},{"keyExpression":"the long-term effect of getting a consumer to buy something they did not really want or need wasn't good","passage":"The long-term effect of getting a consumer to buy something they did not really want or need wasn't good.","passageTranslation":"소비자가 실제로 원하거나 필요로 하지 않는 것을 구매하게 만드는 것의 장기적인 효과는 좋지 않았다.","qType":"correct","questionText":"'the long-term effect of getting a consumer to buy something they did not really want or need wasn't good'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"consumers who buy what they need always return for more purchases","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: did not really want or need=필요하지 않은 것인데 buy what they need=필요한 것을 구매로 핵심 조건 역전","translation":"필요한 것을 구매하는 소비자들은 항상 더 많이 구매하러 돌아온다"},{"text":"making customers purchase goods they have no real use for backfires in the long run","isCorrect":true,"optionType":"correct","explanation":"올바름: did not really want or need=no real use for, long-term effect wasn't good=backfires in the long run으로 함축 의미 재구성","translation":"고객이 실제로 쓸 일이 없는 상품을 구매하게 만드는 것은 결국 역효과를 낳는다"},{"text":"offering discounts on desired products improves long-term customer loyalty","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: did not want or need=원하지 않는 것인데 desired=원하는 것으로 반의 상황 대체, wasn't good→improves로 결과 역전","translation":"원하는 제품에 할인을 제공하면 장기적인 고객 충성도가 향상된다"}],"sourceQuestion":"4번 지문"},{"keyExpression":"perceived as involved and caring","passage":"There is a wealth of evidence that when parents, teachers, supervisors, and coaches are perceived as involved and caring, people feel happier and more motivated.","passageTranslation":"부모, 교사, 상사, 코치가 관심을 갖고 배려하는 것으로 인식될 때 사람들이 더 행복하고 동기부여가 된다는 풍부한 증거가 있다.","qType":"correct","questionText":"'perceived as involved and caring'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"known as strict and demanding","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: caring을 demanding으로 반의어 대체하여 긍정적 관계가 부정적 관계로 의미 왜곡됨","translation":"엄격하고 요구가 많은 것으로 알려진"},{"text":"criticized as intrusive and controlling","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: involved와 caring을 각각 intrusive/controlling으로 왜곡해 부정적 의미로 전환됨","translation":"간섭적이고 통제적인 것으로 비판받는"},{"text":"viewed as committed and empathetic","isCorrect":true,"optionType":"correct","explanation":"올바름: viewed as가 perceived as를 대체하고 committed/empathetic이 원문 함의를 유지","translation":"헌신적이고 공감적인 것으로 인식되는"},{"text":"regarded as attentive and concerned","isCorrect":true,"optionType":"correct","explanation":"올바름: perceived→regarded as, involved→attentive, caring→concerned로 동등 대체","translation":"주의 깊고 걱정해주는 것으로 간주되는"},{"text":"seen as engaged and supportive","isCorrect":true,"optionType":"correct","explanation":"올바름: perceived→seen as, involved→engaged, caring→supportive로 의미 보존","translation":"관심을 갖고 지지해주는 것으로 여겨지는"}],"sourceQuestion":"2번 지문"},{"keyExpression":"the pursuit for perfection seems almost natural to human nature","passage":"The pursuit for perfection seems almost natural to human nature, but if we start down this slippery slope, we may not like where we end up.","passageTranslation":"완벽함을 향한 추구는 인간의 본성에 거의 자연스러운 것처럼 보이지만, 만약 우리가 이 미끄러운 경사면을 내려가기 시작하면, 우리는 결국 어디에 이르게 될지 마음에 들지 않을 수도 있다.","qType":"correct","questionText":"'the pursuit for perfection seems almost natural to human nature'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"striving for the best appears to be a built-in human tendency","isCorrect":true,"optionType":"correct","explanation":"올바름: pursuit for perfection→striving for the best, natural to human nature→built-in tendency로 재구성","translation":"최선을 추구하는 것은 내재된 인간의 성향으로 보인다"},{"text":"the search for perfection is an unnatural and rare behavior","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: natural(자연스러운)을 unnatural and rare(부자연스럽고 드문)으로 반의어 대체하여 의미 역전","translation":"완벽함을 추구하는 것은 부자연스럽고 드문 행동이다"},{"text":"wanting to achieve flawlessness is a deeply rooted human instinct","isCorrect":true,"optionType":"correct","explanation":"올바름: pursuit for perfection→wanting to achieve flawlessness, natural to human nature→deeply rooted instinct으로 강조 재구성","translation":"완벽함을 달성하고자 하는 것은 깊이 뿌리 박힌 인간의 본능이다"},{"text":"only scientists feel the urge to achieve perfect results","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: natural to human nature(인간 본성에 자연스러운)를 only scientists(과학자만)로 대상을 극도로 제한하여 보편성 왜곡","translation":"오직 과학자들만이 완벽한 결과를 달성하려는 충동을 느낀다"}],"sourceQuestion":"1번 지문"},{"keyExpression":"there will certainly be temptations to upgrade normal genes to superior versions","passage":"Yet once it becomes possible to transform an embryo's mutated genes into 'normal' ones, there will certainly be temptations to upgrade normal genes to superior versions.","passageTranslation":"그러나 일단 배아의 돌연변이 유전자를 '정상' 유전자로 바꾸는 것이 가능해지면, 정상 유전자를 더 우월한 버전으로 업그레이드하려는 유혹이 분명히 생겨날 것이다.","qType":"correct","questionText":"'there will certainly be temptations to upgrade normal genes to superior versions'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"people will inevitably want to enhance ordinary genes further","isCorrect":true,"optionType":"correct","explanation":"올바름: temptations→want to, upgrade→enhance, superior versions→further로 의미 재구성하여 욕구의 불가피성 유지","translation":"사람들은 필연적으로 평범한 유전자를 더욱 향상시키고 싶어할 것이다"},{"text":"scientists will be forced to downgrade abnormal genes","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: upgrade→downgrade로 반의어 대체, normal→abnormal로 대상 왜곡","translation":"과학자들은 비정상 유전자를 하향 조정하도록 강요받을 것이다"},{"text":"there will be little interest in modifying standard genes","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: certainly be temptations(확실한 유혹)을 little interest(거의 관심 없음)로 의미 완전 역전","translation":"표준 유전자를 변형하는 것에 관심이 거의 없을 것이다"}],"sourceQuestion":"1번 지문"},{"keyExpression":"promote that good or service in a way that makes the value clear to the consumer","passage":"Instead, marketers now know that their goal is to identify the consumers who are most likely to appreciate a good or service, and to promote that good or service in a way that makes the value clear to the consumer.","passageTranslation":"대신, 마케터들은 이제 자신들의 목표가 상품이나 서비스를 가장 높이 평가할 가능성이 있는 소비자를 파악하고, 그 소비자에게 가치를 명확히 하는 방식으로 그 상품이나 서비스를 홍보하는 것임을 알고 있다.","qType":"correct","questionText":"'promote that good or service in a way that makes the value clear to the consumer'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"market the item by highlighting its benefits for the buyer","isCorrect":true,"optionType":"correct","explanation":"올바름: promote=market, makes the value clear=highlighting its benefits로 구체화하여 소비자 지향 판촉 의미 유지","translation":"구매자에게 이점을 부각함으로써 상품을 마케팅하다"},{"text":"lower the price of products to attract as many buyers as possible","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: makes the value clear(가치를 명확히 하다)를 lower the price(가격 인하)로 대체 — 가치 소통 전략을 가격 전략으로 왜곡","translation":"최대한 많은 구매자를 유치하기 위해 제품 가격을 낮추다"},{"text":"exaggerate a product's features to generate excitement among shoppers","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: clear/honest 전달이라는 원문 취지를 exaggerate(과장)로 반의어 대체하여 기만적 의미 삽입","translation":"구매자들 사이에서 흥분을 유발하기 위해 제품 특징을 과장하다"},{"text":"communicate what makes a product worthwhile to the right audience","isCorrect":true,"optionType":"correct","explanation":"올바름: makes the value clear=communicate what makes it worthwhile, consumer=right audience로 바꿔 동일 목적 함의 구현","translation":"적합한 대상에게 제품이 가치 있는 이유를 전달하다"}],"sourceQuestion":"5번 지문"},{"keyExpression":"feel valued and respected by peers and coworkers","passage":"And it is not just those people with power — we need to feel valued and respected by peers and coworkers.","passageTranslation":"그리고 권력을 가진 사람들만이 아니라 — 우리는 동료와 직장 동료들에게도 가치 있고 존중받는다고 느낄 필요가 있다.","qType":"correct","questionText":"'feel valued and respected by peers and coworkers'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"compete against and outperform our coworkers","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: 협력적 인정이 아닌 경쟁과 능가라는 전혀 다른 관계로 의미 왜곡","translation":"동료들과 경쟁하고 능가하는"},{"text":"receive acknowledgment from fellow members","isCorrect":true,"optionType":"correct","explanation":"올바름: 동료 집단으로부터 인정을 받는다는 의미 유지","translation":"동료들로부터 인정을 받는"},{"text":"sense that colleagues regard us positively","isCorrect":true,"optionType":"correct","explanation":"올바름: 동료들로부터 긍정적 인식을 받는다는 핵심 의미 보존","translation":"동료들이 우리를 긍정적으로 여긴다고 느끼는"},{"text":"be ignored and dismissed by our equals","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: valued/respected의 반의어인 ignored/dismissed로 대체되어 의미 역전","translation":"동등한 사람들에게 무시되고 묵살되는"}],"sourceQuestion":"3번 지문"},{"keyExpression":"feel valued and respected by peers and coworkers","passage":"And it is not just those people with power — we need to feel valued and respected by peers and coworkers.","passageTranslation":"그리고 권력을 가진 사람들만이 아니라, 우리는 동료와 공동 작업자들로부터 소중히 여겨지고 존중받는다는 느낌이 필요하다.","qType":"correct","questionText":"'feel valued and respected by peers and coworkers'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"feel ignored and underestimated by colleagues","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: valued/respected를 반의어인 ignored/underestimated로 대체하여 의미가 정반대로 역전됨","translation":"동료들에게 무시당하고 과소평가받는다고 느끼다"},{"text":"be acknowledged and honored by those around us","isCorrect":true,"optionType":"correct","explanation":"올바름: valued/respected를 acknowledged/honored로, peers를 those around us로 환언하여 의미 유지","translation":"주변 사람들에게 인정받고 존중받다"},{"text":"gain approval and esteem from fellow members","isCorrect":true,"optionType":"correct","explanation":"올바름: valued→approval, respected→esteem, peers/coworkers→fellow members로 동등 대체","translation":"동료 구성원들로부터 인정과 존경을 얻다"},{"text":"be judged and evaluated by our supervisors","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: peers/coworkers를 supervisors로 바꿔 수평 관계→위계 관계로 왜곡되고, valued/respected가 judged/evaluated로 부정적 함의로 전환됨","translation":"상사들에게 판단받고 평가받다"},{"text":"sense appreciation and recognition from equals","isCorrect":true,"optionType":"correct","explanation":"올바름: valued→appreciation, respected→recognition, peers/coworkers→equals로 의미 보존","translation":"동등한 사람들로부터 인정과 존중받음을 느끼다"}],"sourceQuestion":"2번 지문"}]};
var QS=CONFIG.questions||[];

var CIRCLED=["①","②","③","④","⑤","⑥"];
var answers={};var selections={};var currentSet=0;
var _tLast=0;var _busy=false;var _curPos=-1;
function esc(s){if(s==null)return"";var d=document.createElement("div");d.textContent=String(s);return d.innerHTML}
function setH(t,sub){var h=document.getElementById("hTitle");var p=document.getElementById("hSub");if(h)h.textContent=t;if(p)p.textContent=sub}
function gi(si,pi){return si*SET_SIZE+pi}
function showIndex(){
  setH(CONFIG.title,"Paraphrasing 표현 테스트");
  var chips=SETS.map(function(sq,si){
    var base=si*SET_SIZE;var done=0,correct=0;
    for(var i=0;i<sq.length;i++){var a=answers[base+i];if(a){done++;if(a.isCorrect)correct++;}}
    var allDone=(done===sq.length);
    var pct=done>0?Math.round(correct/sq.length*100):null;
    var passed=pct!==null&&pct>=CONFIG.passThreshold;
    var scoreHTML=pct===null
      ?"<span style='font-size:.78rem;color:#9ca3af'>미응시</span>"
      :(allDone?"<span style='font-weight:700;color:"+(passed?"#10b981":"#ef4444")+";'>"+(passed?"✅ ":"❌ ")+pct+"%</span>"
             :"<span style='font-weight:700;color:#f59e0b'>📝 "+done+"/"+sq.length+"</span>");
    return "<div class='set-card"+(allDone?" done":"")+"'onclick='enterSet("+si+")'>"
           +"<div><div style='font-weight:700'>세트 "+(si+1)+" <span style='font-size:.8rem;color:#6b7280;font-weight:400'>("+sq.length+"문제)</span></div></div>"
           +"<div>"+scoreHTML+"</div></div>";
  }).join("");
  var app=document.getElementById("app");if(!app)return;
  app.innerHTML="<div class='fade' style='text-align:center;padding:16px 0'>"
    +"<div style='font-size:2.5rem;margin-bottom:8px'>🔄</div>"
    +"<h2 style='font-size:1.2rem;font-weight:700;color:#1f2937;margin-bottom:4px'>Paraphrasing 표현 테스트</h2>"
    +"<p style='color:#6b7280;font-size:.85rem;margin-bottom:16px'>전체 "+TOTAL+"문제 · "+CONFIG.passThreshold+"% 이상 통과</p>"
    +"</div><div class='set-list'>"+chips+"</div>";
}
function enterSet(si){currentSet=si;_curPos=-1;showQ(0)}
function showQ(pos){
  if(pos!==_curPos){try{window.scrollTo(0,0)}catch(e){}_curPos=pos;}
  var si=currentSet;var qs=SETS[si];
  if(!qs||pos<0||pos>=qs.length){showIndex();return;}
  var gidx=gi(si,pos);var q=qs[pos];var answered=answers[gidx];
  var sel=selections[gidx]||{};
  setH("세트 "+(si+1),"문제 "+(pos+1)+"/"+qs.length);
  var pct=Math.round((pos+1)/qs.length*100);
  var isTypeA=q.qType==="correct";
  var correctCount=q.options.filter(function(o){return o.isCorrect}).length;
  var optsHTML=q.options.map(function(o,i){
    var cls="";var chkTxt="";
    if(answered){
      var wasSel=!!(answered.selected&&answered.selected[i]);
      if(isTypeA){
        if(o.isCorrect&&wasSel){cls="a-corr-hit";chkTxt="✓"}
        else if(o.isCorrect&&!wasSel){cls="a-corr-miss";chkTxt="○"}
        else if(!o.isCorrect&&wasSel){cls="a-wrong-sel";chkTxt="✕"}
        else{cls="a-wrong-unsel"}
      }else{
        if(o.isCorrect&&wasSel){cls="b-ans-hit";chkTxt="✓"}
        else if(o.isCorrect&&!wasSel){cls="b-ans-miss";chkTxt="○"}
        else if(!o.isCorrect&&wasSel){cls="b-corr-sel";chkTxt="✓"}
        else{cls="b-corr-unsel"}
      }
    }else if(sel[i]){cls="selected";chkTxt="✓"}
    return "<button class='chk-btn "+cls+"' onclick='toggleOpt("+pos+","+i+")' "+(answered?"disabled":"")+" data-idx='"+i+"'>"
           +"<div class='chk-box'>"+chkTxt+"</div>"
           +"<span>"+esc(o.text)+"</span></button>";
  }).join("");
  var feedbackHTML="";
  if(answered){
    var cidxs=[];
    q.options.forEach(function(o,i){if(o.isCorrect)cidxs.push(i)});
    var cLabel=cidxs.map(function(i){return CIRCLED[i]}).join(", ");
    feedbackHTML="<div class='fb "+(answered.isCorrect?"ok":"ng")+"'>"
      +(answered.isCorrect?"✅ 정답!":"❌ 오답 — 정답: "+cLabel)
      +"</div>"
      +"<div class='explain-box'><div class='ex-title'>해설</div>"
      +q.options.map(function(o,i){
        var tag;
        if(isTypeA){tag=o.isCorrect?"<span class='tag-ok'>[올바른 paraphrasing]</span>":"<span class='tag-ng'>[잘못된 paraphrasing]</span>"}
        else{tag=o.isCorrect?"<span class='tag-ng'>[잘못된 paraphrasing]</span>":"<span class='tag-ok'>[올바른 paraphrasing]</span>"}
        return "<div class='ex-item'><strong>"+CIRCLED[i]+" "+esc(o.text)+"</strong> "+tag
               +"<br><span class='trans'>→ "+esc(o.translation||o.explanation)+"</span></div>";
      }).join("")+"</div>";
  }
  var passageSection="";
  if(q.passage){
    passageSection="<button class='show-passage-btn' id='pbtn' onclick='togglePassage()'>📄 지문 보기</button>"
                  +"<div class='passage-box' id='pbox' style='display:none'>"+esc(q.passage)+"</div>";
  }
  var hintColor=answered?(answered.isCorrect?"#166534":"#991b1b"):"#4f46e5";
  var hintHTML=CONFIG.showCountHint
    ?"<div class='q-hint' style='background:rgba(139,92,246,.08);border:1px solid rgba(139,92,246,.2);color:#374151'>정답 개수 : <span style='font-size:1.5em;font-weight:900;color:"+hintColor+"'>"+correctCount+"</span>개</div>"
    :"<div class='q-hint' style='background:#f8fafc;color:#64748b;border:1px solid #e2e8f0'>"+(isTypeA?"<span style='color:#059669;font-weight:800'>올바른</span>":"<span style='color:#e11d48;font-weight:800'>잘못된</span>")+" paraphrasing을 모두 선택 후 제출하세요</div>";
  var typeBadge=isTypeA
    ?"<div class='type-badge ok'>✅ 올바른 paraphrasing 찾기</div>"
    :"<div class='type-badge ng'>❌ 잘못된 paraphrasing 찾기</div>";
  var app=document.getElementById("app");if(!app)return;
  app.innerHTML="<div class='fade'>"
    +"<div class='q-counter'>"+(pos+1)+" / "+qs.length+"</div>"
    +"<div class='prog-bar'><div class='prog-fill' style='width:"+pct+"%;background:"+(isTypeA?"#059669":"#dc2626")+"'></div></div>"
    +(q.sourceQuestion?"<div style='display:inline-block;background:#fef3c7;color:#b45309;padding:4px 12px;border-radius:20px;font-size:.78rem;font-weight:600;margin-bottom:10px'>"+esc(q.sourceQuestion)+"</div>":"")
    +typeBadge
    +"<div class='key-box'>"
    +"<div class='expr'>“"+esc(q.keyExpression)+"”</div>"
    +"<div class='qtext'>"+(isTypeA
      ?"위 표현을 <span style='color:#059669;font-weight:800'>올바르게</span> paraphrasing 한 것을 모두 고르시오."
      :"위 표현을 <span style='color:#e11d48;font-weight:800'>잘못</span> paraphrasing 한 것을 모두 고르시오.")
    +"</div></div>"
    +passageSection
    +hintHTML
    +"<div class='opts'>"+optsHTML+"</div>"
    +feedbackHTML
    +"<div class='nav-bar'>"
    +"<button class='nav-btn prev' onclick='showQ("+(pos-1)+")' "+(pos<=0?"disabled":"")+">← 이전</button>"
    +"<button class='nav-btn home' onclick='showIndex()'>목록</button>"
    +(!answered
      ?"<button class='nav-btn next' onclick='submitAnswer("+pos+")'>✓ 제출</button>"
      :"<button class='nav-btn next' onclick='"+(pos<qs.length-1?"showQ("+(pos+1)+")":"showSetResult()")+"'>→ "+(pos<qs.length-1?"다음":"결과")+"</button>")
    +"</div></div>";
}
function toggleOpt(pos,optIdx){
  var _n=Date.now();if(_n-_tLast<280)return;_tLast=_n;
  var gidx=gi(currentSet,pos);
  if(answers[gidx])return;
  if(!selections[gidx])selections[gidx]={};
  if(selections[gidx][optIdx])delete selections[gidx][optIdx];
  else selections[gidx][optIdx]=true;
  showQ(pos);
}
function submitAnswer(pos){
  try{
  var gidx=gi(currentSet,pos);
  if(answers[gidx])return;
  var q=SETS[currentSet][pos];
  if(!q)return;
  var sel=selections[gidx]||{};
  var isCorrect=true;
  for(var i=0;i<q.options.length;i++){
    var wasSel=!!sel[i];var shouldSel=q.options[i].isCorrect;
    if(wasSel!==shouldSel){isCorrect=false;break}
  }
  answers[gidx]={selected:sel,isCorrect:isCorrect};
  showQ(pos);
  }catch(e){console.error("submitAnswer err",e)}
}
function togglePassage(){
  var b=document.getElementById("pbox");var btn=document.getElementById("pbtn");
  if(!b)return;
  if(b.style.display==="none"){b.style.display="block";if(btn)btn.textContent="📄 지문 숨기기"}
  else{b.style.display="none";if(btn)btn.textContent="📄 지문 보기"}
}
function showSetResult(){
  var si=currentSet;var qs=SETS[si];var base=si*SET_SIZE;
  var total=qs.length;var correct=0;
  for(var i=0;i<total;i++){var a=answers[base+i];if(a&&a.isCorrect)correct++}
  var pct=Math.round(correct/total*100);
  var passed=pct>=CONFIG.passThreshold;
  setH("세트 "+(si+1)+" 결과",passed?"통과":"미달");
  var app=document.getElementById("app");if(!app)return;
  app.innerHTML="<div class='fade' style='text-align:center;padding:16px 0'>"
    +"<div class='score-circle "+(passed?"pass":"fail")+"'>"+(pct)+"%</div>"
    +"<p style='font-size:1.1rem;font-weight:700;color:"+(passed?"#10b981":"#ef4444")+"'>"+(passed?"통과!":"미달")+"</p>"
    +"<p style='color:#6b7280;font-size:.88rem;margin-top:8px'>"+correct+"/"+total+"문제 정답 · 기준 "+CONFIG.passThreshold+"%</p>"
    +"</div>"
    +"<div style='margin-top:16px'><button class='btn btn-primary' onclick='showIndex()'>목록으로</button></div>";
}
try{history.pushState(null,"",location.href);
window.addEventListener("popstate",function(){
  history.pushState(null,"",location.href);
  showIndex();
});}catch(e){}
showIndex();
</script>
</body>
</html>
