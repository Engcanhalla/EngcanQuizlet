<script>
var CONFIG={"title":"1Go2025.21_31_stu","passThreshold":80,"showCountHint":true,"questions":[{"keyExpression":"motivation and internalization are fueled","passage":"Thus, when the need for relatedness is met, motivation and internalization are fueled, provided that support for autonomy and competence are also there.","passageTranslation":"따라서 관계성에 대한 욕구가 충족될 때, 자율성과 역량에 대한 지원도 있다는 조건하에 동기와 내면화가 촉진된다.","qType":"correct","questionText":"'motivation and internalization are fueled'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"one's inner drive and absorption of values grow","isCorrect":true,"optionType":"correct","explanation":"올바름: 동기와 가치의 내면화가 증가한다는 추상적 의미를 구체적으로 전환하여 유지","translation":"내적 추진력과 가치 흡수가 성장하는"},{"text":"motivation and internalization are weakened","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: fueled(촉진됨)의 반의어 weakened(약화됨)로 대체되어 의미 역전","translation":"동기와 내면화가 약화되는"},{"text":"drive and self-integration are strengthened","isCorrect":true,"optionType":"correct","explanation":"올바름: motivation=drive, internalization=self-integration, fueled=strengthened으로 의미 유지","translation":"추진력과 자기 내면화가 강화되는"},{"text":"external pressure and compliance are increased","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: 내적 동기·내면화가 아닌 외적 압력·순응으로 개념이 완전히 왜곡됨","translation":"외부 압력과 순응이 증가하는"}],"sourceQuestion":"3번 지문"},{"keyExpression":"Assuming gene editing in humans proves to be safe and effective","passage":"Assuming gene editing in humans proves to be safe and effective, it might seem logical, even preferable, to correct disease-causing mutations at the earliest possible stage of life.","passageTranslation":"인간에 대한 유전자 편집이 안전하고 효과적인 것으로 증명된다고 가정하면, 가능한 한 가장 이른 생애 단계에서 질병을 유발하는 돌연변이를 교정하는 것이 논리적이고 심지어 바람직해 보일 수도 있다.","qType":"correct","questionText":"'Assuming gene editing in humans proves to be safe and effective'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"unless gene editing is found to be dangerous and unreliable","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: Assuming safe and effective(안전하고 효과적임을 가정)를 unless dangerous and unreliable(위험하고 신뢰할 수 없는 경우를 제외하고)로 조건의 방향 역전","translation":"유전자 편집이 위험하고 신뢰할 수 없는 것으로 밝혀지지 않는 한"},{"text":"if human genetic modification is confirmed to work without harm","isCorrect":true,"optionType":"correct","explanation":"올바름: Assuming→if, gene editing→genetic modification, safe and effective→work without harm으로 조건절 재구성","translation":"만약 인간 유전자 변형이 해 없이 작동하는 것으로 확인된다면"},{"text":"on the condition that human gene therapy carries no risk and delivers results","isCorrect":true,"optionType":"correct","explanation":"올바름: Assuming→on the condition that, safe→no risk, effective→delivers results로 구체적 조건 재구성","translation":"인간 유전자 치료가 위험 없이 결과를 가져다 준다는 조건 하에"},{"text":"since gene editing has already been proven completely safe","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: Assuming(가정)을 since already proven(이미 증명된 사실)으로 바꿔 가정을 기정사실화하여 양태 왜곡","translation":"유전자 편집이 이미 완전히 안전한 것으로 증명되었으므로"}],"sourceQuestion":"1번 지문"},{"keyExpression":"provide information in the most clear, honest, and simple fashion possible","passage":"the clever marketer knows that promotion is used to provide information in the most clear, honest, and simple fashion possible.","passageTranslation":"영리한 마케터는 판촉이 가능한 한 가장 명확하고 정직하며 단순한 방식으로 정보를 제공하는 데 사용된다는 것을 안다.","qType":"correct","questionText":"'provide information in the most clear, honest, and simple fashion possible'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"share only the most impressive and dramatic facts","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: honest/simple을 impressive/dramatic으로 대체하여 과장·선별 의도를 삽입 — 원문의 정직하고 단순한 전달과 반대 의미","translation":"가장 인상적이고 극적인 사실만 공유하다"},{"text":"hide unnecessary details to keep consumers interested","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: 정보를 완전히 제공하라는 원문과 달리 정보를 감추는 행위를 긍정적으로 서술 — 인과 역전","translation":"소비자의 관심을 유지하기 위해 불필요한 세부 사항을 숨기다"},{"text":"share details in the most straightforward and truthful way","isCorrect":true,"optionType":"correct","explanation":"올바름: honest=truthful, simple=straightforward로 대체하여 동일 의미 구현","translation":"가장 솔직하고 진실된 방식으로 정보를 공유하다"}],"sourceQuestion":"5번 지문"},{"keyExpression":"Promotion deals with consumer psychology","passage":"Promotion deals with consumer psychology.","passageTranslation":"홍보는 소비자 심리를 다룬다.","qType":"correct","questionText":"'Promotion deals with consumer psychology'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"advertising is closely connected to how buyers think and feel","isCorrect":true,"optionType":"correct","explanation":"올바름: promotion=advertising, deals with=is closely connected to, consumer psychology=how buyers think and feel로 추상→구체 전환","translation":"광고는 구매자가 생각하고 느끼는 방식과 밀접하게 연결되어 있다"},{"text":"promotion is mainly concerned with setting competitive prices","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: consumer psychology=심리적 측면인데 setting competitive prices=가격 책정으로 핵심 개념 대체","translation":"홍보는 주로 경쟁력 있는 가격 설정에 관련된다"},{"text":"advertising departments operate independently of consumer behavior","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: deals with=연관된다는 의미인데 operate independently=독립적으로 운영으로 관계 부정","translation":"광고 부서는 소비자 행동과 독립적으로 운영된다"}],"sourceQuestion":"4번 지문"},{"keyExpression":"it might seem logical, even preferable","passage":"it might seem logical, even preferable, to correct disease-causing mutations at the earliest possible stage of life, before harmful genes begin causing serious problems.","passageTranslation":"해로운 유전자가 심각한 문제를 일으키기 시작하기 전에, 가능한 한 가장 이른 생애 단계에서 질병을 유발하는 돌연변이를 교정하는 것이 논리적이고 심지어 바람직해 보일 수도 있다.","qType":"correct","questionText":"'it might seem logical, even preferable'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"it could appear not only reasonable but actually desirable","isCorrect":true,"optionType":"correct","explanation":"올바름: logical→reasonable, preferable→desirable, even→not only...but actually로 강조 구조 재구성","translation":"합리적일 뿐만 아니라 실제로 바람직해 보일 수도 있다"},{"text":"it appears neither logical nor desirable to most people","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: logical and preferable(논리적이고 바람직한)을 neither logical nor desirable(논리적이지도 바람직하지도 않은)으로 반의어 대체","translation":"그것은 대부분의 사람들에게 논리적이지도 바람직하지도 않아 보인다"},{"text":"it is clearly proven to be correct and universally accepted","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: might seem(불확실한 가능성)을 clearly proven and universally accepted(확실하고 보편적 사실)로 양태 완전 왜곡","translation":"그것은 올바르고 보편적으로 받아들여지는 것으로 명확히 증명되었다"}],"sourceQuestion":"1번 지문"},{"keyExpression":"the pursuit for perfection seems almost natural to human nature","passage":"The pursuit for perfection seems almost natural to human nature, but if we start down this slippery slope, we may not like where we end up.","passageTranslation":"완벽함을 향한 추구는 인간의 본성에 거의 자연스러운 것처럼 보이지만, 만약 우리가 이 미끄러운 경사면을 내려가기 시작하면, 우리는 결국 어디에 이르게 될지 마음에 들지 않을 수도 있다.","qType":"correct","questionText":"'the pursuit for perfection seems almost natural to human nature'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"only scientists feel the urge to achieve perfect results","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: natural to human nature(인간 본성에 자연스러운)를 only scientists(과학자만)로 대상을 극도로 제한하여 보편성 왜곡","translation":"오직 과학자들만이 완벽한 결과를 달성하려는 충동을 느낀다"},{"text":"the search for perfection is an unnatural and rare behavior","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: natural(자연스러운)을 unnatural and rare(부자연스럽고 드문)으로 반의어 대체하여 의미 역전","translation":"완벽함을 추구하는 것은 부자연스럽고 드문 행동이다"},{"text":"humans are inherently drawn to seeking the ideal","isCorrect":true,"optionType":"correct","explanation":"올바름: pursuit for perfection→seeking the ideal, natural to human nature→inherently drawn로 구문 변환하며 의미 유지","translation":"인간은 본질적으로 이상을 추구하는 경향이 있다"}],"sourceQuestion":"1번 지문"},{"keyExpression":"a wealth of evidence","passage":"There is a wealth of evidence that when parents, teachers, supervisors, and coaches are perceived as involved and caring, people feel happier and more motivated.","passageTranslation":"부모, 교사, 상사, 코치가 참여하고 배려하는 것으로 인식될 때 사람들이 더 행복하고 동기부여가 된다는 풍부한 증거가 있다.","qType":"correct","questionText":"'a wealth of evidence'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"a large body of research findings","isCorrect":true,"optionType":"correct","explanation":"올바름: a wealth of=large body of, evidence=research findings로 풍부한 근거라는 의미 유지","translation":"많은 양의 연구 결과"},{"text":"a lack of reliable evidence","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: a wealth of의 반의어인 a lack of로 대체되어 의미가 정반대로 왜곡됨","translation":"신뢰할 수 있는 증거의 부족"},{"text":"a brief mention of some ideas","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: 풍부하고 강력한 증거가 아닌 단순한 언급으로 약화되어 의미 손실","translation":"몇 가지 아이디어에 대한 간략한 언급"},{"text":"an abundance of supporting data","isCorrect":true,"optionType":"correct","explanation":"올바름: abundance가 wealth의 풍부함을 대체하며 핵심 의미 보존","translation":"풍부한 뒷받침 자료"},{"text":"considerable proof from many studies","isCorrect":true,"optionType":"correct","explanation":"올바름: considerable이 양적 풍부함을 표현하며 동일한 함의 유지","translation":"많은 연구로부터 나온 상당한 증거"}],"sourceQuestion":"3번 지문"},{"keyExpression":"crucial to long-term persistence","passage":"And when we are trying to motivate ourselves, doing things to enhance a sense of connectedness to others can be crucial to long-term persistence.","passageTranslation":"그리고 우리가 스스로에게 동기를 부여하려 할 때, 다른 사람들과의 연결감을 높이기 위한 행동을 하는 것이 장기적인 지속성에 결정적일 수 있다.","qType":"correct","questionText":"'crucial to long-term persistence'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"vital to maintaining motivation in the long run","isCorrect":true,"optionType":"correct","explanation":"올바름: crucial→vital, persistence→maintaining motivation, long-term→in the long run으로 환언하여 원문 함의 유지","translation":"장기적으로 동기를 유지하는 데 매우 중요한"},{"text":"key to keeping up consistent effort for a long time","isCorrect":true,"optionType":"correct","explanation":"올바름: crucial→key, persistence→consistent effort, long-term→for a long time으로 구체적 표현으로 전환하며 의미 보존","translation":"오랫동안 일관된 노력을 지속하는 데 핵심적인"},{"text":"unnecessary for achieving short-term results","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: crucial→unnecessary로 반의어 대체하고 long-term→short-term으로 반전시켜 의미가 완전히 역전됨","translation":"단기적인 결과를 달성하는 데 불필요한"},{"text":"harmful to the development of self-discipline","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: crucial(핵심적인)을 harmful(해로운)로 대체하고 persistence→self-discipline으로 바꿔 부정적 의미로 왜곡됨","translation":"자기 훈련의 발전에 해로운"},{"text":"essential for sustained effort over time","isCorrect":true,"optionType":"correct","explanation":"올바름: crucial→essential, long-term→over time, persistence→sustained effort로 의미 보존","translation":"시간이 지나도 지속적인 노력을 위해 필수적인"}],"sourceQuestion":"2번 지문"},{"keyExpression":"enhance a sense of connectedness to others","passage":"And when we are trying to motivate ourselves, doing things to enhance a sense of connectedness to others can be crucial to long-term persistence.","passageTranslation":"그리고 우리가 스스로에게 동기를 부여하려 할 때, 다른 사람들과의 연결감을 높이기 위한 행동을 하는 것이 장기적인 지속성에 결정적일 수 있다.","qType":"correct","questionText":"'enhance a sense of connectedness to others'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"strengthen the feeling of belonging to a group","isCorrect":true,"optionType":"correct","explanation":"올바름: enhance→strengthen, sense of connectedness→feeling of belonging, others→a group으로 의미 보존","translation":"집단에 속한다는 느낌을 강화하다"},{"text":"reduce one's dependence on social interactions","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: enhance→reduce로 반의어 대체하고 connectedness→dependence on social interactions로 왜곡해 의미 역전됨","translation":"사회적 상호작용에 대한 의존성을 줄이다"},{"text":"limit emotional attachment to close friends only","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: enhance→limit으로 반의어 대체하고 others를 close friends only로 좁혀 범위를 왜곡함","translation":"친한 친구들만을 향한 정서적 애착을 제한하다"}],"sourceQuestion":"2번 지문"},{"keyExpression":"marketers must know where the interested consumers are, and how to reach them","passage":"Therefore, marketers must know where the interested consumers are, and how to reach them.","passageTranslation":"따라서 마케터들은 관심 있는 소비자들이 어디에 있는지, 그리고 그들에게 어떻게 도달할지를 알아야 한다.","qType":"correct","questionText":"'marketers must know where the interested consumers are, and how to reach them'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"marketers should avoid contacting consumers who show no interest","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: must know how to reach=소통 방법을 알아야 한다인데 avoid contacting=연락을 피해야 한다로 행동 방향 역전","translation":"마케터들은 관심을 보이지 않는 소비자에게 연락하는 것을 피해야 한다"},{"text":"it is essential for marketers to identify the location of potential buyers and the best channels to connect with them","isCorrect":true,"optionType":"correct","explanation":"올바름: must know where=identify the location, interested consumers=potential buyers, how to reach=best channels to connect로 의미 재구성","translation":"마케터들이 잠재 구매자의 위치와 그들과 연결하는 최선의 채널을 파악하는 것이 필수적이다"},{"text":"it is enough to create a great product without worrying about who buys it","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: must know where the interested consumers are=소비자 파악 필수인데 without worrying about who buys=누가 사는지 신경 쓰지 않아도 된다로 핵심 요건 부정","translation":"누가 그것을 사는지 걱정하지 않고 훌륭한 제품을 만드는 것으로 충분하다"},{"text":"successful marketing requires understanding which customers to target and how to approach them effectively","isCorrect":true,"optionType":"correct","explanation":"올바름: know where=understanding which, interested consumers=customers to target, how to reach=how to approach effectively로 함축 의미 재구성","translation":"성공적인 마케팅은 어떤 고객을 목표로 할지와 그들에게 효과적으로 접근하는 방법을 이해하는 것을 필요로 한다"},{"text":"advertisers need to locate their target audience and find ways to contact them","isCorrect":true,"optionType":"correct","explanation":"올바름: marketers=advertisers, interested consumers=target audience, know where=locate, how to reach=find ways to contact로 구체화","translation":"광고주들은 목표 대상을 찾고 그들에게 연락하는 방법을 찾아야 한다"}],"sourceQuestion":"4번 지문"},{"keyExpression":"We can't force people to think one way or another","passage":"We can't force people to think one way or another, and the clever marketer knows that promotion is used to provide information in the most clear, honest, and simple fashion possible.","passageTranslation":"우리는 사람들이 한 가지 방식이나 다른 방식으로 생각하도록 강요할 수 없으며, 영리한 마케터는 홍보가 가능한 한 가장 명확하고 정직하며 단순한 방식으로 정보를 제공하는 데 사용된다는 것을 알고 있다.","qType":"correct","questionText":"'We can't force people to think one way or another'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"people naturally agree with whatever marketers tell them to think","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: can't force=강요 불가능인데 naturally agree=자연스럽게 동의로 강요 없이도 따른다는 역설적 왜곡","translation":"사람들은 마케터들이 생각하라고 말하는 것에 자연스럽게 동의한다"},{"text":"consumers are easily influenced to change their minds by promotions","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: can't force=강요 불가능인데 easily influenced=쉽게 영향받는다는 의미로 정반대 효과 암시","translation":"소비자들은 홍보에 의해 생각을 바꾸도록 쉽게 영향을 받는다"},{"text":"no one has the power to determine exactly what others choose to believe","isCorrect":true,"optionType":"correct","explanation":"올바름: can't force=no one has the power, think one way or another=what others choose to believe로 함축 의미 재구성","translation":"누구도 다른 사람들이 믿기로 선택하는 것을 정확히 결정할 힘이 없다"}],"sourceQuestion":"4번 지문"},{"keyExpression":"motivation and internalization are fueled","passage":"Thus, when the need for relatedness is met, motivation and internalization are fueled, provided that support for autonomy and competence are also there.","passageTranslation":"따라서 관계성에 대한 욕구가 충족될 때, 자율성과 역량에 대한 지원도 있다는 조건하에 동기와 내면화가 촉진된다.","qType":"correct","questionText":"'motivation and internalization are fueled'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"motivation and internalization are weakened","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: fueled(촉진됨)의 반의어 weakened(약화됨)로 대체되어 의미 역전","translation":"동기와 내면화가 약화되는"},{"text":"external pressure and compliance are increased","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: 내적 동기·내면화가 아닌 외적 압력·순응으로 개념이 완전히 왜곡됨","translation":"외부 압력과 순응이 증가하는"},{"text":"enthusiasm and personal ownership are boosted","isCorrect":true,"optionType":"correct","explanation":"올바름: fueled의 에너지 공급 함의를 boosted로 대체하며 핵심 의미 보존","translation":"열의와 개인적 주도성이 향상되는"}],"sourceQuestion":"3번 지문"},{"keyExpression":"We can't force people to think one way or another","passage":"We can't force people to think one way or another, and the clever marketer knows that promotion is used to provide information in the most clear, honest, and simple fashion possible.","passageTranslation":"우리는 사람들이 어떤 방식으로든 생각하도록 강요할 수 없으며, 영리한 마케터는 판촉이 가능한 한 가장 명확하고 정직하며 단순한 방식으로 정보를 제공하는 데 사용된다는 것을 알고 있다.","qType":"correct","questionText":"'We can't force people to think one way or another'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"training programs help people adopt the correct way of thinking","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: can't force=help adopt (가능하다는 뜻으로 역전), 마케팅 맥락을 training programs로 대체하고 correct way 삽입으로 의미 왜곡","translation":"훈련 프로그램은 사람들이 올바른 사고방식을 채택하도록 도와준다"},{"text":"marketers can easily shape how consumers perceive any product","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: can't force(강요할 수 없다)를 can easily shape(쉽게 형성할 수 있다)로 반의어 대체하여 정반대 주장 생성","translation":"마케터는 소비자가 어떤 제품을 어떻게 인식하는지 쉽게 형성할 수 있다"},{"text":"it is impossible to control what direction consumers form their opinions","isCorrect":true,"optionType":"correct","explanation":"올바름: can't force=impossible to control, think one way or another=what direction they form opinions으로 구체화하여 통제 불가 의미 보존","translation":"소비자가 어떤 방향으로 의견을 형성할지 통제하는 것은 불가능하다"}],"sourceQuestion":"5번 지문"},{"keyExpression":"Gone are the days when promotions were done in order to fool the consumer","passage":"Gone are the days when promotions were done in order to fool the consumer into purchasing something.","passageTranslation":"소비자를 속여 무언가를 구매하게 하려고 홍보가 행해지던 시대는 갔다.","qType":"correct","questionText":"'Gone are the days when promotions were done in order to fool the consumer'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"promotions have always been designed to inform consumers honestly","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: always=과거부터 항상 그랬다는 의미로 현재 변화를 나타내는 원문의 대조 구조를 무시함","translation":"홍보는 항상 소비자에게 정직하게 알리기 위해 설계되어 왔다"},{"text":"the practice of tricking people into buying has become outdated","isCorrect":true,"optionType":"correct","explanation":"올바름: fool=tricking, gone=become outdated, consumer into purchasing=people into buying으로 의미 재구성","translation":"사람들을 속여 구매하게 만드는 관행은 구식이 되었다"},{"text":"consumers are still easily fooled by clever promotional tactics","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: still easily fooled=여전히 속는다는 의미로 gone=더 이상 없다는 원문과 정반대","translation":"소비자들은 여전히 영리한 홍보 전술에 쉽게 속는다"}],"sourceQuestion":"4번 지문"},{"keyExpression":"provided that support for autonomy and competence are also there","passage":"Thus, when the need for relatedness is met, motivation and internalization are fueled, provided that support for autonomy and competence are also there.","passageTranslation":"따라서 관계성에 대한 욕구가 충족될 때, 자율성과 역량에 대한 지원도 있다는 조건하에 동기와 내면화가 촉진된다.","qType":"correct","questionText":"'provided that support for autonomy and competence are also there'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"on condition that freedom and skill development are supported","isCorrect":true,"optionType":"correct","explanation":"올바름: 자율성·역량 지원이라는 조건 의미를 동일하게 표현","translation":"자유와 기술 개발이 지원된다는 조건으로"},{"text":"even without any support for autonomy or competence","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: provided that(조건)이 even without(조건 부정)으로 바뀌어 의미 완전 역전","translation":"자율성이나 역량에 대한 지원 없이도"},{"text":"regardless of whether competence is encouraged","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: 조건의 필요성이 무시·배제되어 지문의 핵심 논리 왜곡","translation":"역량이 장려되는지 여부와 상관없이"},{"text":"only if backing for self-direction and capability is present","isCorrect":true,"optionType":"correct","explanation":"올바름: provided that의 조건절 의미와 autonomy=self-direction, competence=capability를 유지","translation":"자기 주도성과 능력에 대한 뒷받침이 있을 때만"}],"sourceQuestion":"3번 지문"},{"keyExpression":"enhance a sense of connectedness to others","passage":"And when we are trying to motivate ourselves, doing things to enhance a sense of connectedness to others can be crucial to long-term persistence.","passageTranslation":"그리고 우리 스스로에게 동기를 부여하려 할 때, 타인과의 연결감을 높이는 일을 하는 것이 장기적인 지속에 핵심적일 수 있다.","qType":"correct","questionText":"'enhance a sense of connectedness to others'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"strengthen the feeling of being linked to people","isCorrect":true,"optionType":"correct","explanation":"올바름: enhance=strengthen, sense of connectedness=feeling of being linked, others=people로 의미 유지","translation":"사람들과 연결되어 있다는 느낌을 강화하는"},{"text":"develop a sense of independence from others","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: connectedness(연결감)가 independence(독립성)로 대체되어 반대 방향의 의미가 됨","translation":"타인으로부터의 독립심을 키우는"},{"text":"reduce one's emotional ties to the community","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: enhance(강화)가 reduce(약화)로 반전되어 의미가 완전히 역전됨","translation":"공동체와의 정서적 유대를 줄이는"}],"sourceQuestion":"3번 지문"},{"keyExpression":"a wealth of evidence","passage":"There is a wealth of evidence that when parents, teachers, supervisors, and coaches are perceived as involved and caring, people feel happier and more motivated.","passageTranslation":"부모, 교사, 상사, 코치가 관심을 갖고 배려하는 것으로 인식될 때 사람들이 더 행복하고 동기부여가 된다는 풍부한 증거가 있다.","qType":"correct","questionText":"'a wealth of evidence'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"extensive data confirming this finding","isCorrect":true,"optionType":"correct","explanation":"올바름: a wealth of→extensive, evidence→data로 구체적 표현으로 전환하면서 의미 보존","translation":"이 발견을 확인해주는 광범위한 데이터"},{"text":"a single study suggesting this idea","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: a wealth of의 복수·풍부 개념을 a single로 축소하여 근거의 강도가 왜곡됨","translation":"이 아이디어를 제시하는 단 하나의 연구"},{"text":"a lack of conclusive evidence","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: a wealth of를 a lack of로 반전시켜 풍부함→결핍으로 의미 완전 역전됨","translation":"결정적 증거의 부족"}],"sourceQuestion":"2번 지문"},{"keyExpression":"the possibility of increasing sales goes up","passage":"By doing so, the possibility of increasing sales goes up.","passageTranslation":"그렇게 함으로써 매출이 증가할 가능성이 높아진다.","qType":"correct","questionText":"'the possibility of increasing sales goes up'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"there is a greater likelihood of selling more products","isCorrect":true,"optionType":"correct","explanation":"올바름: possibility=likelihood, goes up=greater로 바꿔 상승 의미 보존","translation":"더 많은 제품을 판매할 가능성이 높아진다"},{"text":"the risk of losing customers decreases sharply","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: 판매 증가 가능성 상승을 고객 손실 위험 감소로 대체 — 논리적으로 유사해 보이지만 원문에 없는 위험 개념을 삽입하여 의미 왜곡","translation":"고객을 잃을 위험이 급격히 감소한다"},{"text":"the number of marketing campaigns goes down","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: goes up을 goes down으로 반의어 대체하고 주체를 sales에서 campaigns로 바꿔 정반대 의미 생성","translation":"마케팅 캠페인의 수가 줄어든다"}],"sourceQuestion":"5번 지문"},{"keyExpression":"consumers fooled once can do damage to sales as they relate their experience to others","passage":"In fact, consumers fooled once can do damage to sales as they relate their experience to others.","passageTranslation":"사실, 한 번 속은 소비자들은 다른 사람들에게 자신의 경험을 전함으로써 판매에 해를 끼칠 수 있다.","qType":"correct","questionText":"'consumers fooled once can do damage to sales as they relate their experience to others'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"consumers who buy twice tend to become loyal to the brand","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: fooled once→buy twice로 맥락 왜곡, do damage→loyal로 인과 관계 완전 역전","translation":"두 번 구매하는 소비자들은 브랜드에 충성하는 경향이 있다"},{"text":"tricked consumers tend to warn others, which hurts overall sales","isCorrect":true,"optionType":"correct","explanation":"올바름: fooled=tricked, relate to others=warn others, do damage to sales=hurts overall sales로 인과 구조 유지","translation":"속은 소비자들은 다른 사람들에게 경고하는 경향이 있으며 이는 전체 판매에 해를 끼친다"},{"text":"satisfied customers naturally recommend products to their friends","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: fooled→satisfied로 반의 상황 대체, do damage→recommend로 결과 역전","translation":"만족한 고객들은 자연스럽게 친구들에게 제품을 추천한다"}],"sourceQuestion":"4번 지문"},{"keyExpression":"Gone are the days when promotions were done in order to fool the consumer","passage":"Gone are the days when promotions were done in order to fool the consumer into purchasing something.","passageTranslation":"소비자를 속여 무언가를 구매하게 하려는 목적으로 판촉이 이루어지던 시대는 갔다.","qType":"correct","questionText":"'Gone are the days when promotions were done in order to fool the consumer'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"marketers no longer rely on tricking customers to make sales","isCorrect":true,"optionType":"correct","explanation":"올바름: Gone=no longer, fool=tricking으로 바꿔 부정 강조 구문을 일반 부정문으로 재구성","translation":"마케터들은 더 이상 판매를 위해 고객을 속이는 방식에 의존하지 않는다"},{"text":"consumers nowadays enjoy being surprised by clever promotions","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: fool의 부정적 함의를 긍정적 surprise로 대체하고 소비자가 그것을 즐긴다고 왜곡","translation":"오늘날 소비자들은 영리한 판촉에 놀라는 것을 즐긴다"},{"text":"misleading promotions to manipulate shoppers are a thing of the past","isCorrect":true,"optionType":"correct","explanation":"올바름: Gone are the days=a thing of the past, fool=mislead/manipulate로 동일 시제 전환 의미 보존","translation":"구매자를 조종하기 위한 오해의 소지가 있는 판촉은 이제 과거의 일이다"},{"text":"promotions that trick consumers are becoming more popular","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: 소비자를 속이는 판촉이 사라졌다는 원문과 정반대로 더 인기를 끌고 있다고 서술 — 인과 역전","translation":"소비자를 속이는 판촉이 점점 더 인기를 얻고 있다"}],"sourceQuestion":"5번 지문"},{"keyExpression":"a wealth of evidence","passage":"There is a wealth of evidence that when parents, teachers, supervisors, and coaches are perceived as involved and caring, people feel happier and more motivated.","passageTranslation":"부모, 교사, 상사, 코치가 관심을 갖고 배려하는 것으로 인식될 때 사람들이 더 행복하고 동기부여가 된다는 풍부한 증거가 있다.","qType":"correct","questionText":"'a wealth of evidence'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"a single study suggesting this idea","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: a wealth of의 복수·풍부 개념을 a single로 축소하여 근거의 강도가 왜곡됨","translation":"이 아이디어를 제시하는 단 하나의 연구"},{"text":"a lack of conclusive evidence","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: a wealth of를 a lack of로 반전시켜 풍부함→결핍으로 의미 완전 역전됨","translation":"결정적 증거의 부족"},{"text":"a great deal of research backing this","isCorrect":true,"optionType":"correct","explanation":"올바름: a wealth of를 a great deal of로 환언하고 evidence의 연구 기반 함의 유지","translation":"이것을 뒷받침하는 방대한 연구"}],"sourceQuestion":"2번 지문"},{"keyExpression":"provided that support for autonomy and competence are also there","passage":"Thus, when the need for relatedness is met, motivation and internalization are fueled, provided that support for autonomy and competence are also there.","passageTranslation":"따라서 관계성에 대한 욕구가 충족될 때, 자율성과 역량에 대한 지원도 있다는 조건하에 동기와 내면화가 촉진된다.","qType":"correct","questionText":"'provided that support for autonomy and competence are also there'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"as long as encouragement for independence and ability exists","isCorrect":true,"optionType":"correct","explanation":"올바름: provided that=as long as, autonomy=independence, competence=ability로 조건의 의미 유지","translation":"독립성과 능력에 대한 격려가 존재하는 한"},{"text":"regardless of whether competence is encouraged","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: 조건의 필요성이 무시·배제되어 지문의 핵심 논리 왜곡","translation":"역량이 장려되는지 여부와 상관없이"},{"text":"even without any support for autonomy or competence","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: provided that(조건)이 even without(조건 부정)으로 바뀌어 의미 완전 역전","translation":"자율성이나 역량에 대한 지원 없이도"}],"sourceQuestion":"3번 지문"},{"keyExpression":"transform an embryo's mutated genes into 'normal' ones","passage":"Yet once it becomes possible to transform an embryo's mutated genes into 'normal' ones, there will certainly be temptations to upgrade normal genes to superior versions.","passageTranslation":"그러나 일단 배아의 돌연변이 유전자를 '정상' 유전자로 바꾸는 것이 가능해지면, 정상 유전자를 더 우월한 버전으로 업그레이드하려는 유혹이 분명히 생겨날 것이다.","qType":"correct","questionText":"'transform an embryo's mutated genes into 'normal' ones'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"convert defective genes in an unborn child to healthy ones","isCorrect":true,"optionType":"correct","explanation":"올바름: transform→convert, embryo→unborn child로 구체화, mutated→defective, normal→healthy로 동의어 대체","translation":"태어나지 않은 아이의 결함 유전자를 건강한 것으로 전환하다"},{"text":"observe mutated genes in embryos without making changes","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: transform(변환)을 observe without changes(변화 없이 관찰)로 행위의 핵심 반전","translation":"배아의 돌연변이 유전자를 변화 없이 관찰하다"},{"text":"copy an embryo's healthy genes and distribute them widely","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: transform→copy and distribute로 완전히 다른 행위로 왜곡, 핵심 교정 의미 소실","translation":"배아의 건강한 유전자를 복제하여 널리 배포하다"},{"text":"change flawed genetic material in an embryo to standard form","isCorrect":true,"optionType":"correct","explanation":"올바름: mutated→flawed, normal→standard form으로 의미 유지하며 표현 변환","translation":"배아의 결함 있는 유전 물질을 표준 형태로 바꾸다"}],"sourceQuestion":"1번 지문"},{"keyExpression":"when the need for relatedness is met","passage":"Thus, when the need for relatedness is met, motivation and internalization are fueled, provided that support for autonomy and competence are also there.","passageTranslation":"따라서 관계성에 대한 욕구가 충족될 때, 자율성과 유능감에 대한 지지도 함께 있다는 전제 하에 동기와 내면화가 촉진된다.","qType":"correct","questionText":"'when the need for relatedness is met'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"before the desire for independence is achieved","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: relatedness(관계성)를 independence(독립)로 반의어 대체하고 when→before로 시간 조건까지 왜곡됨","translation":"독립에 대한 욕구가 달성되기 전에"},{"text":"when the need for relatedness is ignored","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: met(충족)를 ignored(무시됨)로 대체해 조건의 결과가 정반대로 역전됨","translation":"관계성에 대한 욕구가 무시될 때"},{"text":"once the desire for connection is fulfilled","isCorrect":true,"optionType":"correct","explanation":"올바름: need→desire, relatedness→connection, met→fulfilled로 환언하여 조건절 의미 보존","translation":"연결에 대한 욕구가 충족될 때"},{"text":"when the longing for social ties is addressed","isCorrect":true,"optionType":"correct","explanation":"올바름: need→longing, relatedness→social ties, met→addressed로 구체적으로 환언하며 의미 보존","translation":"사회적 유대에 대한 갈망이 해소될 때"},{"text":"if the requirement for belonging is satisfied","isCorrect":true,"optionType":"correct","explanation":"올바름: need→requirement, relatedness→belonging, met→satisfied로 대체하며 원문 함의 유지","translation":"소속감에 대한 요구가 충족된다면"}],"sourceQuestion":"2번 지문"},{"keyExpression":"identify the consumers who are most likely to appreciate a good or service","passage":"Instead, marketers now know that their goal is to identify the consumers who are most likely to appreciate a good or service, and to promote that good or service in a way that makes the value clear to the consumer.","passageTranslation":"대신, 마케터들은 이제 자신들의 목표가 상품이나 서비스를 가장 높이 평가할 가능성이 있는 소비자를 파악하고, 그 가치를 소비자에게 명확하게 하는 방식으로 해당 상품이나 서비스를 홍보하는 것임을 알고 있다.","qType":"correct","questionText":"'identify the consumers who are most likely to appreciate a good or service'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"target audiences who are most inclined to see value in the product","isCorrect":true,"optionType":"correct","explanation":"올바름: identify=target, most likely to appreciate=most inclined to see value in으로 구체화하여 마케팅 타겟팅 의미 보존","translation":"제품의 가치를 인정하려는 성향이 가장 강한 대상을 타겟으로 삼다"},{"text":"find buyers who are the best candidates to value a product","isCorrect":true,"optionType":"correct","explanation":"올바름: identify=find, most likely to appreciate=best candidates to value로 대체하여 타겟 선별 의미 유지","translation":"제품의 가치를 인정할 가능성이 가장 높은 구매자를 찾다"},{"text":"create entirely new products based on what random buyers suggest","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: identify consumers를 create new products로 주체와 행위 모두 왜곡하고 random buyers를 삽입해 타겟팅 개념 제거","translation":"무작위 구매자의 제안을 바탕으로 완전히 새로운 제품을 만들다"},{"text":"convince all consumers to purchase goods regardless of their needs","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: identify(선별)를 convince all(모두 설득)로 대체하고 regardless of needs를 추가해 원문의 맞춤형 타겟팅 의미를 정반대로 왜곡","translation":"필요 여부와 관계없이 모든 소비자가 제품을 구매하도록 설득하다"},{"text":"pinpoint potential customers who would truly benefit from the offering","isCorrect":true,"optionType":"correct","explanation":"올바름: identify=pinpoint, appreciate=benefit from, good or service=offering으로 바꿔 동일 함의 구현","translation":"해당 상품으로부터 진정으로 혜택을 받을 잠재 고객을 정확히 파악하다"}],"sourceQuestion":"5번 지문"},{"keyExpression":"identify the consumers who are most likely to appreciate a good or service","passage":"marketers now know that their goal is to identify the consumers who are most likely to appreciate a good or service.","passageTranslation":"마케터들은 이제 그들의 목표가 상품이나 서비스를 가장 높이 평가할 가능성이 높은 소비자를 파악하는 것임을 알고 있다.","qType":"correct","questionText":"'identify the consumers who are most likely to appreciate a good or service'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"locate potential customers who would truly benefit from the product","isCorrect":true,"optionType":"correct","explanation":"올바름: identify=locate, most likely to appreciate=would truly benefit, good=product로 추상→구체 전환","translation":"제품으로부터 진정으로 이익을 얻을 잠재 고객을 찾아내다"},{"text":"ignore the preferences of consumers who dislike the product","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: identify=파악하는 행위인데 ignore=무시로 반의 행위 대체, appreciate의 긍정 의미 왜곡","translation":"제품을 싫어하는 소비자의 선호를 무시하다"},{"text":"persuade all consumers to purchase goods regardless of their needs","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: identify=선별하는 행위인데 persuade all=모두 설득으로 목표 고객 선별 개념 무시","translation":"필요 여부와 관계없이 모든 소비자가 상품을 구매하도록 설득하다"}],"sourceQuestion":"4번 지문"},{"keyExpression":"motivation and internalization are fueled","passage":"Thus, when the need for relatedness is met, motivation and internalization are fueled, provided that support for autonomy and competence are also there.","passageTranslation":"따라서 관계성에 대한 욕구가 충족될 때, 자율성과 유능감에 대한 지지도 함께 있다는 전제 하에 동기와 내면화가 촉진된다.","qType":"correct","questionText":"'motivation and internalization are fueled'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"initiative and ownership are energized","isCorrect":true,"optionType":"correct","explanation":"올바름: motivation→initiative, internalization→ownership, fueled→energized로 문맥 의미 유지","translation":"주도성과 자기화가 활성화된다"},{"text":"resistance and avoidance are triggered","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: motivation→resistance, internalization→avoidance로 반의어 대체하고 fueled→triggered로 바꿔 원문과 반대 의미 생성","translation":"저항과 회피가 촉발된다"},{"text":"motivation and internalization are weakened","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: fueled(촉진된다)를 weakened(약화된다)로 반의어 대체하여 인과 방향이 완전히 역전됨","translation":"동기와 내면화가 약화된다"},{"text":"enthusiasm and commitment are boosted","isCorrect":true,"optionType":"correct","explanation":"올바름: fueled의 에너지 공급 함의를 boosted로, motivation/internalization을 enthusiasm/commitment로 환언","translation":"열정과 헌신이 높아진다"}],"sourceQuestion":"2번 지문"},{"keyExpression":"correct disease-causing mutations at the earliest possible stage of life","passage":"it might seem logical, even preferable, to correct disease-causing mutations at the earliest possible stage of life, before harmful genes begin causing serious problems.","passageTranslation":"해로운 유전자가 심각한 문제를 일으키기 시작하기 전에, 가능한 한 가장 이른 생애 단계에서 질병을 유발하는 돌연변이를 교정하는 것이 논리적이고 심지어 바람직해 보일 수도 있다.","qType":"correct","questionText":"'correct disease-causing mutations at the earliest possible stage of life'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"prevent only mild genetic variations from spreading","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: disease-causing(질병 유발)을 mild(경미한)로 왜곡하고 spreading이라는 무관한 개념 삽입","translation":"경미한 유전적 변이만 확산되지 않도록 막다"},{"text":"delay treatment of mutations until symptoms appear","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: earliest possible stage(조기)와 정반대로 증상 발현 후 치료를 의미하여 인과 역전","translation":"증상이 나타날 때까지 돌연변이 치료를 미루다"},{"text":"address gene defects before they cause damage","isCorrect":true,"optionType":"correct","explanation":"올바름: at the earliest stage→before they cause damage로 시간적 선제성 의미 재구성","translation":"손상을 일으키기 전에 유전자 결함을 다루다"},{"text":"fix harmful genetic errors as early as possible","isCorrect":true,"optionType":"correct","explanation":"올바름: correct→fix, disease-causing mutations→harmful genetic errors로 동의어 대체, 핵심 의미 유지","translation":"가능한 한 일찍 해로운 유전적 오류를 교정하다"}],"sourceQuestion":"1번 지문"},{"keyExpression":"if we start down this slippery slope, we may not like where we end up","passage":"The pursuit for perfection seems almost natural to human nature, but if we start down this slippery slope, we may not like where we end up.","passageTranslation":"완벽함을 향한 추구는 인간의 본성에 거의 자연스러운 것처럼 보이지만, 만약 우리가 이 미끄러운 경사면을 내려가기 시작하면, 우리는 결국 어디에 이르게 될지 마음에 들지 않을 수도 있다.","qType":"correct","questionText":"'if we start down this slippery slope, we may not like where we end up'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"taking the first step in this direction risks arriving somewhere unwanted","isCorrect":true,"optionType":"correct","explanation":"올바름: start down→taking the first step, slippery slope→this direction, may not like where we end up→arriving somewhere unwanted로 구체화","translation":"이 방향으로 첫걸음을 내딛는 것은 원치 않는 곳에 도달하는 위험을 감수하는 것이다"},{"text":"beginning this process could lead us to undesirable consequences","isCorrect":true,"optionType":"correct","explanation":"올바름: start down slippery slope→beginning this process, may not like where we end up→undesirable consequences로 함축 재구성","translation":"이 과정을 시작하는 것은 우리를 바람직하지 않은 결과로 이끌 수 있다"},{"text":"this gradual process will certainly bring about positive change","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: may not like(마음에 들지 않을 수 있다)를 certainly positive(확실히 긍정적)로 방향과 확실성 모두 왜곡","translation":"이 점진적인 과정은 분명히 긍정적인 변화를 가져올 것이다"},{"text":"avoiding the slope entirely guarantees a safe and beneficial result","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: start down slippery slope(경사면 내려가기)를 avoiding entirely(완전히 피하기)로 조건 역전, guarantees safe로 결과도 반전","translation":"경사면을 완전히 피하는 것이 안전하고 유익한 결과를 보장한다"}],"sourceQuestion":"1번 지문"},{"keyExpression":"Promotion deals with consumer psychology","passage":"Promotion deals with consumer psychology.","passageTranslation":"판촉은 소비자 심리를 다룬다.","qType":"correct","questionText":"'Promotion deals with consumer psychology'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"consumer psychology is entirely separate from promotional strategies","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: deals with(~를 다루다, 연결되다)를 entirely separate(완전히 분리된)로 반의어 대체하여 정반대 관계 서술","translation":"소비자 심리는 판촉 전략과 완전히 별개이다"},{"text":"promotion is mainly about setting competitive prices for products","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: consumer psychology를 competitive prices로 대체하여 핵심 주제인 심리적 접근을 가격 전략으로 왜곡","translation":"판촉은 주로 제품의 경쟁력 있는 가격을 설정하는 것에 관한 것이다"},{"text":"marketing activities are rooted in understanding the consumer mindset","isCorrect":true,"optionType":"correct","explanation":"올바름: Promotion=marketing activities, deals with=is rooted in, consumer psychology=consumer mindset으로 추상→구체 전환하여 의미 유지","translation":"마케팅 활동은 소비자의 사고방식을 이해하는 것에 기반을 두고 있다"},{"text":"advertising is closely connected to how buyers think and feel","isCorrect":true,"optionType":"correct","explanation":"올바름: Promotion=advertising, deals with=is closely connected to, consumer psychology=how buyers think and feel로 구체화하여 핵심 주제 보존","translation":"광고는 구매자가 생각하고 느끼는 방식과 밀접하게 연결되어 있다"},{"text":"the way products are promoted relates to the mental processes of shoppers","isCorrect":true,"optionType":"correct","explanation":"올바름: Promotion=the way products are promoted, deals with=relates to, consumer psychology=mental processes of shoppers로 대체하여 동일 주제 의미 보존","translation":"제품이 홍보되는 방식은 구매자의 심리적 과정과 관련이 있다"}],"sourceQuestion":"5번 지문"},{"keyExpression":"provided that support for autonomy and competence are also there","passage":"Thus, when the need for relatedness is met, motivation and internalization are fueled, provided that support for autonomy and competence are also there.","passageTranslation":"따라서 관계성에 대한 욕구가 충족될 때, 자율성과 유능감에 대한 지지도 함께 있다는 전제 하에 동기와 내면화가 촉진된다.","qType":"correct","questionText":"'provided that support for autonomy and competence are also there'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"unless autonomy and competence are restricted","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: provided that(~한다면)을 unless(~하지 않으면)로 바꾸고 support→restricted로 반의어 대체해 조건이 역전됨","translation":"자율성과 유능감이 제한되지 않는 한"},{"text":"even if support for dependence and weakness exists","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: autonomy→dependence, competence→weakness로 반의어 대체하여 핵심 개념이 완전히 왜곡됨","translation":"의존성과 나약함에 대한 지지가 존재하더라도"},{"text":"given that self-direction and capability are supported too","isCorrect":true,"optionType":"correct","explanation":"올바름: provided that→given that, autonomy→self-direction, competence→capability로 대체하여 조건절 의미 보존","translation":"자기 주도성과 능력 또한 지지된다고 할 때"}],"sourceQuestion":"2번 지문"},{"keyExpression":"consumers fooled once can do damage to sales as they relate their experience to others","passage":"In fact, consumers fooled once can do damage to sales as they relate their experience to others.","passageTranslation":"실제로, 한 번 속은 소비자들은 자신의 경험을 다른 사람들에게 전함으로써 판매에 피해를 줄 수 있다.","qType":"correct","questionText":"'consumers fooled once can do damage to sales as they relate their experience to others'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"satisfied customers who share their experience can greatly boost sales","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: fooled(속은)을 satisfied(만족한)으로, do damage(해를 끼침)를 boost(증가)로 반의어 대체하여 정반대 의미 생성","translation":"경험을 공유하는 만족한 고객은 판매를 크게 증가시킬 수 있다"},{"text":"a single bad experience shared by customers can harm overall sales","isCorrect":true,"optionType":"correct","explanation":"올바름: fooled once=a single bad experience, relate their experience=shared by customers로 추상→구체 전환하여 인과 구조 유지","translation":"고객이 공유하는 단 한 번의 나쁜 경험이 전체 판매에 해를 끼칠 수 있다"},{"text":"consumers who are tricked tend to return for a better product next time","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: do damage to sales라는 부정적 결과를 다음 구매 시도라는 긍정적 결과로 인과 역전","translation":"속은 소비자는 다음번에 더 좋은 제품을 찾아 다시 돌아오는 경향이 있다"},{"text":"buyers deceived even once may hurt revenue by spreading bad reviews","isCorrect":true,"optionType":"correct","explanation":"올바름: fooled=deceived, do damage to sales=hurt revenue, relate their experience=spreading bad reviews로 구체화하여 의미 보존","translation":"단 한 번이라도 속은 구매자는 부정적 후기를 퍼뜨려 수익에 해를 끼칠 수 있다"},{"text":"when tricked consumers tell others, it negatively affects a company's profits","isCorrect":true,"optionType":"correct","explanation":"올바름: fooled=tricked, do damage to sales=negatively affects profits, relate their experience=tell others로 대체하여 동일 인과 유지","translation":"속은 소비자가 다른 사람에게 말하면 회사의 수익에 부정적인 영향을 미친다"}],"sourceQuestion":"5번 지문"},{"keyExpression":"the long-term effect of getting a consumer to buy something they did not really want or need","passage":"The long-term effect of getting a consumer to buy something they did not really want or need wasn't good.","passageTranslation":"소비자가 실제로 원하지 않거나 필요하지 않은 것을 구매하도록 유도하는 것의 장기적 효과는 좋지 않았다.","qType":"correct","questionText":"'the long-term effect of getting a consumer to buy something they did not really want or need'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"the short-term benefit of helping customers find products they truly need","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: long-term을 short-term으로, negative effect를 benefit으로 반의어 대체하고 did not want을 truly need로 반전시켜 정반대 의미 생성","translation":"고객이 진정으로 필요한 제품을 찾도록 돕는 것의 단기적 이익"},{"text":"what happens over time when buyers are pressured into unneeded purchases","isCorrect":true,"optionType":"correct","explanation":"올바름: long-term effect=what happens over time, getting=pressured into, did not want or need=unneeded로 바꿔 시간적 결과 구조 보존","translation":"구매자가 불필요한 구매를 하도록 압박받을 때 시간이 지나면서 일어나는 일"},{"text":"the immediate result of matching consumers perfectly with the right products","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: long-term을 immediate(즉각적)로, did not want or need(원하지 않거나 필요 없는)를 right products(적합한 제품)로 대체하여 의미 역전","translation":"소비자를 적합한 제품과 완벽하게 연결하는 즉각적인 결과"}],"sourceQuestion":"5번 지문"},{"keyExpression":"if we start down this slippery slope, we may not like where we end up","passage":"The pursuit for perfection seems almost natural to human nature, but if we start down this slippery slope, we may not like where we end up.","passageTranslation":"완벽함을 향한 추구는 인간의 본성에 거의 자연스러운 것처럼 보이지만, 만약 우리가 이 미끄러운 경사면을 내려가기 시작하면, 우리는 결국 어디에 이르게 될지 마음에 들지 않을 수도 있다.","qType":"correct","questionText":"'if we start down this slippery slope, we may not like where we end up'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"avoiding the slope entirely guarantees a safe and beneficial result","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: start down slippery slope(경사면 내려가기)를 avoiding entirely(완전히 피하기)로 조건 역전, guarantees safe로 결과도 반전","translation":"경사면을 완전히 피하는 것이 안전하고 유익한 결과를 보장한다"},{"text":"this gradual process will certainly bring about positive change","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: may not like(마음에 들지 않을 수 있다)를 certainly positive(확실히 긍정적)로 방향과 확실성 모두 왜곡","translation":"이 점진적인 과정은 분명히 긍정적인 변화를 가져올 것이다"},{"text":"once we go down this path, the outcome may be deeply regrettable","isCorrect":true,"optionType":"correct","explanation":"올바름: slippery slope→this path, may not like→regrettable로 감정적 함축 재구성","translation":"일단 이 길을 걷기 시작하면, 결과는 깊이 후회스러울 수 있다"}],"sourceQuestion":"1번 지문"},{"keyExpression":"perceived as involved and caring","passage":"There is a wealth of evidence that when parents, teachers, supervisors, and coaches are perceived as involved and caring, people feel happier and more motivated.","passageTranslation":"부모, 교사, 상사, 코치가 참여하고 배려하는 것으로 인식될 때 사람들이 더 행복하고 동기부여가 된다는 풍부한 증거가 있다.","qType":"correct","questionText":"'perceived as involved and caring'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"perceived as strict and demanding","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: caring의 반대 의미인 strict and demanding으로 대체되어 의미 왜곡","translation":"엄격하고 요구가 많은 것으로 여겨지는"},{"text":"viewed as interested and considerate","isCorrect":true,"optionType":"correct","explanation":"올바름: 상대방의 관심과 배려가 인식된다는 핵심 의미 보존","translation":"관심 있고 사려 깊은 것으로 보이는"},{"text":"proven to be skilled and efficient","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: 능력과 효율성의 의미로 바뀌어 관계적 배려의 핵심 의미 손실","translation":"능숙하고 효율적인 것으로 증명된"}],"sourceQuestion":"3번 지문"},{"keyExpression":"promote that good or service in a way that makes the value clear to the consumer","passage":"Instead, marketers now know that their goal is to identify the consumers who are most likely to appreciate a good or service, and to promote that good or service in a way that makes the value clear to the consumer.","passageTranslation":"대신, 마케터들은 이제 자신들의 목표가 상품이나 서비스를 가장 높이 평가할 가능성이 있는 소비자를 파악하고, 그 소비자에게 가치를 명확히 하는 방식으로 그 상품이나 서비스를 홍보하는 것임을 알고 있다.","qType":"correct","questionText":"'promote that good or service in a way that makes the value clear to the consumer'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"advertise a product so that customers clearly understand its worth","isCorrect":true,"optionType":"correct","explanation":"올바름: promote=advertise, makes the value clear=clearly understand its worth로 대체하여 가치 전달 의미 보존","translation":"고객이 제품의 가치를 명확히 이해할 수 있도록 광고하다"},{"text":"lower the price of products to attract as many buyers as possible","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: makes the value clear(가치를 명확히 하다)를 lower the price(가격 인하)로 대체 — 가치 소통 전략을 가격 전략으로 왜곡","translation":"최대한 많은 구매자를 유치하기 위해 제품 가격을 낮추다"},{"text":"exaggerate a product's features to generate excitement among shoppers","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: clear/honest 전달이라는 원문 취지를 exaggerate(과장)로 반의어 대체하여 기만적 의미 삽입","translation":"구매자들 사이에서 흥분을 유발하기 위해 제품 특징을 과장하다"}],"sourceQuestion":"5번 지문"},{"keyExpression":"Gone are the days when promotions were done in order to fool the consumer","passage":"Gone are the days when promotions were done in order to fool the consumer into purchasing something.","passageTranslation":"소비자를 속여 무언가를 구매하게 하려고 홍보가 행해지던 시대는 갔다.","qType":"correct","questionText":"'Gone are the days when promotions were done in order to fool the consumer'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"the era of deceiving buyers through advertising is now over","isCorrect":true,"optionType":"correct","explanation":"올바름: Gone are the days=is now over, fool=deceiving, consumer=buyers로 도치 구문을 평서문으로 전환","translation":"광고를 통해 구매자를 속이던 시대는 이제 끝났다"},{"text":"consumers are still easily fooled by clever promotional tactics","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: still easily fooled=여전히 속는다는 의미로 gone=더 이상 없다는 원문과 정반대","translation":"소비자들은 여전히 영리한 홍보 전술에 쉽게 속는다"},{"text":"promotions have always been designed to inform consumers honestly","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: always=과거부터 항상 그랬다는 의미로 현재 변화를 나타내는 원문의 대조 구조를 무시함","translation":"홍보는 항상 소비자에게 정직하게 알리기 위해 설계되어 왔다"},{"text":"marketers no longer aim to mislead customers with promotions","isCorrect":true,"optionType":"correct","explanation":"올바름: gone=no longer, fool=mislead, consumer=customers로 핵심 의미 유지","translation":"마케터들은 더 이상 홍보로 고객을 오도하려 하지 않는다"}],"sourceQuestion":"4번 지문"},{"keyExpression":"We can't force people to think one way or another","passage":"We can't force people to think one way or another, and the clever marketer knows that promotion is used to provide information in the most clear, honest, and simple fashion possible.","passageTranslation":"우리는 사람들이 한 가지 방식이나 다른 방식으로 생각하도록 강요할 수 없으며, 영리한 마케터는 홍보가 가능한 한 가장 명확하고 정직하며 단순한 방식으로 정보를 제공하는 데 사용된다는 것을 알고 있다.","qType":"correct","questionText":"'We can't force people to think one way or another'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"people naturally agree with whatever marketers tell them to think","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: can't force=강요 불가능인데 naturally agree=자연스럽게 동의로 강요 없이도 따른다는 역설적 왜곡","translation":"사람들은 마케터들이 생각하라고 말하는 것에 자연스럽게 동의한다"},{"text":"marketers cannot compel customers to hold specific views about products","isCorrect":true,"optionType":"correct","explanation":"올바름: can't force=cannot compel, think one way or another=hold specific views로 의미 보존","translation":"마케터들은 고객이 제품에 대한 특정 견해를 갖도록 강요할 수 없다"},{"text":"consumers are easily influenced to change their minds by promotions","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: can't force=강요 불가능인데 easily influenced=쉽게 영향받는다는 의미로 정반대 효과 암시","translation":"소비자들은 홍보에 의해 생각을 바꾸도록 쉽게 영향을 받는다"},{"text":"it is impossible to control or dictate how consumers form their opinions","isCorrect":true,"optionType":"correct","explanation":"올바름: can't force=impossible to control, think one way or another=form their opinions로 추상→구체 전환","translation":"소비자가 의견을 형성하는 방식을 통제하거나 지시하는 것은 불가능하다"}],"sourceQuestion":"4번 지문"},{"keyExpression":"Promotion deals with consumer psychology","passage":"Promotion deals with consumer psychology.","passageTranslation":"홍보는 소비자 심리를 다룬다.","qType":"correct","questionText":"'Promotion deals with consumer psychology'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"promotion is mainly concerned with setting competitive prices","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: consumer psychology=심리적 측면인데 setting competitive prices=가격 책정으로 핵심 개념 대체","translation":"홍보는 주로 경쟁력 있는 가격 설정에 관련된다"},{"text":"promotional strategies must take into account the mental responses of shoppers","isCorrect":true,"optionType":"correct","explanation":"올바름: deals with=take into account, consumer psychology=mental responses of shoppers로 함축 의미 구체화","translation":"홍보 전략은 쇼핑객의 심리적 반응을 고려해야 한다"},{"text":"advertising departments operate independently of consumer behavior","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: deals with=연관된다는 의미인데 operate independently=독립적으로 운영으로 관계 부정","translation":"광고 부서는 소비자 행동과 독립적으로 운영된다"}],"sourceQuestion":"4번 지문"},{"keyExpression":"enhance a sense of connectedness to others","passage":"And when we are trying to motivate ourselves, doing things to enhance a sense of connectedness to others can be crucial to long-term persistence.","passageTranslation":"그리고 우리 스스로에게 동기를 부여하려 할 때, 타인과의 연결감을 높이는 일을 하는 것이 장기적인 지속에 핵심적일 수 있다.","qType":"correct","questionText":"'enhance a sense of connectedness to others'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"develop a sense of independence from others","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: connectedness(연결감)가 independence(독립성)로 대체되어 반대 방향의 의미가 됨","translation":"타인으로부터의 독립심을 키우는"},{"text":"reduce one's emotional ties to the community","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: enhance(강화)가 reduce(약화)로 반전되어 의미가 완전히 역전됨","translation":"공동체와의 정서적 유대를 줄이는"},{"text":"deepen one's bond with those around them","isCorrect":true,"optionType":"correct","explanation":"올바름: enhance=deepen, connectedness=bond로 관계의 강화라는 핵심 의미 보존","translation":"주변 사람들과의 유대를 깊게 하는"},{"text":"build a stronger sense of social belonging","isCorrect":true,"optionType":"correct","explanation":"올바름: connectedness to others의 핵심인 사회적 소속감의 강화로 의미 전환하여 유지","translation":"더 강한 사회적 소속감을 키우는"}],"sourceQuestion":"3번 지문"},{"keyExpression":"consumers fooled once can do damage to sales as they relate their experience to others","passage":"In fact, consumers fooled once can do damage to sales as they relate their experience to others.","passageTranslation":"사실, 한 번 속은 소비자들은 다른 사람들에게 자신의 경험을 전함으로써 판매에 해를 끼칠 수 있다.","qType":"correct","questionText":"'consumers fooled once can do damage to sales as they relate their experience to others'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"a single act of misleading a customer can spread negative word-of-mouth","isCorrect":true,"optionType":"correct","explanation":"올바름: fooled once=single act of misleading, do damage=negative, relate to others=word-of-mouth로 함축 의미 재구성","translation":"고객을 한 번 오도하는 행위가 부정적인 입소문을 퍼뜨릴 수 있다"},{"text":"satisfied customers naturally recommend products to their friends","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: fooled→satisfied로 반의 상황 대체, do damage→recommend로 결과 역전","translation":"만족한 고객들은 자연스럽게 친구들에게 제품을 추천한다"},{"text":"consumers who buy twice tend to become loyal to the brand","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: fooled once→buy twice로 맥락 왜곡, do damage→loyal로 인과 관계 완전 역전","translation":"두 번 구매하는 소비자들은 브랜드에 충성하는 경향이 있다"}],"sourceQuestion":"4번 지문"},{"keyExpression":"perceived as involved and caring","passage":"There is a wealth of evidence that when parents, teachers, supervisors, and coaches are perceived as involved and caring, people feel happier and more motivated.","passageTranslation":"부모, 교사, 상사, 코치가 참여하고 배려하는 것으로 인식될 때 사람들이 더 행복하고 동기부여가 된다는 풍부한 증거가 있다.","qType":"correct","questionText":"'perceived as involved and caring'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"proven to be skilled and efficient","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: 능력과 효율성의 의미로 바뀌어 관계적 배려의 핵심 의미 손실","translation":"능숙하고 효율적인 것으로 증명된"},{"text":"seen as engaged and supportive","isCorrect":true,"optionType":"correct","explanation":"올바름: perceived=seen as, involved=engaged, caring=supportive로 의미 유지","translation":"참여하고 지지하는 것으로 여겨지는"},{"text":"perceived as strict and demanding","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: caring의 반대 의미인 strict and demanding으로 대체되어 의미 왜곡","translation":"엄격하고 요구가 많은 것으로 여겨지는"}],"sourceQuestion":"3번 지문"},{"keyExpression":"there will certainly be temptations to upgrade normal genes to superior versions","passage":"Yet once it becomes possible to transform an embryo's mutated genes into 'normal' ones, there will certainly be temptations to upgrade normal genes to superior versions.","passageTranslation":"그러나 일단 배아의 돌연변이 유전자를 '정상' 유전자로 바꾸는 것이 가능해지면, 정상 유전자를 더 우월한 버전으로 업그레이드하려는 유혹이 분명히 생겨날 것이다.","qType":"correct","questionText":"'there will certainly be temptations to upgrade normal genes to superior versions'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"scientists will be forced to downgrade abnormal genes","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: upgrade→downgrade로 반의어 대체, normal→abnormal로 대상 왜곡","translation":"과학자들은 비정상 유전자를 하향 조정하도록 강요받을 것이다"},{"text":"pressure to improve genes beyond normal will surely arise","isCorrect":true,"optionType":"correct","explanation":"올바름: temptations→pressure, upgrade to superior→beyond normal로 비교 구조 재구성","translation":"정상 수준을 넘어 유전자를 개선하려는 압박이 분명히 생겨날 것이다"},{"text":"the desire to make genes better than average will emerge","isCorrect":true,"optionType":"correct","explanation":"올바름: temptations→desire, superior versions→better than average로 구체화","translation":"유전자를 평균보다 더 좋게 만들려는 욕구가 생겨날 것이다"},{"text":"there will be little interest in modifying standard genes","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: certainly be temptations(확실한 유혹)을 little interest(거의 관심 없음)로 의미 완전 역전","translation":"표준 유전자를 변형하는 것에 관심이 거의 없을 것이다"}],"sourceQuestion":"1번 지문"},{"keyExpression":"crucial to long-term persistence","passage":"And when we are trying to motivate ourselves, doing things to enhance a sense of connectedness to others can be crucial to long-term persistence.","passageTranslation":"그리고 우리 스스로에게 동기를 부여하려 할 때, 타인과의 연결감을 높이는 일을 하는 것이 장기적인 지속에 핵심적일 수 있다.","qType":"correct","questionText":"'crucial to long-term persistence'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"vital for keeping up motivation continuously","isCorrect":true,"optionType":"correct","explanation":"올바름: crucial=vital, persistence=keeping up motivation으로 지속성의 의미 보존","translation":"지속적으로 동기를 유지하는 데 매우 중요한"},{"text":"helpful only at the very beginning of a task","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: long-term(장기적)이 very beginning(초기)으로 시간적 범위가 반대로 왜곡됨","translation":"과제의 바로 초반에만 도움이 되는"},{"text":"unnecessary for achieving short-term goals","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: crucial(필수적)이 unnecessary(불필요한)로, long-term이 short-term으로 둘 다 역전됨","translation":"단기 목표 달성에는 불필요한"}],"sourceQuestion":"3번 지문"},{"keyExpression":"giving unborn children beneficial features, like greater strength and increased mental abilities","passage":"What about giving unborn children beneficial features, like greater strength and increased mental abilities, or changing physical characteristics, like eye and hair color?","passageTranslation":"태어나지 않은 아이들에게 더 큰 힘이나 향상된 정신 능력과 같은 유익한 특성을 부여하거나, 눈이나 머리카락 색깔과 같은 신체적 특성을 바꾸는 것은 어떨까?","qType":"correct","questionText":"'giving unborn children beneficial features, like greater strength and increased mental abilities'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"removing harmful traits from children after they are born","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: giving beneficial features(유익한 특성 부여)를 removing harmful traits(해로운 특성 제거)로 행위와 방향 모두 왜곡, after born으로 시점 역전","translation":"태어난 후 아이들에게서 해로운 특성을 제거하다"},{"text":"granting embryos positive qualities including superior cognitive capacity","isCorrect":true,"optionType":"correct","explanation":"올바름: giving→granting, unborn children→embryos, beneficial→positive, mental abilities→cognitive capacity로 의미 유지","translation":"우월한 인지 능력을 포함한 긍정적 자질을 배아에게 부여하다"},{"text":"providing fetuses with advantageous traits such as enhanced intelligence","isCorrect":true,"optionType":"correct","explanation":"올바름: giving→providing, unborn children→fetuses, beneficial features→advantageous traits, increased mental abilities→enhanced intelligence로 동의어 전환","translation":"향상된 지능과 같은 유리한 특성을 태아에게 제공하다"},{"text":"testing children's natural abilities without any genetic modification","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: giving beneficial features(특성 부여)를 testing without modification(수정 없는 검사)으로 핵심 행위 완전 부정","translation":"어떠한 유전자 변형 없이 아이들의 자연적 능력을 검사하다"},{"text":"equipping children before birth with desirable physical and cognitive strengths","isCorrect":true,"optionType":"correct","explanation":"올바름: beneficial features→desirable strengths, greater strength→physical, mental abilities→cognitive로 분류 구체화","translation":"태어나기 전 아이들에게 바람직한 신체적, 인지적 강점을 갖추게 하다"}],"sourceQuestion":"1번 지문"},{"keyExpression":"the need for relatedness is met","passage":"Thus, when the need for relatedness is met, motivation and internalization are fueled, provided that support for autonomy and competence are also there.","passageTranslation":"따라서 관계성에 대한 욕구가 충족될 때, 자율성과 역량에 대한 지원도 있다는 조건하에 동기와 내면화가 촉진된다.","qType":"correct","questionText":"'the need for relatedness is met'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"one's sense of belonging is fulfilled","isCorrect":true,"optionType":"correct","explanation":"올바름: relatedness의 핵심인 소속감이 충족된다는 의미 보존","translation":"소속감이 충족되는"},{"text":"the need for independence is fulfilled","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: relatedness(관계성)가 independence(독립성)로 대체되어 반대 개념이 됨","translation":"독립성에 대한 욕구가 충족되는"},{"text":"the requirement for relatedness is ignored","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: met(충족됨)가 ignored(무시됨)로 바뀌어 인과 관계가 역전됨","translation":"관계성에 대한 요구가 무시되는"},{"text":"the desire for connection is satisfied","isCorrect":true,"optionType":"correct","explanation":"올바름: need=desire, relatedness=connection, met=satisfied로 핵심 의미 완전히 유지","translation":"연결에 대한 욕구가 충족되는"},{"text":"the urge to bond with others is addressed","isCorrect":true,"optionType":"correct","explanation":"올바름: 타인과의 유대 욕구가 충족된다는 함의 유지","translation":"타인과 유대를 맺고자 하는 충동이 해결되는"}],"sourceQuestion":"3번 지문"},{"keyExpression":"a wealth of evidence","passage":"There is a wealth of evidence that when parents, teachers, supervisors, and coaches are perceived as involved and caring, people feel happier and more motivated.","passageTranslation":"부모, 교사, 상사, 코치가 관심을 갖고 배려하는 것으로 인식될 때 사람들이 더 행복하고 동기부여가 된다는 풍부한 증거가 있다.","qType":"correct","questionText":"'a wealth of evidence'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"abundant proof supporting the claim","isCorrect":true,"optionType":"correct","explanation":"올바름: a wealth of→abundant, evidence→proof로 양적 풍부함과 근거의 의미 모두 유지","translation":"그 주장을 뒷받침하는 풍부한 증거"},{"text":"a lack of conclusive evidence","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: a wealth of를 a lack of로 반전시켜 풍부함→결핍으로 의미 완전 역전됨","translation":"결정적 증거의 부족"},{"text":"a single study suggesting this idea","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: a wealth of의 복수·풍부 개념을 a single로 축소하여 근거의 강도가 왜곡됨","translation":"이 아이디어를 제시하는 단 하나의 연구"}],"sourceQuestion":"2번 지문"},{"keyExpression":"a caring relationship is a crucial basis from which to begin","passage":"If we are trying to motivate others, a caring relationship is a crucial basis from which to begin.","passageTranslation":"우리가 다른 사람들에게 동기를 부여하려 한다면, 배려하는 관계가 시작하기 위한 중요한 토대이다.","qType":"correct","questionText":"'a caring relationship is a crucial basis from which to begin'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"a competitive relationship is a natural outcome to expect","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: caring→competitive로 왜곡하고 basis from which to begin→outcome to expect로 출발점이 결과물로 인과 역전됨","translation":"경쟁적 관계는 기대할 수 있는 자연스러운 결과이다"},{"text":"an empathetic relationship forms the core ground to start from","isCorrect":true,"optionType":"correct","explanation":"올바름: caring→empathetic, crucial basis→core ground, begin→start from으로 원문 함의 유지","translation":"공감적 관계가 시작할 핵심 기반을 형성한다"},{"text":"a strict relationship is an optional add-on to consider","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: caring→strict로 반의어 대체하고 crucial basis→optional add-on으로 필수→선택으로 의미 역전됨","translation":"엄격한 관계는 고려할 선택적 부가 요소이다"}],"sourceQuestion":"2번 지문"},{"keyExpression":"identify the consumers who are most likely to appreciate a good or service","passage":"marketers now know that their goal is to identify the consumers who are most likely to appreciate a good or service.","passageTranslation":"마케터들은 이제 그들의 목표가 상품이나 서비스를 가장 높이 평가할 가능성이 높은 소비자를 파악하는 것임을 알고 있다.","qType":"correct","questionText":"'identify the consumers who are most likely to appreciate a good or service'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"ignore the preferences of consumers who dislike the product","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: identify=파악하는 행위인데 ignore=무시로 반의 행위 대체, appreciate의 긍정 의미 왜곡","translation":"제품을 싫어하는 소비자의 선호를 무시하다"},{"text":"find the buyers who are most probable to value a product or service","isCorrect":true,"optionType":"correct","explanation":"올바름: identify=find, most likely=most probable, appreciate=value로 핵심 의미 유지","translation":"제품이나 서비스를 가장 가치 있게 여길 가능성이 높은 구매자를 찾다"},{"text":"pinpoint target customers who are genuinely interested in what is offered","isCorrect":true,"optionType":"correct","explanation":"올바름: identify=pinpoint, most likely to appreciate=genuinely interested, good or service=what is offered로 구체화","translation":"제공되는 것에 진심으로 관심 있는 목표 고객을 정확히 찾아내다"},{"text":"persuade all consumers to purchase goods regardless of their needs","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: identify=선별하는 행위인데 persuade all=모두 설득으로 목표 고객 선별 개념 무시","translation":"필요 여부와 관계없이 모든 소비자가 상품을 구매하도록 설득하다"}],"sourceQuestion":"4번 지문"},{"keyExpression":"crucial to long-term persistence","passage":"And when we are trying to motivate ourselves, doing things to enhance a sense of connectedness to others can be crucial to long-term persistence.","passageTranslation":"그리고 우리 스스로에게 동기를 부여하려 할 때, 타인과의 연결감을 높이는 일을 하는 것이 장기적인 지속에 핵심적일 수 있다.","qType":"correct","questionText":"'crucial to long-term persistence'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"unnecessary for achieving short-term goals","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: crucial(필수적)이 unnecessary(불필요한)로, long-term이 short-term으로 둘 다 역전됨","translation":"단기 목표 달성에는 불필요한"},{"text":"key to not giving up in the long run","isCorrect":true,"optionType":"correct","explanation":"올바름: crucial=key, long-term persistence=not giving up in the long run으로 구체적 행위로 전환하여 의미 유지","translation":"장기적으로 포기하지 않는 데 핵심적인"},{"text":"helpful only at the very beginning of a task","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: long-term(장기적)이 very beginning(초기)으로 시간적 범위가 반대로 왜곡됨","translation":"과제의 바로 초반에만 도움이 되는"}],"sourceQuestion":"3번 지문"},{"keyExpression":"changing physical characteristics, like eye and hair color","passage":"What about giving unborn children beneficial features, like greater strength and increased mental abilities, or changing physical characteristics, like eye and hair color?","passageTranslation":"태어나지 않은 아이들에게 더 큰 힘이나 향상된 정신 능력과 같은 유익한 특성을 부여하거나, 눈이나 머리카락 색깔과 같은 신체적 특성을 바꾸는 것은 어떨까?","qType":"correct","questionText":"'changing physical characteristics, like eye and hair color'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"modifying visible features of one's body before birth","isCorrect":true,"optionType":"correct","explanation":"올바름: changing→modifying, physical characteristics→visible features, 맥락상 before birth 추가로 문맥 보완","translation":"태어나기 전 신체의 눈에 보이는 특징을 변형하다"},{"text":"altering external bodily traits such as appearance-related features","isCorrect":true,"optionType":"correct","explanation":"올바름: changing→altering, physical characteristics→external bodily traits, eye and hair color→appearance-related features로 상위 개념 재구성","translation":"외모 관련 특징과 같은 외적 신체 특성을 바꾸다"},{"text":"adjusting outward physical traits that determine one's looks","isCorrect":true,"optionType":"correct","explanation":"올바름: changing→adjusting, physical characteristics→outward traits, eye and hair color→determine one's looks로 함축 재구성","translation":"외모를 결정하는 외면적 신체 특성을 조정하다"},{"text":"preserving natural physical traits passed down through generations","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: changing(변경)을 preserving(보존)으로 반의어 대체하여 의미 역전","translation":"세대를 통해 전해 내려온 자연적 신체 특성을 보존하다"},{"text":"correcting internal organ defects to restore normal function","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: physical characteristics(외적 특성)를 internal organ defects(내부 장기 결함)로 대상 완전 왜곡","translation":"정상 기능 회복을 위해 내부 장기 결함을 교정하다"}],"sourceQuestion":"1번 지문"},{"keyExpression":"marketers must know where the interested consumers are, and how to reach them","passage":"Therefore, marketers must know where the interested consumers are, and how to reach them.","passageTranslation":"따라서 마케터는 관심 있는 소비자들이 어디에 있는지, 그리고 어떻게 그들에게 도달할 수 있는지 알아야 한다.","qType":"correct","questionText":"'marketers must know where the interested consumers are, and how to reach them'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"those in marketing should discover where potential buyers are and connect with them","isCorrect":true,"optionType":"correct","explanation":"올바름: interested consumers=potential buyers, reach=connect로 바꿔 동일 행동 목표 보존","translation":"마케팅 담당자는 잠재 구매자가 어디에 있는지 파악하고 그들과 연결해야 한다"},{"text":"businesses should wait for consumers to discover their products naturally","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: must know how to reach them(적극적 접근)을 wait for consumers to discover(수동적 대기)로 인과 역전 — 능동/수동 전략 혼동","translation":"기업은 소비자들이 자연스럽게 제품을 발견할 때까지 기다려야 한다"},{"text":"marketers should focus only on increasing production to meet growing demand","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: where consumers are/how to reach them이라는 소통 전략을 생산 증대 전략으로 완전히 대체하여 주제 왜곡","translation":"마케터는 늘어나는 수요를 충족하기 위해 생산 증가에만 집중해야 한다"}],"sourceQuestion":"5번 지문"},{"keyExpression":"the long-term effect of getting a consumer to buy something they did not really want or need","passage":"The long-term effect of getting a consumer to buy something they did not really want or need wasn't good.","passageTranslation":"소비자가 실제로 원하지 않거나 필요하지 않은 것을 구매하도록 유도하는 것의 장기적 효과는 좋지 않았다.","qType":"correct","questionText":"'the long-term effect of getting a consumer to buy something they did not really want or need'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"the short-term benefit of helping customers find products they truly need","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: long-term을 short-term으로, negative effect를 benefit으로 반의어 대체하고 did not want을 truly need로 반전시켜 정반대 의미 생성","translation":"고객이 진정으로 필요한 제품을 찾도록 돕는 것의 단기적 이익"},{"text":"the immediate result of matching consumers perfectly with the right products","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: long-term을 immediate(즉각적)로, did not want or need(원하지 않거나 필요 없는)를 right products(적합한 제품)로 대체하여 의미 역전","translation":"소비자를 적합한 제품과 완벽하게 연결하는 즉각적인 결과"},{"text":"the lasting impact of pushing buyers toward unwanted purchases","isCorrect":true,"optionType":"correct","explanation":"올바름: long-term effect=lasting impact, getting a consumer to buy=pushing buyers toward, did not want or need=unwanted로 대체하여 동일 인과 의미 보존","translation":"원하지 않는 구매로 구매자를 몰아붙이는 것의 지속적인 영향"},{"text":"the ongoing consequence of selling products to people who have no real interest in them","isCorrect":true,"optionType":"correct","explanation":"올바름: long-term=ongoing, getting to buy=selling to, did not want or need=have no real interest로 구체화하여 부정적 결과 의미 유지","translation":"진정한 관심이 없는 사람들에게 제품을 판매하는 것의 지속적인 결과"}],"sourceQuestion":"5번 지문"},{"keyExpression":"it might seem logical, even preferable","passage":"it might seem logical, even preferable, to correct disease-causing mutations at the earliest possible stage of life, before harmful genes begin causing serious problems.","passageTranslation":"해로운 유전자가 심각한 문제를 일으키기 시작하기 전에, 가능한 한 가장 이른 생애 단계에서 질병을 유발하는 돌연변이를 교정하는 것이 논리적이고 심지어 바람직해 보일 수도 있다.","qType":"correct","questionText":"'it might seem logical, even preferable'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"it is clearly proven to be correct and universally accepted","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: might seem(불확실한 가능성)을 clearly proven and universally accepted(확실하고 보편적 사실)로 양태 완전 왜곡","translation":"그것은 올바르고 보편적으로 받아들여지는 것으로 명확히 증명되었다"},{"text":"it may come across as both justified and worth choosing","isCorrect":true,"optionType":"correct","explanation":"올바름: logical→justified, preferable→worth choosing으로 의미를 유지하며 구문 변환","translation":"그것은 정당화되기도 하고 선택할 만한 것으로 보일 수도 있다"},{"text":"one might view it as sensible and indeed the better option","isCorrect":true,"optionType":"correct","explanation":"올바름: logical→sensible, preferable→better option, even→indeed로 부사 강조 유지","translation":"누군가는 그것을 합리적이고 실제로 더 나은 선택으로 볼 수도 있다"},{"text":"it appears neither logical nor desirable to most people","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: logical and preferable(논리적이고 바람직한)을 neither logical nor desirable(논리적이지도 바람직하지도 않은)으로 반의어 대체","translation":"그것은 대부분의 사람들에게 논리적이지도 바람직하지도 않아 보인다"}],"sourceQuestion":"1번 지문"},{"keyExpression":"Assuming gene editing in humans proves to be safe and effective","passage":"Assuming gene editing in humans proves to be safe and effective, it might seem logical, even preferable, to correct disease-causing mutations at the earliest possible stage of life.","passageTranslation":"인간에 대한 유전자 편집이 안전하고 효과적인 것으로 증명된다고 가정하면, 가능한 한 가장 이른 생애 단계에서 질병을 유발하는 돌연변이를 교정하는 것이 논리적이고 심지어 바람직해 보일 수도 있다.","qType":"correct","questionText":"'Assuming gene editing in humans proves to be safe and effective'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"provided that altering human genes is shown to be reliable and beneficial","isCorrect":true,"optionType":"correct","explanation":"올바름: Assuming→provided that, safe→reliable, effective→beneficial로 조건의 의미 유지하며 어휘 변환","translation":"인간 유전자 변형이 신뢰할 수 있고 유익한 것으로 밝혀진다는 조건 하에"},{"text":"unless gene editing is found to be dangerous and unreliable","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: Assuming safe and effective(안전하고 효과적임을 가정)를 unless dangerous and unreliable(위험하고 신뢰할 수 없는 경우를 제외하고)로 조건의 방향 역전","translation":"유전자 편집이 위험하고 신뢰할 수 없는 것으로 밝혀지지 않는 한"},{"text":"since gene editing has already been proven completely safe","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: Assuming(가정)을 since already proven(이미 증명된 사실)으로 바꿔 가정을 기정사실화하여 양태 왜곡","translation":"유전자 편집이 이미 완전히 안전한 것으로 증명되었으므로"}],"sourceQuestion":"1번 지문"},{"keyExpression":"perceived as involved and caring","passage":"There is a wealth of evidence that when parents, teachers, supervisors, and coaches are perceived as involved and caring, people feel happier and more motivated.","passageTranslation":"부모, 교사, 상사, 코치가 참여하고 배려하는 것으로 인식될 때 사람들이 더 행복하고 동기부여가 된다는 풍부한 증거가 있다.","qType":"correct","questionText":"'perceived as involved and caring'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"perceived as strict and demanding","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: caring의 반대 의미인 strict and demanding으로 대체되어 의미 왜곡","translation":"엄격하고 요구가 많은 것으로 여겨지는"},{"text":"proven to be skilled and efficient","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: 능력과 효율성의 의미로 바뀌어 관계적 배려의 핵심 의미 손실","translation":"능숙하고 효율적인 것으로 증명된"},{"text":"recognized as attentive and warm","isCorrect":true,"optionType":"correct","explanation":"올바름: 타인이 주의를 기울이고 따뜻하다고 인식된다는 의미 유지","translation":"세심하고 따뜻한 것으로 인식되는"}],"sourceQuestion":"3번 지문"},{"keyExpression":"Gone are the days when promotions were done in order to fool the consumer","passage":"Gone are the days when promotions were done in order to fool the consumer into purchasing something.","passageTranslation":"소비자를 속여 무언가를 구매하게 하려는 목적으로 판촉이 이루어지던 시대는 갔다.","qType":"correct","questionText":"'Gone are the days when promotions were done in order to fool the consumer'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"consumers nowaday
