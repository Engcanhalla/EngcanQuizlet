환해 의료 분야에서도 동일한 발전 패턴이 반복됨을 정확히 재현함","translation":"의료 분야에서도 유사한 발전 양상이 존재한다"}],"sourceQuestion":"2번 지문"},{"keyExpression":"adolescents might pull away from, rather than turn toward, their parents in times of emotional crisis","passage":"In consequence, adolescents might pull away from, rather than turn toward, their parents in times of emotional crisis, unless parental practices are adjusted.","passageTranslation":"그 결과, 부모의 양육 방식이 조정되지 않는다면, 청소년들은 감정적 위기 상황에서 부모에게 의지하기보다는 오히려 멀어질 수 있다.","qType":"incorrect","questionText":"'adolescents might pull away from, rather than turn toward, their parents in times of emotional crisis'을(를) 잘못 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"emotionally distressed adolescents may avoid parental contact rather than reaching out for support","isCorrect":false,"optionType":"correct","explanation":"올바름: pull away from → avoid parental contact, turn toward → reaching out for support로 함축적 의미를 명시화하며 rather than 대조 관계 유지","translation":"감정적으로 힘든 청소년들은 지지를 구하는 대신 부모와의 접촉을 피할 수 있다"},{"text":"teenagers may distance themselves from parents instead of seeking their help during emotional struggles","isCorrect":false,"optionType":"correct","explanation":"올바름: pull away from → distance themselves, turn toward → seeking their help, times of emotional crisis → during emotional struggles로 구체적 행위로 전환하며 대조 구조 유지","translation":"청소년들은 감정적 어려움 동안 부모의 도움을 구하는 대신 부모로부터 멀어질 수 있다"},{"text":"during emotional crises, teenagers seek immediate parental guidance before acting independently","isCorrect":true,"optionType":"incorrect","explanation":"잘못됨: pull away(회피)와 반대로 즉각적으로 부모 지침을 먼저 구한다는 의미로 왜곡하여 원문의 논지를 역전","translation":"감정적 위기 동안, 청소년들은 독립적으로 행동하기 전에 즉각적인 부모의 지도를 구한다"},{"text":"in moments of emotional hardship, teens might withdraw from rather than approach their parents","isCorrect":false,"optionType":"correct","explanation":"올바름: pull away → withdraw, turn toward → approach, times of emotional crisis → moments of emotional hardship로 대조 관계 보존하며 도치 구조 활용","translation":"감정적 어려움의 순간에, 청소년들은 부모에게 다가가는 대신 오히려 멀어질 수 있다"}],"sourceQuestion":"5번 지문"},{"keyExpression":"rolled out services known as pay-by-face","passage":"Recently, banks and fin-tech firms have rolled out services known as pay-by-face, which allow transactions just by scanning the face.","passageTranslation":"최근 은행과 핀테크 기업들은 얼굴을 스캔하는 것만으로 거래를 가능하게 하는 '페이-바이-페이스'라고 알려진 서비스를 출시했다.","qType":"correct","questionText":"'rolled out services known as pay-by-face'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"tested experimental payment methods in limited regions","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: rolled out은 일반 대중 출시를 의미하나, limited regions의 실험적 테스트로 범위를 축소하여 의미 왜곡","translation":"제한된 지역에서 실험적 결제 방법을 시험했다"},{"text":"made face-based payment technology available to the public","isCorrect":true,"optionType":"correct","explanation":"올바름: rolled out의 핵심인 대중 공개·출시 의미를 made available to the public으로 구체화함","translation":"안면 기반 결제 기술을 대중에게 이용 가능하게 했다"},{"text":"discontinued face-recognition payment features","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: roll out은 출시·도입인데 discontinued(중단)로 의미를 완전히 역전시킴","translation":"안면 인식 결제 기능을 중단했다"}],"sourceQuestion":"1번 지문"},{"keyExpression":"they may intrude on adolescents' autonomy striving","passage":"Whereas direct soothing and directive guidance of what to do are beneficial for younger children, they may intrude on adolescents' autonomy striving.","passageTranslation":"직접적인 달래기와 무엇을 해야 할지에 대한 지시적 안내는 어린 자녀들에게는 유익하지만, 청소년의 자율성 추구를 침해할 수 있다.","qType":"correct","questionText":"'they may intrude on adolescents' autonomy striving'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"adolescents willingly accept parental direction as a guide for self-regulation","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: intrude on autonomy striving(자율성 침해)와 정반대로 청소년이 부모 지시를 기꺼이 수용한다는 의미로 왜곡","translation":"청소년들은 자기 조절의 지침으로 부모의 지시를 기꺼이 받아들인다"},{"text":"these methods risk undermining teenagers' desire for independence","isCorrect":true,"optionType":"correct","explanation":"올바름: intrude on → risk undermining, autonomy striving → desire for independence로 함축 의미를 명시화하며 may의 가능성 뉘앙스 보존","translation":"이러한 방법들은 청소년들의 독립에 대한 욕구를 약화시킬 위험이 있다"},{"text":"they support adolescents in building a stronger sense of personal responsibility","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: intrude on(침해하다) → support(지지하다)로 의미가 정반대로 역전되어 원문의 부정적 결과를 긍정적으로 왜곡","translation":"그것들은 청소년들이 더 강한 개인적 책임감을 형성하는 데 도움을 준다"}],"sourceQuestion":"5번 지문"},{"keyExpression":"consumers could suffer from financial losses due to errors","passage":"Furthermore, consumers could suffer from financial losses due to errors made by such payment systems.","passageTranslation":"더욱이 소비자들은 이러한 결제 시스템이 만들어낸 오류로 인해 금전적 손실을 겪을 수 있다.","qType":"correct","questionText":"'consumers could suffer from financial losses due to errors'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"companies gain financial benefits by correcting system errors quickly","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: 소비자의 손실을 기업의 이익으로 주체와 결과를 모두 역전시키고, suffer from을 gain으로 바꾸어 의미를 완전히 왜곡함","translation":"기업들이 시스템 오류를 빠르게 수정함으로써 금전적 이익을 얻는다"},{"text":"users receive financial compensation when recognition errors occur","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: suffer from financial losses(손실 겪음)를 receive financial compensation(보상 받음)으로 의미를 역전시켜 원문의 위험 경고를 혜택으로 왜곡함","translation":"인식 오류가 발생할 때 사용자들이 금전적 보상을 받는다"},{"text":"users may experience monetary damage caused by system mistakes","isCorrect":true,"optionType":"correct","explanation":"올바름: consumers→users, suffer from→experience, financial losses→monetary damage, errors→system mistakes로 각 요소를 정확히 대응 전환함","translation":"사용자들이 시스템 실수로 인한 금전적 피해를 겪을 수 있다"}],"sourceQuestion":"1번 지문"},{"keyExpression":"Repeated use of images reinforces the desired behavior more strongly over time","passage":"What mental imagery does is reinforce a new desired behavior. Repeated use of images reinforces the desired behavior more strongly over time.","passageTranslation":"심상(心象)이 하는 일은 새롭게 바라는 행동을 강화하는 것이다. 이미지를 반복적으로 사용하면 시간이 지남에 따라 바라는 행동을 더욱 강하게 강화한다.","qType":"correct","questionText":"'Repeated use of images reinforces the desired behavior more strongly over time'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"a single vivid mental image is sufficient to permanently alter behavior","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: 원문은 반복(repeated)과 시간의 경과(over time)를 강조하는데, single(단 한 번의)으로 반복성을 부정하고 permanently alter를 통해 즉각적·영구적 변화를 암시하여 의미 왜곡","translation":"단 한 번의 생생한 심상으로도 행동을 영구적으로 바꾸기에 충분하다"},{"text":"consistent application of visualization progressively consolidates target conduct","isCorrect":true,"optionType":"correct","explanation":"올바름: repeated use→consistent application, images→visualization, reinforces more strongly over time→progressively consolidates로 시간적 축적 논리 유지","translation":"심상화의 일관된 적용은 목표 행동을 점진적으로 공고히 한다"},{"text":"the more frequently mental images are employed, the stronger the behavioral reinforcement becomes","isCorrect":true,"optionType":"correct","explanation":"올바름: repeated use→more frequently employed, reinforces more strongly over time→stronger reinforcement becomes로 비교 구조로 재표현하며 의미 보존","translation":"심상이 더 자주 활용될수록 행동 강화는 더욱 강해진다"},{"text":"habitual practice of imagery cumulatively deepens the entrenchment of a desired action","isCorrect":true,"optionType":"correct","explanation":"올바름: repeated use→habitual practice, more strongly over time→cumulatively deepens, reinforces desired behavior→entrenchment of desired action으로 추상↔구체 전환하며 함의 유지","translation":"심상의 습관적 실천은 원하는 행동의 고착화를 누적적으로 심화시킨다"},{"text":"using images too frequently can weaken the effect of behavioral therapy","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: 원문은 반복 사용이 reinforces more strongly(더욱 강하게 강화)한다고 하는데, too frequently can weaken(너무 자주 하면 약화된다)으로 인과 관계를 역전","translation":"이미지를 너무 자주 사용하면 행동 치료의 효과가 약화될 수 있다"}],"sourceQuestion":"4번 지문"},{"keyExpression":"a classic time-shifting device","passage":"This technology might be thought of as a classic time-shifting device, as it enables mothers to exercise more control over the timing of feeding.","passageTranslation":"이 기술은 어머니들이 수유 시간을 더 잘 통제할 수 있게 해준다는 점에서 고전적인 시간 이동 장치로 생각될 수 있다.","qType":"incorrect","questionText":"'a classic time-shifting device'을(를) 잘못 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"a tool that allows the user to reschedule when a task is performed","isCorrect":false,"optionType":"correct","explanation":"올바름: 'time-shifting'의 핵심 개념(시간을 이동·조정)을 'reschedule when a task is performed'로 구체적 행위로 전환","translation":"작업이 수행되는 시간을 재조정할 수 있게 해주는 도구"},{"text":"something that enables people to control when certain actions occur","isCorrect":false,"optionType":"correct","explanation":"올바름: 'time-shifting device'의 기능적 의미를 'enables people to control when certain actions occur'로 풀어 의미 유지","translation":"특정 행동이 일어나는 시간을 사람들이 통제할 수 있게 해주는 것"},{"text":"an instrument that gives flexibility over the timing of activities","isCorrect":false,"optionType":"correct","explanation":"올바름: 'time-shifting'을 'flexibility over the timing'으로 추상 개념화하여 의미 보존","translation":"활동의 시간에 대해 유연성을 부여하는 기기"},{"text":"a device that permanently eliminates the need for scheduled routines","isCorrect":true,"optionType":"incorrect","explanation":"잘못됨: 'time-shifting'은 일정을 조정하는 것인데, 'eliminates the need for scheduled routines'(정해진 일과의 필요성을 없앰)로 의미 과장·왜곡","translation":"정해진 일과의 필요성을 영구적으로 없애는 기기"},{"text":"a machine designed primarily to speed up the pace of daily tasks","isCorrect":true,"optionType":"incorrect","explanation":"잘못됨: 'time-shifting'(시간 이동·조정)을 'speed up'(속도 증가)으로 혼동하여 의미 왜곡","translation":"일상적 작업의 속도를 높이기 위해 주로 설계된 기계"}],"sourceQuestion":"3번 지문"},{"keyExpression":"transformed a fundamental human experience for vast numbers of infants and mothers","passage":"Here is a simple implement that has transformed a fundamental human experience for vast numbers of infants and mothers, yet it finds no place in our histories of technology.","passageTranslation":"이것은 수많은 영아와 어머니들에게 근본적인 인간 경험을 변화시킨 단순한 도구이지만, 우리의 기술 역사에서는 어떠한 자리도 차지하지 못하고 있다.","qType":"incorrect","questionText":"'transformed a fundamental human experience for vast numbers of infants and mothers'을(를) 잘못 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"created a largely identical experience for mothers across different cultures","isCorrect":true,"optionType":"incorrect","explanation":"잘못됨: 원문의 핵심은 '변화(transformation)'인데 '동일한 경험 창출'로 변환의 성격을 제거하고 의미 왜곡","translation":"다양한 문화에 걸쳐 어머니들에게 대체로 동일한 경험을 만들어낸"},{"text":"radically altered how a core human activity is experienced by millions","isCorrect":false,"optionType":"correct","explanation":"올바름: 'transformed'를 'radically altered'로, 'fundamental human experience'를 'core human activity'로 바꿔 의미 유지","translation":"수백만 명이 핵심적인 인간 활동을 경험하는 방식을 근본적으로 바꾼"},{"text":"brought about significant changes to an essential part of human development for many","isCorrect":false,"optionType":"correct","explanation":"올바름: 'transformed'를 'brought about significant changes to'로, 'fundamental experience'를 'essential part of human development'로 재구성하여 의미 보존","translation":"많은 사람들에게 인간 발달의 필수적인 부분에 중요한 변화를 가져온"},{"text":"profoundly changed a basic aspect of life for countless babies and caregivers","isCorrect":false,"optionType":"correct","explanation":"올바름: 'transformed'를 'profoundly changed'로, 'fundamental human experience'를 'basic aspect of life'로, 'vast numbers'를 'countless'로 대응시켜 의미 보존","translation":"수많은 아기들과 돌봄 제공자들에게 삶의 기본적인 측면을 심오하게 변화시킨"}],"sourceQuestion":"3번 지문"},{"keyExpression":"specific, refined, and feedback-driven way","passage":"which allows doctors to talk to their patients in a specific, refined, and feedback-driven way that was not even possible a decade ago.","passageTranslation":"이는 의사들이 불과 10년 전에는 가능하지도 않았던 구체적이고 정제되며 피드백 중심의 방식으로 환자들과 대화할 수 있게 해준다.","qType":"incorrect","questionText":"'specific, refined, and feedback-driven way'을(를) 잘못 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"a focused approach based on individual responses and careful analysis","isCorrect":false,"optionType":"correct","explanation":"올바름: feedback-driven을 based on individual responses로, refined를 careful analysis로 풀어서 의료 소통의 맞춤형 특성을 재현함","translation":"개인의 반응과 세심한 분석에 기반한 집중적 접근 방식"},{"text":"a general and intuitive approach that ignores patient responses","isCorrect":true,"optionType":"incorrect","explanation":"잘못됨: specific(구체적)을 general(일반적)로, feedback-driven을 ignores patient responses로 대체해 세 가지 속성을 모두 부정함","translation":"환자 반응을 무시하는 일반적이고 직관적인 접근 방식"},{"text":"a personalized and evidence-based style of medical interaction","isCorrect":false,"optionType":"correct","explanation":"올바름: specific+refined를 personalized로, feedback-driven을 evidence-based로 추상화해 맞춤형 근거 기반 의료 소통의 핵심을 유지함","translation":"개인 맞춤적이고 근거 기반의 의료 상호작용 방식"},{"text":"a targeted, precise, and data-informed manner of communication","isCorrect":false,"optionType":"correct","explanation":"올바름: specific을 targeted로, refined를 precise로, feedback-driven을 data-informed로 각각 대응시켜 세 가지 속성을 모두 유지함","translation":"목표 지향적이고 정밀하며 데이터에 근거한 소통 방식"}],"sourceQuestion":"2번 지문"},{"keyExpression":"does that mean the entire concept of the self-driving car is not worth pursuing","passage":"Yes, the vehicle would have been able to move forward on its own, but it could not slow down, stop, or turn to avoid barriers. Obviously not ideal. But does that mean the entire concept of the self-driving car is not worth pursuing?","passageTranslation":"그렇다, 그 차량은 스스로 앞으로 나아갈 수 있었겠지만 속도를 줄이거나, 멈추거나, 장애물을 피해 방향을 틀 수 없었을 것이다. 분명히 이상적이지 않다. 하지만 그것이 자율주행 자동차라는 개념 전체가 추구할 가치가 없다는 것을 의미하는가?","qType":"incorrect","questionText":"'does that mean the entire concept of the self-driving car is not worth pursuing'을(를) 잘못 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"has self-driving technology already reached its full potential","isCorrect":true,"optionType":"incorrect","explanation":"잘못됨: not worth pursuing(추구할 가치 없음)을 already reached full potential(이미 완성됨)로 대체해 부정적 포기 논리를 긍정적 완성으로 왜곡함","translation":"자율주행 기술은 이미 완전한 잠재력에 도달했는가"},{"text":"is the vision of self-driving technology no longer viable or valuable","isCorrect":false,"optionType":"correct","explanation":"올바름: not worth pursuing을 no longer viable or valuable로, entire concept을 the vision으로 바꾸어 추구 가치 부재를 재표현함","translation":"자율주행 기술의 비전은 더 이상 실현 가능하거나 가치 있지 않은가"},{"text":"does an early failure justify giving up on the goal entirely","isCorrect":false,"optionType":"correct","explanation":"올바름: 지문의 수사의문문 맥락(초기 실패가 개념 자체를 무효화하지 않는다)을 함축 추론으로 재구성함","translation":"초기 실패가 목표를 완전히 포기하는 것을 정당화하는가"},{"text":"should we abandon the idea of autonomous vehicles altogether","isCorrect":false,"optionType":"correct","explanation":"올바름: not worth pursuing을 abandon altogether로, entire concept을 the idea로 변환해 필자가 반박하려는 논리를 재현함","translation":"자율주행 차량이라는 아이디어를 완전히 포기해야 하는가"}],"sourceQuestion":"2번 지문"},{"keyExpression":"a classic time-shifting device","passage":"This technology might be thought of as a classic time-shifting device, as it enables mothers to exercise more control over the timing of feeding.","passageTranslation":"이 기술은 어머니들이 수유 시간을 더 잘 통제할 수 있게 해준다는 점에서 고전적인 시간 이동 장치로 생각될 수 있다.","qType":"correct","questionText":"'a classic time-shifting device'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"an instrument that gives flexibility over the timing of activities","isCorrect":true,"optionType":"correct","explanation":"올바름: 'time-shifting'을 'flexibility over the timing'으로 추상 개념화하여 의미 보존","translation":"활동의 시간에 대해 유연성을 부여하는 기기"},{"text":"a machine designed primarily to speed up the pace of daily tasks","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: 'time-shifting'(시간 이동·조정)을 'speed up'(속도 증가)으로 혼동하여 의미 왜곡","translation":"일상적 작업의 속도를 높이기 위해 주로 설계된 기계"},{"text":"a device that permanently eliminates the need for scheduled routines","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: 'time-shifting'은 일정을 조정하는 것인데, 'eliminates the need for scheduled routines'(정해진 일과의 필요성을 없앰)로 의미 과장·왜곡","translation":"정해진 일과의 필요성을 영구적으로 없애는 기기"}],"sourceQuestion":"3번 지문"},{"keyExpression":"entirely overlooked in discussions of high-speed society","passage":"Potentially, therefore, it has huge implications for the management of time in everyday life, yet it is entirely overlooked in discussions of high-speed society.","passageTranslation":"따라서 잠재적으로 이것은 일상생활에서 시간 관리에 막대한 함의를 지니고 있지만, 고속 사회에 대한 논의에서는 완전히 간과되고 있다.","qType":"correct","questionText":"'entirely overlooked in discussions of high-speed society'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"critically examined and disputed in current sociological literature","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: 'overlooked'(무시됨)와 달리 'critically examined and disputed'(비판적으로 검토·논쟁됨)는 오히려 주목받고 있음을 의미하므로 반의 관계","translation":"현재 사회학 문헌에서 비판적으로 검토되고 논쟁되는"},{"text":"frequently cited as a key example in studies of contemporary speed culture","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: 'entirely overlooked'(완전히 간과)를 'frequently cited as a key example'(핵심 사례로 자주 인용)로 정반대 의미로 역전","translation":"현대 속도 문화 연구에서 핵심 사례로 자주 인용되는"},{"text":"given no attention in analyses of how modern society operates rapidly","isCorrect":true,"optionType":"correct","explanation":"올바름: 'overlooked'를 'given no attention'으로, 'high-speed society'의 속성을 'how modern society operates rapidly'로 풀어 의미 재구성","translation":"현대 사회가 빠르게 작동하는 방식에 관한 분석에서 전혀 주목받지 못하는"},{"text":"absent from academic and public debate on accelerating social change","isCorrect":true,"optionType":"correct","explanation":"올바름: 'overlooked in discussions'를 'absent from debate'로, 'high-speed society'를 'accelerating social change'로 추상적으로 재구성하여 의미 유지","translation":"가속화하는 사회 변화에 관한 학문적·공공 토론에서 빠져 있는"}],"sourceQuestion":"3번 지문"},{"keyExpression":"Process-addiction behaviors (workaholism, shopaholism, and the like) fall into this category as well","passage":"Process-addiction behaviors (workaholism, shopaholism, and the like) fall into this category as well.","passageTranslation":"과정 중독 행동들(일 중독, 쇼핑 중독 등)도 마찬가지로 이 범주에 속한다.","qType":"incorrect","questionText":"'Process-addiction behaviors (workaholism, shopaholism, and the like) fall into this category as well'을(를) 잘못 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"workaholism and shopaholism are excluded from behavioral health concerns","isCorrect":true,"optionType":"incorrect","explanation":"잘못됨: 원문은 fall into this category(이 범주에 포함된다)인데, excluded from(제외된다)으로 정반대 의미 사용","translation":"일 중독과 쇼핑 중독은 행동 건강 문제에서 제외된다"},{"text":"behavioral compulsions including excessive work habits are likewise grouped here","isCorrect":false,"optionType":"correct","explanation":"올바름: process-addiction behaviors→behavioral compulsions, workaholism→excessive work habits, as well→likewise으로 병렬 논리 유지","translation":"과도한 업무 습관을 포함한 행동 강박도 마찬가지로 여기에 분류된다"},{"text":"habitual excess in activities like work or shopping similarly belongs to this classification","isCorrect":false,"optionType":"correct","explanation":"올바름: process-addiction→habitual excess, fall into this category→belongs to this classification, and the like→similarly로 부연하며 의미 유지","translation":"일이나 쇼핑과 같은 활동에서의 습관적 과잉도 마찬가지로 이 분류에 속한다"},{"text":"compulsive behavioral patterns such as overworking are also classified under the same group","isCorrect":false,"optionType":"correct","explanation":"올바름: process-addiction behaviors→compulsive behavioral patterns, workaholism→overworking, fall into this category→classified under the same group으로 의미 보존","translation":"과로와 같은 강박적 행동 패턴들도 같은 범주로 분류된다"},{"text":"process addictions are more severe than ingestive habits and require separate treatment","isCorrect":true,"optionType":"incorrect","explanation":"잘못됨: 원문은 같은 범주(this category)에 속한다고 하는데, more severe and require separate treatment(더 심각하고 별도 치료 필요)로 분리·서열화하여 의미 왜곡","translation":"과정 중독은 섭취 습관보다 더 심각하여 별도의 치료가 필요하다"}],"sourceQuestion":"4번 지문"},{"keyExpression":"What mental imagery does is reinforce a new desired behavior","passage":"What mental imagery does is reinforce a new desired behavior. Repeated use of images reinforces the desired behavior more strongly over time.","passageTranslation":"심상(心象)이 하는 일은 새롭게 바라는 행동을 강화하는 것이다. 이미지를 반복적으로 사용하면 시간이 지남에 따라 바라는 행동을 더욱 강하게 강화한다.","qType":"incorrect","questionText":"'What mental imagery does is reinforce a new desired behavior'을(를) 잘못 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"visualization introduces entirely new desires that replace personal goals","isCorrect":true,"optionType":"incorrect","explanation":"잘못됨: 원문은 이미 desired(바라는) 행동을 reinforce(강화)하는 것인데, replace personal goals(개인 목표를 대체)로 기존 욕구를 대체하는 것처럼 의미를 왜곡","translation":"심상화는 개인의 목표를 대체하는 전혀 새로운 욕구를 도입한다"},{"text":"mental images serve to consolidate the behavior a person aims to establish","isCorrect":false,"optionType":"correct","explanation":"올바름: reinforce→consolidate, new desired behavior→behavior a person aims to establish로 동사구를 재구성하며 의미 보존","translation":"심상은 사람이 확립하고자 하는 행동을 공고히 하는 역할을 한다"},{"text":"the role of imagining outcomes is to solidify newly intended patterns of action","isCorrect":false,"optionType":"correct","explanation":"올바름: mental imagery→imagining outcomes, reinforce→solidify, new desired behavior→newly intended patterns of action으로 추상↔구체 전환하며 논리 유지","translation":"결과를 상상하는 것의 역할은 새롭게 의도된 행동 패턴을 굳히는 것이다"},{"text":"mental imagery helps individuals forget their existing negative behaviors","isCorrect":true,"optionType":"incorrect","explanation":"잘못됨: 원문은 reinforce a new desired behavior(새로운 바람직한 행동 강화)인데, forget existing negative behaviors(기존 부정적 행동 잊기)로 대상과 작용을 모두 왜곡","translation":"심상화는 개인이 기존의 부정적 행동을 잊도록 돕는다"},{"text":"the function of visualization is to strengthen a target behavior one wishes to adopt","isCorrect":false,"optionType":"correct","explanation":"올바름: mental imagery→visualization, reinforce→strengthen, new desired behavior→target behavior one wishes to adopt로 cleft 구조의 강조 의미 유지","translation":"심상화의 기능은 자신이 받아들이고자 하는 목표 행동을 강화하는 것이다"}],"sourceQuestion":"4번 지문"},{"keyExpression":"direct soothing and directive guidance of what to do are beneficial for younger children","passage":"Whereas direct soothing and directive guidance of what to do are beneficial for younger children, they may intrude on adolescents' autonomy striving.","passageTranslation":"직접적인 달래기와 무엇을 해야 할지에 대한 지시적 안내는 어린 자녀들에게는 유익하지만, 청소년의 자율성 추구를 침해할 수 있다.","qType":"incorrect","questionText":"'direct soothing and directive guidance of what to do are beneficial for younger children'을(를) 잘못 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"calming children directly and telling them exactly what steps to take proves useful at an early age","isCorrect":false,"optionType":"correct","explanation":"올바름: direct soothing → calming directly, directive guidance → telling exactly what steps to take로 행위 수준으로 구체화하며 younger children → at an early age 대응","translation":"자녀를 직접 달래고 취해야 할 단계를 정확히 알려주는 것이 어린 나이에 유용함이 입증된다"},{"text":"offering immediate comfort and explicit instructions helps younger children effectively","isCorrect":false,"optionType":"correct","explanation":"올바름: direct soothing → immediate comfort, directive guidance of what to do → explicit instructions로 구체화하며 beneficial → helps effectively 유지","translation":"즉각적인 위안과 명확한 지시를 제공하는 것은 어린 자녀들에게 효과적으로 도움이 된다"},{"text":"hands-on reassurance and step-by-step direction suit the needs of young children well","isCorrect":false,"optionType":"correct","explanation":"올바름: direct soothing → hands-on reassurance, directive guidance → step-by-step direction, beneficial → suit the needs well로 논리 구조 보존","translation":"직접적인 안심과 단계별 지도는 어린 자녀들의 필요에 잘 맞는다"},{"text":"structured emotional coaching is more effective for teenagers than for younger children","isCorrect":true,"optionType":"incorrect","explanation":"잘못됨: beneficial for younger children이라는 원문을 teenagers에게 더 효과적이라는 반대 진술로 역전시켜 의미 왜곡","translation":"체계적인 감정 코칭은 어린 자녀보다 청소년에게 더 효과적이다"}],"sourceQuestion":"5번 지문"},{"keyExpression":"the benefits truly outweigh the risks","passage":"However, there are those who question whether the benefits truly outweigh the risks. This has led to debate about whether companies should adopt facial recognition payment systems.","passageTranslation":"그러나 이점이 진정으로 위험을 능가하는지를 의문시하는 사람들이 있다. 이는 기업들이 안면 인식 결제 시스템을 도입해야 하는지에 대한 논쟁으로 이어졌다.","qType":"incorrect","questionText":"'the benefits truly outweigh the risks'을(를) 잘못 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"the benefits and risks are roughly equal in significance","isCorrect":true,"optionType":"incorrect","explanation":"잘못됨: outweigh는 한쪽의 명확한 우위를 나타내나, roughly equal로 균형 관계로 바꾸어 비교 우위 함의를 삭제함","translation":"이점과 위험은 중요성 면에서 대략 동등하다"},{"text":"the risks clearly surpass the potential benefits","isCorrect":true,"optionType":"incorrect","explanation":"잘못됨: 원문은 benefits가 risks를 능가한다는 의미인데, 주어와 목적어 관계를 역전시켜 risks가 benefits를 능가한다고 왜곡함","translation":"위험이 잠재적 이점을 명백히 능가한다"},{"text":"the gains are actually greater than the drawbacks","isCorrect":false,"optionType":"correct","explanation":"올바름: benefits→gains, outweigh→greater than, risks→drawbacks로 각 요소를 자연스럽게 paraphrasing하며 의미 보존","translation":"얻는 것이 실제로 단점보다 더 크다"},{"text":"the positive aspects really justify accepting the negative consequences","isCorrect":false,"optionType":"correct","explanation":"올바름: outweigh의 함축인 정당화·우위 관계를 justify accepting으로 논리적으로 재구성함","translation":"긍정적 측면이 부정적 결과를 받아들이는 것을 진정으로 정당화한다"},{"text":"the advantages genuinely exceed the potential dangers","isCorrect":false,"optionType":"correct","explanation":"올바름: outweigh를 exceed로, risks를 potential dangers로 대응 전환하여 비교 우위 관계를 정확히 유지함","translation":"이점이 잠재적 위험을 진정으로 능가한다"}],"sourceQuestion":"1번 지문"},{"keyExpression":"Ingestive habits such as smoking, drinking and various eating behaviors are the most common health concerns targeted for behavioral changes","passage":"Ingestive habits such as smoking, drinking and various eating behaviors are the most common health concerns targeted for behavioral changes.","passageTranslation":"흡연, 음주, 다양한 식습관과 같은 섭취 관련 습관들은 행동 변화의 대상이 되는 가장 흔한 건강 문제들이다.","qType":"incorrect","questionText":"'Ingestive habits such as smoking, drinking and various eating behaviors are the most common health concerns targeted for behavioral changes'을(를) 잘못 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"health professionals most often seek to reform habits centered on what people consume","isCorrect":false,"optionType":"correct","explanation":"올바름: most common health concerns targeted→most often seek to reform, ingestive habits→habits centered on what people consume으로 구체적 재표현","translation":"건강 전문가들은 사람들이 섭취하는 것과 관련된 습관을 가장 자주 개선하려 한다"},{"text":"eating disorders are rarely considered a behavioral health issue","isCorrect":true,"optionType":"incorrect","explanation":"잘못됨: 원문은 eating behaviors를 most common health concerns로 제시하는데, rarely considered(거의 간주되지 않는다)로 정반대 의미로 왜곡","translation":"섭식 장애는 행동 건강 문제로 거의 간주되지 않는다"},{"text":"behaviors involving substance intake rank among the top priorities for behavior modification programs","isCorrect":false,"optionType":"correct","explanation":"올바름: ingestive habits→substance intake behaviors, most common→top priorities, targeted for behavioral changes→behavior modification programs으로 논리 유지","translation":"물질 섭취를 포함하는 행동들은 행동 수정 프로그램의 최우선 과제 중 하나이다"},{"text":"consumption-related behaviors are frequent targets of health-focused behavioral interventions","isCorrect":false,"optionType":"correct","explanation":"올바름: ingestive habits→consumption-related behaviors, most common health concerns targeted→frequent targets of health-focused interventions로 추상화하며 의미 유지","translation":"섭취와 관련된 행동들은 건강 중심 행동 개입의 빈번한 대상이다"}],"sourceQuestion":"4번 지문"},{"keyExpression":"This, more than values and attitudes, is the part of personality that is easiest to change","passage":"This, more than values and attitudes, is the part of personality that is easiest to change.","passageTranslation":"이것(행동)은 가치관이나 태도보다 성격에서 변화시키기 가장 쉬운 부분이다.","qType":"correct","questionText":"'This, more than values and attitudes, is the part of personality that is easiest to change'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"values and attitudes are harder to identify than behavioral patterns","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: 원문은 변화의 용이성(ease of change)을 비교하는데, 식별의 어려움(harder to identify)으로 비교 기준 자체를 왜곡","translation":"가치관과 태도는 행동 패턴보다 식별하기 더 어렵다"},{"text":"among personality components, behavior is the most malleable element","isCorrect":true,"optionType":"correct","explanation":"올바름: easiest to change→most malleable, part of personality→personality component로 추상적 개념을 적절히 재표현","translation":"성격 요소들 중에서 행동이 가장 유연하게 변할 수 있는 요소이다"},{"text":"conduct proves simpler to alter than deeply held values or attitudes","isCorrect":true,"optionType":"correct","explanation":"올바름: behavior→conduct, easiest to change→simpler to alter, values and attitudes→deeply held values로 함의 강화하며 의미 보존","translation":"행동은 깊이 자리 잡은 가치관이나 태도보다 바꾸기 더 쉬운 것으로 드러난다"},{"text":"behavior is more readily modified than one's values or attitudes","isCorrect":true,"optionType":"correct","explanation":"올바름: easiest to change→more readily modified, more than values and attitudes→보다 쉽게 변한다는 비교 의미 유지","translation":"행동은 가치관이나 태도보다 더 쉽게 수정된다"},{"text":"personality traits are equally difficult to change regardless of type","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: 원문은 behavior가 가장 쉽게 변한다는 차별성을 강조하는데, equally difficult(동등하게 어렵다)로 역전시킴","translation":"성격 특성은 유형에 관계없이 변화시키기 동등하게 어렵다"}],"sourceQuestion":"4번 지문"},{"keyExpression":"especially beneficial in public spaces and during disease outbreaks","passage":"Advocates also claim that facial recognition payments are more hygienic than other payment options. Because users do not need to touch screens, keypads, cash, or coins, the spread of germs can be greatly reduced. Supporters see this as especially beneficial in public spaces and during disease outbreaks.","passageTranslation":"지지자들은 또한 안면 인식 결제가 다른 결제 옵션보다 더 위생적이라고 주장한다. 사용자들이 화면, 키패드, 현금 또는 동전을 만질 필요가 없기 때문에 세균의 확산이 크게 줄어들 수 있다. 지지자들은 이것이 공공장소와 질병 발생 시기에 특히 유익하다고 본다.","qType":"incorrect","questionText":"'especially beneficial in public spaces and during disease outbreaks'을(를) 잘못 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"less effective in crowded places due to the high risk of infection","isCorrect":true,"optionType":"incorrect","explanation":"잘못됨: especially beneficial(특히 유익)을 less effective(덜 효과적)로 역전시키고 장점을 단점의 조건으로 바꾸어 의미를 왜곡함","translation":"높은 감염 위험으로 인해 혼잡한 장소에서 덜 효과적이다"},{"text":"most useful in communal areas and when infectious diseases are spreading widely","isCorrect":false,"optionType":"correct","explanation":"올바름: beneficial→useful, public spaces→communal areas로 전환하고 disease outbreaks를 조건절로 풀어 의미를 충실히 재현함","translation":"공동 구역에서, 그리고 전염병이 널리 퍼질 때 가장 유용하다"},{"text":"particularly advantageous in shared environments and times of epidemic spread","isCorrect":false,"optionType":"correct","explanation":"올바름: especially→particularly, beneficial→advantageous, public spaces→shared environments, disease outbreaks→times of epidemic spread로 정확히 대응 전환함","translation":"공유 환경과 전염병 확산 시기에 특히 유리하다"},{"text":"of great value in open public settings and during health crises involving contagion","isCorrect":false,"optionType":"correct","explanation":"올바름: beneficial→of great value, public spaces→open public settings, disease outbreaks→health crises involving contagion으로 함축 의미를 논리적으로 재구성함","translation":"개방된 공공 환경과 전염을 수반하는 건강 위기 시 큰 가치가 있다"}],"sourceQuestion":"1번 지문"},{"keyExpression":"monitor their conditions in real time","passage":"In fact, many patients are already wearing devices that monitor their conditions in real time, which allows doctors to talk to their patients in a specific, refined, and feedback-driven way.","passageTranslation":"사실, 많은 환자들은 이미 자신의 상태를 실시간으로 모니터링하는 기기를 착용하고 있으며, 이는 의사들이 구체적이고 정제된 피드백 중심의 방식으로 환자들과 대화할 수 있게 해준다.","qType":"correct","questionText":"'monitor their conditions in real time'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"predict future health risks based on family medical records","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: 현재 상태의 실시간 모니터링을 과거 가족력 기반의 미래 예측으로 대체해 시제와 초점을 왜곡함","translation":"가족 의료 기록을 바탕으로 미래의 건강 위험을 예측하다"},{"text":"review a patient's medical history only during annual checkups","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: in real time(실시간)을 annual checkups(연간 검진)로 대체해 즉각성을 간헐적 검토로 역전시킴","translation":"연간 검진 때에만 환자의 병력을 검토하다"},{"text":"keep an ongoing watch over a patient's physical changes","isCorrect":true,"optionType":"correct","explanation":"올바름: monitor를 keep an ongoing watch over로, conditions를 physical changes로 재구성해 지속적 감시의 함의를 유지함","translation":"환자의 신체적 변화를 지속적으로 감시하다"}],"sourceQuestion":"2번 지문"},{"keyExpression":"their own responses to emotional situations serve as a role model for emotion regulation","passage":"For example, their own responses to emotional situations serve as a role model for emotion regulation, increasing the likelihood that their children will show similar reactions in comparable situations.","passageTranslation":"예를 들어, 감정적 상황에 대한 부모 자신의 반응은 감정 조절의 역할 모델이 되어, 자녀들이 유사한 상황에서 비슷한 반응을 보일 가능성을 높인다.","qType":"correct","questionText":"'their own responses to emotional situations serve as a role model for emotion regulation'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"parents actively instruct children on which emotions are acceptable to display","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: serve as a role model(모범이 됨, 간접적 학습) → actively instruct(직접 지시)로 학습 방식이 암묵적→명시적으로 왜곡","translation":"부모는 어떤 감정을 표현해도 되는지 자녀에게 적극적으로 지시한다"},{"text":"children spontaneously develop their own unique emotional coping strategies","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: 부모의 역할 모델 기능을 완전히 삭제하고 자녀가 독자적으로 감정 대처 전략을 개발한다는 반대 의미 생성","translation":"자녀들은 자발적으로 자신만의 고유한 감정 대처 전략을 발달시킨다"},{"text":"how parents react to emotional events becomes a behavioral template for their children","isCorrect":true,"optionType":"correct","explanation":"올바름: responses to emotional situations → react to emotional events, role model → behavioral template로 추상→구체 전환 성공","translation":"부모가 감정적 사건에 반응하는 방식이 자녀의 행동 틀이 된다"}],"sourceQuestion":"5번 지문"},{"keyExpression":"Mental imagery combined with power of suggestion was taken up as the premise of behavioral medicine","passage":"Mental imagery combined with power of suggestion was taken up as the premise of behavioral medicine to help people change negative health behaviors into positive ones.","passageTranslation":"암시의 힘과 결합된 심상(心象)은 사람들이 부정적인 건강 행동을 긍정적인 것으로 바꾸도록 돕기 위한 행동 의학의 전제로 채택되었다.","qType":"incorrect","questionText":"'Mental imagery combined with power of suggestion was taken up as the premise of behavioral medicine'을(를) 잘못 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"guided imagination and the influence of suggestion formed the underlying principle of behavioral medicine","isCorrect":false,"optionType":"correct","explanation":"올바름: mental imagery→guided imagination, power of suggestion→influence of suggestion, premise→underlying principle으로 추상 개념 재구성","translation":"안내된 상상력과 암시의 영향력이 행동 의학의 기저 원리를 형성했다"},{"text":"visualization paired with suggestive influence became the foundation of behavior-based therapy","isCorrect":false,"optionType":"correct","explanation":"올바름: mental imagery→visualization, power of suggestion→suggestive influence, premise→foundation, behavioral medicine→behavior-based therapy로 동일 논리 구조 유지","translation":"암시의 영향력과 결합된 심상화가 행동 기반 치료의 기초가 되었다"},{"text":"the power of suggestion alone was proven sufficient as a medical treatment","isCorrect":true,"optionType":"incorrect","explanation":"잘못됨: 원문은 mental imagery와 suggestion의 결합(combined)을 강조하는데, alone(단독으로)을 사용하여 결합의 전제를 부정","translation":"암시의 힘만으로도 의학적 치료로서 충분한 것으로 입증되었다"},{"text":"the use of mental images alongside persuasive suggestion was adopted as the basis of behavioral health practice","isCorrect":false,"optionType":"correct","explanation":"올바름: taken up→adopted, premise→basis, combined with→alongside로 문장 구조를 재배열하면서도 의미 보존","translation":"설득적 암시와 함께 심상(心象)을 사용하는 것이 행동 건강 실천의 근거로 채택되었다"}],"sourceQuestion":"4번 지문"},{"keyExpression":"adolescents might pull away from, rather than turn toward, their parents in times of emotional crisis","passage":"In consequence, adolescents might pull away from, rather than turn toward, their parents in times of emotional crisis, unless parental practices are adjusted.","passageTranslation":"그 결과, 부모의 양육 방식이 조정되지 않는다면, 청소년들은 감정적 위기 상황에서 부모에게 의지하기보다는 오히려 멀어질 수 있다.","qType":"correct","questionText":"'adolescents might pull away from, rather than turn toward, their parents in times of emotional crisis'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"emotionally distressed adolescents may avoid parental contact rather than reaching out for support","isCorrect":true,"optionType":"correct","explanation":"올바름: pull away from → avoid parental contact, turn toward → reaching out for support로 함축적 의미를 명시화하며 rather than 대조 관계 유지","translation":"감정적으로 힘든 청소년들은 지지를 구하는 대신 부모와의 접촉을 피할 수 있다"},{"text":"adolescents are more likely to rely on parents for comfort when they face emotional difficulties","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: pull away from(멀어짐) → rely on parents for comfort(부모에게 의지)로 정반대 행동 묘사, 지문의 핵심 조건절(unless 이하)이 충족되지 않은 상황을 묘사하는 원문과 충돌","translation":"청소년들은 감정적 어려움에 직면할 때 위안을 위해 부모에게 더 의존하는 경향이 있다"},{"text":"in moments of emotional hardship, teens might withdraw from rather than approach their parents","isCorrect":true,"optionType":"correct","explanation":"올바름: pull away → withdraw, turn toward → approach, times of emotional crisis → moments of emotional hardship로 대조 관계 보존하며 도치 구조 활용","translation":"감정적 어려움의 순간에, 청소년들은 부모에게 다가가는 대신 오히려 멀어질 수 있다"},{"text":"during emotional crises, teenagers seek immediate parental guidance before acting independently","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: pull away(회피)와 반대로 즉각적으로 부모 지침을 먼저 구한다는 의미로 왜곡하여 원문의 논지를 역전","translation":"감정적 위기 동안, 청소년들은 독립적으로 행동하기 전에 즉각적인 부모의 지도를 구한다"}],"sourceQuestion":"5번 지문"},{"keyExpression":"entirely overlooked in discussions of high-speed society","passage":"Potentially, therefore, it has huge implications for the management of time in everyday life, yet it is entirely overlooked in discussions of high-speed society.","passageTranslation":"따라서 잠재적으로 이것은 일상생활에서 시간 관리에 막대한 함의를 지니고 있지만, 고속 사회에 대한 논의에서는 완전히 간과되고 있다.","qType":"correct","questionText":"'entirely overlooked in discussions of high-speed society'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"critically examined and disputed in current sociological literature","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: 'overlooked'(무시됨)와 달리 'critically examined and disputed'(비판적으로 검토·논쟁됨)는 오히려 주목받고 있음을 의미하므로 반의 관계","translation":"현재 사회학 문헌에서 비판적으로 검토되고 논쟁되는"},{"text":"completely ignored when people talk about the fast pace of modern life","isCorrect":true,"optionType":"correct","explanation":"올바름: 'entirely overlooked'를 'completely ignored'로, 'discussions of high-speed society'를 'when people talk about the fast pace of modern life'로 구체화하여 의미 보존","translation":"현대 생활의 빠른 속도에 대해 이야기할 때 완전히 무시되는"},{"text":"frequently cited as a key example in studies of contemporary speed culture","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: 'entirely overlooked'(완전히 간과)를 'frequently cited as a key example'(핵심 사례로 자주 인용)로 정반대 의미로 역전","translation":"현대 속도 문화 연구에서 핵심 사례로 자주 인용되는"}],"sourceQuestion":"3번 지문"},{"keyExpression":"absorbed into the furniture of our lives","passage":"older technologies have become absorbed into the furniture of our lives, so as to be almost invisible.","passageTranslation":"오래된 기술들은 우리 삶의 일부에 흡수되어 거의 눈에 보이지 않을 정도가 되었다.","qType":"correct","questionText":"'absorbed into the furniture of our lives'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"recognized and celebrated as essential parts of modern life","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: 원문은 '인식되지 않음'을 뜻하는데 'recognized and celebrated'로 의미를 정반대로 바꿈","translation":"현대 생활의 필수적 부분으로 인식되고 칭송받는"},{"text":"gradually removed from our daily habits and forgotten","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: 'absorbed into'(흡수·통합)를 'removed from'(제거)으로 반전시켜 의미 왜곡","translation":"일상적 습관에서 점차 제거되어 잊혀진"},{"text":"integrated into everyday routines so thoroughly as to become invisible","isCorrect":true,"optionType":"correct","explanation":"올바름: 'absorbed'와 'invisible'을 모두 반영하여 일상 속에 완전히 통합된 상태를 표현","translation":"일상적 루틴에 철저히 통합되어 보이지 않게 된"}],"sourceQuestion":"3번 지문"}]};
var QS=CONFIG.questions||[];
var TOTAL=QS.length;
var SET_SIZE=10;
var SETS=(function(){var s=[];for(var i=0;i<TOTAL;i+=SET_SIZE)s.push(QS.slice(i,i+SET_SIZE));return s;})();
var CIRCLED=["①","②","③","④","⑤","⑥"];
var answers={};var selections={};var currentSet=0;
var _tLast=0;var _busy=false;var _curPos=-1;
function esc(s){if(s==null)return"";var d=document.createElement("div");d.textContent=String(s);return d.innerHTML}
function setH(t,sub){var h=document.getElementById("hTitle");var p=document.getElementById("hSub");if(h)h.textContent=t;if(p)p.textContent=sub}
function gi(si,pi){return si*SET_SIZE+pi}
function showIndex(){
  setH(CONFIG.title,"Paraphrasing 표현 테스트");
  var chips=SETS.map(function(sq,si){
    var base=si*SET_SIZE;var done=0,correct=0;
    for(var i=0;i<sq.length;i++){var a=answers[base+i];if(a){done++;if(a.isCorrect)correct++;}}
    var allDone=(done===sq.length);
    var pct=done>0?Math.round(correct/sq.length*100):null;
    var passed=pct!==null&&pct>=CONFIG.passThreshold;
    var scoreHTML=pct===null
      ?"<span style='font-size:.78rem;color:#9ca3af'>미응시</span>"
      :(allDone?"<span style='font-weight:700;color:"+(passed?"#10b981":"#ef4444")+";'>"+(passed?"✅ ":"❌ ")+pct+"%</span>"
             :"<span style='font-weight:700;color:#f59e0b'>📝 "+done+"/"+sq.length+"</span>");
    return "<div class='set-card"+(allDone?" done":"")+"'onclick='enterSet("+si+")'>"
           +"<div><div style='font-weight:700'>세트 "+(si+1)+" <span style='font-size:.8rem;color:#6b7280;font-weight:400'>("+sq.length+"문제)</span></div></div>"
           +"<div>"+scoreHTML+"</div></div>";
  }).join("");
  var app=document.getElementById("app");if(!app)return;
  app.innerHTML="<div class='fade' style='text-align:center;padding:16px 0'>"
    +"<div style='font-size:2.5rem;margin-bottom:8px'>🔄</div>"
    +"<h2 style='font-size:1.2rem;font-weight:700;color:#1f2937;margin-bottom:4px'>Paraphrasing 표현 테스트</h2>"
    +"<p style='color:#6b7280;font-size:.85rem;margin-bottom:16px'>전체 "+TOTAL+"문제 · "+CONFIG.passThreshold+"% 이상 통과</p>"
    +"</div><div class='set-list'>"+chips+"</div>";
}
function enterSet(si){currentSet=si;_curPos=-1;showQ(0)}
function showQ(pos){
  if(pos!==_curPos){try{window.scrollTo(0,0)}catch(e){}_curPos=pos;}
  var si=currentSet;var qs=SETS[si];
  if(!qs||pos<0||pos>=qs.length){showIndex();return;}
  var gidx=gi(si,pos);var q=qs[pos];var answered=answers[gidx];
  var sel=selections[gidx]||{};
  setH("세트 "+(si+1),"문제 "+(pos+1)+"/"+qs.length);
  var pct=Math.round((pos+1)/qs.length*100);
  var isTypeA=q.qType==="correct";
  var correctCount=q.options.filter(function(o){return o.isCorrect}).length;
  var optsHTML=q.options.map(function(o,i){
    var cls="";var chkTxt="";
    if(answered){
      var wasSel=!!(answered.selected&&answered.selected[i]);
      if(isTypeA){
        if(o.isCorrect&&wasSel){cls="a-corr-hit";chkTxt="✓"}
        else if(o.isCorrect&&!wasSel){cls="a-corr-miss";chkTxt="○"}
        else if(!o.isCorrect&&wasSel){cls="a-wrong-sel";chkTxt="✕"}
        else{cls="a-wrong-unsel"}
      }else{
        if(o.isCorrect&&wasSel){cls="b-ans-hit";chkTxt="✓"}
        else if(o.isCorrect&&!wasSel){cls="b-ans-miss";chkTxt="○"}
        else if(!o.isCorrect&&wasSel){cls="b-corr-sel";chkTxt="✓"}
        else{cls="b-corr-unsel"}
      }
    }else if(sel[i]){cls="selected";chkTxt="✓"}
    return "<button class='chk-btn "+cls+"' onclick='toggleOpt("+pos+","+i+")' "+(answered?"disabled":"")+" data-idx='"+i+"'>"
           +"<div class='chk-box'>"+chkTxt+"</div>"
           +"<span>"+esc(o.text)+"</span></button>";
  }).join("");
  var feedbackHTML="";
  if(answered){
    var cidxs=[];
    q.options.forEach(function(o,i){if(o.isCorrect)cidxs.push(i)});
    var cLabel=cidxs.map(function(i){return CIRCLED[i]}).join(", ");
    feedbackHTML="<div class='fb "+(answered.isCorrect?"ok":"ng")+"'>"
      +(answered.isCorrect?"✅ 정답!":"❌ 오답 — 정답: "+cLabel)
      +"</div>"
      +"<div class='explain-box'><div class='ex-title'>해설</div>"
      +q.options.map(function(o,i){
        var tag;
        if(isTypeA){tag=o.isCorrect?"<span class='tag-ok'>[올바른 paraphrasing]</span>":"<span class='tag-ng'>[잘못된 paraphrasing]</span>"}
        else{tag=o.isCorrect?"<span class='tag-ng'>[잘못된 paraphrasing]</span>":"<span class='tag-ok'>[올바른 paraphrasing]</span>"}
        return "<div class='ex-item'><strong>"+CIRCLED[i]+" "+esc(o.text)+"</strong> "+tag
               +"<br><span class='trans'>→ "+esc(o.translation||o.explanation)+"</span></div>";
      }).join("")+"</div>";
  }
  var passageSection="";
  if(q.passage){
    passageSection="<button class='show-passage-btn' id='pbtn' onclick='togglePassage()'>📄 지문 보기</button>"
                  +"<div class='passage-box' id='pbox' style='display:none'>"+esc(q.passage)+"</div>";
  }
  var hintColor=answered?(answered.isCorrect?"#166534":"#991b1b"):"#4f46e5";
  var hintHTML=CONFIG.showCountHint
    ?"<div class='q-hint' style='background:rgba(139,92,246,.08);border:1px solid rgba(139,92,246,.2);color:#374151'>정답 개수 : <span style='font-size:1.5em;font-weight:900;color:"+hintColor+"'>"+correctCount+"</span>개</div>"
    :"<div class='q-hint' style='background:#f8fafc;color:#64748b;border:1px solid #e2e8f0'>"+(isTypeA?"<span style='color:#059669;font-weight:800'>올바른</span>":"<span style='color:#e11d48;font-weight:800'>잘못된</span>")+" paraphrasing을 모두 선택 후 제출하세요</div>";
  var typeBadge=isTypeA
    ?"<div class='type-badge ok'>✅ 올바른 paraphrasing 찾기</div>"
    :"<div class='type-badge ng'>❌ 잘못된 paraphrasing 찾기</div>";
  var app=document.getElementById("app");if(!app)return;
  app.innerHTML="<div class='fade'>"
    +"<div class='q-counter'>"+(pos+1)+" / "+qs.length+"</div>"
    +"<div class='prog-bar'><div class='prog-fill' style='width:"+pct+"%;background:"+(isTypeA?"#059669":"#dc2626")+"'></div></div>"
    +(q.sourceQuestion?"<div style='display:inline-block;background:#fef3c7;color:#b45309;padding:4px 12px;border-radius:20px;font-size:.78rem;font-weight:600;margin-bottom:10px'>"+esc(q.sourceQuestion)+"</div>":"")
    +typeBadge
    +"<div class='key-box'>"
    +"<div class='expr'>“"+esc(q.keyExpression)+"”</div>"
    +"<div class='qtext'>"+(isTypeA
      ?"위 표현을 <span style='color:#059669;font-weight:800'>올바르게</span> paraphrasing 한 것을 모두 고르시오."
      :"위 표현을 <span style='color:#e11d48;font-weight:800'>잘못</span> paraphrasing 한 것을 모두 고르시오.")
    +"</div></div>"
    +passageSection
    +hintHTML
    +"<div class='opts'>"+optsHTML+"</div>"
    +feedbackHTML
    +"<div class='nav-bar'>"
    +"<button class='nav-btn prev' onclick='showQ("+(pos-1)+")' "+(pos<=0?"disabled":"")+">← 이전</button>"
    +"<button class='nav-btn home' onclick='showIndex()'>목록</button>"
    +(!answered
      ?"<button class='nav-btn next' onclick='submitAnswer("+pos+")'>✓ 제출</button>"
      :"<button class='nav-btn next' onclick='"+(pos<qs.length-1?"showQ("+(pos+1)+")":"showSetResult()")+"'>→ "+(pos<qs.length-1?"다음":"결과")+"</button>")
    +"</div></div>";
}
function toggleOpt(pos,optIdx){
  var _n=Date.now();if(_n-_tLast<280)return;_tLast=_n;
  var gidx=gi(currentSet,pos);
  if(answers[gidx])return;
  if(!selections[gidx])selections[gidx]={};
  if(selections[gidx][optIdx])delete selections[gidx][optIdx];
  else selections[gidx][optIdx]=true;
  showQ(pos);
}
function submitAnswer(pos){
  try{
  var gidx=gi(currentSet,pos);
  if(answers[gidx])return;
  var q=SETS[currentSet][pos];
  if(!q)return;
  var sel=selections[gidx]||{};
  var isCorrect=true;
  for(var i=0;i<q.options.length;i++){
    var wasSel=!!sel[i];var shouldSel=q.options[i].isCorrect;
    if(wasSel!==shouldSel){isCorrect=false;break}
  }
  answers[gidx]={selected:sel,isCorrect:isCorrect};
  showQ(pos);
  }catch(e){console.error("submitAnswer err",e)}
}
function togglePassage(){
  var b=document.getElementById("pbox");var btn=document.getElementById("pbtn");
  if(!b)return;
  if(b.style.display==="none"){b.style.display="block";if(btn)btn.textContent="📄 지문 숨기기"}
  else{b.style.display="none";if(btn)btn.textContent="📄 지문 보기"}
}
function showSetResult(){
  var si=currentSet;var qs=SETS[si];var base=si*SET_SIZE;
  var total=qs.length;var correct=0;
  for(var i=0;i<total;i++){var a=answers[base+i];if(a&&a.isCorrect)correct++}
  var pct=Math.round(correct/total*100);
  var passed=pct>=CONFIG.passThreshold;
  setH("세트 "+(si+1)+" 결과",passed?"통과":"미달");
  var app=document.getElementById("app");if(!app)return;
  app.innerHTML="<div class='fade' style='text-align:center;padding:16px 0'>"
    +"<div class='score-circle "+(passed?"pass":"fail")+"'>"+(pct)+"%</div>"
    +"<p style='font-size:1.1rem;font-weight:700;color:"+(passed?"#10b981":"#ef4444")+"'>"+(passed?"통과!":"미달")+"</p>"
    +"<p style='color:#6b7280;font-size:.88rem;margin-top:8px'>"+correct+"/"+total+"문제 정답 · 기준 "+CONFIG.passThreshold+"%</p>"
    +"</div>"
    +"<div style='margin-top:16px'><button class='btn btn-primary' onclick='showIndex()'>목록으로</button></div>";
}
try{history.pushState(null,"",location.href);
window.addEventListener("popstate",function(){
  history.pushState(null,"",location.href);
  showIndex();
});}catch(e){}
showIndex();
</script>
