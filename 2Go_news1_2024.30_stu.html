:"adolescents are more likely to rely on parents for comfort when they face emotional difficulties","isCorrect":true,"optionType":"incorrect","explanation":"잘못됨: pull away from(멀어짐) → rely on parents for comfort(부모에게 의지)로 정반대 행동 묘사, 지문의 핵심 조건절(unless 이하)이 충족되지 않은 상황을 묘사하는 원문과 충돌","translation":"청소년들은 감정적 어려움에 직면할 때 위안을 위해 부모에게 더 의존하는 경향이 있다"},{"text":"emotionally distressed adolescents may avoid parental contact rather than reaching out for support","isCorrect":false,"optionType":"correct","explanation":"올바름: pull away from → avoid parental contact, turn toward → reaching out for support로 함축적 의미를 명시화하며 rather than 대조 관계 유지","translation":"감정적으로 힘든 청소년들은 지지를 구하는 대신 부모와의 접촉을 피할 수 있다"},{"text":"teenagers may distance themselves from parents instead of seeking their help during emotional struggles","isCorrect":false,"optionType":"correct","explanation":"올바름: pull away from → distance themselves, turn toward → seeking their help, times of emotional crisis → during emotional struggles로 구체적 행위로 전환하며 대조 구조 유지","translation":"청소년들은 감정적 어려움 동안 부모의 도움을 구하는 대신 부모로부터 멀어질 수 있다"},{"text":"in moments of emotional hardship, teens might withdraw from rather than approach their parents","isCorrect":false,"optionType":"correct","explanation":"올바름: pull away → withdraw, turn toward → approach, times of emotional crisis → moments of emotional hardship로 대조 관계 보존하며 도치 구조 활용","translation":"감정적 어려움의 순간에, 청소년들은 부모에게 다가가는 대신 오히려 멀어질 수 있다"}],"sourceQuestion":"5번 지문"},{"keyExpression":"bottle feeding allows for someone else to substitute for the mother's time","passage":"It can also function to save time, as bottle feeding allows for someone else to substitute for the mother's time.","passageTranslation":"젖병 수유는 다른 누군가가 어머니의 역할을 대신할 수 있게 해주므로, 시간을 절약하는 기능도 할 수 있다.","qType":"incorrect","questionText":"'bottle feeding allows for someone else to substitute for the mother's time'을(를) 잘못 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"the mother does not have to be the one present at every feeding","isCorrect":false,"optionType":"correct","explanation":"올바름: 'substitute for the mother's time'의 함축(어머니가 직접 있지 않아도 됨)을 직접적으로 표현하여 의미 재구성","translation":"어머니가 매번 수유 시에 직접 있어야 하는 것은 아니다"},{"text":"bottle feeding increases the total amount of time the mother invests in childcare","isCorrect":true,"optionType":"incorrect","explanation":"잘못됨: 원문은 시간을 절약(대체) 가능함을 의미하는데, '어머니의 시간 투자가 증가한다'로 인과 역전","translation":"젖병 수유는 어머니가 육아에 투자하는 총 시간을 증가시킨다"},{"text":"feeding duties can be delegated to a person other than the mother","isCorrect":false,"optionType":"correct","explanation":"올바름: 'substitute for'를 'delegated to'로, 'someone else'를 'a person other than the mother'로 바꿔 의미 유지","translation":"수유 의무가 어머니 외의 다른 사람에게 위임될 수 있다"},{"text":"another person can take over the feeding role on behalf of the mother","isCorrect":false,"optionType":"correct","explanation":"올바름: 'substitute for the mother's time'을 'take over the feeding role on behalf of the mother'로 구체적 행위 표현으로 전환하여 의미 보존","translation":"다른 사람이 어머니를 대신하여 수유 역할을 맡을 수 있다"}],"sourceQuestion":"3번 지문"},{"keyExpression":"Repeated use of images reinforces the desired behavior more strongly over time","passage":"What mental imagery does is reinforce a new desired behavior. Repeated use of images reinforces the desired behavior more strongly over time.","passageTranslation":"심상(心象)이 하는 일은 새롭게 바라는 행동을 강화하는 것이다. 이미지를 반복적으로 사용하면 시간이 지남에 따라 바라는 행동을 더욱 강하게 강화한다.","qType":"incorrect","questionText":"'Repeated use of images reinforces the desired behavior more strongly over time'을(를) 잘못 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"a single vivid mental image is sufficient to permanently alter behavior","isCorrect":true,"optionType":"incorrect","explanation":"잘못됨: 원문은 반복(repeated)과 시간의 경과(over time)를 강조하는데, single(단 한 번의)으로 반복성을 부정하고 permanently alter를 통해 즉각적·영구적 변화를 암시하여 의미 왜곡","translation":"단 한 번의 생생한 심상으로도 행동을 영구적으로 바꾸기에 충분하다"},{"text":"the more frequently mental images are employed, the stronger the behavioral reinforcement becomes","isCorrect":false,"optionType":"correct","explanation":"올바름: repeated use→more frequently employed, reinforces more strongly over time→stronger reinforcement becomes로 비교 구조로 재표현하며 의미 보존","translation":"심상이 더 자주 활용될수록 행동 강화는 더욱 강해진다"},{"text":"habitual practice of imagery cumulatively deepens the entrenchment of a desired action","isCorrect":false,"optionType":"correct","explanation":"올바름: repeated use→habitual practice, more strongly over time→cumulatively deepens, reinforces desired behavior→entrenchment of desired action으로 추상↔구체 전환하며 함의 유지","translation":"심상의 습관적 실천은 원하는 행동의 고착화를 누적적으로 심화시킨다"},{"text":"consistent application of visualization progressively consolidates target conduct","isCorrect":false,"optionType":"correct","explanation":"올바름: repeated use→consistent application, images→visualization, reinforces more strongly over time→progressively consolidates로 시간적 축적 논리 유지","translation":"심상화의 일관된 적용은 목표 행동을 점진적으로 공고히 한다"}],"sourceQuestion":"4번 지문"},{"keyExpression":"the key to addressing negative health habits is to change behavior","passage":"For years, many psychologists have held strongly to the belief that the key to addressing negative health habits is to change behavior.","passageTranslation":"수년간 많은 심리학자들은 부정적인 건강 습관을 다루는 핵심이 행동을 바꾸는 것이라는 믿음을 강하게 고수해 왔다.","qType":"correct","questionText":"'the key to addressing negative health habits is to change behavior'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"altering one's actions is the core solution to unhealthy patterns","isCorrect":true,"optionType":"correct","explanation":"올바름: key→core solution, change behavior→altering actions, negative health habits→unhealthy patterns으로 의미 보존","translation":"건강에 해로운 패턴에 대한 핵심 해결책은 행동을 바꾸는 것이다"},{"text":"recognizing the cause of negative habits is the first step to recovery","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: 원문의 핵심은 behavior change(행동 변화)인데, 원인 파악(recognizing the cause)으로 대체하여 인과 논리 전환","translation":"부정적 습관의 원인을 인식하는 것이 회복의 첫 단계이다"},{"text":"shifting one's mindset alone is sufficient to eliminate bad habits","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: 원문은 behavior(행동) 변화를 강조하는데, mindset(사고방식) 변화로 대체하여 핵심 개념 왜곡","translation":"사고방식의 전환만으로도 나쁜 습관을 없애기에 충분하다"}],"sourceQuestion":"4번 지문"},{"keyExpression":"overrate the impact of new technologies","passage":"We tend to overrate the impact of new technologies in part because older technologies have become absorbed into the furniture of our lives.","passageTranslation":"우리는 새로운 기술의 영향력을 과대평가하는 경향이 있는데, 이는 부분적으로 오래된 기술들이 우리 삶의 일부에 흡수되었기 때문이다.","qType":"correct","questionText":"'overrate the impact of new technologies'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"assign greater importance to modern innovations than they deserve","isCorrect":true,"optionType":"correct","explanation":"올바름: 'overrate'의 논리 구조(실제보다 높이 평가)를 'assign greater importance than they deserve'로 명확히 재구성","translation":"현대적 혁신에 실제보다 더 큰 중요성을 부여하다"},{"text":"fail to understand how new technologies are developed and produced","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: 원문은 '영향력을 과대평가함'인데, '기술의 개발 과정을 이해 못 함'으로 주제를 왜곡","translation":"새로운 기술이 어떻게 개발되고 생산되는지 이해하지 못하다"},{"text":"underestimate the potential risks associated with emerging technologies","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: 'overrate'(과대평가)를 'underestimate'(과소평가)로 반전시키고 대상도 'risks'로 바꿔 의미 변질","translation":"신기술과 관련된 잠재적 위험을 과소평가하다"}],"sourceQuestion":"3번 지문"},{"keyExpression":"bring some appropriate technology to bear","passage":"Today, we are approaching the point where we can begin to bring some appropriate technology to bear in ways that advance our understanding of patients as unique individuals.","passageTranslation":"오늘날 우리는 환자를 고유한 개인으로 이해하는 것을 발전시키는 방식으로 적절한 기술을 활용하기 시작할 수 있는 시점에 가까워지고 있다.","qType":"correct","questionText":"'bring some appropriate technology to bear'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"burden the medical system with unnecessary equipment","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: appropriate(적절한)를 unnecessary(불필요한)로 대체하고 bear를 burden으로 왜곡해 긍정적 함의를 부정적으로 바꿈","translation":"의료 시스템에 불필요한 장비로 부담을 주다"},{"text":"avoid using any technological intervention in medical treatment","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: 기술의 적극적 적용을 기술적 개입의 회피로 완전히 역전시켜 필자의 핵심 주장을 부정함","translation":"의료 치료에서 어떠한 기술적 개입도 피하다"},{"text":"apply suitable technological tools to address a problem effectively","isCorrect":true,"optionType":"correct","explanation":"올바름: bring to bear는 '효과적으로 적용하다'는 관용 의미이고 appropriate를 suitable로, technology를 technological tools로 정확히 대체함","translation":"문제를 효과적으로 해결하기 위해 적절한 기술 도구를 적용하다"},{"text":"deploy the right tools to make a meaningful difference","isCorrect":true,"optionType":"correct","explanation":"올바름: appropriate technology를 the right tools로, bring to bear를 deploy로 변환해 목적과 수단의 함의를 모두 유지함","translation":"의미 있는 변화를 만들기 위해 적절한 도구를 배치하다"}],"sourceQuestion":"2번 지문"},{"keyExpression":"Mental imagery combined with power of suggestion was taken up as the premise of behavioral medicine","passage":"Mental imagery combined with power of suggestion was taken up as the premise of behavioral medicine to help people change negative health behaviors into positive ones.","passageTranslation":"암시의 힘과 결합된 심상(心象)은 사람들이 부정적인 건강 행동을 긍정적인 것으로 바꾸도록 돕기 위한 행동 의학의 전제로 채택되었다.","qType":"incorrect","questionText":"'Mental imagery combined with power of suggestion was taken up as the premise of behavioral medicine'을(를) 잘못 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"guided imagination and the influence of suggestion formed the underlying principle of behavioral medicine","isCorrect":false,"optionType":"correct","explanation":"올바름: mental imagery→guided imagination, power of suggestion→influence of suggestion, premise→underlying principle으로 추상 개념 재구성","translation":"안내된 상상력과 암시의 영향력이 행동 의학의 기저 원리를 형성했다"},{"text":"the use of mental images alongside persuasive suggestion was adopted as the basis of behavioral health practice","isCorrect":false,"optionType":"correct","explanation":"올바름: taken up→adopted, premise→basis, combined with→alongside로 문장 구조를 재배열하면서도 의미 보존","translation":"설득적 암시와 함께 심상(心象)을 사용하는 것이 행동 건강 실천의 근거로 채택되었다"},{"text":"visualization paired with suggestive influence became the foundation of behavior-based therapy","isCorrect":false,"optionType":"correct","explanation":"올바름: mental imagery→visualization, power of suggestion→suggestive influence, premise→foundation, behavioral medicine→behavior-based therapy로 동일 논리 구조 유지","translation":"암시의 영향력과 결합된 심상화가 행동 기반 치료의 기초가 되었다"},{"text":"behavioral medicine was developed independently of any psychological techniques","isCorrect":true,"optionType":"incorrect","explanation":"잘못됨: 원문은 mental imagery와 suggestion이 전제로 채택됐다고 하는데, independently of psychological techniques(심리 기법과 무관하게 발전)로 인과 관계를 완전히 역전","translation":"행동 의학은 어떤 심리적 기법과도 무관하게 독자적으로 발전했다"}],"sourceQuestion":"4번 지문"},{"keyExpression":"operate both autonomously and safely","passage":"it could not slow down, stop, or turn to avoid barriers. ... it only means that at the time we did not yet have the tools we now possess to help enable vehicles to operate both autonomously and safely.","passageTranslation":"그것은 속도를 줄이거나, 멈추거나, 장애물을 피해 방향을 틀 수 없었다. ... 그것은 단지 당시에 우리가 차량이 자율적으로 그리고 안전하게 작동할 수 있도록 돕는 지금 우리가 보유한 도구들을 아직 갖추지 못했음을 의미할 뿐이다.","qType":"incorrect","questionText":"'operate both autonomously and safely'을(를) 잘못 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"move forward only with continuous human supervision","isCorrect":true,"optionType":"incorrect","explanation":"잘못됨: 자율성(autonomously)의 핵심인 인간 개입 불필요를 부정하고, 오히려 지속적인 인간 감독이 필요하다고 의미를 역전시킴","translation":"지속적인 인간의 감독 하에서만 앞으로 이동하다"},{"text":"run without human input and without causing harm","isCorrect":false,"optionType":"correct","explanation":"올바름: 자율성(without human input)과 안전성(without causing harm)을 동시에 재표현함","translation":"인간의 개입 없이 그리고 피해를 유발하지 않으면서 작동하다"},{"text":"function independently while still ensuring passenger protection","isCorrect":false,"optionType":"correct","explanation":"올바름: autonomously를 independently로, safely를 ensuring passenger protection으로 정확히 바꿔 두 조건을 모두 유지함","translation":"독립적으로 기능하면서도 탑승자 안전을 보장하다"},{"text":"move on its own while avoiding danger effectively","isCorrect":false,"optionType":"correct","explanation":"올바름: 자율적 이동(move on its own)과 안전한 운행(avoiding danger effectively)을 병렬로 재구성함","translation":"스스로 이동하면서 위험을 효과적으로 피하다"}],"sourceQuestion":"2번 지문"},{"keyExpression":"overrate the impact of new technologies","passage":"We tend to overrate the impact of new technologies in part because older technologies have become absorbed into the furniture of our lives.","passageTranslation":"우리는 새로운 기술의 영향력을 과대평가하는 경향이 있는데, 이는 부분적으로 오래된 기술들이 우리 삶의 일부에 흡수되었기 때문이다.","qType":"correct","questionText":"'overrate the impact of new technologies'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"exaggerate how much new technologies actually change our lives","isCorrect":true,"optionType":"correct","explanation":"올바름: 'overrate the impact'를 'exaggerate how much ~ change'로 구체적 행위 표현으로 전환","translation":"새로운 기술이 실제로 우리 삶을 얼마나 변화시키는지를 과장하다"},{"text":"fail to understand how new technologies are developed and produced","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: 원문은 '영향력을 과대평가함'인데, '기술의 개발 과정을 이해 못 함'으로 주제를 왜곡","translation":"새로운 기술이 어떻게 개발되고 생산되는지 이해하지 못하다"},{"text":"underestimate the potential risks associated with emerging technologies","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: 'overrate'(과대평가)를 'underestimate'(과소평가)로 반전시키고 대상도 'risks'로 바꿔 의미 변질","translation":"신기술과 관련된 잠재적 위험을 과소평가하다"},{"text":"place too much emphasis on the significance of recent inventions","isCorrect":true,"optionType":"correct","explanation":"올바름: 'overrate'를 'place too much emphasis on'으로, 'new technologies'를 'recent inventions'로 바꿔 의미 유지","translation":"최근 발명품들의 중요성에 지나치게 큰 비중을 두다"}],"sourceQuestion":"3번 지문"},{"keyExpression":"give rise to serious privacy risks","passage":"In contrast, critics argue that facial recognition payments could give rise to serious privacy risks. The systems require companies to collect and store sensitive biometric data, such as facial scans.","passageTranslation":"반면에, 비평가들은 안면 인식 결제가 심각한 프라이버시 위험을 야기할 수 있다고 주장한다. 이 시스템은 기업들이 안면 스캔과 같은 민감한 생체 인식 데이터를 수집하고 저장하도록 요구한다.","qType":"correct","questionText":"'give rise to serious privacy risks'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"gradually reduce the likelihood of data privacy violations","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: 원문은 위험의 발생을 의미하나, reduce the likelihood로 위험 감소를 나타내어 방향성이 반대로 왜곡됨","translation":"데이터 프라이버시 침해 가능성을 점차 줄인다"},{"text":"lead to considerable dangers involving the exposure of sensitive data","isCorrect":true,"optionType":"correct","explanation":"올바름: give rise to를 lead to로, serious privacy risks를 dangers involving exposure of sensitive data로 논리적으로 재구성함","translation":"민감한 데이터 노출과 관련된 상당한 위험으로 이어진다"},{"text":"create major concerns regarding the protection of individuals' information","isCorrect":true,"optionType":"correct","explanation":"올바름: give rise to를 create로, privacy risks를 concerns regarding protection of individuals' information으로 구체화하여 의미 확장 paraphrasing","translation":"개인 정보 보호에 관한 중대한 우려를 만들어낸다"},{"text":"effectively eliminate concerns about users' personal information","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: give rise to는 문제 발생을 의미하나, eliminate(제거)로 인과 방향을 완전히 역전시켜 의미를 왜곡함","translation":"사용자 개인 정보에 대한 우려를 효과적으로 제거한다"}],"sourceQuestion":"1번 지문"},{"keyExpression":"we did not yet have the tools we now possess","passage":"No, it only means that at the time we did not yet have the tools we now possess to help enable vehicles to operate both autonomously and safely.","passageTranslation":"아니다, 그것은 단지 당시에 우리가 차량이 자율적이면서도 안전하게 작동할 수 있도록 돕는 지금 우리가 보유한 도구들을 아직 갖추지 못했음을 의미할 뿐이다.","qType":"correct","questionText":"'we did not yet have the tools we now possess'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"we deliberately chose not to use the tools already available","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: 도구의 부재(did not yet have)를 의도적인 사용 거부(deliberately chose not to use)로 대체해 원인을 능력 부재에서 의지 결여로 왜곡함","translation":"우리는 이미 이용 가능한 도구를 의도적으로 사용하지 않기로 선택했다"},{"text":"the tools we had then were superior to what we have now","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: 과거의 도구 부재를 과거 도구가 현재보다 우월했다는 의미로 역전시켜 기술 발전의 방향성을 완전히 왜곡함","translation":"당시 우리가 보유했던 도구가 지금 우리가 가진 것보다 우수했다"},{"text":"the necessary resources were unavailable to us at that time","isCorrect":true,"optionType":"correct","explanation":"올바름: did not yet have the tools를 were unavailable to us at that time으로, tools를 necessary resources로 변환해 시간적 한계와 수단의 부재를 유지함","translation":"필요한 자원이 당시 우리에게 이용 가능하지 않았다"}],"sourceQuestion":"2번 지문"},{"keyExpression":"entirely overlooked in discussions of high-speed society","passage":"Potentially, therefore, it has huge implications for the management of time in everyday life, yet it is entirely overlooked in discussions of high-speed society.","passageTranslation":"따라서 잠재적으로 이것은 일상생활에서 시간 관리에 막대한 함의를 지니고 있지만, 고속 사회에 대한 논의에서는 완전히 간과되고 있다.","qType":"incorrect","questionText":"'entirely overlooked in discussions of high-speed society'을(를) 잘못 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"absent from academic and public debate on accelerating social change","isCorrect":false,"optionType":"correct","explanation":"올바름: 'overlooked in discussions'를 'absent from debate'로, 'high-speed society'를 'accelerating social change'로 추상적으로 재구성하여 의미 유지","translation":"가속화하는 사회 변화에 관한 학문적·공공 토론에서 빠져 있는"},{"text":"given no attention in analyses of how modern society operates rapidly","isCorrect":false,"optionType":"correct","explanation":"올바름: 'overlooked'를 'given no attention'으로, 'high-speed society'의 속성을 'how modern society operates rapidly'로 풀어 의미 재구성","translation":"현대 사회가 빠르게 작동하는 방식에 관한 분석에서 전혀 주목받지 못하는"},{"text":"completely ignored when people talk about the fast pace of modern life","isCorrect":false,"optionType":"correct","explanation":"올바름: 'entirely overlooked'를 'completely ignored'로, 'discussions of high-speed society'를 'when people talk about the fast pace of modern life'로 구체화하여 의미 보존","translation":"현대 생활의 빠른 속도에 대해 이야기할 때 완전히 무시되는"},{"text":"critically examined and disputed in current sociological literature","isCorrect":true,"optionType":"incorrect","explanation":"잘못됨: 'overlooked'(무시됨)와 달리 'critically examined and disputed'(비판적으로 검토·논쟁됨)는 오히려 주목받고 있음을 의미하므로 반의 관계","translation":"현재 사회학 문헌에서 비판적으로 검토되고 논쟁되는"}],"sourceQuestion":"3번 지문"},{"keyExpression":"entirely overlooked in discussions of high-speed society","passage":"Potentially, therefore, it has huge implications for the management of time in everyday life, yet it is entirely overlooked in discussions of high-speed society.","passageTranslation":"따라서 잠재적으로 이것은 일상생활에서 시간 관리에 막대한 함의를 지니고 있지만, 고속 사회에 대한 논의에서는 완전히 간과되고 있다.","qType":"incorrect","questionText":"'entirely overlooked in discussions of high-speed society'을(를) 잘못 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"completely ignored when people talk about the fast pace of modern life","isCorrect":false,"optionType":"correct","explanation":"올바름: 'entirely overlooked'를 'completely ignored'로, 'discussions of high-speed society'를 'when people talk about the fast pace of modern life'로 구체화하여 의미 보존","translation":"현대 생활의 빠른 속도에 대해 이야기할 때 완전히 무시되는"},{"text":"absent from academic and public debate on accelerating social change","isCorrect":false,"optionType":"correct","explanation":"올바름: 'overlooked in discussions'를 'absent from debate'로, 'high-speed society'를 'accelerating social change'로 추상적으로 재구성하여 의미 유지","translation":"가속화하는 사회 변화에 관한 학문적·공공 토론에서 빠져 있는"},{"text":"frequently cited as a key example in studies of contemporary speed culture","isCorrect":true,"optionType":"incorrect","explanation":"잘못됨: 'entirely overlooked'(완전히 간과)를 'frequently cited as a key example'(핵심 사례로 자주 인용)로 정반대 의미로 역전","translation":"현대 속도 문화 연구에서 핵심 사례로 자주 인용되는"},{"text":"given no attention in analyses of how modern society operates rapidly","isCorrect":false,"optionType":"correct","explanation":"올바름: 'overlooked'를 'given no attention'으로, 'high-speed society'의 속성을 'how modern society operates rapidly'로 풀어 의미 재구성","translation":"현대 사회가 빠르게 작동하는 방식에 관한 분석에서 전혀 주목받지 못하는"}],"sourceQuestion":"3번 지문"},{"keyExpression":"far more convenient than traditional payment methods","passage":"Supporters of facial recognition payments say that pay-by-face systems are far more convenient than traditional payment methods. Customers do not need to carry cash, cards, or even smartphones to complete a transaction.","passageTranslation":"안면 인식 결제 지지자들은 페이-바이-페이스 시스템이 전통적인 결제 방법보다 훨씬 더 편리하다고 말한다. 고객들은 거래를 완료하기 위해 현금, 카드, 심지어 스마트폰도 가지고 다닐 필요가 없다.","qType":"correct","questionText":"'far more convenient than traditional payment methods'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"considerably more practical compared to existing payment approaches","isCorrect":true,"optionType":"correct","explanation":"올바름: far more→considerably more, convenient→practical, traditional→existing으로 전환하며 비교 우위 관계를 그대로 유지함","translation":"기존 결제 방식에 비해 상당히 더 실용적이다"},{"text":"slightly less reliable than conventional banking and payment systems","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: far more convenient(훨씬 더 편리)를 slightly less reliable(약간 덜 신뢰할 수 있는)로 바꾸어 비교 방향과 평가 기준을 모두 왜곡함","translation":"기존 은행 및 결제 시스템보다 약간 덜 신뢰할 수 있다"},{"text":"equally as efficient as modern digital payment alternatives","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: far more(훨씬 더 우월)라는 명확한 비교 우위를 equally as(동등)로 바꾸어 비교 우위 함의를 제거함","translation":"현대 디지털 결제 대안들과 동등하게 효율적이다"},{"text":"much simpler and more user-friendly than older methods of transaction","isCorrect":true,"optionType":"correct","explanation":"올바름: convenient를 simpler and user-friendly로 의미 확장하고 traditional payment methods를 older methods of transaction으로 paraphrasing하여 비교 구조 보존","translation":"기존 거래 방식보다 훨씬 더 간단하고 사용자 친화적이다"}],"sourceQuestion":"1번 지문"},{"keyExpression":"the spread of germs can be greatly reduced","passage":"Because users do not need to touch screens, keypads, cash, or coins, the spread of germs can be greatly reduced. Supporters see this as especially beneficial in public spaces and during disease outbreaks.","passageTranslation":"사용자들이 화면, 키패드, 현금 또는 동전을 만질 필요가 없기 때문에, 세균의 확산이 크게 줄어들 수 있다. 지지자들은 이것이 공공장소와 질병 발생 시기에 특히 유익하다고 본다.","qType":"correct","questionText":"'the spread of germs can be greatly reduced'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"the number of bacteria present in public spaces will increase rapidly","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: reduced(감소)를 increase(증가)로 역전시키고, 결제 행위와의 인과관계를 삭제하여 의미를 왜곡함","translation":"공공장소에 존재하는 세균의 수가 빠르게 증가할 것이다"},{"text":"germs can be completely eliminated from all payment environments","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: greatly reduced는 부분적 감소를 의미하나, completely eliminated로 과장하여 전면 제거의 의미로 왜곡함","translation":"모든 결제 환경에서 세균이 완전히 제거될 수 있다"},{"text":"the transmission of bacteria and viruses can be significantly minimized","isCorrect":true,"optionType":"correct","explanation":"올바름: germs→bacteria and viruses, spread→transmission, greatly→significantly로 각 요소를 의미 보존하며 대응 전환함","translation":"세균과 바이러스의 전파가 상당히 최소화될 수 있다"}],"sourceQuestion":"1번 지문"},{"keyExpression":"we did not yet have the tools we now possess","passage":"No, it only means that at the time we did not yet have the tools we now possess to help enable vehicles to operate both autonomously and safely.","passageTranslation":"아니다, 그것은 단지 당시에 우리가 차량이 자율적이면서도 안전하게 작동할 수 있도록 돕는 지금 우리가 보유한 도구들을 아직 갖추지 못했음을 의미할 뿐이다.","qType":"incorrect","questionText":"'we did not yet have the tools we now possess'을(를) 잘못 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"we deliberately chose not to use the tools already available","isCorrect":true,"optionType":"incorrect","explanation":"잘못됨: 도구의 부재(did not yet have)를 의도적인 사용 거부(deliberately chose not to use)로 대체해 원인을 능력 부재에서 의지 결여로 왜곡함","translation":"우리는 이미 이용 가능한 도구를 의도적으로 사용하지 않기로 선택했다"},{"text":"we lacked the capabilities that exist in the present day","isCorrect":false,"optionType":"correct","explanation":"올바름: did not yet have를 lacked로, tools we now possess를 capabilities that exist in the present day로 바꿔 과거의 기술적 부재와 현재와의 대비를 유지함","translation":"우리는 현재 존재하는 능력이 부족했다"},{"text":"the necessary resources were unavailable to us at that time","isCorrect":false,"optionType":"correct","explanation":"올바름: did not yet have the tools를 were unavailable to us at that time으로, tools를 necessary resources로 변환해 시간적 한계와 수단의 부재를 유지함","translation":"필요한 자원이 당시 우리에게 이용 가능하지 않았다"},{"text":"the technology required for the task had not yet been developed","isCorrect":false,"optionType":"correct","explanation":"올바름: tools를 technology required로, did not yet have를 had not yet been developed로 바꾸어 당시 기술적 부재를 구체적으로 재표현함","translation":"그 과제에 필요한 기술이 아직 개발되지 않았었다"}],"sourceQuestion":"2번 지문"},{"keyExpression":"this technique alone will not produce changes","passage":"Although this technique alone will not produce changes, when used alongside other behavior modification tactics and coping strategies, behavioral changes have proved effective for some people.","passageTranslation":"비록 이 기법만으로는 변화를 만들어내지 못하지만, 다른 행동 수정 전술 및 대처 전략과 함께 사용될 때 행동 변화는 일부 사람들에게 효과적인 것으로 입증되었다.","qType":"incorrect","questionText":"'this technique alone will not produce changes'을(를) 잘못 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"the technique gradually produces change without any additional support","isCorrect":true,"optionType":"incorrect","explanation":"잘못됨: 원문은 단독으로는 변화를 만들지 못한다고 하는데, without any additional support(추가 지원 없이도)로 단독 효과를 긍정하여 의미 왜곡","translation":"이 기법은 어떤 추가적 지원 없이도 점차적으로 변화를 만들어낸다"},{"text":"the method on its own cannot generate meaningful results","isCorrect":false,"optionType":"correct","explanation":"올바름: this technique alone→the method on its own, will not produce changes→cannot generate meaningful results으로 의미와 부정 함의 모두 보존","translation":"이 방법 자체만으로는 의미 있는 결과를 낼 수 없다"},{"text":"relying solely on this approach yields no significant behavioral shift","isCorrect":false,"optionType":"correct","explanation":"올바름: this technique alone→relying solely on this approach, produce changes→yields significant behavioral shift, will not→no로 부정 의미 유지","translation":"이 접근법에만 의존하는 것은 어떠한 유의미한 행동 변화도 가져오지 않는다"},{"text":"mental imagery by itself is insufficient to bring about transformation","isCorrect":false,"optionType":"correct","explanation":"올바름: this technique alone→mental imagery by itself, will not produce changes→insufficient to bring about transformation으로 부정 논리 유지","translation":"심상화 자체만으로는 변화를 가져오기에 충분하지 않다"},{"text":"this technique is the most effective standalone method for behavior change","isCorrect":true,"optionType":"incorrect","explanation":"잘못됨: 원문의 alone will not produce changes(단독으로는 변화를 만들지 못한다)를 most effective standalone method(가장 효과적인 단독 방법)로 완전히 역전","translation":"이 기법은 행동 변화를 위한 가장 효과적인 단독 방법이다"}],"sourceQuestion":"4번 지문"},{"keyExpression":"unless parental practices are adjusted","passage":"In consequence, adolescents might pull away from, rather than turn toward, their parents in times of emotional crisis, unless parental practices are adjusted.","passageTranslation":"그 결과, 부모의 양육 방식이 조정되지 않는다면, 청소년들은 감정적 위기 상황에서 부모에게 의지하기보다는 오히려 멀어질 수 있다.","qType":"incorrect","questionText":"'unless parental practices are adjusted'을(를) 잘못 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"because parental guidance methods have already been successfully updated","isCorrect":true,"optionType":"incorrect","explanation":"잘못됨: unless adjusted(아직 조정 안 됨)를 already been updated(이미 업데이트됨)로 바꾸어 조건이 충족된 상황으로 왜곡하며 인과 구조도 변경","translation":"부모의 지도 방식이 이미 성공적으로 업데이트되었기 때문에"},{"text":"if parents do not modify the way they raise and respond to their children","isCorrect":false,"optionType":"correct","explanation":"올바름: unless → if not, parental practices are adjusted → parents do not modify the way they raise and respond로 조건절을 명시적 행위로 구체화하며 의미 유지","translation":"부모가 자녀를 양육하고 반응하는 방식을 수정하지 않는다면"},{"text":"in the absence of changes to how parents engage with their adolescents","isCorrect":false,"optionType":"correct","explanation":"올바름: unless adjusted → in the absence of changes, parental practices → how parents engage로 전치사구로 구조 변환하며 조건의 의미 보존","translation":"부모가 청소년 자녀와 관계 맺는 방식에 변화가 없는 경우에"},{"text":"provided that parenting strategies remain unchanged and unresponsive to new demands","isCorrect":false,"optionType":"correct","explanation":"올바름: unless adjusted(조정되지 않으면) → provided that strategies remain unchanged로 조건 의미를 보존하며 unresponsive to new demands로 함축 추론 추가","translation":"양육 전략이 변화 없이 새로운 요구에 반응하지 않는 상태로 유지된다면"}],"sourceQuestion":"5번 지문"},{"keyExpression":"transformed a fundamental human experience for vast numbers of infants and mothers","passage":"Here is a simple implement that has transformed a fundamental human experience for vast numbers of infants and mothers, yet it finds no place in our histories of technology.","passageTranslation":"이것은 수많은 영아와 어머니들에게 근본적인 인간 경험을 변화시킨 단순한 도구이지만, 우리의 기술 역사에서는 어떠한 자리도 차지하지 못하고 있다.","qType":"correct","questionText":"'transformed a fundamental human experience for vast numbers of infants and mothers'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"preserved the traditional experience of infant care across all generations","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: 'transformed'(변화시킴)를 'preserved the traditional experience'(전통적 경험을 보존함)로 정반대 의미로 왜곡","translation":"모든 세대에 걸쳐 영아 돌봄의 전통적 경험을 보존한"},{"text":"profoundly changed a basic aspect of life for countless babies and caregivers","isCorrect":true,"optionType":"correct","explanation":"올바름: 'transformed'를 'profoundly changed'로, 'fundamental human experience'를 'basic aspect of life'로, 'vast numbers'를 'countless'로 대응시켜 의미 보존","translation":"수많은 아기들과 돌봄 제공자들에게 삶의 기본적인 측면을 심오하게 변화시킨"},{"text":"brought about significant changes to an essential part of human development for many","isCorrect":true,"optionType":"correct","explanation":"올바름: 'transformed'를 'brought about significant changes to'로, 'fundamental experience'를 'essential part of human development'로 재구성하여 의미 보존","translation":"많은 사람들에게 인간 발달의 필수적인 부분에 중요한 변화를 가져온"},{"text":"radically altered how a core human activity is experienced by millions","isCorrect":true,"optionType":"correct","explanation":"올바름: 'transformed'를 'radically altered'로, 'fundamental human experience'를 'core human activity'로 바꿔 의미 유지","translation":"수백만 명이 핵심적인 인간 활동을 경험하는 방식을 근본적으로 바꾼"},{"text":"created a largely identical experience for mothers across different cultures","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: 원문의 핵심은 '변화(transformation)'인데 '동일한 경험 창출'로 변환의 성격을 제거하고 의미 왜곡","translation":"다양한 문화에 걸쳐 어머니들에게 대체로 동일한 경험을 만들어낸"}],"sourceQuestion":"3번 지문"},{"keyExpression":"This once-distant dream now seems within our reach","passage":"This once-distant dream now seems within our reach.","passageTranslation":"한때 먼 꿈처럼 보였던 이것이 이제는 우리의 손이 닿는 곳에 있는 것 같다.","qType":"correct","questionText":"'This once-distant dream now seems within our reach'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"the dream remains far beyond what current tools can handle","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: within our reach(달성 가능)를 far beyond(여전히 멀다)로 대체해 기술 발전의 성과를 부정하는 반의어 대체임","translation":"그 꿈은 현재 도구들이 감당할 수 있는 것을 훨씬 넘어서 있다"},{"text":"technology has advanced enough to make a former fantasy feasible","isCorrect":true,"optionType":"correct","explanation":"올바름: 기술 진보가 과거의 환상을 실현 가능하게 만들었다는 맥락적 의미를 논리 구조 변환으로 재표현함","translation":"기술이 과거의 환상을 실현 가능하게 만들 만큼 충분히 발전했다"},{"text":"our ambitions have grown too large for practical implementation","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: 긍정적 가능성 전환을 야망이 너무 커서 실용적으로 실현 불가능하다는 부정적 의미로 인과를 역전시킴","translation":"우리의 야망이 너무 커져서 실제 구현이 불가능해졌다"}],"sourceQuestion":"2번 지문"},{"keyExpression":"finds no place in our histories of technology","passage":"Here is a simple implement that has transformed a fundamental human experience for vast numbers of infants and mothers, yet it finds no place in our histories of technology.","passageTranslation":"이것은 수많은 영아와 어머니들에게 근본적인 인간 경험을 변화시킨 단순한 도구이지만, 우리의 기술 역사에서는 어떠한 자리도 차지하지 못하고 있다.","qType":"incorrect","questionText":"'finds no place in our histories of technology'을(를) 잘못 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"is overlooked and absent from the record of human inventions","isCorrect":false,"optionType":"correct","explanation":"올바름: 'finds no place'(자리를 차지하지 못함)를 'absent from the record'로, 'histories of technology'를 'record of human inventions'로 대응시켜 의미 유지","translation":"인류의 발명 기록에서 간과되고 빠져 있다"},{"text":"has been thoroughly documented in recent scientific research papers","isCorrect":true,"optionType":"incorrect","explanation":"잘못됨: 원문은 '역사에서 기록되지 않음'인데 '철저히 문서화됨'으로 인과를 역전","translation":"최근 과학 연구 논문에서 철저하게 기록되어 왔다"},{"text":"occupies a central position in the study of modern technology","isCorrect":true,"optionType":"incorrect","explanation":"잘못됨: 'finds no place'(자리가 없음)를 'occupies a central position'(핵심 자리를 차지함)으로 정반대 의미로 왜곡","translation":"현대 기술 연구에서 핵심적인 위치를 차지하고 있다"},{"text":"is entirely excluded from accounts of technological development","isCorrect":false,"optionType":"correct","explanation":"올바름: 'finds no place in'을 'excluded from'으로, 'histories of technology'를 'accounts of technological development'로 바꿔 의미 보존","translation":"기술 발전에 관한 설명에서 완전히 배제되어 있다"},{"text":"goes unrecognized as a significant technological achievement","isCorrect":false,"optionType":"correct","explanation":"올바름: 'finds no place in histories'의 함축(기술로 인정받지 못함)을 'goes unrecognized as a significant technological achievement'로 풀어냄","translation":"중요한 기술적 성취로 인정받지 못하다"}],"sourceQuestion":"3번 지문"},{"keyExpression":"they may intrude on adolescents' autonomy striving","passage":"Whereas direct soothing and directive guidance of what to do are beneficial for younger children, they may intrude on adolescents' autonomy striving.","passageTranslation":"직접적인 달래기와 무엇을 해야 할지에 대한 지시적 안내는 어린 자녀들에게는 유익하지만, 청소년의 자율성 추구를 침해할 수 있다.","qType":"correct","questionText":"'they may intrude on adolescents' autonomy striving'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"adolescents willingly accept parental direction as a guide for self-regulation","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: intrude on autonomy striving(자율성 침해)와 정반대로 청소년이 부모 지시를 기꺼이 수용한다는 의미로 왜곡","translation":"청소년들은 자기 조절의 지침으로 부모의 지시를 기꺼이 받아들인다"},{"text":"they might encroach upon the adolescent push for greater self-governance","isCorrect":true,"optionType":"correct","explanation":"올바름: intrude → encroach upon, autonomy striving → push for self-governance로 유사 강도의 표현으로 대체하며 원문 논리 구조 유지","translation":"그것들은 더 큰 자기 통치를 위한 청소년의 추구를 침범할 수 있다"},{"text":"they support adolescents in building a stronger sense of personal responsibility","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: intrude on(침해하다) → support(지지하다)로 의미가 정반대로 역전되어 원문의 부정적 결과를 긍정적으로 왜곡","translation":"그것들은 청소년들이 더 강한 개인적 책임감을 형성하는 데 도움을 준다"}],"sourceQuestion":"5번 지문"},{"keyExpression":"bring some appropriate technology to bear","passage":"Today, we are approaching the point where we can begin to bring some appropriate technology to bear in ways that advance our understanding of patients as unique individuals.","passageTranslation":"오늘날 우리는 환자를 고유한 개인으로 이해하는 것을 발전시키는 방식으로 적절한 기술을 활용하기 시작할 수 있는 시점에 가까워지고 있다.","qType":"correct","questionText":"'bring some appropriate technology to bear'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"avoid using any technological intervention in medical treatment","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: 기술의 적극적 적용을 기술적 개입의 회피로 완전히 역전시켜 필자의 핵심 주장을 부정함","translation":"의료 치료에서 어떠한 기술적 개입도 피하다"},{"text":"burden the medical system with unnecessary equipment","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: appropriate(적절한)를 unnecessary(불필요한)로 대체하고 bear를 burden으로 왜곡해 긍정적 함의를 부정적으로 바꿈","translation":"의료 시스템에 불필요한 장비로 부담을 주다"},{"text":"put relevant technological advances into practical use","isCorrect":true,"optionType":"correct","explanation":"올바름: bring to bear의 관용적 의미(실제로 활용하다)를 put into practical use로 재현하고 appropriate를 relevant로 바꿈","translation":"관련 기술적 발전을 실용적으로 활용하다"}],"sourceQuestion":"2번 지문"},{"keyExpression":"their own responses to emotional situations serve as a role model for emotion regulation","passage":"For example, their own responses to emotional situations serve as a role model for emotion regulation, increasing the likelihood that their children will show similar reactions in comparable situations.","passageTranslation":"예를 들어, 감정적 상황에 대한 부모 자신의 반응은 감정 조절의 역할 모델이 되어, 자녀들이 유사한 상황에서 비슷한 반응을 보일 가능성을 높인다.","qType":"incorrect","questionText":"'their own responses to emotional situations serve as a role model for emotion regulation'을(를) 잘못 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"how parents react to emotional events becomes a behavioral template for their children","isCorrect":false,"optionType":"correct","explanation":"올바름: responses to emotional situations → react to emotional events, role model → behavioral template로 추상→구체 전환 성공","translation":"부모가 감정적 사건에 반응하는 방식이 자녀의 행동 틀이 된다"},{"text":"parental reactions in emotionally charged moments set the standard children imitate","isCorrect":false,"optionType":"correct","explanation":"올바름: responses → reactions, serve as a role model → set the standard children imitate로 역할 모델 개념을 모방 행위로 구체화","translation":"감정적으로 격한 순간에서 부모의 반응은 자녀가 모방하는 기준을 설정한다"},{"text":"children spontaneously develop their own unique emotional coping strategies","isCorrect":true,"optionType":"incorrect","explanation":"잘못됨: 부모의 역할 모델 기능을 완전히 삭제하고 자녀가 독자적으로 감정 대처 전략을 개발한다는 반대 의미 생성","translation":"자녀들은 자발적으로 자신만의 고유한 감정 대처 전략을 발달시킨다"},{"text":"the way parents handle emotional moments provides a pattern children tend to follow","isCorrect":false,"optionType":"correct","explanation":"올바름: responses → the way parents handle, role model → pattern children follow로 함축된 모방 관계를 명시적으로 표현","translation":"부모가 감정적인 순간을 다루는 방식은 자녀가 따르는 경향이 있는 패턴을 제공한다"},{"text":"parents actively instruct children on which emotions are acceptable to display","isCorrect":true,"optionType":"incorrect","explanation":"잘못됨: serve as a role model(모범이 됨, 간접적 학습) → actively instruct(직접 지시)로 학습 방식이 암묵적→명시적으로 왜곡","translation":"부모는 어떤 감정을 표현해도 되는지 자녀에게 적극적으로 지시한다"}],"sourceQuestion":"5번 지문"},{"keyExpression":"the key to addressing negative health habits is to change behavior","passage":"For years, many psychologists have held strongly to the belief that the key to addressing negative health habits is to change behavior.","passageTranslation":"수년간 많은 심리학자들은 부정적인 건강 습관을 다루는 핵심이 행동을 바꾸는 것이라는 믿음을 강하게 고수해 왔다.","qType":"correct","questionText":"'the key to addressing negative health habits is to change behavior'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"modifying conduct is central to tackling harmful routines","isCorrect":true,"optionType":"correct","explanation":"올바름: address→tackle, negative health habits→harmful routines, change behavior→modifying conduct으로 동일 논리 구조 유지","translation":"해로운 습관을 다루는 데 있어 행동 수정이 핵심이다"},{"text":"shifting one's mindset alone is sufficient to eliminate bad habits","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: 원문은 behavior(행동) 변화를 강조하는데, mindset(사고방식) 변화로 대체하여 핵심 개념 왜곡","translation":"사고방식의 전환만으로도 나쁜 습관을 없애기에 충분하다"},{"text":"recognizing the cause of negative habits is the first step to recovery","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: 원문의 핵심은 behavior change(행동 변화)인데, 원인 파악(recognizing the cause)으로 대체하여 인과 논리 전환","translation":"부정적 습관의 원인을 인식하는 것이 회복의 첫 단계이다"}],"sourceQuestion":"4번 지문"},{"keyExpression":"consumers could suffer from financial losses due to errors","passage":"Furthermore, consumers could suffer from financial losses due to errors made by such payment systems.","passageTranslation":"더욱이 소비자들은 이러한 결제 시스템이 만들어낸 오류로 인해 금전적 손실을 겪을 수 있다.","qType":"incorrect","questionText":"'consumers could suffer from financial losses due to errors'을(를) 잘못 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"users may experience monetary damage caused by system mistakes","isCorrect":false,"optionType":"correct","explanation":"올바름: consumers→users, suffer from→experience, financial losses→monetary damage, errors→system mistakes로 각 요소를 정확히 대응 전환함","translation":"사용자들이 시스템 실수로 인한 금전적 피해를 겪을 수 있다"},{"text":"customers might face economic harm resulting from technological inaccuracies","isCorrect":false,"optionType":"correct","explanation":"올바름: consumers→customers, financial losses→economic harm, errors→technological inaccuracies로 전환하고 due to→resulting from으로 인과 표현을 유지함","translation":"고객들이 기술적 부정확성으로 인한 경제적 피해에 직면할 수 있다"},{"text":"individuals risk losing money because of faults in the payment system","isCorrect":false,"optionType":"correct","explanation":"올바름: suffer from financial losses를 risk losing money로 paraphrasing하고 errors→faults in the payment system으로 구체화하여 의미 보존함","translation":"개인들이 결제 시스템의 결함으로 인해 돈을 잃을 위험에 처할 수 있다"},{"text":"users receive financial compensation when recognition errors occur","isCorrect":true,"optionType":"incorrect","explanation":"잘못됨: suffer from financial losses(손실 겪음)를 receive financial compensation(보상 받음)으로 의미를 역전시켜 원문의 위험 경고를 혜택으로 왜곡함","translation":"인식 오류가 발생할 때 사용자들이 금전적 보상을 받는다"},{"text":"companies gain financial benefits by correcting system errors quickly","isCorrect":true,"optionType":"incorrect","explanation":"잘못됨: 소비자의 손실을 기업의 이익으로 주체와 결과를 모두 역전시키고, suffer from을 gain으로 바꾸어 의미를 완전히 왜곡함","translation":"기업들이 시스템 오류를 빠르게 수정함으로써 금전적 이익을 얻는다"}],"sourceQuestion":"1번 지문"},{"keyExpression":"overrate the impact of new technologies","passage":"We tend to overrate the impact of new technologies in part because older technologies have become absorbed into the furniture of our lives.","passageTranslation":"우리는 새로운 기술의 영향력을 과대평가하는 경향이 있는데, 이는 부분적으로 오래된 기술들이 우리 삶의 일부에 흡수되었기 때문이다.","qType":"incorrect","questionText":"'overrate the impact of new technologies'을(를) 잘못 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"place too much emphasis on the significance of recent inventions","isCorrect":false,"optionType":"correct","explanation":"올바름: 'overrate'를 'place too much emphasis on'으로, 'new technologies'를 'recent inventions'로 바꿔 의미 유지","translation":"최근 발명품들의 중요성에 지나치게 큰 비중을 두다"},{"text":"exaggerate how much new technologies actually change our lives","isCorrect":false,"optionType":"correct","explanation":"올바름: 'overrate the impact'를 'exaggerate how much ~ change'로 구체적 행위 표현으로 전환","translation":"새로운 기술이 실제로 우리 삶을 얼마나 변화시키는지를 과장하다"},{"text":"assign greater importance to modern innovations than they deserve","isCorrect":false,"optionType":"correct","explanation":"올바름: 'overrate'의 논리 구조(실제보다 높이 평가)를 'assign greater importance than they deserve'로 명확히 재구성","translation":"현대적 혁신에 실제보다 더 큰 중요성을 부여하다"},{"text":"fail to understand how new technologies are developed and produced","isCorrect":true,"optionType":"incorrect","explanation":"잘못됨: 원문은 '영향력을 과대평가함'인데, '기술의 개발 과정을 이해 못 함'으로 주제를 왜곡","translation":"새로운 기술이 어떻게 개발되고 생산되는지 이해하지 못하다"}],"sourceQuestion":"3번 지문"},{"keyExpression":"increasing the likelihood that their children will show similar reactions in comparable situations","passage":"For example, their own responses to emotional situations serve as a role model for emotion regulation, increasing the likelihood that their children will show similar reactions in comparable situations.","passageTranslation":"예를 들어, 감정적 상황에 대한 부모 자신의 반응은 감정 조절의 역할 모델이 되어, 자녀들이 유사한 상황에서 비슷한 반응을 보일 가능성을 높인다.","qType":"incorrect","questionText":"'increasing the likelihood that their children will show similar reactions in comparable situations'을(를) 잘못 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"making it more probable that children mirror parental emotional responses in equivalent contexts","isCorrect":false,"optionType":"correct","explanation":"올바름: similar reactions → mirror parental emotional responses, comparable situations → equivalent contexts로 함축된 모방 관계를 명시화","translation":"동등한 맥락에서 자녀들이 부모의 감정적 반응을 그대로 반영할 가능성을 더 높인다"},{"text":"boosting the chance that children adopt the same emotional patterns when facing like situations","isCorrect":false,"optionType":"correct","explanation":"올바름: increasing → boosting, show similar reactions → adopt the same emotional patterns으로 구체화하며 논리 구조 보존","translation":"유사한 상황에 직면할 때 자녀들이 동일한 감정 패턴을 채택할 가능성을 높인다"},{"text":"raising the probability that children will respond in the same way under similar circumstances","isCorrect":false,"optionType":"correct","explanation":"올바름: increasing the likelihood → raising the probability, comparable situations → similar circumstances로 병렬 대응하며 의미 유지","translation":"유사한 상황에서 자녀들이 같은 방식으로 반응할 가능성을 높인다"},{"text":"reducing the chance that children develop emotional responses different from their parents","isCorrect":true,"optionType":"incorrect","explanation":"잘못됨: 표면적으로는 유사하나 increasing likelihood(가능성 증가)를 reducing chance(가능성 감소)로 반전시켜 논리를 왜곡","translation":"자녀들이 부모와 다른 감정 반응을 발달시킬 가능성을 줄인다"}],"sourceQuestion":"5번 지문"},{"keyExpression":"the spread of germs can be greatly reduced","passage":"Because users do not need to touch screens, keypads, cash, or coins, the spread of germs can be greatly reduced. Supporters see this as especially beneficial in public spaces and during disease outbreaks.","passageTranslation":"사용자들이 화면, 키패드, 현금 또는 동전을 만질 필요가 없기 때문에, 세균의 확산이 크게 줄어들 수 있다. 지지자들은 이것이 공공장소와 질병 발생 시기에 특히 유익하다고 본다.","qType":"incorrect","questionText":"'the spread of germs can be greatly reduced'을(를) 잘못 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"the number of bacteria present in public spaces will increase rapidly","isCorrect":true,"optionType":"incorrect","explanation":"잘못됨: reduced(감소)를 increase(증가)로 역전시키고, 결제 행위와의 인과관계를 삭제하여 의미를 왜곡함","translation":"공공장소에 존재하는 세균의 수가 빠르게 증가할 것이다"},{"text":"the transmission of bacteria and viruses can be significantly minimized","isCorrect":false,"optionType":"correct","explanation":"올바름: germs→bacteria and viruses, spread→transmission, greatly→significantly로 각 요소를 의미 보존하며 대응 전환함","translation":"세균과 바이러스의 전파가 상당히 최소화될 수 있다"},{"text":"the risk of infectious disease spreading can be considerably lowered","isCorrect":false,"optionType":"correct","explanation":"올바름: germs를 infectious disease로 개념 확장하고, spread를 spreading으로, greatly reduced를 considerably lowered로 paraphrasing하여 의미 보존","translation":"전염병 확산 위험이 상당히 낮아질 수 있다"},{"text":"contamination from microorganisms can be substantially decreased","isCorrect":false,"optionType":"correct","explanation":"올바름: germs→microorganisms, spread→contamination(오염·전파), greatly→substantially로 학문적 수준의 어휘로 격상하여 paraphrasing함","translation":"미생물로 인한 오염이 실질적으로 감소할 수 있다"},{"text":"germs can be completely eliminated from all payment environments","isCorrect":true,"optionType":"incorrect","explanation":"잘못됨: greatly reduced는 부분적 감소를 의미하나, completely eliminated로 과장하여 전면 제거의 의미로 왜곡함","translation":"모든 결제 환경에서 세균이 완전히 제거될 수 있다"}],"sourceQuestion":"1번 지문"},{"keyExpression":"Process-addiction behaviors (workaholism, shopaholism, and the like) fall into this category as well","passage":"Process-addiction behaviors (workaholism, shopaholism, and the like) fall into this category as well.","passageTranslation":"과정 중독 행동들(일 중독, 쇼핑 중독 등)도 마찬가지로 이 범주에 속한다.","qType":"correct","questionText":"'Process-addiction behaviors (workaholism, shopaholism, and the like) fall into this category as well'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"habitual excess in activities like work or shopping similarly belongs to this classification","isCorrect":true,"optionType":"correct","explanation":"올바름: process-addiction→habitual excess, fall into this category→belongs to this classification, and the like→similarly로 부연하며 의미 유지","translation":"일이나 쇼핑과 같은 활동에서의 습관적 과잉도 마찬가지로 이 분류에 속한다"},{"text":"workaholism and shopaholism are excluded from behavioral health concerns","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: 원문은 fall into this category(이 범주에 포함된다)인데, excluded from(제외된다)으로 정반대 의미 사용","translation":"일 중독과 쇼핑 중독은 행동 건강 문제에서 제외된다"},{"text":"process addictions are more severe than ingestive habits and require separate treatment","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: 원문은 같은 범주(this category)에 속한다고 하는데, more severe and require separate treatment(더 심각하고 별도 치료 필요)로 분리·서열화하여 의미 왜곡","translation":"과정 중독은 섭취 습관보다 더 심각하여 별도의 치료가 필요하다"},{"text":"behavioral compulsions including excessive work habits are likewise grouped here","isCorrect":true,"optionType":"correct","explanation":"올바름: process-addiction behaviors→behavioral compulsions, workaholism→excessive work habits, as well→likewise으로 병렬 논리 유지","translation":"과도한 업무 습관을 포함한 행동 강박도 마찬가지로 여기에 분류된다"}],"sourceQuestion":"4번 지문"},{"keyExpression":"fail as a result of lighting, aging, or changes in a person's appearance","passage":"Facial recognition technology can sometimes fail as a result of lighting, aging, or changes in a person's appearance. Furthermore, consumers could suffer from financial losses due to errors made by such payment systems.","passageTranslation":"안면 인식 기술은 때때로 조명, 노화, 또는 사람의 외모 변화로 인해 실패할 수 있다. 더욱이 소비자들은 이러한 결제 시스템이 만들어낸 오류로 인해 금전적 손실을 겪을 수 있다.","qType":"incorrect","questionText":"'fail as a result of lighting, aging, or changes in a person's appearance'을(를) 잘못 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"improve its accuracy when users change their hairstyle or clothing","isCorrect":true,"optionType":"incorrect","explanation":"잘못됨: fail(실패)을 improve accuracy(정확도 향상)로 역전시키고, aging/lighting의 핵심 원인들을 hairstyle/clothing으로 대체하여 의미를 이중으로 왜곡함","translation":"사용자가 헤어스타일이나 옷을 바꿀 때 정확도가 향상된다"},{"text":"malfunction due to poor illumination, the ageing process, or altered looks","isCorrect":false,"optionType":"correct","explanation":"올바름: fail→malfunction, as a result of→due to, lighting→illumination, aging→ageing process, changes in appearance→altered looks로 정확히 대응 전환함","translation":"조명 불량, 노화 과정, 또는 외모 변화로 인해 오작동할 수 있다"},{"text":"produce errors because of environmental light conditions, time-related physical changes, or modified facial features","isCorrect":false,"optionType":"correct","explanation":"올바름: fail을 produce errors로, lighting/aging/changes를 각각 구체적 서술로 풀어 세 가지 원인을 충실히 재현함","translation":"환경 조명 조건, 시간 관련 신체 변화, 또는 변형된 얼굴 특징으로 인해 오류를 일으킬 수 있다"},{"text":"operate more efficiently in low-light environments over time","isCorrect":true,"optionType":"incorrect","explanation":"잘못됨: fail을 operate efficiently로 역전시키고, lighting을 실패 원인이 아닌 효율 향상 조건으로 바꾸어 인과 관계를 완전히 왜곡함","translation":"시간이 지남에 따라 저조도 환경에서 더 효율적으로 작동한다"},{"text":"become unreliable when affected by dim light, natural ageing, or shifts in one's physical appearance","isCorrect":false,"optionType":"correct","explanation":"올바름: fail→become unreliable, as a result of→when affected by로 인과를 조건절로 전환하고 세 원인을 자연스럽게 paraphrasing함","translation":"어두운 조명, 자연 노화, 또는 신체적 외모 변화의 영향을 받을 때 신뢰할 수 없게 된다"}],"sourceQuestion":"1번 지문"},{"keyExpression":"especially beneficial in public spaces and during disease outbreaks","passage":"Advocates also claim that facial recognition payments are more hygienic than other payment options. Because users do not need to touch screens, keypads, cash, or coins, the spread of germs can be greatly reduced. Supporters see this as especially beneficial in public spaces and during disease outbreaks.","passageTranslation":"지지자들은 또한 안면 인식 결제가 다른 결제 옵션보다 더 위생적이라고 주장한다. 사용자들이 화면, 키패드, 현금 또는 동전을 만질 필요가 없기 때문에 세균의 확산이 크게 줄어들 수 있다. 지지자들은 이것이 공공장소와 질병 발생 시기에 특히 유익하다고 본다.","qType":"incorrect","questionText":"'especially beneficial in public spaces and during disease outbreaks'을(를) 잘못 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"particularly advantageous in shared environments and times of epidemic spread","isCorrect":false,"optionType":"correct","explanation":"올바름: especially→particularly, beneficial→advantageous, public spaces→shared environments, disease outbreaks→times of epidemic spread로 정확히 대응 전환함","translation":"공유 환경과 전염병 확산 시기에 특히 유리하다"},{"text":"of great value in open public settings and during health crises involving contagion","isCorrect":false,"optionType":"correct","explanation":"올바름: beneficial→of great value, public spaces→open public settings, disease outbreaks→health crises involving contagion으로 함축 의미를 논리적으로 재구성함","translation":"개방된 공공 환경과 전염을 수반하는 건강 위기 시 큰 가치가 있다"},{"text":"only acceptable in private settings where disease transmission is unlikely","isCorrect":true,"optionType":"incorrect","explanation":"잘못됨: public spaces(공공 장소)를 private settings(사적 공간)로 역전시키고, disease outbreaks(발생)를 unlikely(가능성 없음)로 바꾸어 맥락을 왜곡함","translation":"질병 전파 가능성이 낮은 사적 환경에서만 허용 가능하다"},{"text":"most useful in communal areas and when infectious diseases are spreading widely","isCorrect":false,"optionType":"correct","explanation":"올바름: beneficial→useful, public spaces→communal areas로 전환하고 disease outbreaks를 조건절로 풀어 의미를 충실히 재현함","translation":"공동 구역에서, 그리고 전염병이 널리 퍼질 때 가장 유용하다"}],"sourceQuestion":"1번 지문"},{"keyExpression":"this technique alone will not produce changes","passage":"Although this technique alone will not produce changes, when used alongside other behavior modification tactics and coping strategies, behavioral changes have proved effective for some people.","passageTranslation":"비록 이 기법만으로는 변화를 만들어내지 못하지만, 다른 행동 수정 전술 및 대처 전략과 함께 사용될 때 행동 변화는 일부 사람들에게 효과적인 것으로 입증되었다.","qType":"correct","questionText":"'this technique alone will not produce changes'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"relying solely on this approach yields no significant behavioral shift","isCorrect":true,"optionType":"correct","explanation":"올바름: this technique alone→relying solely on this approach, produce changes→yields significant behavioral shift, will not→no로 부정 의미 유지","translation":"이 접근법에만 의존하는 것은 어떠한 유의미한 행동 변화도 가져오지 않는다"},{"text":"this technique is the most effective standalone method for behavior change","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: 원문의 alone will not produce changes(단독으로는 변화를 만들지 못한다)를 most effective standalone method(가장 효과적인 단독 방법)로 완전히 역전","translation":"이 기법은 행동 변화를 위한 가장 효과적인 단독 방법이다"},{"text":"mental imagery by itself is insufficient to bring about transformation","isCorrect":true,"optionType":"correct","explanation":"올바름: this technique alone→mental imagery by itself, will not produce changes→insufficient to bring about transformation으로 부정 논리 유지","translation":"심상화 자체만으로는 변화를 가져오기에 충분하지 않다"},{"text":"the technique gradually produces change without any additional support","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: 원문은 단독으로는 변화를 만들지 못한다고 하는데, without any additional support(추가 지원 없이도)로 단독 효과를 긍정하여 의미 왜곡","translation":"이 기법은 어떤 추가적 지원 없이도 점차적으로 변화를 만들어낸다"},{"text":"the method on its own cannot generate meaningful results","isCorrect":true,"optionType":"correct","explanation":"올바름: this technique alone→the method on its own, will not produce changes→cannot generate meaningful results으로 의미와 부정 함의 모두 보존","translation":"이 방법 자체만으로는 의미 있는 결과를 낼 수 없다"}],"sourceQuestion":"4번 지문"},{"keyExpression":"behavioral changes have proved effective for some people","passage":"Although this technique alone will not produce changes, when used alongside other behavior modification tactics and coping strategies, behavioral changes have proved effective for some people.","passageTranslation":"비록 이 기법만으로는 변화를 만들어내지 못하지만, 다른 행동 수정 전술 및 대처 전략과 함께 사용될 때 행동 변화는 일부 사람들에게 효과적인 것으로 입증되었다.","qType":"correct","questionText":"'behavioral changes have proved effective for some people'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"people who resist behavioral change tend to recover more successfully","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: 원문은 behavioral changes proved effective인데, resist behavioral change(행동 변화에 저항하는 사람)가 더 성공적으로 회복한다고 하여 인과 관계를 완전히 역전","translation":"행동 변화에 저항하는 사람들이 더 성공적으로 회복하는 경향이 있다"},{"text":"altering behavior has been demonstrated to work for a portion of the population","isCorrect":true,"optionType":"correct","explanation":"올바름: behavioral changes→altering behavior, proved effective→demonstrated to work, some people→a portion of the population으로 논리 구조 유지","translation":"행동을 변화시키는 것이 일부 사람들에게 효과가 있는 것으로 입증되었다"},{"text":"behavioral changes have been universally effective across all populations","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: 원문의 some people(일부 사람들)이 universally(보편적으로)·all populations(모든 집단)으로 바뀌어 제한적 효과를 전면적 효과로 과장·왜곡","translation":"행동 변화는 모든 집단에 걸쳐 보편적으로 효과적이었다"},{"text":"modifying one's actions has shown measurable success in certain individuals","isCorrect":true,"optionType":"correct","explanation":"올바름: behavioral changes→modifying one's actions, proved effective→shown measurable success, some people→certain individuals로 의미 보존","translation":"자신의 행동을 수정하는 것은 특정 개인들에게서 측정 가능한 성공을 보여주었다"},{"text":"conduct-based interventions have yielded positive outcomes for select individuals","isCorrect":true,"optionType":"correct","explanation":"올바름: behavioral changes→conduct-based interventions, proved effective→yielded positive outcomes, some people→select individuals로 추상↔구체 전환하며 의미 유지","translation":"행동 기반 개입은 일부 선택된 개인들에게 긍정적인 결과를 가져왔다"}],"sourceQuestion":"4번 지문"},{"keyExpression":"far more convenient than traditional payment methods","passage":"Supporters of facial recognition payments say that pay-by-face systems are far more convenient than traditional payment methods. Customers do not need to carry cash, cards, or even smartphones to complete a transaction.","passageTranslation":"안면 인식 결제 지지자들은 페이-바이-페이스 시스템이 전통적인 결제 방법보다 훨씬 더 편리하다고 말한다. 고객들은 거래를 완료하기 위해 현금, 카드, 심지어 스마트폰도 가지고 다닐 필요가 없다.","qType":"correct","questionText":"'far more convenient than traditional payment methods'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"slightly less reliable than conventional banking and payment systems","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: far more convenient(훨씬 더 편리)를 slightly less reliable(약간 덜 신뢰할 수 있는)로 바꾸어 비교 방향과 평가 기준을 모두 왜곡함","translation":"기존 은행 및 결제 시스템보다 약간 덜 신뢰할 수 있다"},{"text":"equally as efficient as modern digital payment alternatives","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: far more(훨씬 더 우월)라는 명확한 비교 우위를 equally as(동등)로 바꾸어 비교 우위 함의를 제거함","translation":"현대 디지털 결제 대안들과 동등하게 효율적이다"},{"text":"significantly easier to use than conventional ways of paying","isCorrect":true,"optionType":"correct","explanation":"올바름: far more convenient→significantly easier to use, traditional→conventional, payment methods→ways of paying으로 비교급 구조와 의미를 정확히 보존함","translation":"기존의 결제 방식보다 사용하기 훨씬 더 쉽다"}],"sourceQuestion":"1번 지문"},{"keyExpression":"does that mean the entire concept of the self-driving car is not worth pursuing","passage":"Yes, the vehicle would have been able to move forward on its own, but it could not slow down, stop, or turn to avoid barriers. Obviously not ideal. But does that mean the entire concept of the self-driving car is not worth pursuing?","passageTranslation":"그렇다, 그 차량은 스스로 앞으로 나아갈 수 있었겠지만 속도를 줄이거나, 멈추거나, 장애물을 피해 방향을 틀 수 없었을 것이다. 분명히 이상적이지 않다. 하지만 그것이 자율주행 자동차라는 개념 전체가 추구할 가치가 없다는 것을 의미하는가?","qType":"correct","questionText":"'does that mean the entire concept of the self-driving car is not worth pursuing'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"should we abandon the idea of autonomous vehicles altogether","isCorrect":true,"optionType":"correct","explanation":"올바름: not worth pursuing을 abandon altogether로, entire concept을 the idea로 변환해 필자가 반박하려는 논리를 재현함","translation":"자율주행 차량이라는 아이디어를 완전히 포기해야 하는가"},{"text":"should we accelerate investment in self-driving research immediately","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: 추구 가치에 대한 의문(not worth pursuing)을 오히려 즉각적 투자 가속 권고로 역전시켜 논리 구조를 완전히 바꿈","translation":"자율주행 연구에 대한 투자를 즉시 가속화해야 하는가"},{"text":"has self-driving technology already reached its full potential","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: not worth pursuing(추구할 가치 없음)을 already reached full potential(이미 완성됨)로 대체해 부정적 포기 논리를 긍정적 완성으로 왜곡함","translation":"자율주행 기술은 이미 완전한 잠재력에 도달했는가"}],"sourceQuestion":"2번 지문"},{"keyExpression":"the benefits truly outweigh the risks","passage":"However, there are those who question whether the benefits truly outweigh the risks. This has led to debate about whether companies should adopt facial recognition payment systems.","passageTranslation":"그러나 이점이 진정으로 위험을 능가하는지를 의문시하는 사람들이 있다. 이는 기업들이 안면 인식 결제 시스템을 도입해야 하는지에 대한 논쟁으로 이어졌다.","qType":"correct","questionText":"'the benefits truly outweigh the risks'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"the gains are actually greater than the drawbacks","isCorrect":true,"optionType":"correct","explanation":"올바름: benefits→gains, outweigh→greater than, risks→drawbacks로 각 요소를 자연스럽게 paraphrasing하며 의미 보존","translation":"얻는 것이 실제로 단점보다 더 크다"},{"text":"the benefits and risks are roughly equal in significance","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: outweigh는 한쪽의 명확한 우위를 나타내나, roughly equal로 균형 관계로 바꾸어 비교 우위 함의를 삭제함","translation":"이점과 위험은 중요성 면에서 대략 동등하다"},{"text":"the risks clearly surpass the potential benefits","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: 원문은 benefits가 risks를 능가한다는 의미인데, 주어와 목적어 관계를 역전시켜 risks가 benefits를 능가한다고 왜곡함","translation":"위험이 잠재적 이점을 명백히 능가한다"}],"sourceQuestion":"1번 지문"},{"keyExpression":"advance our understanding of patients as unique individuals","passage":"Today, we are approaching the point where we can begin to bring some appropriate technology to bear in ways that advance our understanding of patients as unique individuals.","passageTranslation":"오늘날 우리는 환자를 고유한 개인으로 이해하는 것을 발전시키는 방식으로 적절한 기술을 활용하기 시작할 수 있는 시점에 가까워지고 있다.","qType":"correct","questionText":"'advance our understanding of patients as unique individuals'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"deepen our knowledge of each patient as a distinct person","isCorrect":true,"optionType":"correct","explanation":"올바름: advance를 deepen으로, unique individuals를 distinct person으로 바꾸어 개별 맞춤 의료 이해의 심화를 정확히 재현함","translation":"각 환자를 독특한 개인으로서 이해하는 지식을 심화하다"},{"text":"treat all patients with the same standardized medical protocol","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: unique individuals(고유한 개인)를 부정하고 표준화된 동일한 프로토콜을 적용한다는 반의어 대체로 핵심을 역전시킴","translation":"모든 환자를 동일한 표준화된 의료 프로토콜로 치료하다"},{"text":"improve our ability to recognize the specific needs of every patient","isCorrect":true,"optionType":"correct","explanation":"올바름: unique individuals를 specific needs of every patient로 구체화해 개인 맞춤형 의료의 함의를 유지함","translation":"모든 환자의 구체적인 필요를 인식하는 능력을 향상시키다"},{"text":"reduce the number of patients seen by each doctor per day","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: 이해 심화(advance understanding)와 무관하게 진료 환자 수 감소라는 다른 차원의 개념으로 대체해 의미를 왜곡함","translation":"의사 한 명이 하루에 진료하는 환자 수를 줄이다"}],"sourceQuestion":"2번 지문"},{"keyExpression":"absorbed into the furniture of our lives","passage":"older technologies have become absorbed into the furniture of our lives, so as to be almost invisible.","passageTranslation":"오래된 기술들은 우리 삶의 일부에 흡수되어 거의 눈에 보이지 않을 정도가 되었다.","qType":"correct","questionText":"'absorbed into the furniture of our lives'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"so deeply embedded in daily life that they go unnoticed","isCorrect":true,"optionType":"correct","explanation":"올바름: 'furniture of our lives'의 비유적 의미(일상에 자연스럽게 녹아들어 인식되지 않음)를 구체적으로 풀어냄","translation":"일상생활에 너무 깊이 박혀 눈에 띄지 않게 된"},{"text":"gradually removed from our daily habits and forgotten","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: 'absorbed into'(흡수·통합)를 'removed from'(제거)으로 반전시켜 의미 왜곡","translation":"일상적 습관에서 점차 제거되어 잊혀진"},{"text":"recognized and celebrated as essential parts of modern life","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: 원문은 '인식되지 않음'을 뜻하는데 'recognized and celebrated'로 의미를 정반대로 바꿈","translation":"현대 생활의 필수적 부분으로 인식되고 칭송받는"}],"sourceQuestion":"3번 지문"},{"keyExpression":"absorbed into the furniture of our lives","passage":"older technologies have become absorbed into the furniture of our lives, so as to be almost invisible.","passageTranslation":"오래된 기술들은 우리 삶의 일부에 흡수되어 거의 눈에 보이지 않을 정도가 되었다.","qType":"incorrect","questionText":"'absorbed into the furniture of our lives'을(를) 잘못 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"so deeply embedded in daily life that they go unnoticed","isCorrect":false,"optionType":"correct","explanation":"올바름: 'furniture of our lives'의 비유적 의미(일상에 자연스럽게 녹아들어 인식되지 않음)를 구체적으로 풀어냄","translation":"일상생활에 너무 깊이 박혀 눈에 띄지 않게 된"},{"text":"so familiar and commonplace that we no longer notice their presence","isCorrect":false,"optionType":"correct","explanation":"올바름: 'furniture of our lives'의 함축(익숙하고 당연시되는 것)을 '너무 친숙하고 평범해서 존재를 인식 못 함'으로 재구성","translation":"너무 친숙하고 평범해서 더 이상 그 존재를 알아채지 못하는"},{"text":"recognized and celebrated as essential parts of modern life","isCorrect":true,"optionType":"incorrect","explanation":"잘못됨: 원문은 '인식되지 않음'을 뜻하는데 'recognized and celebrated'로 의미를 정반대로 바꿈","translation":"현대 생활의 필수적 부분으로 인식되고 칭송받는"},{"text":"integrated into everyday routines so thoroughly as to become invisible","isCorrect":false,"optionType":"correct","explanation":"올바름: 'absorbed'와 'invisible'을 모두 반영하여 일상 속에 완전히 통합된 상태를 표현","translation":"일상적 루틴에 철저히 통합되어 보이지 않게 된"}],"sourceQuestion":"3번 지문"},{"keyExpression":"Ingestive habits such as smoking, drinking and various eating behaviors are the most common health concerns targeted for behavioral changes","passage":"Ingestive habits such as smoking, drinking and various eating behaviors are the most common health concerns targeted for behavioral changes.","passageTranslation":"흡연, 음주, 다양한 식습관과 같은 섭취 관련 습관들은 행동 변화의 대상이 되는 가장 흔한 건강 문제들이다.","qType":"correct","questionText":"'Ingestive habits such as smoking, drinking and various eating behaviors are the most common health concerns targeted for behavioral changes'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"behaviors involving substance intake rank among the top priorities for behavior modification programs","isCorrect":true,"optionType":"correct","explanation":"올바름: ingestive habits→substance intake behaviors, most common→top priorities, targeted for behavioral changes→behavior modification programs으로 논리 유지","translation":"물질 섭취를 포함하는 행동들은 행동 수정 프로그램의 최우선 과제 중 하나이다"},{"text":"eating disorders are rarely considered a behavioral health issue","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: 원문은 eating behaviors를 most common health concerns로 제시하는데, rarely considered(거의 간주되지 않는다)로 정반대 의미로 왜곡","translation":"섭식 장애는 행동 건강 문제로 거의 간주되지 않는다"},{"text":"psychological addictions are more dangerous than physical consumption habits","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: 원문은 빈도(most common)를 언급할 뿐 위험성 비교는 없으며, physical vs. psychological 구분을 원문에 없는 방식으로 도입","translation":"심리적 중독은 신체적 섭취 습관보다 더 위험하다"}],"sourceQuestion":"4번 지문"},{"keyExpression":"the key to addressing negative health habits is to change behavior","passage":"For years, many psychologists have held strongly to the belief that the key to addressing negative health habits is to change behavior.","passageTranslation":"수년간 많은 심리학자들은 부정적인 건강 습관을 다루는 핵심이 행동을 바꾸는 것이라는 믿음을 강하게 고수해 왔다.","qType":"correct","questionText":"'the key to addressing negative health habits is to change behavior'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"shifting one's mindset alone is sufficient to eliminate bad habits","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: 원문은 behavior(행동) 변화를 강조하는데, mindset(사고방식) 변화로 대체하여 핵심 개념 왜곡","translation":"사고방식의 전환만으로도 나쁜 습관을 없애기에 충분하다"},{"text":"behavioral adjustment serves as the primary means of overcoming bad health habits","isCorrect":true,"optionType":"correct","explanation":"올바름: change behavior→behavioral adjustment, key→primary means, addressing→overcoming으로 함의 유지","translation":"행동 조정이 나쁜 건강 습관을 극복하는 주된 수단이 된다"},{"text":"recognizing the cause of negative habits is the first step to recovery","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: 원문의 핵심은 behavior change(행동 변화)인데, 원인 파악(recognizing the cause)으로 대체하여 인과 논리 전환","translation":"부정적 습관의 원인을 인식하는 것이 회복의 첫 단계이다"}],"sourceQuestion":"4번 지문"},{"keyExpression":"rolled out services known as pay-by-face","passage":"Recently, banks and fin-tech firms have rolled out services known as pay-by-face, which allow transactions just by scanning the face.","passageTranslation":"최근 은행과 핀테크 기업들은 얼굴을 스캔하는 것만으로 거래를 가능하게 하는 '페이-바이-페이스'라고 알려진 서비스를 출시했다.","qType":"correct","questionText":"'rolled out services known as pay-by-face'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"discontinued face-recognition payment features","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: roll out은 출시·도입인데 discontinued(중단)로 의미를 완전히 역전시킴","translation":"안면 인식 결제 기능을 중단했다"},{"text":"introduced face-scanning payment options to customers","isCorrect":true,"optionType":"correct","explanation":"올바름: roll out은 신규 서비스 출시를 의미하며, 안면 스캔 결제 옵션 도입으로 정확히 paraphrasing됨","translation":"고객들에게 안면 스캔 결제 옵션을 도입했다"},{"text":"tested experimental payment methods in limited regions","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: rolled out은 일반 대중 출시를 의미하나, limited regions의 실험적 테스트로 범위를 축소하여 의미 왜곡","translation":"제한된 지역에서 실험적 결제 방법을 시험했다"},{"text":"launched new payment systems using facial scanning","isCorrect":true,"optionType":"correct","explanation":"올바름: rolled out을 launched로, pay-by-face를 facial scanning payment systems로 대응 전환하여 의미 보존","translation":"안면 스캔을 활용한 새로운 결제 시스템을 출시했다"}],"sourceQuestion":"1번 지문"},{"keyExpression":"far more convenient than traditional payment methods","passage":"Supporters of facial recognition payments say that pay-by-face systems are far more convenient than traditional payment methods. Customers do not need to carry cash, cards, or even smartphones to complete a transaction.","passageTranslation":"안면 인식 결제 지지자들은 페이-바이-페이스 시스템이 전통적인 결제 방법보다 훨씬 더 편리하다고 말한다. 고객들은 거래를 완료하기 위해 현금, 카드, 심지어 스마트폰도 가지고 다닐 필요가 없다.","qType":"incorrect","questionText":"'far more convenient than traditional payment methods'을(를) 잘못 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"significantly easier to use than conventional ways of paying","isCorrect":false,"optionType":"correct","explanation":"올바름: far more convenient→significantly easier to use, traditional→conventional, payment methods→ways of paying으로 비교급 구조와 의미를 정확히 보존함","translation":"기존의 결제 방식보다 사용하기 훨씬 더 쉽다"},{"text":"much simpler and more user-friendly than older methods of transaction","isCorrect":false,"optionType":"correct","explanation":"올바름: convenient를 simpler and user-friendly로 의미 확장하고 traditional payment methods를 older methods of transaction으로 paraphrasing하여 비교 구조 보존","translation":"기존 거래 방식보다 훨씬 더 간단하고 사용자 친화적이다"},{"text":"equally as efficient as modern digital payment alternatives","isCorrect":true,"optionType":"incorrect","explanation":"잘못됨: far more(훨씬 더 우월)라는 명확한 비교 우위를 equally as(동등)로 바꾸어 비교 우위 함의를 제거함","translation":"현대 디지털 결제 대안들과 동등하게 효율적이다"},{"text":"considerably more practical compared to existing payment approaches","isCorrect":false,"optionType":"correct","explanation":"올바름: far more→considerably more, convenient→practical, traditional→existing으로 전환하며 비교 우위 관계를 그대로 유지함","translation":"기존 결제 방식에 비해 상당히 더 실용적이다"},{"text":"slightly less reliable than conventional banking and payment systems","isCorrect":true,"optionType":"incorrect","explanation":"잘못됨: far more convenient(훨씬 더 편리)를 slightly less reliable(약간 덜 신뢰할 수 있는)로 바꾸어 비교 방향과 평가 기준을 모두 왜곡함","translation":"기존 은행 및 결제 시스템보다 약간 덜 신뢰할 수 있다"}],"sourceQuestion":"1번 지문"},{"keyExpression":"advance our understanding of patients as unique individuals","passage":"Today, we are approaching the point where we can begin to bring some appropriate technology to bear in ways that advance our understanding of patients as unique individuals.","passageTranslation":"오늘날 우리는 환자를 고유한 개인으로 이해하는 것을 발전시키는 방식으로 적절한 기술을 활용하기 시작할 수 있는 시점에 가까워지고 있다.","qType":"incorrect","questionText":"'advance our understanding of patients as unique individuals'을(를) 잘못 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"improve our ability to recognize the specific needs of every patient","isCorrect":false,"optionType":"correct","explanation":"올바름: unique individuals를 specific needs of every patient로 구체화해 개인 맞춤형 의료의 함의를 유지함","translation":"모든 환자의 구체적인 필요를 인식하는 능력을 향상시키다"},{"text":"treat all patients with the same standardized medical protocol","isCorrect":true,"optionType":"incorrect","explanation":"잘못됨: unique individuals(고유한 개인)를 부정하고 표준화된 동일한 프로토콜을 적용한다는 반의어 대체로 핵심을 역전시킴","translation":"모든 환자를 동일한 표준화된 의료 프로토콜로 치료하다"},{"text":"move beyond a one-size-fits-all approach to treat each person differently","isCorrect":false,"optionType":"correct","explanation":"올바름: unique individuals라는 표현의 반대 개념(획일적 접근)에서 벗어나는 방향으로 함축 의미를 추론하여 재구성함","translation":"획일적 접근을 넘어 각 사람을 다르게 치료하다"},{"text":"deepen our knowledge of each patient as a distinct person","isCorrect":false,"optionType":"correct","explanation":"올바름: advance를 deepen으로, unique individuals를 distinct person으로 바꾸어 개별 맞춤 의료 이해의 심화를 정확히 재현함","translation":"각 환자를 독특한 개인으로서 이해하는 지식을 심화하다"}],"sourceQuestion":"2번 지문"},{"keyExpression":"increasing the likelihood that their children will show similar reactions in comparable situations","passage":"For example, their own responses to emotional situations serve as a role model for emotion regulation, increasing the likelihood that their children will show similar reactions in comparable situations.","passageTranslation":"예를 들어, 감정적 상황에 대한 부모 자신의 반응은 감정 조절의 역할 모델이 되어, 자녀들이 유사한 상황에서 비슷한 반응을 보일 가능성을 높인다.","qType":"correct","questionText":"'increasing the likelihood that their children will show similar reactions in comparable situations'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"ensuring children will always react identically to their parents in every situation","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: likelihood(확률적 가능성)를 always(항상)로 과잉 일반화하여 확률적 진술을 절대적 사실로 왜곡","translation":"자녀들이 모든 상황에서 항상 부모와 똑같이 반응할 것을 보장한다"},{"text":"raising the probability that children will respond in the same way under similar circumstances","isCorrect":true,"optionType":"correct","explanation":"올바름: increasing the likelihood → raising the probability, comparable situations → similar circumstances로 병렬 대응하며 의미 유지","translation":"유사한 상황에서 자녀들이 같은 방식으로 반응할 가능성을 높인다"},{"text":"reducing the chance that children develop emotional responses different from their parents","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: 표면적으로는 유사하나 increasing likelihood(가능성 증가)를 reducing chance(가능성 감소)로 반전시켜 논리를 왜곡","translation":"자녀들이 부모와 다른 감정 반응을 발달시킬 가능성을 줄인다"}],"sourceQuestion":"5번 지문"},{"keyExpression":"a classic time-shifting device","passage":"This technology might be thought of as a classic time-shifting device, as it enables mothers to exercise more control over the timing of feeding.","passageTranslation":"이 기술은 어머니들이 수유 시간을 더 잘 통제할 수 있게 해준다는 점에서 고전적인 시간 이동 장치로 생각될 수 있다.","qType":"correct","questionText":"'a classic time-shifting device'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"a device that permanently eliminates the need for scheduled routines","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: 'time-shifting'은 일정을 조정하는 것인데, 'eliminates the need for scheduled routines'(정해진 일과의 필요성을 없앰)로 의미 과장·왜곡","translation":"정해진 일과의 필요성을 영구적으로 없애는 기기"},{"text":"a machine designed primarily to speed up the pace of daily tasks","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: 'time-shifting'(시간 이동·조정)을 'speed up'(속도 증가)으로 혼동하여 의미 왜곡","translation":"일상적 작업의 속도를 높이기 위해 주로 설계된 기계"},{"text":"a tool that allows the user to reschedule when a task is performed","isCorrect":true,"optionType":"correct","explanation":"올바름: 'time-shifting'의 핵심 개념(시간을 이동·조정)을 'reschedule when a task is performed'로 구체적 행위로 전환","translation":"작업이 수행되는 시간을 재조정할 수 있게 해주는 도구"}],"sourceQuestion":"3번 지문"},{"keyExpression":"What mental imagery does is reinforce a new desired behavior","passage":"What mental imagery does is reinforce a new desired behavior. Repeated use of images reinforces the desired behavior more strongly over time.","passageTranslation":"심상(心象)이 하는 일은 새롭게 바라는 행동을 강화하는 것이다. 이미지를 반복적으로 사용하면 시간이 지남에 따라 바라는 행동을 더욱 강하게 강화한다.","qType":"correct","questionText":"'What mental imagery does is reinforce a new desired behavior'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"visualization introduces entirely new desires that replace personal goals","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: 원문은 이미 desired(바라는) 행동을 reinforce(강화)하는 것인데, replace personal goals(개인 목표를 대체)로 기존 욕구를 대체하는 것처럼 의미를 왜곡","translation":"심상화는 개인의 목표를 대체하는 전혀 새로운 욕구를 도입한다"},{"text":"mental imagery helps individuals forget their existing negative behaviors","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: 원문은 reinforce a new desired behavior(새로운 바람직한 행동 강화)인데, forget existing negative behaviors(기존 부정적 행동 잊기)로 대상과 작용을 모두 왜곡","translation":"심상화는 개인이 기존의 부정적 행동을 잊도록 돕는다"},{"text":"the function of visualization is to strengthen a target behavior one wishes to adopt","isCorrect":true,"optionType":"correct","explanation":"올바름: mental imagery→visualization, reinforce→strengthen, new desired behavior→target behavior one wishes to adopt로 cleft 구조의 강조 의미 유지","translation":"심상화의 기능은 자신이 받아들이고자 하는 목표 행동을 강화하는 것이다"}],"sourceQuestion":"4번 지문"},{"keyExpression":"specific, refined, and feedback-driven way","passage":"which allows doctors to talk to their patients in a specific, refined, and feedback-driven way that was not even possible a decade ago.","passageTranslation":"이는 의사들이 불과 10년 전에는 가능하지도 않았던 구체적이고 정제되며 피드백 중심의 방식으로 환자들과 대화할 수 있게 해준다.","qType":"correct","questionText":"'specific, refined, and feedback-driven way'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"a personalized and evidence-based style of medical interaction","isCorrect":true,"optionType":"correct","explanation":"올바름: specific+refined를 personalized로, feedback-driven을 evidence-based로 추상화해 맞춤형 근거 기반 의료 소통의 핵심을 유지함","translation":"개인 맞춤적이고 근거 기반의 의료 상호작용 방식"},{"text":"a general and intuitive approach that ignores patient responses","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: specific(구체적)을 general(일반적)로, feedback-driven을 ignores patient responses로 대체해 세 가지 속성을 모두 부정함","translation":"환자 반응을 무시하는 일반적이고 직관적인 접근 방식"},{"text":"a spontaneous and unstructured conversation with minimal preparation","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: refined(정제된)를 unstructured(비구조적)로, specific을 minimal preparation(준비 최소화)으로 대체해 의미를 역전시킴","translation":"준비가 거의 없는 즉흥적이고 비구조적인 대화"}],"sourceQuestion":"2번 지문"},{"keyExpression":"This once-distant dream now seems within our reach","passage":"This once-distant dream now seems within our reach.","passageTranslation":"한때 먼 꿈처럼 보였던 이것이 이제는 우리의 손이 닿는 곳에 있는 것 같다.","qType":"incorrect","questionText":"'This once-distant dream now seems within our reach'을(를) 잘못 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"the dream remains far beyond what current tools can handle","isCorrect":true,"optionType":"incorrect","explanation":"잘못됨: within our reach(달성 가능)를 far beyond(여전히 멀다)로 대체해 기술 발전의 성과를 부정하는 반의어 대체임","translation":"그 꿈은 현재 도구들이 감당할 수 있는 것을 훨씬 넘어서 있다"},{"text":"technology has advanced enough to make a former fantasy feasible","isCorrect":false,"optionType":"correct","explana
