var CONFIG={"title":"2Go_news1_2024.30_stu","passThreshold":80,"showCountHint":false,"questions":[{"keyExpression":"strap a brick to the accelerator","passage":"If you had wanted to create a 'self-driving' car in the 1950s, your best option might have been to strap a brick to the accelerator.","passageTranslation":"만약 1950년대에 '자율주행' 자동차를 만들고 싶었다면, 당신의 최선책은 벽돌을 가속 페달에 묶는 것이었을지도 모른다.","qType":"incorrect","questionText":"'strap a brick to the accelerator'을(를) 잘못 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"use a primitive method that forces motion without any control","isCorrect":false,"optionType":"correct","explanation":"올바름: 브레이크나 방향 제어 없이 전진만 강제하는 원시적 방법을 정확히 묘사함","translation":"통제 없이 움직임만 강제하는 원시적인 방법을 사용하다"},{"text":"develop a fully automated and reliable driving method","isCorrect":true,"optionType":"incorrect","explanation":"잘못됨: 원문의 핵심은 자동화의 실패와 한계인데, 이 표현은 완전 자동화되고 신뢰할 수 있는 방법이라는 의미로 인과를 역전시킴","translation":"완전히 자동화되고 신뢰할 수 있는 운전 방법을 개발하다"},{"text":"apply a crude, uncontrollable fix to make something move","isCorrect":false,"optionType":"correct","explanation":"올바름: 벽돌을 가속 페달에 묶는 행위가 조잡하고 통제 불가능한 해결책을 적용하는 것임을 구체적으로 재현함","translation":"무언가를 움직이게 하기 위해 조잡하고 통제 불가능한 방법을 적용하다"},{"text":"implement a sophisticated system to accelerate safely","isCorrect":true,"optionType":"incorrect","explanation":"잘못됨: 원문은 조잡하고 위험한 방법을 묘사하는데, 이 표현은 정교하고 안전한 시스템을 의미해 정반대 뉘앙스임","translation":"안전하게 가속하기 위한 정교한 시스템을 구현하다"},{"text":"adopt a rough solution that lacks safety and precision","isCorrect":false,"optionType":"correct","explanation":"올바름: 안전성과 정밀성이 결여된 거친 해결책이라는 함의를 정확히 포착함","translation":"안전성과 정밀성이 부족한 거친 해결책을 채택하다"}],"sourceQuestion":"2번 지문"},{"keyExpression":"monitor their conditions in real time","passage":"In fact, many patients are already wearing devices that monitor their conditions in real time, which allows doctors to talk to their patients in a specific, refined, and feedback-driven way.","passageTranslation":"사실, 많은 환자들은 이미 자신의 상태를 실시간으로 모니터링하는 기기를 착용하고 있으며, 이는 의사들이 구체적이고 정제된 피드백 중심의 방식으로 환자들과 대화할 수 있게 해준다.","qType":"correct","questionText":"'monitor their conditions in real time'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"review a patient's medical history only during annual checkups","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: in real time(실시간)을 annual checkups(연간 검진)로 대체해 즉각성을 간헐적 검토로 역전시킴","translation":"연간 검진 때에만 환자의 병력을 검토하다"},{"text":"predict future health risks based on family medical records","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: 현재 상태의 실시간 모니터링을 과거 가족력 기반의 미래 예측으로 대체해 시제와 초점을 왜곡함","translation":"가족 의료 기록을 바탕으로 미래의 건강 위험을 예측하다"},{"text":"track patients' health status continuously as it changes","isCorrect":true,"optionType":"correct","explanation":"올바름: monitor를 track으로, in real time을 continuously as it changes로 바꾸어 즉각적 건강 추적의 의미를 유지함","translation":"환자의 건강 상태가 변화함에 따라 지속적으로 추적하다"}],"sourceQuestion":"2번 지문"},{"keyExpression":"parents remain the primary socialization agents","passage":"Although extra-familial influences, such as peers or media, gain in importance during adolescence, parents remain the primary socialization agents.","passageTranslation":"또래나 미디어 같은 가족 외적 영향이 청소년기에 중요성을 얻더라도, 부모는 여전히 주된 사회화 주체로 남는다.","qType":"correct","questionText":"'parents remain the primary socialization agents'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"peers gradually replace parents as the chief source of emotional guidance","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: parents remain primary → peers replace parents로 인과 역전 및 주체 교체, 지문에서는 또래의 영향력이 커져도 부모가 여전히 주된 역할임을 강조","translation":"또래가 점차 감정 지도의 주요 원천으로서 부모를 대체한다"},{"text":"parents become less central as adolescents gain independence","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: remain(여전히 유지) → become less central(덜 중심적이 됨)으로 의미 반전, 지문의 핵심 논지와 충돌","translation":"청소년이 독립성을 얻으면서 부모는 덜 중심적이 된다"},{"text":"mothers and fathers still hold the central role in guiding emotional and social learning","isCorrect":true,"optionType":"correct","explanation":"올바름: parents → mothers and fathers, primary → central role, socialization agents → guiding emotional and social learning으로 구체화","translation":"어머니와 아버지는 여전히 감정적·사회적 학습을 안내하는 중심 역할을 맡는다"}],"sourceQuestion":"5번 지문"},{"keyExpression":"Process-addiction behaviors (workaholism, shopaholism, and the like) fall into this category as well","passage":"Process-addiction behaviors (workaholism, shopaholism, and the like) fall into this category as well.","passageTranslation":"과정 중독 행동들(일 중독, 쇼핑 중독 등)도 마찬가지로 이 범주에 속한다.","qType":"correct","questionText":"'Process-addiction behaviors (workaholism, shopaholism, and the like) fall into this category as well'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"workaholism and shopaholism are excluded from behavioral health concerns","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: 원문은 fall into this category(이 범주에 포함된다)인데, excluded from(제외된다)으로 정반대 의미 사용","translation":"일 중독과 쇼핑 중독은 행동 건강 문제에서 제외된다"},{"text":"compulsive behavioral patterns such as overworking are also classified under the same group","isCorrect":true,"optionType":"correct","explanation":"올바름: process-addiction behaviors→compulsive behavioral patterns, workaholism→overworking, fall into this category→classified under the same group으로 의미 보존","translation":"과로와 같은 강박적 행동 패턴들도 같은 범주로 분류된다"},{"text":"process addictions are more severe than ingestive habits and require separate treatment","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: 원문은 같은 범주(this category)에 속한다고 하는데, more severe and require separate treatment(더 심각하고 별도 치료 필요)로 분리·서열화하여 의미 왜곡","translation":"과정 중독은 섭취 습관보다 더 심각하여 별도의 치료가 필요하다"}],"sourceQuestion":"4번 지문"},{"keyExpression":"fail as a result of lighting, aging, or changes in a person's appearance","passage":"Facial recognition technology can sometimes fail as a result of lighting, aging, or changes in a person's appearance. Furthermore, consumers could suffer from financial losses due to errors made by such payment systems.","passageTranslation":"안면 인식 기술은 때때로 조명, 노화, 또는 사람의 외모 변화로 인해 실패할 수 있다. 더욱이 소비자들은 이러한 결제 시스템이 만들어낸 오류로 인해 금전적 손실을 겪을 수 있다.","qType":"correct","questionText":"'fail as a result of lighting, aging, or changes in a person's appearance'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"operate more efficiently in low-light environments over time","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: fail을 operate efficiently로 역전시키고, lighting을 실패 원인이 아닌 효율 향상 조건으로 바꾸어 인과 관계를 완전히 왜곡함","translation":"시간이 지남에 따라 저조도 환경에서 더 효율적으로 작동한다"},{"text":"malfunction due to poor illumination, the ageing process, or altered looks","isCorrect":true,"optionType":"correct","explanation":"올바름: fail→malfunction, as a result of→due to, lighting→illumination, aging→ageing process, changes in appearance→altered looks로 정확히 대응 전환함","translation":"조명 불량, 노화 과정, 또는 외모 변화로 인해 오작동할 수 있다"},{"text":"become unreliable when affected by dim light, natural ageing, or shifts in one's physical appearance","isCorrect":true,"optionType":"correct","explanation":"올바름: fail→become unreliable, as a result of→when affected by로 인과를 조건절로 전환하고 세 원인을 자연스럽게 paraphrasing함","translation":"어두운 조명, 자연 노화, 또는 신체적 외모 변화의 영향을 받을 때 신뢰할 수 없게 된다"},{"text":"improve its accuracy when users change their hairstyle or clothing","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: fail(실패)을 improve accuracy(정확도 향상)로 역전시키고, aging/lighting의 핵심 원인들을 hairstyle/clothing으로 대체하여 의미를 이중으로 왜곡함","translation":"사용자가 헤어스타일이나 옷을 바꿀 때 정확도가 향상된다"},{"text":"produce errors because of environmental light conditions, time-related physical changes, or modified facial features","isCorrect":true,"optionType":"correct","explanation":"올바름: fail을 produce errors로, lighting/aging/changes를 각각 구체적 서술로 풀어 세 가지 원인을 충실히 재현함","translation":"환경 조명 조건, 시간 관련 신체 변화, 또는 변형된 얼굴 특징으로 인해 오류를 일으킬 수 있다"}],"sourceQuestion":"1번 지문"},{"keyExpression":"It is much the same story in medicine","passage":"It is much the same story in medicine. Two decades ago, we were still taping bricks to accelerators.","passageTranslation":"의학에서도 이와 매우 유사한 이야기가 펼쳐진다. 20년 전에는 우리는 여전히 가속 페달에 벽돌을 테이프로 붙이고 있었다.","qType":"incorrect","questionText":"'It is much the same story in medicine'을(를) 잘못 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"medicine has undergone a similar trajectory of technological progress","isCorrect":false,"optionType":"correct","explanation":"올바름: 자율주행차 기술 발전과 같은 궤적(trajectory)을 의료 기술도 걸어왔다는 비교 함의를 유지함","translation":"의학도 유사한 기술 진보의 궤적을 걸어왔다"},{"text":"healthcare has followed the same path from limitation to advancement","isCorrect":false,"optionType":"correct","explanation":"올바름: 한계(brick to accelerator 단계)에서 발전으로의 동일한 경로를 의료에 적용한 논리 구조 변환임","translation":"의료 분야도 한계에서 발전으로의 동일한 경로를 따라왔다"},{"text":"medicine has always been ahead of automotive technology","isCorrect":true,"optionType":"incorrect","explanation":"잘못됨: 지문은 두 분야가 유사한 발전 경로를 공유한다고 말하는데, 의료가 항상 앞서 있었다는 것은 비교 관계를 왜곡함","translation":"의학은 항상 자동차 기술보다 앞서 있었다"},{"text":"a parallel pattern of development exists in the medical field","isCorrect":false,"optionType":"correct","explanation":"올바름: much the same story를 parallel pattern으로 변환해 의료 분야에서도 동일한 발전 패턴이 반복됨을 정확히 재현함","translation":"의료 분야에서도 유사한 발전 양상이 존재한다"}],"sourceQuestion":"2번 지문"},{"keyExpression":"we did not yet have the tools we now possess","passage":"No, it only means that at the time we did not yet have the tools we now possess to help enable vehicles to operate both autonomously and safely.","passageTranslation":"아니다, 그것은 단지 당시에 우리가 차량이 자율적이면서도 안전하게 작동할 수 있도록 돕는 지금 우리가 보유한 도구들을 아직 갖추지 못했음을 의미할 뿐이다.","qType":"correct","questionText":"'we did not yet have the tools we now possess'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"the tools we had then were superior to what we have now","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: 과거의 도구 부재를 과거 도구가 현재보다 우월했다는 의미로 역전시켜 기술 발전의 방향성을 완전히 왜곡함","translation":"당시 우리가 보유했던 도구가 지금 우리가 가진 것보다 우수했다"},{"text":"we deliberately chose not to use the tools already available","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: 도구의 부재(did not yet have)를 의도적인 사용 거부(deliberately chose not to use)로 대체해 원인을 능력 부재에서 의지 결여로 왜곡함","translation":"우리는 이미 이용 가능한 도구를 의도적으로 사용하지 않기로 선택했다"},{"text":"we lacked the capabilities that exist in the present day","isCorrect":true,"optionType":"correct","explanation":"올바름: did not yet have를 lacked로, tools we now possess를 capabilities that exist in the present day로 바꿔 과거의 기술적 부재와 현재와의 대비를 유지함","translation":"우리는 현재 존재하는 능력이 부족했다"}],"sourceQuestion":"2번 지문"},{"keyExpression":"absorbed into the furniture of our lives","passage":"older technologies have become absorbed into the furniture of our lives, so as to be almost invisible.","passageTranslation":"오래된 기술들은 우리 삶의 일부에 흡수되어 거의 눈에 보이지 않을 정도가 되었다.","qType":"correct","questionText":"'absorbed into the furniture of our lives'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"recognized and celebrated as essential parts of modern life","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: 원문은 '인식되지 않음'을 뜻하는데 'recognized and celebrated'로 의미를 정반대로 바꿈","translation":"현대 생활의 필수적 부분으로 인식되고 칭송받는"},{"text":"gradually removed from our daily habits and forgotten","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: 'absorbed into'(흡수·통합)를 'removed from'(제거)으로 반전시켜 의미 왜곡","translation":"일상적 습관에서 점차 제거되어 잊혀진"},{"text":"so familiar and commonplace that we no longer notice their presence","isCorrect":true,"optionType":"correct","explanation":"올바름: 'furniture of our lives'의 함축(익숙하고 당연시되는 것)을 '너무 친숙하고 평범해서 존재를 인식 못 함'으로 재구성","translation":"너무 친숙하고 평범해서 더 이상 그 존재를 알아채지 못하는"}],"sourceQuestion":"3번 지문"},{"keyExpression":"when used alongside other behavior modification tactics and coping strategies","passage":"Although this technique alone will not produce changes, when used alongside other behavior modification tactics and coping strategies, behavioral changes have proved effective for some people.","passageTranslation":"비록 이 기법만으로는 변화를 만들어내지 못하지만, 다른 행동 수정 전술 및 대처 전략과 함께 사용될 때 행동 변화는 일부 사람들에게 효과적인 것으로 입증되었다.","qType":"correct","questionText":"'when used alongside other behavior modification tactics and coping strategies'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"when applied together with other strategies aimed at altering habits and handling difficulties","isCorrect":true,"optionType":"correct","explanation":"올바름: alongside→together with, behavior modification tactics→strategies aimed at altering habits, coping strategies→handling difficulties로 구체화하며 의미 유지","translation":"습관 변화와 어려움 극복을 목표로 하는 다른 전략들과 함께 적용될 때"},{"text":"only when it replaces all existing behavioral and coping methods","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: 원문의 alongside(함께)가 replaces(대체한다)로 바뀌어 공존이 아닌 대체의 의미로 논리 역전","translation":"기존의 모든 행동 및 대처 방법을 대체할 때만"},{"text":"before introducing any other form of behavioral intervention","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: 원문은 다른 전략들과 함께 사용하는 것을 의미하는데, before introducing(도입하기 전)으로 순서와 관계를 왜곡","translation":"다른 어떤 행동 개입 형태를 도입하기 전에"}],"sourceQuestion":"4번 지문"},{"keyExpression":"advance our understanding of patients as unique individuals","passage":"Today, we are approaching the point where we can begin to bring some appropriate technology to bear in ways that advance our understanding of patients as unique individuals.","passageTranslation":"오늘날 우리는 환자를 고유한 개인으로 이해하는 것을 발전시키는 방식으로 적절한 기술을 활용하기 시작할 수 있는 시점에 가까워지고 있다.","qType":"correct","questionText":"'advance our understanding of patients as unique individuals'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"move beyond a one-size-fits-all approach to treat each person differently","isCorrect":true,"optionType":"correct","explanation":"올바름: unique individuals라는 표현의 반대 개념(획일적 접근)에서 벗어나는 방향으로 함축 의미를 추론하여 재구성함","translation":"획일적 접근을 넘어 각 사람을 다르게 치료하다"},{"text":"reduce the number of patients seen by each doctor per day","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: 이해 심화(advance understanding)와 무관하게 진료 환자 수 감소라는 다른 차원의 개념으로 대체해 의미를 왜곡함","translation":"의사 한 명이 하루에 진료하는 환자 수를 줄이다"},{"text":"treat all patients with the same standardized medical protocol","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: unique individuals(고유한 개인)를 부정하고 표준화된 동일한 프로토콜을 적용한다는 반의어 대체로 핵심을 역전시킴","translation":"모든 환자를 동일한 표준화된 의료 프로토콜로 치료하다"}],"sourceQuestion":"2번 지문"},{"keyExpression":"plays a foundational role for emotion regulation development","passage":"Emotion socialization — learning from other people about emotions and how to deal with them — starts early in life and plays a foundational role for emotion regulation development.","passageTranslation":"감정 사회화 — 다른 사람들로부터 감정과 감정을 다루는 방법을 배우는 것 — 은 삶의 초기에 시작되며 감정 조절 발달에 근본적인 역할을 한다.","qType":"correct","questionText":"'plays a foundational role for emotion regulation development'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"acts as a critical starting point in shaping one's ability to regulate feelings","isCorrect":true,"optionType":"correct","explanation":"올바름: foundational → critical starting point, emotion regulation development → shaping ability to regulate feelings로 논리 구조 유지","translation":"감정을 조절하는 능력을 형성하는 데 있어 중요한 출발점 역할을 한다"},{"text":"forms the core groundwork for how emotions come to be managed","isCorrect":true,"optionType":"correct","explanation":"올바름: foundational role → core groundwork, emotion regulation → how emotions come to be managed로 추상→구체 전환 성공","translation":"감정이 조절되는 방식의 핵심 기반을 형성한다"},{"text":"gradually diminishes its impact on emotional growth over time","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: foundational role을 시간이 지날수록 줄어드는 영향으로 왜곡하여 지문 내용과 반대 의미 생성","translation":"시간이 지남에 따라 감정 발달에 대한 영향이 점차 줄어든다"},{"text":"has a minor supporting influence on emotional expression skills","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: foundational(근본적) → minor supporting(부수적)으로 역전, regulation(조절) → expression(표현)으로 개념 왜곡","translation":"감정 표현 기술에 사소한 보조적 영향을 미친다"},{"text":"serves as a fundamental basis for developing emotional control","isCorrect":true,"optionType":"correct","explanation":"올바름: foundational role → fundamental basis, emotion regulation development → developing emotional control로 의미 유지하며 구체화","translation":"감정 조절 발달의 근본적인 토대 역할을 한다"}],"sourceQuestion":"5번 지문"},{"keyExpression":"does that mean the entire concept of the self-driving car is not worth pursuing","passage":"Yes, the vehicle would have been able to move forward on its own, but it could not slow down, stop, or turn to avoid barriers. Obviously not ideal. But does that mean the entire concept of the self-driving car is not worth pursuing?","passageTranslation":"그렇다, 그 차량은 스스로 앞으로 나아갈 수 있었겠지만 속도를 줄이거나, 멈추거나, 장애물을 피해 방향을 틀 수 없었을 것이다. 분명히 이상적이지 않다. 하지만 그것이 자율주행 자동차라는 개념 전체가 추구할 가치가 없다는 것을 의미하는가?","qType":"correct","questionText":"'does that mean the entire concept of the self-driving car is not worth pursuing'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"should we accelerate investment in self-driving research immediately","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: 추구 가치에 대한 의문(not worth pursuing)을 오히려 즉각적 투자 가속 권고로 역전시켜 논리 구조를 완전히 바꿈","translation":"자율주행 연구에 대한 투자를 즉시 가속화해야 하는가"},{"text":"does an early failure justify giving up on the goal entirely","isCorrect":true,"optionType":"correct","explanation":"올바름: 지문의 수사의문문 맥락(초기 실패가 개념 자체를 무효화하지 않는다)을 함축 추론으로 재구성함","translation":"초기 실패가 목표를 완전히 포기하는 것을 정당화하는가"},{"text":"is the vision of self-driving technology no longer viable or valuable","isCorrect":true,"optionType":"correct","explanation":"올바름: not worth pursuing을 no longer viable or valuable로, entire concept을 the vision으로 바꾸어 추구 가치 부재를 재표현함","translation":"자율주행 기술의 비전은 더 이상 실현 가능하거나 가치 있지 않은가"},{"text":"has self-driving technology already reached its full potential","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: not worth pursuing(추구할 가치 없음)을 already reached full potential(이미 완성됨)로 대체해 부정적 포기 논리를 긍정적 완성으로 왜곡함","translation":"자율주행 기술은 이미 완전한 잠재력에 도달했는가"}],"sourceQuestion":"2번 지문"},{"keyExpression":"Mental imagery combined with power of suggestion was taken up as the premise of behavioral medicine","passage":"Mental imagery combined with power of suggestion was taken up as the premise of behavioral medicine to help people change negative health behaviors into positive ones.","passageTranslation":"암시의 힘과 결합된 심상(心象)은 사람들이 부정적인 건강 행동을 긍정적인 것으로 바꾸도록 돕기 위한 행동 의학의 전제로 채택되었다.","qType":"correct","questionText":"'Mental imagery combined with power of suggestion was taken up as the premise of behavioral medicine'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"guided imagination and the influence of suggestion formed the underlying principle of behavioral medicine","isCorrect":true,"optionType":"correct","explanation":"올바름: mental imagery→guided imagination, power of suggestion→influence of suggestion, premise→underlying principle으로 추상 개념 재구성","translation":"안내된 상상력과 암시의 영향력이 행동 의학의 기저 원리를 형성했다"},{"text":"the power of suggestion alone was proven sufficient as a medical treatment","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: 원문은 mental imagery와 suggestion의 결합(combined)을 강조하는데, alone(단독으로)을 사용하여 결합의 전제를 부정","translation":"암시의 힘만으로도 의학적 치료로서 충분한 것으로 입증되었다"},{"text":"visualization paired with suggestive influence became the foundation of behavior-based therapy","isCorrect":true,"optionType":"correct","explanation":"올바름: mental imagery→visualization, power of suggestion→suggestive influence, premise→foundation, behavioral medicine→behavior-based therapy로 동일 논리 구조 유지","translation":"암시의 영향력과 결합된 심상화가 행동 기반 치료의 기초가 되었다"},{"text":"behavioral medicine was developed independently of any psychological techniques","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: 원문은 mental imagery와 suggestion이 전제로 채택됐다고 하는데, independently of psychological techniques(심리 기법과 무관하게 발전)로 인과 관계를 완전히 역전","translation":"행동 의학은 어떤 심리적 기법과도 무관하게 독자적으로 발전했다"},{"text":"the use of mental images alongside persuasive suggestion was adopted as the basis of behavioral health practice","isCorrect":true,"optionType":"correct","explanation":"올바름: taken up→adopted, premise→basis, combined with→alongside로 문장 구조를 재배열하면서도 의미 보존","translation":"설득적 암시와 함께 심상(心象)을 사용하는 것이 행동 건강 실천의 근거로 채택되었다"}],"sourceQuestion":"4번 지문"},{"keyExpression":"indirect support of autonomous emotion regulation","passage":"More suitable in adolescence is indirect support of autonomous emotion regulation, such as through interest in, as well as awareness and nonjudgmental acceptance of, adolescents' emotional experiences, and being available when the adolescent wants to talk.","passageTranslation":"청소년기에 더 적합한 것은 자율적 감정 조절의 간접적 지원으로, 예를 들어 청소년의 감정적 경험에 대한 관심, 인식, 비판단적 수용, 그리고 청소년이 이야기하고 싶을 때 곁에 있어주는 것이다.","qType":"correct","questionText":"'indirect support of autonomous emotion regulation'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"structured external control over how adolescents process and express their feelings","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: indirect support → structured external control, autonomous → 외부 통제 받는 존재로 전환하여 자율성을 박탈하는 의미로 왜곡","translation":"청소년들이 감정을 처리하고 표현하는 방식에 대한 체계적인 외부 통제"},{"text":"backing teenagers' self-driven regulation of feelings without imposing direct solutions","isCorrect":true,"optionType":"correct","explanation":"올바름: indirect support → backing without imposing direct solutions, autonomous → self-driven, emotion regulation → regulation of feelings로 행위 수준으로 구체화","translation":"직접적인 해결책을 강요하지 않고 청소년들의 자기 주도적 감정 조절을 지원하는 것"},{"text":"subtle encouragement of self-managed emotional coping without direct control","isCorrect":true,"optionType":"correct","explanation":"올바름: indirect → subtle, autonomous → self-managed, emotion regulation → emotional coping로 추상→구체 전환하며 without direct control로 indirect의 함의를 명시화","translation":"직접적인 통제 없이 스스로 감정 대처를 관리하도록 은근히 격려하는 것"},{"text":"fostering independent emotional management through non-intrusive means","isCorrect":true,"optionType":"correct","explanation":"올바름: support → fostering, autonomous → independent, indirect → non-intrusive means로 삼중 대응하며 논리 구조 유지","translation":"비침습적 방법을 통해 독립적인 감정 관리를 촉진하는 것"},{"text":"direct parental management of teenagers' emotional responses and decision-making","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: indirect(간접적) → direct, autonomous(자율적) → parental management로 이중 반전하여 원문과 정반대 의미 생성","translation":"청소년의 감정 반응과 의사결정에 대한 부모의 직접적인 관리"}],"sourceQuestion":"5번 지문"},{"keyExpression":"bottle feeding allows for someone else to substitute for the mother's time","passage":"It can also function to save time, as bottle feeding allows for someone else to substitute for the mother's time.","passageTranslation":"젖병 수유는 다른 누군가가 어머니의 역할을 대신할 수 있게 해주므로, 시간을 절약하는 기능도 할 수 있다.","qType":"incorrect","questionText":"'bottle feeding allows for someone else to substitute for the mother's time'을(를) 잘못 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"the mother does not have to be the one present at every feeding","isCorrect":false,"optionType":"correct","explanation":"올바름: 'substitute for the mother's time'의 함축(어머니가 직접 있지 않아도 됨)을 직접적으로 표현하여 의미 재구성","translation":"어머니가 매번 수유 시에 직접 있어야 하는 것은 아니다"},{"text":"another person can take over the feeding role on behalf of the mother","isCorrect":false,"optionType":"correct","explanation":"올바름: 'substitute for the mother's time'을 'take over the feeding role on behalf of the mother'로 구체적 행위 표현으로 전환하여 의미 보존","translation":"다른 사람이 어머니를 대신하여 수유 역할을 맡을 수 있다"},{"text":"the mother must always be present to supervise the feeding process","isCorrect":true,"optionType":"incorrect","explanation":"잘못됨: 원문의 '다른 사람이 대체 가능'을 '어머니가 항상 있어야 함'으로 정반대 의미로 역전","translation":"어머니는 수유 과정을 감독하기 위해 항상 직접 있어야 한다"},{"text":"feeding duties can be delegated to a person other than the mother","isCorrect":false,"optionType":"correct","explanation":"올바름: 'substitute for'를 'delegated to'로, 'someone else'를 'a person other than the mother'로 바꿔 의미 유지","translation":"수유 의무가 어머니 외의 다른 사람에게 위임될 수 있다"}],"sourceQuestion":"3번 지문"},{"keyExpression":"Ingestive habits such as smoking, drinking and various eating behaviors are the most common health concerns targeted for behavioral changes","passage":"Ingestive habits such as smoking, drinking and various eating behaviors are the most common health concerns targeted for behavioral changes.","passageTranslation":"흡연, 음주, 다양한 식습관과 같은 섭취 관련 습관들은 행동 변화의 대상이 되는 가장 흔한 건강 문제들이다.","qType":"correct","questionText":"'Ingestive habits such as smoking, drinking and various eating behaviors are the most common health concerns targeted for behavioral changes'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"health professionals most often seek to reform habits centered on what people consume","isCorrect":true,"optionType":"correct","explanation":"올바름: most common health concerns targeted→most often seek to reform, ingestive habits→habits centered on what people consume으로 구체적 재표현","translation":"건강 전문가들은 사람들이 섭취하는 것과 관련된 습관을 가장 자주 개선하려 한다"},{"text":"psychological addictions are more dangerous than physical consumption habits","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: 원문은 빈도(most common)를 언급할 뿐 위험성 비교는 없으며, physical vs. psychological 구분을 원문에 없는 방식으로 도입","translation":"심리적 중독은 신체적 섭취 습관보다 더 위험하다"},{"text":"eating disorders are rarely considered a behavioral health issue","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: 원문은 eating behaviors를 most common health concerns로 제시하는데, rarely considered(거의 간주되지 않는다)로 정반대 의미로 왜곡","translation":"섭식 장애는 행동 건강 문제로 거의 간주되지 않는다"}],"sourceQuestion":"4번 지문"},{"keyExpression":"collect and store sensitive biometric data","passage":"The systems require companies to collect and store sensitive biometric data, such as facial scans. Opponents worry this personal information could be misused, hacked, or shared without proper consent from the users.","passageTranslation":"이 시스템은 기업들이 안면 스캔과 같은 민감한 생체 인식 데이터를 수집하고 저장하도록 요구한다. 반대론자들은 이 개인 정보가 오용되거나, 해킹되거나, 사용자의 적절한 동의 없이 공유될 수 있다고 우려한다.","qType":"correct","questionText":"'collect and store sensitive biometric data'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"gather and retain private physical identification information","isCorrect":true,"optionType":"correct","explanation":"올바름: collect→gather, store→retain, biometric data→physical identification information으로 각 요소를 정확히 대응 전환하여 의미 보존","translation":"민감한 신체적 식별 정보를 수집하고 보유한다"},{"text":"immediately delete all personal biological records after each transaction","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: store(저장·보관)와 정반대인 delete(삭제)를 사용하여 핵심 행위를 역전시킴","translation":"각 거래 후 즉시 모든 개인 생물학적 기록을 삭제한다"},{"text":"anonymize and publicly share users biological information","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: 원문은 민감 데이터를 수집·저장한다는 의미이나, 익명화 후 공개 공유로 바꾸어 보안 우려의 방향을 왜곡함","translation":"사용자의 생물학적 정보를 익명화하여 공개적으로 공유한다"}],"sourceQuestion":"1번 지문"},{"keyExpression":"in part because","passage":"We tend to overrate the impact of new technologies in part because older technologies have become absorbed into the furniture of our lives.","passageTranslation":"우리는 새로운 기술의 영향력을 과대평가하는 경향이 있는데, 이는 부분적으로 오래된 기술들이 우리 삶의 일부에 흡수되었기 때문이다.","qType":"correct","questionText":"'in part because'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"entirely and exclusively because","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: 'in part'(부분적으로)를 'entirely and exclusively'(전적으로·오직)로 바꿔 원인의 범위를 과장하여 의미 변질","translation":"전적으로 그리고 오직 ~이기 때문에"},{"text":"one of the contributing reasons being that","isCorrect":true,"optionType":"correct","explanation":"올바름: 'in part because'의 '부분적 원인' 의미를 'one of the contributing reasons being that'으로 명확히 재구성","translation":"그 이유 중 하나가 ~이기 때문에"},{"text":"despite the fact that","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: 'in part because'(인과·이유)를 'despite'(양보·역접)로 바꿔 논리 관계를 정반대로 왜곡","translation":"~임에도 불구하고"}],"sourceQuestion":"3번 지문"},{"keyExpression":"enables mothers to exercise more control over the timing of feeding","passage":"This technology might be thought of as a classic time-shifting device, as it enables mothers to exercise more control over the timing of feeding.","passageTranslation":"이 기술은 어머니들이 수유 시간을 더 잘 통제할 수 있게 해준다는 점에서 고전적인 시간 이동 장치로 생각될 수 있다.","qType":"incorrect","questionText":"'enables mothers to exercise more control over the timing of feeding'을(를) 잘못 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"forces mothers to follow a strict and predetermined feeding timetable","isCorrect":true,"optionType":"incorrect","explanation":"잘못됨: 'exercise control'(통제권 행사, 즉 자율성)을 'forced to follow a strict timetable'(강제로 따름)으로 인과 및 방향성 역전","translation":"어머니들이 엄격하고 미리 정해진 수유 시간표를 따르도록 강요한다"},{"text":"allows mothers to decide when feeding takes place on their own terms","isCorrect":false,"optionType":"correct","explanation":"올바름: 'exercise control over the timing'을 'decide when ~ takes place on their own terms'로 자율성의 의미를 살려 구체적으로 전환","translation":"어머니들이 자신의 조건에 따라 수유가 언제 이루어질지 결정할 수 있게 한다"},{"text":"empowers mothers to determine the schedule of their infant's meals","isCorrect":false,"optionType":"correct","explanation":"올바름: 'enables'를 'empowers'로, 'control over timing'을 'determine the schedule'로 바꾸어 주체성과 통제의 의미를 유지","translation":"어머니들이 영아의 식사 일정을 스스로 결정할 수 있도록 권한을 부여한다"},{"text":"reduces the overall amount of time mothers spend feeding their infants","isCorrect":true,"optionType":"incorrect","explanation":"잘못됨: 'control over timing'(시간 조정 권한)을 'reduces the amount of time spent'(소요 시간 감소)로 혼동하여 의미 왜곡","translation":"어머니들이 영아를 수유하는 데 쓰는 전체 시간량을 줄인다"},{"text":"gives mothers greater flexibility in managing feeding schedules","isCorrect":false,"optionType":"correct","explanation":"올바름: 'exercise more control over timing'을 'greater flexibility in managing schedules'로 추상↔구체 전환하여 의미 보존","translation":"어머니들에게 수유 일정을 관리하는 데 더 큰 유연성을 부여한다"}],"sourceQuestion":"3번 지문"},{"keyExpression":"collect and store sensitive biometric data","passage":"The systems require companies to collect and store sensitive biometric data, such as facial scans. Opponents worry this personal information could be misused, hacked, or shared without proper consent from the users.","passageTranslation":"이 시스템은 기업들이 안면 스캔과 같은 민감한 생체 인식 데이터를 수집하고 저장하도록 요구한다. 반대론자들은 이 개인 정보가 오용되거나, 해킹되거나, 사용자의 적절한 동의 없이 공유될 수 있다고 우려한다.","qType":"correct","questionText":"'collect and store sensitive biometric data'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"immediately delete all personal biological records after each transaction","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: store(저장·보관)와 정반대인 delete(삭제)를 사용하여 핵심 행위를 역전시킴","translation":"각 거래 후 즉시 모든 개인 생물학적 기록을 삭제한다"},{"text":"save and manage individuals' unique physical characteristics as data","isCorrect":true,"optionType":"correct","explanation":"올바름: biometric의 핵심 의미인 개인 고유의 신체적 특징을 풀어서 논리적으로 paraphrasing하고 저장·관리 행위를 정확히 전달함","translation":"개인의 고유한 신체적 특성을 데이터로 저장하고 관리한다"},{"text":"anonymize and publicly share users biological information","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: 원문은 민감 데이터를 수집·저장한다는 의미이나, 익명화 후 공개 공유로 바꾸어 보안 우려의 방향을 왜곡함","translation":"사용자의 생물학적 정보를 익명화하여 공개적으로 공유한다"},{"text":"accumulate and keep personal biological details such as facial scans","isCorrect":true,"optionType":"correct","explanation":"올바름: collect→accumulate, store→keep, biometric data를 facial scans 예시로 구체화하여 문맥 의미를 충실히 재현함","translation":"안면 스캔과 같은 개인 생물학적 세부 정보를 축적하고 보관한다"}],"sourceQuestion":"1번 지문"},{"keyExpression":"This once-distant dream now seems within our reach","passage":"This once-distant dream now seems within our reach.","passageTranslation":"한때 먼 꿈처럼 보였던 이것이 이제는 우리의 손이 닿는 곳에 있는 것 같다.","qType":"incorrect","questionText":"'This once-distant dream now seems within our reach'을(를) 잘못 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"what was previously unattainable is now nearly achievable","isCorrect":false,"optionType":"correct","explanation":"올바름: once-distant를 previously unattainable로, within our reach를 nearly achievable로 정확히 바꾸어 기술 발전에 의한 가능성 전환을 재현함","translation":"이전에는 달성 불가능했던 것이 이제는 거의 실현 가능해졌다"},{"text":"technology has advanced enough to make a former fantasy feasible","isCorrect":false,"optionType":"correct","explanation":"올바름: 기술 진보가 과거의 환상을 실현 가능하게 만들었다는 맥락적 의미를 논리 구조 변환으로 재표현함","translation":"기술이 과거의 환상을 실현 가능하게 만들 만큼 충분히 발전했다"},{"text":"a goal once thought impossible is now close to being realized","isCorrect":false,"optionType":"correct","explanation":"올바름: 불가능하다고 여겨졌던 목표(자율주행)가 실현에 가까워졌다는 핵심 함의를 유지함","translation":"한때 불가능하다고 생각했던 목표가 이제 실현에 가까워졌다"},{"text":"our ambitions have grown too large for practical implementation","isCorrect":true,"optionType":"incorrect","explanation":"잘못됨: 긍정적 가능성 전환을 야망이 너무 커서 실용적으로 실현 불가능하다는 부정적 의미로 인과를 역전시킴","translation":"우리의 야망이 너무 커져서 실제 구현이 불가능해졌다"}],"sourceQuestion":"2번 지문"},{"keyExpression":"huge implications for the management of time in everyday life","passage":"Potentially, therefore, it has huge implications for the management of time in everyday life, yet it is entirely overlooked in discussions of high-speed society.","passageTranslation":"따라서 잠재적으로 이것은 일상생활에서 시간 관리에 막대한 함의를 지니고 있지만, 고속 사회에 대한 논의에서는 완전히 간과되고 있다.","qType":"incorrect","questionText":"'huge implications for the management of time in everyday life'을(를) 잘못 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"far-reaching consequences for how people organize their daily schedules","isCorrect":false,"optionType":"correct","explanation":"올바름: 'huge implications'를 'far-reaching consequences'로, 'management of time'을 'organize their daily schedules'로 구체화하여 의미 보존","translation":"사람들이 일상 일정을 조직하는 방식에 광범위한 결과를 미치는"},{"text":"significant effects on the way individuals allocate time in their lives","isCorrect":false,"optionType":"correct","explanation":"올바름: 'implications'를 'effects'로, 'management of time'을 'allocate time'으로 바꿔 의미를 자연스럽게 재구성","translation":"개인이 삶에서 시간을 배분하는 방식에 중요한 영향을 미치는"},{"text":"major potential to reshape the structure of time use in ordinary life","isCorrect":false,"optionType":"correct","explanation":"올바름: 'huge implications'의 잠재적 영향력을 'major potential to reshape'으로, 'everyday life'를 'ordinary life'로 바꿔 의미 유지","translation":"일상생활에서 시간 사용 구조를 재편할 큰 잠재력을 지닌"},{"text":"minor and negligible effects on individual time preferences and habits","isCorrect":true,"optionType":"incorrect","explanation":"잘못됨: 'huge implications'(큰 함의)를 'minor and negligible effects'(사소하고 무시할 만한 영향)로 크기와 중요도를 역전","translation":"개인의 시간 선호와 습관에 미미하고 무시할 수 있는 영향"}],"sourceQuestion":"3번 지문"},{"keyExpression":"monitor their conditions in real time","passage":"In fact, many patients are already wearing devices that monitor their conditions in real time, which allows doctors to talk to their patients in a specific, refined, and feedback-driven way.","passageTranslation":"사실, 많은 환자들은 이미 자신의 상태를 실시간으로 모니터링하는 기기를 착용하고 있으며, 이는 의사들이 구체적이고 정제된 피드백 중심의 방식으로 환자들과 대화할 수 있게 해준다.","qType":"correct","questionText":"'monitor their conditions in real time'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"observe and record health data at the moment it occurs","isCorrect":true,"optionType":"correct","explanation":"올바름: in real time의 핵심 의미(발생하는 순간)를 at the moment it occurs로 재표현하고 monitor를 observe and record로 분해함","translation":"건강 데이터가 발생하는 순간에 관찰하고 기록하다"},{"text":"review a patient's medical history only during annual checkups","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: in real time(실시간)을 annual checkups(연간 검진)로 대체해 즉각성을 간헐적 검토로 역전시킴","translation":"연간 검진 때에만 환자의 병력을 검토하다"},{"text":"predict future health risks based on family medical records","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: 현재 상태의 실시간 모니터링을 과거 가족력 기반의 미래 예측으로 대체해 시제와 초점을 왜곡함","translation":"가족 의료 기록을 바탕으로 미래의 건강 위험을 예측하다"}],"sourceQuestion":"2번 지문"},{"keyExpression":"Ingestive habits such as smoking, drinking and various eating behaviors are the most common health concerns targeted for behavioral changes","passage":"Ingestive habits such as smoking, drinking and various eating behaviors are the most common health concerns targeted for behavioral changes.","passageTranslation":"흡연, 음주, 다양한 식습관과 같은 섭취 관련 습관들은 행동 변화의 대상이 되는 가장 흔한 건강 문제들이다.","qType":"correct","questionText":"'Ingestive habits such as smoking, drinking and various eating behaviors are the most common health concerns targeted for behavioral changes'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"psychological addictions are more dangerous than physical consumption habits","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: 원문은 빈도(most common)를 언급할 뿐 위험성 비교는 없으며, physical vs. psychological 구분을 원문에 없는 방식으로 도입","translation":"심리적 중독은 신체적 섭취 습관보다 더 위험하다"},{"text":"consumption-related behaviors are frequent targets of health-focused behavioral interventions","isCorrect":true,"optionType":"correct","explanation":"올바름: ingestive habits→consumption-related behaviors, most common health concerns targeted→frequent targets of health-focused interventions로 추상화하며 의미 유지","translation":"섭취와 관련된 행동들은 건강 중심 행동 개입의 빈번한 대상이다"},{"text":"eating disorders are rarely considered a behavioral health issue","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: 원문은 eating behaviors를 most common health concerns로 제시하는데, rarely considered(거의 간주되지 않는다)로 정반대 의미로 왜곡","translation":"섭식 장애는 행동 건강 문제로 거의 간주되지 않는다"}],"sourceQuestion":"4번 지문"},{"keyExpression":"adolescents might pull away from, rather than turn toward, their parents in times of emotional crisis","passage":"In consequence, adolescents might pull away from, rather than turn toward, their parents in times of emotional crisis, unless parental practices are adjusted.","passageTranslation":"그 결과, 부모의 양육 방식이 조정되지 않는다면, 청소년들은 감정적 위기 상황에서 부모에게 의지하기보다는 오히려 멀어질 수 있다.","qType":"correct","questionText":"'adolescents might pull away from, rather than turn toward, their parents in times of emotional crisis'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"during emotional crises, teenagers seek immediate parental guidance before acting independently","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: pull away(회피)와 반대로 즉각적으로 부모 지침을 먼저 구한다는 의미로 왜곡하여 원문의 논지를 역전","translation":"감정적 위기 동안, 청소년들은 독립적으로 행동하기 전에 즉각적인 부모의 지도를 구한다"},{"text":"teenagers may distance themselves from parents instead of seeking their help during emotional struggles","isCorrect":true,"optionType":"correct","explanation":"올바름: pull away from → distance themselves, turn toward → seeking their help, times of emotional crisis → during emotional struggles로 구체적 행위로 전환하며 대조 구조 유지","translation":"청소년들은 감정적 어려움 동안 부모의 도움을 구하는 대신 부모로부터 멀어질 수 있다"},{"text":"adolescents are more likely to rely on parents for comfort when they face emotional difficulties","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: pull away from(멀어짐) → rely on parents for comfort(부모에게 의지)로 정반대 행동 묘사, 지문의 핵심 조건절(unless 이하)이 충족되지 않은 상황을 묘사하는 원문과 충돌","translation":"청소년들은 감정적 어려움에 직면할 때 위안을 위해 부모에게 더 의존하는 경향이 있다"}],"sourceQuestion":"5번 지문"},{"keyExpression":"collect and store sensitive biometric data","passage":"The systems require companies to collect and store sensitive biometric data, such as facial scans. Opponents worry this personal information could be misused, hacked, or shared without proper consent from the users.","passageTranslation":"이 시스템은 기업들이 안면 스캔과 같은 민감한 생체 인식 데이터를 수집하고 저장하도록 요구한다. 반대론자들은 이 개인 정보가 오용되거나, 해킹되거나, 사용자의 적절한 동의 없이 공유될 수 있다고 우려한다.","qType":"incorrect","questionText":"'collect and store sensitive biometric data'을(를) 잘못 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"save and manage individuals' unique physical characteristics as data","isCorrect":false,"optionType":"correct","explanation":"올바름: biometric의 핵심 의미인 개인 고유의 신체적 특징을 풀어서 논리적으로 paraphrasing하고 저장·관리 행위를 정확히 전달함","translation":"개인의 고유한 신체적 특성을 데이터로 저장하고 관리한다"},{"text":"accumulate and keep personal biological details such as facial scans","isCorrect":false,"optionType":"correct","explanation":"올바름: collect→accumulate, store→keep, biometric data를 facial scans 예시로 구체화하여 문맥 의미를 충실히 재현함","translation":"안면 스캔과 같은 개인 생물학적 세부 정보를 축적하고 보관한다"},{"text":"immediately delete all personal biological records after each transaction","isCorrect":true,"optionType":"incorrect","explanation":"잘못됨: store(저장·보관)와 정반대인 delete(삭제)를 사용하여 핵심 행위를 역전시킴","translation":"각 거래 후 즉시 모든 개인 생물학적 기록을 삭제한다"},{"text":"anonymize and publicly share users biological information","isCorrect":true,"optionType":"incorrect","explanation":"잘못됨: 원문은 민감 데이터를 수집·저장한다는 의미이나, 익명화 후 공개 공유로 바꾸어 보안 우려의 방향을 왜곡함","translation":"사용자의 생물학적 정보를 익명화하여 공개적으로 공유한다"},{"text":"gather and retain private physical identification information","isCorrect":false,"optionType":"correct","explanation":"올바름: collect→gather, store→retain, biometric data→physical identification information으로 각 요소를 정확히 대응 전환하여 의미 보존","translation":"민감한 신체적 식별 정보를 수집하고 보유한다"}],"sourceQuestion":"1번 지문"},{"keyExpression":"advance our understanding of patients as unique individuals","passage":"Today, we are approaching the point where we can begin to bring some appropriate technology to bear in ways that advance our understanding of patients as unique individuals.","passageTranslation":"오늘날 우리는 환자를 고유한 개인으로 이해하는 것을 발전시키는 방식으로 적절한 기술을 활용하기 시작할 수 있는 시점에 가까워지고 있다.","qType":"incorrect","questionText":"'advance our understanding of patients as unique individuals'을(를) 잘못 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"improve our ability to recognize the specific needs of every patient","isCorrect":false,"optionType":"correct","explanation":"올바름: unique individuals를 specific needs of every patient로 구체화해 개인 맞춤형 의료의 함의를 유지함","translation":"모든 환자의 구체적인 필요를 인식하는 능력을 향상시키다"},{"text":"deepen our knowledge of each patient as a distinct person","isCorrect":false,"optionType":"correct","explanation":"올바름: advance를 deepen으로, unique individuals를 distinct person으로 바꾸어 개별 맞춤 의료 이해의 심화를 정확히 재현함","translation":"각 환자를 독특한 개인으로서 이해하는 지식을 심화하다"},{"text":"move beyond a one-size-fits-all approach to treat each person differently","isCorrect":false,"optionType":"correct","explanation":"올바름: unique individuals라는 표현의 반대 개념(획일적 접근)에서 벗어나는 방향으로 함축 의미를 추론하여 재구성함","translation":"획일적 접근을 넘어 각 사람을 다르게 치료하다"},{"text":"reduce the number of patients seen by each doctor per day","isCorrect":true,"optionType":"incorrect","explanation":"잘못됨: 이해 심화(advance understanding)와 무관하게 진료 환자 수 감소라는 다른 차원의 개념으로 대체해 의미를 왜곡함","translation":"의사 한 명이 하루에 진료하는 환자 수를 줄이다"}],"sourceQuestion":"2번 지문"},{"keyExpression":"operate both autonomously and safely","passage":"it could not slow down, stop, or turn to avoid barriers. ... it only means that at the time we did not yet have the tools we now possess to help enable vehicles to operate both autonomously and safely.","passageTranslation":"그것은 속도를 줄이거나, 멈추거나, 장애물을 피해 방향을 틀 수 없었다. ... 그것은 단지 당시에 우리가 차량이 자율적으로 그리고 안전하게 작동할 수 있도록 돕는 지금 우리가 보유한 도구들을 아직 갖추지 못했음을 의미할 뿐이다.","qType":"correct","questionText":"'operate both autonomously and safely'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"prioritize speed over the safety of those on board","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: safely를 무시하고 안전보다 속도를 우선시한다는 반대 의미로 핵심 가치를 왜곡함","translation":"탑승자 안전보다 속도를 우선시하다"},{"text":"move forward only with continuous human supervision","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: 자율성(autonomously)의 핵심인 인간 개입 불필요를 부정하고, 오히려 지속적인 인간 감독이 필요하다고 의미를 역전시킴","translation":"지속적인 인간의 감독 하에서만 앞으로 이동하다"},{"text":"run without human input and without causing harm","isCorrect":true,"optionType":"correct","explanation":"올바름: 자율성(without human input)과 안전성(without causing harm)을 동시에 재표현함","translation":"인간의 개입 없이 그리고 피해를 유발하지 않으면서 작동하다"}],"sourceQuestion":"2번 지문"},{"keyExpression":"direct soothing and directive guidance of what to do are beneficial for younger children","passage":"Whereas direct soothing and directive guidance of what to do are beneficial for younger children, they may intrude on adolescents' autonomy striving.","passageTranslation":"직접적인 달래기와 무엇을 해야 할지에 대한 지시적 안내는 어린 자녀들에게는 유익하지만, 청소년의 자율성 추구를 침해할 수 있다.","qType":"incorrect","questionText":"'direct soothing and directive guidance of what to do are beneficial for younger children'을(를) 잘못 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"giving young children full freedom to manage their emotions without parental intervention","isCorrect":true,"optionType":"incorrect","explanation":"잘못됨: direct soothing and directive guidance(적극적 개입)를 no parental intervention(개입 없음)으로 정반대 의미로 왜곡","translation":"어린 자녀들에게 부모의 개입 없이 감정을 스스로 관리할 완전한 자유를 부여한다"},{"text":"offering immediate comfort and explicit instructions helps younger children effectively","isCorrect":false,"optionType":"correct","explanation":"올바름: direct soothing → immediate comfort, directive guidance of what to do → explicit instructions로 구체화하며 beneficial → helps effectively 유지","translation":"즉각적인 위안과 명확한 지시를 제공하는 것은 어린 자녀들에게 효과적으로 도움이 된다"},{"text":"hands-on reassurance and step-by-step direction suit the needs of young children well","isCorrect":false,"optionType":"correct","explanation":"올바름: direct soothing → hands-on reassurance, directive guidance → step-by-step direction, beneficial → suit the needs well로 논리 구조 보존","translation":"직접적인 안심과 단계별 지도는 어린 자녀들의 필요에 잘 맞는다"},{"text":"calming children directly and telling them exactly what steps to take proves useful at an early age","isCorrect":false,"optionType":"correct","explanation":"올바름: direct soothing → calming directly, directive guidance → telling exactly what steps to take로 행위 수준으로 구체화하며 younger children → at an early age 대응","translation":"자녀를 직접 달래고 취해야 할 단계를 정확히 알려주는 것이 어린 나이에 유용함이 입증된다"}],"sourceQuestion":"5번 지문"},{"keyExpression":"This, more than values and attitudes, is the part of personality that is easiest to change","passage":"This, more than values and attitudes, is the part of personality that is easiest to change.","passageTranslation":"이것(행동)은 가치관이나 태도보다 성격에서 변화시키기 가장 쉬운 부분이다.","qType":"incorrect","questionText":"'This, more than values and attitudes, is the part of personality that is easiest to change'을(를) 잘못 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"values and attitudes are harder to identify than behavioral patterns","isCorrect":true,"optionType":"incorrect","explanation":"잘못됨: 원문은 변화의 용이성(ease of change)을 비교하는데, 식별의 어려움(harder to identify)으로 비교 기준 자체를 왜곡","translation":"가치관과 태도는 행동 패턴보다 식별하기 더 어렵다"},{"text":"conduct proves simpler to alter than deeply held values or attitudes","isCorrect":false,"optionType":"correct","explanation":"올바름: behavior→conduct, easiest to change→simpler to alter, values and attitudes→deeply held values로 함의 강화하며 의미 보존","translation":"행동은 깊이 자리 잡은 가치관이나 태도보다 바꾸기 더 쉬운 것으로 드러난다"},{"text":"behavior is more readily modified than one's values or attitudes","isCorrect":false,"optionType":"correct","explanation":"올바름: easiest to change→more readily modified, more than values and attitudes→보다 쉽게 변한다는 비교 의미 유지","translation":"행동은 가치관이나 태도보다 더 쉽게 수정된다"},{"text":"among personality components, behavior is the most malleable element","isCorrect":false,"optionType":"correct","explanation":"올바름: easiest to change→most malleable, part of personality→personality component로 추상적 개념을 적절히 재표현","translation":"성격 요소들 중에서 행동이 가장 유연하게 변할 수 있는 요소이다"}],"sourceQuestion":"4번 지문"},{"keyExpression":"It is much the same story in medicine","passage":"It is much the same story in medicine. Two decades ago, we were still taping bricks to accelerators.","passageTranslation":"의학에서도 이와 매우 유사한 이야기가 펼쳐진다. 20년 전에는 우리는 여전히 가속 페달에 벽돌을 테이프로 붙이고 있었다.","qType":"incorrect","questionText":"'It is much the same story in medicine'을(를) 잘못 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"the medical field faces entirely different challenges from those in technology","isCorrect":true,"optionType":"incorrect","explanation":"잘못됨: 유사성(much the same)을 완전히 다른 도전(entirely different challenges)으로 대체해 비교 구조를 역전시킴","translation":"의료 분야는 기술 분야와는 전혀 다른 과제에 직면해 있다"},{"text":"healthcare has followed the same path from limitation to advancement","isCorrect":false,"optionType":"correct","explanation":"올바름: 한계(brick to accelerator 단계)에서 발전으로의 동일한 경로를 의료에 적용한 논리 구조 변환임","translation":"의료 분야도 한계에서 발전으로의 동일한 경로를 따라왔다"},{"text":"a parallel pattern of development exists in the medical field","isCorrect":false,"optionType":"correct","explanation":"올바름: much the same story를 parallel pattern으로 변환해 의료 분야에서도 동일한 발전 패턴이 반복됨을 정확히 재현함","translation":"의료 분야에서도 유사한 발전 양상이 존재한다"},{"text":"medicine has undergone a similar trajectory of technological progress","isCorrect":false,"optionType":"correct","explanation":"올바름: 자율주행차 기술 발전과 같은 궤적(trajectory)을 의료 기술도 걸어왔다는 비교 함의를 유지함","translation":"의학도 유사한 기술 진보의 궤적을 걸어왔다"}],"sourceQuestion":"2번 지문"},{"keyExpression":"absorbed into the furniture of our lives","passage":"older technologies have become absorbed into the furniture of our lives, so as to be almost invisible.","passageTranslation":"오래된 기술들은 우리 삶의 일부에 흡수되어 거의 눈에 보이지 않을 정도가 되었다.","qType":"incorrect","questionText":"'absorbed into the furniture of our lives'을(를) 잘못 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"gradually removed from our daily habits and forgotten","isCorrect":true,"optionType":"incorrect","explanation":"잘못됨: 'absorbed into'(흡수·통합)를 'removed from'(제거)으로 반전시켜 의미 왜곡","translation":"일상적 습관에서 점차 제거되어 잊혀진"},{"text":"so deeply embedded in daily life that they go unnoticed","isCorrect":false,"optionType":"correct","explanation":"올바름: 'furniture of our lives'의 비유적 의미(일상에 자연스럽게 녹아들어 인식되지 않음)를 구체적으로 풀어냄","translation":"일상생활에 너무 깊이 박혀 눈에 띄지 않게 된"},{"text":"integrated into everyday routines so thoroughly as to become invisible","isCorrect":false,"optionType":"correct","explanation":"올바름: 'absorbed'와 'invisible'을 모두 반영하여 일상 속에 완전히 통합된 상태를 표현","translation":"일상적 루틴에 철저히 통합되어 보이지 않게 된"},{"text":"so familiar and commonplace that we no longer notice their presence","isCorrect":false,"optionType":"correct","explanation":"올바름: 'furniture of our lives'의 함축(익숙하고 당연시되는 것)을 '너무 친숙하고 평범해서 존재를 인식 못 함'으로 재구성","translation":"너무 친숙하고 평범해서 더 이상 그 존재를 알아채지 못하는"}],"sourceQuestion":"3번 지문"},{"keyExpression":"give rise to serious privacy risks","passage":"In contrast, critics argue that facial recognition payments could give rise to serious privacy risks. The systems require companies to collect and store sensitive biometric data, such as facial scans.","passageTranslation":"반면에, 비평가들은 안면 인식 결제가 심각한 프라이버시 위험을 야기할 수 있다고 주장한다. 이 시스템은 기업들이 안면 스캔과 같은 민감한 생체 인식 데이터를 수집하고 저장하도록 요구한다.","qType":"incorrect","questionText":"'give rise to serious privacy risks'을(를) 잘못 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"gradually reduce the likelihood of data privacy violations","isCorrect":true,"optionType":"incorrect","explanation":"잘못됨: 원문은 위험의 발생을 의미하나, reduce the likelihood로 위험 감소를 나타내어 방향성이 반대로 왜곡됨","translation":"데이터 프라이버시 침해 가능성을 점차 줄인다"},{"text":"effectively eliminate concerns about users' personal information","isCorrect":true,"optionType":"incorrect","explanation":"잘못됨: give rise to는 문제 발생을 의미하나, eliminate(제거)로 인과 방향을 완전히 역전시켜 의미를 왜곡함","translation":"사용자 개인 정보에 대한 우려를 효과적으로 제거한다"},{"text":"lead to considerable dangers involving the exposure of sensitive data","isCorrect":false,"optionType":"correct","explanation":"올바름: give rise to를 lead to로, serious privacy risks를 dangers involving exposure of sensitive data로 논리적으로 재구성함","translation":"민감한 데이터 노출과 관련된 상당한 위험으로 이어진다"},{"text":"create major concerns regarding the protection of individuals' information","isCorrect":false,"optionType":"correct","explanation":"올바름: give rise to를 create로, privacy risks를 concerns regarding protection of individuals' information으로 구체화하여 의미 확장 paraphrasing","translation":"개인 정보 보호에 관한 중대한 우려를 만들어낸다"},{"text":"generate significant threats to personal data security","isCorrect":false,"optionType":"correct","explanation":"올바름: give rise to→generate, privacy risks→threats to personal data security로 전환하여 인과적 생성 관계와 의미를 정확히 보존함","translation":"개인 데이터 보안에 대한 심각한 위협을 야기한다"}],"sourceQuestion":"1번 지문"},{"keyExpression":"plays a foundational role for emotion regulation development","passage":"Emotion socialization — learning from other people about emotions and how to deal with them — starts early in life and plays a foundational role for emotion regulation development.","passageTranslation":"감정 사회화 — 다른 사람들로부터 감정과 감정을 다루는 방법을 배우는 것 — 은 삶의 초기에 시작되며 감정 조절 발달에 근본적인 역할을 한다.","qType":"incorrect","questionText":"'plays a foundational role for emotion regulation development'을(를) 잘못 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"acts as a critical starting point in shaping one's ability to regulate feelings","isCorrect":false,"optionType":"correct","explanation":"올바름: foundational → critical starting point, emotion regulation development → shaping ability to regulate feelings로 논리 구조 유지","translation":"감정을 조절하는 능력을 형성하는 데 있어 중요한 출발점 역할을 한다"},{"text":"has a minor supporting influence on emotional expression skills","isCorrect":true,"optionType":"incorrect","explanation":"잘못됨: foundational(근본적) → minor supporting(부수적)으로 역전, regulation(조절) → expression(표현)으로 개념 왜곡","translation":"감정 표현 기술에 사소한 보조적 영향을 미친다"},{"text":"forms the core groundwork for how emotions come to be managed","isCorrect":false,"optionType":"correct","explanation":"올바름: foundational role → core groundwork, emotion regulation → how emotions come to be managed로 추상→구체 전환 성공","translation":"감정이 조절되는 방식의 핵심 기반을 형성한다"},{"text":"serves as a fundamental basis for developing emotional control","isCorrect":false,"optionType":"correct","explanation":"올바름: foundational role → fundamental basis, emotion regulation development → developing emotional control로 의미 유지하며 구체화","translation":"감정 조절 발달의 근본적인 토대 역할을 한다"},{"text":"gradually diminishes its impact on emotional growth over time","isCorrect":true,"optionType":"incorrect","explanation":"잘못됨: foundational role을 시간이 지날수록 줄어드는 영향으로 왜곡하여 지문 내용과 반대 의미 생성","translation":"시간이 지남에 따라 감정 발달에 대한 영향이 점차 줄어든다"}],"sourceQuestion":"5번 지문"},{"keyExpression":"What mental imagery does is reinforce a new desired behavior","passage":"What mental imagery does is reinforce a new desired behavior. Repeated use of images reinforces the desired behavior more strongly over time.","passageTranslation":"심상(心象)이 하는 일은 새롭게 바라는 행동을 강화하는 것이다. 이미지를 반복적으로 사용하면 시간이 지남에 따라 바라는 행동을 더욱 강하게 강화한다.","qType":"correct","questionText":"'What mental imagery does is reinforce a new desired behavior'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"visualization introduces entirely new desires that replace personal goals","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: 원문은 이미 desired(바라는) 행동을 reinforce(강화)하는 것인데, replace personal goals(개인 목표를 대체)로 기존 욕구를 대체하는 것처럼 의미를 왜곡","translation":"심상화는 개인의 목표를 대체하는 전혀 새로운 욕구를 도입한다"},{"text":"mental imagery helps individuals forget their existing negative behaviors","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: 원문은 reinforce a new desired behavior(새로운 바람직한 행동 강화)인데, forget existing negative behaviors(기존 부정적 행동 잊기)로 대상과 작용을 모두 왜곡","translation":"심상화는 개인이 기존의 부정적 행동을 잊도록 돕는다"},{"text":"the role of imagining outcomes is to solidify newly intended patterns of action","isCorrect":true,"optionType":"correct","explanation":"올바름: mental imagery→imagining outcomes, reinforce→solidify, new desired behavior→newly intended patterns of action으로 추상↔구체 전환하며 논리 유지","translation":"결과를 상상하는 것의 역할은 새롭게 의도된 행동 패턴을 굳히는 것이다"}],"sourceQuestion":"4번 지문"},{"keyExpression":"nonjudgmental acceptance of adolescents' emotional experiences","passage":"More suitable in adolescence is indirect support of autonomous emotion regulation, such as through interest in, as well as awareness and nonjudgmental acceptance of, adolescents' emotional experiences, and being available when the adolescent wants to talk.","passageTranslation":"청소년기에 더 적합한 것은 자율적 감정 조절의 간접적 지원으로, 예를 들어 청소년의 감정적 경험에 대한 관심, 인식, 비판단적 수용, 그리고 청소년이 이야기하고 싶을 때 곁에 있어주는 것이다.","qType":"correct","questionText":"'nonjudgmental acceptance of adolescents' emotional experiences'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"acknowledging what adolescents feel without passing judgment on their emotions","isCorrect":true,"optionType":"correct","explanation":"올바름: acceptance → acknowledging, nonjudgmental → without passing judgment, emotional experiences → what they feel로 행위 수준 구체화 성공","translation":"청소년들의 감정에 판단을 내리지 않고 그들이 느끼는 것을 인정하는 것"},{"text":"evaluating the appropriateness of adolescents' emotional reactions based on social standards","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: nonjudgmental(비판단적) → evaluating based on social standards(사회적 기준으로 평가)로 정반대 태도를 묘사하여 원문의 핵심 개념 왜곡","translation":"사회적 기준을 바탕으로 청소년의 감정 반응의 적절성을 평가하는 것"},{"text":"correcting and redirecting negative emotions to ensure healthy psychological development","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: acceptance(수용) → correcting and redirecting(교정 및 방향 전환)으로 수용적 태도를 개입적·교정적 태도로 대체하여 의미 역전","translation":"건강한 심리적 발달을 보장하기 위해 부정적인 감정을 교정하고 방향을 바꾸는 것"}],"sourceQuestion":"5번 지문"},{"keyExpression":"Ingestive habits such as smoking, drinking and various eating behaviors are the most common health concerns targeted for behavioral changes","passage":"Ingestive habits such as smoking, drinking and various eating behaviors are the most common health concerns targeted for behavioral changes.","passageTranslation":"흡연, 음주, 다양한 식습관과 같은 섭취 관련 습관들은 행동 변화의 대상이 되는 가장 흔한 건강 문제들이다.","qType":"incorrect","questionText":"'Ingestive habits such as smoking, drinking and various eating behaviors are the most common health concerns targeted for behavioral changes'을(를) 잘못 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"consumption-related behaviors are frequent targets of health-focused behavioral interventions","isCorrect":false,"optionType":"correct","explanation":"올바름: ingestive habits→consumption-related behaviors, most common health concerns targeted→frequent targets of health-focused interventions로 추상화하며 의미 유지","translation":"섭취와 관련된 행동들은 건강 중심 행동 개입의 빈번한 대상이다"},{"text":"health professionals most often seek to reform habits centered on what people consume","isCorrect":false,"optionType":"correct","explanation":"올바름: most common health concerns targeted→most often seek to reform, ingestive habits→habits centered on what people consume으로 구체적 재표현","translation":"건강 전문가들은 사람들이 섭취하는 것과 관련된 습관을 가장 자주 개선하려 한다"},{"text":"psychological addictions are more dangerous than physical consumption habits","isCorrect":true,"optionType":"incorrect","explanation":"잘못됨: 원문은 빈도(most common)를 언급할 뿐 위험성 비교는 없으며, physical vs. psychological 구분을 원문에 없는 방식으로 도입","translation":"심리적 중독은 신체적 섭취 습관보다 더 위험하다"},{"text":"behaviors involving substance intake rank among the top priorities for behavior modification programs","isCorrect":false,"optionType":"correct","explanation":"올바름: ingestive habits→substance intake behaviors, most common→top priorities, targeted for behavioral changes→behavior modification programs으로 논리 유지","translation":"물질 섭취를 포함하는 행동들은 행동 수정 프로그램의 최우선 과제 중 하나이다"}],"sourceQuestion":"4번 지문"},{"keyExpression":"operate both autonomously and safely","passage":"it could not slow down, stop, or turn to avoid barriers. ... it only means that at the time we did not yet have the tools we now possess to help enable vehicles to operate both autonomously and safely.","passageTranslation":"그것은 속도를 줄이거나, 멈추거나, 장애물을 피해 방향을 틀 수 없었다. ... 그것은 단지 당시에 우리가 차량이 자율적으로 그리고 안전하게 작동할 수 있도록 돕는 지금 우리가 보유한 도구들을 아직 갖추지 못했음을 의미할 뿐이다.","qType":"incorrect","questionText":"'operate both autonomously and safely'을(를) 잘못 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"move on its own while avoiding danger effectively","isCorrect":false,"optionType":"correct","explanation":"올바름: 자율적 이동(move on its own)과 안전한 운행(avoiding danger effectively)을 병렬로 재구성함","translation":"스스로 이동하면서 위험을 효과적으로 피하다"},{"text":"prioritize speed over the safety of those on board","isCorrect":true,"optionType":"incorrect","explanation":"잘못됨: safely를 무시하고 안전보다 속도를 우선시한다는 반대 의미로 핵심 가치를 왜곡함","translation":"탑승자 안전보다 속도를 우선시하다"},{"text":"function independently while still ensuring passenger protection","isCorrect":false,"optionType":"correct","explanation":"올바름: autonomously를 independently로, safely를 ensuring passenger protection으로 정확히 바꿔 두 조건을 모두 유지함","translation":"독립적으로 기능하면서도 탑승자 안전을 보장하다"},{"text":"run without human input and without causing harm","isCorrect":false,"optionType":"correct","explanation":"올바름: 자율성(without human input)과 안전성(without causing harm)을 동시에 재표현함","translation":"인간의 개입 없이 그리고 피해를 유발하지 않으면서 작동하다"}],"sourceQuestion":"2번 지문"},{"keyExpression":"bring some appropriate technology to bear","passage":"Today, we are approaching the point where we can begin to bring some appropriate technology to bear in ways that advance our understanding of patients as unique individuals.","passageTranslation":"오늘날 우리는 환자를 고유한 개인으로 이해하는 것을 발전시키는 방식으로 적절한 기술을 활용하기 시작할 수 있는 시점에 가까워지고 있다.","qType":"incorrect","questionText":"'bring some appropriate technology to bear'을(를) 잘못 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"avoid using any technological intervention in medical treatment","isCorrect":true,"optionType":"incorrect","explanation":"잘못됨: 기술의 적극적 적용을 기술적 개입의 회피로 완전히 역전시켜 필자의 핵심 주장을 부정함","translation":"의료 치료에서 어떠한 기술적 개입도 피하다"},{"text":"deploy the right tools to make a meaningful difference","isCorrect":false,"optionType":"correct","explanation":"올바름: appropriate technology를 the right tools로, bring to bear를 deploy로 변환해 목적과 수단의 함의를 모두 유지함","translation":"의미 있는 변화를 만들기 위해 적절한 도구를 배치하다"},{"text":"put relevant technological advances into practical use","isCorrect":false,"optionType":"correct","explanation":"올바름: bring to bear의 관용적 의미(실제로 활용하다)를 put into practical use로 재현하고 appropriate를 relevant로 바꿈","translation":"관련 기술적 발전을 실용적으로 활용하다"},{"text":"burden the medical system with unnecessary equipment","isCorrect":true,"optionType":"incorrect","explanation":"잘못됨: appropriate(적절한)를 unnecessary(불필요한)로 대체하고 bear를 burden으로 왜곡해 긍정적 함의를 부정적으로 바꿈","translation":"의료 시스템에 불필요한 장비로 부담을 주다"},{"text":"apply suitable technological tools to address a problem effectively","isCorrect":false,"optionType":"correct","explanation":"올바름: bring to bear는 '효과적으로 적용하다'는 관용 의미이고 appropriate를 suitable로, technology를 technological tools로 정확히 대체함","translation":"문제를 효과적으로 해결하기 위해 적절한 기술 도구를 적용하다"}],"sourceQuestion":"2번 지문"},{"keyExpression":"strap a brick to the accelerator","passage":"If you had wanted to create a 'self-driving' car in the 1950s, your best option might have been to strap a brick to the accelerator.","passageTranslation":"만약 1950년대에 '자율주행' 자동차를 만들고 싶었다면, 당신의 최선책은 벽돌을 가속 페달에 묶는 것이었을지도 모른다.","qType":"correct","questionText":"'strap a brick to the accelerator'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"implement a sophisticated system to accelerate safely","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: 원문은 조잡하고 위험한 방법을 묘사하는데, 이 표현은 정교하고 안전한 시스템을 의미해 정반대 뉘앙스임","translation":"안전하게 가속하기 위한 정교한 시스템을 구현하다"},{"text":"develop a fully automated and reliable driving method","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: 원문의 핵심은 자동화의 실패와 한계인데, 이 표현은 완전 자동화되고 신뢰할 수 있는 방법이라는 의미로 인과를 역전시킴","translation":"완전히 자동화되고 신뢰할 수 있는 운전 방법을 개발하다"},{"text":"apply a crude, uncontrollable fix to make something move","isCorrect":true,"optionType":"correct","explanation":"올바름: 벽돌을 가속 페달에 묶는 행위가 조잡하고 통제 불가능한 해결책을 적용하는 것임을 구체적으로 재현함","translation":"무언가를 움직이게 하기 위해 조잡하고 통제 불가능한 방법을 적용하다"}],"sourceQuestion":"2번 지문"},{"keyExpression":"bottle feeding allows for someone else to substitute for the mother's time","passage":"It can also function to save time, as bottle feeding allows for someone else to substitute for the mother's time.","passageTranslation":"젖병 수유는 다른 누군가가 어머니의 역할을 대신할 수 있게 해주므로, 시간을 절약하는 기능도 할 수 있다.","qType":"correct","questionText":"'bottle feeding allows for someone else to substitute for the mother's time'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"the mother does not have to be the one present at every feeding","isCorrect":true,"optionType":"correct","explanation":"올바름: 'substitute for the mother's time'의 함축(어머니가 직접 있지 않아도 됨)을 직접적으로 표현하여 의미 재구성","translation":"어머니가 매번 수유 시에 직접 있어야 하는 것은 아니다"},{"text":"feeding duties can be delegated to a person other than the mother","isCorrect":true,"optionType":"correct","explanation":"올바름: 'substitute for'를 'delegated to'로, 'someone else'를 'a person other than the mother'로 바꿔 의미 유지","translation":"수유 의무가 어머니 외의 다른 사람에게 위임될 수 있다"},{"text":"another person can take over the feeding role on behalf of the mother","isCorrect":true,"optionType":"correct","explanation":"올바름: 'substitute for the mother's time'을 'take over the feeding role on behalf of the mother'로 구체적 행위 표현으로 전환하여 의미 보존","translation":"다른 사람이 어머니를 대신하여 수유 역할을 맡을 수 있다"},{"text":"bottle feeding increases the total amount of time the mother invests in childcare","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: 원문은 시간을 절약(대체) 가능함을 의미하는데, '어머니의 시간 투자가 증가한다'로 인과 역전","translation":"젖병 수유는 어머니가 육아에 투자하는 총 시간을 증가시킨다"},{"text":"the mother must always be present to supervise the feeding process","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: 원문의 '다른 사람이 대체 가능'을 '어머니가 항상 있어야 함'으로 정반대 의미로 역전","translation":"어머니는 수유 과정을 감독하기 위해 항상 직접 있어야 한다"}],"sourceQuestion":"3번 지문"},{"keyExpression":"increasing the likelihood that their children will show similar reactions in comparable situations","passage":"For example, their own responses to emotional situations serve as a role model for emotion regulation, increasing the likelihood that their children will show similar reactions in comparable situations.","passageTranslation":"예를 들어, 감정적 상황에 대한 부모 자신의 반응은 감정 조절의 역할 모델이 되어, 자녀들이 유사한 상황에서 비슷한 반응을 보일 가능성을 높인다.","qType":"correct","questionText":"'increasing the likelihood that their children will show similar reactions in comparable situations'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"reducing the chance that children develop emotional responses different from their parents","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: 표면적으로는 유사하나 increasing likelihood(가능성 증가)를 reducing chance(가능성 감소)로 반전시켜 논리를 왜곡","translation":"자녀들이 부모와 다른 감정 반응을 발달시킬 가능성을 줄인다"},{"text":"making it more probable that children mirror parental emotional responses in equivalent contexts","isCorrect":true,"optionType":"correct","explanation":"올바름: similar reactions → mirror parental emotional responses, comparable situations → equivalent contexts로 함축된 모방 관계를 명시화","translation":"동등한 맥락에서 자녀들이 부모의 감정적 반응을 그대로 반영할 가능성을 더 높인다"},{"text":"ensuring children will always react identically to their parents in every situation","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: likelihood(확률적 가능성)를 always(항상)로 과잉 일반화하여 확률적 진술을 절대적 사실로 왜곡","translation":"자녀들이 모든 상황에서 항상 부모와 똑같이 반응할 것을 보장한다"}],"sourceQuestion":"5번 지문"},{"keyExpression":"operate both autonomously and safely","passage":"it could not slow down, stop, or turn to avoid barriers. ... it only means that at the time we did not yet have the tools we now possess to help enable vehicles to operate both autonomously and safely.","passageTranslation":"그것은 속도를 줄이거나, 멈추거나, 장애물을 피해 방향을 틀 수 없었다. ... 그것은 단지 당시에 우리가 차량이 자율적으로 그리고 안전하게 작동할 수 있도록 돕는 지금 우리가 보유한 도구들을 아직 갖추지 못했음을 의미할 뿐이다.","qType":"correct","questionText":"'operate both autonomously and safely'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"prioritize speed over the safety of those on board","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: safely를 무시하고 안전보다 속도를 우선시한다는 반대 의미로 핵심 가치를 왜곡함","translation":"탑승자 안전보다 속도를 우선시하다"},{"text":"move on its own while avoiding danger effectively","isCorrect":true,"optionType":"correct","explanation":"올바름: 자율적 이동(move on its own)과 안전한 운행(avoiding danger effectively)을 병렬로 재구성함","translation":"스스로 이동하면서 위험을 효과적으로 피하다"},{"text":"move forward only with continuous human supervision","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: 자율성(autonomously)의 핵심인 인간 개입 불필요를 부정하고, 오히려 지속적인 인간 감독이 필요하다고 의미를 역전시킴","translation":"지속적인 인간의 감독 하에서만 앞으로 이동하다"},{"text":"function independently while still ensuring passenger protection","isCorrect":true,"optionType":"correct","explanation":"올바름: autonomously를 independently로, safely를 ensuring passenger protection으로 정확히 바꿔 두 조건을 모두 유지함","translation":"독립적으로 기능하면서도 탑승자 안전을 보장하다"}],"sourceQuestion":"2번 지문"},{"keyExpression":"This once-distant dream now seems within our reach","passage":"This once-distant dream now seems within our reach.","passageTranslation":"한때 먼 꿈처럼 보였던 이것이 이제는 우리의 손이 닿는 곳에 있는 것 같다.","qType":"correct","questionText":"'This once-distant dream now seems within our reach'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"our ambitions have grown too large for practical implementation","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: 긍정적 가능성 전환을 야망이 너무 커서 실용적으로 실현 불가능하다는 부정적 의미로 인과를 역전시킴","translation":"우리의 야망이 너무 커져서 실제 구현이 불가능해졌다"},{"text":"what was previously unattainable is now nearly achievable","isCorrect":true,"optionType":"correct","explanation":"올바름: once-distant를 previously unattainable로, within our reach를 nearly achievable로 정확히 바꾸어 기술 발전에 의한 가능성 전환을 재현함","translation":"이전에는 달성 불가능했던 것이 이제는 거의 실현 가능해졌다"},{"text":"the dream remains far beyond what current tools can handle","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: within our reach(달성 가능)를 far beyond(여전히 멀다)로 대체해 기술 발전의 성과를 부정하는 반의어 대체임","translation":"그 꿈은 현재 도구들이 감당할 수 있는 것을 훨씬 넘어서 있다"},{"text":"a goal once thought impossible is now close to being realized","isCorrect":true,"optionType":"correct","explanation":"올바름: 불가능하다고 여겨졌던 목표(자율주행)가 실현에 가까워졌다는 핵심 함의를 유지함","translation":"한때 불가능하다고 생각했던 목표가 이제 실현에 가까워졌다"}],"sourceQuestion":"2번 지문"},{"keyExpression":"in part because","passage":"We tend to overrate the impact of new technologies in part because older technologies have become absorbed into the furniture of our lives.","passageTranslation":"우리는 새로운 기술의 영향력을 과대평가하는 경향이 있는데, 이는 부분적으로 오래된 기술들이 우리 삶의 일부에 흡수되었기 때문이다.","qType":"incorrect","questionText":"'in part because'을(를) 잘못 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"partly as a result of the fact that","isCorrect":false,"optionType":"correct","explanation":"올바름: 'in part because'를 'partly as a result of the fact that'으로 원인-결과 관계를 유지하며 재표현","translation":"부분적으로 ~이라는 사실의 결과로서"},{"text":"one of the contributing reasons being that","isCorrect":false,"optionType":"correct","explanation":"올바름: 'in part because'의 '부분적 원인' 의미를 'one of the contributing reasons being that'으로 명확히 재구성","translation":"그 이유 중 하나가 ~이기 때문에"},{"text":"despite the fact that","isCorrect":true,"optionType":"incorrect","explanation":"잘못됨: 'in part because'(인과·이유)를 'despite'(양보·역접)로 바꿔 논리 관계를 정반대로 왜곡","translation":"~임에도 불구하고"},{"text":"entirely and exclusively because","isCorrect":true,"optionType":"incorrect","explanation":"잘못됨: 'in part'(부분적으로)를 'entirely and exclusively'(전적으로·오직)로 바꿔 원인의 범위를 과장하여 의미 변질","translation":"전적으로 그리고 오직 ~이기 때문에"},{"text":"among other factors, due to the circumstance that","isCorrect":false,"optionType":"correct","explanation":"올바름: 'in part'(부분적으로, 여러 요인 중 하나)를 'among other factors'로 명시화하고 'because'를 'due to'로 바꿔 인과 관계 유지","translation":"다른 요인들 중에서도, ~라는 상황으로 인해"}],"sourceQuestion":"3번 지문"},{"keyExpression":"give rise to serious privacy risks","passage":"In contrast, critics argue that facial recognition payments could give rise to serious privacy risks. The systems require companies to collect and store sensitive biometric data, such as facial scans.","passageTranslation":"반면에, 비평가들은 안면 인식 결제가 심각한 프라이버시 위험을 야기할 수 있다고 주장한다. 이 시스템은 기업들이 안면 스캔과 같은 민감한 생체 인식 데이터를 수집하고 저장하도록 요구한다.","qType":"correct","questionText":"'give rise to serious privacy risks'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"generate significant threats to personal data security","isCorrect":true,"optionType":"correct","explanation":"올바름: give rise to→generate, privacy risks→threats to personal data security로 전환하여 인과적 생성 관계와 의미를 정확히 보존함","translation":"개인 데이터 보안에 대한 심각한 위협을 야기한다"},{"text":"gradually reduce the likelihood of data privacy violations","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: 원문은 위험의 발생을 의미하나, reduce the likelihood로 위험 감소를 나타내어 방향성이 반대로 왜곡됨","translation":"데이터 프라이버시 침해 가능성을 점차 줄인다"},{"text":"effectively eliminate concerns about users' personal information","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: give rise to는 문제 발생을 의미하나, eliminate(제거)로 인과 방향을 완전히 역전시켜 의미를 왜곡함","translation":"사용자 개인 정보에 대한 우려를 효과적으로 제거한다"}],"sourceQuestion":"1번 지문"},{"keyExpression":"they may intrude on adolescents' autonomy striving","passage":"Whereas direct soothing and directive guidance of what to do are beneficial for younger children, they may intrude on adolescents' autonomy striving.","passageTranslation":"직접적인 달래기와 무엇을 해야 할지에 대한 지시적 안내는 어린 자녀들에게는 유익하지만, 청소년의 자율성 추구를 침해할 수 있다.","qType":"correct","questionText":"'they may intrude on adolescents' autonomy striving'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"they support adolescents in building a stronger sense of personal responsibility","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: intrude on(침해하다) → support(지지하다)로 의미가 정반대로 역전되어 원문의 부정적 결과를 긍정적으로 왜곡","translation":"그것들은 청소년들이 더 강한 개인적 책임감을 형성하는 데 도움을 준다"},{"text":"such approaches can interfere with teenagers' efforts to become self-directed","isCorrect":true,"optionType":"correct","explanation":"올바름: intrude on → interfere with, autonomy striving → efforts to become self-directed로 추상 개념을 구체적 행위로 전환하며 의미 유지","translation":"그러한 접근 방식은 청소년들이 자기 주도적이 되려는 노력을 방해할 수 있다"},{"text":"adolescents willingly accept parental direction as a guide for self-regulation","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: intrude on autonomy striving(자율성 침해)와 정반대로 청소년이 부모 지시를 기꺼이 수용한다는 의미로 왜곡","translation":"청소년들은 자기 조절의 지침으로 부모의 지시를 기꺼이 받아들인다"}],"sourceQuestion":"5번 지문"},{"keyExpression":"huge implications for the management of time in everyday life","passage":"Potentially, therefore, it has huge implications for the management of time in everyday life, yet it is entirely overlooked in discussions of high-speed society.","passageTranslation":"따라서 잠재적으로 이것은 일상생활에서 시간 관리에 막대한 함의를 지니고 있지만, 고속 사회에 대한 논의에서는 완전히 간과되고 있다.","qType":"incorrect","questionText":"'huge implications for the management of time in everyday life'을(를) 잘못 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"far-reaching consequences for how people organize their daily schedules","isCorrect":false,"optionType":"correct","explanation":"올바름: 'huge implications'를 'far-reaching consequences'로, 'management of time'을 'organize their daily schedules'로 구체화하여 의미 보존","translation":"사람들이 일상 일정을 조직하는 방식에 광범위한 결과를 미치는"},{"text":"clear and well-documented outcomes on national productivity statistics","isCorrect":true,"optionType":"incorrect","explanation":"잘못됨: '일상생활의 시간 관리'와 무관하게 '국가 생산성 통계'라는 구체적 측정 수치로 대체하여 의미 왜곡","translation":"국가 생산성 통계에 명확하고 잘 기록된 결과"},{"text":"major potential to reshape the structure of time use in ordinary life","isCorrect":false,"optionType":"correct","explanation":"올바름: 'huge implications'의 잠재적 영향력을 'major potential to reshape'으로, 'everyday life'를 'ordinary life'로 바꿔 의미 유지","translation":"일상생활에서 시간 사용 구조를 재편할 큰 잠재력을 지닌"},{"text":"significant effects on the way individuals allocate time in their lives","isCorrect":false,"optionType":"correct","explanation":"올바름: 'implications'를 'effects'로, 'management of time'을 'allocate time'으로 바꿔 의미를 자연스럽게 재구성","translation":"개인이 삶에서 시간을 배분하는 방식에 중요한 영향을 미치는"}],"sourceQuestion":"3번 지문"},{"keyExpression":"in part because","passage":"We tend to overrate the impact of new technologies in part because older technologies have become absorbed into the furniture of our lives.","passageTranslation":"우리는 새로운 기술의 영향력을 과대평가하는 경향이 있는데, 이는 부분적으로 오래된 기술들이 우리 삶의 일부에 흡수되었기 때문이다.","qType":"correct","questionText":"'in part because'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"partly as a result of the fact that","isCorrect":true,"optionType":"correct","explanation":"올바름: 'in part because'를 'partly as a result of the fact that'으로 원인-결과 관계를 유지하며 재표현","translation":"부분적으로 ~이라는 사실의 결과로서"},{"text":"entirely and exclusively because","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: 'in part'(부분적으로)를 'entirely and exclusively'(전적으로·오직)로 바꿔 원인의 범위를 과장하여 의미 변질","translation":"전적으로 그리고 오직 ~이기 때문에"},{"text":"among other factors, due to the circumstance that","isCorrect":true,"optionType":"correct","explanation":"올바름: 'in part'(부분적으로, 여러 요인 중 하나)를 'among other factors'로 명시화하고 'because'를 'due to'로 바꿔 인과 관계 유지","translation":"다른 요인들 중에서도, ~라는 상황으로 인해"},{"text":"despite the fact that","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: 'in part because'(인과·이유)를 'despite'(양보·역접)로 바꿔 논리 관계를 정반대로 왜곡","translation":"~임에도 불구하고"}],"sourceQuestion":"3번 지문"},{"keyExpression":"behavioral changes have proved effective for some people","passage":"Although this technique alone will not produce changes, when used alongside other behavior modification tactics and coping strategies, behavioral changes have proved effective for some people.","passageTranslation":"비록 이 기법만으로는 변화를 만들어내지 못하지만, 다른 행동 수정 전술 및 대처 전략과 함께 사용될 때 행동 변화는 일부 사람들에게 효과적인 것으로 입증되었다.","qType":"incorrect","questionText":"'behavioral changes have proved effective for some people'을(를) 잘못 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"modifying one's actions has shown measurable success in certain individuals","isCorrect":false,"optionType":"correct","explanation":"올바름: behavioral changes→modifying one's actions, proved effective→shown measurable success, some people→certain individuals로 의미 보존","translation":"자신의 행동을 수정하는 것은 특정 개인들에게서 측정 가능한 성공을 보여주었다"},{"text":"conduct-based interventions have yielded positive outcomes for select individuals","isCorrect":false,"optionType":"correct","explanation":"올바름: behavioral changes→conduct-based interventions, proved effective→yielded positive outcomes, some people→select individuals로 추상↔구체 전환하며 의미 유지","translation":"행동 기반 개입은 일부 선택된 개인들에게 긍정적인 결과를 가져왔다"},{"text":"behavioral changes have been universally effective across all populations","isCorrect":true,"optionType":"incorrect","explanation":"잘못됨: 원문의 some people(일부 사람들)이 universally(보편적으로)·all populations(모든 집단)으로 바뀌어 제한적 효과를 전면적 효과로 과장·왜곡","translation":"행동 변화는 모든 집단에 걸쳐 보편적으로 효과적이었다"},{"text":"people who resist behavioral change tend to recover more successfully","isCorrect":true,"optionType":"incorrect","explanation":"잘못됨: 원문은 behavioral changes proved effective인데, resist behavioral change(행동 변화에 저항하는 사람)가 더 성공적으로 회복한다고 하여 인과 관계를 완전히 역전","translation":"행동 변화에 저항하는 사람들이 더 성공적으로 회복하는 경향이 있다"},{"text":"altering behavior has been demonstrated to work for a portion of the population","isCorrect":false,"optionType":"correct","explanation":"올바름: behavioral changes→altering behavior, proved effective→demonstrated to work, some people→a portion of the population으로 논리 구조 유지","translation":"행동을 변화시키는 것이 일부 사람들에게 효과가 있는 것으로 입증되었다"}],"sourceQuestion":"4번 지문"},{"keyExpression":"adolescents might pull away from, rather than turn toward, their parents in times of emotional crisis","passage":"In consequence, adolescents might pull away from, rather than turn toward, their parents in times of emotional crisis, unless parental practices are adjusted.","passageTranslation":"그 결과, 부모의 양육 방식이 조정되지 않는다면, 청소년들은 감정적 위기 상황에서 부모에게 의지하기보다는 오히려 멀어질 수 있다.","qType":"incorrect","questionText":"'adolescents might pull away from, rather than turn toward, their parents in times of emotional crisis'을(를) 잘못 paraphrasing한 표현을 모두 고르시오.","options":[{"text"
