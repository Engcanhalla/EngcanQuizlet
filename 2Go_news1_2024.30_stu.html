tion":"올바름: 기술 진보가 과거의 환상을 실현 가능하게 만들었다는 맥락적 의미를 논리 구조 변환으로 재표현함","translation":"기술이 과거의 환상을 실현 가능하게 만들 만큼 충분히 발전했다"},{"text":"a goal once thought impossible is now close to being realized","isCorrect":false,"optionType":"correct","explanation":"올바름: 불가능하다고 여겨졌던 목표(자율주행)가 실현에 가까워졌다는 핵심 함의를 유지함","translation":"한때 불가능하다고 생각했던 목표가 이제 실현에 가까워졌다"},{"text":"what was previously unattainable is now nearly achievable","isCorrect":false,"optionType":"correct","explanation":"올바름: once-distant를 previously unattainable로, within our reach를 nearly achievable로 정확히 바꾸어 기술 발전에 의한 가능성 전환을 재현함","translation":"이전에는 달성 불가능했던 것이 이제는 거의 실현 가능해졌다"}],"sourceQuestion":"2번 지문"},{"keyExpression":"misused, hacked, or shared without proper consent","passage":"Opponents worry this personal information could be misused, hacked, or shared without proper consent from the users.","passageTranslation":"반대론자들은 이 개인 정보가 사용자의 적절한 동의 없이 오용되거나, 해킹되거나, 공유될 수 있다고 우려한다.","qType":"incorrect","questionText":"'misused, hacked, or shared without proper consent'을(를) 잘못 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"exploited, illegally accessed, or disclosed without users' permission","isCorrect":false,"optionType":"correct","explanation":"올바름: misused→exploited, hacked→illegally accessed, without proper consent→without users' permission으로 3개 요소를 모두 정확히 대응 전환함","translation":"사용자의 허가 없이 악용되거나, 불법 접근되거나, 공개될 수 있다"},{"text":"collected voluntarily and used only for legitimate research purposes","isCorrect":true,"optionType":"incorrect","explanation":"잘못됨: 원문의 무단 사용·해킹 위험을 자발적 수집과 합법적 연구 사용으로 왜곡하여 비판적 함의를 완전히 제거함","translation":"자발적으로 수집되고 합법적인 연구 목적으로만 사용된다"},{"text":"abused, breached, or distributed without authorization","isCorrect":false,"optionType":"correct","explanation":"올바름: misused→abused, hacked→breached(침해), without proper consent→without authorization으로 법적·보안적 함의를 유지하며 paraphrasing","translation":"허가 없이 남용되거나, 침해되거나, 배포될 수 있다"},{"text":"used improperly, stolen by unauthorized parties, or passed on without agreement","isCorrect":false,"optionType":"correct","explanation":"올바름: 각 동사를 풀어쓰는 방식으로 구체화하여 세 가지 위험 유형의 의미를 충실히 전달함","translation":"부적절하게 사용되거나, 무단 당사자에 의해 도난당하거나, 동의 없이 전달될 수 있다"}],"sourceQuestion":"1번 지문"},{"keyExpression":"indirect support of autonomous emotion regulation","passage":"More suitable in adolescence is indirect support of autonomous emotion regulation, such as through interest in, as well as awareness and nonjudgmental acceptance of, adolescents' emotional experiences, and being available when the adolescent wants to talk.","passageTranslation":"청소년기에 더 적합한 것은 자율적 감정 조절의 간접적 지원으로, 예를 들어 청소년의 감정적 경험에 대한 관심, 인식, 비판단적 수용, 그리고 청소년이 이야기하고 싶을 때 곁에 있어주는 것이다.","qType":"incorrect","questionText":"'indirect support of autonomous emotion regulation'을(를) 잘못 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"subtle encouragement of self-managed emotional coping without direct control","isCorrect":false,"optionType":"correct","explanation":"올바름: indirect → subtle, autonomous → self-managed, emotion regulation → emotional coping로 추상→구체 전환하며 without direct control로 indirect의 함의를 명시화","translation":"직접적인 통제 없이 스스로 감정 대처를 관리하도록 은근히 격려하는 것"},{"text":"fostering independent emotional management through non-intrusive means","isCorrect":false,"optionType":"correct","explanation":"올바름: support → fostering, autonomous → independent, indirect → non-intrusive means로 삼중 대응하며 논리 구조 유지","translation":"비침습적 방법을 통해 독립적인 감정 관리를 촉진하는 것"},{"text":"direct parental management of teenagers' emotional responses and decision-making","isCorrect":true,"optionType":"incorrect","explanation":"잘못됨: indirect(간접적) → direct, autonomous(자율적) → parental management로 이중 반전하여 원문과 정반대 의미 생성","translation":"청소년의 감정 반응과 의사결정에 대한 부모의 직접적인 관리"},{"text":"backing teenagers' self-driven regulation of feelings without imposing direct solutions","isCorrect":false,"optionType":"correct","explanation":"올바름: indirect support → backing without imposing direct solutions, autonomous → self-driven, emotion regulation → regulation of feelings로 행위 수준으로 구체화","translation":"직접적인 해결책을 강요하지 않고 청소년들의 자기 주도적 감정 조절을 지원하는 것"},{"text":"structured external control over how adolescents process and express their feelings","isCorrect":true,"optionType":"incorrect","explanation":"잘못됨: indirect support → structured external control, autonomous → 외부 통제 받는 존재로 전환하여 자율성을 박탈하는 의미로 왜곡","translation":"청소년들이 감정을 처리하고 표현하는 방식에 대한 체계적인 외부 통제"}],"sourceQuestion":"5번 지문"},{"keyExpression":"we did not yet have the tools we now possess","passage":"No, it only means that at the time we did not yet have the tools we now possess to help enable vehicles to operate both autonomously and safely.","passageTranslation":"아니다, 그것은 단지 당시에 우리가 차량이 자율적이면서도 안전하게 작동할 수 있도록 돕는 지금 우리가 보유한 도구들을 아직 갖추지 못했음을 의미할 뿐이다.","qType":"incorrect","questionText":"'we did not yet have the tools we now possess'을(를) 잘못 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"we lacked the capabilities that exist in the present day","isCorrect":false,"optionType":"correct","explanation":"올바름: did not yet have를 lacked로, tools we now possess를 capabilities that exist in the present day로 바꿔 과거의 기술적 부재와 현재와의 대비를 유지함","translation":"우리는 현재 존재하는 능력이 부족했다"},{"text":"the necessary resources were unavailable to us at that time","isCorrect":false,"optionType":"correct","explanation":"올바름: did not yet have the tools를 were unavailable to us at that time으로, tools를 necessary resources로 변환해 시간적 한계와 수단의 부재를 유지함","translation":"필요한 자원이 당시 우리에게 이용 가능하지 않았다"},{"text":"the tools we had then were superior to what we have now","isCorrect":true,"optionType":"incorrect","explanation":"잘못됨: 과거의 도구 부재를 과거 도구가 현재보다 우월했다는 의미로 역전시켜 기술 발전의 방향성을 완전히 왜곡함","translation":"당시 우리가 보유했던 도구가 지금 우리가 가진 것보다 우수했다"},{"text":"the technology required for the task had not yet been developed","isCorrect":false,"optionType":"correct","explanation":"올바름: tools를 technology required로, did not yet have를 had not yet been developed로 바꾸어 당시 기술적 부재를 구체적으로 재표현함","translation":"그 과제에 필요한 기술이 아직 개발되지 않았었다"}],"sourceQuestion":"2번 지문"},{"keyExpression":"transformed a fundamental human experience for vast numbers of infants and mothers","passage":"Here is a simple implement that has transformed a fundamental human experience for vast numbers of infants and mothers, yet it finds no place in our histories of technology.","passageTranslation":"이것은 수많은 영아와 어머니들에게 근본적인 인간 경험을 변화시킨 단순한 도구이지만, 우리의 기술 역사에서는 어떠한 자리도 차지하지 못하고 있다.","qType":"incorrect","questionText":"'transformed a fundamental human experience for vast numbers of infants and mothers'을(를) 잘못 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"brought about significant changes to an essential part of human development for many","isCorrect":false,"optionType":"correct","explanation":"올바름: 'transformed'를 'brought about significant changes to'로, 'fundamental experience'를 'essential part of human development'로 재구성하여 의미 보존","translation":"많은 사람들에게 인간 발달의 필수적인 부분에 중요한 변화를 가져온"},{"text":"preserved the traditional experience of infant care across all generations","isCorrect":true,"optionType":"incorrect","explanation":"잘못됨: 'transformed'(변화시킴)를 'preserved the traditional experience'(전통적 경험을 보존함)로 정반대 의미로 왜곡","translation":"모든 세대에 걸쳐 영아 돌봄의 전통적 경험을 보존한"},{"text":"profoundly changed a basic aspect of life for countless babies and caregivers","isCorrect":false,"optionType":"correct","explanation":"올바름: 'transformed'를 'profoundly changed'로, 'fundamental human experience'를 'basic aspect of life'로, 'vast numbers'를 'countless'로 대응시켜 의미 보존","translation":"수많은 아기들과 돌봄 제공자들에게 삶의 기본적인 측면을 심오하게 변화시킨"},{"text":"radically altered how a core human activity is experienced by millions","isCorrect":false,"optionType":"correct","explanation":"올바름: 'transformed'를 'radically altered'로, 'fundamental human experience'를 'core human activity'로 바꿔 의미 유지","translation":"수백만 명이 핵심적인 인간 활동을 경험하는 방식을 근본적으로 바꾼"}],"sourceQuestion":"3번 지문"},{"keyExpression":"finds no place in our histories of technology","passage":"Here is a simple implement that has transformed a fundamental human experience for vast numbers of infants and mothers, yet it finds no place in our histories of technology.","passageTranslation":"이것은 수많은 영아와 어머니들에게 근본적인 인간 경험을 변화시킨 단순한 도구이지만, 우리의 기술 역사에서는 어떠한 자리도 차지하지 못하고 있다.","qType":"correct","questionText":"'finds no place in our histories of technology'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"goes unrecognized as a significant technological achievement","isCorrect":true,"optionType":"correct","explanation":"올바름: 'finds no place in histories'의 함축(기술로 인정받지 못함)을 'goes unrecognized as a significant technological achievement'로 풀어냄","translation":"중요한 기술적 성취로 인정받지 못하다"},{"text":"is overlooked and absent from the record of human inventions","isCorrect":true,"optionType":"correct","explanation":"올바름: 'finds no place'(자리를 차지하지 못함)를 'absent from the record'로, 'histories of technology'를 'record of human inventions'로 대응시켜 의미 유지","translation":"인류의 발명 기록에서 간과되고 빠져 있다"},{"text":"has been thoroughly documented in recent scientific research papers","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: 원문은 '역사에서 기록되지 않음'인데 '철저히 문서화됨'으로 인과를 역전","translation":"최근 과학 연구 논문에서 철저하게 기록되어 왔다"},{"text":"is entirely excluded from accounts of technological development","isCorrect":true,"optionType":"correct","explanation":"올바름: 'finds no place in'을 'excluded from'으로, 'histories of technology'를 'accounts of technological development'로 바꿔 의미 보존","translation":"기술 발전에 관한 설명에서 완전히 배제되어 있다"},{"text":"occupies a central position in the study of modern technology","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: 'finds no place'(자리가 없음)를 'occupies a central position'(핵심 자리를 차지함)으로 정반대 의미로 왜곡","translation":"현대 기술 연구에서 핵심적인 위치를 차지하고 있다"}],"sourceQuestion":"3번 지문"},{"keyExpression":"parents remain the primary socialization agents","passage":"Although extra-familial influences, such as peers or media, gain in importance during adolescence, parents remain the primary socialization agents.","passageTranslation":"또래나 미디어 같은 가족 외적 영향이 청소년기에 중요성을 얻더라도, 부모는 여전히 주된 사회화 주체로 남는다.","qType":"incorrect","questionText":"'parents remain the primary socialization agents'을(를) 잘못 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"parents continue to be the most influential figures in shaping social behavior","isCorrect":false,"optionType":"correct","explanation":"올바름: remain → continue to be, primary socialization agents → most influential figures in shaping social behavior로 의미 보존","translation":"부모는 사회적 행동을 형성하는 데 가장 영향력 있는 존재로 계속 남는다"},{"text":"parents sustain their dominant position as key transmitters of social norms","isCorrect":false,"optionType":"correct","explanation":"올바름: remain → sustain, primary → dominant, socialization agents → key transmitters of social norms로 논리 유지","translation":"부모는 사회적 규범의 핵심 전달자로서 지배적인 위치를 유지한다"},{"text":"peers gradually replace parents as the chief source of emotional guidance","isCorrect":true,"optionType":"incorrect","explanation":"잘못됨: parents remain primary → peers replace parents로 인과 역전 및 주체 교체, 지문에서는 또래의 영향력이 커져도 부모가 여전히 주된 역할임을 강조","translation":"또래가 점차 감정 지도의 주요 원천으로서 부모를 대체한다"},{"text":"mothers and fathers still hold the central role in guiding emotional and social learning","isCorrect":false,"optionType":"correct","explanation":"올바름: parents → mothers and fathers, primary → central role, socialization agents → guiding emotional and social learning으로 구체화","translation":"어머니와 아버지는 여전히 감정적·사회적 학습을 안내하는 중심 역할을 맡는다"}],"sourceQuestion":"5번 지문"},{"keyExpression":"misused, hacked, or shared without proper consent","passage":"Opponents worry this personal information could be misused, hacked, or shared without proper consent from the users.","passageTranslation":"반대론자들은 이 개인 정보가 사용자의 적절한 동의 없이 오용되거나, 해킹되거나, 공유될 수 있다고 우려한다.","qType":"correct","questionText":"'misused, hacked, or shared without proper consent'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"used improperly, stolen by unauthorized parties, or passed on without agreement","isCorrect":true,"optionType":"correct","explanation":"올바름: 각 동사를 풀어쓰는 방식으로 구체화하여 세 가지 위험 유형의 의미를 충실히 전달함","translation":"부적절하게 사용되거나, 무단 당사자에 의해 도난당하거나, 동의 없이 전달될 수 있다"},{"text":"abused, breached, or distributed without authorization","isCorrect":true,"optionType":"correct","explanation":"올바름: misused→abused, hacked→breached(침해), without proper consent→without authorization으로 법적·보안적 함의를 유지하며 paraphrasing","translation":"허가 없이 남용되거나, 침해되거나, 배포될 수 있다"},{"text":"protected, secured, and stored with full user approval","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: misused/hacked의 부정적 행위를 protected/secured로 역전시키고, without consent를 with full approval로 반대 의미로 대체함","translation":"완전한 사용자 승인으로 보호되고, 안전하게 저장된다"},{"text":"collected voluntarily and used only for legitimate research purposes","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: 원문의 무단 사용·해킹 위험을 자발적 수집과 합법적 연구 사용으로 왜곡하여 비판적 함의를 완전히 제거함","translation":"자발적으로 수집되고 합법적인 연구 목적으로만 사용된다"}],"sourceQuestion":"1번 지문"},{"keyExpression":"nonjudgmental acceptance of adolescents' emotional experiences","passage":"More suitable in adolescence is indirect support of autonomous emotion regulation, such as through interest in, as well as awareness and nonjudgmental acceptance of, adolescents' emotional experiences, and being available when the adolescent wants to talk.","passageTranslation":"청소년기에 더 적합한 것은 자율적 감정 조절의 간접적 지원으로, 예를 들어 청소년의 감정적 경험에 대한 관심, 인식, 비판단적 수용, 그리고 청소년이 이야기하고 싶을 때 곁에 있어주는 것이다.","qType":"correct","questionText":"'nonjudgmental acceptance of adolescents' emotional experiences'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"correcting and redirecting negative emotions to ensure healthy psychological development","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: acceptance(수용) → correcting and redirecting(교정 및 방향 전환)으로 수용적 태도를 개입적·교정적 태도로 대체하여 의미 역전","translation":"건강한 심리적 발달을 보장하기 위해 부정적인 감정을 교정하고 방향을 바꾸는 것"},{"text":"receiving teenagers' feelings without criticism or evaluation","isCorrect":true,"optionType":"correct","explanation":"올바름: nonjudgmental → without criticism or evaluation, acceptance → receiving, emotional experiences → feelings로 구체화하며 의미 정확히 유지","translation":"비판이나 평가 없이 청소년들의 감정을 받아들이는 것"},{"text":"evaluating the appropriateness of adolescents' emotional reactions based on social standards","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: nonjudgmental(비판단적) → evaluating based on social standards(사회적 기준으로 평가)로 정반대 태도를 묘사하여 원문의 핵심 개념 왜곡","translation":"사회적 기준을 바탕으로 청소년의 감정 반응의 적절성을 평가하는 것"},{"text":"validating teenagers' inner emotional states in a non-critical and open-minded manner","isCorrect":true,"optionType":"correct","explanation":"올바름: acceptance → validating, nonjudgmental → non-critical and open-minded, emotional experiences → inner emotional states로 삼중 대응하며 수용적 태도의 함의 보존","translation":"비판적이지 않고 열린 마음으로 청소년들의 내면 감정 상태를 확인해 주는 것"}],"sourceQuestion":"5번 지문"},{"keyExpression":"their own responses to emotional situations serve as a role model for emotion regulation","passage":"For example, their own responses to emotional situations serve as a role model for emotion regulation, increasing the likelihood that their children will show similar reactions in comparable situations.","passageTranslation":"예를 들어, 감정적 상황에 대한 부모 자신의 반응은 감정 조절의 역할 모델이 되어, 자녀들이 유사한 상황에서 비슷한 반응을 보일 가능성을 높인다.","qType":"correct","questionText":"'their own responses to emotional situations serve as a role model for emotion regulation'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"children spontaneously develop their own unique emotional coping strategies","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: 부모의 역할 모델 기능을 완전히 삭제하고 자녀가 독자적으로 감정 대처 전략을 개발한다는 반대 의미 생성","translation":"자녀들은 자발적으로 자신만의 고유한 감정 대처 전략을 발달시킨다"},{"text":"parents actively instruct children on which emotions are acceptable to display","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: serve as a role model(모범이 됨, 간접적 학습) → actively instruct(직접 지시)로 학습 방식이 암묵적→명시적으로 왜곡","translation":"부모는 어떤 감정을 표현해도 되는지 자녀에게 적극적으로 지시한다"},{"text":"parental reactions in emotionally charged moments set the standard children imitate","isCorrect":true,"optionType":"correct","explanation":"올바름: responses → reactions, serve as a role model → set the standard children imitate로 역할 모델 개념을 모방 행위로 구체화","translation":"감정적으로 격한 순간에서 부모의 반응은 자녀가 모방하는 기준을 설정한다"}],"sourceQuestion":"5번 지문"},{"keyExpression":"unless parental practices are adjusted","passage":"In consequence, adolescents might pull away from, rather than turn toward, their parents in times of emotional crisis, unless parental practices are adjusted.","passageTranslation":"그 결과, 부모의 양육 방식이 조정되지 않는다면, 청소년들은 감정적 위기 상황에서 부모에게 의지하기보다는 오히려 멀어질 수 있다.","qType":"incorrect","questionText":"'unless parental practices are adjusted'을(를) 잘못 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"provided that parenting strategies remain unchanged and unresponsive to new demands","isCorrect":false,"optionType":"correct","explanation":"올바름: unless adjusted(조정되지 않으면) → provided that strategies remain unchanged로 조건 의미를 보존하며 unresponsive to new demands로 함축 추론 추가","translation":"양육 전략이 변화 없이 새로운 요구에 반응하지 않는 상태로 유지된다면"},{"text":"in the absence of changes to how parents engage with their adolescents","isCorrect":false,"optionType":"correct","explanation":"올바름: unless adjusted → in the absence of changes, parental practices → how parents engage로 전치사구로 구조 변환하며 조건의 의미 보존","translation":"부모가 청소년 자녀와 관계 맺는 방식에 변화가 없는 경우에"},{"text":"if parents do not modify the way they raise and respond to their children","isCorrect":false,"optionType":"correct","explanation":"올바름: unless → if not, parental practices are adjusted → parents do not modify the way they raise and respond로 조건절을 명시적 행위로 구체화하며 의미 유지","translation":"부모가 자녀를 양육하고 반응하는 방식을 수정하지 않는다면"},{"text":"as soon as parents recognize the need to change their approach to child-rearing","isCorrect":true,"optionType":"incorrect","explanation":"잘못됨: unless(~하지 않으면, 부정 조건) → as soon as(~하자마자, 긍정 시간절)로 조건의 논리가 역전되어 원문과 반대 상황을 묘사","translation":"부모가 양육 방식을 바꿀 필요성을 인식하자마자"}],"sourceQuestion":"5번 지문"},{"keyExpression":"enables mothers to exercise more control over the timing of feeding","passage":"This technology might be thought of as a classic time-shifting device, as it enables mothers to exercise more control over the timing of feeding.","passageTranslation":"이 기술은 어머니들이 수유 시간을 더 잘 통제할 수 있게 해준다는 점에서 고전적인 시간 이동 장치로 생각될 수 있다.","qType":"correct","questionText":"'enables mothers to exercise more control over the timing of feeding'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"gives mothers greater flexibility in managing feeding schedules","isCorrect":true,"optionType":"correct","explanation":"올바름: 'exercise more control over timing'을 'greater flexibility in managing schedules'로 추상↔구체 전환하여 의미 보존","translation":"어머니들에게 수유 일정을 관리하는 데 더 큰 유연성을 부여한다"},{"text":"allows mothers to decide when feeding takes place on their own terms","isCorrect":true,"optionType":"correct","explanation":"올바름: 'exercise control over the timing'을 'decide when ~ takes place on their own terms'로 자율성의 의미를 살려 구체적으로 전환","translation":"어머니들이 자신의 조건에 따라 수유가 언제 이루어질지 결정할 수 있게 한다"},{"text":"empowers mothers to determine the schedule of their infant's meals","isCorrect":true,"optionType":"correct","explanation":"올바름: 'enables'를 'empowers'로, 'control over timing'을 'determine the schedule'로 바꾸어 주체성과 통제의 의미를 유지","translation":"어머니들이 영아의 식사 일정을 스스로 결정할 수 있도록 권한을 부여한다"},{"text":"forces mothers to follow a strict and predetermined feeding timetable","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: 'exercise control'(통제권 행사, 즉 자율성)을 'forced to follow a strict timetable'(강제로 따름)으로 인과 및 방향성 역전","translation":"어머니들이 엄격하고 미리 정해진 수유 시간표를 따르도록 강요한다"},{"text":"reduces the overall amount of time mothers spend feeding their infants","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: 'control over timing'(시간 조정 권한)을 'reduces the amount of time spent'(소요 시간 감소)로 혼동하여 의미 왜곡","translation":"어머니들이 영아를 수유하는 데 쓰는 전체 시간량을 줄인다"}],"sourceQuestion":"3번 지문"},{"keyExpression":"nonjudgmental acceptance of adolescents' emotional experiences","passage":"More suitable in adolescence is indirect support of autonomous emotion regulation, such as through interest in, as well as awareness and nonjudgmental acceptance of, adolescents' emotional experiences, and being available when the adolescent wants to talk.","passageTranslation":"청소년기에 더 적합한 것은 자율적 감정 조절의 간접적 지원으로, 예를 들어 청소년의 감정적 경험에 대한 관심, 인식, 비판단적 수용, 그리고 청소년이 이야기하고 싶을 때 곁에 있어주는 것이다.","qType":"incorrect","questionText":"'nonjudgmental acceptance of adolescents' emotional experiences'을(를) 잘못 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"correcting and redirecting negative emotions to ensure healthy psychological development","isCorrect":true,"optionType":"incorrect","explanation":"잘못됨: acceptance(수용) → correcting and redirecting(교정 및 방향 전환)으로 수용적 태도를 개입적·교정적 태도로 대체하여 의미 역전","translation":"건강한 심리적 발달을 보장하기 위해 부정적인 감정을 교정하고 방향을 바꾸는 것"},{"text":"validating teenagers' inner emotional states in a non-critical and open-minded manner","isCorrect":false,"optionType":"correct","explanation":"올바름: acceptance → validating, nonjudgmental → non-critical and open-minded, emotional experiences → inner emotional states로 삼중 대응하며 수용적 태도의 함의 보존","translation":"비판적이지 않고 열린 마음으로 청소년들의 내면 감정 상태를 확인해 주는 것"},{"text":"receiving teenagers' feelings without criticism or evaluation","isCorrect":false,"optionType":"correct","explanation":"올바름: nonjudgmental → without criticism or evaluation, acceptance → receiving, emotional experiences → feelings로 구체화하며 의미 정확히 유지","translation":"비판이나 평가 없이 청소년들의 감정을 받아들이는 것"},{"text":"acknowledging what adolescents feel without passing judgment on their emotions","isCorrect":false,"optionType":"correct","explanation":"올바름: acceptance → acknowledging, nonjudgmental → without passing judgment, emotional experiences → what they feel로 행위 수준 구체화 성공","translation":"청소년들의 감정에 판단을 내리지 않고 그들이 느끼는 것을 인정하는 것"},{"text":"evaluating the appropriateness of adolescents' emotional reactions based on social standards","isCorrect":true,"optionType":"incorrect","explanation":"잘못됨: nonjudgmental(비판단적) → evaluating based on social standards(사회적 기준으로 평가)로 정반대 태도를 묘사하여 원문의 핵심 개념 왜곡","translation":"사회적 기준을 바탕으로 청소년의 감정 반응의 적절성을 평가하는 것"}],"sourceQuestion":"5번 지문"},{"keyExpression":"does that mean the entire concept of the self-driving car is not worth pursuing","passage":"Yes, the vehicle would have been able to move forward on its own, but it could not slow down, stop, or turn to avoid barriers. Obviously not ideal. But does that mean the entire concept of the self-driving car is not worth pursuing?","passageTranslation":"그렇다, 그 차량은 스스로 앞으로 나아갈 수 있었겠지만 속도를 줄이거나, 멈추거나, 장애물을 피해 방향을 틀 수 없었을 것이다. 분명히 이상적이지 않다. 하지만 그것이 자율주행 자동차라는 개념 전체가 추구할 가치가 없다는 것을 의미하는가?","qType":"incorrect","questionText":"'does that mean the entire concept of the self-driving car is not worth pursuing'을(를) 잘못 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"is the vision of self-driving technology no longer viable or valuable","isCorrect":false,"optionType":"correct","explanation":"올바름: not worth pursuing을 no longer viable or valuable로, entire concept을 the vision으로 바꾸어 추구 가치 부재를 재표현함","translation":"자율주행 기술의 비전은 더 이상 실현 가능하거나 가치 있지 않은가"},{"text":"should we accelerate investment in self-driving research immediately","isCorrect":true,"optionType":"incorrect","explanation":"잘못됨: 추구 가치에 대한 의문(not worth pursuing)을 오히려 즉각적 투자 가속 권고로 역전시켜 논리 구조를 완전히 바꿈","translation":"자율주행 연구에 대한 투자를 즉시 가속화해야 하는가"},{"text":"should we abandon the idea of autonomous vehicles altogether","isCorrect":false,"optionType":"correct","explanation":"올바름: not worth pursuing을 abandon altogether로, entire concept을 the idea로 변환해 필자가 반박하려는 논리를 재현함","translation":"자율주행 차량이라는 아이디어를 완전히 포기해야 하는가"},{"text":"does an early failure justify giving up on the goal entirely","isCorrect":false,"optionType":"correct","explanation":"올바름: 지문의 수사의문문 맥락(초기 실패가 개념 자체를 무효화하지 않는다)을 함축 추론으로 재구성함","translation":"초기 실패가 목표를 완전히 포기하는 것을 정당화하는가"}],"sourceQuestion":"2번 지문"},{"keyExpression":"monitor their conditions in real time","passage":"In fact, many patients are already wearing devices that monitor their conditions in real time, which allows doctors to talk to their patients in a specific, refined, and feedback-driven way.","passageTranslation":"사실, 많은 환자들은 이미 자신의 상태를 실시간으로 모니터링하는 기기를 착용하고 있으며, 이는 의사들이 구체적이고 정제된 피드백 중심의 방식으로 환자들과 대화할 수 있게 해준다.","qType":"incorrect","questionText":"'monitor their conditions in real time'을(를) 잘못 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"predict future health risks based on family medical records","isCorrect":true,"optionType":"incorrect","explanation":"잘못됨: 현재 상태의 실시간 모니터링을 과거 가족력 기반의 미래 예측으로 대체해 시제와 초점을 왜곡함","translation":"가족 의료 기록을 바탕으로 미래의 건강 위험을 예측하다"},{"text":"review a patient's medical history only during annual checkups","isCorrect":true,"optionType":"incorrect","explanation":"잘못됨: in real time(실시간)을 annual checkups(연간 검진)로 대체해 즉각성을 간헐적 검토로 역전시킴","translation":"연간 검진 때에만 환자의 병력을 검토하다"},{"text":"track patients' health status continuously as it changes","isCorrect":false,"optionType":"correct","explanation":"올바름: monitor를 track으로, in real time을 continuously as it changes로 바꾸어 즉각적 건강 추적의 의미를 유지함","translation":"환자의 건강 상태가 변화함에 따라 지속적으로 추적하다"},{"text":"observe and record health data at the moment it occurs","isCorrect":false,"optionType":"correct","explanation":"올바름: in real time의 핵심 의미(발생하는 순간)를 at the moment it occurs로 재표현하고 monitor를 observe and record로 분해함","translation":"건강 데이터가 발생하는 순간에 관찰하고 기록하다"},{"text":"keep an ongoing watch over a patient's physical changes","isCorrect":false,"optionType":"correct","explanation":"올바름: monitor를 keep an ongoing watch over로, conditions를 physical changes로 재구성해 지속적 감시의 함의를 유지함","translation":"환자의 신체적 변화를 지속적으로 감시하다"}],"sourceQuestion":"2번 지문"},{"keyExpression":"especially beneficial in public spaces and during disease outbreaks","passage":"Advocates also claim that facial recognition payments are more hygienic than other payment options. Because users do not need to touch screens, keypads, cash, or coins, the spread of germs can be greatly reduced. Supporters see this as especially beneficial in public spaces and during disease outbreaks.","passageTranslation":"지지자들은 또한 안면 인식 결제가 다른 결제 옵션보다 더 위생적이라고 주장한다. 사용자들이 화면, 키패드, 현금 또는 동전을 만질 필요가 없기 때문에 세균의 확산이 크게 줄어들 수 있다. 지지자들은 이것이 공공장소와 질병 발생 시기에 특히 유익하다고 본다.","qType":"correct","questionText":"'especially beneficial in public spaces and during disease outbreaks'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"only acceptable in private settings where disease transmission is unlikely","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: public spaces(공공 장소)를 private settings(사적 공간)로 역전시키고, disease outbreaks(발생)를 unlikely(가능성 없음)로 바꾸어 맥락을 왜곡함","translation":"질병 전파 가능성이 낮은 사적 환경에서만 허용 가능하다"},{"text":"less effective in crowded places due to the high risk of infection","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: especially beneficial(특히 유익)을 less effective(덜 효과적)로 역전시키고 장점을 단점의 조건으로 바꾸어 의미를 왜곡함","translation":"높은 감염 위험으로 인해 혼잡한 장소에서 덜 효과적이다"},{"text":"of great value in open public settings and during health crises involving contagion","isCorrect":true,"optionType":"correct","explanation":"올바름: beneficial→of great value, public spaces→open public settings, disease outbreaks→health crises involving contagion으로 함축 의미를 논리적으로 재구성함","translation":"개방된 공공 환경과 전염을 수반하는 건강 위기 시 큰 가치가 있다"},{"text":"particularly advantageous in shared environments and times of epidemic spread","isCorrect":true,"optionType":"correct","explanation":"올바름: especially→particularly, beneficial→advantageous, public spaces→shared environments, disease outbreaks→times of epidemic spread로 정확히 대응 전환함","translation":"공유 환경과 전염병 확산 시기에 특히 유리하다"}],"sourceQuestion":"1번 지문"},{"keyExpression":"increasing the likelihood that their children will show similar reactions in comparable situations","passage":"For example, their own responses to emotional situations serve as a role model for emotion regulation, increasing the likelihood that their children will show similar reactions in comparable situations.","passageTranslation":"예를 들어, 감정적 상황에 대한 부모 자신의 반응은 감정 조절의 역할 모델이 되어, 자녀들이 유사한 상황에서 비슷한 반응을 보일 가능성을 높인다.","qType":"incorrect","questionText":"'increasing the likelihood that their children will show similar reactions in comparable situations'을(를) 잘못 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"boosting the chance that children adopt the same emotional patterns when facing like situations","isCorrect":false,"optionType":"correct","explanation":"올바름: increasing → boosting, show similar reactions → adopt the same emotional patterns으로 구체화하며 논리 구조 보존","translation":"유사한 상황에 직면할 때 자녀들이 동일한 감정 패턴을 채택할 가능성을 높인다"},{"text":"ensuring children will always react identically to their parents in every situation","isCorrect":true,"optionType":"incorrect","explanation":"잘못됨: likelihood(확률적 가능성)를 always(항상)로 과잉 일반화하여 확률적 진술을 절대적 사실로 왜곡","translation":"자녀들이 모든 상황에서 항상 부모와 똑같이 반응할 것을 보장한다"},{"text":"raising the probability that children will respond in the same way under similar circumstances","isCorrect":false,"optionType":"correct","explanation":"올바름: increasing the likelihood → raising the probability, comparable situations → similar circumstances로 병렬 대응하며 의미 유지","translation":"유사한 상황에서 자녀들이 같은 방식으로 반응할 가능성을 높인다"},{"text":"making it more probable that children mirror parental emotional responses in equivalent contexts","isCorrect":false,"optionType":"correct","explanation":"올바름: similar reactions → mirror parental emotional responses, comparable situations → equivalent contexts로 함축된 모방 관계를 명시화","translation":"동등한 맥락에서 자녀들이 부모의 감정적 반응을 그대로 반영할 가능성을 더 높인다"}],"sourceQuestion":"5번 지문"},{"keyExpression":"misused, hacked, or shared without proper consent","passage":"Opponents worry this personal information could be misused, hacked, or shared without proper consent from the users.","passageTranslation":"반대론자들은 이 개인 정보가 사용자의 적절한 동의 없이 오용되거나, 해킹되거나, 공유될 수 있다고 우려한다.","qType":"correct","questionText":"'misused, hacked, or shared without proper consent'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"exploited, illegally accessed, or disclosed without users' permission","isCorrect":true,"optionType":"correct","explanation":"올바름: misused→exploited, hacked→illegally accessed, without proper consent→without users' permission으로 3개 요소를 모두 정확히 대응 전환함","translation":"사용자의 허가 없이 악용되거나, 불법 접근되거나, 공개될 수 있다"},{"text":"protected, secured, and stored with full user approval","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: misused/hacked의 부정적 행위를 protected/secured로 역전시키고, without consent를 with full approval로 반대 의미로 대체함","translation":"완전한 사용자 승인으로 보호되고, 안전하게 저장된다"},{"text":"collected voluntarily and used only for legitimate research purposes","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: 원문의 무단 사용·해킹 위험을 자발적 수집과 합법적 연구 사용으로 왜곡하여 비판적 함의를 완전히 제거함","translation":"자발적으로 수집되고 합법적인 연구 목적으로만 사용된다"}],"sourceQuestion":"1번 지문"},{"keyExpression":"consumers could suffer from financial losses due to errors","passage":"Furthermore, consumers could suffer from financial losses due to errors made by such payment systems.","passageTranslation":"더욱이 소비자들은 이러한 결제 시스템이 만들어낸 오류로 인해 금전적 손실을 겪을 수 있다.","qType":"correct","questionText":"'consumers could suffer from financial losses due to errors'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"companies gain financial benefits by correcting system errors quickly","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: 소비자의 손실을 기업의 이익으로 주체와 결과를 모두 역전시키고, suffer from을 gain으로 바꾸어 의미를 완전히 왜곡함","translation":"기업들이 시스템 오류를 빠르게 수정함으로써 금전적 이익을 얻는다"},{"text":"individuals risk losing money because of faults in the payment system","isCorrect":true,"optionType":"correct","explanation":"올바름: suffer from financial losses를 risk losing money로 paraphrasing하고 errors→faults in the payment system으로 구체화하여 의미 보존함","translation":"개인들이 결제 시스템의 결함으로 인해 돈을 잃을 위험에 처할 수 있다"},{"text":"users receive financial compensation when recognition errors occur","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: suffer from financial losses(손실 겪음)를 receive financial compensation(보상 받음)으로 의미를 역전시켜 원문의 위험 경고를 혜택으로 왜곡함","translation":"인식 오류가 발생할 때 사용자들이 금전적 보상을 받는다"}],"sourceQuestion":"1번 지문"},{"keyExpression":"rolled out services known as pay-by-face","passage":"Recently, banks and fin-tech firms have rolled out services known as pay-by-face, which allow transactions just by scanning the face.","passageTranslation":"최근 은행과 핀테크 기업들은 얼굴을 스캔하는 것만으로 거래를 가능하게 하는 '페이-바이-페이스'라고 알려진 서비스를 출시했다.","qType":"incorrect","questionText":"'rolled out services known as pay-by-face'을(를) 잘못 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"introduced face-scanning payment options to customers","isCorrect":false,"optionType":"correct","explanation":"올바름: roll out은 신규 서비스 출시를 의미하며, 안면 스캔 결제 옵션 도입으로 정확히 paraphrasing됨","translation":"고객들에게 안면 스캔 결제 옵션을 도입했다"},{"text":"tested experimental payment methods in limited regions","isCorrect":true,"optionType":"incorrect","explanation":"잘못됨: rolled out은 일반 대중 출시를 의미하나, limited regions의 실험적 테스트로 범위를 축소하여 의미 왜곡","translation":"제한된 지역에서 실험적 결제 방법을 시험했다"},{"text":"discontinued face-recognition payment features","isCorrect":true,"optionType":"incorrect","explanation":"잘못됨: roll out은 출시·도입인데 discontinued(중단)로 의미를 완전히 역전시킴","translation":"안면 인식 결제 기능을 중단했다"},{"text":"made face-based payment technology available to the public","isCorrect":false,"optionType":"correct","explanation":"올바름: rolled out의 핵심인 대중 공개·출시 의미를 made available to the public으로 구체화함","translation":"안면 기반 결제 기술을 대중에게 이용 가능하게 했다"},{"text":"launched new payment systems using facial scanning","isCorrect":false,"optionType":"correct","explanation":"올바름: rolled out을 launched로, pay-by-face를 facial scanning payment systems로 대응 전환하여 의미 보존","translation":"안면 스캔을 활용한 새로운 결제 시스템을 출시했다"}],"sourceQuestion":"1번 지문"},{"keyExpression":"the spread of germs can be greatly reduced","passage":"Because users do not need to touch screens, keypads, cash, or coins, the spread of germs can be greatly reduced. Supporters see this as especially beneficial in public spaces and during disease outbreaks.","passageTranslation":"사용자들이 화면, 키패드, 현금 또는 동전을 만질 필요가 없기 때문에, 세균의 확산이 크게 줄어들 수 있다. 지지자들은 이것이 공공장소와 질병 발생 시기에 특히 유익하다고 본다.","qType":"correct","questionText":"'the spread of germs can be greatly reduced'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"contamination from microorganisms can be substantially decreased","isCorrect":true,"optionType":"correct","explanation":"올바름: germs→microorganisms, spread→contamination(오염·전파), greatly→substantially로 학문적 수준의 어휘로 격상하여 paraphrasing함","translation":"미생물로 인한 오염이 실질적으로 감소할 수 있다"},{"text":"the risk of infectious disease spreading can be considerably lowered","isCorrect":true,"optionType":"correct","explanation":"올바름: germs를 infectious disease로 개념 확장하고, spread를 spreading으로, greatly reduced를 considerably lowered로 paraphrasing하여 의미 보존","translation":"전염병 확산 위험이 상당히 낮아질 수 있다"},{"text":"the number of bacteria present in public spaces will increase rapidly","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: reduced(감소)를 increase(증가)로 역전시키고, 결제 행위와의 인과관계를 삭제하여 의미를 왜곡함","translation":"공공장소에 존재하는 세균의 수가 빠르게 증가할 것이다"},{"text":"germs can be completely eliminated from all payment environments","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: greatly reduced는 부분적 감소를 의미하나, completely eliminated로 과장하여 전면 제거의 의미로 왜곡함","translation":"모든 결제 환경에서 세균이 완전히 제거될 수 있다"}],"sourceQuestion":"1번 지문"},{"keyExpression":"the benefits truly outweigh the risks","passage":"However, there are those who question whether the benefits truly outweigh the risks. This has led to debate about whether companies should adopt facial recognition payment systems.","passageTranslation":"그러나 이점이 진정으로 위험을 능가하는지를 의문시하는 사람들이 있다. 이는 기업들이 안면 인식 결제 시스템을 도입해야 하는지에 대한 논쟁으로 이어졌다.","qType":"correct","questionText":"'the benefits truly outweigh the risks'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"the advantages genuinely exceed the potential dangers","isCorrect":true,"optionType":"correct","explanation":"올바름: outweigh를 exceed로, risks를 potential dangers로 대응 전환하여 비교 우위 관계를 정확히 유지함","translation":"이점이 잠재적 위험을 진정으로 능가한다"},{"text":"the risks clearly surpass the potential benefits","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: 원문은 benefits가 risks를 능가한다는 의미인데, 주어와 목적어 관계를 역전시켜 risks가 benefits를 능가한다고 왜곡함","translation":"위험이 잠재적 이점을 명백히 능가한다"},{"text":"the benefits and risks are roughly equal in significance","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: outweigh는 한쪽의 명확한 우위를 나타내나, roughly equal로 균형 관계로 바꾸어 비교 우위 함의를 삭제함","translation":"이점과 위험은 중요성 면에서 대략 동등하다"},{"text":"the positive aspects really justify accepting the negative consequences","isCorrect":true,"optionType":"correct","explanation":"올바름: outweigh의 함축인 정당화·우위 관계를 justify accepting으로 논리적으로 재구성함","translation":"긍정적 측면이 부정적 결과를 받아들이는 것을 진정으로 정당화한다"}],"sourceQuestion":"1번 지문"},{"keyExpression":"when used alongside other behavior modification tactics and coping strategies","passage":"Although this technique alone will not produce changes, when used alongside other behavior modification tactics and coping strategies, behavioral changes have proved effective for some people.","passageTranslation":"비록 이 기법만으로는 변화를 만들어내지 못하지만, 다른 행동 수정 전술 및 대처 전략과 함께 사용될 때 행동 변화는 일부 사람들에게 효과적인 것으로 입증되었다.","qType":"correct","questionText":"'when used alongside other behavior modification tactics and coping strategies'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"in combination with additional techniques for changing and managing behavior","isCorrect":true,"optionType":"correct","explanation":"올바름: alongside→in combination with, behavior modification tactics→techniques for changing behavior, coping strategies→managing behavior으로 병렬 논리 유지","translation":"행동 변화 및 관리를 위한 추가적인 기법들과 결합될 때"},{"text":"only when it replaces all existing behavioral and coping methods","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: 원문의 alongside(함께)가 replaces(대체한다)로 바뀌어 공존이 아닌 대체의 의미로 논리 역전","translation":"기존의 모든 행동 및 대처 방법을 대체할 때만"},{"text":"before introducing any other form of behavioral intervention","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: 원문은 다른 전략들과 함께 사용하는 것을 의미하는데, before introducing(도입하기 전)으로 순서와 관계를 왜곡","translation":"다른 어떤 행동 개입 형태를 도입하기 전에"},{"text":"if paired with supplementary methods for behavioral adjustment and stress management","isCorrect":true,"optionType":"correct","explanation":"올바름: alongside→paired with, other→supplementary, behavior modification→behavioral adjustment, coping strategies→stress management으로 의미 보존하며 조건절 구조 재표현","translation":"행동 조정과 스트레스 관리를 위한 보완적 방법들과 짝지어진다면"}],"sourceQuestion":"4번 지문"},{"keyExpression":"specific, refined, and feedback-driven way","passage":"which allows doctors to talk to their patients in a specific, refined, and feedback-driven way that was not even possible a decade ago.","passageTranslation":"이는 의사들이 불과 10년 전에는 가능하지도 않았던 구체적이고 정제되며 피드백 중심의 방식으로 환자들과 대화할 수 있게 해준다.","qType":"incorrect","questionText":"'specific, refined, and feedback-driven way'을(를) 잘못 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"a spontaneous and unstructured conversation with minimal preparation","isCorrect":true,"optionType":"incorrect","explanation":"잘못됨: refined(정제된)를 unstructured(비구조적)로, specific을 minimal preparation(준비 최소화)으로 대체해 의미를 역전시킴","translation":"준비가 거의 없는 즉흥적이고 비구조적인 대화"},{"text":"a focused approach based on individual responses and careful analysis","isCorrect":false,"optionType":"correct","explanation":"올바름: feedback-driven을 based on individual responses로, refined를 careful analysis로 풀어서 의료 소통의 맞춤형 특성을 재현함","translation":"개인의 반응과 세심한 분석에 기반한 집중적 접근 방식"},{"text":"a targeted, precise, and data-informed manner of communication","isCorrect":false,"optionType":"correct","explanation":"올바름: specific을 targeted로, refined를 precise로, feedback-driven을 data-informed로 각각 대응시켜 세 가지 속성을 모두 유지함","translation":"목표 지향적이고 정밀하며 데이터에 근거한 소통 방식"},{"text":"a personalized and evidence-based style of medical interaction","isCorrect":false,"optionType":"correct","explanation":"올바름: specific+refined를 personalized로, feedback-driven을 evidence-based로 추상화해 맞춤형 근거 기반 의료 소통의 핵심을 유지함","translation":"개인 맞춤적이고 근거 기반의 의료 상호작용 방식"}],"sourceQuestion":"2번 지문"},{"keyExpression":"their own responses to emotional situations serve as a role model for emotion regulation","passage":"For example, their own responses to emotional situations serve as a role model for emotion regulation, increasing the likelihood that their children will show similar reactions in comparable situations.","passageTranslation":"예를 들어, 감정적 상황에 대한 부모 자신의 반응은 감정 조절의 역할 모델이 되어, 자녀들이 유사한 상황에서 비슷한 반응을 보일 가능성을 높인다.","qType":"correct","questionText":"'their own responses to emotional situations serve as a role model for emotion regulation'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"children spontaneously develop their own unique emotional coping strategies","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: 부모의 역할 모델 기능을 완전히 삭제하고 자녀가 독자적으로 감정 대처 전략을 개발한다는 반대 의미 생성","translation":"자녀들은 자발적으로 자신만의 고유한 감정 대처 전략을 발달시킨다"},{"text":"parents actively instruct children on which emotions are acceptable to display","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: serve as a role model(모범이 됨, 간접적 학습) → actively instruct(직접 지시)로 학습 방식이 암묵적→명시적으로 왜곡","translation":"부모는 어떤 감정을 표현해도 되는지 자녀에게 적극적으로 지시한다"},{"text":"the way parents handle emotional moments provides a pattern children tend to follow","isCorrect":true,"optionType":"correct","explanation":"올바름: responses → the way parents handle, role model → pattern children follow로 함축된 모방 관계를 명시적으로 표현","translation":"부모가 감정적인 순간을 다루는 방식은 자녀가 따르는 경향이 있는 패턴을 제공한다"}],"sourceQuestion":"5번 지문"},{"keyExpression":"especially beneficial in public spaces and during disease outbreaks","passage":"Advocates also claim that facial recognition payments are more hygienic than other payment options. Because users do not need to touch screens, keypads, cash, or coins, the spread of germs can be greatly reduced. Supporters see this as especially beneficial in public spaces and during disease outbreaks.","passageTranslation":"지지자들은 또한 안면 인식 결제가 다른 결제 옵션보다 더 위생적이라고 주장한다. 사용자들이 화면, 키패드, 현금 또는 동전을 만질 필요가 없기 때문에 세균의 확산이 크게 줄어들 수 있다. 지지자들은 이것이 공공장소와 질병 발생 시기에 특히 유익하다고 본다.","qType":"correct","questionText":"'especially beneficial in public spaces and during disease outbreaks'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"less effective in crowded places due to the high risk of infection","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: especially beneficial(특히 유익)을 less effective(덜 효과적)로 역전시키고 장점을 단점의 조건으로 바꾸어 의미를 왜곡함","translation":"높은 감염 위험으로 인해 혼잡한 장소에서 덜 효과적이다"},{"text":"only acceptable in private settings where disease transmission is unlikely","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: public spaces(공공 장소)를 private settings(사적 공간)로 역전시키고, disease outbreaks(발생)를 unlikely(가능성 없음)로 바꾸어 맥락을 왜곡함","translation":"질병 전파 가능성이 낮은 사적 환경에서만 허용 가능하다"},{"text":"most useful in communal areas and when infectious diseases are spreading widely","isCorrect":true,"optionType":"correct","explanation":"올바름: beneficial→useful, public spaces→communal areas로 전환하고 disease outbreaks를 조건절로 풀어 의미를 충실히 재현함","translation":"공동 구역에서, 그리고 전염병이 널리 퍼질 때 가장 유용하다"}],"sourceQuestion":"1번 지문"},{"keyExpression":"unless parental practices are adjusted","passage":"In consequence, adolescents might pull away from, rather than turn toward, their parents in times of emotional crisis, unless parental practices are adjusted.","passageTranslation":"그 결과, 부모의 양육 방식이 조정되지 않는다면, 청소년들은 감정적 위기 상황에서 부모에게 의지하기보다는 오히려 멀어질 수 있다.","qType":"correct","questionText":"'unless parental practices are adjusted'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"in the absence of changes to how parents engage with their adolescents","isCorrect":true,"optionType":"correct","explanation":"올바름: unless adjusted → in the absence of changes, parental practices → how parents engage로 전치사구로 구조 변환하며 조건의 의미 보존","translation":"부모가 청소년 자녀와 관계 맺는 방식에 변화가 없는 경우에"},{"text":"as soon as parents recognize the need to change their approach to child-rearing","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: unless(~하지 않으면, 부정 조건) → as soon as(~하자마자, 긍정 시간절)로 조건의 논리가 역전되어 원문과 반대 상황을 묘사","translation":"부모가 양육 방식을 바꿀 필요성을 인식하자마자"},{"text":"because parental guidance methods have already been successfully updated","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: unless adjusted(아직 조정 안 됨)를 already been updated(이미 업데이트됨)로 바꾸어 조건이 충족된 상황으로 왜곡하며 인과 구조도 변경","translation":"부모의 지도 방식이 이미 성공적으로 업데이트되었기 때문에"},{"text":"if parents do not modify the way they raise and respond to their children","isCorrect":true,"optionType":"correct","explanation":"올바름: unless → if not, parental practices are adjusted → parents do not modify the way they raise and respond로 조건절을 명시적 행위로 구체화하며 의미 유지","translation":"부모가 자녀를 양육하고 반응하는 방식을 수정하지 않는다면"}],"sourceQuestion":"5번 지문"},{"keyExpression":"parents remain the primary socialization agents","passage":"Although extra-familial influences, such as peers or media, gain in importance during adolescence, parents remain the primary socialization agents.","passageTranslation":"또래나 미디어 같은 가족 외적 영향이 청소년기에 중요성을 얻더라도, 부모는 여전히 주된 사회화 주체로 남는다.","qType":"correct","questionText":"'parents remain the primary socialization agents'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"parents continue to be the most influential figures in shaping social behavior","isCorrect":true,"optionType":"correct","explanation":"올바름: remain → continue to be, primary socialization agents → most influential figures in shaping social behavior로 의미 보존","translation":"부모는 사회적 행동을 형성하는 데 가장 영향력 있는 존재로 계속 남는다"},{"text":"parents sustain their dominant position as key transmitters of social norms","isCorrect":true,"optionType":"correct","explanation":"올바름: remain → sustain, primary → dominant, socialization agents → key transmitters of social norms로 논리 유지","translation":"부모는 사회적 규범의 핵심 전달자로서 지배적인 위치를 유지한다"},{"text":"peers gradually replace parents as the chief source of emotional guidance","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: parents remain primary → peers replace parents로 인과 역전 및 주체 교체, 지문에서는 또래의 영향력이 커져도 부모가 여전히 주된 역할임을 강조","translation":"또래가 점차 감정 지도의 주요 원천으로서 부모를 대체한다"},{"text":"parents become less central as adolescents gain independence","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: remain(여전히 유지) → become less central(덜 중심적이 됨)으로 의미 반전, 지문의 핵심 논지와 충돌","translation":"청소년이 독립성을 얻으면서 부모는 덜 중심적이 된다"}],"sourceQuestion":"5번 지문"},{"keyExpression":"huge implications for the management of time in everyday life","passage":"Potentially, therefore, it has huge implications for the management of time in everyday life, yet it is entirely overlooked in discussions of high-speed society.","passageTranslation":"따라서 잠재적으로 이것은 일상생활에서 시간 관리에 막대한 함의를 지니고 있지만, 고속 사회에 대한 논의에서는 완전히 간과되고 있다.","qType":"correct","questionText":"'huge implications for the management of time in everyday life'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"significant effects on the way individuals allocate time in their lives","isCorrect":true,"optionType":"correct","explanation":"올바름: 'implications'를 'effects'로, 'management of time'을 'allocate time'으로 바꿔 의미를 자연스럽게 재구성","translation":"개인이 삶에서 시간을 배분하는 방식에 중요한 영향을 미치는"},{"text":"clear and well-documented outcomes on national productivity statistics","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: '일상생활의 시간 관리'와 무관하게 '국가 생산성 통계'라는 구체적 측정 수치로 대체하여 의미 왜곡","translation":"국가 생산성 통계에 명확하고 잘 기록된 결과"},{"text":"major potential to reshape the structure of time use in ordinary life","isCorrect":true,"optionType":"correct","explanation":"올바름: 'huge implications'의 잠재적 영향력을 'major potential to reshape'으로, 'everyday life'를 'ordinary life'로 바꿔 의미 유지","translation":"일상생활에서 시간 사용 구조를 재편할 큰 잠재력을 지닌"},{"text":"minor and negligible effects on individual time preferences and habits","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: 'huge implications'(큰 함의)를 'minor and negligible effects'(사소하고 무시할 만한 영향)로 크기와 중요도를 역전","translation":"개인의 시간 선호와 습관에 미미하고 무시할 수 있는 영향"},{"text":"far-reaching consequences for how people organize their daily schedules","isCorrect":true,"optionType":"correct","explanation":"올바름: 'huge implications'를 'far-reaching consequences'로, 'management of time'을 'organize their daily schedules'로 구체화하여 의미 보존","translation":"사람들이 일상 일정을 조직하는 방식에 광범위한 결과를 미치는"}],"sourceQuestion":"3번 지문"},{"keyExpression":"they may intrude on adolescents' autonomy striving","passage":"Whereas direct soothing and directive guidance of what to do are beneficial for younger children, they may intrude on adolescents' autonomy striving.","passageTranslation":"직접적인 달래기와 무엇을 해야 할지에 대한 지시적 안내는 어린 자녀들에게는 유익하지만, 청소년의 자율성 추구를 침해할 수 있다.","qType":"incorrect","questionText":"'they may intrude on adolescents' autonomy striving'을(를) 잘못 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"these methods risk undermining teenagers' desire for independence","isCorrect":false,"optionType":"correct","explanation":"올바름: intrude on → risk undermining, autonomy striving → desire for independence로 함축 의미를 명시화하며 may의 가능성 뉘앙스 보존","translation":"이러한 방법들은 청소년들의 독립에 대한 욕구를 약화시킬 위험이 있다"},{"text":"they support adolescents in building a stronger sense of personal responsibility","isCorrect":true,"optionType":"incorrect","explanation":"잘못됨: intrude on(침해하다) → support(지지하다)로 의미가 정반대로 역전되어 원문의 부정적 결과를 긍정적으로 왜곡","translation":"그것들은 청소년들이 더 강한 개인적 책임감을 형성하는 데 도움을 준다"},{"text":"adolescents willingly accept parental direction as a guide for self-regulation","isCorrect":true,"optionType":"incorrect","explanation":"잘못됨: intrude on autonomy striving(자율성 침해)와 정반대로 청소년이 부모 지시를 기꺼이 수용한다는 의미로 왜곡","translation":"청소년들은 자기 조절의 지침으로 부모의 지시를 기꺼이 받아들인다"},{"text":"they might encroach upon the adolescent push for greater self-governance","isCorrect":false,"optionType":"correct","explanation":"올바름: intrude → encroach upon, autonomy striving → push for self-governance로 유사 강도의 표현으로 대체하며 원문 논리 구조 유지","translation":"그것들은 더 큰 자기 통치를 위한 청소년의 추구를 침범할 수 있다"},{"text":"such approaches can interfere with teenagers' efforts to become self-directed","isCorrect":false,"optionType":"correct","explanation":"올바름: intrude on → interfere with, autonomy striving → efforts to become self-directed로 추상 개념을 구체적 행위로 전환하며 의미 유지","translation":"그러한 접근 방식은 청소년들이 자기 주도적이 되려는 노력을 방해할 수 있다"}],"sourceQuestion":"5번 지문"},{"keyExpression":"misused, hacked, or shared without proper consent","passage":"Opponents worry this personal information could be misused, hacked, or shared without proper consent from the users.","passageTranslation":"반대론자들은 이 개인 정보가 사용자의 적절한 동의 없이 오용되거나, 해킹되거나, 공유될 수 있다고 우려한다.","qType":"incorrect","questionText":"'misused, hacked, or shared without proper consent'을(를) 잘못 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"used improperly, stolen by unauthorized parties, or passed on without agreement","isCorrect":false,"optionType":"correct","explanation":"올바름: 각 동사를 풀어쓰는 방식으로 구체화하여 세 가지 위험 유형의 의미를 충실히 전달함","translation":"부적절하게 사용되거나, 무단 당사자에 의해 도난당하거나, 동의 없이 전달될 수 있다"},{"text":"abused, breached, or distributed without authorization","isCorrect":false,"optionType":"correct","explanation":"올바름: misused→abused, hacked→breached(침해), without proper consent→without authorization으로 법적·보안적 함의를 유지하며 paraphrasing","translation":"허가 없이 남용되거나, 침해되거나, 배포될 수 있다"},{"text":"protected, secured, and stored with full user approval","isCorrect":true,"optionType":"incorrect","explanation":"잘못됨: misused/hacked의 부정적 행위를 protected/secured로 역전시키고, without consent를 with full approval로 반대 의미로 대체함","translation":"완전한 사용자 승인으로 보호되고, 안전하게 저장된다"},{"text":"exploited, illegally accessed, or disclosed without users' permission","isCorrect":false,"optionType":"correct","explanation":"올바름: misused→exploited, hacked→illegally accessed, without proper consent→without users' permission으로 3개 요소를 모두 정확히 대응 전환함","translation":"사용자의 허가 없이 악용되거나, 불법 접근되거나, 공개될 수 있다"}],"sourceQuestion":"1번 지문"},{"keyExpression":"specific, refined, and feedback-driven way","passage":"which allows doctors to talk to their patients in a specific, refined, and feedback-driven way that was not even possible a decade ago.","passageTranslation":"이는 의사들이 불과 10년 전에는 가능하지도 않았던 구체적이고 정제되며 피드백 중심의 방식으로 환자들과 대화할 수 있게 해준다.","qType":"correct","questionText":"'specific, refined, and feedback-driven way'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"a targeted, precise, and data-informed manner of communication","isCorrect":true,"optionType":"correct","explanation":"올바름: specific을 targeted로, refined를 precise로, feedback-driven을 data-informed로 각각 대응시켜 세 가지 속성을 모두 유지함","translation":"목표 지향적이고 정밀하며 데이터에 근거한 소통 방식"},{"text":"a spontaneous and unstructured conversation with minimal preparation","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: refined(정제된)를 unstructured(비구조적)로, specific을 minimal preparation(준비 최소화)으로 대체해 의미를 역전시킴","translation":"준비가 거의 없는 즉흥적이고 비구조적인 대화"},{"text":"a general and intuitive approach that ignores patient responses","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: specific(구체적)을 general(일반적)로, feedback-driven을 ignores patient responses로 대체해 세 가지 속성을 모두 부정함","translation":"환자 반응을 무시하는 일반적이고 직관적인 접근 방식"}],"sourceQuestion":"2번 지문"},{"keyExpression":"a classic time-shifting device","passage":"This technology might be thought of as a classic time-shifting device, as it enables mothers to exercise more control over the timing of feeding.","passageTranslation":"이 기술은 어머니들이 수유 시간을 더 잘 통제할 수 있게 해준다는 점에서 고전적인 시간 이동 장치로 생각될 수 있다.","qType":"correct","questionText":"'a classic time-shifting device'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"a machine designed primarily to speed up the pace of daily tasks","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: 'time-shifting'(시간 이동·조정)을 'speed up'(속도 증가)으로 혼동하여 의미 왜곡","translation":"일상적 작업의 속도를 높이기 위해 주로 설계된 기계"},{"text":"a device that permanently eliminates the need for scheduled routines","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: 'time-shifting'은 일정을 조정하는 것인데, 'eliminates the need for scheduled routines'(정해진 일과의 필요성을 없앰)로 의미 과장·왜곡","translation":"정해진 일과의 필요성을 영구적으로 없애는 기기"},{"text":"something that enables people to control when certain actions occur","isCorrect":true,"optionType":"correct","explanation":"올바름: 'time-shifting device'의 기능적 의미를 'enables people to control when certain actions occur'로 풀어 의미 유지","translation":"특정 행동이 일어나는 시간을 사람들이 통제할 수 있게 해주는 것"}],"sourceQuestion":"3번 지문"},{"keyExpression":"strap a brick to the accelerator","passage":"If you had wanted to create a 'self-driving' car in the 1950s, your best option might have been to strap a brick to the accelerator.","passageTranslation":"만약 1950년대에 '자율주행' 자동차를 만들고 싶었다면, 당신의 최선책은 벽돌을 가속 페달에 묶는 것이었을지도 모른다.","qType":"correct","questionText":"'strap a brick to the accelerator'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"develop a fully automated and reliable driving method","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: 원문의 핵심은 자동화의 실패와 한계인데, 이 표현은 완전 자동화되고 신뢰할 수 있는 방법이라는 의미로 인과를 역전시킴","translation":"완전히 자동화되고 신뢰할 수 있는 운전 방법을 개발하다"},{"text":"use a primitive method that forces motion without any control","isCorrect":true,"optionType":"correct","explanation":"올바름: 브레이크나 방향 제어 없이 전진만 강제하는 원시적 방법을 정확히 묘사함","translation":"통제 없이 움직임만 강제하는 원시적인 방법을 사용하다"},{"text":"implement a sophisticated system to accelerate safely","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: 원문은 조잡하고 위험한 방법을 묘사하는데, 이 표현은 정교하고 안전한 시스템을 의미해 정반대 뉘앙스임","translation":"안전하게 가속하기 위한 정교한 시스템을 구현하다"}],"sourceQuestion":"2번 지문"},{"keyExpression":"What mental imagery does is reinforce a new desired behavior","passage":"What mental imagery does is reinforce a new desired behavior. Repeated use of images reinforces the desired behavior more strongly over time.","passageTranslation":"심상(心象)이 하는 일은 새롭게 바라는 행동을 강화하는 것이다. 이미지를 반복적으로 사용하면 시간이 지남에 따라 바라는 행동을 더욱 강하게 강화한다.","qType":"correct","questionText":"'What mental imagery does is reinforce a new desired behavior'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"mental images serve to consolidate the behavior a person aims to establish","isCorrect":true,"optionType":"correct","explanation":"올바름: reinforce→consolidate, new desired behavior→behavior a person aims to establish로 동사구를 재구성하며 의미 보존","translation":"심상은 사람이 확립하고자 하는 행동을 공고히 하는 역할을 한다"},{"text":"visualization introduces entirely new desires that replace personal goals","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: 원문은 이미 desired(바라는) 행동을 reinforce(강화)하는 것인데, replace personal goals(개인 목표를 대체)로 기존 욕구를 대체하는 것처럼 의미를 왜곡","translation":"심상화는 개인의 목표를 대체하는 전혀 새로운 욕구를 도입한다"},{"text":"mental imagery helps individuals forget their existing negative behaviors","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: 원문은 reinforce a new desired behavior(새로운 바람직한 행동 강화)인데, forget existing negative behaviors(기존 부정적 행동 잊기)로 대상과 작용을 모두 왜곡","translation":"심상화는 개인이 기존의 부정적 행동을 잊도록 돕는다"}],"sourceQuestion":"4번 지문"},{"keyExpression":"direct soothing and directive guidance of what to do are beneficial for younger children","passage":"Whereas direct soothing and directive guidance of what to do are beneficial for younger children, they may intrude on adolescents' autonomy striving.","passageTranslation":"직접적인 달래기와 무엇을 해야 할지에 대한 지시적 안내는 어린 자녀들에게는 유익하지만, 청소년의 자율성 추구를 침해할 수 있다.","qType":"correct","questionText":"'direct soothing and directive guidance of what to do are beneficial for younger children'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"giving young children full freedom to manage their emotions without parental intervention","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: direct soothing and directive guidance(적극적 개입)를 no parental intervention(개입 없음)으로 정반대 의미로 왜곡","translation":"어린 자녀들에게 부모의 개입 없이 감정을 스스로 관리할 완전한 자유를 부여한다"},{"text":"calming children directly and telling them exactly what steps to take proves useful at an early age","isCorrect":true,"optionType":"correct","explanation":"올바름: direct soothing → calming directly, directive guidance → telling exactly what steps to take로 행위 수준으로 구체화하며 younger children → at an early age 대응","translation":"자녀를 직접 달래고 취해야 할 단계를 정확히 알려주는 것이 어린 나이에 유용함이 입증된다"},{"text":"offering immediate comfort and explicit instructions helps younger children effectively","isCorrect":true,"optionType":"correct","explanation":"올바름: direct soothing → immediate comfort, directive guidance of what to do → explicit instructions로 구체화하며 beneficial → helps effectively 유지","translation":"즉각적인 위안과 명확한 지시를 제공하는 것은 어린 자녀들에게 효과적으로 도움이 된다"},{"text":"hands-on reassurance and step-by-step direction suit the needs of young children well","isCorrect":true,"optionType":"correct","explanation":"올바름: direct soothing → hands-on reassurance, directive guidance → step-by-step direction, beneficial → suit the needs well로 논리 구조 보존","translation":"직접적인 안심과 단계별 지도는 어린 자녀들의 필요에 잘 맞는다"},{"text":"structured emotional coaching is more effective for teenagers than for younger children","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: beneficial for younger children이라는 원문을 teenagers에게 더 효과적이라는 반대 진술로 역전시켜 의미 왜곡","translation":"체계적인 감정 코칭은 어린 자녀보다 청소년에게 더 효과적이다"}],"sourceQuestion":"5번 지문"},{"keyExpression":"the key to addressing negative health habits is to change behavior","passage":"For years, many psychologists have held strongly to the belief that the key to addressing negative health habits is to change behavior.","passageTranslation":"수년간 많은 심리학자들은 부정적인 건강 습관을 다루는 핵심이 행동을 바꾸는 것이라는 믿음을 강하게 고수해 왔다.","qType":"incorrect","questionText":"'the key to addressing negative health habits is to change behavior'을(를) 잘못 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"recognizing the cause of negative habits is the first step to recovery","isCorrect":true,"optionType":"incorrect","explanation":"잘못됨: 원문의 핵심은 behavior change(행동 변화)인데, 원인 파악(recognizing the cause)으로 대체하여 인과 논리 전환","translation":"부정적 습관의 원인을 인식하는 것이 회복의 첫 단계이다"},{"text":"modifying conduct is central to tackling harmful routines","isCorrect":false,"optionType":"correct","explanation":"올바름: address→tackle, negative health habits→harmful routines, change behavior→modifying conduct으로 동일 논리 구조 유지","translation":"해로운 습관을 다루는 데 있어 행동 수정이 핵심이다"},{"text":"altering one's actions is the core solution to unhealthy patterns","isCorrect":false,"optionType":"correct","explanation":"올바름: key→core solution, change behavior→altering actions, negative health habits→unhealthy patterns으로 의미 보존","translation":"건강에 해로운 패턴에 대한 핵심 해결책은 행동을 바꾸는 것이다"},{"text":"behavioral adjustment serves as the primary means of overcoming bad health habits","isCorrect":false,"optionType":"correct","explanation":"올바름: change behavior→behavioral adjustment, key→primary means, addressing→overcoming으로 함의 유지","translation":"행동 조정이 나쁜 건강 습관을 극복하는 주된 수단이 된다"},{"text":"shifting one's mindset alone is sufficient to eliminate bad habits","isCorrect":true,"optionType":"incorrect","explanation":"잘못됨: 원문은 behavior(행동) 변화를 강조하는데, mindset(사고방식) 변화로 대체하여 핵심 개념 왜곡","translation":"사고방식의 전환만으로도 나쁜 습관을 없애기에 충분하다"}],"sourceQuestion":"4번 지문"},{"keyExpression":"we did not yet have the tools we now possess","passage":"No, it only means that at the time we did not yet have the tools we now possess to help enable vehicles to operate both autonomously and safely.","passageTranslation":"아니다, 그것은 단지 당시에 우리가 차량이 자율적이면서도 안전하게 작동할 수 있도록 돕는 지금 우리가 보유한 도구들을 아직 갖추지 못했음을 의미할 뿐이다.","qType":"correct","questionText":"'we did not yet have the tools we now possess'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"the technology required for the task had not yet been developed","isCorrect":true,"optionType":"correct","explanation":"올바름: tools를 technology required로, did not yet have를 had not yet been developed로 바꾸어 당시 기술적 부재를 구체적으로 재표현함","translation":"그 과제에 필요한 기술이 아직 개발되지 않았었다"},{"text":"we deliberately chose not to use the tools already available","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: 도구의 부재(did not yet have)를 의도적인 사용 거부(deliberately chose not to use)로 대체해 원인을 능력 부재에서 의지 결여로 왜곡함","translation":"우리는 이미 이용 가능한 도구를 의도적으로 사용하지 않기로 선택했다"},{"text":"the tools we had then were superior to what we have now","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: 과거의 도구 부재를 과거 도구가 현재보다 우월했다는 의미로 역전시켜 기술 발전의 방향성을 완전히 왜곡함","translation":"당시 우리가 보유했던 도구가 지금 우리가 가진 것보다 우수했다"}],"sourceQuestion":"2번 지문"},{"keyExpression":"Repeated use of images reinforces the desired behavior more strongly over time","passage":"What mental imagery does is reinforce a new desired behavior. Repeated use of images reinforces the desired behavior more strongly over time.","passageTranslation":"심상(心象)이 하는 일은 새롭게 바라는 행동을 강화하는 것이다. 이미지를 반복적으로 사용하면 시간이 지남에 따라 바라는 행동을 더욱 강하게 강화한다.","qType":"incorrect","questionText":"'Repeated use of images reinforces the desired behavior more strongly over time'을(를) 잘못 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"consistent application of visualization progressively consolidates target conduct","isCorrect":false,"optionType":"correct","explanation":"올바름: repeated use→consistent application, images→visualization, reinforces more strongly over time→progressively consolidates로 시간적 축적 논리 유지","translation":"심상화의 일관된 적용은 목표 행동을 점진적으로 공고히 한다"},{"text":"habitual practice of imagery cumulatively deepens the entrenchment of a desired action","isCorrect":false,"optionType":"correct","explanation":"올바름: repeated use→habitual practice, more strongly over time→cumulatively deepens, reinforces desired behavior→entrenchment of desired action으로 추상↔구체 전환하며 함의 유지","translation":"심상의 습관적 실천은 원하는 행동의 고착화를 누적적으로 심화시킨다"},{"text":"the more frequently mental images are employed, the stronger the behavioral reinforcement becomes","isCorrect":false,"optionType":"correct","explanation":"올바름: repeated use→more frequently employed, reinforces more strongly over time→stronger reinforcement becomes로 비교 구조로 재표현하며 의미 보존","translation":"심상이 더 자주 활용될수록 행동 강화는 더욱 강해진다"},{"text":"using images too frequently can weaken the effect of behavioral therapy","isCorrect":true,"optionType":"incorrect","explanation":"잘못됨: 원문은 반복 사용이 reinforces more strongly(더욱 강하게 강화)한다고 하는데, too frequently can weaken(너무 자주 하면 약화된다)으로 인과 관계를 역전","translation":"이미지를 너무 자주 사용하면 행동 치료의 효과가 약화될 수 있다"}],"sourceQuestion":"4번 지문"},{"keyExpression":"specific, refined, and feedback-driven way","passage":"which allows doctors to talk to their patients in a specific, refined, and feedback-driven way that was not even possible a decade ago.","passageTranslation":"이는 의사들이 불과 10년 전에는 가능하지도 않았던 구체적이고 정제되며 피드백 중심의 방식으로 환자들과 대화할 수 있게 해준다.","qType":"correct","questionText":"'specific, refined, and feedback-driven way'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"a general and intuitive approach that ignores patient responses","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: specific(구체적)을 general(일반적)로, feedback-driven을 ignores patient responses로 대체해 세 가지 속성을 모두 부정함","translation":"환자 반응을 무시하는 일반적이고 직관적인 접근 방식"},{"text":"a spontaneous and unstructured conversation with minimal preparation","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: refined(정제된)를 unstructured(비구조적)로, specific을 minimal preparation(준비 최소화)으로 대체해 의미를 역전시킴","translation":"준비가 거의 없는 즉흥적이고 비구조적인 대화"},{"text":"a focused approach based on individual responses and careful analysis","isCorrect":true,"optionType":"correct","explanation":"올바름: feedback-driven을 based on individual responses로, refined를 careful analysis로 풀어서 의료 소통의 맞춤형 특성을 재현함","translation":"개인의 반응과 세심한 분석에 기반한 집중적 접근 방식"}],"sourceQuestion":"2번 지문"},{"keyExpression":"strap a brick to the accelerator","passage":"If you had wanted to create a 'self-driving' car in the 1950s, your best option might have been to strap a brick to the accelerator.","passageTranslation":"만약 1950년대에 '자율주행' 자동차를 만들고 싶었다면, 당신의 최선책은 벽돌을 가속 페달에 묶는 것이었을지도 모른다.","qType":"correct","questionText":"'strap a brick to the accelerator'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"develop a fully automated and reliable driving method","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: 원문의 핵심은 자동화의 실패와 한계인데, 이 표현은 완전 자동화되고 신뢰할 수 있는 방법이라는 의미로 인과를 역전시킴","translation":"완전히 자동화되고 신뢰할 수 있는 운전 방법을 개발하다"},{"text":"implement a sophisticated system to accelerate safely","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: 원문은 조잡하고 위험한 방법을 묘사하는데, 이 표현은 정교하고 안전한 시스템을 의미해 정반대 뉘앙스임","translation":"안전하게 가속하기 위한 정교한 시스템을 구현하다"},{"text":"adopt a rough solution that lacks safety and precision","isCorrect":true,"optionType":"correct","explanation":"올바름: 안전성과 정밀성이 결여된 거친 해결책이라는 함의를 정확히 포착함","translation":"안전성과 정밀성이 부족한 거친 해결책을 채택하다"}],"sourceQuestion":"2번 지문"},{"keyExpression":"when used alongside other behavior modification tactics and coping strategies","passage":"Although this technique alone will not produce changes, when used alongside other behavior modification tactics and coping strategies, behavioral changes have proved effective for some people.","passageTranslation":"비록 이 기법만으로는 변화를 만들어내지 못하지만, 다른 행동 수정 전술 및 대처 전략과 함께 사용될 때 행동 변화는 일부 사람들에게 효과적인 것으로 입증되었다.","qType":"incorrect","questionText":"'when used alongside other behavior modification tactics and coping strategies'을(를) 잘못 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"only when it replaces all existing behavioral and coping methods","isCorrect":true,"optionType":"incorrect","explanation":"잘못됨: 원문의 alongside(함께)가 replaces(대체한다)로 바뀌어 공존이 아닌 대체의 의미로 논리 역전","translation":"기존의 모든 행동 및 대처 방법을 대체할 때만"},{"text":"in combination with additional techniques for changing and managing behavior","isCorrect":false,"optionType":"correct","explanation":"올바름: alongside→in combination with, behavior modification tactics→techniques for changing behavior, coping strategies→managing behavior으로 병렬 논리 유지","translation":"행동 변화 및 관리를 위한 추가적인 기법들과 결합될 때"},{"text":"when applied together with other strategies aimed at altering habits and handling difficulties","isCorrect":false,"optionType":"correct","explanation":"올바름: alongside→together with, behavior modification tactics→strategies aimed at altering habits, coping strategies→handling difficulties로 구체화하며 의미 유지","translation":"습관 변화와 어려움 극복을 목표로 하는 다른 전략들과 함께 적용될 때"},{"text":"if paired with supplementary methods for behavioral adjustment and stress management","isCorrect":false,"optionType":"correct","explanation":"올바름: alongside→paired with, other→supplementary, behavior modification→behavioral adjustment, coping strategies→stress management으로 의미 보존하며 조건절 구조 재표현","translation":"행동 조정과 스트레스 관리를 위한 보완적 방법들과 짝지어진다면"},{"text":"before introducing any other form of behavioral intervention","isCorrect":true,"optionType":"incorrect","explanation":"잘못됨: 원문은 다른 전략들과 함께 사용하는 것을 의미하는데, before introducing(도입하기 전)으로 순서와 관계를 왜곡","translation":"다른 어떤 행동 개입 형태를 도입하기 전에"}],"sourceQuestion":"4번 지문"},{"keyExpression":"increasing the likelihood that their children will show similar reactions in comparable situations","passage":"For example, their own responses to emotional situations serve as a role model for emotion regulation, increasing the likelihood that their children will show similar reactions in comparable situations.","passageTranslation":"예를 들어, 감정적 상황에 대한 부모 자신의 반응은 감정 조절의 역할 모델이 되어, 자녀들이 유사한 상황에서 비슷한 반응을 보일 가능성을 높인다.","qType":"correct","questionText":"'increasing the likelihood that their children will show similar reactions in comparable situations'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"reducing the chance that children develop emotional responses different from their parents","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: 표면적으로는 유사하나 increasing likelihood(가능성 증가)를 reducing chance(가능성 감소)로 반전시켜 논리를 왜곡","translation":"자녀들이 부모와 다른 감정 반응을 발달시킬 가능성을 줄인다"},{"text":"ensuring children will always react identically to their parents in every situation","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: likelihood(확률적 가능성)를 always(항상)로 과잉 일반화하여 확률적 진술을 절대적 사실로 왜곡","translation":"자녀들이 모든 상황에서 항상 부모와 똑같이 반응할 것을 보장한다"},{"text":"boosting the chance that children adopt the same emotional patterns when facing like situations","isCorrect":true,"optionType":"correct","explanation":"올바름: increasing → boosting, show similar reactions → adopt the same emotional patterns으로 구체화하며 논리 구조 보존","translation":"유사한 상황에 직면할 때 자녀들이 동일한 감정 패턴을 채택할 가능성을 높인다"}],"sourceQuestion":"5번 지문"},{"keyExpression":"parents remain the primary socialization agents","passage":"Although extra-familial influences, such as peers or media, gain in importance during adolescence, parents remain the primary socialization agents.","passageTranslation":"또래나 미디어 같은 가족 외적 영향이 청소년기에 중요성을 얻더라도, 부모는 여전히 주된 사회화 주체로 남는다.","qType":"incorrect","questionText":"'parents remain the primary socialization agents'을(를) 잘못 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"parents sustain their dominant position as key transmitters of social norms","isCorrect":false,"optionType":"correct","explanation":"올바름: remain → sustain, primary → dominant, socialization agents → key transmitters of social norms로 논리 유지","translation":"부모는 사회적 규범의 핵심 전달자로서 지배적인 위치를 유지한다"},{"text":"parents become less central as adolescents gain independence","isCorrect":true,"optionType":"incorrect","explanation":"잘못됨: remain(여전히 유지) → become less central(덜 중심적이 됨)으로 의미 반전, 지문의 핵심 논지와 충돌","translation":"청소년이 독립성을 얻으면서 부모는 덜 중심적이 된다"},{"text":"mothers and fathers still hold the central role in guiding emotional and social learning","isCorrect":false,"optionType":"correct","explanation":"올바름: parents → mothers and fathers, primary → central role, socialization agents → guiding emotional and social learning으로 구체화","translation":"어머니와 아버지는 여전히 감정적·사회적 학습을 안내하는 중심 역할을 맡는다"},{"text":"parents continue to be the most influential figures in shaping social behavior","isCorrect":false,"optionType":"correct","explanation":"올바름: remain → continue to be, primary socialization agents → most influential figures in shaping social behavior로 의미 보존","translation":"부모는 사회적 행동을 형성하는 데 가장 영향력 있는 존재로 계속 남는다"}],"sourceQuestion":"5번 지문"},{"keyExpression":"This, more than values and attitudes, is the part of personality that is easiest to change","passage":"This, more than values and attitudes, is the part of personality that is easiest to change.","passageTranslation":"이것(행동)은 가치관이나 태도보다 성격에서 변화시키기 가장 쉬운 부분이다.","qType":"incorrect","questionText":"'This, more than values and attitudes, is the part of personality that is easiest to change'을(를) 잘못 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"behavior is more readily modified than one's values or attitudes","isCorrect":false,"optionType":"correct","explanation":"올바름: easiest to change→more readily modified, more than values and attitudes→보다 쉽게 변한다는 비교 의미 유지","translation":"행동은 가치관이나 태도보다 더 쉽게 수정된다"},{"text":"among personality components, behavior is the most malleable element","isCorrect":false,"optionType":"correct","explanation":"올바름: easiest to change→most malleable, part of personality→personality component로 추상적 개념을 적절히 재표현","translation":"성격 요소들 중에서 행동이 가장 유연하게 변할 수 있는 요소이다"},{"text":"personality traits are equally difficult to change regardless of type","isCorrect":true,"optionType":"incorrect","explanation":"잘못됨: 원문은 behavior가 가장 쉽게 변한다는 차별성을 강조하는데, equally difficult(동등하게 어렵다)로 역전시킴","translation":"성격 특성은 유형에 관계없이 변화시키기 동등하게 어렵다"},{"text":"conduct proves simpler to alter than deeply held values or attitudes","isCorrect":false,"optionType":"correct","explanation":"올바름: behavior→conduct, easiest to change→simpler to alter, values and attitudes→deeply held values로 함의 강화하며 의미 보존","translation":"행동은 깊이 자리 잡은 가치관이나 태도보다 바꾸기 더 쉬운 것으로 드러난다"}],"sourceQuestion":"4번 지문"},{"keyExpression":"consumers could suffer from financial losses due to errors","passage":"Furthermore, consumers could suffer from financial losses due to errors made by such payment systems.","passageTranslation":"더욱이 소비자들은 이러한 결제 시스템이 만들어낸 오류로 인해 금전적 손실을 겪을 수 있다.","qType":"correct","questionText":"'consumers could suffer from financial losses due to errors'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"companies gain financial benefits by correcting system errors quickly","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: 소비자의 손실을 기업의 이익으로 주체와 결과를 모두 역전시키고, suffer from을 gain으로 바꾸어 의미를 완전히 왜곡함","translation":"기업들이 시스템 오류를 빠르게 수정함으로써 금전적 이익을 얻는다"},{"text":"customers might face economic harm resulting from technological inaccuracies","isCorrect":true,"optionType":"correct","explanation":"올바름: consumers→customers, financial losses→economic harm, errors→technological inaccuracies로 전환하고 due to→resulting from으로 인과 표현을 유지함","translation":"고객들이 기술적 부정확성으로 인한 경제적 피해에 직면할 수 있다"},{"text":"users receive financial compensation when recognition errors occur","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: suffer from financial losses(손실 겪음)를 receive financial compensation(보상 받음)으로 의미를 역전시켜 원문의 위험 경고를 혜택으로 왜곡함","translation":"인식 오류가 발생할 때 사용자들이 금전적 보상을 받는다"}],"sourceQuestion":"1번 지문"},{"keyExpression":"overrate the impact of new technologies","passage":"We tend to overrate the impact of new technologies in part because older technologies have become absorbed into the furniture of our lives.","passageTranslation":"우리는 새로운 기술의 영향력을 과대평가하는 경향이 있는데, 이는 부분적으로 오래된 기술들이 우리 삶의 일부에 흡수되었기 때문이다.","qType":"incorrect","questionText":"'overrate the impact of new technologies'을(를) 잘못 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"underestimate the potential risks associated with emerging technologies","isCorrect":true,"optionType":"incorrect","explanation":"잘못됨: 'overrate'(과대평가)를 'underestimate'(과소평가)로 반전시키고 대상도 'risks'로 바꿔 의미 변질","translation":"신기술과 관련된 잠재적 위험을 과소평가하다"},{"text":"place too much emphasis on the significance of recent inventions","isCorrect":false,"optionType":"correct","explanation":"올바름: 'overrate'를 'place too much emphasis on'으로, 'new technologies'를 'recent inventions'로 바꿔 의미 유지","translation":"최근 발명품들의 중요성에 지나치게 큰 비중을 두다"},{"text":"exaggerate how much new technologies actually change our lives","isCorrect":false,"optionType":"correct","explanation":"올바름: 'overrate the impact'를 'exaggerate how much ~ change'로 구체적 행위 표현으로 전환","translation":"새로운 기술이 실제로 우리 삶을 얼마나 변화시키는지를 과장하다"},{"text":"assign greater importance to modern innovations than they deserve","isCorrect":false,"optionType":"correct","explanation":"올바름: 'overrate'의 논리 구조(실제보다 높이 평가)를 'assign greater importance than they deserve'로 명확히 재구성","translation":"현대적 혁신에 실제보다 더 큰 중요성을 부여하다"}],"sourceQuestion":"3번 지문"},{"keyExpression":"unless parental practices are adjusted","passage":"In consequence, adolescents might pull away from, rather than turn toward, their parents in times of emotional crisis, unless parental practices are adjusted.","passageTranslation":"그 결과, 부모의 양육 방식이 조정되지 않는다면, 청소년들은 감정적 위기 상황에서 부모에게 의지하기보다는 오히려 멀어질 수 있다.","qType":"correct","questionText":"'unless parental practices are adjusted'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"because parental guidance methods have already been successfully updated","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: unless adjusted(아직 조정 안 됨)를 already been updated(이미 업데이트됨)로 바꾸어 조건이 충족된 상황으로 왜곡하며 인과 구조도 변경","translation":"부모의 지도 방식이 이미 성공적으로 업데이트되었기 때문에"},{"text":"provided that parenting strategies remain unchanged and unresponsive to new demands","isCorrect":true,"optionType":"correct","explanation":"올바름: unless adjusted(조정되지 않으면) → provided that strategies remain unchanged로 조건 의미를 보존하며 unresponsive to new demands로 함축 추론 추가","translation":"양육 전략이 변화 없이 새로운 요구에 반응하지 않는 상태로 유지된다면"},{"text":"as soon as parents recognize the need to change their approach to child-rearing","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: unless(~하지 않으면, 부정 조건) → as soon as(~하자마자, 긍정 시간절)로 조건의 논리가 역전되어 원문과 반대 상황을 묘사","translation":"부모가 양육 방식을 바꿀 필요성을 인식하자마자"}],"sourceQuestion":"5번 지문"},{"keyExpression":"It is much the same story in medicine","passage":"It is much the same story in medicine. Two decades ago, we were still taping bricks to accelerators.","passageTranslation":"의학에서도 이와 매우 유사한 이야기가 펼쳐진다. 20년 전에는 우리는 여전히 가속 페달에 벽돌을 테이프로 붙이고 있었다.","qType":"correct","questionText":"'It is much the same story in medicine'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"medicine has always been ahead of automotive technology","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: 지문은 두 분야가 유사한 발전 경로를 공유한다고 말하는데, 의료가 항상 앞서 있었다는 것은 비교 관계를 왜곡함","translation":"의학은 항상 자동차 기술보다 앞서 있었다"},{"text":"healthcare has followed the same path from limitation to advancement","isCorrect":true,"optionType":"correct","explanation":"올바름: 한계(brick to accelerator 단계)에서 발전으로의 동일한 경로를 의료에 적용한 논리 구조 변환임","translation":"의료 분야도 한계에서 발전으로의 동일한 경로를 따라왔다"},{"text":"medicine has undergone a similar trajectory of technological progress","isCorrect":true,"optionType":"correct","explanation":"올바름: 자율주행차 기술 발전과 같은 궤적(trajectory)을 의료 기술도 걸어왔다는 비교 함의를 유지함","translation":"의학도 유사한 기술 진보의 궤적을 걸어왔다"},{"text":"the medical field faces entirely different challenges from those in technology","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: 유사성(much the same)을 완전히 다른 도전(entirely different challenges)으로 대체해 비교 구조를 역전시킴","translation":"의료 분야는 기술 분야와는 전혀 다른 과제에 직면해 있다"},{"text":"a parallel pattern of development exists in the medical field","isCorrect":true,"optionType":"correct","explanation":"올바름: much the same story를 parallel pattern으로 변
