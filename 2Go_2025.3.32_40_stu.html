<script>
var CONFIG={"title":"2Go_2025.3.32_40_stu","passThreshold":80,"showCountHint":true,"questions":[{"keyExpression":"borrowing of words or constructions goes mostly or entirely in one direction","passage":"Quite often the interaction between groups is socially unequal, and this is reflected in the fact that in many cases borrowing of words or constructions goes mostly or entirely in one direction, from the more powerful or prestigious group to the less favored one.","passageTranslation":"집단 간 상호작용은 사회적으로 불평등한 경우가 매우 많으며, 이는 많은 경우 단어나 구문의 차용이 더 강력하거나 위세 있는 집단에서 덜 선호되는 집단 쪽으로 대부분 또는 전적으로 한 방향으로만 이루어진다는 사실에 반영되어 있다.","qType":"correct","questionText":"'borrowing of words or constructions goes mostly or entirely in one direction'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"both groups exchange words and structures reciprocally","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: one direction을 reciprocal(상호적)로 반전시켜 쌍방 교류로 의미 왜곡","translation":"두 집단이 단어와 구조를 상호적으로 교환함"},{"text":"only one group tends to absorb vocabulary from the other","isCorrect":true,"optionType":"correct","explanation":"올바름: 단방향 차용을 한 집단만 흡수한다는 구체적 행위로 전환","translation":"오직 한 집단만이 상대방으로부터 어휘를 흡수하는 경향이 있음"},{"text":"language adoption is largely a one-sided process between groups","isCorrect":true,"optionType":"correct","explanation":"올바름: borrowing goes in one direction을 one-sided process로 함축 재구성, 의미 보존","translation":"언어 채택은 집단 간에 대체로 일방적인 과정임"},{"text":"language borrowing occurs randomly with no clear pattern","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: 명확한 단방향성을 무작위적·무패턴으로 왜곡","translation":"언어 차용은 뚜렷한 패턴 없이 무작위로 발생함"}],"sourceQuestion":"3번 지문"},{"keyExpression":"consistently succeed in their scientific endeavors simply because they're exceptionally talented","passage":"Great scientists have multiple hits and consistently succeed in their scientific endeavors simply because they're exceptionally talented.","passageTranslation":"위대한 과학자들은 여러 번의 성공을 거두고 자신의 과학적 노력에서 지속적으로 성공을 거두는데, 이는 단순히 그들이 예외적으로 재능이 있기 때문이다.","qType":"correct","questionText":"'consistently succeed in their scientific endeavors simply because they're exceptionally talented'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"succeed repeatedly in science because of advantages from prior wins","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: simply because talented(재능 때문)를 advantages from prior wins(이전 성공의 이점 때문)로 바꾸어 Matthew effect 설명으로 혼동시킴","translation":"이전 성공의 이점 덕분에 과학에서 반복적으로 성공한다"},{"text":"keep achieving scientific goals solely due to outstanding innate ability","isCorrect":true,"optionType":"correct","explanation":"올바름: consistently=keep achieving, endeavors=goals, exceptionally talented=outstanding innate ability로 의미 보존됨","translation":"뛰어난 타고난 능력만으로 과학적 목표를 계속 달성한다"},{"text":"continually excel in science merely owing to extraordinary capability","isCorrect":true,"optionType":"correct","explanation":"올바름: consistently=continually, endeavors=science, exceptionally talented=extraordinary capability로 적절히 대응됨","translation":"비범한 능력 덕분에 과학에서 지속적으로 탁월한 성과를 낸다"},{"text":"repeatedly win in research purely on account of superior natural gifts","isCorrect":true,"optionType":"correct","explanation":"올바름: exceptionally talented를 superior natural gifts로, simply because를 purely on account of로 환언하여 핵심 인과 구조 유지됨","translation":"뛰어난 천부적 재능만으로 연구에서 반복적으로 성공한다"},{"text":"occasionally achieve breakthroughs thanks to favorable circumstances","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: consistently(지속적으로)를 occasionally(가끔)로, talented를 favorable circumstances로 바꿔 재능 원인을 외부 환경 원인으로 왜곡함","translation":"유리한 상황 덕분에 가끔 돌파구를 이룬다"}],"sourceQuestion":"1번 지문"},{"keyExpression":"socially subordinated groups","passage":"The languages of socially subordinated groups may from quite an early period of contact provide terminology for objects or practices with which speakers of the more powerful group were previously unfamiliar.","passageTranslation":"사회적으로 종속된 집단의 언어는 접촉의 상당히 이른 시기부터 더 강력한 집단의 화자들이 이전에 알지 못했던 사물이나 관행에 대한 용어를 제공할 수 있다.","qType":"correct","questionText":"'socially subordinated groups'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"groups that voluntarily chose to isolate themselves socially","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: 외부 억압에 의한 종속을 자발적 고립으로 원인을 왜곡","translation":"자발적으로 사회적으로 고립되기를 선택한 집단들"},{"text":"communities that occupy a lower position in the social hierarchy","isCorrect":true,"optionType":"correct","explanation":"올바름: subordinated를 lower position in social hierarchy로 구체화하여 의미 보존","translation":"사회적 위계에서 낮은 위치를 차지하는 공동체"},{"text":"groups that are dominated and suppressed by more powerful others","isCorrect":true,"optionType":"correct","explanation":"올바름: subordinated의 함의인 지배·억압을 dominated/suppressed로 명시","translation":"더 강력한 타자들에 의해 지배되고 억압받는 집단들"},{"text":"communities that exercise dominant control over others","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: subordinated(종속된)를 반의어인 dominant control(지배적 통제)로 대체하여 반전","translation":"다른 집단들에 대해 지배적 통제력을 행사하는 공동체들"}],"sourceQuestion":"3번 지문"},{"keyExpression":"the earlier success was indicative of a hidden talent","passage":"Therefore, future success again goes to those who have had success earlier, not because of advantages offered by the previous success, but because the earlier success was indicative of a hidden talent.","passageTranslation":"따라서, 미래의 성공은 다시 이전에 성공을 거둔 사람들에게 돌아가는데, 이전 성공이 제공하는 이점 때문이 아니라, 이전 성공이 숨겨진 재능을 나타내는 것이었기 때문이다.","qType":"correct","questionText":"'the earlier success was indicative of a hidden talent'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"initial wins reflected a concealed natural gift already present","isCorrect":true,"optionType":"correct","explanation":"올바름: indicative of를 reflected로, hidden talent를 concealed natural gift로 환언하여 의미 유지됨","translation":"초기 성공들이 이미 존재하는 숨겨진 천부적 재능을 반영했다"},{"text":"early success directly created a talent that did not exist before","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: indicative of(반영/신호)를 directly created(직접 창출)로 바꿔 재능이 결과가 아니라 원인으로 인과 관계가 역전됨","translation":"초기 성공이 이전에 존재하지 않았던 재능을 직접 만들어냈다"},{"text":"past success pointed to an underlying capacity not yet fully revealed","isCorrect":true,"optionType":"correct","explanation":"올바름: indicative of=pointed to, hidden=not yet fully revealed로 함축 의미가 보존됨","translation":"과거의 성공이 아직 완전히 드러나지 않은 내재적 역량을 가리켰다"},{"text":"prior success proved that talent was irrelevant to future performance","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: indicative of hidden talent(숨겨진 재능의 신호)를 talent was irrelevant(재능이 무관함)로 완전히 반대 의미로 왜곡함","translation":"이전의 성공이 재능이 미래 성과와 무관함을 증명했다"},{"text":"prior achievement served as a signal of latent ability","isCorrect":true,"optionType":"correct","explanation":"올바름: earlier success=prior achievement, indicative of=served as a signal of, hidden talent=latent ability로 정확히 대응됨","translation":"이전의 성취가 잠재된 능력의 신호 역할을 했다"}],"sourceQuestion":"1번 지문"},{"keyExpression":"the remainder shifted to varieties of English, the language of the people who had suppressed them","passage":"The remainder shifted to varieties of English, the language of the people who had suppressed them.","passageTranslation":"남은 이들은 자신들을 억압했던 사람들의 언어인 영어의 여러 변종으로 이동했다.","qType":"correct","questionText":"'the remainder shifted to varieties of English, the language of the people who had suppressed them'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"those who remained began speaking forms of English, imposed by the group that dominated them","isCorrect":true,"optionType":"correct","explanation":"올바름: shifted to varieties of English를 began speaking forms of English로, suppressed를 dominated로 자연스럽게 전환","translation":"남아있던 이들이 자신들을 지배한 집단에 의해 강요된 영어의 형태들을 사용하기 시작했음"},{"text":"the remaining speakers preserved their native language despite English dominance","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: shifted to English(영어로 전환)를 preserved native language(모국어 보존)로 완전히 반전","translation":"남은 화자들이 영어의 지배에도 불구하고 자신들의 모국어를 보존했음"},{"text":"the oppressors eventually adopted the native language of the suppressed community","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: 종속 집단이 억압자 언어로 전환한 사실을 억압자가 원주민 언어를 채택한 것으로 주체와 방향 모두 역전","translation":"억압자들이 결국 종속된 공동체의 원주민 언어를 채택했음"}],"sourceQuestion":"3번 지문"},{"keyExpression":"interaction between groups is socially unequal","passage":"Quite often the interaction between groups is socially unequal, and this is reflected in the fact that in many cases borrowing of words or constructions goes mostly or entirely in one direction.","passageTranslation":"집단 간 상호작용은 사회적으로 불평등한 경우가 매우 많으며, 이는 많은 경우 단어나 구문의 차용이 대부분 또는 전적으로 한 방향으로만 이루어진다는 사실에 반영되어 있다.","qType":"correct","questionText":"'interaction between groups is socially unequal'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"groups interact freely without any social hierarchy","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: socially unequal을 완전히 반전시켜 평등 관계로 왜곡","translation":"집단들이 어떠한 사회적 위계 없이 자유롭게 상호작용함"},{"text":"all groups contribute equally to cultural exchange","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: 불평등한 관계를 균등한 기여로 인과 역전시킴","translation":"모든 집단이 문화 교류에 동등하게 기여함"},{"text":"contact among groups reflects differences in social status","isCorrect":true,"optionType":"correct","explanation":"올바름: socially unequal의 함의인 사회적 지위 차이를 명시적으로 표현","translation":"집단 간 접촉이 사회적 지위 차이를 반영함"}],"sourceQuestion":"3번 지문"},{"keyExpression":"chronic stress can confuse the hippocampus and lead to turning signals for cortisol on instead of off","passage":"But chronic stress can confuse the hippocampus and lead to turning signals for cortisol on instead of off, which can trap you in a constant state of fight, flight, or freeze.","passageTranslation":"하지만 만성 스트레스는 해마를 혼란시켜 코르티솔 신호를 끄는 대신 켜는 결과로 이어져, 당신을 지속적인 투쟁-도피-경직 상태에 가둘 수 있다.","qType":"correct","questionText":"'chronic stress can confuse the hippocampus and lead to turning signals for cortisol on instead of off'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"occasional stress activates the hippocampus to shut down cortisol production","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: chronic(만성적)을 occasional(가끔의)로, turning on을 shut down으로 대체하여 핵심 의미를 이중으로 왜곡","translation":"가끔의 스트레스가 해마를 활성화하여 코르티솔 생성을 차단함"},{"text":"chronic stress helps the hippocampus regulate cortisol more efficiently","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: confuse(혼란시키다)를 helps regulate efficiently(효율적으로 조절하다)로 완전히 반의어로 대체하여 의미 역전","translation":"만성 스트레스가 해마가 코르티솔을 더 효율적으로 조절하도록 도움"},{"text":"prolonged stress disrupts the hippocampus, causing cortisol release to remain active","isCorrect":true,"optionType":"correct","explanation":"올바름: chronic = prolonged, confuse = disrupts, turning on instead of off = remain active으로 인과 구조와 의미 정확히 유지","translation":"지속적인 스트레스가 해마를 혼란시켜 코르티솔 분비가 계속 활성화된 상태로 남게 함"},{"text":"long-term stress interferes with the hippocampus, preventing cortisol from being switched off","isCorrect":true,"optionType":"correct","explanation":"올바름: chronic = long-term, confuse = interferes with, on instead of off = preventing from being switched off로 조절 실패의 의미를 정확히 전환","translation":"장기적인 스트레스가 해마를 방해하여 코르티솔이 차단되지 못하게 함"},{"text":"persistent stress impairs hippocampal function, keeping cortisol levels continuously elevated","isCorrect":true,"optionType":"correct","explanation":"올바름: chronic = persistent, confuse = impairs function, on instead of off = continuously elevated로 기능 손상과 결과를 구체적으로 표현","translation":"지속적인 스트레스가 해마 기능을 손상시켜 코르티솔 수준을 지속적으로 높게 유지시킴"}],"sourceQuestion":"2번 지문"},{"keyExpression":"the remainder shifted to varieties of English, the language of the people who had suppressed them","passage":"The remainder shifted to varieties of English, the language of the people who had suppressed them.","passageTranslation":"남은 이들은 자신들을 억압했던 사람들의 언어인 영어의 여러 변종으로 이동했다.","qType":"correct","questionText":"'the remainder shifted to varieties of English, the language of the people who had suppressed them'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"the remaining speakers preserved their native language despite English dominance","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: shifted to English(영어로 전환)를 preserved native language(모국어 보존)로 완전히 반전","translation":"남은 화자들이 영어의 지배에도 불구하고 자신들의 모국어를 보존했음"},{"text":"the oppressors eventually adopted the native language of the suppressed community","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: 종속 집단이 억압자 언어로 전환한 사실을 억압자가 원주민 언어를 채택한 것으로 주체와 방향 모두 역전","translation":"억압자들이 결국 종속된 공동체의 원주민 언어를 채택했음"},{"text":"the surviving population transitioned to using the tongue of those who had persecuted them","isCorrect":true,"optionType":"correct","explanation":"올바름: shifted to를 transitioned to using으로, suppressed를 persecuted로 의미상 동의어로 대체하여 보존","translation":"생존한 인구가 자신들을 박해한 이들의 언어를 사용하는 것으로 전환했음"}],"sourceQuestion":"3번 지문"},{"keyExpression":"the source of some of the earliest loans from Indigenous Australian languages into English","passage":"In some cases, as with the Dharug language of Sydney, Australia, the source of some of the earliest loans from Indigenous Australian languages into English, the fate of the language system is extinction after the obliteration of many of its speakers.","passageTranslation":"일부 경우에는, 영어로의 오스트레일리아 원주민 언어 초기 차용어의 출처인 오스트레일리아 시드니의 다루그어처럼, 언어 체계의 운명이 많은 화자들의 전멸 이후의 소멸이다.","qType":"correct","questionText":"'the source of some of the earliest loans from Indigenous Australian languages into English'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"a major influence on how Indigenous Australians developed their own English dialect","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: 영어로의 원주민 어휘 제공을 원주민의 영어 방언 발전으로 대상과 방향을 왜곡","translation":"오스트레일리아 원주민들이 자신들만의 영어 방언을 발전시키는 방식에 미친 주요 영향"},{"text":"one of the first Indigenous languages to contribute borrowed words to English","isCorrect":true,"optionType":"correct","explanation":"올바름: source of earliest loans를 first to contribute borrowed words로 구체적 행위 전환, 의미 보존","translation":"영어에 차용어를 제공한 최초의 원주민 언어 중 하나"},{"text":"a language that borrowed extensively from English at an early historical point","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: 차용 방향을 반전시켜 다루그어가 영어로부터 차용한 것으로 왜곡","translation":"역사적 초기 시점에 영어로부터 광범위하게 차용한 언어"},{"text":"an origin of vocabulary that English adopted from native Australian speakers at an early stage","isCorrect":true,"optionType":"correct","explanation":"올바름: loans from Indigenous languages into English를 vocabulary English adopted from native speakers로 재구성","translation":"영어가 초기에 오스트레일리아 원주민 화자로부터 채택한 어휘의 기원"}],"sourceQuestion":"3번 지문"},{"keyExpression":"Does status dictate outcomes, or does it simply reflect an underlying talent or quality?","passage":"The Matthew effect posits that success alone increases the future probability of success, raising the question: Does status dictate outcomes, or does it simply reflect an underlying talent or quality?","passageTranslation":"마태 효과는 성공 자체만으로 미래 성공의 확률이 높아진다고 주장하며, 다음과 같은 질문을 제기한다. 지위가 결과를 지배하는가, 아니면 지위는 단순히 내재된 재능이나 자질을 반영하는 것인가?","qType":"correct","questionText":"'Does status dictate outcomes, or does it simply reflect an underlying talent or quality?'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"does high status guarantee success regardless of one's actual skill level?","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: or does it simply reflect를 삭제하고 dictate를 guarantee로 강화하여 이분법적 대조 구조를 소멸시킴","translation":"높은 지위는 실제 기술 수준에 관계없이 성공을 보장하는가?"},{"text":"can underlying talent alone overcome the disadvantages of low status?","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: 원문의 status vs. talent 대조를 talent overcoming low status로 전환하여 질문의 방향과 논리를 왜곡함","translation":"내재적 재능만으로도 낮은 지위의 불이익을 극복할 수 있는가?"},{"text":"is reputation the cause of success, or just an indicator of hidden gifts already possessed?","isCorrect":true,"optionType":"correct","explanation":"올바름: status=reputation, dictate=cause, reflect underlying talent=indicator of hidden gifts already possessed로 함축 의미까지 보존됨","translation":"명성이 성공의 원인인가, 아니면 그것은 단지 이미 갖춰진 숨겨진 재능의 지표인가?"}],"sourceQuestion":"1번 지문"},{"keyExpression":"an initial success may offer a scientist legitimacy","passage":"Indeed, an initial success may offer a scientist legitimacy, improve peer perception, provide knowledge of how to score and win, enhance social status, and attract resources and quality collaborators.","passageTranslation":"실제로, 초기 성공은 과학자에게 정당성을 부여하고, 동료들의 인식을 개선하며, 성과를 내고 승리하는 방법에 대한 지식을 제공하고, 사회적 지위를 높이며, 자원과 우수한 협력자를 끌어들일 수 있다.","qType":"correct","questionText":"'an initial success may offer a scientist legitimacy'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"a first success forces a scientist to prove herself repeatedly","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: legitimacy 획득을 반복적 증명 강요로 인과 관계를 왜곡함","translation":"첫 성공이 과학자에게 반복적으로 자신을 증명하도록 강요한다"},{"text":"early achievement can grant a researcher credibility","isCorrect":true,"optionType":"correct","explanation":"올바름: initial=early, legitimacy=credibility로 정확히 대응되며 의미 보존됨","translation":"초기 성취가 연구자에게 신뢰성을 부여할 수 있다"},{"text":"an initial achievement may undermine a scientist's reputation","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: legitimacy를 undermine reputation으로 대체해 정반대의 의미가 됨","translation":"초기 성취가 과학자의 명성을 손상시킬 수 있다"}],"sourceQuestion":"1번 지문"},{"keyExpression":"from the more powerful or prestigious group to the less favored one","passage":"borrowing of words or constructions goes mostly or entirely in one direction, from the more powerful or prestigious group to the less favored one.","passageTranslation":"단어나 구문의 차용이 대부분 또는 전적으로 한 방향으로, 즉 더 강력하거나 위세 있 oms that were new to dominant speakers","isCorrect":true,"optionType":"correct","explanation":"올바름: terminology for objects or practices를 naming systems for items and customs로 전환하여 의미 유지","translation":"지배 집단 화자들에게 새로운 사물과 관습에 대한 명명 체계를 도입했음"},{"text":"replaced existing dominant-group terms with their own from an early stage","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: 새로운 용어 제공을 기존 강력 집단 용어의 대체로 의미 왜곡","translation":"초기 단계부터 기존의 강력 집단 용어들을 자신들의 것으로 대체했음"},{"text":"adopted vocabulary from the powerful group for their own familiar practices","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: 종속 집단이 어휘를 제공하는 방향을 반전시켜, 오히려 받아들이는 쪽으로 인과 역전","translation":"자신들의 친숙한 관행을 위해 강력한 집단으로부터 어휘를 채택했음"}],"sourceQuestion":"3번 지문"},{"keyExpression":"remain resilient in the face of stress","passage":"This part of the brain helps you remain resilient in the face of stress and is involved in mood regulation.","passageTranslation":"뇌의 이 부분은 스트레스에 직면했을 때 회복력을 유지하도록 도와주며 기분 조절에도 관여한다.","qType":"correct","questionText":"'remain resilient in the face of stress'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"maintain psychological stability when confronted with stress","isCorrect":true,"optionType":"correct","explanation":"올바름: remain resilient = maintain stability, in the face of = when confronted with으로 대면 상황의 의미 정확히 유지","translation":"스트레스에 직면했을 때 심리적 안정을 유지함"},{"text":"become increasingly sensitive to stressful experiences","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: resilient(회복력 있는)를 sensitive(민감한)로 반의어 대체하여 핵심 의미 왜곡","translation":"스트레스 경험에 점점 더 민감해짐"},{"text":"avoid all situations that might trigger stress responses","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: 스트레스에 맞서 회복력을 유지한다는 의미를 스트레스 상황을 회피한다는 의미로 왜곡","translation":"스트레스 반응을 유발할 수 있는 모든 상황을 피함"},{"text":"bounce back effectively when under stressful conditions","isCorrect":true,"optionType":"correct","explanation":"올바름: resilient의 핵심 의미인 회복력을 bounce bac ous images in your long-term memory so you can avoid them in the future","passage":"It also helps you to monitor the safety of your environment and store dangerous images in your long-term memory so you can avoid them in the future.","passageTranslation":"또한 해마는 당신의 환경의 안전을 모니터링하고 위험한 이미지를 장기 기억에 저장하여 미래에 그것들을 피할 수 있도록 도와준다.","qType":"correct","questionText":"'store dangerous images in your long-term memory so you can avoid them in the future'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"repeatedly recall distressing events to strengthen fear responses","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: 원문의 목적은 미래 회피인데, 두려움 반응 강화를 위한 반복 회상으로 의미를 왜곡","translation":"두려움 반응을 강화하기 위해 고통스러운 사건을 반복적으로 회상함"},{"text":"erase traumatic memories to reduce emotional suffering","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: store(저장하다)를 erase(지우다)로 반의어 대체하고 목적도 회피에서 고통 감소로 왜곡","translation":"감정적 고통을 줄이기 위해 트라우마 기억을 지움"},{"text":"encode harmful stimuli into lasting memory as a protective mechanism","isCorrect":true,"optionType":"correct","explanation":"올바름: store = encode, dangerous images = harmful stimuli, long-term memory = lasting memory, so you can avoid = protective mechanism으로 기능적 의미 정확히 전환","translation":"보호 메커니즘으로서 해로운 자극을 지속적인 기억으로 인코딩함"}],"sourceQuestion":"2번 지문"},{"keyExpression":"improve peer perception","passage":"Indeed, an initial success may offer a scientist legitimacy, improve peer perception, provide knowledge of how to score and win, enhance social status, and attract resources and quality collaborators.","passageTranslation":"실제로, 초기 성공은 과학자에게 정당성을 부여하고, 동료들의 인식을 개선하며, 성과를 내고 승리하는 방법에 대한 지식을 제공하고, 사회적 지위를 높이며, 자원과 우수한 협력자를 끌어들일 수 있다.","qType":"correct","questionText":"'improve peer perception'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"change how the general public perceives scientific work","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: peer(동료)를 general public(일반 대중)으로 바꿔 대상이 달라짐","translation":"일반 대중이 과학적 작업을 인식하는 방식을 바꾼다"},{"text":"reduce misunderstandings among competing research teams","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: improve perception을 reduce misunderstandings로 왜곡하여 원문의 지위 상승 의미를 소거함","translation":"경쟁하는 연구팀들 간의 오해를 줄인다"},{"text":"boost one's reputation among colleagues in the field","isCorrect":true,"optionType":"correct","explanation":"올바름: peer perception을 reputation among colleagues로 구체화하여 의미 유지함","translation":"해당 분야의 동료들 사이에서 명성을 높인다"}],"sourceQuestion":"1번 지문"},{"keyExpression":"each of these payoffs further increasing her odds of scoring another win","passage":"Indeed, an initial success may offer a scientist legitimacy, improve peer perception, provide knowledge of how to score and win, enhance social status, and attract resources and quality collaborators, each of these payoffs further increasing her odds of scoring another win.","passageTranslation":"실제로, 초기 성공은 과학자에게 정당성을 부여하고, 동료들의 인식을 개선하며, 성과를 내고 승리하는 방법에 대한 지식을 제공하고, 사회적 지위를 높이며, 자원과 우수한 협력자를 끌어들일 수 있으며, 이러한 보상 각각이 또 다른 성공을 거둘 가능성을 더욱 높인다.","qType":"correct","questionText":"'each of these payoffs further increasing her odds of scoring another win'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"each payoff independently guarantees a future scientific win","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: increasing odds(확률 상승)를 guarantees(보장)로 과장하여 의미를 왜곡함","translation":"각각의 보상이 독립적으로 미래의 과학적 성공을 보장한다"},{"text":"each advantage gained makes future achievement more probable","isCorrect":true,"optionType":"correct","explanation":"올바름: payoffs=advantage gained, odds of scoring another win=future achievement more probable로 의미 보존됨","translation":"얻어진 각각의 이점이 미래의 성취를 더욱 가능성 있게 만든다"},{"text":"all these rewards cumulatively raise the chance of winning again","isCorrect":true,"optionType":"correct","explanation":"올바름: further increasing을 cumulatively raise로, odds를 chance로 적절히 환언함","translation":"이 모든 보상들이 누적적으로 다시 성공할 가능성을 높인다"},{"text":
