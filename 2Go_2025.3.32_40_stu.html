t","questionText":"'from the more powerful or prestigious group to the less favored one'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"emerging from disadvantaged groups and adopted by powerful ones","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: 방향을 완전히 역전시켜 약자→강자 방향으로 인과 반전","translation":"불리한 집단에서 나타나 강력한 집단에 의해 채택됨"},{"text":"shared mutually between groups of equal social standing","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: 불평등한 단방향 관계를 동등한 상호 공유로 왜곡","translation":"동등한 사회적 지위를 가진 집단들 사이에서 상호 공유됨"},{"text":"imposed by socially superior groups upon those with less influence","isCorrect":true,"optionType":"correct","explanation":"올바름: one-direction 차용의 함의인 강요적 성격을 impose로 명시하여 의미 심화","translation":"사회적으로 우월한 집단이 영향력이 적은 집단에 부과함"}],"sourceQuestion":"3번 지문"},{"keyExpression":"an initial success may offer a scientist legitimacy","passage":"Indeed, an initial success may offer a scientist legitimacy, improve peer perception, provide knowledge of how to score and win, enhance social status, and attract resources and quality collaborators.","passageTranslation":"실제로, 초기 성공은 과학자에게 정당성을 부여하고, 동료들의 인식을 개선하며, 성과를 내고 승리하는 방법에 대한 지식을 제공하고, 사회적 지위를 높이며, 자원과 우수한 협력자를 끌어들일 수 있다.","qType":"correct","questionText":"'an initial success may offer a scientist legitimacy'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"a first success might earn a scientist recognition of authority","isCorrect":true,"optionType":"correct","explanation":"올바름: legitimacy의 핵심 의미인 권위 인정을 구체적으로 표현함","translation":"첫 번째 성공이 과학자에게 권위 인정을 가져다줄 수 있다"},{"text":"an early win could establish a scientist as a trusted figure","isCorrect":true,"optionType":"correct","explanation":"올바름: legitimacy를 trusted figure로 구체화하여 문맥적 의미를 유지함","translation":"초기 성공이 과학자를 신뢰받는 인물로 자리매김하게 할 수 있다"},{"text":"an initial achievement may undermine a scientist's reputation","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: legitimacy를 undermine reputation으로 대체해 정반대의 의미가 됨","translation":"초기 성취가 과학자의 명성을 손상시킬 수 있다"},{"text":"a first success forces a scientist to prove herself repeatedly","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: legitimacy 획득을 반복적 증명 강요로 인과 관계를 왜곡함","translation":"첫 성공이 과학자에게 반복적으로 자신을 증명하도록 강요한다"}],"sourceQuestion":"1번 지문"},{"keyExpression":"remain resilient in the face of stress","passage":"This part of the brain helps you remain resilient in the face of stress and is involved in mood regulation.","passageTranslation":"뇌의 이 부분은 스트레스에 직면했을 때 회복력을 유지하도록 도와주며 기분 조절에도 관여한다.","qType":"correct","questionText":"'remain resilient in the face of stress'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"avoid all situations that might trigger stress responses","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: 스트레스에 맞서 회복력을 유지한다는 의미를 스트레스 상황을 회피한다는 의미로 왜곡","translation":"스트레스 반응을 유발할 수 있는 모든 상황을 피함"},{"text":"withstand pressure without losing mental composure","isCorrect":true,"optionType":"correct","explanation":"올바름: remain resilient = withstand without losing composure, stress = pressure로 구체적 행위로 전환","translation":"정신적 평정심을 잃지 않고 압박을 견뎌냄"},{"text":"become increasingly sensitive to stressful experiences","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: resilient(회복력 있는)를 sensitive(민감한)로 반의어 대체하여 핵심 의미 왜곡","translation":"스트레스 경험에 점점 더 민감해짐"}],"sourceQuestion":"2번 지문"},{"keyExpression":"the source of some of the earliest loans from Indigenous Australian languages into English","passage":"In some cases, as with the Dharug language of Sydney, Australia, the source of some of the earliest loans from Indigenous Australian languages into English, the fate of the language system is extinction after the obliteration of many of its speakers.","passageTranslation":"일부 경우에는, 영어로의 오스트레일리아 원주민 언어 초기 차용어의 출처인 오스트레일리아 시드니의 다루그어처럼, 언어 체계의 운명이 많은 화자들의 전멸 이후의 소멸이다.","qType":"correct","questionText":"'the source of some of the earliest loans from Indigenous Australian languages into English'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"a language that borrowed extensively from English at an early historical point","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: 차용 방향을 반전시켜 다루그어가 영어로부터 차용한 것으로 왜곡","translation":"역사적 초기 시점에 영어로부터 광범위하게 차용한 언어"},{"text":"a major influence on how Indigenous Australians developed their own English dialect","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: 영어로의 원주민 어휘 제공을 원주민의 영어 방언 발전으로 대상과 방향을 왜곡","translation":"오스트레일리아 원주민들이 자신들만의 영어 방언을 발전시키는 방식에 미친 주요 영향"},{"text":"among the aboriginal languages that first supplied English with new terms","isCorrect":true,"optionType":"correct","explanation":"올바름: source of earliest loans를 first supplied with new terms로 동사구로 전환하여 의미 유지","translation":"영어에 처음으로 새로운 용어를 공급한 원주민 언어들 중 하나"}],"sourceQuestion":"3번 지문"},{"keyExpression":"the effects of contact in that direction may not progress any further than this","passage":"The languages of socially subordinated groups may from quite an early period of contact provide terminology for objects or practices with which speakers of the more powerful group were previously unfamiliar, but the effects of contact in that direction may not progress any further than this.","passageTranslation":"사회적으로 종속된 집단의 언어는 접촉의 상당히 이른 시기부터 더 강력한 집단의 화자들이 이전에 알지 못했던 사물이나 관행에 대한 용어를 제공할 수 있지만, 그 방향에서의 접촉의 영향은 이 이상 더 나아가지 않을 수 있다.","qType":"correct","questionText":"'the effects of contact in that direction may not progress any further than this'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"contact between groups gradually leads to complete language blending over time","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: may not progress further(더 나아가지 않음)를 반전시켜 점진적 완전 혼합으로 왜곡","translation":"집단 간 접촉이 시간이 지남에 따라 점차 완전한 언어 혼합으로 이어짐"},{"text":"the stronger group continues to be influenced deeply by the subordinated language","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: no further progress를 deep ongoing influence로 반전시켜 의미를 역전","translation":"더 강한 집단이 종속된 언어에 의해 계속 깊이 영향을 받음"},{"text":"the influence of the weaker group on the stronger one stops at mere vocabulary transfer","isCorrect":true,"optionType":"correct","explanation":"올바름: may not progress any further를 stops at로, effects of contact를 influence로 의미를 정확히 재구성","translation":"약한 집단이 강한 집단에 미치는 영향은 단순한 어휘 이전에서 그침"}],"sourceQuestion":"3번 지문"},{"keyExpression":"borrowing of words or constructions goes mostly or entirely in one direction","passage":"Quite often the interaction between groups is socially unequal, and this is reflected in the fact that in many cases borrowing of words or constructions goes mostly or entirely in one direction, from the more powerful or prestigious group to the less favored one.","passageTranslation":"집단 간 상호작용은 사회적으로 불평등한 경우가 매우 많으며, 이는 많은 경우 단어나 구문의 차용이 더 강력하거나 위세 있는 집단에서 덜 선호되는 집단 쪽으로 대부분 또는 전적으로 한 방향으로만 이루어진다는 사실에 반영되어 있다.","qType":"correct","questionText":"'borrowing of words or constructions goes mostly or entirely in one direction'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"both groups exchange words and structures reciprocally","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: one direction을 reciprocal(상호적)로 반전시켜 쌍방 교류로 의미 왜곡","translation":"두 집단이 단어와 구조를 상호적으로 교환함"},{"text":"linguistic features flow predominantly from one group to another","isCorrect":true,"optionType":"correct","explanation":"올바름: one direction을 flow 방향성으로 구체화하고 mostly를 predominantly로 정확히 paraphrasing","translation":"언어적 특징이 주로 한 집단에서 다른 집단으로 흘러감"},{"text":"language borrowing occurs randomly with no clear pattern","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: 명확한 단방향성을 무작위적·무패턴으로 왜곡","translation":"언어 차용은 뚜렷한 패턴 없이 무작위로 발생함"}],"sourceQuestion":"3번 지문"},{"keyExpression":"the remainder shifted to varieties of English, the language of the people who had suppressed them","passage":"The remainder shifted to varieties of English, the language of the people who had suppressed them.","passageTranslation":"남은 이들은 자신들을 억압했던 사람들의 언어인 영어의 여러 변종으로 이동했다.","qType":"correct","questionText":"'the remainder shifted to varieties of English, the language of the people who had suppressed them'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"the remaining speakers preserved their native language despite English dominance","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: shifted to English(영어로 전환)를 preserved native language(모국어 보존)로 완전히 반전","translation":"남은 화자들이 영어의 지배에도 불구하고 자신들의 모국어를 보존했음"},{"text":"the oppressors eventually adopted the native language of the suppressed community","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: 종속 집단이 억압자 언어로 전환한 사실을 억압자가 원주민 언어를 채택한 것으로 주체와 방향 모두 역전","translation":"억압자들이 결국 종속된 공동체의 원주민 언어를 채택했음"},{"text":"surviving members of the community adopted the language of their oppressors","isCorrect":true,"optionType":"correct","explanation":"올바름: the remainder를 surviving members로, shifted to를 adopted로, suppressed를 oppressors로 정확히 전환","translation":"공동체의 생존자들이 억압자들의 언어를 채택했음"}],"sourceQuestion":"3번 지문"},{"keyExpression":"The Matthew effect posits that success alone increases the future probability of success","passage":"The Matthew effect posits that success alone increases the future probability of success, raising the question: Does status dictate outcomes, or does it simply reflect an underlying talent or quality?","passageTranslation":"마태 효과는 성공 자체만으로 미래 성공의 확률이 높아진다고 주장하며, 다음과 같은 질문을 제기한다. 지위가 결과를 지배하는가, 아니면 지위는 단순히 내재된 재능이나 자질을 반영하는 것인가?","qType":"correct","questionText":"'The Matthew effect posits that success alone increases the future probability of success'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"according to this principle, winning once is itself enough to boost future chances","isCorrect":true,"optionType":"correct","explanation":"올바름: posits를 according to this principle로, success alone=winning once is itself enough로 구체화하여 의미 유지됨","translation":"이 원리에 따르면, 한 번 이기는 것만으로도 미래의 가능성을 높이기에 충분하다"},{"text":"the Matthew effect suggests that talent, not success, determines future outcomes","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: success alone(성공 그 자체)을 talent(재능)로 대체하여 대안 이론의 논리를 섞어 원문의 핵심 주장을 왜곡함","translation":"마태 효과는 성공이 아닌 재능이 미래 결과를 결정한다고 시사한다"},{"text":"this theory argues that achieving success by itself elevates the likelihood of further wins","isCorrect":true,"optionType":"correct","explanation":"올바름: posits=argues, success alone=by itself, future probability=likelihood of further wins로 정확히 환언됨","translation":"이 이론은 성공 그 자체가 추가적인 성공의 가능성을 높인다고 주장한다"},{"text":"this principle holds that future success depends on the quality of collaborators","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: success alone(성공 자체)을 quality of collaborators(협력자 질)로 대체하여 인과의 출발점을 왜곡함","translation":"이 원리는 미래의 성공이 협력자의 질에 달려 있다고 주장한다"}],"sourceQuestion":"1번 지문"},{"keyExpression":"seldom one-hit wonders","passage":"Great scientists are seldom one-hit wonders. Newton is a prime example: beyond the Newtonian mechanics, he developed the theory of gravitation, calculus, laws of motion, and optimization.","passageTranslation":"위대한 과학자들은 단 하나의 업적만 남기는 경우가 거의 없다. 뉴턴이 대표적 예로, 뉴턴 역학 외에도 중력 이론, 미적분학, 운동 법칙, 최적화 이론을 발전시켰다.","qType":"correct","questionText":"'seldom one-hit wonders'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"frequently make only a single important discovery","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: seldom을 frequently로 반전시켜 의미가 완전히 반대가 됨","translation":"빈번히 단 하나의 중요한 발견만 한다"},{"text":"rarely achieve only a single breakthrough","isCorrect":true,"optionType":"correct","explanation":"올바름: seldom=rarely, one-hit wonder=single breakthrough로 정확히 대응됨","translation":"단 하나의 돌파구만 이루는 경우가 드물다"},{"text":"rarely produce any discoveries worth noting","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: 여러 업적을 낸다는 긍정적 의미를 거의 발견이 없다는 부정적 의미로 왜곡함","translation":"주목할 만한 발견을 거의 내놓지 못한다"}],"sourceQuestion":"1번 지문"},{"keyExpression":"attract resources and quality collaborators","passage":"Indeed, an initial success may offer a scientist legitimacy, improve peer perception, provide knowledge of how to score and win, enhance social status, and attract resources and quality collaborators, each of these payoffs further increasing her odds of scoring another win.","passageTranslation":"실제로, 초기 성공은 과학자에게 정당성을 부여하고, 동료들의 인식을 개선하며, 성과를 내고 승리하는 방법에 대한 지식을 제공하고, 사회적 지위를 높이며, 자원과 우수한 협력자를 끌어들일 수 있으며, 이러한 보상 각각이 또 다른 성공을 거둘 가능성을 더욱 높인다.","qType":"correct","questionText":"'attract resources and quality collaborators'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"repel unqualified candidates and preserve existing resources","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: attract를 repel(밀어냄)로 반전시키고 quality collaborators를 unqualified candidates로 바꿔 반대 의미가 됨","translation":"자격 미달 후보자들을 밀어내고 기존 자원을 보존한다"},{"text":"pull in both material support and skilled co-workers","isCorrect":true,"optionType":"correct","explanation":"올바름: attract=pull in, resources=material support, quality collaborators=skilled co-workers로 정확히 대응됨","translation":"물질적 지원과 숙련된 동료 연구자 모두를 끌어들인다"},{"text":"distribute resources equally among all team members present","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: attract(끌어들임)를 distribute(배분)로 바꾸어 자원을 획득하는 것이 아닌 나누는 행위로 의미가 전환됨","translation":"현재 있는 모든 팀원들에게 자원을 균등하게 배분한다"}],"sourceQuestion":"1번 지문"},{"keyExpression":"improve peer perception","passage":"Indeed, an initial success may offer a scientist legitimacy, improve peer perception, provide knowledge of how to score and win, enhance social status, and attract resources and quality collaborators.","passageTranslation":"실제로, 초기 성공은 과학자에게 정당성을 부여하고, 동료들의 인식을 개선하며, 성과를 내고 승리하는 방법에 대한 지식을 제공하고, 사회적 지위를 높이며, 자원과 우수한 협력자를 끌어들일 수 있다.","qType":"correct","questionText":"'improve peer perception'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"enhance how fellow researchers view one another","isCorrect":true,"optionType":"correct","explanation":"올바름: peer=fellow researchers, perception=how one views로 정확히 대응됨","translation":"동료 연구자들이 서로를 바라보는 방식을 향상시킨다"},{"text":"raise the esteem in which other scientists hold someone","isCorrect":true,"optionType":"correct","explanation":"올바름: perception이 esteem으로, peer가 other scientists로 적절히 환언됨","translation":"다른 과학자들이 누군가를 바라보는 존중감을 높인다"},{"text":"change how the general public perceives scientific work","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: peer(동료)를 general public(일반 대중)으로 바꿔 대상이 달라짐","translation":"일반 대중이 과학적 작업을 인식하는 방식을 바꾼다"},{"text":"reduce misunderstandings among competing research teams","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: improve perception을 reduce misunderstandings로 왜곡하여 원문의 지위 상승 의미를 소거함","translation":"경쟁하는 연구팀들 간의 오해를 줄인다"}],"sourceQuestion":"1번 지문"},{"keyExpression":"involved in mood regulation","passage":"This part of the brain helps you remain resilient in the face of stress and is involved in mood regulation.","passageTranslation":"뇌의 이 부분은 스트레스에 직면했을 때 회복력을 유지하도록 도와주며 기분 조절에도 관여한다.","qType":"correct","questionText":"'involved in mood regulation'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"participates in governing how we experience and express emotions","isCorrect":true,"optionType":"correct","explanation":"올바름: involved in = participates in, mood regulation = governing how we experience and express emotions로 기능을 구체적 과정으로 풀어서 표현","translation":"감정을 경험하고 표현하는 방식을 관장하는 데 참여함"},{"text":"suppresses emotional reactions to prevent mood fluctuations","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: regulation(조절)을 suppression(억제)으로 의미를 좁혀 왜곡하고, 기능의 방향성도 변경","translation":"기분 변동을 방지하기 위해 감정 반응을 억제함"},{"text":"has no significant connection to emotional well-being","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: involved in(관여한다)을 has no connection(연관이 없다)으로 완전히 반의어 대체하여 의미 역전","translation":"감정적 안녕과 중요한 연관이 없음"}],"sourceQuestion":"2번 지문"},{"keyExpression":"Does status dictate outcomes, or does it simply reflect an underlying talent or quality?","passage":"The Matthew effect posits that success alone increases the future probability of success, raising the question: Does status dictate outcomes, or does it simply reflect an underlying talent or quality?","passageTranslation":"마태 효과는 성공 자체만으로 미래 성공의 확률이 높아진다고 주장하며, 다음과 같은 질문을 제기한다. 지위가 결과를 지배하는가, 아니면 지위는 단순히 내재된 재능이나 자질을 반영하는 것인가?","qType":"correct","questionText":"'Does status dictate outcomes, or does it simply reflect an underlying talent or quality?'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"can underlying talent alone overcome the disadvantages of low status?","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: 원문의 status vs. talent 대조를 talent overcoming low status로 전환하여 질문의 방향과 논리를 왜곡함","translation":"내재적 재능만으로도 낮은 지위의 불이익을 극복할 수 있는가?"},{"text":"does high status guarantee success regardless of one's actual skill level?","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: or does it simply reflect를 삭제하고 dictate를 guarantee로 강화하여 이분법적 대조 구조를 소멸시킴","translation":"높은 지위는 실제 기술 수준에 관계없이 성공을 보장하는가?"},{"text":"is it position that determines results, or merely a mirror of innate ability?","isCorrect":true,"optionType":"correct","explanation":"올바름: status=position, dictate outcomes=determines results, reflect=mirror, underlying talent=innate ability로 핵심 대조 구조가 보존됨","translation":"결과를 결정하는 것이 지위인가, 아니면 그것은 단순히 타고난 능력의 거울인가?"}],"sourceQuestion":"1번 지문"},{"keyExpression":"attract resources and quality collaborators","passage":"Indeed, an initial success may offer a scientist legitimacy, improve peer perception, provide knowledge of how to score and win, enhance social status, and attract resources and quality collaborators, each of these payoffs further increasing her odds of scoring another win.","passageTranslation":"실제로, 초기 성공은 과학자에게 정당성을 부여하고, 동료들의 인식을 개선하며, 성과를 내고 승리하는 방법에 대한 지식을 제공하고, 사회적 지위를 높이며, 자원과 우수한 협력자를 끌어들일 수 있으며, 이러한 보상 각각이 또 다른 성공을 거둘 가능성을 더욱 높인다.","qType":"correct","questionText":"'attract resources and quality collaborators'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"distribute resources equally among all team members present","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: attract(끌어들임)를 distribute(배분)로 바꾸어 자원을 획득하는 것이 아닌 나누는 행위로 의미가 전환됨","translation":"현재 있는 모든 팀원들에게 자원을 균등하게 배분한다"},{"text":"draw in funding and high-caliber research partners","isCorrect":true,"optionType":"correct","explanation":"올바름: attract=draw in, resources=funding, quality collaborators=high-caliber research partners로 구체화하여 의미 보존됨","translation":"자금과 수준 높은 연구 파트너를 끌어들인다"},{"text":"repel unqualified candidates and preserve existing resources","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: attract를 repel(밀어냄)로 반전시키고 quality collaborators를 unqualified candidates로 바꿔 반대 의미가 됨","translation":"자격 미달 후보자들을 밀어내고 기존 자원을 보존한다"},{"text":"secure valuable assets and talented associates for one's work","isCorrect":true,"optionType":"correct","explanation":"올바름: attract=secure, resources=valuable assets, quality collaborators=talented associates로 의미가 유지됨","translation":"자신의 연구를 위해 귀중한 자산과 재능 있는 협력자를 확보한다"}],"sourceQuestion":"1번 지문"},{"keyExpression":"demonstrated a link between a smaller hippocampus and people who had experienced long-lasting stress","passage":"One study demonstrated a link between a smaller hippocampus and people who had experienced long-lasting stress.","passageTranslation":"한 연구는 더 작은 해마와 장기적인 스트레스를 경험한 사람들 사이의 연관성을 입증했다.","qType":"correct","questionText":"'demonstrated a link between a smaller hippocampus and people who had experienced long-lasting stress'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"revealed that enduring stress is associated with a diminished hippocampus","isCorrect":true,"optionType":"correct","explanation":"올바름: long-lasting = enduring, smaller = diminished, link = associated with으로 동의 구문 활용","translation":"지속적인 스트레스가 해마 축소와 관련 있음을 밝힘"},{"text":"suggested that short-term stress temporarily enlarges the hippocampus","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: long-lasting→short-term, smaller→enlarges로 핵심 의미를 모두 반전시킴","translation":"단기 스트레스가 일시적으로 해마를 확장시킨다고 제안함"},{"text":"proved that a smaller hippocampus causes people to feel more stressed","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: 원문은 스트레스→해마 축소의 방향인데 인과를 역전시켜 해마 축소→스트레스 증가로 왜곡","translation":"해마가 작을수록 사람들이 더 스트레스를 느끼게 된다는 것을 증명함"},{"text":"established a connection between chronic stress and hippocampal shrinkage","isCorrect":true,"optionType":"correct","explanation":"올바름: demonstrated = established, long-lasting = chronic, smaller = shrinkage로 의미 유지하며 표현 대체","translation":"만성 스트레스와 해마 수축 사이의 연관성을 확립함"},{"text":"showed that prolonged stress correlates with reduced hippocampal volume","isCorrect":true,"optionType":"correct","explanation":"올바름: link = correlation, smaller = reduced volume, long-lasting = prolonged으로 학술적 표현으로 정확히 전환","translation":"지속적인 스트레스가 해마 부피 감소와 상관관계가 있음을 보여줌"}],"sourceQuestion":"2번 지문"},{"keyExpression":"monitor the safety of your environment","passage":"It also helps you to monitor the safety of your environment and store dangerous images in your long-term memory so you can avoid them in the future.","passageTranslation":"또한 해마는 당신의 환경의 안전을 모니터링하고 위험한 이미지를 장기 기억에 저장하여 미래에 그것들을 피할 수 있도록 도와준다.","qType":"correct","questionText":"'monitor the safety of your environment'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"ignore warning signals coming from the outside world","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: monitor(감시하다)를 ignore(무시하다)로 반의어 대체하여 의미 완전 역전","translation":"외부 세계에서 오는 경고 신호를 무시함"},{"text":"assess potential threats in your surroundings","isCorrect":true,"optionType":"correct","explanation":"올바름: monitor = assess, safety = potential threats(안전 평가는 위협 감지를 함축), environment = surroundings로 구체적 행위로 전환","translation":"주변 환경의 잠재적 위협을 평가함"},{"text":"create a completely safe and stress-free living space","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: 환경의 안전을 감시한다는 의미를 안전한 환경을 만든다는 다른 행위로 대체하여 왜곡","translation":"완전히 안전하고 스트레스 없는 생활 공간을 만듦"},{"text":"continuously evaluate risk levels in one's immediate setting","isCorrect":true,"optionType":"correct","explanation":"올바름: monitor = continuously evaluate, safety = risk levels, environment = immediate setting으로 동의어 대체 및 구체화","translation":"자신의 직접적인 환경에서 위험 수준을 지속적으로 평가함"},{"text":"keep track of whether your surroundings pose any danger","isCorrect":true,"optionType":"correct","explanation":"올바름: monitor = keep track of, safety = whether ~ danger로 안전 감시의 함축 의미를 풀어서 표현","translation":"주변 환경이 위험을 초래하는지 지속적으로 파악함"}],"sourceQuestion":"2번 지문"},{"keyExpression":"socially subordinated groups","passage":"The languages of socially subordinated groups may from quite an early period of contact provide terminology for objects or practices with which speakers of the more powerful group were previously unfamiliar.","passageTranslation":"사회적으로 종속된 집단의 언어는 접촉의 상당히 이른 시기부터 더 강력한 집단의 화자들이 이전에 알지 못했던 사물이나 관행에 대한 용어를 제공할 수 있다.","qType":"correct","questionText":"'socially subordinated groups'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"populations with diminished social standing and limited power","isCorrect":true,"optionType":"correct","explanation":"올바름: subordinated를 diminished social standing과 limited power로 분리 구체화","translation":"사회적 위상이 낮아지고 권력이 제한된 인구 집단"},{"text":"groups that voluntarily chose to isolate themselves socially","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: 외부 억압에 의한 종속을 자발적 고립으로 원인을 왜곡","translation":"자발적으로 사회적으로 고립되기를 선택한 집단들"},{"text":"communities that exercise dominant control over others","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: subordinated(종속된)를 반의어인 dominant control(지배적 통제)로 대체하여 반전","translation":"다른 집단들에 대해 지배적 통제력을 행사하는 공동체들"}],"sourceQuestion":"3번 지문"},{"keyExpression":"the effects of contact in that direction may not progress any further than this","passage":"The languages of socially subordinated groups may from quite an early period of contact provide terminology for objects or practices with which speakers of the more powerful group were previously unfamiliar, but the effects of contact in that direction may not progress any further than this.","passageTranslation":"사회적으로 종속된 집단의 언어는 접촉의 상당히 이른 시기부터 더 강력한 집단의 화자들이 이전에 알지 못했던 사물이나 관행에 대한 용어를 제공할 수 있지만, 그 방향에서의 접촉의 영향은 이 이상 더 나아가지 않을 수 있다.","qType":"correct","questionText":"'the effects of contact in that direction may not progress any further than this'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"contact between groups gradually leads to complete language blending over time","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: may not progress further(더 나아가지 않음)를 반전시켜 점진적 완전 혼합으로 왜곡","translation":"집단 간 접촉이 시간이 지남에 따라 점차 완전한 언어 혼합으로 이어짐"},{"text":"the contribution of minority languages to powerful ones remains limited to naming new items","isCorrect":true,"optionType":"correct","explanation":"올바름: may not progress further의 함의인 제한성을 remains limited to로 명시하여 의미 보존","translation":"소수 언어가 강력한 언어에 기여하는 것은 새 사물의 명명에만 제한됨"},{"text":"the stronger group continues to be influenced deeply by the subordinated language","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: no further progress를 deep ongoing influence로 반전시켜 의미를 역전","translation":"더 강한 집단이 종속된 언어에 의해 계속 깊이 영향을 받음"}],"sourceQuestion":"3번 지문"},{"keyExpression":"from the more powerful or prestigious group to the less favored one","passage":"borrowing of words or constructions goes mostly or entirely in one direction, from the more powerful or prestigious group to the less favored one.","passageTranslation":"단어나 구문의 차용이 대부분 또는 전적으로 한 방향으로, 즉 더 강력하거나 위세 있는 집단에서 덜 선호되는 집단 쪽으로 이루어진다.","qType":"correct","questionText":"'from the more powerful or prestigious group to the less favored one'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"emerging from disadvantaged groups and adopted by powerful ones","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: 방향을 완전히 역전시켜 약자→강자 방향으로 인과 반전","translation":"불리한 집단에서 나타나 강력한 집단에 의해 채택됨"},{"text":"shared mutually between groups of equal social standing","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: 불평등한 단방향 관계를 동등한 상호 공유로 왜곡","translation":"동등한 사회적 지위를 가진 집단들 사이에서 상호 공유됨"},{"text":"originating in dominant groups and spreading to marginalized ones","isCorrect":true,"optionType":"correct","explanation":"올바름: powerful/prestigious를 dominant로, less favored를 marginalized로 정확히 의미 전환","translation":"지배적인 집단에서 비롯되어 소외된 집단으로 퍼져나감"}],"sourceQuestion":"3번 지문"},{"keyExpression":"Yet, there is an appealing alternative explanation","passage":"Yet, there is an appealing alternative explanation: Great scientists have multiple hits and consistently succeed in their scientific endeavors simply because they're exceptionally talented.","passageTranslation":"하지만, 매력적인 대안적 설명이 있다. 위대한 과학자들은 여러 번의 성공을 거두고 자신의 과학적 노력에서 지속적으로 성공을 거두는데, 이는 단순히 그들이 예외적으로 재능이 있기 때문이라는 것이다.","qType":"correct","questionText":"'Yet, there is an appealing alternative explanation'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"therefore, the Matthew effect remains the only valid explanation","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: yet의 역접 기능을 therefore로 바꾸고 alternative를 부정하여 논리 방향이 완전히 반전됨","translation":"따라서, 마태 효과가 유일하게 유효한 설명으로 남는다"},{"text":"however, a compelling competing account also exists","isCorrect":true,"optionType":"correct","explanation":"올바름: yet=however, appealing=compelling, alternative explanation=competing account로 양보·역접 구조가 보존됨","translation":"하지만, 설득력 있는 경쟁적 설명도 존재한다"},{"text":"still, another attractive theory deserves consideration","isCorrect":true,"optionType":"correct","explanation":"올바름: yet=still의 역접 기능과 appealing=attractive, alternative=another theory로 적절히 환언됨","translation":"그럼에도, 또 다른 매력적인 이론이 고려할 가치가 있다"},{"text":"in addition, the same explanation is confirmed by further evidence","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: alternative(대안적)를 same(동일한)으로 바꾸고 역접 없이 추가로 처리해 대조 구조를 소멸시킴","translation":"게다가, 동일한 설명이 추가 증거에 의해 확인된다"},{"text":"nevertheless, a rival interpretation holds some appeal","isCorrect":true,"optionType":"correct","explanation":"올바름: yet=nevertheless의 대조 기능과 appealing alternative explanation=rival interpretation holds appeal이 문맥적으로 대응됨","translation":"그럼에도 불구하고, 경쟁하는 해석이 어느 정도 설득력을 지닌다"}],"sourceQuestion":"1번 지문"},{"keyExpression":"Does status dictate outcomes, or does it simply reflect an underlying talent or quality?","passage":"The Matthew effect posits that success alone increases the future probability of success, raising the question: Does status dictate outcomes, or does it simply reflect an underlying talent or quality?","passageTranslation":"마태 효과는 성공 자체만으로 미래 성공의 확률이 높아진다고 주장하며, 다음과 같은 질문을 제기한다. 지위가 결과를 지배하는가, 아니면 지위는 단순히 내재된 재능이나 자질을 반영하는 것인가?","qType":"correct","questionText":"'Does status dictate outcomes, or does it simply reflect an underlying talent or quality?'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"does high status guarantee success regardless of one's actual skill level?","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: or does it simply reflect를 삭제하고 dictate를 guarantee로 강화하여 이분법적 대조 구조를 소멸시킴","translation":"높은 지위는 실제 기술 수준에 관계없이 성공을 보장하는가?"},{"text":"can underlying talent alone overcome the disadvantages of low status?","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: 원문의 status vs. talent 대조를 talent overcoming low status로 전환하여 질문의 방향과 논리를 왜곡함","translation":"내재적 재능만으로도 낮은 지위의 불이익을 극복할 수 있는가?"},{"text":"does one's standing shape what one achieves, or merely reveal pre-existing capability?","isCorrect":true,"optionType":"correct","explanation":"올바름: status=standing, dictate outcomes=shape what one achieves, reflect underlying talent=reveal pre-existing capability로 의미 유지됨","translation":"한 사람의 위상이 성취를 형성하는가, 아니면 단지 기존에 존재하는 역량을 드러내는 것인가?"}],"sourceQuestion":"1번 지문"},{"keyExpression":"trap you in a constant state of fight, flight, or freeze","passage":"But chronic stress can confuse the hippocampus and lead to turning signals for cortisol on instead of off, which can trap you in a constant state of fight, flight, or freeze.","passageTranslation":"하지만 만성 스트레스는 해마를 혼란시켜 코르티솔 신호를 끄는 대신 켜는 결과로 이어져, 당신을 지속적인 투쟁-도피-경직 상태에 가둘 수 있다.","qType":"correct","questionText":"'trap you in a constant state of fight, flight, or freeze'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"lock you into a perpetual emergency stress response","isCorrect":true,"optionType":"correct","explanation":"올바름: trap = lock into, constant = perpetual, fight/flight/freeze = emergency stress response로 생물학적 개념을 기능적으로 정확히 요약","translation":"지속적인 긴급 스트레스 반응 상태에 가둠"},{"text":"keep your nervous system fixated on an unrelenting state of threat response","isCorrect":true,"optionType":"correct","explanation":"올바름: trap = keep fixated, constant = unrelenting, fight/flight/freeze = threat response로 신경계의 기능적 맥락에서 의미 정확히 유지","translation":"신경계가 끊임없는 위협 반응 상태에 고정되도록 유지함"},{"text":"leave you permanently stuck in a survival-mode reaction","isCorrect":true,"optionType":"correct","explanation":"올바름: trap = stuck, constant = permanently, fight/flight/freeze = survival-mode reaction으로 의미의 핵심인 지속성과 원시적 반응 상태를 정확히 전환","translation":"생존 모드 반응에 영구적으로 고착되게 함"},{"text":"gradually guide you toward a calmer physiological baseline","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: 지속적인 각성 상태에 가둔다는 의미를 더 차분한 상태로 이끈다는 반대 방향 의미로 왜곡","translation":"더 차분한 생리적 기준 상태로 서서히 이끔"},{"text":"free you from recurring cycles of anxiety and tension","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: trap(가두다)을 free(해방시키다)로 완전히 반의어 대체하여 의미 역전","translation":"반복되는 불안과 긴장의 순환에서 해방시킴"}],"sourceQuestion":"2번 지문"},{"keyExpression":"making us even more likely to experience a drained brain","passage":"Stress not only affects physical disease but also the very structure of our brains, making us even more likely to experience a drained brain.","passageTranslation":"스트레스는 신체 질환에만 영향을 미치는 것이 아니라 우리 뇌의 구조 자체에도 영향을 미쳐, 우리가 뇌 소진을 경험할 가능성을 훨씬 더 높인다.","qType":"correct","questionText":"'making us even more likely to experience a drained brain'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"preventing the brain from accumulating excessive stress","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: 뇌 소진을 유발한다는 원문을 스트레스 축적을 막는다는 반대 의미로 왜곡","translation":"뇌가 과도한 스트레스를 축적하는 것을 막음"},{"text":"raising the probability that our minds become depleted","isCorrect":true,"optionType":"correct","explanation":"올바름: more likely = raised probability, drained = depleted로 추상→구체 전환 유지","translation":"우리 마음이 고갈될 가능성을 높임"},{"text":"reducing our tendency to feel mentally overwhelmed","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: making more likely를 reducing tendency로 반의어 대체하여 인과 방향 역전","translation":"정신적으로 압도될 경향을 줄임"}],"sourceQuestion":"2번 지문"},{"keyExpression":"store dangerous images in your long-term memory so you can avoid them in the future","passage":"It also helps you to monitor the safety of your environment and store dangerous images in your long-term memory so you can avoid them in the future.","passageTranslation":"또한 해마는 당신의 환경의 안전을 모니터링하고 위험한 이미지를 장기 기억에 저장하여 미래에 그것들을 피할 수 있도록 도와준다.","qType":"correct","questionText":"'store dangerous images in your long-term memory so you can avoid them in the future'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"erase traumatic memories to reduce emotional suffering","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: store(저장하다)를 erase(지우다)로 반의어 대체하고 목적도 회피에서 고통 감소로 왜곡","translation":"감정적 고통을 줄이기 위해 트라우마 기억을 지움"},{"text":"repeatedly recall distressing events to strengthen fear responses","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: 원문의 목적은 미래 회피인데, 두려움 반응 강화를 위한 반복 회상으로 의미를 왜곡","translation":"두려움 반응을 강화하기 위해 고통스러운 사건을 반복적으로 회상함"},{"text":"retain threatening experiences in memory to enable future avoidance","isCorrect":true,"optionType":"correct","explanation":"올바름: store = retain, dangerous images = threatening experiences, so you can avoid = to enable avoidance로 목적 관계 유지하며 표현 전환","translation":"미래에 회피할 수 있도록 위협적인 경험을 기억에 보존함"},{"text":"preserve records of past dangers so that similar threats can be recognized later","isCorrect":true,"optionType":"correct","explanation":"올바름: store = preserve, dangerous images = records of past dangers, future avoidance = recognize later로 구체적 기능 설명으로 전환","translation":"유사한 위협이 나중에 인식될 수 있도록 과거 위험의 기록을 보존함"}],"sourceQuestion":"2번 지문"},{"keyExpression":"The Matthew effect posits that success alone increases the future probability of success","passage":"The Matthew effect posits that success alone increases the future probability of success, raising the question: Does status dictate outcomes, or does it simply reflect an underlying talent or quality?","passageTranslation":"마태 효과는 성공 자체만으로 미래 성공의 확률이 높아진다고 주장하며, 다음과 같은 질문을 제기한다. 지위가 결과를 지배하는가, 아니면 지위는 단순히 내재된 재능이나 자질을 반영하는 것인가?","qType":"correct","questionText":"'The Matthew effect posits that success alone increases the future probability of success'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"the Matthew effect suggests that talent, not success, determines future outcomes","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: success alone(성공 그 자체)을 talent(재능)로 대체하여 대안 이론의 논리를 섞어 원문의 핵심 주장을 왜곡함","translation":"마태 효과는 성공이 아닌 재능이 미래 결과를 결정한다고 시사한다"},{"text":"this principle holds that future success depends on the quality of collaborators","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: success alone(성공 자체)을 quality of collaborators(협력자 질)로 대체하여 인과의 출발점을 왜곡함","translation":"이 원리는 미래의 성공이 협력자의 질에 달려 있다고 주장한다"},{"text":"the Matthew effect claims that mere prior achievement raises future odds","isCorrect":true,"optionType":"correct","explanation":"올바름: posits=claims, success alone=mere prior achievement, future probability=future odds로 핵심 논리 구조가 보존됨","translation":"마태 효과는 단순한 이전의 성취만으로도 미래의 가능성이 높아진다고 주장한다"}],"sourceQuestion":"1번 지문"},{"keyExpression":"seldom one-hit wonders","passage":"Great scientists are seldom one-hit wonders. Newton is a prime example: beyond the Newtonian mechanics, he developed the theory of gravitation, calculus, laws of motion, and optimization.","passageTranslation":"위대한 과학자들은 단 하나의 업적만 남기는 경우가 거의 없다. 뉴턴이 대표적 예로, 뉴턴 역학 외에도 중력 이론, 미적분학, 운동 법칙, 최적화 이론을 발전시켰다.","qType":"correct","questionText":"'seldom one-hit wonders'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"rarely produce any discoveries worth noting","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: 여러 업적을 낸다는 긍정적 의미를 거의 발견이 없다는 부정적 의미로 왜곡함","translation":"주목할 만한 발견을 거의 내놓지 못한다"},{"text":"not typically known for just one contribution","isCorrect":true,"optionType":"correct","explanation":"올바름: 문맥상 위대한 과학자는 단 하나의 업적에 그치지 않는다는 의미를 유지함","translation":"보통 단 하나의 기여만으로 알려지지 않는다"},{"text":"tend to produce more than one significant discovery","isCorrect":true,"optionType":"correct","explanation":"올바름: 한 번의 성공에 그치지 않고 여러 발견을 한다는 핵심 의미를 보존함","translation":"한 가지 이상의 중요한 발견을 내놓는 경향이 있다"},{"text":"frequently make only a single important discovery","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: seldom을 frequently로 반전시켜 의미가 완전히 반대가 됨","translation":"빈번히 단 하나의 중요한 발견만 한다"}],"sourceQuestion":"1번 지문"},{"keyExpression":"chronic stress can disrupt its ability to regulate cortisol","passage":"However, chronic stress can disrupt its ability to regulate cortisol, trapping individuals in a constant state of fight, flight, or freeze.","passageTranslation":"그러나 만성 스트레스는 코르티솔을 조절하는 해마의 능력을 방해하여, 개인을 지속적인 투쟁-도피-경직 상태에 가둘 수 있다.","qType":"correct","questionText":"'chronic stress can disrupt its ability to regulate cortisol'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"moderate stress strengthens the hippocampus to better control cortisol secretion","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: chronic stress disrupts 기능을 moderate stress strengthens으로 인과와 결과 모두 반전시킴","translation":"중간 수준의 스트레스가 해마를 강화하여 코르티솔 분비를 더 잘 통제하게 함"},{"text":"ongoing stress impairs the hippocampus in managing cortisol levels","isCorrect":true,"optionType":"correct","explanation":"올바름: chronic = ongoing, disrupt = impairs, its ability to regulate = in managing으로 대상과 기능 모두 정확히 전환","translation":"지속적인 스트레스가 해마가 코르티솔 수준을 관리하는 능력을 손상시킴"},{"text":"persistent stress undermines the brain region responsible for cortisol control","isCorrect":true,"optionType":"correct","explanation":"올바름: chronic = persistent, disrupt = undermines, ability to regulate cortisol = responsible for cortisol control로 기능적 역할을 명시하여 전환","translation":"지속적인 스트레스가 코르티솔 조절을 담당하는 뇌 영역을 약화시킴"},{"text":"acute stress temporarily enhances the brain's cortisol regulation capacity","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: chronic(만성적)을 acute(급성의)로, disrupt(방해하다)를 enhances(향상시키다)로 대체하여 핵심 의미를 이중으로 왜곡","translation":"급성 스트레스가 뇌의 코르티솔 조절 능력을 일시적으로 향상시킴"},{"text":"long-lasting stress interferes with the hippocampal regulation of the stress hormone","isCorrect":true,"optionType":"correct","explanation":"올바름: chronic = long-lasting, disrupt = interferes with, cortisol = stress hormone으로 구체적 명칭 사용하여 의미 유지","translation":"장기적인 스트레스가 스트레스 호르몬에 대한 해마의 조절을 방해함"}],"sourceQuestion":"2번 지문"},{"keyExpression":"interaction between groups is socially unequal","passage":"Quite often the interaction between groups is socially unequal, and this is reflected in the fact that in many cases borrowing of words or constructions goes mostly or entirely in one direction.","passageTranslation":"집단 간 상호작용은 사회적으로 불평등한 경우가 매우 많으며, 이는 많은 경우 단어나 구문의 차용이 대부분 또는 전적으로 한 방향으로만 이루어진다는 사실에 반영되어 있다.","qType":"correct","questionText":"'interaction between groups is socially unequal'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"groups interact freely without any social hierarchy","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: socially unequal을 완전히 반전시켜 평등 관계로 왜곡","translation":"집단들이 어떠한 사회적 위계 없이 자유롭게 상호작용함"},{"text":"all groups contribute equally to cultural exchange","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: 불평등한 관계를 균등한 기여로 인과 역전시킴","translation":"모든 집단이 문화 교류에 동등하게 기여함"},{"text":"some groups hold more social influence than others in contact situations","isCorrect":true,"optionType":"correct","explanation":"올바름: unequal interaction을 비교 구조로 논리 전환하여 의미 보존","translation":"일부 집단이 접촉 상황에서 더 큰 사회적 영향력을 지님"},{"text":"groups relate to each other in uneven power positions","isCorrect":true,"optionType":"correct","explanation":"올바름: socially unequal을 uneven power positions로 추상→구체 전환, 핵심 의미 유지","translation":"집단들이 불균등한 권력 위치에서 서로 관계를 맺음"}],"sourceQuestion":"3번 지문"},{"keyExpression":"involved in mood regulation","passage":"This part of the brain helps you remain resilient in the face of stress and is involved in mood regulation.","passageTranslation":"뇌의 이 부분은 스트레스에 직면했을 때 회복력을 유지하도록 도와주며 기분 조절에도 관여한다.","qType":"correct","questionText":"'involved in mood regulation'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"has no significant connection to emotional well-being","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: involved in(관여한다)을 has no connection(연관이 없다)으로 완전히 반의어 대체하여 의미 역전","translation":"감정적 안녕과 중요한 연관이 없음"},{"text":"plays a key role in stabilizing emotional states","isCorrect":true,"optionType":"correct","explanation":"올바름: involved in = plays a role in, mood regulation = stabilizing emotional states로 추상적 기능을 구체적 행위로 전환","translation":"감정 상태를 안정시키는 데 핵심적인 역할을 함"},{"text":"suppresses emotional reactions to prevent mood fluctuations","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: regulation(조절)을 suppression(억제)으로 의미를 좁혀 왜곡하고, 기능의 방향성도 변경","translation":"기분 변동을 방지하기 위해 감정 반응을 억제함"}],"sourceQuestion":"2번 지문"},{"keyExpression":"the effects of contact in that direction may not progress any further than this","passage":"The languages of socially subordinated groups may from quite an early period of contact provide terminology for objects or practices with which speakers of the more powerful group were previously unfamiliar, but the effects of contact in that direction may not progress any further than this.","passageTranslation":"사회적으로 종속된 집단의 언어는 접촉의 상당히 이른 시기부터 더 강력한 집단의 화자들이 이전에 알지 못했던 사물이나 관행에 대한 용어를 제공할 수 있지만, 그 방향에서의 접촉의 영향은 이 이상 더 나아가지 않을 수 있다.","qType":"correct","questionText":"'the effects of contact in that direction may not progress any further than this'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"the stronger group continues to be influenced deeply by the subordinated language","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: no further progress를 deep ongoing influence로 반전시켜 의미를 역전","translation":"더 강한 집단이 종속된 언어에 의해 계속 깊이 영향을 받음"},{"text":"contact between groups gradually leads to complete language blending over time","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: may not progress further(더 나아가지 않음)를 반전시켜 점진적 완전 혼합으로 왜곡","translation":"집단 간 접촉이 시간이 지남에 따라 점차 완전한 언어 혼합으로 이어짐"},{"text":"linguistic exchange from subordinated to dominant groups extends no further than word-lending","isCorrect":true,"optionType":"correct","explanation":"올바름: progress no further를 extends no further로, effects of contact를 linguistic exchange로 구체화","translation":"종속 집단에서 지배 집단으로의 언어 교환은 단어 빌려주기를 넘어서지 않음"}],"sourceQuestion":"3번 지문"},{"keyExpression":"may from quite an early period of contact provide terminology for objects or practices with which speakers of the more powerful group were previously unfamiliar","passage":"The languages of socially subordinated groups may from quite an early period of contact provide terminology for objects or practices with which speakers of the more powerful group were previously unfamiliar.","passageTranslation":"사회적으로 종속된 집단의 언어는 접촉의 상당히 이른 시기부터 더 강력한 집단의 화자들이 이전에 알지 못했던 사물이나 관행에 대한 용어를 제공할 수 있다.","qType":"correct","questionText":"'may from quite an early period of contact provide terminology for objects or practices with which speakers of the more powerful group were previously unfamiliar'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"might offer vocabulary for concepts the powerful group encountered for the first time","isCorrect":true,"optionType":"correct","explanation":"올바름: previously unfamiliar를 encountered for the first time으로 구체화, 핵심 의미 보존","translation":"강력한 집단이 처음으로 접한 개념들에 대한 어휘를 제공할 수 있었음"},{"text":"adopted vocabulary from the powerful group for their own familiar practices","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: 종속 집단이 어휘를 제공하는 방향을 반전시켜, 오히려 받아들이는 쪽으로 인과 역전","translation":"자신들의 친숙한 관행을 위해 강력한 집단으로부터 어휘를 채택했음"},{"text":"replaced existing dominant-group terms with their own from an early stage","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: 새로운 용어 제공을 기존 강력 집단 용어의 대체로 의미 왜곡","translation":"초기 단계부터 기존의 강력 집단 용어들을 자신들의 것으로 대체했음"}],"sourceQuestion":"3번 지문"},{"keyExpression":"the fate of the language system is extinction after the obliteration of many of its speakers","passage":"In some cases, as with the Dharug language of Sydney, Australia, the source of some of the earliest loans from Indigenous Australian languages into English, the fate of the language system is extinction after the obliteration of many of its speakers.","passageTranslation":"일부 경우에는, 영어로의 오스트레일리아 원주민 언어 초기 차용어의 출처인 오스트레일리아 시드니의 다루그어처럼, 언어 체계의 운명이 많은 화자들의 전멸 이후의 소멸이다.","qType":"correct","questionText":"'the fate of the language system is extinction after the obliteration of many of its speakers'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"the language ultimately dies out as a large portion of its native speakers are wiped out","isCorrect":true,"optionType":"correct","explanation":"올바름: extinction을 dies out으로, obliteration을 wiped out으로 구체적 행위로 전환하여 의미 보존","translation":"많은 원어민 화자들이 전멸되면서 그 언어는 결국 소멸함"},{"text":"once most speakers are destroyed, the language itself ceases to exist","isCorrect":true,"optionType":"correct","explanation":"올바름: obliteration of speakers를 원인으로, extinction of language를 결과로 인과 구조 명시","translation":"대부분의 화자들이 파멸되면, 언어 자체도 존재를 멈춤"},{"text":"the disappearance of the language causes the destruction of its speakers","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: 화자 소멸→언어 소멸의 인과를 역전시켜 언어 소멸→화자 소멸로 왜곡","translation":"언어의 소멸이 화자들의 파괴를 야기함"},{"text":"the language survives despite the loss of its original speaker community","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: extinction(소멸)을 survives(생존)로 반전시켜 핵심 결과를 왜곡","translation":"원래 화자 공동체의 소멸에도 불구하고 언어가 살아남음"},{"text":"the language vanishes permanently following the mass killing of those who spoke it","isCorrect":true,"optionType":"correct","explanation":"올바름: obliteration을 mass killing으로 구체화하고 extinction을 vanishes permanently로 강화","translation":"그것을 사용했던 이들의 대량 학살 이후 언어가 영구적으로 사라짐"}],"sourceQuestion":"3번 지문"}]};
var QS=CONFIG.questions||[];
var TOTAL=QS.length;
var SET_SIZE=10;
var SETS=(function(){var s=[];for(var i=0;i<TOTAL;i+=SET_SIZE)s.push(QS.slice(i,i+SET_SIZE));return s;})();
var CIRCLED=["①","②","③","④","⑤","⑥"];
var answers={};var selections={};var currentSet=0;
var _tLast=0;var _busy=false;var _curPos=-1;
function esc(s){if(s==null)return"";var d=document.createElement("div");d.textContent=String(s);return d.innerHTML}
function setH(t,sub){var h=document.getElementById("hTitle");var p=document.getElementById("hSub");if(h)h.textContent=t;if(p)p.textContent=sub}
function gi(si,pi){return si*SET_SIZE+pi}
function showIndex(){
  setH(CONFIG.title,"Paraphrasing 표현 테스트");
  var chips=SETS.map(function(sq,si){
    var base=si*SET_SIZE;var done=0,correct=0;
    for(var i=0;i<sq.length;i++){var a=answers[base+i];if(a){done++;if(a.isCorrect)correct++;}}
    var allDone=(done===sq.length);
    var pct=done>0?Math.round(correct/sq.length*100):null;
    var passed=pct!==null&&pct>=CONFIG.passThreshold;
    var scoreHTML=pct===null
      ?"<span style='font-size:.78rem;color:#9ca3af'>미응시</span>"
      :(allDone?"<span style='font-weight:700;color:"+(passed?"#10b981":"#ef4444")+";'>"+(passed?"✅ ":"❌ ")+pct+"%</span>"
             :"<span style='font-weight:700;color:#f59e0b'>📝 "+done+"/"+sq.length+"</span>");
    return "<div class='set-card"+(allDone?" done":"")+"'onclick='enterSet("+si+")'>"
           +"<div><div style='font-weight:700'>세트 "+(si+1)+" <span style='font-size:.8rem;color:#6b7280;font-weight:400'>("+sq.length+"문제)</span></div></div>"
           +"<div>"+scoreHTML+"</div></div>";
  }).join("");
  var app=document.getElementById("app");if(!app)return;
  app.innerHTML="<div class='fade' style='text-align:center;padding:16px 0'>"
    +"<div style='font-size:2.5rem;margin-bottom:8px'>🔄</div>"
    +"<h2 style='font-size:1.2rem;font-weight:700;color:#1f2937;margin-bottom:4px'>Paraphrasing 표현 테스트</h2>"
    +"<p style='color:#6b7280;font-size:.85rem;margin-bottom:16px'>전체 "+TOTAL+"문제 · "+CONFIG.passThreshold+"% 이상 통과</p>"
    +"</div><div class='set-list'>"+chips+"</div>";
}
function enterSet(si){currentSet=si;_curPos=-1;showQ(0)}
function showQ(pos){
  if(pos!==_curPos){try{window.scrollTo(0,0)}catch(e){}_curPos=pos;}
  var si=currentSet;var qs=SETS[si];
  if(!qs||pos<0||pos>=qs.length){showIndex();return;}
  var gidx=gi(si,pos);var q=qs[pos];var answered=answers[gidx];
  var sel=selections[gidx]||{};
  setH("세트 "+(si+1),"문제 "+(pos+1)+"/"+qs.length);
  var pct=Math.round((pos+1)/qs.length*100);
  var isTypeA=q.qType==="correct";
  var correctCount=q.options.filter(function(o){return o.isCorrect}).length;
  var optsHTML=q.options.map(function(o,i){
    var cls="";var chkTxt="";
    if(answered){
      var wasSel=!!(answered.selected&&answered.selected[i]);
      if(isTypeA){
        if(o.isCorrect&&wasSel){cls="a-corr-hit";chkTxt="✓"}
        else if(o.isCorrect&&!wasSel){cls="a-corr-miss";chkTxt="○"}
        else if(!o.isCorrect&&wasSel){cls="a-wrong-sel";chkTxt="✕"}
        else{cls="a-wrong-unsel"}
      }else{
        if(o.isCorrect&&wasSel){cls="b-ans-hit";chkTxt="✓"}
        else if(o.isCorrect&&!wasSel){cls="b-ans-miss";chkTxt="○"}
        else if(!o.isCorrect&&wasSel){cls="b-corr-sel";chkTxt="✓"}
        else{cls="b-corr-unsel"}
      }
    }else if(sel[i]){cls="selected";chkTxt="✓"}
    return "<button class='chk-btn "+cls+"' onclick='toggleOpt("+pos+","+i+")' "+(answered?"disabled":"")+" data-idx='"+i+"'>"
           +"<div class='chk-box'>"+chkTxt+"</div>"
           +"<span>"+esc(o.text)+"</span></button>";
  }).join("");
  var feedbackHTML="";
  if(answered){
    var cidxs=[];
    q.options.forEach(function(o,i){if(o.isCorrect)cidxs.push(i)});
    var cLabel=cidxs.map(function(i){return CIRCLED[i]}).join(", ");
    feedbackHTML="<div class='fb "+(answered.isCorrect?"ok":"ng")+"'>"
      +(answered.isCorrect?"✅ 정답!":"❌ 오답 — 정답: "+cLabel)
      +"</div>"
      +"<div class='explain-box'><div class='ex-title'>해설</div>"
      +q.options.map(function(o,i){
        var tag;
        if(isTypeA){tag=o.isCorrect?"<span class='tag-ok'>[올바른 paraphrasing]</span>":"<span class='tag-ng'>[잘못된 paraphrasing]</span>"}
        else{tag=o.isCorrect?"<span class='tag-ng'>[잘못된 paraphrasing]</span>":"<span class='tag-ok'>[올바른 paraphrasing]</span>"}
        return "<div class='ex-item'><strong>"+CIRCLED[i]+" "+esc(o.text)+"</strong> "+tag
               +"<br><span class='trans'>→ "+esc(o.translation||o.explanation)+"</span></div>";
      }).join("")+"</div>";
  }
  var passageSection="";
  if(q.passage){
    passageSection="<button class='show-passage-btn' id='pbtn' onclick='togglePassage()'>📄 지문 보기</button>"
                  +"<div class='passage-box' id='pbox' style='display:none'>"+esc(q.passage)+"</div>";
  }
  var hintColor=answered?(answered.isCorrect?"#166534":"#991b1b"):"#4f46e5";
  var hintHTML=CONFIG.showCountHint
    ?"<div class='q-hint' style='background:rgba(139,92,246,.08);border:1px solid rgba(139,92,246,.2);color:#374151'>정답 개수 : <span style='font-size:1.5em;font-weight:900;color:"+hintColor+"'>"+correctCount+"</span>개</div>"
    :"<div class='q-hint' style='background:#f8fafc;color:#64748b;border:1px solid #e2e8f0'>"+(isTypeA?"<span style='color:#059669;font-weight:800'>올바른</span>":"<span style='color:#e11d48;font-weight:800'>잘못된</span>")+" paraphrasing을 모두 선택 후 제출하세요</div>";
  var typeBadge=isTypeA
    ?"<div class='type-badge ok'>✅ 올바른 paraphrasing 찾기</div>"
    :"<div class='type-badge ng'>❌ 잘못된 paraphrasing 찾기</div>";
  var app=document.getElementById("app");if(!app)return;
  app.innerHTML="<div class='fade'>"
    +"<div class='q-counter'>"+(pos+1)+" / "+qs.length+"</div>"
    +"<div class='prog-bar'><div class='prog-fill' style='width:"+pct+"%;background:"+(isTypeA?"#059669":"#dc2626")+"'></div></div>"
    +(q.sourceQuestion?"<div style='display:inline-block;background:#fef3c7;color:#b45309;padding:4px 12px;border-radius:20px;font-size:.78rem;font-weight:600;margin-bottom:10px'>"+esc(q.sourceQuestion)+"</div>":"")
    +typeBadge
    +"<div class='key-box'>"
    +"<div class='expr'>“"+esc(q.keyExpression)+"”</div>"
    +"<div class='qtext'>"+(isTypeA
      ?"위 표현을 <span style='color:#059669;font-weight:800'>올바르게</span> paraphrasing 한 것을 모두 고르시오."
      :"위 표현을 <span style='color:#e11d48;font-weight:800'>잘못</span> paraphrasing 한 것을 모두 고르시오.")
    +"</div></div>"
    +passageSection
    +hintHTML
    +"<div class='opts'>"+optsHTML+"</div>"
    +feedbackHTML
    +"<div class='nav-bar'>"
    +"<button class='nav-btn prev' onclick='showQ("+(pos-1)+")' "+(pos<=0?"disabled":"")+">← 이전</button>"
    +"<button class='nav-btn home' onclick='showIndex()'>목록</button>"
    +(!answered
      ?"<button class='nav-btn next' onclick='submitAnswer("+pos+")'>✓ 제출</button>"
      :"<button class='nav-btn next' onclick='"+(pos<qs.length-1?"showQ("+(pos+1)+")":"showSetResult()")+"'>→ "+(pos<qs.length-1?"다음":"결과")+"</button>")
    +"</div></div>";
}
function toggleOpt(pos,optIdx){
  var _n=Date.now();if(_n-_tLast<280)return;_tLast=_n;
  var gidx=gi(currentSet,pos);
  if(answers[gidx])return;
  if(!selections[gidx])selections[gidx]={};
  if(selections[gidx][optIdx])delete selections[gidx][optIdx];
  else selections[gidx][optIdx]=true;
  showQ(pos);
}
function submitAnswer(pos){
  try{
  var gidx=gi(currentSet,pos);
  if(answers[gidx])return;
  var q=SETS[currentSet][pos];
  if(!q)return;
  var sel=selections[gidx]||{};
  var isCorrect=true;
  for(var i=0;i<q.options.length;i++){
    var wasSel=!!sel[i];var shouldSel=q.options[i].isCorrect;
    if(wasSel!==shouldSel){isCorrect=false;break}
  }
  answers[gidx]={selected:sel,isCorrect:isCorrect};
  showQ(pos);
  }catch(e){console.error("submitAnswer err",e)}
}
function togglePassage(){
  var b=document.getElementById("pbox");var btn=document.getElementById("pbtn");
  if(!b)return;
  if(b.style.display==="none"){b.style.display="block";if(btn)btn.textContent="📄 지문 숨기기"}
  else{b.style.display="none";if(btn)btn.textContent="📄 지문 보기"}
}
function showSetResult(){
  var si=currentSet;var qs=SETS[si];var base=si*SET_SIZE;
  var total=qs.length;var correct=0;
  for(var i=0;i<total;i++){var a=answers[base+i];if(a&&a.isCorrect)correct++}
  var pct=Math.round(correct/total*100);
  var passed=pct>=CONFIG.passThreshold;
  setH("세트 "+(si+1)+" 결과",passed?"통과":"미달");
  var app=document.getElementById("app");if(!app)return;
  app.innerHTML="<div class='fade' style='text-align:center;padding:16px 0'>"
    +"<div class='score-circle "+(passed?"pass":"fail")+"'>"+(pct)+"%</div>"
    +"<p style='font-size:1.1rem;font-weight:700;color:"+(passed?"#10b981":"#ef4444")+"'>"+(passed?"통과!":"미달")+"</p>"
    +"<p style='color:#6b7280;font-size:.88rem;margin-top:8px'>"+correct+"/"+total+"문제 정답 · 기준 "+CONFIG.passThreshold+"%</p>"
    +"</div>"
    +"<div style='margin-top:16px'><button class='btn btn-primary' onclick='showIndex()'>목록으로</button></div>";
}
try{history.pushState(null,"",location.href);
window.addEventListener("popstate",function(){
  history.pushState(null,"",location.href);
  showIndex();
});}catch(e){}
showIndex();
</script>
