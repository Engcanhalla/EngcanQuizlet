<script>
var CONFIG={"title":"1Go2025.21.23.24","passThreshold":90,"level":"high1","levelLabel":"고1 3월 · CEFR B1","passages":[{"id":1,"title":"Gene Editing","body":"Assuming gene editing in humans proves to be safe and effective, it might seem logical, even preferable, to correct disease-causing mutations at the earliest possible stage of life, before harmful genes begin causing serious problems. Yet once it becomes possible to transform an embryo's mutated genes into \"normal\" ones, there will certainly be temptations to upgrade normal genes to superior versions. Should we begin editing genes in unborn children to lower their lifetime risk of heart disease or cancer? What about giving unborn children beneficial features, like greater strength and increased mental abilities, or changing physical characteristics, like eye and hair color? The pursuit for perfection seems almost natural to human nature, but if we start down this slippery slope, we may not like where we end up."},{"id":2,"title":"Relatedness","body":"There is a wealth of evidence that when parents, teachers, supervisors, and coaches are perceived as involved and caring, people feel happier and more motivated. And it is not just those people with power — we need to feel valued and respected by peers and coworkers. Thus, when the need for relatedness is met, motivation and internalization are fueled, provided that support for autonomy and competence are also there. If we are trying to motivate others, a caring relationship is a crucial basis from which to begin. And when we are trying to motivate ourselves, doing things to enhance a sense of connectedness to others can be crucial to long-term persistence. So exercise with a friend, call someone when you have a difficult decision to make, and be there as a support for others as they take on challenges."},{"id":3,"title":"Reading Aloud","body":"Modern brain-scanning techniques such as fMRI (functional Magnetic Resonance Imaging) have revealed that reading aloud lights up many areas of the brain. There is intense activity in areas associated with pronunciation and hearing the sound of the spoken response, which strengthens the connective structures of your brain cells for more brainpower. This leads to an overall improvement in concentration. Reading aloud is also a good way to develop your public speaking skills because it forces you to read each and every word — something people don't often do when reading quickly, or reading in silence. Children, in particular, should be encouraged to read aloud because the brain is wired for learning through connections that are created by positive stimulation, such as singing, touching, and reading aloud."}],"questions":[{"questionNumber":1,"passageId":1,"passageTitle":"Gene Editing","type":"ko_detail","typeLabel":"부분 내용 (한글)","statement":"본문의 \"slippery slope\"는 문자 그대로 비에 젖은 미끄러운 비탈길을 가리키며, 등산 시 위험한 지형을 조심하라는 안전 경고로 사용된다.","sourceSentence":"The pursuit for perfection seems almost natural to human nature, but if we start down this slippery slope, we may not like where we end up.","answer":"X","explanation":"본문의 'slippery slope'는 실제 비탈길이 아니라 한 번 발을 들이면 멈출 수 없이 점점 더 위험한 선택으로 끌려 내려가는 상황을 나타내는 비유적 표현이다. 따라서 문자적 해석과 등산 경고라는 진술은 완전히 잘못된 이해다."},{"questionNumber":2,"passageId":1,"passageTitle":"Gene Editing","type":"ko_detail","typeLabel":"부분 내용 (한글)","statement":"본문은 유전자 편집의 안전성과 효과가 이미 입증된 사실이 아니라 '만약 입증된다면'이라는 가정 위에서 논의를 전개한다.","sourceSentence":"Assuming gene editing in humans proves to be safe and effective, it might seem logical, even preferable, to correct disease-causing mutations at the earliest possible stage of life, before harmful genes begin causing serious problems.","answer":"O","explanation":"본문은 'Assuming ~ proves to be safe and effective'라는 조건절로 시작하여, 안전성·효과성을 전제로 깔고 그 가정 아래에서의 논리적 귀결을 이야기한다. 따라서 '입증된 사실이 아닌 가정'이라는 이해가 정확하다."},{"questionNumber":3,"passageId":1,"passageTitle":"Gene Editing","type":"en_main","typeLabel":"전반 내용 (영어)","statement":"Correcting defective genes at the earliest stage might appear reasonable, yet stepping onto that path could draw us toward outcomes we would rather avoid.","sourceSentence":null,"answer":"O","explanation":"본문 전반의 핵심 주장은 '이른 단계에서의 유전자 교정이 논리적으로 보일 수 있지만, 그것이 완벽 추구라는 미끄러운 비탈길로 이어져 원치 않는 결말에 이를 수 있다'는 것이다. 제시된 영어 문장은 이 핵심을 그대로 paraphrase 했다."},{"questionNumber":4,"passageId":1,"passageTitle":"Gene Editing","type":"en_main","typeLabel":"전반 내용 (영어)","statement":"The author openly celebrates the upgrading of normal genes into superior versions as a worthy goal that society should actively pursue.","sourceSentence":null,"answer":"X","explanation":"본문은 '정상 유전자를 더 우월한 버전으로 업그레이드하려는 유혹이 반드시 생길 것'이라고 '경고'할 뿐, 이를 추구해야 할 목표로 '찬양'한 적이 없다. 오히려 완벽 추구는 위험한 연쇄 선택으로 이어질 수 있다고 명시한다."},{"questionNumber":5,"passageId":1,"passageTitle":"Gene Editing","type":"en_twist","typeLabel":"원문 교묘한 Paraphrasing","statement":"Once scientists become able to convert an embryo's faulty genes into healthy ones, strong urges will surely arise to enhance already-healthy genes into ones viewed as superior.","sourceSentence":"Yet once it becomes possible to transform an embryo's mutated genes into \"normal\" ones, there will certainly be temptations to upgrade normal genes to superior versions.","answer":"O","explanation":"제시된 문장은 'transform mutated→normal'을 'convert faulty→healthy'로, 'temptations'를 'strong urges'로, 'upgrade'를 'enhance'로 동의어 치환했을 뿐 의미는 원문과 완전히 동일하다. 의미 왜곡이 없으므로 O."},{"questionNumber":6,"passageId":1,"passageTitle":"Gene Editing","type":"en_twist","typeLabel":"원문 교묘한 Paraphrasing","statement":"Fixing disease-causing mutations at the latest possible moment of life would appear both rational and advisable, long after harmful genes have already begun causing serious trouble.","sourceSentence":"Assuming gene editing in humans proves to be safe and effective, it might seem logical, even preferable, to correct disease-causing mutations at the earliest possible stage of life, before harmful genes begin causing serious problems.","answer":"X","explanation":"원문은 'earliest possible stage(가능한 가장 이른 단계)'에서, 'before harmful genes begin causing serious problems(해로운 유전자가 심각한 문제를 일으키기 전에)' 교정하는 것이 논리적이라고 했다. 제시된 문장은 'earliest→latest', 'before→long after'로 두 군데에서 시점을 정반대로 뒤집어 의미를 왜곡했다."},{"questionNumber":7,"passageId":1,"passageTitle":"Gene Editing","type":"thats_why","typeLabel":"That's why 인과","statement":"People sometimes arrive at outcomes they later regret. That's why the desire to pursue perfection feels almost natural to human beings.","sourceSentence":null,"answer":"X","explanation":"본문의 실제 인과 방향은 '완벽을 추구하려는 본성(원인) → 미끄러운 비탈길 → 원치 않는 결말(결과)'이다. 제시된 문장은 이 순서를 완전히 뒤집어 '원치 않는 결말(결과)이 있기 때문에 완벽 추구 욕구가 생긴다(원인)'고 말하고 있어 원인과 결과의 위치가 서로 맞바뀌었다."},{"questionNumber":8,"passageId":1,"passageTitle":"Gene Editing","type":"this_leads","typeLabel":"This leads 인과","statement":"Transforming mutated embryo genes into normal ones becomes medically feasible. This leads to pressures for enhancing normal genes into ones considered superior.","sourceSentence":null,"answer":"O","explanation":"본문은 '돌연변이 유전자를 정상으로 바꿀 수 있게 되는 것(원인) → 정상 유전자를 더 우월한 것으로 업그레이드하려는 유혹(결과)'이라는 인과 흐름을 명확히 제시한다. 제시된 문장의 원인·결과 순서가 본문과 정확히 일치한다."},{"questionNumber":9,"passageId":1,"passageTitle":"Gene Editing","type":"ko_cause","typeLabel":"한국어 인과","statement":"완벽을 향한 욕구가 인간 본성에 자연스럽게 자리 잡은 이유는, 사람들이 이미 원치 않는 결말에 도달해 본 경험이 있기 때문이다.","sourceSentence":null,"answer":"X","explanation":"본문의 인과는 '완벽 추구 성향(원인) → 미끄러운 비탈길 → 원치 않는 결말(결과)' 방향이다. 제시된 진술은 결과를 원인 자리에, 원인을 결과 자리에 놓아 인과 방향을 정반대로 뒤집었다."},{"questionNumber":10,"passageId":1,"passageTitle":"Gene Editing","type":"ko_cause","typeLabel":"한국어 인과","statement":"완벽을 향한 추구가 인간 본성에 거의 본능처럼 자리 잡고 있기 때문에, 한 번 이 길에 들어서면 결국 우리가 원치 않는 곳에 도달할 수 있다.","sourceSentence":null,"answer":"O","explanation":"본문의 마지막 문장은 '완벽 추구가 인간 본성에 자연스러워 보이지만, 이 미끄러운 비탈길을 내려가기 시작하면 도달하는 곳이 마음에 들지 않을 수 있다'고 경고한다. 제시된 진술은 원인·결과의 방향을 정확히 반영하였다."},{"questionNumber":11,"passageId":2,"passageTitle":"Relatedness","type":"ko_detail","typeLabel":"부분 내용 (한글)","statement":"본문은 권력을 가진 사람들로부터 가치 있게 여겨지는 것만으로는 충분하지 않으며, 동료와 동업자에게서도 존중받아야 한다고 명시한다.","sourceSentence":"And it is not just those people with power — we need to feel valued and respected by peers and coworkers.","answer":"O","explanation":"본문은 '권력을 가진 사람들뿐 아니라(not just those people with power)' 동료와 동업자에게서도 가치와 존중을 느낄 필요가 있다고 말한다. 진술은 이 부분을 정확히 반영한다."},{"questionNumber":12,"passageId":2,"passageTitle":"Relatedness","type":"ko_detail","typeLabel":"부분 내용 (한글)","statement":"본문에 따르면, 자율성과 유능성에 대한 지원이 없더라도 관계성 욕구만 충족되면 동기와 내면화는 충분히 촉진된다.","sourceSentence":"Thus, when the need for relatedness is met, motivation and internalization are fueled, provided that support for autonomy and competence are also there.","answer":"X","explanation":"본문은 'provided that support for autonomy and competence are also there(자율성과 유능성 지원이 함께 있다는 전제에서)'라는 조건을 명확히 달고 있다. 관계성 충족 단독으로 충분하다는 진술은 이 조건을 무시한 왜곡이다."},{"questionNumber":13,"passageId":2,"passageTitle":"Relatedness","type":"en_main","typeLabel":"전반 내용 (영어)","statement":"Building a sense of connection with others plays a crucial role in driving people's motivation and in sustaining their effort over the long run.","sourceSentence":null,"answer":"O","explanation":"본문의 핵심 주장은 '관계성 욕구 충족이 동기·내면화를 촉진하고, 연결감을 강화하는 행위가 장기적 지속에 결정적이다'이다. 제시된 영어 문장은 이 두 축을 하나로 묶어 paraphrase 한 것이다."},{"questionNumber":14,"passageId":2,"passageTitle":"Relatedness","type":"en_main","typeLabel":"전반 내용 (영어)","statement":"According to the passage, approval from authority figures alone is enough to sustain long-term motivation, regardless of how peers and coworkers treat us.","sourceSentence":null,"answer":"X","explanation":"본문은 '권력을 가진 사람들뿐 아니라' 동료·동업자에게서도 존중받아야 한다고 명시한다. 권위자의 승인만으로 충분하다는 진술은 본문의 핵심 조건을 정반대로 뒤집은 것이다."},{"questionNumber":15,"passageId":2,"passageTitle":"Relatedness","type":"en_twist","typeLabel":"원문 교묘한 Paraphrasing","statement":"When we try to motivate ourselves, strengthening our bond with other people can prove essential for sustaining effort over the long run.","sourceSentence":"And when we are trying to motivate ourselves, doing things to enhance a sense of connectedness to others can be crucial to long-term persistence.","answer":"O","explanation":"원문의 'enhance a sense of connectedness to others'를 'strengthening our bond with other people'로, 'crucial to long-term persistence'를 'essential for sustaining effort over the long run'으로 paraphrase 했을 뿐 의미는 동일하다."},{"questionNumber":16,"passageId":2,"passageTitle":"Relatedness","type":"en_twist","typeLabel":"원문 교묘한 Paraphrasing","statement":"When trying to motivate others, a distant and detached relationship serves as a crucial foundation from which the process should begin.","sourceSentence":"If we are trying to motivate others, a caring relationship is a crucial basis from which to begin.","answer":"X","explanation":"원문은 'caring relationship(돌보는 관계)'이 동기 부여의 핵심 기반이라고 했다. 제시된 문장은 이를 'distant and detached relationship(거리 두고 무관심한 관계)'으로 바꾸어 의미를 정반대로 왜곡했다."},{"questionNumber":17,"passageId":2,"passageTitle":"Relatedness","type":"thats_why","typeLabel":"That's why 인과","statement":"People already experience fueled motivation and deep internalization. That's why their need for relatedness eventually becomes met, together with autonomy and competence support.","sourceSentence":null,"answer":"X","explanation":"본문의 실제 인과는 '관계성 욕구 충족 + 자율성·유능성 지원(원인) → 동기·내면화 촉진(결과)'이다. 제시된 진술은 결과를 원인 자리에, 원인을 결과 자리에 배치하여 방향을 완전히 역전시켰다."},{"questionNumber":18,"passageId":2,"passageTitle":"Relatedness","type":"this_leads","typeLabel":"This leads 인과","statement":"A person's need for connection with others is satisfied while their needs for autonomy and competence are also supported. This leads to stronger motivation and deeper internalization of what they learn.","sourceSentence":null,"answer":"O","explanation":"본문은 '관계성 욕구가 충족되고 자율성·유능성 지원도 함께 있을 때(원인) 동기와 내면화가 촉진된다(결과)'라고 명시한다. 제시된 진술의 원인·결과 방향이 본문과 정확히 일치한다."},{"questionNumber":19,"passageId":2,"passageTitle":"Relatedness","type":"ko_cause","typeLabel":"한국어 인과","statement":"사람들은 이미 더 행복하고 더 의욕이 넘치기 때문에, 그 결과로 부모·교사·상사·코치가 자신을 돌보고 함께해 주는 존재로 인식된다.","sourceSentence":null,"answer":"X","explanation":"본문의 인과는 '권위자가 돌보는 존재로 인식됨(원인) → 사람들이 더 행복·의욕적이 됨(결과)' 순서다. 제시된 진술은 원인과 결과를 뒤바꿔, 행복·의욕이 먼저이고 돌봄 인식이 나중인 것처럼 서술하여 방향을 역전시켰다."},{"questionNumber":20,"passageId":2,"passageTitle":"Relatedness","type":"ko_cause","typeLabel":"한국어 인과","statement":"자기 자신을 동기 부여하려 할 때 타인과의 연결감을 강화하는 행동들이 뒷받침되기 때문에, 장기적으로 끈기 있게 지속해 갈 수 있는 힘이 생긴다.","sourceSentence":null,"answer":"O","explanation":"본문은 '자기 동기 부여 시 연결감을 강화하는 행위(원인) → 장기적 지속(결과)'이라는 인과를 직접적으로 제시한다. 제시된 진술의 원인·결과 배열이 본문의 흐름과 일치한다."},{"questionNumber":21,"passageId":3,"passageTitle":"Reading Aloud","type":"ko_detail","typeLabel":"부분 내용 (한글)","statement":"본문에 따르면 fMRI 연구는 소리 내어 읽기가 뇌의 단 두세 개 영역에 국한된 제한적인 활동만을 일으킨다는 것을 밝혀냈다.","sourceSentence":"Modern brain-scanning techniques such as fMRI (functional Magnetic Resonance Imaging) have revealed that reading aloud lights up many areas of the brain.","answer":"X","explanation":"본문은 소리 내어 읽기가 '뇌의 많은 영역(many areas)'을 활성화한다고 명시한다. '두세 개 영역'이라는 수량 축소는 'many'를 정반대 방향으로 왜곡한 것이다."},{"questionNumber":22,"passageId":3,"passageTitle":"Reading Aloud","type":"ko_detail","typeLabel":"부분 내용 (한글)","statement":"본문은 사람들이 빠르게 읽거나 조용히 묵독할 때 모든 단어를 꼼꼼하게 훑어 읽지 않는 경향이 있다고 지적한다.","sourceSentence":"Reading aloud is also a good way to develop your public speaking skills because it forces you to read each and every word — something people don't often do when reading quickly, or reading in silence.","answer":"O","explanation":"본문은 빠른 읽기나 묵독 시 사람들이 '모든 단어를 읽지 않는 경우가 많다'고 명시한다. 소리 내어 읽기는 반대로 모든 단어를 읽게 강제하기 때문에 발표 능력 계발에 도움이 된다고 설명한다."},{"questionNumber":23,"passageId":3,"passageTitle":"Reading Aloud","type":"en_main","typeLabel":"전반 내용 (영어)","statement":"Vocalizing written text engages numerous regions of the brain and contributes to stronger focus as well as improved oral delivery skills.","sourceSentence":null,"answer":"O","explanation":"본문의 요지는 '소리 내어 읽기가 뇌의 여러 영역을 활성화하고, 집중력과 발표 능력 향상으로 이어진다'는 것이다. 제시된 영어 문장은 이를 동의어로 재표현한 paraphrase다."},{"questionNumber":24,"passageId":3,"passageTitle":"Reading Aloud","type":"en_main","typeLabel":"전반 내용 (영어)","statement":"According to the passage, children should be discouraged from reading aloud because vocalization disrupts the brain's natural learning connections.","sourceSentence":null,"answer":"X","explanation":"본문은 정반대로 '어린이는 특히 소리 내어 읽기를 장려해야 한다'고 말한다. 그 이유는 뇌가 긍정적 자극을 통한 연결로 학습하도록 설계되어 있기 때문이다."},{"questionNumber":25,"passageId":3,"passageTitle":"Reading Aloud","type":"en_twist","typeLabel":"원문 교묘한 Paraphrasing","statement":"Brain-imaging tools like fMRI have shown that speaking written words out loud activates numerous regions throughout the brain.","sourceSentence":"Modern brain-scanning techniques such as fMRI (functional Magnetic Resonance Imaging) have revealed that reading aloud lights up many areas of the brain.","answer":"O","explanation":"원문의 'Modern brain-scanning techniques'를 'Brain-imaging tools'로, 'reading aloud'를 'speaking written words out loud'로, 'lights up many areas'를 'activates numerous regions'로 paraphrase 했을 뿐 의미는 동일하다."},{"questionNumber":26,"passageId":3,"passageTitle":"Reading Aloud","type":"en_twist","typeLabel":"원문 교묘한 Paraphrasing","statement":"Reading aloud is actually a poor way to develop public speaking skills, since it allows you to skip over words just as readily as silent or speedy reading does.","sourceSentence":"Reading aloud is also a good way to develop your public speaking skills because it forces you to read each and every word — something people don't often do when reading quickly, or reading in silence.","answer":"X","explanation":"원문은 소리 내어 읽기가 '모든 단어를 읽도록 강제하기 때문에' 발표 능력 계발에 '좋은 방법'이라고 말한다. 제시된 문장은 'good→poor'와 'forces you to read each word→allows you to skip over words'로 두 핵심 요소를 정반대로 뒤집었다."},{"questionNumber":27,"passageId":3,"passageTitle":"Reading Aloud","type":"thats_why","typeLabel":"That's why 인과","statement":"A person's overall concentration improves first. That's why intense activity later takes place in the brain areas linked to pronunciation and listening when they read aloud.","sourceSentence":null,"answer":"X","explanation":"본문의 인과는 '발음·청각 영역의 집중적 활동(원인) → 뇌세포 연결 구조 강화 → 집중력 향상(결과)'이다. 제시된 진술은 결과(집중력 향상)를 원인 자리에, 원인(뇌 활동)을 결과 자리에 놓아 인과 방향을 완전히 뒤집었다."},{"questionNumber":28,"passageId":3,"passageTitle":"Reading Aloud","type":"this_leads","typeLabel":"This leads 인과","statement":"Speaking written words out loud triggers vigorous activity in the brain's pronunciation and listening regions. This leads to firmer connections between brain cells and greater mental capacity.","sourceSentence":null,"answer":"O","explanation":"본문은 '발음·청각 영역의 활발한 활동(원인) → 뇌세포 연결 구조 강화 → 뇌의 힘 증가(결과)'라는 인과 흐름을 명시한다. 제시된 진술은 paraphrase 된 형태이면서 원인·결과 배열이 본문과 정확히 일치한다."},{"questionNumber":29,"passageId":3,"passageTitle":"Reading Aloud","type":"ko_cause","typeLabel":"한국어 인과","statement":"뇌세포의 연결 구조가 이미 튼튼하게 강화되어 있기 때문에, 그 결과로 발음과 청각 관련 뇌 영역에서 집중적인 활동이 일어난다.","sourceSentence":null,"answer":"X","explanation":"본문은 정반대로 '발음·청각 영역의 활발한 활동(원인) → 뇌세포 연결 구조 강화(결과)'라고 말한다. 제시된 진술은 결과인 연결 구조 강화를 원인으로, 원인인 영역 활동을 결과로 놓아 인과 방향을 뒤집은 전형적인 역전 함정이다."},{"questionNumber":30,"passageId":3,"passageTitle":"Reading Aloud","type":"ko_cause","typeLabel":"한국어 인과","statement":"어린이의 뇌는 긍정적 자극을 통해 만들어지는 연결로 학습하도록 설계되어 있기 때문에, 소리 내어 읽기 같은 활동이 특별히 장려될 필요가 있다.","sourceSentence":null,"answer":"O","explanation":"본문은 '어린이의 뇌가 긍정적 자극(노래·접촉·소리 내어 읽기)을 통한 연결로 학습하도록 설계되어 있다(원인) → 따라서 소리 내어 읽기를 특히 장려해야 한다(결과)'라고 말한다. 제시된 진술의 인과 방향이 본문과 일치한다."}]};
var QS=CONFIG.questions||[];
var TOTAL=QS.length;
var SET_SIZE=10;
var SETS=(function(){var s=[];for(var i=0;i<TOTAL;i+=SET_SIZE)s.push(QS.slice(i,i+SET_SIZE));return s;})();
var answers={};var currentSet=0;
function esc(s){if(s==null)return"";var d=document.createElement("div");d.textContent=String(s);return d.innerHTML}
function setH(t,sub){var h=document.getElementById("hTitle");var p=document.getElementById("hSub");if(h)h.textContent=t;if(p)p.textContent=sub}
function gi(si,pi){return si*SET_SIZE+pi}
function showIndex(){
  setH(CONFIG.title,"OX 문제 테스트");
  var chips=SETS.map(function(sq,si){
    var base=si*SET_SIZE;var done=0,correct=0;
    for(var i=0;i<sq.length;i++){var a=answers[base+i];if(a){done++;if(a.isCorrect)correct++;}}
    var allDone=(done===sq.length);
    var pct=done>0?Math.round(correct/sq.length*100):null;
    var passed=pct!==null&&pct>=CONFIG.passThreshold;
    var scoreHTML=pct===null
      ?"<span style='font-size:.78rem;color:#9ca3af'>미응시</span>"
      :(allDone?"<span style='font-weight:700;color:"+(passed?"#10b981":"#ef4444")+"'>"+(passed?"✅ ":"❌ ")+pct+"%</span>"
             :"<span style='font-weight:700;color:#8b5cf6'>📝 "+done+"/"+sq.length+"</span>");
    return "<div class='set-card"+(allDone?" done":"")+"' onclick='enterSet("+si+")'>"
           +"<div><div style='font-weight:700'>세트 "+(si+1)+" <span style='font-size:.8rem;color:#6b7280;font-weight:400'>("+sq.length+"문제)</span></div></div>"
           +"<div>"+scoreHTML+"</div></div>";
  }).join("");
  var app=document.getElementById("app");if(!app)return;
  app.innerHTML="<div class='fade' style='text-align:center;padding:16px 0'>"
    +"<div style='font-size:2.5rem;margin-bottom:8px'>📱</div>"
    +"<h2 style='font-size:1.2rem;font-weight:700;color:#1f2937;margin-bottom:4px'>OX 문제 테스트</h2>"
    +"<p style='color:#6b7280;font-size:.85rem;margin-bottom:16px'>전체 "+TOTAL+"문제 · "+CONFIG.passThreshold+"% 이상 통과 · 몰라요는 오답 처리</p>"
    +"</div><div class='set-list'>"+chips+"</div>";
}
function enterSet(si){currentSet=si;showQ(0)}
function showQ(pos){
  try{window.scrollTo(0,0)}catch(e){}
  var si=currentSet;var qs=SETS[si];
  if(!qs||pos<0||pos>=qs.length){showIndex();return;}
  var gidx=gi(si,pos);var q=qs[pos];var answered=answers[gidx];
  setH("세트 "+(si+1),"문제 "+(pos+1)+"/"+qs.length);
  var pct=Math.round((pos+1)/qs.length*100);
  function btnClass(which){
    if(!answered)return "ox-btn "+which;
    if(answered.picked===which){
      if(which==="dunno")return "ox-btn dunno sel dunno wrong";
      return "ox-btn "+which+" "+(answered.isCorrect?"correct":"wrong");
    }
    return "ox-btn "+which;
  }
  var sourceHTML="";
  if(q.sourceSentence){sourceHTML="<div class='source-box'><span class='source-label'>원문</span>"+esc(q.sourceSentence)+"</div>";}
  var fbHTML="";
  if(answered){
    var cls=answered.picked==="dunno"?"dunno":(answered.isCorrect?"ok":"ng");
    var msg=answered.picked==="dunno"?"🤔 몰라요 — 해설을 학습하세요":(answered.isCorrect?"✅ 정답!":"❌ 오답");
    fbHTML="<div class='fb "+cls+"'>"+msg+"</div>"
      +"<div class='explain-box'><div class='ex-title'>📖 정답 & 해설</div>"
      +"<div class='ex-body'><span class='ex-answer "+q.answer+"'>"+q.answer+"</span>"+esc(q.explanation)+"</div></div>";
  }
  var app=document.getElementById("app");if(!app)return;
  app.innerHTML="<div class='fade'>"
    +"<div class='q-counter'>"+(pos+1)+" / "+qs.length+"</div>"
    +"<div class='prog-bar'><div class='prog-fill' style='width:"+pct+"%'></div></div>"
    +"<div class='title-box'><div class='ptitle'>"+esc(q.passageTitle)+"</div>"
    +"<span class='tlabel'>"+esc(q.typeLabel||"")+"</span></div>"
    +"<div class='statement'>"+esc(q.statement)+"</div>"
    +sourceHTML
    +"<div class='ox-grid'>"
    +"<button class='"+btnClass("o")+"' onclick='pick("+pos+",&quot;o&quot;)' "+(answered?"disabled":"")+"><span class='ox-icon'>⭕</span>O (맞음)</button>"
    +"<button class='"+btnClass("x")+"' onclick='pick("+pos+",&quot;x&quot;)' "+(answered?"disabled":"")+"><span class='ox-icon'>❌</span>X (틀림)</button>"
    +"<button class='"+btnClass("dunno")+"' onclick='pick("+pos+",&quot;dunno&quot;)' "+(answered?"disabled":"")+">🤔 몰라요 (정답·해설 보기)</button>"
    +"</div>"
    +fbHTML
    +"<div class='nav-bar'>"
    +"<button class='nav-btn prev' onclick='showQ("+(pos-1)+")' "+(pos<=0?"disabled":"")+">← 이전</button>"
    +"<button class='nav-btn home' onclick='showIndex()'>목록</button>"
    +"<button class='nav-btn next' onclick='"+(pos<qs.length-1?"showQ("+(pos+1)+")":"showSetResult()")+"'>"+(pos<qs.length-1?"다음 →":"결과")+"</button>"
    +"</div></div>";
}
function pick(pos,which){
  var gidx=gi(currentSet,pos);
  if(answers[gidx])return;
  var q=SETS[currentSet][pos];
  var isCorrect=false;
  if(which==="dunno"){isCorrect=false;}
  else{isCorrect=(which==="o"&&q.answer==="O")||(which==="x"&&q.answer==="X");}
  answers[gidx]={picked:which,isCorrect:isCorrect};
  showQ(pos);
}
function showSetResult(){
  var si=currentSet;var qs=SETS[si];var base=si*SET_SIZE;
  var total=qs.length;var correct=0,dunno=0;
  for(var i=0;i<total;i++){var a=answers[base+i];if(a&&a.isCorrect)correct++;if(a&&a.picked==="dunno")dunno++;}
  var pct=Math.round(correct/total*100);var passed=pct>=CONFIG.passThreshold;
  setH("세트 "+(si+1)+" 결과",passed?"통과":"미달");
  var app=document.getElementById("app");if(!app)return;
  app.innerHTML="<div class='fade' style='text-align:center;padding:16px 0'>"
    +"<div class='score-circle "+(passed?"pass":"fail")+"'>"+pct+"%</div>"
    +"<p style='font-size:1.1rem;font-weight:700;color:"+(passed?"#10b981":"#ef4444")+"'>"+(passed?"통과!":"미달")+"</p>"
    +"<p style='color:#6b7280;font-size:.88rem;margin-top:8px'>"+correct+"/"+total+"문제 정답 · 몰라요 "+dunno+"개 · 기준 "+CONFIG.passThreshold+"%</p>"
    +"</div>"
    +"<div style='margin-top:16px'><button class='nav-btn next' style='width:100%;padding:14px' onclick='showIndex()'>목록으로</button></div>";
}
try{history.pushState(null,"",location.href);
window.addEventListener("popstate",function(){history.pushState(null,"",location.href);showIndex();});}catch(e){}
showIndex();
</script>
