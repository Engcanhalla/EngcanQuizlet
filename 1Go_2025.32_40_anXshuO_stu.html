swer, she might be worried that the answer is not good enough to justify the feeling.","passageTranslation":"그녀가 답을 떠올리더라도, 그 답이 감정을 정당화하기에 충분하지 않다고 걱정할 수 있다.","qType":"correct","questionText":"'the answer is not good enough to justify the feeling'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"the reason she gives might not seem to support her sadness","isCorrect":true,"optionType":"correct","explanation":"올바름: justify→support, feeling→sadness로 문맥상 구체화하여 핵심 의미 유지","translation":"그녀가 제시하는 이유가 슬픔을 뒷받침하지 못하는 것처럼 보일 수 있다"},{"text":"her answer is strong enough to prove the feeling is real","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: not good enough를 strong enough로 반의어 대체하여 원문과 정반대 의미가 됨","translation":"그녀의 답변은 감정이 진짜임을 증명하기에 충분히 강하다"},{"text":"she finds it easy to explain why she feels that way","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: 설명이 부족할까 걱정한다는 의미를 쉽게 설명한다는 반대 내용으로 왜곡","translation":"그녀는 자신이 그렇게 느끼는 이유를 쉽게 설명할 수 있다"},{"text":"what she says may feel like a weak excuse for her mood","isCorrect":true,"optionType":"correct","explanation":"올바름: not good enough to justify→weak excuse for, feeling→mood로 추상 개념을 구체적 표현으로 전환","translation":"그녀가 말하는 것이 자신의 감정에 대한 약한 변명처럼 느껴질 수 있다"}],"sourceQuestion":"1번 지문"},{"keyExpression":"sharing simple observations usually works better than asking questions to get a conversation rolling","passage":"sharing simple observations usually works better than asking questions to get a conversation rolling.","passageTranslation":"단순한 관찰을 공유하는 것이 대화를 시작하기 위해 질문하는 것보다 대개 더 효과적이다.","qType":"correct","questionText":"'sharing simple observations usually works better than asking questions to get a conversation rolling'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"offering calm observations is more useful than posing questions","isCorrect":true,"optionType":"correct","explanation":"올바름: simple observations→calm observations, asking questions→posing questions로 대조 구조와 의미 보존","translation":"차분한 관찰을 제공하는 것이 질문을 던지는 것보다 더 유용하다"},{"text":"complex analysis works better than simple comments in talks","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: simple observations를 complex analysis로 대체해 원문의 핵심인 단순함의 효용을 왜곡함","translation":"복잡한 분석이 대화에서 단순한 언급보다 더 효과적이다"},{"text":"making brief remarks tends to start a talk more effectively","isCorrect":true,"optionType":"correct","explanation":"올바름: observations→remarks, works better→more effectively, get a conversation rolling→start a talk로 구조와 의미 모두 정확히 paraphrasing","translation":"간단한 말을 건네는 것이 대화를 더 효과적으로 시작하는 경향이 있다"},{"text":"noting what you see often helps conversation begin more smoothly","isCorrect":true,"optionType":"correct","explanation":"올바름: sharing simple observations→noting what you see, works better→helps more smoothly로 핵심 의미 유지","translation":"보이는 것을 언급하는 것이 대화를 더 부드럽게 시작하도록 돕는다"},{"text":"asking direct questions is the best way to open dialogue","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: 원문은 질문보다 관찰 공유가 낫다고 했으나, 이 보기는 질문이 최선이라고 인과를 역전시킴","translation":"직접적인 질문을 하는 것이 대화를 여는 최선의 방법이다"}],"sourceQuestion":"1번 지문"},{"keyExpression":"creativity by definition involves the application of new information to old problems","passage":"On the other hand, creativity by definition involves the application of new information to old problems and the conception of new viewpoints and ideas.","passageTranslation":"반면에, 창의성은 정의상 오래된 문제에 새로운 정보를 적용하는 것과 새로운 관점과 아이디어를 구상하는 것을 포함한다.","qType":"correct","questionText":"'creativity by definition involves the application of new information to old problems'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"creativity means repeating proven methods on familiar challenges","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: new information을 proven methods로 대체하여 창의성의 핵심인 새로움을 제거하고 의미 왜곡","translation":"창의성은 친숙한 도전에 검증된 방법을 반복하는 것을 의미한다"},{"text":"being creative requires solving new problems with old knowledge","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: 원문의 new information→old problems 방향을 old knowledge→new problems로 완전히 역전","translation":"창의적이라는 것은 오래된 지식으로 새로운 문제를 해결하는 것을 요구한다"},{"text":"being creative inherently means using fresh knowledge on existing challenges","isCorrect":true,"optionType":"correct","explanation":"올바름: by definition을 inherently로, application of new information을 using fresh knowledge로, old problems를 existing challenges로 정확히 재구성","translation":"창의적이라는 것은 본질적으로 기존의 도전에 새로운 지식을 사용하는 것을 의미한다"}],"sourceQuestion":"5번 지문"},{"keyExpression":"wait for her response","passage":"You can say, 'You seem a little tired today,' or, 'I noticed that you frowned when I mentioned the recital,' and wait for her response.","passageTranslation":"당신은 '오늘 좀 피곤해 보이네' 또는 '발표회 얘기를 꺼냈을 때 네가 찡그리는 것을 알아챘어'라고 말하고 그녀의 반응을 기다릴 수 있다.","qType":"correct","questionText":"'wait for her response'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"tell her immediately what you think the answer is","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: 기다린다는 의미를 즉시 답을 말해준다는 행동으로 대체하여 기다림의 의미를 완전히 역전","translation":"당신이 생각하는 답을 즉시 그녀에게 말해주다"},{"text":"be patient until she is ready to speak","isCorrect":true,"optionType":"correct","explanation":"올바름: wait→be patient, for her response→until she is ready to speak으로 인내의 함축 의미 명시적으로 재구성","translation":"그녀가 말할 준비가 될 때까지 인내심을 갖다"},{"text":"allow her to take her time before answering","isCorrect":true,"optionType":"correct","explanation":"올바름: wait for her response→allow her to take her time before answering으로 의미를 구체적 행동으로 재표현","translation":"그녀가 대답하기 전에 충분한 시간을 갖도록 허용하다"},{"text":"keep asking until she gives a satisfying answer","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: 기다린다는 의미를 계속 질문한다는 반대 행동으로 왜곡하여 지문의 핵심 조언과 정면 배치됨","translation":"그녀가 만족스러운 답을 줄 때까지 계속 물어보다"}],"sourceQuestion":"1번 지문"},{"keyExpression":"I noticed that you frowned when I mentioned the recital","passage":"You can say, 'You seem a little tired today,' or, vary their acoustic output(음향 출력을 다양하게 하다), stressors→what is harming them으로 구체화","translation":"자신을 해치는 것에 따라 음향 출력을 다양하게 한다"}],"sourceQuestion":"4번 지문"},{"keyExpression":"happens completely without your conscious mind having much say in the matter","passage":"This change in sweat gland activity happens completely without your conscious mind having much say in the matter.","passageTranslation":"땀샘 활동의 이러한 변화는 당신의 의식적 사고가 그 문제에 대해 거의 관여하지 않은 채 완전히 일어난다.","qType":"incorrect","questionText":"'happens completely without your conscious mind having much say in the matter'을(를) 잘못 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"is triggered only when the mind actively decides to respond","isCorrect":true,"optionType":"incorrect","explanation":"잘못됨: 무의식적 자동 반응을 의식적 결정에 의한 반응으로 바꿔 지문의 핵심 주장을 훼손함","translation":"마음이 능동적으로 반응하기로 결정할 때만 유발된다"},{"text":"takes place automatically with no deliberate mental input","isCorrect":false,"optionType":"correct","explanation":"올바름: without conscious mind having say를 no deliberate mental input으로, completely를 automatically로 재구성하여 의미 보존함","translation":"의도적인 정신적 개입 없이 자동적으로 일어난다"},{"text":"occurs entirely beyond the control of our awareness","isCorrect":false,"optionType":"correct","explanation":"올바름: without conscious mind having say를 beyond the control of our awareness로 추상 개념을 유지하며 재표현함","translation":"우리의 인식 통제 밖에서 완전히 발생한다"},{"text":"proceeds involuntarily regardless of what we intend to do","isCorrect":false,"optionType":"correct","explanation":"올바름: without conscious control을 involuntarily regardless of what we intend로 함축 의미까지 재구성하여 paraphrasing함","translation":"우리가 의도하는 것과 무관하게 비자발적으로 진행된다"}],"sourceQuestion":"2번 지문"},{"keyExpression":"wait for her response","passage":"You can say, 'You seem a little tired today,' or, 'I noticed that you frowned when I mentioned the recital,' and wait for her response.","passageTranslation":"당신은 '오늘 좀 피곤해 보이네' 또는 '발표회 얘기를 꺼냈을 때 네가 찡그리는 것을 알아챘어'라고 말하고 그녀의 반응을 기다릴 수 있다.","qType":"incorrect","questionText anation":"올바름: hangs→stays(남다), mowed the lawn→lawn is cut로 수동 전환, familiar 추가로 경험적 맥락 보강","translation":"잔디를 자른 후 남아 있는 익숙한 향기"},{"text":"the scent released into the air when grass is trimmed","isCorrect":true,"optionType":"correct","explanation":"올바름: hangs in the air→released into the air, mowed→trimmed로 유의어 대체, 의미 충실히 유지","translation":"풀이 잘릴 때 공기 중으로 방출되는 향기"}],"sourceQuestion":"4번 지문"},{"keyExpression":"running a bit of electricity through your skin","passage":"We can actually measure your emotional state by tracking how your body subconsciously sweats, by running a bit of electricity through your skin.","passageTranslation":"우리는 실제로 피부에 약간의 전기를 흘려보냄으로써 신체가 무의식적으로 땀을 흘리는 방식을 추적하여 감정 상태를 측정할 수 있다.","qType":"incorrect","questionText":"'running a bit of electricity through your skin'을(를) 잘못 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"sending a weak electric signal through the body's outer layer","isCorrect":false,"optionType":"correct","explanation":"올바름: running electricity를 sending electric signal로, skin을 body's outer layer로 재표현하여 의미 유지함","translation":"신체의 외층을 통해 약한 전기 신호를 보내는"},{"text":"generating strong electrical pulses inside the bloodstream","isCorrect":true,"optionType":"incorrect","explanation":"잘못됨: a bit of electricity를 strong electrical pulses로, skin을 bloodstream으로 바꿔 강도와 위치를 모두 왜곡함","translation":"혈류 내부에 강한 전기 펄스를 생성하는"},{"text":"absorbing natural electricity emitted by the nervous system","isCorrect":true,"optionType":"incorrect","explanation":"잘못됨: running electricity through skin을 absorbing electricity from nervous system으로 바꿔 방향과 출처를 완전히 역전시킴","translation":"신경계가 방출하는 자연적인 전기를 흡수하는"},{"text":"applying low-level electrical flow to the skin","isCorrect":false,"optionType":"correct","explanation":"올바름: a bit of electricity를 low-level electrical flow로, running through를 applying to로 재구성하여 paraphrasing함","translation":"피부에 낮은 수준의 전기 흐름을 적용하는"},{"text":"passing a small electrical current across the skin surface","isCorrect":false,"optionType":"correct","explanation":"올바름: running을 passing로, a bit of electricity를 a small electrical current로 구체화하여 의미 보존함","translation":"피부 표면에 작은 전류를 통과시키는"}],"sourceQuestion":"2번 지문"},{"keyExpression":"creativity by definition involves the application of new information to old problems","passage":"On the other hand, creativity by definition involves the application of new information to old problems and the conception of new viewpoints and ideas.","passageTranslation":"반면에, 창의성은 정의상 오래된 문제에 새로운 정보를 적용하는 것과 새로운 관점과 아이디어를 구상하는 것을 포함한다.","qType":"correct","questionText":"'creativity by definition involves the application of new information to old problems'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"being creative requires solving new problems with old knowledge","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: 원문의 new information→old problems 방향을 old knowledge→new problems로 완전히 역전","translation":"창의적이라는 것은 오래된 지식으로 새로운 문제를 해결하는 것을 요구한다"},{"text":"creativity means repeating proven methods on familiar challenges","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: new information을 proven methods로 대체하여 창의성의 핵심인 새로움을 제거하고 의미 왜곡","translation":"창의성은 친숙한 도전에 검증된 방법을 반복하는 것을 의미한다"},{"text":"the nature of creativity demands applying novel ideas to known difficulties","isCorrect":true,"optionType":"correct","explanation":"올바름: by definition의 정의적 함축을 nature of demands로, new information을 novel ideas로, old problems를 known difficulties로 전환","translation":"창의성의 본질은 알려진 어려움에 새로운 아이디어를 적용하는 것을 요구한다"},{"text":"creativity essentially requires bringing new insights to familiar issues","isCorrect":true,"optionType":"correct","explanation":"올바름: by definition을 essentially로, new information을 new insights로, old problems를 familiar issues로 구체화","translation":"창의성은 본질적으로 친숙한 문제에 새로운 통찰을 가져오는 것을 요구한다"}],"sourceQuestion":"5번 지문"},{"keyExpression":"kneejerk survival actions","passage":"It's more likely that these reactions are kneejerk survival actions.","passageTranslation":"이러한 반응들은 즉각적인 생존 행동일 가능성이 더 높습니다.","qType":"correct","questionText":"'kneejerk survival actions'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"deliberate strategies carefully planned for long-term survival","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: kneejerk(즉각적·무의식적)를 deliberate, carefully planned(신중히 계획된)로 반의어 대체하여 의미 역전됨","translation":"장기적 생존을 위해 신중히 계획된 의도적인 전략"},{"text":"automatic responses aimed at staying alive","isCorrect":true,"optionType":"correct","explanation":"올바름: kneejerk를 automatic으로, survival actions를 responses aimed at staying alive로 구체화하여 의미 유지","translation":"살아남기 위한 자동적인 반응"},{"text":"conscious decisions made to communicate with other species","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: kneejerk survival actions(무의식적 생존 행동)를 conscious decisions to communicate(의식적 의사소통 결정)로 바꾸어 목적과 의식성 모두 왜곡됨","translation":"다른 종과 소통하기 위해 내린 의식적인 결정"}],"sourceQuestion":"3번 지문"},{"keyExpression":"keep coming up with techniques which are already known","passage":"Stated differently, if you think in a linear manner, you'll tend to be conservative and keep coming up with techniques which are already known.","passageTranslation":"달리 말하면, 선형적으로 생각한다면 보수적이 되어 이미 알려진 기법만 계속 떠올리는 경향이 있을 것이다.","qType":"correct","questionText":"'keep coming up with techniques which are already known'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"continuously produce only methods that have been used before","isCorrect":true,"optionType":"correct","explanation":"올바름: keep coming up with를 continuously produce로, already known을 have been used before로 의미 유지하며 재표현","translation":"이전에 사용된 방법만 계속해서 만들어내다"},{"text":"repeatedly generate the same established solutions","isCorrect":true,"optionType":"correct","explanation":"올바름: keep를 repeatedly로, coming up with를 generate로, already known techniques를 established solutions로 paraphrase","translation":"동일하게 확립된 해결책을 반복적으로 생성하다"},{"text":"occasionally try out completely different and novel approaches","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: keep(지속성)을 occasionally(때때로)로 약화하고, already known을 completely different and novel로 반대 의미로 왜곡","translation":"때때로 완전히 다르고 새로운 접근 방식을 시도하다"},{"text":"constantly discover breakthrough and unprecedented solutions","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: already known(이미 알려진)과 정반대인 breakthrough and unprecedented(획기적이고 전례 없는)로 의미 역전","translation":"획기적이고 전례 없는 해결책을 끊임없이 발견하다"}],"sourceQuestion":"5번 지문"},{"keyExpression":"encounter a brick wall of resistance","passage":"In the course of trying to solve a problem with an invention, you may encounter a brick wall of resistance when you try to think your way logically through the problem.","passageTranslation":"발명과 관련된 문제를 해결하려는 과정에서, 논리적으로 문제를 해결하려 할 때 강한 저항의 벽에 부딪힐 수 있다.","qType":"correct","questionText":"'encounter a brick wall of resistance'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"run into a point where no further ideas come","isCorrect":true,"optionType":"correct","explanation":"올바름: resistance의 결과인 사고 정체를 no further ideas come으로 구체적 행위로 전환","translation":"더 이상 아이디어가 나오지 않는 지점에 맞닥뜨리다"},{"text":"face a strong barrier that blocks your thinking","isCorrect":true,"optionType":"correct","explanation":"올바름: brick wall을 strong barrier로, resistance를 blocks your thinking으로 구체화하여 의미 유지","translation":"사고를 막는 강한 장벽에 부딪히다"},{"text":"receive helpful feedback from others around you","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: 외부 저항을 타인의 유익한 피드백 수신으로 왜곡하여 의미 변질","translation":"주변 사람들로부터 유익한 피드백을 받다"},{"text":"hit an obstacle that stops your progress completely","isCorrect":true,"optionType":"correct","explanation":"올바름: brick wall의 함축인 완전한 차단을 obstacle과 completely로 재현","translation":"진행을 완전히 멈추는 장애물에 부딪히다"},{"text":"find an easy shortcut through complex logic","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: 원문의 저항·막힘과 반대로, 손쉬운 지름길을 찾는다는 의미로 인과 역전","translation":"복잡한 논리를 통해 쉬운 지름길을 찾다"}],"sourceQuestion":"5번 지문"}]};
var QS=CONFIG.questions||[];
var TOTAL=QS.length;
var SET_SIZE=10;
var SETS=(function(){var s=[];for(var i=0;i<TOTAL;i+=SET_SIZE)s.push(QS.slice(i,i+SET_SIZE));return s;})();
var CIRCLED=["①","②","③","④","⑤","⑥"];
var answers={};var selections={};var currentSet=0;
var _tLast=0;var _busy=false;var _curPos=-1;
function esc(s){if(s==null)return"";var d=document.createElement("div");d.textContent=String(s);return d.innerHTML}
function setH(t,sub){var h=document.getElementById("hTitle");var p=document.getElementById("hSub");if(h)h.textContent=t;if(p)p.textContent=sub}
function gi(si,pi){return si*SET_SIZE+pi}
function showIndex(){
  setH(CONFIG.title,"Paraphrasing 표현 테스트");
  var chips=SETS.map(function(sq,si){
    var base=si*SET_SIZE;var done=0,correct=0;
    for(var i=0;i<sq.length;i++){var a=answers[base+i];if(a){done++;if(a.isCorrect)correct++;}}
    var allDone=(done===sq.length);
    var pct=done>0?Math.round(correct/sq.length*100):null;
    var passed=pct!==null&&pct>=CONFIG.passThreshold;
    var scoreHTML=pct===null
      ?"<span style='font-size:.78rem;color:#9ca3af'>미응시</span>"
      :(allDone?"<span style='font-weight:700;color:"+(passed?"#10b981":"#ef4444")+";'>"+(passed?"✅ ":"❌ ")+pct+"%</span>"
             :"<span style='font-weight:700;color:#f59e0b'>📝 "+done+"/"+sq.length+"</span>");
    return "<div class='set-card"+(allDone?" done":"")+"'onclick='enterSet("+si+")'>"
           +"<div><div style='font-weight:700'>세트 "+(si+1)+" <span style='font-size:.8rem;color:#6b7280;font-weight:400'>("+sq.length+"문제)</span></div></div>"
           +"<div>"+scoreHTML+"</div></div>";
  }).join("");
  var app=document.getElementById("app");if(!app)return;
  app.innerHTML="<div class='fade' style='text-align:center;padding:16px 0'>"
    +"<div style='font-size:2.5rem;margin-bottom:8px'>🔄</div>"
    +"<h2 style='font-size:1.2rem;font-weight:700;color:#1f2937;margin-bottom:4px'>Paraphrasing 표현 테스트</h2>"
    +"<p style='color:#6b7280;font-size:.85rem;margin-bottom:16px'>전체 "+TOTAL+"문제 · "+CONFIG.passThreshold+"% 이상 통과</p>"
    +"</div><div class='set-list'>"+chips+"</div>";
}
function enterSet(si){currentSet=si;_curPos=-1;showQ(0)}
function showQ(pos){
  if(pos!==_curPos){try{window.scrollTo(0,0)}catch(e){}_curPos=pos;}
  var si=currentSet;var qs=SETS[si];
  if(!qs||pos<0||pos>=qs.length){showIndex();return;}
  var gidx=gi(si,pos);var q=qs[pos];var answered=answers[gidx];
  var sel=selections[gidx]||{};
  setH("세트 "+(si+1),"문제 "+(pos+1)+"/"+qs.length);
  var pct=Math.round((pos+1)/qs.length*100);
  var isTypeA=q.qType==="correct";
  var correctCount=q.options.filter(function(o){return o.isCorrect}).length;
  var optsHTML=q.options.map(function(o,i){
    var cls="";var chkTxt="";
    if(answered){
      var wasSel=!!(answered.selected&&answered.selected[i]);
      if(isTypeA){
        if(o.isCorrect&&wasSel){cls="a-corr-hit";chkTxt="✓"}
        else if(o.isCorrect&&!wasSel){cls="a-corr-miss";chkTxt="○"}
        else if(!o.isCorrect&&wasSel){cls="a-wrong-sel";chkTxt="✕"}
        else{cls="a-wrong-unsel"}
      }else{
        if(o.isCorrect&&wasSel){cls="b-ans-hit";chkTxt="✓"}
        else if(o.isCorrect&&!wasSel){cls="b-ans-miss";chkTxt="○"}
        else if(!o.isCorrect&&wasSel){cls="b-corr-sel";chkTxt="✓"}
        else{cls="b-corr-unsel"}
      }
    }else if(sel[i]){cls="selected";chkTxt="✓"}
    return "<button class='chk-btn "+cls+"' onclick='toggleOpt("+pos+","+i+")' "+(answered?"disabled":"")+" data-idx='"+i+"'>"
           +"<div class='chk-box'>"+chkTxt+"</div>"
           +"<span>"+esc(o.text)+"</span></button>";
  }).join("");
  var feedbackHTML="";
  if(answered){
    var cidxs=[];
    q.options.forEach(function(o,i){if(o.isCorrect)cidxs.push(i)});
    var cLabel=cidxs.map(function(i){return CIRCLED[i]}).join(", ");
    feedbackHTML="<div class='fb "+(answered.isCorrect?"ok":"ng")+"'>"
      +(answered.isCorrect?"✅ 정답!":"❌ 오답 — 정답: "+cLabel)
      +"</div>"
      +"<div class='explain-box'><div class='ex-title'>해설</div>"
      +q.options.map(function(o,i){
        var tag;
        if(isTypeA){tag=o.isCorrect?"<span class='tag-ok'>[올바른 paraphrasing]</span>":"<span class='tag-ng'>[잘못된 paraphrasing]</span>"}
        else{tag=o.isCorrect?"<span class='tag-ng'>[잘못된 paraphrasing]</span>":"<span class='tag-ok'>[올바른 paraphrasing]</span>"}
        return "<div class='ex-item'><strong>"+CIRCLED[i]+" "+esc(o.text)+"</strong> "+tag
               +"<br><span class='trans'>→ "+esc(o.translation||o.explanation)+"</span></div>";
      }).join("")+"</div>";
  }
  var passageSection="";
  if(q.passage){
    passageSection="<button class='show-passage-btn' id='pbtn' onclick='togglePassage()'>📄 지문 보기</button>"
                  +"<div class='passage-box' id='pbox' style='display:none'>"+esc(q.passage)+"</div>";
  }
  var hintColor=answered?(answered.isCorrect?"#166534":"#991b1b"):"#4f46e5";
  var hintHTML=CONFIG.showCountHint
    ?"<div class='q-hint' style='background:rgba(139,92,246,.08);border:1px solid rgba(139,92,246,.2);color:#374151'>정답 개수 : <span style='font-size:1.5em;font-weight:900;color:"+hintColor+"'>"+correctCount+"</span>개</div>"
    :"<div class='q-hint' style='background:#f8fafc;color:#64748b;border:1px solid #e2e8f0'>"+(isTypeA?"<span style='color:#059669;font-weight:800'>올바른</span>":"<span style='color:#e11d48;font-weight:800'>잘못된</span>")+" paraphrasing을 모두 선택 후 제출하세요</div>";
  var typeBadge=isTypeA
    ?"<div class='type-badge ok'>✅ 올바른 paraphrasing 찾기</div>"
    :"<div class='type-badge ng'>❌ 잘못된 paraphrasing 찾기</div>";
  var app=document.getElementById("app");if(!app)return;
  app.innerHTML="<div class='fade'>"
    +"<div class='q-counter'>"+(pos+1)+" / "+qs.length+"</div>"
    +"<div class='prog-bar'><div class='prog-fill' style='width:"+pct+"%;background:"+(isTypeA?"#059669":"#dc2626")+"'></div></div>"
    +(q.sourceQuestion?"<div style='display:inline-block;background:#fef3c7;color:#b45309;padding:4px 12px;border-radius:20px;font-size:.78rem;font-weight:600;margin-bottom:10px'>"+esc(q.sourceQuestion)+"</div>":"")
    +typeBadge
    +"<div class='key-box'>"
    +"<div class='expr'>“"+esc(q.keyExpression)+"”</div>"
    +"<div class='qtext'>"+(isTypeA
      ?"위 표현을 <span style='color:#059669;font-weight:800'>올바르게</span> paraphrasing 한 것을 모두 고르시오."
      :"위 표현을 <span style='color:#e11d48;font-weight:800'>잘못</span> paraphrasing 한 것을 모두 고르시오.")
    +"</div></div>"
    +passageSection
    +hintHTML
    +"<div class='opts'>"+optsHTML+"</div>"
    +feedbackHTML
    +"<div class='nav-bar'>"
    +"<button class='nav-btn prev' onclick='showQ("+(pos-1)+")' "+(pos<=0?"disabled":"")+">← 이전</button>"
    +"<button class='nav-btn home' onclick='showIndex()'>목록</button>"
    +(!answered
      ?"<button class='nav-btn next' onclick='submitAnswer("+pos+")'>✓ 제출</button>"
      :"<button class='nav-btn next' onclick='"+(pos<qs.length-1?"showQ("+(pos+1)+")":"showSetResult()")+"'>→ "+(pos<qs.length-1?"다음":"결과")+"</button>")
    +"</div></div>";
}
function toggleOpt(pos,optIdx){
  var _n=Date.now();if(_n-_tLast<280)return;_tLast=_n;
  var gidx=gi(currentSet,pos);
  if(answers[gidx])return;
  if(!selections[gidx])selections[gidx]={};
  if(selections[gidx][optIdx])delete selections[gidx][optIdx];
  else selections[gidx][optIdx]=true;
  showQ(pos);
}
function submitAnswer(pos){
  try{
  var gidx=gi(currentSet,pos);
  if(answers[gidx])return;
  var q=SETS[currentSet][pos];
  if(!q)return;
  var sel=selections[gidx]||{};
  var isCorrect=true;
  for(var i=0;i<q.options.length;i++){
    var wasSel=!!sel[i];var shouldSel=q.options[i].isCorrect;
    if(wasSel!==shouldSel){isCorrect=false;break}
  }
  answers[gidx]={selected:sel,isCorrect:isCorrect};
  showQ(pos);
  }catch(e){console.error("submitAnswer err",e)}
}
function togglePassage(){
  var b=document.getElementById("pbox");var btn=document.getElementById("pbtn");
  if(!b)return;
  if(b.style.display==="none"){b.style.display="block";if(btn)btn.textContent="📄 지문 숨기기"}
  else{b.style.display="none";if(btn)btn.textContent="📄 지문 보기"}
}
function showSetResult(){
  var si=currentSet;var qs=SETS[si];var base=si*SET_SIZE;
  var total=qs.length;var correct=0;
  for(var i=0;i<total;i++){var a=answers[base+i];if(a&&a.isCorrect)correct++}
  var pct=Math.round(correct/total*100);
  var passed=pct>=CONFIG.passThreshold;
  setH("세트 "+(si+1)+" 결과",passed?"통과":"미달");
  var app=document.getElementById("app");if(!app)return;
  app.innerHTML="<div class='fade' style='text-align:center;padding:16px 0'>"
    +"<div class='score-circle "+(passed?"pass":"fail")+"'>"+(pct)+"%</div>"
    +"<p style='font-size:1.1rem;font-weight:700;color:"+(passed?"#10b981":"#ef4444")+"'>"+(passed?"통과!":"미달")+"</p>"
    +"<p style='color:#6b7280;font-size:.88rem;margin-top:8px'>"+correct+"/"+total+"문제 정답 · 기준 "+CONFIG.passThreshold+"%</p>"
    +"</div>"
    +"<div style='margin-top:16px'><button class='btn btn-primary' onclick='showIndex()'>목록으로</button></div>";
}
try{history.pushState(null,"",location.href);
window.addEventListener("popstate",function(){
  history.pushState(null,"",location.href);
  showIndex();
});}catch(e){}
showIndex();
</script>
