한 논리적 사고는 우리의 추론 능력을 사용하는 선형적 과정이다.","qType":"incorrect","questionText":"'think your way logically through the problem'을(를) 잘못 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"use step-by-step reasoning to work out the issue","isCorrect":false,"optionType":"correct","explanation":"올바름: logically를 step-by-step reasoning으로, think through를 work out으로 구체화하여 의미 유지","translation":"단계적 추론을 사용하여 문제를 해결하다"},{"text":"ignore the problem and wait for a natural answer","isCorrect":true,"optionType":"incorrect","explanation":"잘못됨: 적극적으로 논리를 통해 사고하는 원문과 반대로 문제를 무시하는 행위로 왜곡","translation":"문제를 무시하고 자연스러운 답을 기다리다"},{"text":"rely on structured reasoning to navigate the difficulty","isCorrect":false,"optionType":"correct","explanation":"올바름: think through의 방향성과 logically의 함축을 structured reasoning과 navigate로 재현","translation":"어려움을 헤쳐 나가기 위해 체계적 추론에 의존하다"},{"text":"apply rational analysis to reach a solution","isCorrect":false,"optionType":"correct","explanation":"올바름: logically thinking의 함축인 rational analysis와 목표(solution)를 명시적으로 재구성","translation":"해결책에 도달하기 위해 이성적 분석을 적용하다"}],"sourceQuestion":"5번 지문"},{"keyExpression":"running a bit of electricity through your skin","passage":"We can actually measure your emotional state by tracking how your body subconsciously sweats, by running a bit of electricity through your skin.","passageTranslation":"우리는 실제로 피부에 약간의 전기를 흘려보냄으로써 신체가 무의식적으로 땀을 흘리는 방식을 추적하여 감정 상태를 측정할 수 있다.","qType":"correct","questionText":"'running a bit of electricity through your skin'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"generating strong electrical pulses inside the bloodstream","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: a bit of electricity를 strong electrical pulses로, skin을 bloodstream으로 바꿔 강도와 위치를 모두 왜곡함","translation":"혈류 내부에 강한 전기 펄스를 생성하는"},{"text":"passing a small electrical current across the skin surface","isCorrect":true,"optionType":"correct","explanation":"올바름: running을 passing로, a bit of electricity를 a small electrical current로 구체화하여 의미 보존함","translation":"피부 표면에 작은 전류를 통과시키는"},{"text":"applying low-level electrical flow to the skin","isCorrect":true,"optionType":"correct","explanation":"올바름: a bit of electricity를 low-level electrical flow로, running through를 applying to로 재구성하여 paraphrasing함","translation":"피부에 낮은 수준의 전기 흐름을 적용하는"},{"text":"sending a weak electric signal through the body's outer layer","isCorrect":true,"optionType":"correct","explanation":"올바름: running electricity를 sending electric signal로, skin을 body's outer layer로 재표현하여 의미 유지함","translation":"신체의 외층을 통해 약한 전기 신호를 보내는"},{"text":"absorbing natural electricity emitted by the nervous system","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: running electricity through skin을 absorbing electricity from nervous system으로 바꿔 방향과 출처를 완전히 역전시킴","translation":"신경계가 방출하는 자연적인 전기를 흡수하는"}],"sourceQuestion":"2번 지문"},{"keyExpression":"our bodies sweat a tiny bit, so little we might not even notice","passage":"We know that when we're emotionally stimulated - stressed, sad, any intense emotion, really - our bodies sweat a tiny bit, so little we might not even notice.","passageTranslation":"우리는 감정적으로 자극받을 때 우리 몸이 아주 조금 땀을 흘린다는 것을 알고 있는데, 너무 소량이라 우리가 알아차리지 못할 수도 있다.","qType":"incorrect","questionText":"'our bodies sweat a tiny bit, so little we might not even notice'을(를) 잘못 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"sweat heavily in ways that are clearly visible to others","isCorrect":true,"optionType":"incorrect","explanation":"잘못됨: a tiny bit를 heavily로, might not notice를 clearly visible로 반의어 대체하여 의미를 완전히 역전시킴","translation":"타인에게 명확히 보일 정도로 많이 땀을 흘린다"},{"text":"produce an almost imperceptible amount of perspiration","isCorrect":false,"optionType":"correct","explanation":"올바름: a tiny bit so little we might not notice를 almost imperceptible amount로 압축하여 의미 보존함","translation":"거의 감지할 수 없는 양의 땀을 생성한다"},{"text":"perspire in such small quantities as to be barely felt","isCorrect":false,"optionType":"correct","explanation":" "optionType":"correct","explanation":"올바름: measure emotional state를 assess inner feelings로, subconsciously sweats를 involuntary perspiration으로 재표현하여 의미 보존함","translation":"비자발적 땀 분비를 모니터링하여 내면 감정을 평가한다"},{"text":"gauge emotional intensity by observing unconscious sweat patterns","isCorrect":false,"optionType":"correct","explanation":"올바름: tracking을 observing으로, subconsciously를 unconscious로, emotional state를 emotional intensity로 재구성하여 paraphrasing함","translation":"무의식적 땀 패턴을 관찰하여 감정 강도를 측정한다"},{"text":"determine how someone feels by recording their skin moisture levels","isCorrect":false,"optionType":"correct","explanation":"올바름: measure emotional state를 determine how someone feels로, subconsciously sweats를 skin moisture levels로 구체화하여 의미 유지함","translation":"피부 수분 수준을 기록하여 사람의 감정 상태를 파악한다"},{"text":"predict future emotions by analyzing past sweat records","isCorrect":true,"optionType":"incorrect","explanation":"잘못됨: 현재 감정 측정을 미래 감정 예측으로 바꿔 시제와 인과 방향을 왜곡함","translation":"과거 땀 기록을 분석하여 미래 감정을 예측한다"}],"sourceQuestion":"2번 지문"},{"keyExpression":"put an objective value on a subjective state of mind","passage":"This is particularly useful from a scientific viewpoint, because it allows us to put an objective value on a subjective state of mind.","passageTranslation":"이것은 과학적 관점에서 특히 유용한데, 왜냐하면 주관적인 심리 상태에 객관적인 수치를 부여할 수 있게 해주기 때문이다.","qType":"incorrect","questionText":"'put an objective value on a subjective state of mind'을(를) 잘못 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"judge the accuracy of someone's emotional self-report","isCorrect":true,"optionType":"incorrect","explanation":"잘못됨: 객관적 수치화를 정확성 판단으로 바꿔 지문의 의도와 다른 방향으로 의미를 왜곡함","translation":"누군가의 감정 자기 보고의 정확성을 판단한다"},{"text":"assign a measurable number to an internal emotional experience","isCorrect":false,"optionType":"correct","explanation":"올바름: objective value를 measurable number로, subjective state of mind를 internal emotional experience로 구체화하여 의미 보존함","translation":"내면의 감정 경험에 측정 가능한 수치를 부여한다"},{"text":"quantify what is otherwise a purely personal feeling","isCorrect":false,"optionType":"correct","explanation":"올바름: put an objective value on을 quantify로, subjective state를 purely personal feeling으로 재구성하여 정확히 paraphrasing함","translation":"순전히 개인적인 감정에 수치를 부여한다"},{"text":"convert a private inner sensation into a concrete data point","isCorrect":false,"optionType":"correct","explanation":"올바름: subjective state of mind를 private inner sensation으로, objective value를 concrete data point로 추상→구체 전환하여 의미 유지함","translation":"개인적인 내면 감각을 구체적인 데이터 수치로 변환한다"}],"sourceQuestion":"2번 지문"},{"keyExpression":"a series of questions can just make a child silent","passage":"Under these circumstances, a series of questions can just make a child silent.","passageTranslation":"이러한 상황에서 연속적인 질문은 아이를 그저 침묵하게 만들 수 있다.","qType":"incorrect","questionText":"'a series of questions can just make a child silent'을(를) 잘못 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"one well-placed question always gets a child talking freely","isCorrect":true,"optionType":"incorrect","explanation":"잘못됨: 여러 질문이 침묵을 만든다는 의미를 하나의 질문이 자유로운 대화를 이끈다는 반대 내용으로 왜곡","translation":"적절한 한 가지 질문은 항상 아이가 자유롭게 말하게 한다"},{"text":"asking many questions in a row can shut a child down","isCorrect":false,"optionType":"correct","explanation":"올바름: a series of questions→many questions in a row, make silent→shut down으로 의미와 뉘앙스 유지","translation":"연속으로 많은 질문을 하는 것은 아이의 말문을 막을 수 있다"},{"text":"repeated questions may only cause a child to stop talking","isCorrect":false,"optionType":"correct","explanation":"올바름: a series of→repeated, make silent→stop talking으로 사역 구문의 결과 의미를 정확히 보존","translation":"반복적인 질문은 아이가 말을 멈추게만 할 수 있다"},{"text":"continuous questioning might leave a child with nothing to say","isCorrect":false,"optionType":"correct","explanation":"올바름: a series of→continuous, make silent→nothing to say로 결과 상태를 구체적으로 재표현","translation":"지속적인 질문은 아이가 아무 말도 못하게 만들 수 있다"}],"sourceQuestion":"1번 지문"},{"keyExpression":"that smell that hangs in the air after to consider whether plants react to pain at all","isCorrect":true,"optionType":"incorrect","explanation":"잘못됨: worth noting(주목할 가치가 있다)을 unnecessary(불필요하다)로 반의어 대체하여 주목할 필요가 없다는 반대 의미로 왜곡됨","translation":"식물이 고통에 반응하는지를 전혀 고려할 필요가 없다"},{"text":"it is important to keep in mind that specialists reject the idea of plants feeling pain","isCorrect":false,"optionType":"correct","explanation":"올바름: worth noting을 important to keep in mind로, experts를 specialists로, crying out in pain을 feeling pain으로 바꾸어 의미 유지","translation":"전문가들이 식물이 고통을 느낀다는 생각을 거부한다는 점을 명심하는 것이 중요하다"},{"text":"one should bear in mind that scientists do not believe plants suffer consciously","isCorrect":false,"optionType":"correct","explanation":"올바름: worth noting을 bear in mind로, experts를 scientists로, crying out in pain을 suffer consciously로 구체화하여 의미 유지","translation":"과학자들은 식물이 의식적으로 고통받는다고 믿지 않는다는 점을 명심해야 한다"},{"text":"it deserves attention that researchers question whether plants truly experience pain","isCorrect":false,"optionType":"correct","explanation":"올바름: worth noting을 deserves attention으로, experts don't think를 researchers question whether로 바꾸어 의미 유지","translation":"연구자들이 식물이 진정으로 고통을 경험하는지에 의문을 품는다는 점은 주목할 만하다"}],"sourceQuestion":"3번 지문"},{"keyExpression":"turn the subjective, subconscious experience of emotional intensity into an objective number","passage":"We can then turn the subjective, subconscious experience of emotional intensity into an objective number by figuring out how good your skin gets at transferring an electrical current.","passageTranslation":"우리는 그런 다음 피부가 전류를 전달하는 데 얼마나 능숙해지는지를 파악함으로써 감정 강도의 주관적이고 무의식적인 경험을 객관적인 수치로 바꿀 수 있다.","qType":"correct","questionText":"'turn the subjective, subconscious experience of emotional intensity into an objective number'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"simplify complex emotional data into a vague general feeling","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: objective number를 vague general feeling으로 바꿔 수치화가 아닌 모호화로 의미를 역전시킴","translation":"복잡한 감정 데이터를 막연한 일반적 감정으로 단순화한다"},{"text":"translate external numerical inputs into personal emotional states","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: 감정을 수치로 바꾸는 방향을 수치를 감정으로 바꾸는 방향으로 인과를 완전히 역전시킴","translation":"외부의 수치 입력을 개인적인 감정 상태로 변환한다"},{"text":"transform a personal emotional sensation into measurable data","isCorrect":true,"optionType":"correct","explanation":"올바름: subjective experience를 personal emotional sensation으로, objective number를 measurable data로 재구성하여 paraphrasing함","translation":"개인적인 감정 감각을 측정 가능한 데이터로 변환한다"}],"sourceQuestion":"2번 지문"},{"keyExpression":"if you think in a linear manner, you'll tend to be conservative","passage":"Stated differently, if you think in a linear manner, you'll tend to be conservative and keep coming up with techniques which are already known.","passageTranslation":"달리 말하면, 선형적으로 생각한다면 보수적이 되어 이미 알려진 기법만 계속 떠올리는 경향이 있을 것이다.","qType":"correct","questionText":"'if you think in a linear manner, you'll tend to be conservative'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"linear thinking helps you become more open-minded and adaptive","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: 원문의 보수적이고 경직된 결과와 반대로 개방적이고 적응적이 된다는 의미로 왜곡","translation":"선형적 사고는 더 개방적이고 적응력 있게 되도록 돕는다"},{"text":"sequential thinking encourages you to explore radical new ideas","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: conservative(보수적)와 정반대인 explore radical new ideas(급진적 새 아이디어 탐색)로 의미 역전","translation":"순차적 사고는 급진적인 새 아이디어를 탐색하도록 장려한다"},{"text":"a step-by-step mindset makes you resistant to change","isCorrect":true,"optionType":"correct","explanation":"올바름: linear manner를 step-by-step mindset으로, conservative의 함축인 변화 저항을 resistant to change로 명시","translation":"단계적 사고방식은 변화에 저항하게 만든다"},{"text":"thinking in a sequential way leads you to prefer familiar approaches","isCorrect":true,"optionType":"correct","explanation":"올바름: linear manner를 sequential way로, conservative를 prefer familiar approaches로 행위 수준에서 구체화","translation":"순차적 방식으로 생각하면 친숙한 접근 방식을 선호하게 된다"},{"text":"relying on ordered logic causes you to stick with traditional methods","isCorrect":true,"optionType":"correct","explanation":"올바름: linear manner를 ordered logic으로, conservative를 stick with traditional methods라는 구체적 행동으로 전환","translation":"순서 있는 논리에 의존하면 전통적인 방법을 고수하게 된다"}],"sourceQuestion":"5번 지문"},{"keyExpression":"plants produce a high-frequency clicking noise when stressed","passage":"They found that plants produce a high-frequency clicking noise when stressed and can make different sounds for different stressors.","passageTranslation":"그들은 식물이 스트레스를 받을 때 고주파 딸깍 소리를 낸다는 것을 발견했으며, 서로 다른 스트레스 요인에 따라 다른 소리를 낼 수 있다는 것도 알았습니다.","qType":"incorrect","questionText":"'plants produce a high-frequency clicking noise when stressed'을(를) 잘못 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"plants generate rapid clicking sounds under pressure","isCorrect":false,"optionType":"correct","explanation":"올바름: produce→generate, high-frequency→rapid(빠른 반복), when stressed→under pressure로 동의어 대체, 핵심 의미 유지","translation":"식물은 압박을 받을 때 빠른 딸깍 소리를 낸다"},{"text":"plants create crackling sounds at high frequencies when in distress","isCorrect":false,"optionType":"correct","explanation":"올바름: clicking noise→crackling sounds(유사 의성어), produce→create, when stressed→when in distress로 동의어 대체","translation":"식물은 고통받을 때 높은 주파수의 딸깍거리는 소리를 만들어낸다"},{"text":"plants completely stop making any noise once they feel stressed","isCorrect":true,"optionType":"incorrect","explanation":"잘못됨: produce a noise(소리를 낸다)→stop making any noise(소리를 멈춘다)로 완전 반의어 대체","translation":"식물은 스트레스를 받으면 어떤 소리도 완전히 멈춘다"},{"text":"stressed plants emit repetitive high-pitched noises","isCorrect":false,"optionType":"correct","explanation":"올바름: when stressed를 분사구문으로 전환, produce→emit, high-frequency→high-pitched로 유의어 대체","translation":"스트레스를 받은 식물은 반복적인 고음의 소리를 낸다"}],"sourceQuestion":"4번 지문"},{"keyExpression":"a series of questions can just make a child silent","passage":"Under these circumstances, a series of questions can just make a child silent.","passageTranslation":"이러한 상황에서 연속적인 질문은 아이를 그저 침묵하게 만들 수 있다.","qType":"incorrect","questionText":"'a series of questions can just make a child silent'을(를) 잘못 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"repeated questions may only cause a child to stop talking","isCorrect":false,"optionType":"correct","explanation":"올바름: a series of→repeated, make silent→stop talking으로 사역 구문의 결과 의미를 정확히 보존","translation":"반복적인 질문은 아이가 말을 멈추게만 할 수 있다"},{"text":"continuous questioning might leave a child with nothing to say","isCorrect":false,"optionType":"correct","explanation":"올바름: a series of→continuous, make silent→nothing to say로 결과 상태를 구체적으로 재표현","translation":"지속적인 질문은 아이가 아무 말도 못하게 만들 수 있다"},{"text":"asking questions helps a child open up and express feelings","isCorrect":true,"optionType":"incorrect","explanation":"잘못됨: 질문이 침묵을 유발한다는 의미를 반대로 질문이 표현을 돕는다고 인과 역전","translation":"질문하는 것은 아이가 마음을 열고 감정을 표현하도록 돕는다"},{"text":"asking many questions in a row can shut a child down","isCorrect":false,"optionType":"correct","explanation":"올바름: a series of questions→many questions in a row, make silent→shut down으로 의미와 뉘앙스 유지","translation":"연속으로 많은 질문을 하는 것은 아이의 말문을 막을 수 있다"}],"sourceQuestion":"1번 지문"},{"keyExpression":"put an objective value on a subjective state of mind","passage":"This is particularly useful from a scientific viewpoint, because it allows us to put an objective value on a subjective state of mind.","passageTranslation":"이것은 과학적 관점에서 특히 유용한데, 왜냐하면 주관적인 심리 상태에 객관적인 수치를 부여할 수 있게 해주기 때문이다.","qType":"correct","questionText":"'put an objective value on a subjective state of mind'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"replace personal feelings with universal emotional standards","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: put a value on을 replace로 바꿔 측정이 아닌 대체의 의미로 왜곡함으로써 핵심 인과를 틀리게 함","translation":"개인적인 감정을 보편적인 감정 기준으로 대체한다"},{"text":"judge the accuracy of someone's emotional self-report","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: 객관적 수치화를 정확성 판단으로 바꿔 지문의 의도와 다른 방향으로 의미를 왜곡함","translation":"누군가의 감정 자기 보고의 정확성을 판단한다"},{"text":"convert a private inner sensation into a concrete data point","isCorrect":true,"optionType":"correct","explanation":"올바름: subjective state of mind를 private inner sensation으로, objective value를 concrete data point로 추상→구체 전환하여 의미 유지함","translation":"개인적인 내면 감각을 구체적인 데이터 수치로 변환한다"}],"sourceQuestion":"2번 지문"},{"keyExpression":"that's actually an SOS","passage":"You know that smell that hangs in the air after you've mowed the lawn? Yeah, that's actually an SOS.","passageTranslation":"잔디를 깎은 후 공기 중에 맴도는 그 냄새 아시죠? 네, 그건 사실 SOS 신호입니다.","qType":"incorrect","questionText":"'that's actually an SOS'을(를) 잘못 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"the smell truly serves as a cry for help","isCorrect":false,"optionType":"correct","explanation":"올바름: SOS→cry for help(도움 요청)로 의미 풀어쓰기, actually→truly 부사 대체, 맥락 유지","translation":"그 냄새는 진정으로 도움을 요청하는 신호 역할을 한다"},{"text":"this scent genuinely functions as an emergency warning","isCorrect":false,"optionType":"correct","explanation":"올바름: SOS→emergency warning, actually→genuinely, 식물의 위급 신호라는 핵심 의미 보존","translation":"이 향기는 진정으로 비상 경보의 기능을 한다"},{"text":"it is in fact a distress signal from the plant","isCorrect":false,"optionType":"correct","explanation":"올바름: actually→in fact(사실은) 부사 동의어 대체, SOS→distress signal로 구체적 의미 풀어쓰기","translation":"그것은 사실 식물에서 보내는 조난 신호이다"},{"text":"the odor is an accidental release with no meaning","isCorrect":true,"optionType":"incorrect","explanation":"잘못됨: SOS(의도적 신호)→accidental release with no meaning(의미 없는 우발적 방출)로 의도성과 목적성 제거","translation":"그 냄새는 아무 의미 없는 우발적 방출이다"}],"sourceQuestion":"4번 지문"},{"keyExpression":"express their discontent through scents","passage":"Some express their discontent through scents. You know that smell that hangs in the air after you've mowed the lawn?","passageTranslation":"일부는 향기를 통해 불만을 표현합니다. 잔디를 깎은 후 공기 중에 맴도는 그 냄새 아시죠?","qType":"incorrect","questionText":"'express their discontent through scents'을(를) 잘못 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"communicate discomfort using chemical smells","isCorrect":false,"optionType":"correct","explanation":"올바름: express→communicate, discontent→discomfort로 유의어 대체, scents의 화학적 성질 구체화","translation":"화학적 냄새를 이용해 불편함을 전달하다"},{"text":"signal their distress by releasing odors","isCorrect":false,"optionType":"correct","explanation":"올바름: discontent→distress(불만→고통), scents→odors(향기→냄새)로 동의어 대체, 의미 유지","translation":"냄새를 방출하여 고통을 신호로 보내다"},{"text":"show they are unhappy by emitting fragrances","isCorrect":false,"optionType":"correct","explanation":"올바름: express→show, discontent→unhappy로 추상→구체 전환, scents→fragrances 동의어 대체","translation":"향기를 내뿜어 불만을 드러내다"},{"text":"hide their stress by absorbing surrounding smells","isCorrect":true,"optionType":"incorrect","explanation":"잘못됨: express(표현하다)→hide(숨기다) 반의어 대체, through(방출)→absorbing(흡수) 인과 역전","translation":"주변 냄새를 흡수하여 스트레스를 숨기다"}],"sourceQuestion":"4번 지문"},{"keyExpression":"Scents and sounds are their tools for defending against things that might harm them","passage":"Scents and sounds are their tools for defending against things that might harm them.","passageTranslation":"향기와 소리는 식물을 해칠 수 있는 것들을 막기 위한 식물의 도구입니다.","qType":"correct","questionText":"'Scents and sounds are their tools for defending against things that might harm them'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"odors and noises serve as weapons to protect plants from potential threats","isCorrect":true,"optionType":"correct","explanation":"올바름: Scents→odors, sounds→noises, tools for defending→weapons to protect, things that might harm→potential threats로 단계적 동의어 대체","translation":"냄새와 소리는 잠재적 위협으로부터 식물을 보호하는 무기 역할을 한다"},{"text":"scents and sounds are signs that plants have already been seriously harmed","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: tools for defending(방어 도구)→signs that already been harmed(이미 피해를 입었다는 신호)로 예방적 의미를 결과적 의미로 왜곡","translation":"향기와 소리는 식물이 이미 심각하게 피해를 입었다는 신호이다"},{"text":"plants attract harmful things using pleasant scents and loud sounds","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: defending against(방어하다)→attract(유인하다)로 반의어 대체, 해로운 것을 물리치는 것을 끌어들이는 것으로 완전 역전","translation":"식물은 기분 좋은 향기와 큰 소리를 사용하여 해로운 것들을 유인한다"},{"text":"chemical smells and sound waves act as shields that guard plants from danger","isCorrect":true,"optionType":"correct","explanation":"올바름: Scents→chemical smells, sounds→sound waves, tools for defending→shields that guard, things that might harm→danger로 다양하게 표현 전환","translation":"화학적 냄새와 음파는 위험으로부터 식물을 지키는 방패 역할을 한다"}],"sourceQuestion":"4번 지문"},{"keyExpression":"logical thinking works well with familiar problems but falls short in dealing with new ideas","passage":"Thus, logical thinking works well with familiar problems but falls short in dealing with new ideas, for which creative thinking is needed to come up with innovative solutions.","passageTranslation":"따라서 논리적 사고는 친숙한 문제에서는 잘 작동하지만 새로운 아이디어를 다루는 데는 부족하며, 이를 위해서는 혁신적인 해결책을 내놓기 위한 창의적 사고가 필요하다.","qType":"incorrect","questionText":"'logical thinking works well with familiar problems but falls short in dealing with new ideas'을(를) 잘못 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"systematic logic is adequate for existing issues but inadequate for fresh perspectives","isCorrect":false,"optionType":"correct","explanation":"올바름: works well을 is adequate for로, falls short를 is inadequate for로, familiar/new 대조를 existing/fresh로 재표현","translation":"체계적 논리는 기존 문제에는 적합하지만 새로운 관점에는 부적합하다"},{"text":"rational reasoning handles known challenges effectively yet struggles with novel concepts","isCorrect":false,"optionType":"correct","explanation":"올바름: logical thinking을 rational reasoning으로, falls short in dealing with를 struggles with로, new ideas를 novel concepts로 대조 관계 유지하며 재구성","translation":"이성적 추론은 알려진 도전을 효과적으로 다루지만 새로운 개념에는 어려움을 겪는다"},{"text":"new ideas are always best handled through strictly logical methods","isCorrect":true,"optionType":"incorrect","explanation":"잘못됨: 원문에서 논리적 사고가 new ideas에서 falls short라고 했으나, 정반대로 최적이라고 의미 역전","translation":"새로운 아이디어는 항상 엄격하게 논리적인 방법으로 가장 잘 다루어진다"},{"text":"ordered thinking suits routine problems but cannot handle unfamiliar territory","isCorrect":false,"optionType":"correct","explanation":"올바름: logical를 ordered로, familiar problems를 routine problems로, falls short를 cannot handle로, new ideas를 unfamiliar territory로 전환하여 대조 의미 유지","translation":"정돈된 사고는 일상적인 문제에는 적합하지만 낯선 영역을 다루지 못한다"}],"sourceQuestion":"5번 지문"},{"keyExpression":"she may not have a clue","passage":"You may ask your child 'Why do you feel sad?' and she may not have a clue.","passageTranslation":"당신은 아이에게 '왜 슬프니?'라고 물을 수 있지만, 아이는 전혀 모를 수도 있다.","qType":"correct","questionText":"'she may not have a clue'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"she is likely to know the answer right away","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: not have a clue의 반대 의미인 know right away로 대체해 원문과 정반대 내용이 됨","translation":"그녀는 즉시 답을 알 가능성이 높다"},{"text":"she might have no idea at all","isCorrect":true,"optionType":"correct","explanation":"올바름: have a clue→have an idea로 동의 표현 대체, 의미 완전히 보존","translation":"그녀는 전혀 알지 못할 수도 있다"},{"text":"she refuses to share what she knows","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: 모른다는 의미를 알면서도 말하기 거부한다는 의미로 왜곡하여 태도 문제로 인과 전환","translation":"그녀는 알고 있는 것을 공유하기를 거부한다"},{"text":"the answer could be completely unknown to her","isCorrect":true,"optionType":"correct","explanation":"올바름: not have a clue→completely unknown으로 추상 개념을 구체적 상태로 전환하여 의미 유지","translation":"그 답이 그녀에게 전혀 알려지지 않을 수 있다"}],"sourceQuestion":"1번 지문"},{"keyExpression":"the conception of new viewpoints and ideas","passage":"On the other hand, creativity by definition involves the application of new information to old problems and the conception of new viewpoints and ideas.","passageTranslation":"반면에, 창의성은 정의상 오래된 문제에 새로운 정보를 적용하는 것과 새로운 관점과 아이디어를 구상하는 것을 포함한다.","qType":"incorrect","questionText":"'the conception of new viewpoints and ideas'을(를) 잘못 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"generating fresh ways of seeing and thinking about things","isCorrect":false,"optionType":"correct","explanation":"올바름: conception을 generating으로, new viewpoints를 fresh ways of seeing으로 구체적 행위로 전환","translation":"사물을 바라보고 생각하는 새로운 방식을 창출하는 것"},{"text":"developing new angles and innovative approaches to issues","isCorrect":false,"optionType":"correct","explanation":"올바름: conception을 developing으로, viewpoints를 angles로, ideas를 innovative approaches to issues로 맥락을 살려 재구성","translation":"문제에 대한 새로운 각도와 혁신적 접근 방식을 발전시키는 것"},{"text":"the forming of original perspectives and thoughts","isCorrect":false,"optionType":"correct","explanation":"올바름: conception을 forming으로, new viewpoints를 original perspectives로, ideas를 thoughts로 유사 의미 대체","translation":"독창적인 관점과 생각을 형성하는 것"},{"text":"the memorization of existing theories and frameworks","isCorrect":true,"optionType":"incorrect","explanation":"잘못됨: 새로운 아이디어 구상이라는 원문과 달리 기존 이론의 암기로 의미를 완전히 왜곡","translation":"기존 이론과 틀을 암기하는 것"},{"text":"the rejection of all unfamiliar perspectives","isCorrect":true,"optionType":"incorrect","explanation":"잘못됨: 새로운 관점의 수용·창출이라는 원문과 반대로 낯선 관점을 거부하는 의미로 역전","translation":"모든 낯선 관점을 거부하는 것"}],"sourceQuestion":"5번 지문"},{"keyExpression":"make different sounds for different stressors","passage":"They found that plants produce a high-frequency clicking noise when stressed and can make different sounds for different stressors.","passageTranslation":"그들은 식물이 스트레스를 받을 때 고주파 딸깍 소리를 내며, 다양한 스트레스 요인에 따라 다른 소리를 낼 수 있다는 것을 발견했습니다.","qType":"incorrect","questionText":"'make different sounds for different stressors'을(를) 잘못 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"generate unique noises that correspond to specific dangers","isCorrect":false,"optionType":"correct","explanation":"올바름: different sounds를 unique noises로, stressors를 specific dangers로 바꾸어 의미 유지","translation":"특정 위험에 상응하는 고유한 소리를 만들어낸다"},{"text":"repeat the same signal regardless of what caused the stress","isCorrect":true,"optionType":"incorrect","explanation":"잘못됨: different sounds for different stressors(다른 소리)를 same signal regardless of(같은 신호)로 반의어 구조로 대체하여 의미 역전됨","translation":"스트레스 원인에 상관없이 동일한 신호를 반복한다"},{"text":"share identical sound patterns with neighboring plants","isCorrect":true,"optionType":"incorrect","explanation":"잘못됨: 스트레스 요인별로 소리가 다르다는 의미를 이웃 식물과 동일한 소리 패턴을 공유한다는 의미로 왜곡하여 핵심 대조 개념을 제거함","translation":"인접한 식물들과 동일한 소리 패턴을 공유한다"},{"text":"produce distinct signals in response to each cause of stress","isCorrect":false,"optionType":"correct","explanation":"올바름: make different sounds를 produce distinct signals로, stressors를 each cause of stress로 풀어서 의미 유지","translation":"각각의 스트레스 원인에 반응하여 구별되는 신호를 만들어낸다"},{"text":"vary their acoustic output depending on the threat type","isCorrect":false,"optionType":"correct","explanation":"올바름: make different sounds를 vary their acoustic output로, different stressors를 depending on the threat type으로 구체화하여 의미 유지","translation":"위협의 종류에 따라 음향 출력을 다르게 한다"}],"sourceQuestion":"3번 지문"},{"keyExpression":"these reactions are kneejerk survival actions","passage":"It's more likely that these reactions are kneejerk survival actions.","passageTranslation":"이 반응들은 반사적인 생존 행동일 가능성이 더 높습니다.","qType":"incorrect","questionText":"'these reactions are kneejerk survival actions'을(를) 잘못 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"these reactions are carefully planned responses to seek help from others","isCorrect":true,"optionType":"incorrect","explanation":"잘못됨: kneejerk(반사적, 무의식적)→carefully planned(신중히 계획된)으로 반의어 대체, 의도성 추가로 의미 왜곡","translation":"이 반응들은 다른 이들에게 도움을 구하기 위해 신중히 계획된 반응이다"},{"text":"these actions show plants are emotionally aware of their own pain","isCorrect":true,"optionType":"incorrect","explanation":"잘못됨: kneejerk survival(반사적 생존)→emotionally aware of pain(감정적으로 고통을 인식)으로 전문가 부정 의견과 반대되는 의미로 왜곡","translation":"이 행동들은 식물이 자신의 고통을 감정적으로 인식하고 있음을 보여준다"},{"text":"such behaviors are involuntary reflexes aimed at self-preservation","isCorrect":false,"optionType":"correct","explanation":"올바름: kneejerk→involuntary reflexes(불수의 반사), survival actions→self-preservation(자기 보존)로 학술적 표현으로 구체화","translation":"이러한 행동들은 자기 보존을 목표로 한 불수의적 반사이다"},{"text":"these responses are automatic instincts for staying alive","isCorrect":false,"optionType":"correct","explanation":"올바름: reactions→responses, kneejerk→automatic instincts(자동 본능), survival actions→for staying alive로 풀어쓰기","translation":"이 반응들은 살아남기 위한 자동적 본능이다"},{"text":"the sounds are spontaneous protective responses rather than deliberate cries","isCorrect":false,"optionType":"correct","explanation":"올바름: kneejerk→spontaneous(즉각적), survival actions→protective responses, crying out in pain과의 대조 구조 유지","translation":"그 소리들은 의도적인 울부짖음이 아닌 즉각적인 보호 반응이다"}],"sourceQuestion":"4번 지문"},{"keyExpression":"figuring out how good your skin gets at transferring an electrical current","passage":"We can then turn the subjective, subconscious experience of emotional intensity into an objective number by figuring out how good your skin gets at transferring an electrical current.","passageTranslation":"우리는 그런 다음 피부가 전류를 전달하는 데 얼마나 능숙해지는지를 파악함으로써 감정 강도의 주관적이고 무의식적인 경험을 객관적인 수치로 바꿀 수 있다.","qType":"incorrect","questionText":"'figuring out how good your skin gets at transferring an electrical current'을(를) 잘못 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"calculating the skin's increasing ability to carry electric charge","isCorrect":false,"optionType":"correct","explanation":"올바름: how good your skin gets를 increasing ability로, transferring electrical current를 carry electric charge로 구체화하여 paraphrasing함","translation":"전하를 운반하는 피부의 증가하는 능력을 계산하는"},{"text":"determining how effectively the skin conducts electricity","isCorrect":false,"optionType":"correct","explanation":"올바름: figuring out how good at transferring을 determining how effectively conducts로 재표현하여 의미 보존함","translation":"피부가 전기를 얼마나 효과적으로 전도하는지 파악하는"},{"text":"measuring how well skin passes electrical flow at a given moment","isCorrect":false,"optionType":"correct","explanation":"올바름: figuring out을 measuring으로, how good at transferring을 how well passes electrical flow로 재구성하여 의미 유지함","translation":"특정 순간에 피부가 전기 흐름을 얼마나 잘 통과시키는지 측정하는"},{"text":"predicting future changes in skin electrical resistance over time","isCorrect":true,"optionType":"incorrect","explanation":"잘못됨: 현재 전도 능력 측정을 미래 변화 예측으로 바꿔 시제와 목적을 왜곡함","translation":"시간이 지남에 따라 피부 전기 저항의 미래 변화를 예측하는"}],"sourceQuestion":"2번 지문"},{"keyExpression":"plants produce a high-frequency clicking noise when stressed","passage":"They found that plants produce a high-frequency clicking noise when stressed and can make different sounds for different stressors.","passageTranslation":"그들은 식물이 스트레스를 받을 때 고주파 딸깍 소리를 낸다는 것을 발견했으며, 서로 다른 스트레스 요인에 따라 다른 소리를 낼 수 있다는 것도 알았습니다.","qType":"correct","questionText":"'plants produce a high-frequency clicking noise when stressed'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"plants completely stop making any noise once they feel stressed","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: produce a noise(소리를 낸다)→stop making any noise(소리를 멈춘다)로 완전 반의어 대체","translation":"식물은 스트레스를 받으면 어떤 소리도 완전히 멈춘다"},{"text":"stressed plants emit repetitive high-pitched noises","isCorrect":true,"optionType":"correct","explanation":"올바름: when stressed를 분사구문으로 전환, produce→emit, high-frequency→high-pitched로 유의어 대체","translation":"스트레스를 받은 식물은 반복적인 고음의 소리를 낸다"},{"text":"plants absorb high-frequency sounds from their environment when calm","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: produce(생산)→absorb(흡수) 반의어, when stressed(스트레스받을 때)→when calm(평온할 때) 반의어 대체로 이중 역전","translation":"식물은 평온할 때 환경에서 고주파 소리를 흡수한다"}],"sourceQuestion":"4번 지문"},{"keyExpression":"at a frequency that we can't hear","passage":"Some plants use sound. Yes, sound, though at a frequency that we can't hear.","passageTranslation":"일부 식물은 소리를 사용합니다. 네, 소리요, 비록 우리가 들을 수 없는 주파수이지만요.","qType":"correct","questionText":"'at a frequency that we can't hear'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"in a range of vibration undetectable to human ears","isCorrect":true,"optionType":"correct","explanation":"올바름: frequency→range of vibration(진동 범위), can't hear→undetectable to human ears로 과학적 표현 구체화","translation":"인간의 귀로 감지할 수 없는 진동 범위에서"},{"text":"at a pitch loud enough for people to clearly notice","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: can't hear(들을 수 없는)→loud enough to clearly notice(명확히 알아챌 만큼 큰)로 반의어 대체","translation":"사람들이 명확히 알아챌 만큼 충분히 큰 음조로"},{"text":"on a sound level beyond human hearing range","isCorrect":true,"optionType":"correct","explanation":"올바름: frequency→sound level, can't hear→beyond human hearing range로 구체적 풀어쓰기, 의미 유지","translation":"인간의 청각 범위를 벗어난 음파 수준으로"},{"text":"at a frequency specifically designed for human listening","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: can't hear(들을 수 없다)→designed for human listening(인간 청취를 위해 설계된)으로 의미 역전","translation":"인간 청취를 위해 특별히 설계된 주파수로"}],"sourceQuestion":"4번 지문"},{"keyExpression":"can make different sounds for different stressors","passage":"They found that plants produce a high-frequency clicking noise when stressed and can make different sounds for different stressors.","passageTranslation":"그들은 식물이 스트레스를 받을 때 고주파 딸깍 소리를 낸다는 것을 발견했으며, 서로 다른 스트레스 요인에 따라 다른 소리를 낼 수 있다는 것도 알았습니다.","qType":"correct","questionText":"'can make different sounds for different stressors'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"always produce the same single sound regardless of the stressor","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: different sounds(다양한 소리)→same single sound(동일한 하나의 소리)로 반의어 대체, 핵심 의미 역전","translation":"스트레스 요인에 관계없이 항상 동일한 하나의 소리를 낸다"},{"text":"respond to all types of stress by becoming completely silent","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: make sounds(소리를 낸다)→becoming silent(조용해진다)로 완전 반의어 대체, 의미 역전","translation":"모든 유형의 스트레스에 완전히 조용해지는 방식으로 반응한다"},{"text":"generate distinct signals in response to each specific cause of stress","isCorrect":true,"optionType":"correct","explanation":"올바름: make→generate, different sounds→distinct signals, different stressors→each specific cause of stress로 풀어쓰기","translation":"각각의 구체적인 스트레스 원인에 반응하여 뚜렷한 신호를 만들어낸다"}],"sourceQuestion":"4번 지문"},{"keyExpression":"happens completely without your conscious mind having much say in the matter","passage":"This change in sweat gland activity happens completely without your conscious mind having much say in the matter.","passageTranslation":"땀샘 활동의 이러한 변화는 당신의 의식적 사고가 그 문제에 대해 거의 관여하지 않은 채 완전히 일어난다.","qType":"incorrect","questionText":"'happens completely without your conscious mind having much say in the matter'을(를) 잘못 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"occurs entirely beyond the control of our awareness","isCorrect":false,"optionType":"correct","explanation":"올바름: without conscious mind having say를 beyond the control of our awareness로 추상 개념을 유지하며 재표현함","translation":"우리의 인식 통제 밖에서 완전히 발생한다"},{"text":"requires significant mental effort and focused attention","isCorrect":true,"optionType":"incorrect","explanation":"잘못됨: without conscious mind를 requires mental effort로 정반대 의미로 왜곡하여 인과를 역전시킴","translation":"상당한 정신적 노력과 집중된 주의가 필요하다"},{"text":"proceeds involuntarily regardless of what we intend to do","isCorrect":false,"optionType":"correct","explanation":"올바름: without conscious control을 involuntarily regardless of what we intend로 함축 의미까지 재구성하여 paraphrasing함","translation":"우리가 의도하는 것과 무관하게 비자발적으로 진행된다"},{"text":"takes place automatically with no deliberate mental input","isCorrect":false,"optionType":"correct","explanation":"올바름: without conscious mind having say를 n ntional boundaries로, come up with innovative solutions를 develop novel approaches로 행위 수준에서 재구성","translation":"관습적 경계 밖에서 생각하는 것이 새로운 접근 방식을 개발하는 데 도움을 준다"},{"text":"fresh ways of thinking are essential for producing breakthrough ideas","isCorrect":false,"optionType":"correct","explanation":"올바름: creative thinking을 fresh ways of thinking으로, innovative solutions를 breakthrough ideas로 구체화하여 의미 유지","translation":"획기적인 아이디어를 만들어내기 위해 새로운 사고 방식이 필수적이다"}],"sourceQuestion":"5번 지문"},{"keyExpression":"that's actually an SOS","passage":"You know that smell that hangs in the air after you've mowed the lawn? Yeah, that's actually an SOS.","passageTranslation":"잔디를 깎은 후 공기 중에 맴도는 그 냄새 아시죠? 네, 그건 사실 SOS 신호입니다.","qType":"correct","questionText":"'that's actually an SOS'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"the odor is an accidental release with no meaning","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: SOS(의도적 신호)→accidental release with no meaning(의미 없는 우발적 방출)로 의도성과 목적성 제거","translation":"그 냄새는 아무 의미 없는 우발적 방출이다"},{"text":"it is simply a pleasant byproduct of plant growth","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: SOS(위험 신호)를 pleasant byproduct(기분 좋은 부산물)로 왜곡, 의미 완전 반전","translation":"그것은 단순히 식물 성장의 기분 좋은 부산물이다"},{"text":"the smell truly serves as a cry for help","isCorrect":true,"optionType":"correct","explanation":"올바름: SOS→cry for help(도움 요청)로 의미 풀어쓰기, actually→truly 부사 대체, 맥락 유지","translation":"그 냄새는 진정으로 도움을 요청하는 신호 역할을 한다"},{"text":"it is in fact a distress signal from the plant","isCorrect":true,"optionType":"correct","explanation":"올바름: actually→in fact(사실은) 부사 동의어 대체, SOS→distress signal로 구체적 의미 풀어쓰기","translation":"그것은 사실 식물에서 보내는 조난 신호이다"}],"sourceQuestion":"4번 지문"},{"keyExpression":"turn the subjective, subconscious experience of emotional intensity into an objective number","passage":"We can then turn the subjective, subconscious experience of emotional intensity into an objective number by figuring out how good your skin gets at transferring an electrical current.","passageTranslation":"우리는 그런 다음 피부가 전류를 전달하는 데 얼마나 능숙해지는지를 파악함으로써 감정 강도의 주관적이고 무의식적인 경험을 객관적인 수치로 바꿀 수 있다.","qType":"incorrect","questionText":"'turn the subjective, subconscious experience of emotional intensity into an objective number'을(를) 잘못 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"translate external numerical inputs into personal emotional states","isCorrect":true,"optionType":"incorrect","explanation":"잘못됨: 감정을 수치로 바꾸는 방향을 수치를 감정으로 바꾸는 방향으로 인과를 완전히 역전시킴","translation":"외부의 수치 입력을 개인적인 감정 상태로 변환한다"},{"text":"transform a personal emotional sensation into measurable data","isCorrect":false,"optionType":"correct","explanation":"올바름: subjective experience를 personal emotional sensation으로, objective number를 measurable data로 재구성하여 paraphrasing함","translation":"개인적인 감정 감각을 측정 가능한 데이터로 변환한다"},{"text":"change what is privately felt and unaware into a concrete value","isCorrect":false,"optionType":"correct","explanation":"올바름: subjective subconscious를 privately felt and unaware로, objective number를 concrete value로 함축 의미까지 재구성하여 표현함","translation":"개인적으로 느끼고 인식하지 못하는 것을 구체적인 수치로 바꾼다"},{"text":"convert an internal, unconscious feeling into a quantifiable figure","isCorrect":false,"optionType":"correct","explanation":"올바름: subjective subconscious experience를 internal unconscious feeling으로, objective number를 quantifiable figure로 재표현하여 의미 보존함","translation":"내면의 무의식적 감정을 정량화 가능한 수치로 변환한다"}],"sourceQuestion":"2번 지문"},{"keyExpression":"the answer is not good enough to justify the feeling","passage":"even when she does come up with an answer, she might be worried that the answer is not good enough to justify the feeling.","passageTranslation":"그녀가 답을 떠올리더라도, 그 답이 감정을 정당화하기에 충분하지 않다고 걱정할 수 있다.","qType":"incorrect","questionText":"'the answer is not good enough to justify the feeling'을(를) 잘못 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"the reason she gives might not seem to support her sadness","isCorrect":false,"optionType":"correct","explanation":"올바름: justify→support, feeling→sadness로 문맥상 구체화하여 핵심 의미 유지","translation":"그녀가 제시하는 이유가 슬픔을 뒷받침하지 못하는 것처럼 보일 수 있다"},{"text":"she finds it easy to explain why she feels that way","isCorrect":true,"optionType":"incorrect","explanation":"잘못됨: 설명이 부족할까 걱정한다는 의미를 쉽게 설명한다는 반대 내용으로 왜곡","translation":"그녀는 자신이 그렇게 느끼는 이유를 쉽게 설명할 수 있다"},{"text":"her response may seem insufficient to explain her emotion","isCorrect":false,"optionType":"correct","explanation":"올바름: not good enough→insufficient, justify the feeling→explain her emotion으로 구조와 의미 모두 보존","translation":"그녀의 대답이 감정을 설명하기에 불충분해 보일 수 있다"},{"text":"what she says may feel like a weak excuse for her mood","isCorrect":false,"optionType":"correct","explanation":"올바름: not good enough to justify→weak excuse for, feeling→mood로 추상 개념을 구체적 표현으로 전환","translation":"그녀가 말하는 것이 자신의 감정에 대한 약한 변명처럼 느껴질 수 있다"},{"text":"her answer is strong enough to prove the feeling is real","isCorrect":true,"optionType":"incorrect","explanation":"잘못됨: not good enough를 strong enough로 반의어 대체하여 원문과 정반대 의미가 됨","translation":"그녀의 답변은 감정이 진짜임을 증명하기에 충분히 강하다"}],"sourceQuestion":"1번 지문"},{"keyExpression":"if you think in a linear manner, you'll tend to be conservative","passage":"Stated differently, if you think in a linear manner, you'll tend to be conservative and keep coming up with techniques which are already known.","passageTranslation":"달리 말하면, 선형적으로 생각한다면 보수적이 되어 이미 알려진 기법만 계속 떠올리는 경향이 있을 것이다.","qType":"incorrect","questionText":"'if you think in a linear manner, you'll tend to be conservative'을(를) 잘못 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"relying on ordered logic causes you to stick with traditional methods","isCorrect":false,"optionType":"correct","explanation":"올바름: linear manner를 ordered logic으로, conservative를 stick with traditional methods라는 구체적 행동으로 전환","translation":"순서 있는 논리에 의존하면 전통적인 방법을 고수하게 된다"},{"text":"thinking in a sequential way leads you to prefer familiar approaches","isCorrect":false,"optionType":"correct","explanation":"올바름: linear manner를 sequential way로, conservative를 prefer familiar approaches로 행위 수준에서 구체화","translation":"순차적 방식으로 생각하면 친숙한 접근 방식을 선호하게 된다"},{"text":"sequential thinking encourages you to explore radical new ideas","isCorrect":true,"optionType":"incorrect","explanation":"잘못됨: conservative(보수적)와 정반대인 explore radical new ideas(급진적 새 아이디어 탐색)로 의미 역전","translation":"순차적 사고는 급진적인 새 아이디어를 탐색하도록 장려한다"},{"text":"linear thinking helps you become more open-minded and adaptive","isCorrect":true,"optionType":"incorrect","explanation":"잘못됨: 원문의 보수적이고 경직된 결과와 반대로 개방적이고 적응적이 된다는 의미로 왜곡","translation":"선형적 사고는 더 개방적이고 적응력 있게 되도록 돕는다"},{"text":"a step-by-step mindset makes you resistant to change","isCorrect":false,"optionType":"correct","explanation":"올바름: linear manner를 step-by-step mindset으로, conservative의 함축인 변화 저항을 resistant to change로 명시","translation":"단계적 사고방식은 변화에 저항하게 만든다"}],"sourceQuestion":"5번 지문"},{"keyExpression":"our skin gets more electrically conductive","passage":"And when those tiny drops of sweat appear, our skin gets more electrically conductive.","passageTranslation":"그리고 그 작은 땀방울들이 나타날 때, 우리 피부는 더 높은 전기 전도성을 갖게 된다.","qType":"incorrect","questionText":"'our skin gets more electrically conductive'을(를) 잘못 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"the skin becomes better at carrying an electric charge","isCorrect":false,"optionType":"correct","explanation":"올바름: gets more electrically conductive를 becomes better at carrying an electric charge로 구체화하여 의미 보존함","translation":"피부가 전하를 운반하는 데 더 능숙해진다"},{"text":"skin loses its natural resistance to electrical current","isCorrect":true,"optionType":"incorrect","explanation":"잘못됨: 전도성 증가를 저항 상실로 표현하여 표면적으론 비슷해 보이지만 저항 감소와 전도성 증가는 맥락상 뉘앙스가 다름","translation":"피부가 전류에 대한 자연적인 저항을 잃는다"},{"text":"the body surface increases its ability to transmit electricity","isCorrect":false,"optionType":"correct","explanation":"올바름: skin을 body surface로, more conductive를 increases its ability to transmit로 재표현하여 정확히 paraphrasing함","translation":"신체 표면이 전기를 전달하는 능력을 높인다"},{"text":"skin conductivity rises as sweat glands become active","isCorrect":false,"optionType":"correct","explanation":"올바름: gets more conductive를 conductivity rises로, 원인인 sweat을 sweat glands become active로 문맥 연계하여 표현함","translation":"땀샘이 활성화되면서 피부 전도성이 상승한다"}],"sourceQuestion":"2번 지문"},{"keyExpression":"The sound a plant makes when it's not getting watered differs from the one it'll make when a leaf is cut","passage":"The sound a plant makes when it's not getting watered differs from the one it'll make when a leaf is cut.","passageTranslation":"식물이 물을 받지 못할 때 내는 소리는 잎이 잘릴 때 내는 소리와 다릅니다.","qType":"incorrect","questionText":"'The sound a plant makes when it's not getting watered differs from the one it'll make when a leaf is cut'을(를) 잘못 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"plants emit identical sounds whether they lack water or lose a leaf","isCorrect":true,"optionType":"incorrect","explanation":"잘못됨: differs from(다르다)을 identical(동일한)로 반의어 대체하여 핵심 대조 의미를 역전시킴","translation":"식물은 물이 부족하든 잎이 잘리든 동일한 소리를 낸다"},{"text":"the noise from lack of water is distinct from the noise caused by being cut","isCorrect":false,"optionType":"correct","explanation":"올바름: not getting watered를 lack of water로, leaf is cut를 being cut으로 바꾸고, differs from을 is distinct from으로 유사 표현으로 대체하여 의미 유지","translation":"물 부족으로 인한 소음은 잘림으로 인한 소음과 구별된다"},{"text":"plants produce a unique acoustic signal for drought stress versus physical damage","isCorrect":false,"optionType":"correct","explanation":"올바름: not getting watered를 drought stress로, leaf is cut를 physical damage로 추상화하고, differs from을 unique signal for A versus B로 재구성하여 의미 유지","translation":"식물은 가뭄 스트레스와 물리적 손상에 대해 각각 고유한 음향 신호를 만들어낸다"},{"text":"the sound from cutting a leaf is louder than the sound from lacking water","isCorrect":true,"optionType":"incorrect","explanation":"잘못됨: differs from(다르다는 일반적 차이)을 is louder than(더 크다는 크기 비교)으로 대체하여 비교 기준 자체를 바꾸어 의미 왜곡됨","translation":"잎을 자르는 소리는 물 부족 소리보다 더 크다"},{"text":"dehydration and injury each trigger a different sound response in plants","isCorrect":false,"optionType":"correct","explanation":"올바름: not getting watered를 dehydration으로, leaf is cut를 injury로 추상화하고, differs from을 each trigger a different response로 구조 변환하여 의미 유지","translation":"탈수와 부상은 각각 식물에서 다른 소리 반응을 유발한다"}],"sourceQuestion":"3번 지문"},{"keyExpression":"wait for her response","passage":"You can say, 'You seem a little tired today,' or, 'I noticed that you frowned when I mentioned the recital,' and wait for her response.","passageTranslation":"당신은 '오늘 좀 피곤해 보이네' 또는 '발표회 얘기를 꺼냈을 때 네가 찡그리는 것을 알아챘어'라고 말하고 그녀의 반응을 기다릴 수 있다.","qType":"correct","questionText":"'wait for her response'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"keep asking until she gives a satisfying answer","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: 기다린다는 의미를 계속 질문한다는 반대 행동으로 왜곡하여 지문의 핵심 조언과 정면 배치됨","translation":"그녀가 만족스러운 답을 줄 때까지 계속 물어보다"},{"text":"tell her immediately what you think the answer is","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: 기다린다는 의미를 즉시 답을 말해준다는 행동으로 대체하여 기다림의 의미를 완전히 역전","translation":"당신이 생각하는 답을 즉시 그녀에게 말해주다"},{"text":"give her time and space to reply on her own","isCorrect":true,"optionType":"correct","explanation":"올바름: wait for→give time and space, her response→reply on her own으로 기다림의 의도와 맥락 보존","translation":"그녀 스스로 대답할 시간과 공간을 주다"}],"sourceQuestion":"1번 지문"},{"keyExpression":"measure your emotional state by tracking how your body subconsciously sweats","passage":"We can actually measure your emotional state by tracking how your body subconsciously sweats, by running a bit of electricity through your skin.","passageTranslation":"우리는 실제로 피부에 약간의 전기를 흘려보냄으로써 신체가 무의식적으로 땀을 흘리는 방식을 추적하여 감정 상태를 측정할 수 있다.","qType":"correct","questionText":"'measure your emotional state by tracking how your body subconsciously sweats'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"determine how someone feels by recording their skin moisture levels","isCorrect":true,"optionType":"correct","explanation":"올바름: measure emotional state를 determine how someone feels로, subconsciously sweats를 skin moisture levels로 구체화하여 의미 유지함","translation":"피부 수분 수준을 기록하여 사람의 감정 상태를 파악한다"},{"text":"control emotional responses by regulating sweat gland activity","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: measure를 control로, tracking을 regulating으로 바꿔 관찰 행위를 조절 행위로 의미를 왜곡함","translation":"땀샘 활동을 조절하여 감정 반응을 통제한다"},{"text":"predict future emotions by analyzing past sweat records","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: 현재 감정 측정을 미래 감정 예측으로 바꿔 시제와 인과 방향을 왜곡함","translation":"과거 땀 기록을 분석하여 미래 감정을 예측한다"},{"text":"assess inner feelings through monitoring involuntary perspiration","isCorrect":true,"optionType":"correct","explanation":"올바름: measure emotional state를 assess inner feelings로, subconsciously sweats를 involuntary perspiration으로 재표현하여 의미 보존함","translation":"비자발적 땀 분비를 모니터링하여 내면 감정을 평가한다"},{"text":"gauge emotional intensity by observing unconscious sweat patterns","isCorrect":true,"optionType":"correct","explanation":"올바름: tracking을 observing으로, subconsciously를 unconscious로, emotional state를 emotional intensity로 재구성하여 paraphrasing함","translation":"무의식적 땀 패턴을 관찰하여 감정 강도를 측정한다"}],"sourceQuestion":"2번 지문"},{"keyExpression":"creative thinking is needed to come up with innovative solutions","passage":"Thus, logical thinking works well with familiar problems but falls short in dealing with new ideas, for which creative thinking is needed to come up with innovative solutions.","passageTranslation":"따라서 논리적 사고는 친숙한 문제에서는 잘 작동하지만 새로운 아이디어를 다루는 데는 부족하며, 이를 위해서는 혁신적인 해결책을 내놓기 위한 창의적 사고가 필요하다.","qType":"incorrect","questionText":"'creative thinking is needed to come up with innovative solutions'을(를) 잘못 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"logical analysis alone is sufficient to produce new discoveries","isCorrect":true,"optionType":"incorrect","explanation":"잘못됨: 창의적 사고의 필요성을 논리적 분석 단독으로 충분하다는 의미로 대체하여 원문의 핵심 주장 역전","translation":"논리적 분석만으로 새로운 발견을 만들어내기에 충분하다"},{"text":"imaginative thinking is required to generate original answers","isCorrect":false,"optionType":"correct","explanation":"올바름: creative thinking을 imaginative thinking으로, come up with를 generate로, innovative solutions를 original answers로 정확히 재표현","translation":"독창적인 답을 만들어내기 위해 상상력 있는 사고가 요구된다"},{"text":"thinking outside conventional boundaries helps develop novel approaches","isCorrect":false,"optionType":"correct","explanation":"올바름: creative thinking을 thinking outside conventional boundaries로, come up with innovative solutions를 develop novel approaches로 행위 수준에서 재구성","translation":"관습적 경계 밖에서 생각하는 것이 새로운 접근 방식을 개발하는 데 도움을 준다"},{"text":"fresh ways of thinking are essential for producing breakthrough ideas","isCorrect":false,"optionType":"correct","explanation":"올바름: creative thinking을 fresh ways of thinking으로, innovative solutions를 breakthrough ideas로 구체화하여 의미 유지","translation":"획기적인 아이디어를 만들어내기 위해 새로운 사고 방식이 필수적이다"}],"sourceQuestion":"5번 지문"},{"keyExpression":"these reactions are kneejerk survival actions","passage":"It's more likely that these reactions are kneejerk survival actions.","passageTranslation":"이 반응들은 반사적인 생존 행동일 가능성이 더 높습니다.","qType":"correct","questionText":"'these reactions are kneejerk survival actions'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"these actions show plants are emotionally aware of their own pain","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: kneejerk survival(반사적 생존)→emotionally aware of pain(감정적으로 고통을 인식)으로 전문가 부정 의견과 반대되는 의미로 왜곡","translation":"이 행동들은 식물이 자신의 고통을 감정적으로 인식하고 있음을 보여준다"},{"text":"these reactions are carefully planned responses to seek help from others","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: kneejerk(반사적, 무의식적)→carefully planned(신중히 계획된)으로 반의어 대체, 의도성 추가로 의미 왜곡","translation":"이 반응들은 다른 이들에게 도움을 구하기 위해 신중히 계획된 반응이다"},{"text":"these responses are automatic instincts for staying alive","isCorrect":true,"optionType":"correct","explanation":"올바름: reactions→responses, kneejerk→automatic instincts(자동 본능), survival actions→for staying alive로 풀어쓰기","translation":"이 반응들은 살아남기 위한 자동적 본능이다"}],"sourceQuestion":"4번 지문"},{"keyExpression":"at a frequency that we can't hear","passage":"Some plants use sound. Yes, sound, though at a frequency that we can't hear.","passageTranslation":"일부 식물은 소리를 사용합니다. 네, 소리요, 비록 우리가 들을 수 없는 주파수이지만요.","qType":"incorrect","questionText":"'at a frequency that we can't hear'을(를) 잘못 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"beyond the range of human hearing","isCorrect":false,"optionType":"correct","explanation":"올바름: at a frequency we can't hear를 beyond the range of human hearing으로 추상→구체 전환하여 의미 유지","translation":"인간이 들을 수 있는 범위를 벗어난"},{"text":"in a pitch that only trained researchers can detect","isCorrect":true,"optionType":"incorrect","explanation":"잘못됨: 지문은 인간 전체가 들을 수 없다고 했으나 훈련된 연구자는 감지 가능하다고 의미를 제한하여 왜곡됨","translation":"훈련된 연구자만 감지할 수 있는 음높이로"},{"text":"on a wavelength imperceptible to humans","isCorrect":false,"optionType":"correct","explanation":"올바름: frequency를 wavelength로, can't hear를 imperceptible to humans로 유사 개념 대체하여 의미 유지","translation":"인간이 감지할 수 없는 파장으로"},{"text":"in a sonic range undetectable by our ears","isCorrect":false,"optionType":"correct","explanation":"올바름: frequency를 sonic range로, can't hear를 undetectable by our ears로 구체화하여 의미 유지","translation":"우리 귀로 감지할 수 없는 음역대에서"}],"sourceQuestion":"3번 지문"},{"keyExpression":"sharing simple observations usually works better than asking questions to get a conversation rolling","passage":"sharing simple observations usually works better than asking questions to get a conversation rolling.","passageTranslation":"단순한 관찰을 공유하는 것이 대화를 시작하기 위해 질문하는 것보다 대개 더 효과적이다.","qType":"incorrect","questionText":"'sharing simple observations usually works better than asking questions to get a conversation rolling'을(를) 잘못 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"making brief remarks tends to start a talk more effectively","isCorrect":false,"optionType":"correct","explanation":"올바름: observations→remarks, works better→more effectively, get a conversation rolling→start a talk로 구조와 의미 모두 정확히 paraphrasing","translation":"간단한 말을 건네는 것이 대화를 더 효과적으로 시작하는 경향이 있다"},{"text":"noting what you see often helps conversation begin more smoothly","isCorrect":false,"optionType":"correct","explanation":"올바름: sharing simple observations→noting what you see, works better→helps more smoothly로 핵심 의미 유지","translation":"보이는 것을 언급하는 것이 대화를 더 부드럽게 시작하도록 돕는다"},{"text":"complex analysis works better than simple comments in talks","isCorrect":true,"optionType":"incorrect","explanation":"잘못됨: simple observations를 complex analysis로 대체해 원문의 핵심인 단순함의 효용을 왜곡함","translation":"복잡한 분석이 대화에서 단순한 언급보다 더 효과적이다"},{"text":"asking direct questions is the best way to open dialogue","isCorrect":true,"optionType":"incorrect","explanation":"잘못됨: 원문은 질문보다 관찰 공유가 낫다고 했으나, 이 보기는 질문이 최선이라고 인과를 역전시킴","translation":"직접적인 질문을 하는 것이 대화를 여는 최선의 방법이다"},{"text":"offering calm observations is more useful than posing questions","isCorrect":false,"optionType":"correct","explanation":"올바름: simple observations→calm observations, asking questions→posing questions로 대조 구조와 의미 보존","translation":"차분한 관찰을 제공하는 것이 질문을 던지는 것보다 더 유용하다"}],"sourceQuestion":"1번 지문"},{"keyExpression":"their main objective is to survive","passage":"Plants are living organisms, and their main objective is to survive.","passageTranslation":"식물은 살아있는 유기체이며, 그들의 주요 목표는 생존입니다.","qType":"incorrect","questionText":"'their main objective is to survive'을(를) 잘못 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"their secondary concern is finding food and reproducing","isCorrect":true,"optionType":"incorrect","explanation":"잘못됨: main(주요)을 secondary(부차적)로 반의어 대체하고 survive를 finding food and reproducing으로 대체하여 핵심 의미 왜곡됨","translation":"그들의 부차적인 관심사는 먹이를 찾고 번식하는 것이다"},{"text":"staying alive is what they are fundamentally driven to do","isCorrect":false,"optionType":"correct","explanation":"올바름: main objective를 what they are fundamentally driven to do로, survive를 staying alive로 구체화하여 의미 유지","translation":"살아남는 것이 근본적으로 그들을 이끄는 것이다"},{"text":"their ultimate aim is to grow as large as possible","isCorrect":true,"optionType":"incorrect","explanation":"잘못됨: survive(생존)를 grow as large as possible(최대한 크게 자라다)로 대체하여 생존이라는 핵심 개념을 성장이라는 다른 개념으로 왜곡함","translation":"그들의 궁극적인 목표는 최대한 크게 자라는 것이다"},{"text":"their primary goal is self-preservation","isCorrect":false,"optionType":"correct","explanation":"올바름: main objective를 primary goal로, survive를 self-preservation으로 명사화하여 의미 유지","translation":"그들의 주요 목표는 자기 보존이다"},{"text":"the core purpose of their existence centers on survival","isCorrect":false,"optionType":"correct","explanation":"올바름: main objective를 core purpose of their existence로 추상화하여 바꾸고 survive를 survival로 명사화하여 의미 유지","translation":"그들 존재의 핵심 목적은 생존에 집중되어 있다"}],"sourceQuestion":"3번 지문"},{"keyExpression":"it's worth noting that experts don't think plants are crying out in pain","passage":"However, it's worth noting that experts don't think plants are crying out in pain.","passageTranslation":"하지만 전문가들은 식물이 고통으로 소리를 지른다고 생각하지 않는다는 점은 주목할 만합니다.","qType":"correct","questionText":"'it's worth noting that experts don't think plants are crying out in pain'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"it deserves attention that researchers question whether plants truly experience pain","isCorrect":true,"optionType":"correct","explanation":"올바름: worth noting을 deserves attention으로, experts don't think를 researchers question whether로 바꾸어 의미 유지","translation":"연구자들이 식물이 진정으로 고통을 경험하는지에 의문을 품는다는 점은 주목할 만하다"},{"text":"one should bear in mind that scientists do not believe plants suffer consciously","isCorrect":true,"optionType":"correct","explanation":"올바름: worth noting을 bear in mind로, experts를 scientists로, crying out in pain을 suffer consciously로 구체화하여 의미 유지","translation":"과학자들은 식물이 의식적으로 고통받는다고 믿지 않는다는 점을 명심해야 한다"},{"text":"experts have confirmed that plants consciously experience pain like animals","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: don't think(부정)를 have confirmed(확인했다)로 바꾸어 의미를 완전히 역전시킴 — 부정 명제를 긍정 명제로 왜곡함","translation":"전문가들은 식물이 동물처럼 의식적으로 고통을 경험한다는 것을 확인했다"},{"text":"it is important to keep in mind that specialists reject the idea of plants feeling pain","isCorrect":true,"optionType":"correct","explanation":"올바름: worth noting을 important to keep in mind로, experts를 specialists로, crying out in pain을 feeling pain으로 바꾸어 의미 유지","translation":"전문가들이 식물이 고통을 느낀다는 생각을 거부한다는 점을 명심하는 것이 중요하다"},{"text":"it is unnecessary to consider whether plants react to pain at all","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: worth noting(주목할 가치가 있다)을 unnecessary(불필요하다)로 반의어 대체하여 주목할 필요가 없다는 반대 의미로 왜곡됨","translation":"식물이 고통에 반응하는지를 전혀 고려할 필요가 없다"}],"sourceQuestion":"3번 지문"},{"keyExpression":"It's better to simply reflect what you notice","passage":"It's better to simply reflect what you notice.","passageTranslation":"당신이 알아챈 것을 단순히 반영하는 것이 더 낫다.","qType":"correct","questionText":"'It's better to simply reflect what you notice'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"it is best to ask the child to describe her own feelings","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: 부모가 관찰을 전달하라는 의미를 아이에게 감정을 묘사하게 요청하라는 반대 주체로 왜곡","translation":"아이에게 자신의 감정을 묘사하도록 요청하는 것이 최선이다"},{"text":"describing your observations is a more effective strategy","isCorrect":true,"optionType":"correct","explanation":"올바름: reflect what you notice→describing your observations, better→more effective로 필자의 권고 의미 보존","translation":"관찰한 것을 묘사하는 것이 더 효과적인 전략이다"},{"text":"it is more helpful to just mirror what you observe","isCorrect":true,"optionType":"correct","explanation":"올바름: reflect→mirror, notice→observe로 동의어 대체하여 핵심 의미 완전히 보존","translation":"당신이 관찰하는 것을 단순히 반영하는 것이 더 도움이 된다"},{"text":"you should avoid mentioning anything that you observe","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: 관찰을 공유하라는 권고를 관찰을 언급하지 말라는 반대 지침으로 대체","translation":"당신이 관찰하는 것은 어떤 것도 언급하지 않아야 한다"}],"sourceQuestion":"1번 지문"},{"keyExpression":"produce a high-frequency clicking noise when stressed","passage":"They found that plants produce a high-frequency clicking noise when stressed and can make different sounds for different stressors.","passageTranslation":"그들은 식물이 스트레스를 받을 때 고주파 딸깍 소리를 내며, 다양한 스트레스 요인에 따라 다른 소리를 낼 수 있다는 것을 발견했습니다.","qType":"correct","questionText":"'produce a high-frequency clicking noise when stressed'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"suppress all sound output when placed under stress","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: produce(생성)를 suppress(억제)로 반의어 대체하여 스트레스 상황에서 소리를 억제한다는 반대 의미로 왜곡됨","translation":"스트레스를 받으면 모든 소리 출력을 억제한다"},{"text":"absorb low-frequency vibrations from the environment","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: produce(생성)를 absorb(흡수)로, high-frequency를 low-frequency로 반의어 대체하여 의미를 완전히 역전시킴","translation":"환경으로부터 저주파 진동을 흡수한다"},{"text":"create detectable sounds whenever they face strain","isCorrect":true,"optionType":"correct","explanation":"올바름: produce를 create로, high-frequency clicking을 detectable sounds로, when stressed를 whenever they face strain으로 바꾸어 의미 유지","translation":"긴장에 처할 때마다 감지 가능한 소리를 만들어낸다"}],"sourceQuestion":"3번 지문"},{"keyExpression":"experts don't think plants are crying out in pain","passage":"However, it's worth noting that experts don't think plants are crying out in pain.","passageTranslation":"하지만, 전문가들은 식물이 고통에 울부짖고 있다고 생각하지 않는다는 점은 짚고 넘어갈 가치가 있습니다.","qType":"correct","questionText":"'experts don't think plants are crying out in pain'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"experts confirm that plants experience intense emotional pain","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: don't think(생각하지 않는다)→confirm(확인하다)로 부정을 긍정으로, 내 ptionType":"correct","explanation":"올바름: Researchers→experts, microphones→audio equipment, trouble calls→stress-related sounds로 의미 보존하며 표현 다양화","translation":"전문가들이 음향 장비로 식물에 실험을 실시하여 스트레스 관련 소리를 포착했다"},{"text":"scientists conducted tests using plants and recording devices to detect distress signals","isCorrect":false,"optionType":"correct","explanation":"올바름: Researchers→scientists, experimented→conducted tests, microphones→recording devices, trouble calls→distress signals로 단계적 동의어 대체","translation":"과학자들이 식물과 녹음 장치를 사용하여 조난 신호를 감지하는 실험을 실시했다"},{"text":"researchers proved that plants cannot make any sounds at all","isCorrect":true,"optionType":"incorrect","explanation":"잘못됨: to see if(확인하려 했다)→proved(증명했다)로 탐색을 확정으로 왜곡, 또한 결론도 반대로 역전","translation":"연구자들이 식물이 아무 소리도 낼 수 없다는 것을 증명했다"}],"sourceQuestion":"4번 지문"},{"keyExpression":"you will be most effective if you learn to operate in a nonlinear manner","passage":"For this you will be most effective if you learn to operate in a nonlinear manner; that is, use your creative brain.","passageTranslation":"이를 위해 비선형적으로 운용하는 법을 배운다면, 즉 창의적 두뇌를 사용한다면 가장 효과적일 것이다.","qType":"incorrect","questionText":"'you will be most effective if you learn to operate in a nonlinear manner'을(를) 잘못 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"you succeed best by sticking to a fixed logical sequence","isCorrect":true,"optionType":"incorrect","explanation":"잘못됨: nonlinear(비선형)과 반대인 fixed logical sequence(고정된 논리적 순서)를 사용하여 의미 역전","translation":"고정된 논리적 순서를 고수할 때 가장 잘 성공한다"},{"text":"you achieve the best results by practicing non-sequential thinking","isCorrect":false,"optionType":"correct","explanation":"올바름: most effective를 achieve the best results로, operate in a nonlinear manner를 non-sequential thinking으로 정확히 paraphrase","translation":"비순차적 사고를 연습함으로써 최상의 결과를 얻는다"},{"text":"avoiding all forms of thinking makes you most productive","isCorrect":true,"optionType":"incorrect","explanation":"잘못됨: 특정 방식의 사고를 학습하라는 원문과 달리 모든 사고를 피하라는 의미로 극단적 왜곡","translation":"모든 형태의 사고를 피하는 것이 가장 생산적이다"},{"text":"your performance peaks when you adopt a flexible, non-rigid approach","isCorrect":false,"optionType":"correct","explanation":"올바름: most effective를 performance peaks로, nonlinear manner를 flexible, non-rigid approach로 구체화","translation":"유연하고 경직되지 않은 접근 방식을 채택할 때 성과가 최고에 달한다"},{"text":"mastering a non-structured way of thinking maximizes your output","isCorrect":false,"optionType":"correct","explanation":"올바름: learn to operate를 mastering으로, nonlinear manner를 non-structured way of thinking으로, most effective를 maximizes your output으로 재구성","translation":"비구조적 사고 방식을 숙달하면 성과가 극대화된다"}],"sourceQuestion":"5번 지문"},{"keyExpression":"can make different sounds for different stressors","passage":"They found that plants produce a high-frequency clicking noise when stressed and can make different sounds for different stressors.","passageTranslation":"그들은 식물이 스트레스를 받을 때 고주파 딸깍 소리를 낸다는 것을 발견했으며, 서로 다른 스트레스 요인에 따라 다른 소리를 낼 수 있다는 것도 알았습니다.","qType":"correct","questionText":"'can make different sounds for different stressors'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"are able to produce varied noises depending on the type of threat","isCorrect":true,"optionType":"correct","explanation":"올바름: make→produce, different sounds→varied noises, different stressors→type of threat로 동의어 대체, 의미 유지","translation":"위협의 종류에 따라 다양한 소리를 낼 수 있다"},{"text":"always produce the same single sound regardless of the stressor","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: different sounds(다양한 소리)→same single sound(동일한 하나의 소리)로 반의어 대체, 핵심 의미 역전","translation":"스트레스 요인에 관계없이 항상 동일한 하나의 소리를 낸다"},{"text":"respond to all types of stress by becoming completely silent","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: make sounds(소리를 낸다)→becoming silent(조용해진다)로 완전 반의어 대체, 의미 역전","translation":"모든 유형의 스트레스에 완전히 조용해지는 방식으로 반응한다"}],"sourceQuestion":"4번 지문"},{"keyExpression":"Scents and sounds are their tools for defending against things that might harm them","passage":"Scents and sounds are their tools for defending against things that might harm them.","passageTranslation":"냄새와 소리는 자신에게 해를 끼칠 수 있는 것들로부터 방어하기 위한 그들의 도구입니다.","qType":"correct","questionText":"'Scents and sounds are their tools for defending against things that might harm them'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"plants attract other organisms using scents and sounds to ensure reproduction","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: tools for defending(방어 도구)을 attract(유인하다)와 ensure reproduction(번식 보장)으로 목적 자체를 바꾸어 의미 왜곡됨","translation":"식물은 번식을 보장하기 위해 냄새와 소리로 다른 유기체를 유인한다"},{"text":"plants rely on odors and noises as protective mechanisms against potential threats","isCorrect":true,"optionType":"correct","explanation":"올바름: tools for defending을 protective mechanisms로, things that might harm them을 potential threats로 구체화하여 의미 유지","translation":"식물은 잠재적 위협에 대한 보호 메커니즘으로 냄새와 소리에 의존한다"},{"text":"emitting smells and vibrations helps plants protect themselves from danger","isCorrect":true,"optionType":"correct","explanation":"올바름: scents and sounds를 smells and vibrations로, tools for defending을 helps protect themselves로 동사구로 전환하여 의미 유지","translation":"냄새와 진동을 방출하는 것이 식물이 위험으로부터 자신을 보호하는 데 도움이 된다"},{"text":"chemical signals and acoustic cues serve as defenses against harm","isCorrect":true,"optionType":"correct","explanation":"올바름: scents를 chemical signals로, sounds를 acoustic cues로, tools for defending을 defenses로 바꾸어 의미 유지","translation":"화학적 신호와 음향 단서가 해로움에 대한 방어 수단으로 작용한다"},{"text":"scents and sounds are weaknesses that expose plants to greater risk","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: tools for defending(방어 도구)을 weaknesses that expose to greater risk(더 큰 위험에 노출시키는 약점)으로 반의어 구조로 대체하여 의미 역전됨","translation":"냄새와 소리는 식물을 더 큰 위험에 노출시키는 약점이다"}],"sourceQuestion":"3번 지문"},{"keyExpression":"you will be most effective if you learn to operate in a nonlinear manner","passage":"For this you will be most effective if you learn to operate in a nonlinear manner; that is, use your creative brain.","passageTranslation":"이를 위해 비선형적으로 운용하는 법을 배운다면, 즉 창의적 두뇌를 사용한다면 가장 효과적일 것이다.","qType":"correct","questionText":"'you will be most effective if you learn to operate in a nonlinear manner'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"you succeed best by sticking to a fixed logical sequence","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: nonlinear(비선형)과 반대인 fixed logical sequence(고정된 논리적 순서)를 사용하여 의미 역전","translation":"고정된 논리적 순서를 고수할 때 가장 잘 성공한다"},{"text":"avoiding all forms of thinking makes you most productive","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: 특정 방식의 사고를 학습하라는 원문과 달리 모든 사고를 피하라는 의미로 극단적 왜곡","translation":"모든 형태의 사고를 피하는 것이 가장 생산적이다"},{"text":"you achieve the best results by practicing non-sequential thinking","isCorrect":true,"optionType":"correct","explanation":"올바름: most effective를 achieve the best results로, operate in a nonlinear manner를 non-sequential thinking으로 정확히 paraphrase","translation":"비순차적 사고를 연습함으로써 최상의 결과를 얻는다"},{"text":"your performance peaks when you adopt a flexible, non-rigid approach","isCorrect":true,"optionType":"correct","explanation":"올바름: most effective를 performance peaks로, nonlinear manner를 flexible, non-rigid approach로 구체화","translation":"유연하고 경직되지 않은 접근 방식을 채택할 때 성과가 최고에 달한다"}],"sourceQuestion":"5번 지문"},{"keyExpression":"put an objective value on a subjective state of mind","passage":"This is particularly useful from a scientific viewpoint, because it allows us to put an objective value on a subjective state of mind.","passageTranslation":"이것은 과학적 관점에서 특히 유용한데, 왜냐하면 주관적인 심리 상태에 객관적인 수치를 부여할 수 있게 해주기 때문이다.","qType":"correct","questionText":"'put an objective value on a subjective state of mind'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"judge the accuracy of someone's emotional self-report","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: 객관적 수치화를 정확성 판단으로 바꿔 지문의 의도와 다른 방향으로 의미를 왜곡함","translation":"누군가의 감정 자기 보고의 정확성을 판단한다"},{"text":"replace personal feelings with universal emotional standards","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: put a value on을 replace로 바꿔 측정이 아닌 대체의 의미로 왜곡함으로써 핵심 인과를 틀리게 함","translation":"개인적인 감정을 보편적인 감정 기준으로 대체한다"},{"text":"quantify what is otherwise a purely personal feeling","isCorrect":true,"optionType":"correct","explanation":"올바름: put an objective value on을 quantify로, subjective state를 purely personal feeling으로 재구성하여 정확히 paraphrasing함","translation":"순전히 개인적인 감정에 수치를 부여한다"}],"sourceQuestion":"2번 지문"},{"keyExpression":"kneejerk survival actions","passage":"It's more likely that these reactions are kneejerk survival actions.","passageTranslation":"이러한 반응들은 즉각적인 생존 행동일 가능성이 더 높습니다.","qType":"incorrect","questionText":"'kneejerk survival actions'을(를) 잘못 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"automatic responses aimed at staying alive","isCorrect":false,"optionType":"correct","explanation":"올바름: kneejerk를 automatic으로, survival actions를 responses aimed at staying alive로 구체화하여 의미 유지","translation":"살아남기 위한 자동적인 반응"},{"text":"instinctive reactions that help the organism survive","isCorrect":false,"optionType":"correct","explanation":"올바름: kneejerk를 instinctive로, survival actions를 reactions that help survive로 풀어서 의미 유지","translation":"유기체가 생존하는 데 도움이 되는 본능적인 반응"},{"text":"conscious decisions made to communicate with other species","isCorrect":true,"optionType":"incorrect","explanation":"잘못됨: kneejerk survival actions(무의식적 생존 행동)를 conscious decisions to communicate(의식적 의사소통 결정)로 바꾸어 목적과 의식성 모두 왜곡됨","translation":"다른 종과 소통하기 위해 내린 의식적인 결정"},{"text":"deliberate strategies carefully planned for long-term survival","isCorrect":true,"optionType":"incorrect","explanation":"잘못됨: kneejerk(즉각적·무의식적)를 deliberate, carefully planned(신중히 계획된)로 반의어 대체하여 의미 역전됨","translation":"장기적 생존을 위해 신중히 계획된 의도적인 전략"},{"text":"reflexive behaviors triggered by the need to self-preserve","isCorrect":false,"optionType":"correct","explanation":"올바름: kneejerk를 reflexive로, survival actions를 behaviors triggered by the need to self-preserve로 구체화하여 의미 유지","translation":"자기 보존의 필요에 의해 유발되는 반사적 행동"}],"sourceQuestion":"3번 지문"},{"keyExpression":"the answer is not good enough to justify the feeling","passage":"even when she does come up with an answer, she might be worried that the answer is not good enough to justify the feeling.","passageTranslation":"그녀가 답을 떠올리더라도, 그 답이 감정을 정당화하기에 충분하지 않다고 걱정할 수 있다.","qType":"correct","questionText":"'the answer is not good enough to justify the feeling'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"she finds it easy to explain why she feels that way","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: 설명이 부족할까 걱정한다는 의미를 쉽게 설명한다는 반대 내용으로 왜곡","translation":"그녀는 자신이 그렇게 느끼는 이유를 쉽게 설명할 수 있다"},{"text":"her answer is strong enough to prove the feeling is real","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: not good enough를 strong enough로 반의어 대체하여 원문과 정반대 의미가 됨","translation":"그녀의 답변은 감정이 진짜임을 증명하기에 충분히 강하다"},{"text":"her response may seem insufficient to explain her emotion","isCorrect":true,"optionType":"correct","explanation":"올바름: not good enough→insufficient, justify the feeling→explain her emotion으로 구조와 의미 모두 보존","translation":"그녀의 대답이 감정을 설명하기에 불충분해 보일 수 있다"}],"sourceQuestion":"1번 지문"},{"keyExpression":"Researchers experimented with plants and microphones to see if they could record any trouble calls","passage":"Researchers experimented with plants and microphones to see if they could record any trouble calls.","passageTranslation":"연구자들은 식물이 내는 위험 신호를 녹음할 수 있는지 확인하기 위해 식물과 마이크로폰을 이용해 실험했습니다.","qType":"correct","questionText":"'Researchers experimented with plants and microphones to see if they could record any trouble calls'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"plants placed microphones near researchers to listen to human voices","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: 주어와 목적어 역전, 식물이 인간 목소리를 듣기 위해 마이크를 배치한다는 의미로 인과관계 완전 역전","translation":"식물들이 인간의 목소리를 듣기 위해 연구자들 근처에 마이크를 배치했다"},{"text":"researchers proved that plants cannot make any sounds at all","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: to see if(확인하려 했다)→proved(증명했다)로 탐색을 확정으로 왜곡, 또한 결론도 반대로 역전","translation":"연구자들이 식물이 아무 소리도 낼 수 없다는 것을 증명했다"},{"text":"scientists conducted tests using plants and recording devices to detect distress signals","isCorrect":true,"optionType":"correct","explanation":"올바름: Researchers→scientists, experimented→conducted tests, microphones→recording devices, trouble calls→distress signals로 단계적 동의어 대체","translation":"과학자들이 식물과 녹음 장치를 사용하여 조난 신호를 감지하는 실험을 실시했다"},{"text":"experts ran experiments on plants with audio equipment to capture stress-related sounds","isCorrect":true,"optionType":"correct","explanation":"올바름: Researchers→experts, microphones→audio equipment, trouble calls→stress-related sounds로 의미 보존하며 표현 다양화","translation":"전문가들이 음향 장비로 식물에 실험을 실시하여 스트레스 관련 소리를 포착했다"}],"sourceQuestion":"4번 지문"},{"keyExpression":"measure your emotional state by tracking how your body subconsciously sweats","passage":"We can actually measure your emotional state by tracking how your body subconsciously sweats, by running a bit of electricity through your skin.","passageTranslation":"우리는 실제로 피부에 약간의 전기를 흘려보냄으로써 신체가 무의식적으로 땀을 흘리는 방식을 추적하여 감정 상태를 측정할 수 있다.","qType":"incorrect","questionText":"'measure your emotional state by tracking how your body subconsciously sweats'을(를) 잘못 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"gauge emotional intensity by observing unconscious sweat patterns","isCorrect":false,"optionType":"correct","explanation":"올바름: tracking을 observing으로, subconsciously를 unconscious로, emotional state를 emotional intensity로 재구성하여 paraphrasing함","translation":"무의식적 땀 패턴을 관찰하여 감정 강도를 측정한다"},{"text":"assess inner feelings through monitoring involuntary perspiration","isCorrect":false,"optionType":"correct","explanation":"올바름: measure emotional state를 assess inner feelings로, subconsciously sweats를 involuntary perspiration으로 재표현하여 의미 보존함","translation":"비자발적 땀 분비를 모니터링하여 내면 감정을 평가한다"},{"text":"determine how someone feels by recording their skin moisture levels","isCorrect":false,"optionType":"correct","explanation":"올바름: measure emotional state를 determine how someone feels로, subconsciously sweats를 skin moisture levels로 구체화하여 의미 유지함","translation":"피부 수분 수준을 기록하여 사람의 감정 상태를 파악한다"},{"text":"control emotional responses by regulating sweat gland activity","isCorrect":true,"optionType":"incorrect","explanation":"잘못됨: measure를 control로, tracking을 regulating으로 바꿔 관찰 행위를 조절 행위로 의미를 왜곡함","translation":"땀샘 활동을 조절하여 감정 반응을 통제한다"}],"sourceQuestion":"2번 지문"},{"keyExpression":"linear thinking will often come up short","passage":"However, when we need to deal with new information, ideas, and viewpoints, linear thinking will often come up short.","passageTranslation":"그러나 새로운 정보, 아이디어, 관점을 다루어야 할 때 선형적 사고는 종종 부족한 것으로 드러난다.","qType":"incorrect","questionText":"'linear thinking will often come up short'을(를) 잘못 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"strict logical approaches often fail to meet the demands","isCorrect":false,"optionType":"correct","explanation":"올바름: linear thinking의 함축인 strict logical approaches와 come up short의 결과인 fail to meet the demands로 표현","translation":"엄격한 논리적 접근은 종종 요구를 충족시키지 못한다"},{"text":"logical thinking always succeeds with any challenge","isCorrect":true,"optionType":"incorrect","explanation":"잘못됨: 원문의 한계(come up short)와 정반대로 논리적 사고가 항상 성공한다고 의미 역전","translation":"논리적 사고는 어떤 도전에서도 항상 성공한다"},{"text":"sequential reasoning tends to fall short of what is needed","isCorrect":false,"optionType":"correct","explanation":"올바름: linear를 sequential로, come up short의 의미를 fall short of what is needed로 재구성","translation":"순차적 추론은 필요한 것에 미치지 못하는 경향이 있다"},{"text":"sequential reasoning becomes more powerful over time","isCorrect":true,"optionType":"incorrect","ex ackling sounds at high frequencies when in distress","isCorrect":false,"optionType":"correct","explanation":"올바름: clicking noise→crackling sounds(유사 의성어), produce→create, when stressed→when in distress로 동의어 대체","translation":"식물은 고통받을 때 높은 주파수의 딸깍거리는 소리를 만들어낸다"},{"text":"stressed plants emit repetitive high-pitched noises","isCorrect":false,"optionType":"correct","explanation":"올바름: when stressed를 분사구문으로 전환, produce→emit, high-frequency→high-pitched로 유의어 대체","translation":"스트레스를 받은 식물은 반복적인 고음의 소리를 낸다"}],"sourceQuestion":"4번 지문"},{"keyExpression":"emotionally stimulated - stressed, sad, any intense emotion, really","passage":"We know that when we're emotionally stimulated - stressed, sad, any intense emotion, really - our bodies sweat a tiny bit.","passageTranslation":"우리는 감정적으로 자극받을 때 — 스트레스를 받거나, 슬프거나, 정말이지 어떤 강렬한 감정이든 — 우리 몸이 아주 조금 땀을 흘린다는 것을 알고 있다.","qType":"incorrect","questionText":"'emotionally stimulated - stressed, sad, any intense emotion, really'을(를) 잘못 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"triggered emotionally by any overwhelming mental state","isCorrect":false,"optionType":"correct","explanation":"올바름: any intense emotion을 any overwhelming mental state로 추상적으로 재구성하여 의미 유지함","translation":"압도적인 정신 상태에 의해 감정적으로 자극받는"},{"text":"aroused by powerful emotions like anxiety or grief","isCorrect":false,"optionType":"correct","explanation":"올바름: stimulated를 aroused로, intense emotion을 powerful emotions로 동의어 대체하여 의미 보존함","translation":"불안이나 슬픔 같은 강렬한 감정에 의해 자극받는"},{"text":"experiencing a strong feeling such as stress or sadness","isCorrect":false,"optionType":"correct","explanation":"올바름: emotionally stimulated를 experiencing a strong feeling으로 재표현하고 예시를 그대로 유지함","translation":"스트레스나 슬픔과 같은 강한 감정을 경험하는"},{"text":"mildly affected by only positive emotions like joy","isCorrect":true,"optionType":"incorrect","explanation":"잘못됨: intense를 mildly로, any emotion을 only positive emotions로 왜곡하여 의미를 반전시킴","translation":"기쁨 같은 긍정적인 감정에만 약하게 영향받는"},{"text":"consciously
