practice","ko":"관행"}],"antonyms":[{"en":"innovation","ko":"혁신"},{"en":"novelty","ko":"새로움"}]},{"english":"composition","korean":"구도, 구성","sentence":"Criticized for her so-called bad technique by art critics in her own time, she ignored convention and experimented with composition and focus.","sentenceKo":"자신의 시대에 미술 비평가들로부터 소위 나쁜 기법으로 비판받았지만, 그녀는 관습을 무시하고 구도와 초점으로 실험했습니다.","synonyms":[{"en":"structure","ko":"구조"},{"en":"arrangement","ko":"배열"},{"en":"makeup","ko":"구성"}],"antonyms":[]},{"english":"spiritual","korean":"영적인","sentence":"Later critics appreciated her valuing of spiritual depth over technical perfection and now consider her portraits to be among the finest expressions of the artistic possibilities of the medium.","sentenceKo":"후대의 비평가들은 기술적 완벽함보다 영적 깊이를 중시하는 그녀의 태도를 높이 평가했고, 이제 그녀의 초상화를 매체의 예술적 가능성의 가장 훌륭한 표현 중 하나로 여깁니다.","synonyms":[{"en":"religious","ko":"종교적인"},{"en":"sacred","ko":"신성한"},{"en":"divine","ko":"신적인"}],"antonyms":[{"en":"secular","ko":"세속적인"},{"en":"material","ko":"물질적인"}]},{"english":"refreshing","korean":"상쾌한","sentence":"This smart app helps you have a refreshing sleep!","sentenceKo":"이 스마트 앱은 당신이 상쾌한 수면을 취하도록 도와줍니다!","synonyms":[{"en":"invigorating","ko":"활력주는"},{"en":"reviving","ko":"상쾌한"},{"en":"stimulating","ko":"자극적인"}],"antonyms":[{"en":"tiring","ko":"피곤한"},{"en":"draining","ko":"소진시키는"}]},{"english":"millennia","korean":"수천 년","sentence":"The dependence on certainty all those millennia ago ensured our survival to the present day, and the danger-alert system continues to protect us.","sentenceKo":"수천 년 전 확실성에 대한 의존은 현재까지 우리의 생존을 보장했고, 위험 경보 시스템은 계속해서 우리를 보호합니다.","synonyms":[{"en":"thousands of years","ko":"수천년"},{"en":"ages","ko":"시대들"},{"en":"eons","ko":"영겁"}],"antonyms":[]},{"english":"vague","korean":"모호한","sentence":"This is achieved by our brains labeling new, vague, or unpredictable everyday events and experiences as uncertain.","sentenceKo":"이것은 우리의 뇌가 새롭고, 모호하거나, 예측할 수 없는 일상적인 사건과 경험을 불확실한 것으로 분류함으로써 달성됩니다.","synonyms":[{"en":"unclear","ko":"불명확한"},{"en":"ambiguous","ko":"애매한"},{"en":"indefinite","ko":"불확정한"}],"antonyms":[{"en":"clear","ko":"명확한"},{"en":"precise","ko":"정확한"}]},{"english":"unpredictable","korean":"예측할 수 없는","sentence":"This is achieved by our brains labeling new, vague, or unpredictable everyday events and experiences as uncertain.","sentenceKo":"이것은 우리의 뇌가 새롭고, 모호하거나, 예측할 수 없는 일상적인 사건과 경험을 불확실한 것으로 분류함으로써 달성됩니다.","synonyms":[{"en":"uncertain","ko":"불확실한"},{"en":"erratic","ko":"변덕스러운"},{"en":"random","ko":"무작위의"}],"antonyms":[{"en":"predictable","ko":"예측가능한"},{"en":"reliable","ko":"신뢰할수있는"}]},{"english":"detect","korean":"감지하다","sentence":"Robert Blattberg and Steven Hoch noted that, in a changing environment, it is not clear that consistency is always a virtue and that one of the advantages of human judgment is the ability to detect change.","sentenceKo":"Robert Blattberg와 Steven Hoch는 변화하는 환경에서 일관성이 항상 미덕인지는 명확하지 않으며, 인간 판단의 장점 중 하나는 변화를 감지하는 능력이라고 언급했습니다.","synonyms":[{"en":"discover","ko":"발견하다"},{"en":"identify","ko":"식별하다"},{"en":"perceive","ko":"감지하다"}],"antonyms":[{"en":"miss","ko":"놓치다"},{"en":"overlook","ko":"간과하다"}]},{"english":"composite","korean":"복합적인, 합성의","sentence":"Blattberg and Hoch examined this possibility by having supermarket managers forecast demand for certain products and then creating a composite forecast by averaging these judgments with the forecasts of statistical models based on past data.","sentenceKo":"Blattberg와 Hoch는 슈퍼마켓 관리자들에게 특정 제품에 대한 수요를 예측하게 한 다음, 이러한 판단을 과거 데이터를 기반으로 한 통계 모델의 예측과 평균화하여 복합 예측을 만들어냄으로써 이 가능성을 조사했습니다.","synonyms":[{"en":"compound","ko":"복합의"},{"en":"combined","ko":"결합된"},{"en":"mixed","ko":"혼합된"}],"antonyms":[{"en":"simple","ko":"단순한"},{"en":"pure","ko":"순수한"}]},{"english":"novel","korean":"새로운, 참신한","sentence":"The logic was that statistical models deny stable conditions and therefore cannot account for the effects on demand of novel events such as actions taken by competitors or the introduction of new products.","sentenceKo":"논리는 통계 모델이 안정적인 조건을 부정하므로 경쟁자가 취한 행동이나 새로운 제품의 도입과 같은 새로운 사건의 수요에 대한 영향을 설명할 수 없다는 것이었습니다.","synonyms":[{"en":"new","ko":"새로운"},{"en":"original","ko":"독창적인"},{"en":"innovative","ko":"혁신적인"}],"antonyms":[{"en":"conventional","ko":"전통적인"},{"en":"old","ko":"낡은"}]},{"english":"incorporate","korean":"통합하다, 포함시키다","sentence":"Humans, however, can incorporate these novel factors in their judgments.","sentenceKo":"그러나 인간은 그들의 판단에 이러한 새로운 요인들을 통합할 수 있습니다.","synonyms":[{"en":"include","ko":"포함하다"},{"en":"integrate","ko":"통합하다"},{"en":"combine","ko":"결합하다"}],"antonyms":[{"en":"exclude","ko":"제외하다"},{"en":"separate","ko":"분리하다"}]},{"english":"helpless","korean":"무기력한","sentence":"Free play is nature's means of teaching children that they are not helpless.","sentenceKo":"자유 놀이는 아이들에게 그들이 무기력하지 않다는 것을 가르치는 자연의 수단입니다.","synonyms":[{"en":"powerless","ko":"무력한"},{"en":"defenseless","ko":"무방비한"},{"en":"vulnerable","ko":"취약한"}],"antonyms":[{"en":"powerful","ko":"강력한"},{"en":"capable","ko":"유능한"}]},{"english":"assert","korean":"주장하다, 단언하다","sentence":"In play, away from adults, children really do have control and can practice asserting it.","sentenceKo":"놀이에서, 성인들로부터 떨어져서, 아이들은 정말로 통제력을 가지고 있으며 그것을 주장하는 것을 연습할 수 있습니다.","synonyms":[{"en":"declare","ko":"선언하다"},{"en":"state","ko":"진술하다"},{"en":"affirm","ko":"단언하다"}],"antonyms":[{"en":"deny","ko":"부인하다"},{"en":"refute","ko":"반박하다"}]},{"english":"obedient","korean":"순종적인","sentence":"In free play, children learn to make their own decisions, solve their own problems, create and follow rules, and get along with others as equals rather than as obedient or rebellious subordinates.","sentenceKo":"자유 놀이에서 아이들은 자신의 결정을 내리고, 자신의 문제를 해결하고, 규칙을 만들고 따르며, 순종적이거나 반항적인 부하가 아닌 동등한 존재로서 다른 사람들과 잘 지내는 법을 배웁니다.","synonyms":[{"en":"compliant","ko":"순종하는"},{"en":"submissive","ko":"복종하는"},{"en":"dutiful","ko":"의무를다하는"}],"antonyms":[{"en":"disobedient","ko":"불순종하는"},{"en":"rebellious","ko":"반항적인"}]},{"english":"rebellious","korean":"반항적인","sentence":"In free play, children learn to make their own decisions, solve their own problems, create and follow rules, and get along with others as equals rather than as obedient or rebellious subordinates.","sentenceKo":"자유 놀이에서 아이들은 자신의 결정을 내리고, 자신의 문제를 해결하고, 규칙을 만들고 따르며, 순종적이거나 반항적인 부하가 아닌 동등한 존재로서 다른 사람들과 잘 지내는 법을 배웁니다.","synonyms":[{"en":"defiant","ko":"반항하는"},{"en":"disobedient","ko":"불순종하는"},{"en":"insubordinate","ko":"복종하지않는"}],"antonyms":[{"en":"obedient","ko":"순종하는"},{"en":"compliant","ko":"순응하는"}]},{"english":"subordinate","korean":"부하, 하급자","sentence":"In free play, children learn to make their own decisions, solve their own problems, create and follow rules, and get along with others as equals rather than as obedient or rebellious subordinates.","sentenceKo":"자유 놀이에서 아이들은 자신의 결정을 내리고, 자신의 문제를 해결하고, 규칙을 만들고 따르며, 순종적이거나 반항적인 부하가 아닌 동등한 존재로서 다른 사람들과 잘 지내는 법을 배웁니다.","synonyms":[{"en":"inferior","ko":"하급의"},{"en":"lower","ko":"낮은"},{"en":"secondary","ko":"이차적인"}],"antonyms":[{"en":"superior","ko":"상급의"},{"en":"dominant","ko":"지배적인"}]},{"english":"deliberately","korean":"고의로, 의도적으로","sentence":"In active outdoor play, children deliberately dose themselves with moderate amounts of fear and they thereby learn how to control not only their bodies, but also their fear.","sentenceKo":"활동적인 야외 놀이에서 아이들은 의도적으로 적당한 양의 두려움을 스스로에게 투여하고, 그렇게 함으로써 그들의 몸뿐만 아니라 두려움도 통제하는 법을 배웁니다.","synonyms":[{"en":"intentionally","ko":"의도적으로"},{"en":"purposely","ko":"고의로"},{"en":"consciously","ko":"의식적으로"}],"antonyms":[{"en":"accidentally","ko":"우연히"},{"en":"unintentionally","ko":"무의식적으로"}]},{"english":"dose","korean":"투여하다, 복용시키다","sentence":"In active outdoor play, children deliberately dose themselves with moderate amounts of fear and they thereby learn how to control not only their bodies, but also their fear.","sentenceKo":"활동적인 야외 놀이에서 아이들은 의도적으로 적당한 양의 두려움을 스스로에게 투여하고, 그렇게 함으로써 그들의 몸뿐만 아니라 두려움도 통제하는 법을 배웁니다.","synonyms":[{"en":"amount","ko":"양"},{"en":"quantity","ko":"분량"},{"en":"portion","ko":"부분"}],"antonyms":[]},{"english":"moderate","korean":"적당한, 온건한","sentence":"In active outdoor play, children deliberately dose themselves with moderate amounts of fear and they thereby learn how to control not only their bodies, but also their fear.","sentenceKo":"활동적인 야외 놀이에서 아이들은 의도적으로 적당한 양의 두려움을 스스로에게 투여하고, 그렇게 함으로써 그들의 몸뿐만 아니라 두려움도 통제하는 법을 배웁니다.","synonyms":[{"en":"reasonable","ko":"합리적인"},{"en":"temperate","ko":"절제하는"},{"en":"balanced","ko":"균형잡힌"}],"antonyms":[{"en":"extreme","ko":"극단적인"},{"en":"excessive","ko":"과도한"}]},{"english":"verbal","korean":"언어의","sentence":"None of these lessons can be taught through verbal means; they can be learned only through experience, which free play provides.","sentenceKo":"이러한 교훈들 중 어느 것도 언어적 수단을 통해 가르쳐질 수 없습니다; 그것들은 자유 놀이가 제공하는 경험을 통해서만 배울 수 있습니다.","synonyms":[{"en":"oral","ko":"구두의"},{"en":"spoken","ko":"말로한"},{"en":"linguistic","ko":"언어적인"}],"antonyms":[{"en":"nonverbal","ko":"비언어적인"},{"en":"written","ko":"서면의"}]},{"english":"boost","korean":"증진시키다, 높이다","sentence":"To boost reported revenue, some sites began exchanging ad space.","sentenceKo":"보고된 수익을 증진시키기 위해 일부 사이트는 광고 공간을 교환하기 시작했습니다.","synonyms":[{"en":"increase","ko":"증가시키다"},{"en":"enhance","ko":"향상시키다"},{"en":"elevate","ko":"높이다"}],"antonyms":[{"en":"decrease","ko":"감소시키다"},{"en":"reduce","ko":"줄이다"}]},{"english":"revenue","korean":"수익, 수입","sentence":"To boost reported revenue, some sites began exchanging ad space.","sentenceKo":"보고된 수익을 증진시키기 위해 일부 사이트는 광고 공간을 교환하기 시작했습니다.","synonyms":[{"en":"income","ko":"수입"},{"en":"earnings","ko":"수익"},{"en":"proceeds","ko":"수익금"}],"antonyms":[{"en":"expense","ko":"비용"},{"en":"loss","ko":"손실"}]},{"english":"inflow","korean":"유입","sentence":"This practice did little to boost net income and resulted in no additional cash inflow — but it did boost reported revenue.","sentenceKo":"이 관행은 순이익을 증진시키는 데 거의 기여하지 못했고 추가적인 현금 유입을 초래하지 않았지만, 보고된 수익은 증진시켰습니다.","synonyms":[{"en":"influx","ko":"유입"},{"en":"intake","ko":"흡입"},{"en":"entry","ko":"진입"}],"antonyms":[{"en":"outflow","ko":"유출"},{"en":"exit","ko":"배출"}]},{"english":"criterion","korean":"기준","sentence":"This practice was quickly put to an end because accountants felt that it did not meet the criteria of the revenue recognition principle.","sentenceKo":"이 관행은 회계사들이 그것이 수익 인식 원칙의 기준을 충족하지 못한다고 느꼈기 때문에 빠르게 중단되었습니다.","synonyms":[{"en":"standard","ko":"기준"},{"en":"measure","ko":"척도"},{"en":"benchmark","ko":"기준점"}],"antonyms":[]},{"english":"amplify","korean":"증폭시키다","sentence":"Scholars of myth have long argued that myth gives structure and meaning to human life; that meaning is amplified when a myth evolves into a world.","sentenceKo":"신화 학자들은 오랫동안 신화가 인간의 삶에 구조와 의미를 준다고 주장해왔습니다; 그 의미는 신화가 세계로 진화할 때 증폭됩니다.","synonyms":[{"en":"intensify","ko":"강화하다"},{"en":"magnify","ko":"확대하다"},{"en":"increase","ko":"증가시키다"}],"antonyms":[{"en":"reduce","ko":"줄이다"},{"en":"diminish","ko":"감소시키다"}]},{"english":"fulfill","korean":"충족시키다","sentence":"A virtual world's ability to fulfill needs grows when lots and lots of people believe in the world.","sentenceKo":"가상 세계의 욕구를 충족시키는 능력은 매우 많은 사람들이 그 세계를 믿을 때 성장합니다.","synonyms":[{"en":"accomplish","ko":"달성하다"},{"en":"achieve","ko":"이루다"},{"en":"complete","ko":"완수하다"}],"antonyms":[{"en":"fail","ko":"실패하다"},{"en":"neglect","ko":"소홀히하다"}]},{"english":"sustain","korean":"유지하다","sentence":"Conversely, a virtual world cannot be long sustained by a mere handful of adherents.","sentenceKo":"반대로, 가상 세계는 단지 소수의 추종자들에 의해 오래 유지될 수 없습니다.","synonyms":[{"en":"maintain","ko":"유지하다"},{"en":"support","ko":"지지하다"},{"en":"uphold","ko":"지탱하다"}],"antonyms":[{"en":"abandon","ko":"포기하다"},{"en":"discontinue","ko":"중단하다"}]},{"english":"adherent","korean":"추종자, 지지자","sentence":"Conversely, a virtual world cannot be long sustained by a mere handful of adherents.","sentenceKo":"반대로, 가상 세계는 단지 소수의 추종자들에 의해 오래 유지될 수 없습니다.","synonyms":[{"en":"follower","ko":"추종자"},{"en":"supporter","ko":"지지자"},{"en":"advocate","ko":"옹호자"}],"antonyms":[{"en":"opponent","ko":"반대자"},{"en":"critic","ko":"비평가"}]},{"english":"immersive","korean":"몰입적인","sentence":"My game might be a great game, one that is completely immersive, one that consumes all of my group's time and attention.","sentenceKo":"내 게임은 완전히 몰입적이고, 우리 그룹의 모든 시간과 주의를 소비하는 훌륭한 게임일 수 있습니다.","synonyms":[{"en":"engaging","ko":"몰입시키는"},{"en":"absorbing","ko":"흡수하는"},{"en":"enveloping","ko":"감싸는"}],"antonyms":[{"en":"superficial","ko":"피상적인"},{"en":"detached","ko":"분리된"}]},{"english":"threshold","korean":"문턱, 한계점","sentence":"For a virtual world to provide lasting, wide-ranging value, its participants must be a large enough group to be considered a society.","sentenceKo":"가상 세계가 지속적이고 광범위한 가치를 제공하기 위해서는 그 참가자들이 사회로 간주될 만큼 충분히 큰 그룹이어야 합니다.","synonyms":[{"en":"boundary","ko":"경계"},{"en":"limit","ko":"한계"},{"en":"border","ko":"경계선"}],"antonyms":[]},{"english":"salinity","korean":"염도","sentence":"It may seem obvious when conditions are 'extreme': the midday heat of a desert, the cold of an Antarctic winter, the salinity of the Great Salt Lake.","sentenceKo":"조건이 '극단적'인 때는 명백해 보일 수 있습니다: 사막의 한낮 더위, 남극 겨울의 추위, 대염호의 염도.","synonyms":[{"en":"saltiness","ko":"염도"},{"en":"salt content","ko":"염분함량"}],"antonyms":[]},{"english":"physiological","korean":"생리학적인","sentence":"But this only means that these conditions are extreme for us, given our particular physiological characteristics and tolerances.","sentenceKo":"하지만 이것은 우리의 특정한 생리학적 특성과 내성을 고려할 때, 이러한 조건들이 우리에게 극단적이라는 것을 의미할 뿐입니다.","synonyms":[{"en":"biological","ko":"생물학적"},{"en":"physical","ko":"신체적"},{"en":"organic","ko":"유기적"}],"antonyms":[{"en":"psychological","ko":"심리적"},{"en":"mental","ko":"정신적"}]},{"english":"tolerance","korean":"내성, 관용","sentence":"But this only means that these conditions are extreme for us, given our particular physiological characteristics and tolerances.","sentenceKo":"하지만 이것은 우리의 특정한 생리학적 특성과 내성을 고려할 때, 이러한 조건들이 우리에게 극단적이라는 것을 의미할 뿐입니다.","synonyms":[{"en":"endurance","ko":"인내력"},{"en":"resistance","ko":"저항력"},{"en":"acceptance","ko":"수용"}],"antonyms":[{"en":"intolerance","ko":"불관용"},{"en":"rejection","ko":"거부"}]},{"english":"ecologist","korean":"생태학자","sentence":"Rather, the ecologist should try to gain a worm's-eye or plant's-eye view of the environment: to see the world as others see it.","sentenceKo":"오히려, 생태학자는 환경에 대한 벌레의 눈 또는 식물의 눈으로 보는 관점을 얻으려고 노력해야 합니다: 다른 존재들이 보는 대로 세계를 보는 것입니다.","synonyms":[{"en":"environmentalist","ko":"환경학자"},{"en":"naturalist","ko":"자연주의자"},{"en":"biologist","ko":"생물학자"}],"antonyms":[]},{"english":"emotive","korean":"감정적인","sentence":"Emotive words like harsh and benign, even relativities such as hot and cold, should be used by ecologists only with care.","sentenceKo":"가혹한과 온화한 같은 감정적인 단어들, 심지어 뜨겁고 차갑다는 것과 같은 상대성은 생태학자들에 의해 오직 주의해서 사용되어야 합니다.","synonyms":[{"en":"emotional","ko":"감정적인"},{"en":"passionate","ko":"열정적인"},{"en":"moving","ko":"감동적인"}],"antonyms":[{"en":"unemotional","ko":"감정없는"},{"en":"rational","ko":"이성적인"}]},{"english":"rational","korean":"합리적인","sentence":"A process is rational if it always does the right thing based on the current information, given an ideal performance measure.","sentenceKo":"프로세스는 이상적인 성과 측정 기준이 주어졌을 때, 항상 현재 정보를 바탕으로 올바른 일을 한다면 합리적입니다.","synonyms":[{"en":"logical","ko":"논리적인"},{"en":"reasonable","ko":"합리적인"},{"en":"sensible","ko":"분별있는"}],"antonyms":[{"en":"irrational","ko":"비이성적인"},{"en":"illogical","ko":"비논리적인"}]},{"english":"instinct","korean":"본능","sentence":"Human processes involve instinct, intuition, and other variables that don't necessarily reflect the book and may not even consider the existing data.","sentenceKo":"인간 프로세스는 본능, 직관 및 반드시 책을 반영하지 않고 기존 데이터를 고려하지 않을 수도 있는 다른 변수들을 포함합니다.","synonyms":[{"en":"intuition","ko":"직관"},{"en":"impulse","ko":"충동"},{"en":"innate behavior","ko":"본능적행동"}],"antonyms":[{"en":"reason","ko":"이성"},{"en":"logic","ko":"논리"}]},{"english":"intuition","korean":"직관","sentence":"Human processes involve instinct, intuition, and other variables that don't necessarily reflect the book and may not even consider the existing data.","sentenceKo":"인간 프로세스는 본능, 직관 및 반드시 책을 반영하지 않고 기존 데이터를 고려하지 않을 수도 있는 다른 변수들을 포함합니다.","synonyms":[{"en":"instinct","ko":"본능"},{"en":"insight","ko":"통찰"},{"en":"perception","ko":"지각"}],"antonyms":[{"en":"logic","ko":"논리"},{"en":"reasoning","ko":"추론"}]},{"english":"precisely","korean":"정확하게","sentence":"However, traffic isn't rational; if you follow the laws precisely, you end up stuck somewhere because other drivers aren't following the laws precisely.","sentenceKo":"그러나 교통은 합리적이지 않습니다; 만약 당신이 법을 정확하게 따른다면, 다른 운전자들이 법을 정확하게 따르지 않기 때문에 당신은 어딘가에 갇히게 됩니다.","synonyms":[{"en":"exactly","ko":"정확히"},{"en":"accurately","ko":"정밀하게"},{"en":"specifically","ko":"구체적으로"}],"antonyms":[{"en":"roughly","ko":"대략"},{"en":"approximately","ko":"대략"}]},{"english":"continuum","korean":"연속체","sentence":"Like positive habits, bad habits exist on a continuum of easy-to-change and hard-to-change.","sentenceKo":"긍정적인 습관처럼, 나쁜 습관은 바꾸기 쉬운 것과 바꾸기 어려운 것의 연속체 상에 존재합니다.","synonyms":[{"en":"spectrum","ko":"스펙트럼"},{"en":"range","ko":"범위"},{"en":"scale","ko":"척도"}],"antonyms":[]},{"english":"frame","korean":"틀을 짓다, 구성하다","sentence":"But this kind of language (and the approaches it spawns) frames these challenges in a way that isn't helpful or effective.","sentenceKo":"하지만 이런 종류의 언어(그리고 그것이 만들어내는 접근법들)는 이러한 도전들을 유용하거나 효과적이지 않은 방식으로 틀을 짓습니다.","synonyms":[{"en":"structure","ko":"구조"},{"en":"framework","ko":"틀"},{"en":"construct","ko":"구성하다"}],"antonyms":[]},{"english":"spawn","korean":"만들어내다, 낳다","sentence":"But this kind of language (and the approaches it spawns) frames these challenges in a way that isn't helpful or effective.","sentenceKo":"하지만 이런 종류의 언어(그리고 그것이 만들어내는 접근법들)은 이러한 도전들을 유용하거나 효과적이지 않은 방식으로 틀을 짓습니다.","synonyms":[{"en":"generate","ko":"생성하다"},{"en":"produce","ko":"생산하다"},{"en":"create","ko":"창조하다"}],"antonyms":[{"en":"destroy","ko":"파괴하다"},{"en":"eliminate","ko":"제거하다"}]},{"english":"misguide","korean":"잘못 인도하다","sentence":"This language misguides people.","sentenceKo":"이 언어는 사람들을 잘못 인도합니다.","synonyms":[{"en":"mislead","ko":"오도하다"},{"en":"misdirect","ko":"잘못인도하다"},{"en":"deceive","ko":"속이다"}],"antonyms":[{"en":"guide","ko":"안내하다"},{"en":"direct","ko":"지도하다"}]},{"english":"imply","korean":"암시하다, 함축하다","sentence":"This word implies that if you input a lot of force in one moment, the habit will be gone.","sentenceKo":"이 단어는 만약 당신이 한 순간에 많은 힘을 투입하면, 습관이 사라질 것이라고 암시합니다.","synonyms":[{"en":"suggest","ko":"암시하다"},{"en":"indicate","ko":"나타내다"},{"en":"hint","ko":"암시하다"}],"antonyms":[{"en":"state","ko":"명시하다"},{"en":"declare","ko":"선언하다"}]},{"english":"spectrum","korean":"범위, 스펙트럼","sentence":"When you get toward the \"hard\" end of the spectrum, note the language you hear — breaking bad habits and battling addiction.","sentenceKo":"당신이 범위의 \"어려운\" 끝으로 갈 때, 당신이 듣는 언어에 주목하세요 — 나쁜 습관을 깨고 중독과 싸우기.","synonyms":[{"en":"range","ko":"범위"},{"en":"scale","ko":"척도"},{"en":"continuum","ko":"연속체"}],"antonyms":[]},{"english":"nefarious","korean":"사악한, 극악무도한","sentence":"It's as if an unwanted behavior is a nefarious villain to be aggressively defeated.","sentenceKo":"마치 원치 않는 행동이 공격적으로 패배시켜야 할 사악한 악당인 것처럼 보입니다.","synonyms":[{"en":"wicked","ko":"사악한"},{"en":"evil","ko":"악한"},{"en":"villainous","ko":"악당같은"}],"antonyms":[{"en":"virtuous","ko":"고결한"},{"en":"righteous","ko":"올바른"}]},{"english":"aggressively","korean":"공격적으로","sentence":"It's as if an unwanted behavior is a nefarious villain to be aggressively defeated.","sentenceKo":"마치 원치 않는 행동이 공격적으로 패배시켜야 할 사악한 악당인 것처럼 보입니다.","synonyms":[{"en":"forcefully","ko":"강력하게"},{"en":"vigorously","ko":"격렬하게"},{"en":"intensely","ko":"강렬하게"}],"antonyms":[{"en":"passively","ko":"수동적으로"},{"en":"gently","ko":"부드럽게"}]},{"english":"assumption","korean":"가정","sentence":"A common but incorrect assumption is that we are creatures of reason when, in fact, we are creatures of both reason and emotion.","sentenceKo":"흔하지만 잘못된 가정은 우리가 이성의 존재라는 것인데, 사실 우리는 이성과 감정 모두의 존재입니다.","synonyms":[{"en":"presumption","ko":"추정"},{"en":"supposition","ko":"가정"},{"en":"premise","ko":"전제"}],"antonyms":[{"en":"fact","ko":"사실"},{"en":"certainty","ko":"확실성"}]},{"english":"wholegrain","korean":"통곡물","sentence":"Should I get a wholegrain cereal or a chocolate cereal?","sentenceKo":"통곡물 시리얼을 사야 할까요, 아니면 초콜릿 시리얼을 사야 할까요?","synonyms":[{"en":"whole wheat","ko":"통밀"},{"en":"unrefined grain","ko":"정제안한곡물"}],"antonyms":[{"en":"refined","ko":"정제된"},{"en":"processed","ko":"가공된"}]},{"english":"discharge","korean":"방전하다","sentence":"When the signal is discharged the electric organ will be negatively loaded compared to the head and an electric field is created around the fish.","sentenceKo":"신호가 방전될 때 전기 기관은 머리에 비해 음으로 하전되고 물고기 주위에 전기장이 생성됩니다.","synonyms":[{"en":"release","ko":"방출하다"},{"en":"emit","ko":"배출하다"},{"en":"expel","ko":"배출하다"}],"antonyms":[{"en":"absorb","ko":"흡수하다"},{"en":"retain","ko":"보유하다"}]},{"english":"contract","korean":"수축하다","sentence":"A weak electric current is created also in ordinary muscle cells when they contract.","sentenceKo":"약한 전류는 일반 근육 세포가 수축할 때도 생성됩니다.","synonyms":[{"en":"shrink","ko":"수축하다"},{"en":"compress","ko":"압축하다"},{"en":"constrict","ko":"수축시키다"}],"antonyms":[{"en":"expand","ko":"팽창하다"},{"en":"extend","ko":"확장하다"}]},{"english":"frequency","korean":"빈도, 주파수","sentence":"The fish varies the signals by changing the form of the electric field or the frequency of discharging.","sentenceKo":"물고기는 전기장의 형태나 방전 빈도를 바꿈으로써 신호를 다양하게 합니다.","synonyms":[{"en":"rate","ko":"비율"},{"en":"occurrence","ko":"발생빈도"},{"en":"regularity","ko":"규칙성"}],"antonyms":[]},{"english":"interference","korean":"간섭","sentence":"If many fish send out signals at the same time, the short range decreases the risk of interference.","sentenceKo":"만약 많은 물고기가 동시에 신호를 보낸다면, 짧은 범위는 간섭의 위험을 감소시킵니다.","synonyms":[{"en":"disruption","ko":"방해"},{"en":"obstruction","ko":"장애"},{"en":"intrusion","ko":"침해"}],"antonyms":[{"en":"cooperation","ko":"협력"},{"en":"assistance","ko":"지원"}]},{"english":"drastically","korean":"대폭, 극적으로","sentence":"For others, whose creativity is more focused on methods and technique, creativity may lead to solutions that drastically reduce the work necessary to solve a problem.","sentenceKo":"다른 사람들의 경우, 창의성이 방법과 기술에 더 집중되어 있다면, 창의성은 문제를 해결하는 데 필요한 작업을 대폭 줄이는 해결책으로 이어질 수 있습니다.","synonyms":[{"en":"dramatically","ko":"극적으로"},{"en":"severely","ko":"심각하게"},{"en":"radically","ko":"근본적으로"}],"antonyms":[{"en":"slightly","ko":"약간"},{"en":"minimally","ko":"최소한으로"}]},{"english":"speciation","korean":"종분화","sentence":"Charles Darwin's approach to the speciation problem is a good example of this; he chose a very difficult and tangled problem, speciation, which led him into a long period of data collection and deliberation.","sentenceKo":"Charles Darwin의 종분화 문제에 대한 접근법은 이것의 좋은 예입니다; 그는 매우 어렵고 복잡한 문제인 종분화를 선택했고, 이것은 그를 오랜 기간의 데이터 수집과 숙고로 이끌었습니다.","synonyms":[{"en":"species formation","ko":"종형성"},{"en":"diversification","ko":"다양화"}],"antonyms":[]},{"english":"tangled","korean":"복잡한, 얽힌","sentence":"Charles Darwin's approach to the speciation problem is a good example of this; he chose a very difficult and tangled problem, speciation, which led him into a long period of data collection and deliberation.","sentenceKo":"Charles Darwin의 종분화 문제에 대한 접근법은 이것의 좋은 예입니다; 그는 매우 어렵고 복잡한 문제인 종분화를 선택했고, 이것은 그를 오랜 기간의 데이터 수집과 숙고로 이끌었습니다.","synonyms":[{"en":"entangled","ko":"얽힌"},{"en":"knotted","ko":"매듭진"},{"en":"complicated","ko":"복잡한"}],"antonyms":[{"en":"untangled","ko":"풀린"},{"en":"simple","ko":"단순한"}]},{"english":"deliberation","korean":"숙고","sentence":"Charles Darwin's approach to the speciation problem is a good example of this; he chose a very difficult and tangled problem, speciation, which led him into a long period of data collection and deliberation.","sentenceKo":"Charles Darwin의 종분화 문제에 대한 접근법은 이것의 좋은 예입니다; 그는 매우 어렵고 복잡한 문제인 종분화를 선택했고, 이것은 그를 오랜 기간의 데이터 수집과 숙고로 이끌었습니다.","synonyms":[{"en":"consideration","ko":"고려"},{"en":"reflection","ko":"숙고"},{"en":"contemplation","ko":"심사숙고"}],"antonyms":[{"en":"impulse","ko":"충동"},{"en":"haste","ko":"성급함"}]},{"english":"amplify","korean":"증폭시키다","sentence":"We can see an example in the development of the polymerase chain reaction (PCR) which enables us to amplify small pieces of DNA in a short time.","sentenceKo":"우리는 짧은 시간 안에 DNA의 작은 조각들을 증폭시킬 수 있게 해주는 중합효소 연쇄반응(PCR)의 개발에서 예를 볼 수 있습니다.","synonyms":[{"en":"intensify","ko":"강화하다"},{"en":"magnify","ko":"확대하다"},{"en":"increase","ko":"증가시키다"}],"antonyms":[{"en":"reduce","ko":"줄이다"},{"en":"diminish","ko":"감소시키다"}]},{"english":"substitute","korean":"대체하다","sentence":"This type of creativity might reduce the number of steps or substitute steps that are less likely to fail, thus increasing productivity.","sentenceKo":"이런 유형의 창의성은 단계의 수를 줄이거나 실패할 가능성이 적은 단계로 대체하여, 따라서 생산성을 증가시킬 수 있습니다.","synonyms":[{"en":"replacement","ko":"대체물"},{"en":"alternative","ko":"대안"},{"en":"proxy","ko":"대리"}],"antonyms":[{"en":"original","ko":"원본"},{"en":"primary","ko":"주요한"}]},{"english":"dimension","korean":"차원","sentence":"Scientists propose that this occurs because, although we experience three dimensions, only two had a strong influence on our evolution: the vertical dimension as defined by gravity and, in mobile species, the front/back dimension as defined by the positioning of sensory and feeding mechanisms.","sentenceKo":"과학자들은 이것이 발생하는 이유는 우리가 세 개의 차원을 경험하지만, 오직 두 개만이 우리의 진화에 강한 영향을 미쳤기 때문이라고 제안합니다: 중력에 의해 정의되는 수직 차원과, 이동 가능한 종에서 감각 및 섭식 메커니즘의 위치에 의해 정의되는 앞/뒤 차원.","synonyms":[{"en":"aspect","ko":"측면"},{"en":"extent","ko":"범위"},{"en":"scope","ko":"영역"}],"antonyms":[]},{"english":"vertical","korean":"수직의","sentence":"Scientists propose that this occurs because, although we experience three dimensions, only two had a strong influence on our evolution: the vertical dimension as defined by gravity and, in mobile species, the front/back dimension as defined by the positioning of sensory and feeding mechanisms.","sentenceKo":"과학자들은 이것이 발생하는 이유는 우리가 세 개의 차원을 경험하지만, 오직 두 개만이 우리의 진화에 강한 영향을 미쳤기 때문이라고 제안합니다: 중력에 의해 정의되는 수직 차원과, 이동 가능한 종에서 감각 및 섭식 메커니즘의 위치에 의해 정의되는 앞/뒤 차원.","synonyms":[{"en":"upright","ko":"수직의"},{"en":"perpendicular","ko":"직각의"},{"en":"standing","ko":"서있는"}],"antonyms":[{"en":"horizontal","ko":"수평의"},{"en":"flat","ko":"평평한"}]},{"english":"horizontal","korean":"수평의","sentence":"These influence our perception of vertical versus horizontal, far versus close, and the search for dangers from above (such as an eagle) or below (such as a snake).","sentenceKo":"이것들은 수직 대 수평, 먼 것 대 가까운 것에 대한 우리의 인식과, 위(독수리와 같은)나 아래(뱀과 같은)로부터의 위험에 대한 탐색에 영향을 미칩니다.","synonyms":[{"en":"flat","ko":"수평의"},{"en":"level","ko":"수평인"},{"en":"lateral","ko":"측면의"}],"antonyms":[{"en":"vertical","ko":"수직의"},{"en":"upright","ko":"똑바로선"}]},{"english":"axis","korean":"축","sentence":"However, the left-right axis is not as relevant in nature.","sentenceKo":"그러나 좌-우 축은 자연에서 그다지 관련이 없습니다.","synonyms":[{"en":"line","ko":"선"},{"en":"center line","ko":"중심선"},{"en":"pivot","ko":"중심축"}],"antonyms":[]},{"english":"invert","korean":"뒤집다, 거꾸로 하다","sentence":"In fact, when observing a scene containing plants, animals, and man-made objects such as cars or street signs, we can only tell when left and right have been inverted if we observe those artificial items.","sentenceKo":"사실, 식물, 동물, 그리고 자동차나 거리 표지판 같은 인공물을 포함하는 장면을 관찰할 때, 우리는 그러한 인공 항목들을 관찰할 때만 좌우가 뒤집혔는지 알 수 있습니다.","synonyms":[{"en":"reverse","ko":"뒤집다"},{"en":"flip","ko":"뒤집다"},{"en":"transpose","ko":"전치하다"}],"antonyms":[{"en":"maintain","ko":"유지하다"},{"en":"uphold","ko":"세우다"}]},{"english":"spatial","korean":"공간의","sentence":"Having affected the evolution of our spatial perception, vertical and front/back dimensions are easily perceived, but the left-right axis, which is not significant in nature, doesn't come instantly to us.","sentenceKo":"우리의 공간 인식의 진화에 영향을 미쳤기 때문에, 수직 및 앞/뒤 차원은 쉽게 인식되지만, 자연에서 중요하지 않은 좌-우 축은 우리에게 즉각적으로 오지 않습니다.","synonyms":[{"en":"physical","ko":"물리적"},{"en":"dimensional","ko":"차원의"},{"en":"geographic","ko":"지리적"}],"antonyms":[{"en":"temporal","ko":"시간적"},{"en":"nonspatial","ko":"비공간적"}]},{"english":"perception","korean":"인식","sentence":"Having affected the evolution of our spatial perception, vertical and front/back dimensions are easily perceived, but the left-right axis, which is not significant in nature, doesn't come instantly to us.","sentenceKo":"우리의 공간 인식의 진화에 영향을 미쳤기 때문에, 수직 및 앞/뒤 차원은 쉽게 인식되지만, 자연에서 중요하지 않은 좌-우 축은 우리에게 즉각적으로 오지 않습니다.","synonyms":[{"en":"awareness","ko":"인식"},{"en":"understanding","ko":"이해"},{"en":"conception","ko":"개념"}],"antonyms":[{"en":"misperception","ko":"오인"},{"en":"ignorance","ko":"무지"}]},{"english":"maturity","korean":"성숙","sentence":"They have varying levels of maturity and sensitivity.","sentenceKo":"그들은 다양한 수준의 성숙과 민감성을 가지고 있습니다.","synonyms":[{"en":"adulthood","ko":"성인기"},{"en":"ripeness","ko":"성숙함"},{"en":"development","ko":"발달"}],"antonyms":[{"en":"immaturity","ko":"미숙함"},{"en":"childishness","ko":"유치함"}]},{"english":"sensitivity","korean":"민감성","sentence":"They have varying levels of maturity and sensitivity.","sentenceKo":"그들은 다양한 수준의 성숙과 민감성을 가지고 있습니다.","synonyms":[{"en":"awareness","ko":"민감성"},{"en":"responsiveness","ko":"반응성"},{"en":"receptivity","ko":"수용성"}],"antonyms":[{"en":"insensitivity","ko":"둔감"},{"en":"indifference","ko":"무관심"}]},{"english":"empathy","korean":"공감","sentence":"It's also about empathy and adaptability, and knowing how the things you do and say will be interpreted and adapting accordingly.","sentenceKo":"그것은 또한 공감과 적응성에 관한 것이며, 당신이 하고 말하는 것들이 어떻게 해석될지를 알고 그에 따라 적응하는 것입니다.","synonyms":[{"en":"compassion","ko":"연민"},{"en":"understanding","ko":"이해"},{"en":"sympathy","ko":"공감"}],"antonyms":[{"en":"apathy","ko":"무관심"},{"en":"indifference","ko":"무감각"}]},{"english":"adaptability","korean":"적응성","sentence":"It's also about empathy and adaptability, and knowing how the things you do and say will be interpreted and adapting accordingly.","sentenceKo":"그것은 또한 공감과 적응성에 관한 것이며, 당신이 하고 말하는 것들이 ":"그는 성공적인 선발전 후에 다른 다섯 명의 학생들과 함께 팀에 막 합류했습니다.","synonyms":[{"en":"audition","ko":"오디션"},{"en":"trial","ko":"시험"},{"en":"test","ko":"테스트"}],"antonyms":[]},{"english":"rearrangement","korean":"재배치","sentence":"McGraw continued to point, calling each player out, until he was satisfied with the rearrangement.","sentenceKo":"McGraw는 재배치에 만족할 때까지 각 선수를 불","synonyms":[{"en":"reorganization","ko":"재구성"},{"en":"restructuring","ko":"재편성"},{"en":"reordering","ko":"재배열"}],"antonyms":[]}]};
var SET_SIZE=20;
function shuffle(a){var b=a.slice();for(var i=b.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=b[i];b[i]=b[j];b[j]=t}return b}
function esc(s){var d=document.createElement('div');d.textContent=s;return d.innerHTML}
function trim(s){return(s||'').replace(/^\s+|\s+$/g,'')}
function maskWord(sen,word){if(!sen||!word)return sen;var lc=sen.toLowerCase(),wl=word.toLowerCase(),res='',i=0;while(i<sen.length){var idx=lc.indexOf(wl,i);if(idx===-1){res+=sen.substring(i);break}res+=sen.substring(i,idx);for(var j=0;j<word.length;j++)res+='_';i=idx+wl.length}return res}
function SimpleSet(){this._m={};this.size=0}
SimpleSet.prototype.add=function(v){var k=String(v);if(!this._m[k]){this._m[k]=true;this.size++}};
SimpleSet.prototype.has=function(v){return this._m[String(v)]===true};
SimpleSet.prototype.clear=function(){this._m={};this.size=0};

function App(){
  var self=this;
  this.allWords=CONFIG.words;
  this.passThreshold=CONFIG.passThreshold;
  this.app=document.getElementById('app');
  this.titleEl=document.getElementById('page-title');
  this.subEl=document.getElementById('page-subtitle');
  this.sets=[];
  for(var i=0;i<this.allWords.length;i+=SET_SIZE){this.sets.push(this.allWords.slice(i,Math.min(i+SET_SIZE,this.allWords.length)))}
  this.totalSets=this.sets.length;
  // test state
  this.masteredWords=new SimpleSet();this.wrongHistory=[];this.setResults=[];
  this.curSet=0;this.round=0;this.roundWords=[];
  this.roundCorrect=[];this.roundWrong=[];this.roundHistory=[];
  this.answered=false;this.setWordsAll=[];
  this.currentOptions=[];this.currentCorrectMap={};this.selectedIdxs={};this.currentKoMap={};
  // practice state
  this.pSeen=new SimpleSet();this.pSetResults=[];this.pCurSet=0;this.pRound=0;
  this.pCards=[];this.pIdx=0;this.pKnown=[];this.pUnknown=[];this.pFlipped=false;

  document.addEventListener('click',function(e){
    var t=e.target.closest('[data-chk]');
    if(t){var ci=parseInt(t.getAttribute('data-chk'),10);self.toggleOption(ci);return}
    if(e.target.closest('.fc-card')&&!e.target.closest('.fc-btns')&&!e.target.closest('.btn')){self.flipCard();return}
    var ae=e.target.closest('[data-action]');
    if(ae){var a=ae.getAttribute('data-action'),ar=ae.getAttribute('data-args');
      if(typeof self[a]==='function'){if(ar!==null)self[a](parseInt(ar,10));else self[a]()}}
  },false);
  this.showHome();
}
App.prototype.render=function(h){this.app.innerHTML=h};
App.prototype.setTitle=function(t){this.titleEl.textContent=t};
App.prototype.setSub=function(t){this.subEl.textContent=t};
App.prototype.toTop=function(){window.scrollTo(0,0)};

/* ── Home ── */
App.prototype.showHome=function(){
  this.setTitle(CONFIG.title);this.setSub('유의어 학습');
  this.render(
    '<div class="fade" style="text-align:center">'+
    '<div style="font-size:3rem;margin-bottom:10px">🔄</div>'+

    '<p style="color:#64748b;font-size:.88rem;word-break:keep-all">플래시카드로 유의어·반의어를 익히고<br>유의어 선택 테스트에 도전하세요!</p>'+
    '<div class="ig"><div class="ig-row">'+
    '<div class="ic"><div class="lb">총 단어</div><div class="vl">'+this.allWords.length+'개</div></div>'+
    '<div class="ic"><div class="lb">세트</div><div class="vl">'+this.totalSets+'세트</div></div></div>'+
    '<div class="ig-row">'+
    '<div class="ic"><div class="lb">테스트 유형</div><div class="vl" style="font-size:.8rem">유의어 선택(복수)</div></div>'+
    '<div class="ic"><div class="lb">통과 기준</div><div class="vl">'+this.passThreshold+'%</div></div></div></div>'+
    '<button class="btn btn-accent" data-action="startPractice" style="font-size:1.05rem">🃏 플래시카드 연습</button>'+
    '<button class="btn btn-primary" data-action="startFullTest" style="font-size:1.05rem">📝 유의어 테스트 시작</button>'+
    '</div>'
  );
};

/* ── Practice (Flashcard) ── */
App.prototype.startPractice=function(){
  this.pSeen=new SimpleSet();this.pSetResults=[];this.pCurSet=0;this.showPracticeMap();
};
App.prototype.showPracticeMap=function(){
  this.setTitle(CONFIG.title);
  var totalSeen=this.pSeen.size;
  var pct=this.allWords.length>0?Math.round((totalSeen/this.allWords.length)*100):0;
  this.setSub('연습 '+pct+'% ('+totalSeen+'/'+this.allWords.length+')');
  var setsHtml='';
  for(var i=0;i<this.totalSets;i++){
    var sw=this.sets[i],res=null;
    for(var r=0;r<this.pSetResults.length;r++){if(this.pSetResults[r].setIdx===i){res=this.pSetResults[r];break}}
    var seen=0;for(var w=0;w<sw.length;w++){if(this.pSeen.has(trim(sw[w].english).toLowerCase()))seen++}
    var done=!!res,sPct=Math.round((seen/sw.length)*100);
    var cls=done?'dn':'cur',icon=done?'✅':'▶',stxt=done?sPct+'%':'시작';
    setsHtml+='<div class="sc-w"><div class="s-card '+cls+'" data-action="practiceSet" data-args="'+i+'">'+
      '<div class="sn">세트 '+(i+1)+'</div><div class="sw">'+sw.length+'개</div>'+
      '<div class="sb"><div class="sbf" style="width:'+sPct+'%"></div></div>'+
      '<div class="ss">'+icon+' '+stxt+'</div></div></div>';
  }
  this.render(
    '<div class="fade"><div style="text-align:center;margin-bottom:16px">'+
    '<div style="font-size:2rem;margin-bottom:6px">🃏</div>'+
    '<h2 style="font-size:1.1rem;font-weight:700;color:#0f172a;margin-bottom:3px">플래시카드 연습</h2>'+
    '<p style="color:#64748b;font-size:.82rem">카드 뒷면에서 유의어·반의어를 확인하세요</p></div>'+
    '<div class="ob"><div class="ob-top"><span style="color:#64748b">연습 진행률</span><span style="font-weight:700;color:#8b5cf6">'+pct+'%</span></div>'+
    '<div class="ob-bar"><div class="ob-fill" style="width:'+pct+'%;background:#8b5cf6"></div></div>'+
    '<div class="ob-sub">'+totalSeen+' / '+this.allWords.length+' 단어</div></div>'+
    '<div class="sg">'+setsHtml+'</div>'+
    '<div class="jump-bar"><p>연습 후 테스트로!</p>'+
    '<button class="btn btn-primary" data-action="startFullTest" style="font-size:.92rem">📝 유의어 테스트 시작</button></div>'+
    '<button class="btn btn-ghost" data-action="showHome" style="margin-top:6px">← 처음으로</button></div>'
  );
};
App.prototype.practiceSet=function(idx){
  this.pCurSet=idx;this.pRound=0;
  var sw=this.sets[idx];
  var unseen=[];for(var i=0;i<sw.length;i++){if(!this.pSeen.has(trim(sw[i].english).toLowerCase()))unseen.push(sw[i])}
  this.pCards=unseen.length>0?shuffle(unseen):shuffle(sw.slice());
  this.pIdx=0;this.pKnown=[];this.pUnknown=[];this.pFlipped=false;this.pRound++;
  this.showCard();
};
App.prototype.showCard=function(){
  if(this.pIdx>=this.pCards.length){this.endPracticeRound();return}
  this.pFlipped=false;
  var word=this.pCards[this.pIdx];
  var total=this.pCards.length;
  var pct=Math.round((this.pIdx/total)*100);
  var dotsHtml='';
  for(var d=0;d<total;d++){
    var dc='fc-dot';
    if(d<this.pIdx){var wk=false;for(var k=0;k<this.pKnown.length;k++){if(this.pKnown[k].english===this.pCards[d].english){wk=true;break}}dc+=wk?' ok':' ng';}
    else if(d===this.pIdx){dc+=' now'}
    dotsHtml+='<div class="'+dc+'"></div>';
  }
  // Build synonym/antonym tags for back
  var synHtml='',antHtml='';
  if(word.synonyms&&word.synonyms.length>0){
    synHtml='<div class="fc-syn"><div class="fc-syn-title">유의어 (Synonyms)</div><div style="display:flex;flex-wrap:wrap;gap:6px;justify-content:center">'+
      word.synonyms.map(function(s){
        var ko=s.ko?'<div style="font-size:.7rem;color:#166534;margin-top:2px;font-weight:400">'+esc(s.ko)+'</div>':'';
        return '<div class="syn-pill s"><div style="font-weight:700">'+esc(s.en)+'</div>'+ko+'</div>';
      }).join('')+
    '</div></div>';
  }
  if(word.antonyms&&word.antonyms.length>0){
    antHtml='<div class="fc-ant"><div class="fc-ant-title">반의어 (Antonyms)</div><div style="display:flex;flex-wrap:wrap;gap:6px;justify-content:center">'+
      word.antonyms.map(function(s){
        var ko=s.ko?'<div style="font-size:.7rem;color:#991b1b;margin-top:2px;font-weight:400">'+esc(s.ko)+'</div>':'';
        return '<div class="syn-pill a"><div style="font-weight:700">'+esc(s.en)+'</div>'+ko+'</div>';
      }).join('')+
    '</div></div>';
  }

App.prototype.startSet=function(idx){

App.prototype.retrySet=function(idx){this.startSet(idx)};
App.prototype.startSetRound=function(){
  this.round++;this.roundWords=shuffle(this.roundWords);

  this.setTitle('세트 '+(this.curSet+1)+' / '+this.totalSets);this.setSub(this.round+'라운드');
  this.showQuestion();

App.prototype.buildOptions=function(word){
  var synEn=(word.synonyms||[]).map(function(s){return s.en});
  var antEn=(word.antonyms||[]).map(function(s){return s.en});
  var allCorrect=[word.english].concat(synEn);
  var distractors=antEn;
  var usedCorrect,numD;
  if(allCorrect.length>=4){usedCorrect=allCorrect.slice(0,3);}
  else if(allCorrect.length===3){usedCorrect=allCorrect;}
  else{usedCorrect=allCorrect;}
  numD=Math.max(1,5-usedCorrect.length);
  if(numD>distractors.length)numD=distractors.length;
  var total=usedCorrect.length+numD;
  if(total<4&&distractors.length>numD)numD=Math.min(distractors.length,4-usedCorrect.length);
  var usedD=distractors.slice(0,numD);
  var options=shuffle(usedCorrect.concat(usedD));
  var cmap={};for(var i=0;i<usedCorrect.length;i++){cmap[usedCorrect[i].toLowerCase()]=true;}
  // Build english→korean lookup for all options
  var koMap={};
  koMap[word.english.toLowerCase()]=word.korean;
  for(var i=0;i<(word.synonyms||[]).length;i++){if(word.synonyms[i].ko)koMap[word.synonyms[i].en.toLowerCase()]=word.synonyms[i].ko;}
  for(var i=0;i<(word.antonyms||[]).length;i++){if(word.antonyms[i].ko)koMap[word.antonyms[i].en.toLowerCase()]=word.antonyms[i].ko;}
  return{options:options,correctMap:cmap,correctCount:usedCorrect.length,koMap:koMap};
};
App.prototype.showQuestion=function(){
  if(this.qIndex>=this.roundWords.length){this.endSetRound();return}
  this.answered=false;this.selectedIdxs={};
  var word=this.roundWords[this.qIndex];
  var built=this.buildOptions(word);
  this.currentOptions=built.options;this.currentCorrectMap=built.correctMap;this.currentCorrectCount=built.correctCount;this.currentKoMap=built.koMap;
  var total=this.roundWords.length;
  var pct=Math.round((this.qIndex/total)*100);
  var masked=maskWord(word.sentence,word.english);
  var senHtml=masked?'<div class="sentence-area">'+esc(masked)+'</div>':'';
  var optsHtml='<div class="opts">';
  for(var i=0;i<built.options.length;i++){
    optsHtml+='<button class="chk-btn" data-chk="'+i+'">'+
      '<div class="chk-box"></div>'+
      '<span>'+esc(built.options[i])+'</span></button>';
  }
  optsHtml+='</div>';
  var pluralHint=built.correctCount>1?'정답 '+built.correctCount+'개 — ':'';
  this.setTitle('세트 '+(this.curSet+1)+' / '+this.totalSets);
  this.setSub(this.round+'R · '+(this.qIndex+1)+'/'+total);
  this.render(
    '<div class="fade">'+
    '<div class="prog-bar"><div class="prog-fill" style="width:'+pct+'%;background:#8b5cf6"></div></div>'+
    '<div class="q-counter">'+(this.qIndex+1)+' / '+total+'</div>'+
    '<div class="round-tag">'+this.round+'라운드</div>'+
    '<div class="kor-word">'+esc(word.korean)+'</div>'+
    senHtml+
    '<div class="q-hint">'+pluralHint+'유의어를 모두 선택 후 제출하세요</div>'+
    optsHtml+
    '<button class="btn btn-accent" data-action="submitSynonym" style="margin-top:14px">✓ 제출</button>'+
    '</div>'
  );

App.prototype.toggleOption=function(ci){
  if(this.answered)return;
  var btn=document.querySelector('[data-chk="'+ci+'"]');if(!btn)return;
  if(this.selectedIdxs[ci]){delete this.selectedIdxs[ci];btn.classList.remove('selected');btn.querySelector('.chk-box').textContent=''}
  else{this.selectedIdxs[ci]=true;btn.classList.add('selected');btn.querySelector('.chk-box').textContent='✓'}
};
App.prototype.submitSynonym=function(){
  if(this.answered)return;
  this.answered=true;
  var word=this.roundWords[this.qIndex];
  var btns=document.querySelectorAll('.chk-btn');
  var selectedWords=[];
  for(var i=0;i<btns.length;i++){if(this.selectedIdxs[i])selectedWords.push(this.currentOptions[i]);}
  // Check: all correct selected AND no wrong selected
  var isCorrect=true;
  var cmap=this.currentCorrectMap;
  // All correct words must be in selected
  for(var k in cmap){var found=false;for(var j=0;j<selectedWords.length;j++){if(selectedWords[j].toLowerCase()===k){found=true;break}}if(!found){isCorrect=false;break}}
  // No wrong words in selected
  if(isCorrect){for(var j=0;j<selectedWords.length;j++){if(!cmap[selectedWords[j].toLowerCase()]){isCorrect=false;break}}}
  // Visual feedback + append Korean meaning to every button
  for(var i=0;i<btns.length;i++){
    btns[i].disabled=true;btns[i].style.cursor='default';
    var optW=this.currentOptions[i];var isC=!!cmap[optW.toLowerCase()];var wasSel=!!this.selectedIdxs[i];
    if(isC&&wasSel){btns[i].className='chk-btn correct';btns[i].querySelector('.chk-box').textContent='✓'}
    else if(isC&&!wasSel){btns[i].className='chk-btn reveal';btns[i].querySelector('.chk-box').textContent='○'}
    else if(!isC&&wasSel){btns[i].className='chk-btn wrong';btns[i].querySelector('.chk-box').textContent='✕'}
    // Append Korean meaning
    var ko=this.currentKoMap[optW.toLowerCase()]||'';
    if(ko){
      var koEl=document.createElement('span');
      koEl.style.cssText='font-size:.75rem;font-weight:400;color:inherit;opacity:.75;margin-left:6px;';
      koEl.textContent='('+ko+')';
      var spanEl=btns[i].querySelector('span');
      if(spanEl)spanEl.appendChild(koEl);
    }
  }
  // Record result
  if(isCorrect){this.roundCorrect.push(word);this.masteredWords.add(trim(word.english).toLowerCase())}
  else{this.roundWrong.push({english:word.english,korean:word.korean,sentence:word.sentence||'',sentenceKo:word.sentenceKo||'',synonyms:word.synonyms||[],antonyms:word.antonyms||[],userAnswer:selectedWords.join(', ')});
    this.wrongHistory.push({english:word.english,korean:word.korean,userAnswer:selectedWords.join(', '),round:this.round,set:this.curSet+1})}
  var correctList=Object.keys(cmap).join(', ');
  var fb=isCorrect?'<div class="fb ok">정답입니다! ✅</div>':
    '<div class="fb ng">오답입니다 ❌<div class="ans">정답: <strong>'+esc(correctList)+'</strong></div></div>';
  var nb='<button class="btn btn-primary" data-action="nextQuestion" style="margin-top:12px">다음 문제</button>';
  var d=document.createElement('div');d.innerHTML=fb+nb;
  var ct=this.app.querySelector('div');if(ct)ct.appendChild(d);
};

  this.roundHistory.push({round:this.round,tested:this.roundWords.length,correct:this.roundCorrect.length,wrong:this.roundWrong.length});

  );this.toTop();

App.prototype.showFinalCelebration=function(){
  var overallPct=Math.round((this.masteredWords.size/this.allWords.length)*100);
  this.setTitle('테스트 완료!');this.setSub('축하합니다!');this.showConfetti();

    for(var w=0;w<this.wrongHistory.length;w++){var wh=this.wrongHistory[w];
      wlHtml+='<div class="wi"><div><div class="ww">'+esc(wh.korean)+'</div><div class="wr">세트'+wh.set+' · '+wh.round+'R</div></div>'+
        '<div style="text-align:right"><div class="wa">'+esc(wh.userAnswer||'')+'</div><div class="wc">'+esc(wh.english)+'</div></div></div>'}
    wlHtml+='</div>'}
  this.render(
    '<div class="fade"><div class="celeb"><div class="em">🎉</div><h2>축하합니다!</h2><p>유의어 테스트를 통과했습니다!</p></div>'+

    '<div class="sr"><span class="sl">총 오답</span><span class="sv'+(this.wrongHistory.length>0?' r':' g')+'">'+this.wrongHistory.length+'회</span></div></div>'+
    wlHtml+
    '<button class="btn btn-accent" style="margin-top:20px" data-action="startFullTest">처음부터 다시</button>'+
    '<button class="btn btn-ghost" data-action="showHome">홈으로</button></div>'
  );this.toTop();
};
App.prototype.showConfetti=function(){
  var c=document.createElement('div');c.className='conf';
  var cols=['#8b5cf6','#f59e0b','#10b981','#3b82f6','#ec4899','#ef4444'];
  for(var i=0;i<50;i++){var p=document.createElement('i');
    var dur=2+Math.random()*2,delay=Math.random()*2;
    p.style.cssText='animation:fall '+dur+'s '+delay+'s ease-in forwards;left:'+(Math.random()*100)+'%';
    var sz=6+Math.random()*8;p.style.width=sz+'px';p.style.height=sz+'px';
    p.style.borderRadius=Math.random()>.5?'50%':'2px';
    p.style.background=cols[Math.floor(Math.random()*cols.length)];c.appendChild(p)}
  document.body.appendChild(c);setTimeout(function(){if(c.parentNode)c.parentNode.removeChild(c)},5500);
};
new App();
</script>
