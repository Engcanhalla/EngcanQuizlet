<script>
var CONFIG={"title":"2Go_2024.32_2025.31_stu","passThreshold":80,"showCountHint":false,"questions":[{"keyExpression":"mist-shrouded image shows a lone elephant standing behind a tree covered in haze","passage":"Taken by wildlife photographer Shaaz Jung in the jungles of South India, the mist-shrouded image shows a lone elephant standing behind a tree covered in haze.","passageTranslation":"남인도 정글에서 야생 사진작가 샤즈 정이 촬영한 안개 가득한 이 사진은, 안개에 덮인 나무 뒤에 홀로 서 있는 코끼리 한 마리를 보여준다.","qType":"correct","questionText":"'mist-shrouded image shows a lone elephant standing behind a tree covered in haze'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"the image clearly reveals an elephant in bright, open sunlight","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: mist-shrouded(안개에 덮인)를 bright sunlight(밝은 햇빛)으로 반대 분위기로 대체","translation":"이미지는 밝은 햇빛 아래 코끼리를 선명하게 보여준다"},{"text":"a group of elephants emerge from the fog in the photograph","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: lone(혼자)를 group(무리)으로 반의어 대체하여 의미 왜곡","translation":"사진 속 안개에서 코끼리 무리가 나타난다"},{"text":"a solitary elephant obscured by fog appears in the photo","isCorrect":true,"optionType":"correct","explanation":"올바름: lone→solitary, mist-shrouded→obscured by fog로 동일한 시각적 장면을 재구성","translation":"안개에 가려진 코끼리 한 마리가 사진에 등장한다"}],"sourceQuestion":"2번 지문"},{"keyExpression":"Delicately perched on the tip of the elephant's tusk is a small black myna bird","passage":"Delicately perched on the tip of the elephant's tusk is a small black myna bird. Framed against smoky green foliage, the bird and elephant look at each other almost as if sharing a silent moment in mutual respect.","passageTranslation":"코끼리 상아의 끝에 작은 검은 마이나 새가 섬세하게 앉아 있다. 연기처럼 뿌연 녹색 잎들을 배경으로, 새와 코끼리는 마치 서로 조용한 순간을 상호 존중 속에 나누는 것처럼 서로를 바라보고 있다.","qType":"incorrect","questionText":"'Delicately perched on the tip of the elephant's tusk is a small black myna bird'을(를) 잘못 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"a small myna bird carefully balanced on the tusk's end","isCorrect":false,"optionType":"correct","explanation":"올바름: delicately perched의 함축(조심스럽게 균형을 잡고 앉은)을 carefully balanced로 구체화","translation":"상아 끝에 조심스럽게 균형을 잡고 있는 작은 마이나 새"},{"text":"a large colorful bird gripping the middle of the tusk","isCorrect":true,"optionType":"incorrect","explanation":"잘못됨: small(작은)을 large(큰)로, tip(끝)을 middle(가운데)로 바꿔 위치·크기 정보를 모두 왜곡","translation":"상아 가운데를 움켜쥔 크고 화려한 새"},{"text":"a myna bird lightly settled at the very tip of the ivory","isCorrect":false,"optionType":"correct","explanation":"올바름: delicately=lightly, perched=settled, tusk=ivory로 각각 대응하여 도치 구문 의미를 충실히 재현","translation":"상아의 바로 끝부분에 가볍게 내려앉은 마이나 새"},{"text":"a tiny myna bird resting gently at the edge of the tusk","isCorrect":false,"optionType":"correct","explanation":"올바름: delicately perched를 resting gently로, tip을 edge로 유의어 대체하여 의미 유지","translation":"상아 끝에 살며시 앉아 있는 작은 마이나 새"}],"sourceQuestion":"3번 지문"},{"keyExpression":"mist-shrouded image shows a lone elephant standing behind a tree covered in haze","passage":"Taken by wildlife photographer Shaaz Jung in the jungles of South India, the mist-shrouded image shows a lone elephant standing behind a tree covered in haze.","passageTranslation":"남인도 정글에서 야생동물 사진작가 샤아즈 정이 촬영한 이 안개에 싸인 사진은 안개로 뒤덮인 나무 뒤에 홀로 서 있는 코끼리 한 마리를 보여준다.","qType":"incorrect","questionText":"'mist-shrouded image shows a lone elephant standing behind a tree covered in haze'을(를) 잘못 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"a single elephant barely visible through the fog","isCorrect":false,"optionType":"correct","explanation":"올바름: lone + mist-shrouded의 결합 의미를 barely visible로 함축 재구성","translation":"안개 사이로 간신히 보이는 한 마리의 코끼리"},{"text":"a solitary elephant hidden in foggy surroundings","isCorrect":false,"optionType":"correct","explanation":"올바름: mist-shrouded/haze를 foggy로, lone을 solitary로 추상↔구체 전환하여 의미 유지","translation":"안개 낀 환경 속에 홀로 있는 코끼리"},{"text":"an elephant emerging from the mist toward the camera","isCorrect":true,"optionType":"incorrect","explanation":"잘못됨: standing behind a tree를 toward the camera로 방향·위치 정보를 임의로 변경하여 원래 구도 의미 왜곡","translation":"안개에서 나와 카메라 쪽으로 다가오는 코끼리"},{"text":"an elephant partially obscured by thick mist in the wild","isCorrect":false,"optionType":"correct","explanation":"올바름: covered in haze의 함축 의미를 partially obscured by thick mist로 구체화하여 표현","translation":"짙은 안개로 인해 일부 가려진 야생 속 코끼리"},{"text":"a group of elephants clearly seen in bright sunlight","isCorrect":true,"optionType":"incorrect","explanation":"잘못됨: lone(혼자)을 group으로, mist-shrouded(안개 낀)를 bright sunlight로 반의어 대체하여 의미 완전 왜곡","translation":"밝은 햇빛 속에서 선명하게 보이는 코끼리 무리"}],"sourceQuestion":"3번 지문"},{"keyExpression":"forever subordinate to a more legitimate cinema for adults","passage":"The old prejudice that children's film is some other realm, separate from (and forever subordinate to) a more legitimate cinema for adults is not supported by the realities of consumption.","passageTranslation":"아동 영화가 어른을 위한 보다 정통한 영화로부터 분리된 (그리고 영원히 종속된) 또 다른 영역이라는 오래된 편견은 소비의 현실에 의해 지지되지 않는다.","qType":"incorrect","questionText":"'forever subordinate to a more legitimate cinema for adults'을(를) 잘못 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"consistently treated as secondary to adult-oriented cinematic art","isCorrect":false,"optionType":"correct","explanation":"올바름: subordinate to를 secondary to로, legitimate cinema for adults를 adult-oriented cinematic art로 전환하여 핵심 의미 동일","translation":"성인 지향 영화 예술에 지속적으로 부차적인 것으로 취급된"},{"text":"increasingly surpassing adult films in critical acclaim","isCorrect":true,"optionType":"incorrect","explanation":"잘못됨: subordinate to(아래에 종속됨)를 surpassing(능가함)으로 완전히 반의어 대체하여 의미 반전","translation":"비평적 호평에서 성인 영화를 점점 능가하는"},{"text":"occasionally recognized as equal in value to adult cinema","isCorrect":true,"optionType":"incorrect","explanation":"잘못됨: forever subordinate(영원히 종속적)를 occasionally recognized as equal(가끔 동등하게 인정)로 바꿔 위계 관계를 평등 관계로 반전","translation":"가끔 성인 영화와 동등한 가치를 지닌 것으로 인정된"},{"text":"always ranked below what is considered serious adult filmmaking","isCorrect":false,"optionType":"correct","explanation":"올바름: subordinate to를 ranked below로, legitimate cinema for adults를 serious adult filmmaking으로 전환하여 위계적 의미 보존","translation":"진지한 성인 영화 제작으로 여겨지는 것보다 항상 낮게 평가된"},{"text":"permanently regarded as inferior to mainstream films aimed at grown-ups","isCorrect":false,"optionType":"correct","explanation":"올바름: forever를 permanently로, subordinate to를 regarded as inferior to로, legitimate cinema for adults를 mainstream films aimed at grown-ups로 재표현하여 의미 유지","translation":"성인을 대상으로 한 주류 영화보다 영구적으로 열등한 것으로 여겨진"}],"sourceQuestion":"1번 지문"},{"keyExpression":"Delicately perched on the tip of the elephant's tusk is a small black myna bird","passage":"Delicately perched on the tip of the elephant's tusk is a small black myna bird.","passageTranslation":"코끼리 상아의 끝에 섬세하게 앉아 있는 것은 작은 검은 마이나 새다.","qType":"correct","questionText":"'Delicately perched on the tip of the elephant's tusk is a small black myna bird'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"the myna bird flies away from the elephant's tusk in alarm","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: perched(앉아 있음)를 flies away(날아감)로 정반대 행동으로 대체하여 의미 역전","translation":"마이나 새가 놀라서 코끼리 상아에서 날아간다"},{"text":"a small myna bird is carefully balanced at the tusk's pointed end","isCorrect":true,"optionType":"correct","explanation":"올바름: delicately→carefully, perched→balanced로 섬세한 착지 동작을 유지한 paraphrase","translation":"작은 마이나 새가 상아의 뾰족한 끝에 조심스럽게 균형을 잡고 있다"},{"text":"a myna bird aggressively clings to the base of the elephant's tusk","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: delicately(섬세하게)→aggressively(공격적으로), tip(끝)→base(밑동)로 위치와 태도 모두 왜곡","translation":"마이나 새 한 마리가 코끼리 상아의 밑동에 공격적으로 매달려 있다"},{"text":"a little myna bird sits lightly upon the outermost point of the tusk","isCorrect":true,"optionType":"correct","explanation":"올바름: delicately perched→sits lightly, tip→outermost point로 의미 보존","translation":"작은 마이나 새 한 마리가 상아의 맨 끝에 가볍게 앉아 있다"}],"sourceQuestion":"2번 지문"},{"keyExpression":"The myna bird acts as a cleaner for the elephant by eating parasites such as lice or ticks that irritate its skin","passage":"The myna bird acts as a cleaner for the elephant by eating parasites such as lice or ticks that irritate its skin.","passageTranslation":"마이나 새는 코끼리의 피부를 자극하는 이나 진드기 같은 기생충을 먹어 코끼리의 청소부 역할을 한다.","qType":"correct","questionText":"'The myna bird acts as a cleaner for the elephant by eating parasites such as lice or ticks that irritate its skin'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"the bird benefits the elephant by providing it with food such as lice and ticks","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: 새가 기생충을 먹는다는 것을 코끼리에게 먹이를 제공한다는 것으로 주체와 역할을 역전","translation":"새는 이나 진드기 같은 먹이를 제공함으로써 코끼리를 돕는다"},{"text":"by consuming parasites that cause discomfort to the elephant's skin, the bird serves as its cleaner","isCorrect":true,"optionType":"correct","explanation":"올바름: irritate→cause discomfort, eating→consuming으로 인과 관계와 역할을 보존","translation":"코끼리 피부에 불편함을 주는 기생충을 먹어 치움으로써, 새는 청소부 역할을 한다"},{"text":"the myna bird spreads parasites onto the elephant to irritate its skin","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: eating parasites(기생충을 먹음)를 spreads parasites(기생충을 퍼뜨림)으로 인과 완전 역전","translation":"마이나 새는 코끼리 피부를 자극하기 위해 기생충을 퍼뜨린다"}],"sourceQuestion":"2번 지문"},{"keyExpression":"consumed by audiences of all ages","passage":"films supposedly made for children have always been consumed by audiences of all ages, particularly in commercial cinemas.","passageTranslation":"아이들을 위해 만들어졌다고 여겨지는 영화들은 특히 상업 영화관에서 항상 모든 연령대의 관객들에 의해 소비되어 왔다.","qType":"incorrect","questionText":"'consumed by audiences of all ages'을(를) 잘못 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"attracting a broadly age-diverse viewership","isCorrect":false,"optionType":"correct","explanation":"올바름: all ages를 age-diverse로 압축하고 consumed를 attracting a viewership으로 재구성하여 의미 동일","translation":"폭넓게 연령이 다양한 시청자층을 끌어들인다"},{"text":"drawing in spectators regardless of their age","isCorrect":false,"optionType":"correct","explanation":"올바름: consumed를 능동적 유입(drawing in)으로 전환하고 all ages를 regardless of their age로 재표현하여 핵심 의미 유지","translation":"나이에 관계없이 관객들을 끌어들인다"},{"text":"produced exclusively for younger demographics","isCorrect":true,"optionType":"incorrect","explanation":"잘못됨: consumed(소비)를 produced(제작)로 바꾸고 all ages를 younger demographics로 반전시켜 의미 왜곡","translation":"오로지 젊은 인구 계층을 위해 제작된다"},{"text":"restricted to child audiences in theatrical settings","isCorrect":true,"optionType":"incorrect","explanation":"잘못됨: all ages를 child audiences로 축소하고 consumed를 restricted로 대체하여 원문의 의미를 반전","translation":"극장 환경에서 아동 관객에게만 제한된다"},{"text":"watched and enjoyed by viewers across every age group","isCorrect":false,"optionType":"correct","explanation":"올바름: consumed를 watched and enjoyed로, audiences of all ages를 viewers across every age group으로 구체화하여 의미 보존","translation":"모든 연령대의 시청자들에 의해 관람되고 즐겨진다"}],"sourceQuestion":"1번 지문"},{"keyExpression":"Symbiotic, or mutualistic, relationships occur in nature when two species interact in ways that benefit each other","passage":"Symbiotic, or mutualistic, relationships occur in nature when two species interact in ways that benefit each other.","passageTranslation":"공생, 즉 상리적 관계는 두 종이 서로에게 이익이 되는 방식으로 상호작용할 때 자연에서 나타난다.","qType":"correct","questionText":"'Symbiotic, or mutualistic, relationships occur in nature when two species interact in ways that benefit each other'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"when organisms of different species gain from living or working together, a mutualistic bond is said to exist","isCorrect":true,"optionType":"correct","explanation":"올바름: benefit each other→gain from living together, symbiotic relationship→mutualistic bond로 정의적 인과 구조를 보존","translation":"다른 종의 유기체들이 함께 살거나 일함으로써 이익을 얻을 때, 상리적 유대가 존재한다고 한다"},{"text":"symbiotic relationships form when one species exploits another for its exclusive gain","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: benefit each other(서로 이익)를 exclusive gain(일방적 이익)으로 대체하여 기생 관계로 의미 왜곡","translation":"공생 관계는 한 종이 자신만의 이익을 위해 다른 종을 이용할 때 형성된다"},{"text":"mutualistic relationships only exist between members of the same species","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: two species(두 종)를 same species(같은 종)으로 대체하여 조건 자체를 왜곡","translation":"상리적 관계는 같은 종의 개체들 사이에서만 존재한다"}],"sourceQuestion":"2번 지문"},{"keyExpression":"Acacia trees host ants that live in their hollow thorns and feed on nectar provided by the tree","passage":"Acacia trees host ants that live in their hollow thorns and feed on nectar provided by the tree. In return, the ants defend the tree against herbivores that want to eat the tree's leaves.","passageTranslation":"아카시아 나무는 빈 가시 속에 살며 나무가 제공하는 꿀을 먹는 개미들을 수용한다. 그 대가로 개미들은 나무의 잎을 먹으려는 초식동물로부터 나무를 지킨다.","qType":"correct","questionText":"'Acacia trees host ants that live in their hollow thorns and feed on nectar provided by the tree'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"ants avoid acacia trees because their thorns produce harmful chemicals","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: host ants(개미를 수용함)를 avoid(피하다)로 반전시키고, nectar(꿀)를 harmful chemicals(해로운 화학물질)로 대체하여 관계를 공생에서 회피로 왜곡","translation":"개미는 아카시아 나무의 가시가 해로운 화학물질을 생성하기 때문에 피한다"},{"text":"the acacia tree provides shelter and food for ants living inside its thorns","isCorrect":true,"optionType":"correct","explanation":"올바름: host ants that live in their hollow thorns를 provides shelter, feed on nectar provided by the tree를 food로 재구성하여 나무의 역할 의미 유지","translation":"아카시아 나무는 가시 속에 사는 개미에게 쉼터와 먹이를 제공한다"},{"text":"acacia trees absorb nutrients from ants that dig into their thorns","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: 혜택의 방향을 역전시켜 나무가 개미로부터 영양분을 흡수한다고 바꾸고, live in을 dig into로 대체하여 관계의 성격을 왜곡","translation":"아카시아 나무는 가시를 파고드는 개미로부터 영양분을 흡수한다"}],"sourceQuestion":"3번 지문"},{"keyExpression":"One species might get food or protection, and the other might receive cleaning, warning signals, or assistance that helps it survive","passage":"One species might get food or protection, and the other might receive cleaning, warning signals, or assistance that helps it survive. Elsewhere in the African savannah, similar relationships occur for other birds such as cattle egrets and oxpeckers.","passageTranslation":"한 종은 먹이나 보호를 얻을 수 있고, 다른 종은 청소, 경고 신호, 또는 생존에 도움이 되는 지원을 받을 수 있다. 아프리카 사바나의 다른 곳에서도 황로와 소등쪼기새 같은 다른 새들에게 유사한 관계가 발생한다.","qType":"correct","questionText":"'One species might get food or protection, and the other might receive cleaning, warning signals, or assistance that helps it survive'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"while one organism benefits from nourishment or safety, the other gets aid in staying alive","isCorrect":true,"optionType":"correct","explanation":"올바름: food or protection을 nourishment or safety로, assistance that helps it survive를 aid in staying alive로 대응하여 양측 혜택 구조 보존","translation":"한 생물은 먹이나 안전으로부터 이익을 얻는 반면, 다른 생물은 살아남는 데 도움을 받는다"},{"text":"one species always suffers harm so that the other species can survive better","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: 상호 이익의 공생 관계를 한 종이 손해를 본다는 기생 관계로 인과 구조를 완전히 역전시켜 의미 왜곡","translation":"한 종은 항상 해를 입어야 다른 종이 더 잘 생존할 수 있다"},{"text":"each partner in the relationship gains something essential for its survival","isCorrect":true,"optionType":"correct","explanation":"올바름: food, protection, cleaning, warning signals를 something essential로 추상화하고, helps it survive를 for its survival로 재표현하여 핵심 의미 유지","translation":"관계에서 각 파트너는 생존에 필수적인 무언가를 얻는다"},{"text":"both species provide identical services and receive the same benefits in return","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: 원문은 각 종이 서로 다른 혜택을 받는다고 명시하지만, identical과 same으로 대칭 관계로 왜곡","translation":"두 종은 동일한 서비스를 제공하고 그 대가로 동일한 혜택을 받는다"}],"sourceQuestion":"3번 지문"},{"keyExpression":"human activities are putting pressure on nature and upsetting the balance of ecosystems","passage":"However, human activities are putting pressure on nature and upsetting the balance of ecosystems. As a result, many species are declining, and some are now threatened with extinction.","passageTranslation":"그러나 인간 활동이 자연에 압박을 가하고 생태계의 균형을 무너뜨리고 있다. 그 결과, 많은 종이 감소하고 있으며 일부는 이제 멸종 위협에 처해 있다.","qType":"correct","questionText":"'human activities are putting pressure on nature and upsetting the balance of ecosystems'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"the impact of human behavior is destabilizing ecosystems by disturbing their natural balance","isCorrect":true,"optionType":"correct","explanation":"올바름: putting pressure→impact/destabilizing, upsetting the balance→disturbing their natural balance로 원인-결과 구조를 보존","translation":"인간 행동의 영향이 자연의 균형을 교란함으로써 생태계를 불안정하게 만들고 있다"},{"text":"human activities are gradually restoring the balance of ecosystems in various regions","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: upsetting the balance(균형 파괴)를 restoring the balance(균형 회복)으로 결과를 정반대로 왜곡","translation":"인간 활동이 다양한 지역에서 생태계의 균형을 점진적으로 회복시키고 있다"},{"text":"nature is independently recovering from pressure without any human interference","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: human activities putting pressure(인간이 압박을 가함)를 부정하고 인간의 역할을 제거함으로써 핵심 주장을 완전히 역전","translation":"자연은 인간의 어떠한 개입 없이 스스로 압박에서 회복하고 있다"},{"text":"actions taken by humans are straining natural environments and disrupting ecological equilibrium","isCorrect":true,"optionType":"correct","explanation":"올바름: putting pressure→straining, upsetting the balance→disrupting ecological equilibrium으로 인간의 부정적 영향을 정확히 paraphrase","translation":"인간이 취하는 행동들이 자연환경에 부담을 주고 생태적 균형을 무너뜨리고 있다"}],"sourceQuestion":"2번 지문"},{"keyExpression":"Acacia trees host ants that live in their hollow thorns and ritating pests로, acts as a cleaner를 helps로 재표현하여 관계 의미 보존","translation":"새는 코끼리 몸의 성가신 해충을 먹음으로써 코끼리를 돕는다"}],"sourceQuestion":"3번 지문"},{"keyExpression":"human activities are putting pressure on nature and upsetting the balance of ecosystems","passage":"However, human activities are putting pressure on nature and upsetting the balance of ecosystems. As a result, many species are declining, and some are now threatened with extinction.","passageTranslation":"그러나 인간 활동이 자연에 압박을 가하고 생태계의 균형을 무너뜨리고 있다. 그 결과, 많은 종이 감소하고 있으며 일부는 이제 멸종 위협에 처해 있다.","qType":"incorrect","questionText":"'human activities are putting pressure on nature and upsetting the balance of ecosystems'을(를) 잘못 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"actions taken by humans are straining natural environments and disrupting ecological equilibrium","isCorrect":false,"optionType":"correct","explanation":"올바름: putting pressure→straining, upsetting the balance→disrupting ecological equilibrium으로 인간의 부정적 영향을 정확히 paraphrase","translation":"인간이 취하는 행동들이 자연환경에 부담을 주고 생태적 균형을 무너뜨리고 있다"},{"text":"nature is independently recovering from pressure without any human interference","isCorrect":true,"optionType":"incorrect","explanation":"잘못됨: human activities putting pressure(인간이 압박을 가함)를 부정하고 인간의 역할을 제거함으로써 핵심 주장을 완전히 역전","translation":"자연은 인간의 어떠한 개입 없이 스스로 압박에서 회복하고 있다"},{"text":"human-driven forces are imposing stress on the natural world and throwing ecosystems out of balance","isCorrect":false,"optionType":"correct","explanation":"올바름: human activities→human-driven forces, putting pressure→imposing stress, upsetting→throwing out of balance로 의미를 다른 어휘·구조로 충실히 재현","translation":"인간이 주도하는 힘들이 자연계에 스트레스를 가하고 생태계의 균형을 무너뜨리고 있다"},{"text":"the impact of human behavior is destabilizing ecosystems by disturbing their natural balance","isCorrect":false,"optionType":"correct","explanation":"올바름: putting pressure→impact/destabilizing, upsetting the balance→disturbing their natural balance로 원인-결과 구조를 보존","translation":"인간 },{"keyExpression":"mist-shrouded image shows a lone elephant standing behind a tree covered in haze","passage":"Taken by wildlife photographer Shaaz Jung in the jungles of South India, the mist-shrouded image shows a lone elephant standing behind a tree covered in haze.","passageTranslation":"남인도 정글에서 야생 사진작가 샤즈 정이 촬영한 안개 가득한 이 사진은, 안개에 덮인 나무 뒤에 홀로 서 있는 코끼리 한 마리를 보여준다.","qType":"incorrect","questionText":"'mist-shrouded image shows a lone elephant standing behind a tree covered in haze'을(를) 잘못 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"a group of elephants emerge from the fog in the photograph","isCorrect":true,"optionType":"incorrect","explanation":"잘못됨: lone(혼자)를 group(무리)으로 반의어 대체하여 의미 왜곡","translation":"사진 속 안개에서 코끼리 무리가 나타난다"},{"text":"a solitary elephant obscured by fog appears in the photo","isCorrect":false,"optionType":"correct","explanation":"올바름: lone→solitary, mist-shrouded→obscured by fog로 동일한 시각적 장면을 재구성","translation":"안개에 가려진 코끼리 한 마리가 사진에 등장한다"},{"text":"a single elephant veiled in atmospheric haze is depicted in the image","isCorrect":false,"optionType":"correct","explanation":"올바름: lone→single, mist-shrouded→veiled in atmospheric haze로 시각적 묘사를 유지","translation":"대기의 안개에 감싸인 코끼리 한 마리가 이미지에 묘사된다"},{"text":"the photograph captures an isolated elephant amid misty surroundings","isCorrect":false,"optionType":"correct","explanation":"올바름: lone→isolated, mist-shrouded→misty surroundings로 분위기와 대상을 정확히 paraphrase","translation":"사진은 안개 낀 환경 속 홀로 있는 코끼리를 포착한다"},{"text":"the image clearly reveals an elephant in bright, open sunlight","isCorrect":true,"optionType":"incorrect","explanation":"잘못됨: mist-shrouded(안개에 덮인)를 bright sunlight(밝은 햇빛)으로 반대 분위기로 대체","translation":"이미지는 밝은 햇빛 아래 코끼리를 선명하게 보여준다"}],"sourceQuestion":"2번 지문"},{"keyExpression":"the beauty of relationships in Shaaz Jung's photograph lies in the cooperation that helps species survive in the wild","passage":"In the end, the beauty of relationships in Shaaz Jung's photograph lies in the cooperation that helps species survive in the wild.","passageTranslation":"결국, 샤즈 정의 사진 속 관계의 아름다움은 야생에서 종들이 생존하는 데 도움을 주는 협력에 있다.","qType":"incorrect","questionText":"'the beauty of relationships in Shaaz Jung's photograph lies in the cooperation that helps species survive in the wild'을(를) 잘못 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"the photograph's artistic value is diminished by the competitive struggle between species for dominance","isCorrect":true,"optionType":"incorrect","explanation":"잘못됨: beauty lies in cooperation(협력의 아름다움)을 competitive struggle(경쟁적 투쟁)으로 반대 개념으로 대체하여 의미 역전","translation":"사진의 예술적 가치는 지배를 위한 종들 간의 경쟁적 투쟁으로 감소된다"},{"text":"what makes the relationships in the photo remarkable is the collaborative behavior enabling survival in nature","isCorrect":false,"optionType":"correct","explanation":"올바름: beauty lies in→what makes remarkable, cooperation→collaborative behavior, survive in the wild→survival in nature로 필자의 핵심 주장을 재표현","translation":"사진 속 관계를 주목할 만하게 만드는 것은 자연에서의 생존을 가능하게 하는 협력적 행동이다"},{"text":"the essence of what Shaaz Jung's image conveys is that working together allows different species to endure in their environment","isCorrect":false,"optionType":"correct","explanation":"올바름: beauty lies in cooperation→essence is that working together, survive in the wild→endure in their environment로 필자의 메시지를 다른 구문 구조로 재구성","translation":"샤즈 정의 사진이 전달하는 본질은 함께 협력하는 것이 서로 다른 종이 환경 속에서 지속될 수 있게 한다는 것이다"},{"text":"the profound value of the photo's depicted relationships stems from how joint effort sustains life in natural habitats","isCorrect":false,"optionType":"correct","explanation":"올바름: beauty→profound value, cooperation→joint effort, survive in the wild→sustains life in natural habitats로 함축된 주장을 논리적으로 paraphrase","translation":"사진에 묘사된 관계의 깊은 가치는 자연 서식지에서 공동의 노력이 생명을 지속시키는 방식에서 비롯된다"}],"sourceQuestion":"2번 지문"},{"keyExpression":"Symbiotic, or mutualistic, relationships occur in nature when two species interact in ways that benefit each other","passage":"Symbiotic, or mutualistic, relationships occur in nature when two species interact in ways that benefit each other. One species might get food or protection, and the other might receive cleaning, warning signals, or assistance that helps it survive.","passageTranslation":"공생적, 즉 상리공생적 관계는 두 종이 서로에게 이익이 되는 방식으로 상호작용할 때 자연에서 발생한다. 한 종은 먹이나 보호를 얻을 수 있고, 다른 종은 청소, 경고 신호, 또는 생존에 도움이 되는 지원을 받을 수 있다.","qType":"incorrect","questionText":"'Symbiotic, or mutualistic, relationships occur in nature when two species interact in ways that benefit each other'을(를) 잘못 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"two species compete with each other to form mutualistic bonds in nature","isCorrect":true,"optionType":"incorrect","explanation":"잘못됨: interact in ways that benefit each other를 compete with each other로 대체하여 협력 관계를 경쟁 관계로 의미 역전","translation":"두 종은 자연에서 공생적 유대를 형성하기 위해 서로 경쟁한다"},{"text":"when two species help one another through their relationship, symbiosis occurs","isCorrect":false,"optionType":"correct","explanation":"올바름: interact in ways that benefit each other를 help one another through their relationship으로 바꾸고, occur를 유지하여 조건-결과 구조 보존","translation":"두 종이 관계를 통해 서로를 도울 때 공생이 발생한다"},{"text":"in nature, two species living together for mutual benefit form a symbiotic bond","isCorrect":false,"optionType":"correct","explanation":"올바름: interact in ways that benefit each other를 living together for mutual benefit으로 추상→구체 전환하고, symbiotic relationship를 symbiotic bond로 restate","translation":"자연에서 상호 이익을 위해 함께 사는 두 종은 공생적 유대를 형성한다"},{"text":"mutualism arises when two different species gain advantages from their interaction","isCorrect":false,"optionType":"correct","explanation":"올바름: Symbiotic/mutualistic를 mutualism으로, interact in ways that benefit each other를 gain advantages from their interaction으로 논리 구조를 유지하며 재표현","translation":"공생은 서로 다른 두 종이 상호작용으로부터 이익을 얻을 때 발생한다"},{"text":"symbiotic relationships develop when one species dominates another","isCorrect":true,"optionType":"incorrect","explanation":"잘못됨: benefit each other(서로 이익)를 one species dominates another(일방적 지배)로 바꿔 상호성의 핵심 의미를 완전히 왜곡","translation":"공생 관계는 한 종이 다른 종을 지배할 때 발전한다"}],"sourceQuestion":"3번 지문"},{"keyExpression":"attracted 59 per cent of theatrical admissions","passage":"in 2007, eleven Danish children's and youth films attracted 59 per cent of theatrical admissions, and in 2014, German children's films comprised seven out of the top twenty films at the national box office.","passageTranslation":"2007년에 덴마크 아동·청소년 영화 11편이 극장 입장객의 59퍼센트를 끌어들였고, 2014년에는 독일 아동 영화들이 전국 박스오피스 상위 20개 작품 중 7편을 차지했다.","qType":"incorrect","questionText":"'attracted 59 per cent of theatrical admissions'을(를) 잘못 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"drew the majority of moviegoers to the box office","isCorrect":false,"optionType":"correct","explanation":"올바름: attracted를 drew로, theatrical admissions를 moviegoers to the box office로 전환하여 의미 유지","translation":"대다수의 영화 관람객을 매표소로 끌어들였다"},{"text":"were rejected by the majority of cinema audiences","isCorrect":true,"optionType":"incorrect","explanation":"잘못됨: attracted(끌어들임)를 rejected(거부됨)로 반의어 대체하여 인과 관계를 완전히 반전","translation":"대다수의 영화관 관객들에 의해 외면당했다"},{"text":"captured a dominant share of total theater attendance","isCorrect":false,"optionType":"correct","explanation":"올바름: attracted를 captured로, 59 per cent of theatrical admissions를 dominant share of total theater attendance로 재구성하여 핵심 의미 동일","translation":"전체 극장 관람객 수의 압도적인 비중을 차지했다"},{"text":"accounted for more than half of all cinema ticket sales","isCorrect":false,"optionType":"correct","explanation":"올바름: attracted를 accounted for로, 59 per cent를 more than half로 근사 재표현하여 극장 흥행 규모의 의미 보존","translation":"전체 영화관 티켓 판매의 절반 이상을 차지했다"},{"text":"generated 59 per cent of total film production costs","isCorrect":true,"optionType":"incorrect","explanation":"잘못됨: theatrical admissions(극장 입장 수)를 film production costs(제작 비용)로 대체하여 수익·흥행 맥락을 제작 비용 맥락으로 왜곡","translation":"전체 영화 제작 비용의 59퍼센트를 발생시켰다"}],"sourceQuestion":"1번 지문"},{"keyExpression":"These birds often perch on the backs of rhinos, oxen, and other large mammals and pick off insects","passage":"These birds often perch on the backs of rhinos, oxen, and other large mammals and pick off insects.","passageTranslation":"이 새들은 코뿔소, 황소 및 다른 대형 포유류의 등에 자주 앉아 곤충을 골라 먹는다.","qType":"incorrect","questionText":"'These birds often perch on the backs of rhinos, oxen, and other large mammals and pick off insects'을(를) 잘못 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"these birds habitually land on large animals such as rhinos and oxen to feed on insects","isCorrect":false,"optionType":"correct","explanation":"올바름: often perch→habitually land, pick off→feed on으로 장소와 행동을 정확히 paraphrase","translation":"이 새들은 먹이를 먹기 위해 코뿔소나 황소 같은 큰 동물 위에 습관적으로 내려앉는다"},{"text":"it is common for these birds to settle on the bodies of large herbivores and remove insects from them","isCorrect":false,"optionType":"correct","explanation":"올바름: often→common, perch on→settle on, pick off→remove로 동일한 공생 행동을 재표현","translation":"이 새들이 대형 초식동물의 몸에 앉아 곤충을 제거하는 것은 흔한 일이다"},{"text":"these birds regularly rest on the surfaces of large mammals like rhinos to consume their parasitic insects","isCorrect":false,"optionType":"correct","explanation":"올바름: perch→rest on surfaces, pick off insects→consume parasitic insects로 먹이 섭취 행위와 위치를 정확히 paraphrase","translation":"이 새들은 코뿔소 같은 대형 포유류의 표면에 규칙적으로 앉아 기생 곤충을 먹는다"},{"text":"these birds chase away rhinos and oxen to protect their nesting grounds","isCorrect":true,"optionType":"incorrect","explanation":"잘못됨: perch on(위에 앉음)을 chase away(쫓아냄)로, 협력 관계를 경쟁 관계로 완전히 왜곡","translation":"이 새들은 둥지 영역을 보호하기 위해 코뿔소와 황소를 쫓아낸다"}],"sourceQuestion":"2번 지문"},{"keyExpression":"the bird and elephant look at each other almost as if sharing a silent moment in mutual respect","passage":"Framed against smoky green foliage, the bird and elephant look at each other almost as if sharing a silent moment in mutual respect. The photo beautifully illustrates a mutualistic relationship between two different species.","passageTranslation":"연기처럼 뿌연 녹색 잎들을 배경으로, 새와 코끼리는 마치 서로 조용한 순간을 상호 존중 속에 나누는 것처럼 서로를 바라보고 있다. 이 사진은 서로 다른 두 종 사이의 공생 관계를 아름답게 보여준다.","qType":"incorrect","questionText":"'the bird and elephant look at each other almost as if sharing a silent moment in mutual respect'을(를) 잘못 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"the two creatures seem to acknowledge each other quietly","isCorrect":false,"optionType":"correct","explanation":"올바름: mutual respect의 함축과 silent moment를 acknowledge each other quietly로 재구성하여 의미 보존","translation":"두 생물이 서로를 조용히 인정하는 것처럼 보임"},{"text":"the bird and elephant compete fiercely for dominance","isCorrect":true,"optionType":"incorrect","explanation":"잘못됨: mutual respect(상호 존중)를 compete for dominance(지배를 위한 경쟁)로 관계의 성격을 완전히 반전시켜 의미 왜곡","translation":"새와 코끼리는 지배권을 위해 치열하게 경쟁한다"},{"text":"both appear to be engaged in a wordless exchange of recognition","isCorrect":false,"optionType":"correct","explanation":"올바름: silent moment를 wordless exchange로, mutual respect를 recognition으로 추상→구체 전환하여 의미 유지","translation":"둘 다 말 없는 상호 인식의 교환에 참여하는 것처럼 보임"},{"text":"they seem to pause together in a moment of unspoken understanding","isCorrect":false,"optionType":"correct","explanation":"올바름: silent을 unspoken으로, mutual respect를 understanding으로 paraphrase하여 함축 의미 충실히 재현","translation":"그들은 말로 표현되지 않은 이해의 순간 속에 함께 멈춘 것처럼 보임"},{"text":"the two animals ignore each other in an awkward silence","isCorrect":true,"optionType":"incorrect","explanation":"잘못됨: look at each other(서로를 바라보다)를 ignore(무시하다)로 바꾸고, mutual respect를 awkward silence로 대체하여 관계의 의미를 왜곡","translation":"두 동물은 어색한 침묵 속에서 서로를 무시한다"}],"sourceQuestion":"3번 지문"},{"keyExpression":"considerable crossover in audience composition","passage":"The considerable crossover in audience composition for children's films can be shown by the fact that, in 2007, eleven Danish children's and youth films attracted 59 per cent of theatrical admissions.","passageTranslation":"아동 영화의 관객 구성에서 나타나는 상당한 교차 현상은, 2007년에 덴마크 아동·청소년 영화 11편이 극장 입장객의 59퍼센트를 끌어들였다는 사실로 입증될 수 있다.","qType":"correct","questionText":"'considerable crossover in audience composition'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"significant overlap in who actually watches the films","isCorrect":true,"optionType":"correct","explanation":"올바름: considerable을 significant로, crossover in audience composition을 overlap in who actually watches로 구체화하여 의미 보존","translation":"실제로 영화를 보는 사람들 사이에 상당한 중복이 있다"},{"text":"a minor inconsistency in film distribution methods","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: audience composition을 distribution methods로 대체하고 considerable을 minor로 약화시켜 의미를 완전히 다른 맥락으로 왜곡","translation":"영화 배급 방식의 사소한 불일치"},{"text":"a substantial blending of viewers from various demographics","isCorrect":true,"optionType":"correct","explanation":"올바름: considerable을 substantial로, crossover를 blending으로, audience composition을 various demographics로 전환하여 의미 동일","translation":"다양한 인구 통계층 시청자들의 상당한 혼합"},{"text":"a sharp divide between adult and child viewers","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: crossover(교차·중복)를 divide(분리)로 반의어 대체하여 의미 완전히 반전","translation":"성인과 아동 시청자 사이의 뚜렷한 분리"}],"sourceQuestion":"1번 지문"},{"keyExpression":"Delicately perched on the tip of the elephant's tusk is a small black myna bird","passage":"Delicately perched on the tip of the elephant's tusk is a small black myna bird.","passageTranslation":"코끼리 상아의 끝에 섬세하게 앉아 있는 것은 작은 검은 마이나 새다.","qType":"incorrect","questionText":"'Delicately perched on the tip of the elephant's tusk is a small black myna bird'을(를) 잘못 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"a little myna bird sits lightly upon the outermost point of the tusk","isCorrect":false,"optionType":"correct","explanation":"올바름: delicately perched→sits lightly, tip→outermost point로 의미 보존","translation":"작은 마이나 새 한 마리가 상아의 맨 끝에 가볍게 앉아 있다"},{"text":"a myna bird aggressively clings to the base of the elephant's tusk","isCorrect":true,"optionType":"incorrect","explanation":"잘못됨: delicately(섬세하게)→aggressively(공격적으로), tip(끝)→base(밑동)로 위치와 태도 모두 왜곡","translation":"마이나 새 한 마리가 코끼리 상아의 밑동에 공격적으로 매달려 있다"},{"text":"a tiny myna bird rests gently on the very end of the tusk","isCorrect":false,"optionType":"correct","explanation":"올바름: delicately perched→rests gently, tip→very end로 동일한 위치와 행동을 정확히 재표현","translation":"작은 마이나 새 한 마리가 상아 끝에 조심스럽게 앉아 있다"},{"text":"a small myna bird is carefully balanced at the tusk's pointed end","isCorrect":false,"optionType":"correct","explanation":"올바름: delicately→carefully, perched→balanced로 섬세한 착지 동작을 유지한 paraphrase","translation":"작은 마이나 새가 상아의 뾰족한 끝에 조심스럽게 균형을 잡고 있다"}],"sourceQuestion":"2번 지문"},{"keyExpression":"not supported by the realities of consumption","passage":"The old prejudice that children's film is some other realm, separate from (and forever subordinate to) a more legitimate cinema for adults is not supported by the realities of consumption.","passageTranslation":"아동 영화가 어른을 위한 보다 정통한 영화로부터 분리된 (그리고 영원히 종속된) 또 다른 영역이라는 오래된 편견은 소비의 현실에 의해 지지되지 않는다.","qType":"correct","questionText":"'not supported by the realities of consumption'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"irrelevant to any discussion of film distribution strategies","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: realities of consumption(소비의 현실)을 film distribution strategies(배급 전략)로 대체하고 not supported를 irrelevant로 바꿔 논리 구조를 완전히 다른 맥락으로 왜곡","translation":"영화 배급 전략에 관한 어떠한 논의와도 무관하다"},{"text":"contradicted by the actual viewing habits of audiences","isCorrect":true,"optionType":"correct","explanation":"올바름: not supported by를 contradicted by로, realities of consumption을 actual viewing habits of audiences로 구체화하여 의미 보존","translation":"관객들의 실제 관람 습관에 의해 반박된다"},{"text":"disproved by observable patterns of audience engagement","isCorrect":true,"optionType":"correct","explanation":"올바름: not supported by를 disproved by로, realities of consumption을 observable patterns of audience engagement로 재표현하여 핵심 의미 동일","translation":"관찰 가능한 관객 참여 패턴에 의해 반증된다"},{"text":"confirmed by the consistent trends in how audiences consume media","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: not supported(지지되지 않음)를 confirmed(확인됨)로 반의어 대체하여 논리 방향을 완전히 반전","translation":"관객들이 미디어를 소비하는 방식의 일관된 추세에 의해 확인된다"}],"sourceQuestion":"1번 지문"},{"keyExpression":"considerable crossover in audience composition","passage":"The considerable crossover in audience composition for children's films can be shown by the fact that, in 2007, eleven Danish children's and youth films attracted 59 per cent of theatrical admissions.","passageTranslation":"아동 영화의 관객 구성에서 나타나는 상당한 교차 현상은, 2007년에 덴마크 아동·청소년 영화 11편이 극장 입장객의 59퍼센트를 끌어들였다는 사실로 입증될 수 있다.","qType":"correct","questionText":"'considerable crossover in audience composition'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"a notably mixed viewership that spans different age groups","isCorrect":true,"optionType":"correct","explanation":"올바름: crossover를 mixed viewership으로, audience composition을 different age groups로 재표현하여 의미 유지","translation":"다양한 연령대에 걸친 눈에 띄게 혼합된 시청자층"},{"text":"a minor inconsistency in film distribution methods","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: audience composition을 distribution methods로 대체하고 considerable을 minor로 약화시켜 의미를 완전히 다른 맥락으로 왜곡","translation":"영화 배급 방식의 사소한 불일치"},{"text":"a sharp divide between adult and child viewers","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: crossover(교차·중복)를 divide(분리)로 반의어 대체하여 의미 완전히 반전","translation":"성인과 아동 시청자 사이의 뚜렷한 분리"}],"sourceQuestion":"1번 지문"},{"keyExpression":"The myna bird acts as a cleaner for the elephant by eating parasites such as lice or ticks that irritate its skin","passage":"The myna bird acts as a cleaner for the elephant by eating parasites such as lice or ticks that irritate its skin. Meanwhile, the elephant offers the bird a food source and a safe haven from predators.","passageTranslation":"마이나 새는 코끼리의 피부를 자극하는 이나 진드기 같은 기생충을 먹음으로써 코끼리를 위한 청소부 역할을 한다. 한편, 코끼리는 새에게 먹이 공급원과 포식자로부터의 안전한 피난처를 제공한다.","qType":"correct","questionText":"'The myna bird acts as a cleaner for the elephant by eating parasites such as lice or ticks that irritate its skin'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"the myna bird spreads parasites that benefit the elephant's skin","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: eating parasites(기생충을 먹음)를 spreads parasites(기생충을 퍼뜨림)로, irritate(자극하다)를 benefit(이익을 주다)으로 바꿔 의미 완전 왜곡","translation":"마이나 새는 코끼리의 피부에 이로운 기생충을 퍼뜨린다"},{"text":"by consuming parasites on the elephant, the bird serves a cleaning role","isCorrect":true,"optionType":"correct","explanation":"올바름: by eating parasites와 acts as a cleaner의 인과 구조를 그대로 유지하며 주어를 재배치하여 paraphrasing","translation":"코끼리의 기생충을 먹음으로써 새는 청소 역할을 수행한다"},{"text":"the elephant protects the myna bird from skin diseases","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: 주어와 목적어를 역전시키고(코끼리→새), 행위 방향도 인과 역전하여 원래 의미를 왜곡","translation":"코끼리는 마이나 새를 피부 질병으로부터 보호한다"}],"sourceQuestion":"3번 지문"},{"keyExpression":"corresponds with a broader, international embrace","passage":"This phenomenon corresponds with a broader, international embrace of what is seemingly children's culture among audiences of diverse ages.","passageTranslation":"이 현상은 다양한 연령대의 관객들 사이에서 겉보기에 아동 문화인 것에 대한 더 광범위하고 국제적인 수용과 일치한다.","qType":"correct","questionText":"'corresponds with a broader, international embrace'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"contradicts the global rejection of mainstream culture","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: corresponds with(일치함)를 contradicts(모순됨)로, embrace(수용)를 rejection(거부)으로 이중 반의어 대체하여 의미 완전 반전","translation":"주류 문화에 대한 세계적 거부와 모순된다"},{"text":"reflects a growing worldwide appreciation","isCorrect":true,"optionType":"correct","explanation":"올바름: corresponds correct","questionText":"'what is seemingly children's culture'을(를) 잘못 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"forms of entertainment typically labeled as child-oriented","isCorrect":false,"optionType":"correct","explanation":"올바름: seemingly children's culture를 typically labeled as child-oriented forms of entertainment로 구체화하여 핵심 의미 동일","translation":"전형적으로 아동 지향적이라고 분류되는 오락의 형태들"},{"text":"culture that children themselves have independently created","isCorrect":true,"optionType":"incorrect","explanation":"잘못됨: children's culture(아동 대상 문화)를 children themselves have independently created(아이들이 스스로 창작한 것)로 행위 주체를 바꿔 의미 왜곡","translation":"아이들 스스로가 독립적으로 창조한 문화"},{"text":"content that appears on the surface to be made for kids","isCorrect":false,"optionType":"correct","explanation":"올바름: seemingly를 appears on the surface로 풀어쓰고 children's culture를 content made for kids로 구체화하여 의미 보존","translation":"표면적으로 아이들을 위해 만들어진 것처럼 보이는 콘텐츠"},{"text":"material conventionally perceived as belonging to childhood","isCorrect":false,"optionType":"correct","explanation":"올바름: seemingly를 conventionally perceived as로, children's culture를 belonging to childhood로 재표현하여 의미 유지","translation":"전통적으로 아동기에 속하는 것으로 인식되는 소재"}],"sourceQuestion":"1번 지문"},{"keyExpression":"Symbiotic, or mutualistic, relationships occur in nature when two species interact in ways that benefit each other","passage":"Symbiotic, or mutualistic, relationships occur in nature when two species interact in ways that benefit each other.","passageTranslation":"공생, 즉 상리적 관계는 두 종이 서로에게 이익이 되는 방식으로 상호작용할 때 자연에서 나타난다.","qType":"correct","questionText":"'Symbiotic, or mutualistic, relationships occur in nature when two species interact in ways that benefit each other'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"mutual partnerships in the natural world arise when two organisms engage in mutually advantageous exchanges","isCorrect":true,"optionType":"correct","explanation":"올바름: symbiotic/mutualistic→mutual partnerships, benefit each other→mutually advantageous exchanges로 개념 정의를 정확히 paraphrase","translation":"자연계에서 상호적 관계는 두 유기체가 서로 유익한 교환에 참여할 때 발생한다"},{"text":"mutualistic relationships only exist between members of the same species","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: two species(두 종)를 same species(같은 종)으로 대체하여 조건 자체를 왜곡","translation":"상리적 관계는 같은 종의 개체들 사이에서만 존재한다"},{"text":"symbiotic relationships form when one species exploits another for its exclusive gain","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: benefit each other(서로 이익)를 exclusive gain(일방적 이익)으로 대체하여 기생 관계로 의미 왜곡","translation":"공생 관계는 한 종이 자신만의 이익을 위해 다른 종을 이용할 때 형성된다"}],"sourceQuestion":"2번 지문"},{"keyExpression":"Delicately perched on the tip of the elephant's tusk is a small black myna bird","passage":"Delicately perched on the tip of the elephant's tusk is a small black myna bird. Framed against smoky green foliage, the bird and elephant look at each other almost as if sharing a silent moment in mutual respect.","passageTranslation":"코끼리 상아의 끝에 작은 검은 마이나 새가 섬세하게 앉아 있다. 연기처럼 뿌연 녹색 잎들을 배경으로, 새와 코끼리는 마치 서로 조용한 순간을 상호 존중 속에 나누는 것처럼 서로를 바라보고 있다.","qType":"correct","questionText":"'Delicately perched on the tip of the elephant's tusk is a small black myna bird'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"a large colorful bird gripping the middle of the tusk","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: small(작은)을 large(큰)로, tip(끝)을 middle(가운데)로 바꿔 위치·크기 정보를 모두 왜곡","translation":"상아 가운데를 움켜쥔 크고 화려한 새"},{"text":"a small myna bird carefully balanced on the tusk's end","isCorrect":true,"optionType":"correct","explanation":"올바름: delicately perched의 함축(조심스럽게 균형을 잡고 앉은)을 carefully balanced로 구체화","translation":"상아 끝에 조심스럽게 균형을 잡고 있는 작은 마이나 새"},{"text":"a myna bird flying away from the elephant's tusk","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: perched(앉아 있는)를 flying away(날아가는)로 동작 방향을 완전히 반전시켜 의미 왜곡","translation":"코끼리 상아에서 날아가는 마이나 st-shrouded image shows a lone elephant standing behind a tree covered in haze","passage":"Taken by wildlife photographer Shaaz Jung in the jungles of South India, the mist-shrouded image shows a lone elephant standing behind a tree covered in haze.","passageTranslation":"남인도 정글에서 야생동물 사진작가 샤아즈 정이 촬영한 이 안개에 싸인 사진은 안개로 뒤덮인 나무 뒤에 홀로 서 있는 코끼리 한 마리를 보여준다.","qType":"correct","questionText":"'mist-shrouded image shows a lone elephant standing behind a tree covered in haze'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"a single elephant barely visible through the fog","isCorrect":true,"optionType":"correct","explanation":"올바름: lone + mist-shrouded의 결합 의미를 barely visible로 함축 재구성","translation":"안개 사이로 간신히 보이는 한 마리의 코끼리"},{"text":"an elephant emerging from the mist toward the camera","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: standing behind a tree를 toward the camera로 방향·위치 정보를 임의로 변경하여 원래 구도 의미 왜곡","translation":"안개에서 나와 카메라 쪽으로 다가오는 코끼리"},{"text":"a group of elephants clearly seen in bright sunlight","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: lone(혼자)을 group으로, mist-shrouded(안개 낀)를 bright sunlight로 반의어 대체하여 의미 완전 왜곡","translation":"밝은 햇빛 속에서 선명하게 보이는 코끼리 무리"}],"sourceQuestion":"3번 지문"},{"keyExpression":"the beauty of relationships in Shaaz Jung's photograph lies in the cooperation that helps species survive in the wild","passage":"In the end, the beauty of relationships in Shaaz Jung's photograph lies in the cooperation that helps species survive in the wild.","passageTranslation":"결국, 샤즈 정의 사진 속 관계의 아름다움은 야생에서 종들이 생존하는 데 도움을 주는 협력에 있다.","qType":"incorrect","questionText":"'the beauty of relationships in Shaaz Jung's photograph lies in the cooperation that helps species survive in the wild'을(를) 잘못 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"the profound value of the photo's depicted relationships stems from how joint effort sustains life in natural habitats","isCorrect":false,"optionType":"correct","explanation":"올바름: b 게 먹이터이자 위협으로부터의 피난처 역할을 한다"},{"text":"by hosting the bird, the elephant grants it both a feeding opportunity and shelter from danger","isCorrect":true,"optionType":"correct","explanation":"올바름: food source→feeding opportunity, safe haven→shelter from danger로 코끼리가 제공하는 두 가지 혜택을 모두 보존","translation":"새를 받아들임으로써 코끼리는 새에게 먹이 기회와 위험으로부터의 피난처를 동시에 부여한다"},{"text":"the elephant seeks food and protection from predators by relying on the bird","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: 제공자와 수혜자가 역전되어, 코끼리가 새에게 보호를 받는다는 의미로 왜곡","translation":"코끼리는 새에 의존하여 먹이와 포식자로부터의 보호를 구한다"}],"sourceQuestion":"2번 지문"},{"keyExpression":"consumed by audiences of all ages","passage":"films supposedly made for children have always been consumed by audiences of all ages, particularly in commercial cinemas.","passageTranslation":"아이들을 위해 만들어졌다고 여겨지는 영화들은 특히 상업 영화관에서 항상 모든 연령대의 관객들에 의해 소비되어 왔다.","qType":"correct","questionText":"'consumed by audiences of all ages'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"restricted to child audiences in theatrical settings","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: all ages를 child audiences로 축소하고 consumed를 restricted로 대체하여 원문의 의미를 반전","translation":"극장 환경에서 아동 관객에게만 제한된다"},{"text":"attracting a broadly age-diverse viewership","isCorrect":true,"optionType":"correct","explanation":"올바름: all ages를 age-diverse로 압축하고 consumed를 attracting a viewership으로 재구성하여 의미 동일","translation":"폭넓게 연령이 다양한 시청자층을 끌어들인다"},{"text":"produced exclusively for younger demographics","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: consumed(소비)를 produced(제작)로 바꾸고 all ages를 younger demographics로 반전시켜 의미 왜곡","translation":"오로지 젊은 인구 계층을 위해 제작된다"},{"text":"watched and enjoyed by viewers across every age group","isCorrect":true,"optionType":"correct","explanation":"올바름: consumed를 watched and enjoyed로, audiences of all ages를 viewers across every age group으로 구체화하여 의미 보존","translation":"모든 연령대의 시청자들에 의해 관람되고 즐겨진다"}],"sourceQuestion":"1번 지문"},{"keyExpression":"the bird and elephant look at each other almost as if sharing a silent moment in mutual respect","passage":"Framed against smoky green foliage, the bird and elephant look at each other almost as if sharing a silent moment in mutual respect. The photo beautifully illustrates a mutualistic relationship between two different species.","passageTranslation":"연기처럼 뿌연 녹색 잎들을 배경으로, 새와 코끼리는 마치 서로 조용한 순간을 상호 존중 속에 나누는 것처럼 서로를 바라보고 있다. 이 사진은 서로 다른 두 종 사이의 공생 관계를 아름답게 보여준다.","qType":"correct","questionText":"'the bird and elephant look at each other almost as if sharing a silent moment in mutual respect'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"the two creatures seem to acknowledge each other quietly","isCorrect":true,"optionType":"correct","explanation":"올바름: mutual respect의 함축과 silent moment를 acknowledge each other quietly로 재구성하여 의미 보존","translation":"두 생물이 서로를 조용히 인정하는 것처럼 보임"},{"text":"both appear to be engaged in a wordless exchange of recognition","isCorrect":true,"optionType":"correct","explanation":"올바름: silent moment를 wordless exchange로, mutual respect를 recognition으로 추상→구체 전환하여 의미 유지","translation":"둘 다 말 없는 상호 인식의 교환에 참여하는 것처럼 보임"},{"text":"the two animals ignore each other in an awkward silence","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: look at each other(서로를 바라보다)를 ignore(무시하다)로 바꾸고, mutual respect를 awkward silence로 대체하여 관계의 의미를 왜곡","translation":"두 동물은 어색한 침묵 속에서 서로를 무시한다"},{"text":"the bird and elephant compete fiercely for dominance","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: mutual respect(상호 존중)를 compete for dominance(지배를 위한 경쟁)로 관계의 성격을 완전히 반전시켜 의미 왜곡","translation":"새와 코끼리는 지배권을 위해 치열하게 경쟁한다"}],"sourceQuestion":"3번 지문"},{"keyExpression":"human activities are putting pressure on nature and upsetting the balance of ecosystems","passage":"However, human activities are putting pressure on nature and upsetting the balance of ecosystems. As a result, many species are declining, and some are now threatened with extinction.","passageTranslation":"그러나 인간의 활동이 자연에 압력을 가하고 생태계의 균형을 깨뜨리고 있다. 그 결과, 많은 종이 감소하고 있으며 일부는 이제 멸종 위기에 처해 있다.","qType":"correct","questionText":"'human activities are putting pressure on nature and upsetting the balance of ecosystems'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"nature is adapting successfully to the changes caused by human progress","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: 원문의 부정적 영향(pressure, upsetting)을 adapting successfully로 바꾸어 인간 활동에 의한 피해를 자연의 적응으로 왜곡","translation":"자연은 인간의 발전으로 인한 변화에 성공적으로 적응하고 있다"},{"text":"what humans do is disturbing natural ecosystems and destabilizing their balance","isCorrect":true,"optionType":"correct","explanation":"올바름: human activities를 what humans do로, putting pressure + upsetting the balance를 disturbing + destabilizing으로 재표현하여 인과 구조와 의미 유지","translation":"인간이 하는 행동은 자연 생태계를 교란하고 균형을 불안정하게 만들고 있다"},{"text":"the actions of people are straining the natural world and disrupting ecological harmony","isCorrect":true,"optionType":"correct","explanation":"올바름: human activities를 actions of people로, putting pressure를 straining으로, upsetting the balance of ecosystems를 disrupting ecological harmony로 각각 대응하여 의미 보존","translation":"사람들의 행동이 자연계에 부담을 주고 생태적 조화를 방해하고 있다"},{"text":"human activities are helping restore the balance of damaged ecosystems","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: putting pressure on + upsetting the balance를 helping restore the balance로 완전히 반대되는 의미로 대체하여 인과 방향을 역전","translation":"인간의 활동이 손상된 생태계의 균형 회복을 돕고 있다"}],"sourceQuestion":"3번 지문"},{"keyExpression":"mist-shrouded image shows a lone elephant standing behind a tree covered in haze","passage":"Taken by wildlife photographer Shaaz Jung in the jungles of South India, the mist-shrouded image shows a lone elephant standing behind a tree covered in haze.","passageTranslation":"남인도 정글에서 야생동물 사진작가 샤아즈 정이 촬영한 이 안개에 싸인 사진은 안개로 뒤덮인 나무 뒤에 홀로 서 있는 코끼리 한 마리를 보여준다.","qType":"correct","questionText":"'mist-shrouded image shows a lone elephant standing behind a tree covered in haze'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"an elephant partially obscured by thick mist in the wild","isCorrect":true,"optionType":"correct","explanation":"올바름: covered in haze의 함축 의미를 partially obscured by thick mist로 구체화하여 표현","translation":"짙은 안개로 인해 일부 가려진 야생 속 코끼리"},{"text":"a group of elephants clearly seen in bright sunlight","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: lone(혼자)을 group으로, mist-shrouded(안개 낀)를 bright sunlight로 반의어 대체하여 의미 완전 왜곡","translation":"밝은 햇빛 속에서 선명하게 보이는 코끼리 무리"},{"text":"an elephant emerging from the mist toward the camera","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: standing behind a tree를 toward the camera로 방향·위치 정보를 임의로 변경하여 원래 구도 의미 왜곡","translation":"안개에서 나와 카메라 쪽으로 다가오는 코끼리"},{"text":"a solitary elephant hidden in foggy surroundings","isCorrect":true,"optionType":"correct","explanation":"올바름: mist-shrouded/haze를 foggy로, lone을 solitary로 추상↔구체 전환하여 의미 유지","translation":"안개 낀 환경 속에 홀로 있는 코끼리"}],"sourceQuestion":"3번 지문"},{"keyExpression":"human activities are putting pressure on nature and upsetting the balance of ecosystems","passage":"However, human activities are putting pressure on nature and upsetting the balance of ecosystems. As a result, many species are declining, and some are now threatened with extinction.","passageTranslation":"그러나 인간 활동이 자연에 압박을 가하고 생태계의 균형을 무너뜨리고 있다. 그 결과, 많은 종이 감소하고 있으며 일부는 이제 멸종 위협에 처해 있다.","qType":"correct","questionText":"'human activities are putting pressure on nature and upsetting the balance of ecosystems'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"human-driven forces are imposing stress on the natural world and throwing ecosystems out of balance","isCorrect":true,"optionType":"correct","explanation":"올바름: human activities→human-driven forces, putting pressure→imposing stress, upsetting→throwing out of balance로 의미를 다른 어휘·구조로 충실히 재현","translation":"인간이 주도하는 힘들이 자연계에 스트레스를 가하고 생태계의 균형을 무너뜨리고 있다"},{"text":"nature is independently recovering from pressure without any human interference","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: human activities putting pressure(인간이 압박을 가함)를 부정하고 인간의 역할을 제거함으로써 핵심 주장을 완전히 역전","translation":"자연은 인간의 어떠한 개입 없이 스스로 압박에서 회복하고 있다"},{"text":"human activities are gradually restoring the balance of ecosystems in various regions","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: upsetting the balance(균형 파괴)를 restoring the balance(균형 회복)으로 결과를 정반대로 왜곡","translation":"인간 활동이 다양한 지역에서 생태계의 균형을 점진적으로 회복시키고 있다"}],"sourceQuestion":"2번 지문"},{"keyExpression":"Delicately perched on the tip of the elephant's tusk is a small black myna bird","passage":"Delicately perched on the tip of the elephant's tusk is a small black myna bird. Framed against smoky green foliage, the bird and elephant look at each other almost as if sharing a silent moment in mutual respect.","passageTranslation":"코끼리 상아의 끝에 작은 검은 마이나 새가 섬세하게 앉아 있다. 연기처럼 뿌연 녹색 잎들을 배경으로, 새와 코끼리는 마치 서로 조용한 순간을 상호 존중 속에 나누는 것처럼 서로를 바라보고 있다.","qType":"correct","questionText":"'Delicately perched on the tip of the elephant's tusk is a small black myna bird'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"a myna bird flying away from the elephant's tusk","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: perched(앉아 있는)를 flying away(날아가는)로 동작 방향을 완전히 반전시켜 의미 왜곡","translation":"코끼리 상아에서 날아가는 마이나 새"},{"text":"a tiny myna bird resting gently at the edge of the tusk","isCorrect":true,"optionType":"correct","explanation":"올바름: delicately perched를 resting gently로, tip을 edge로 유의어 대체하여 의미 유지","translation":"상아 끝에 살며시 앉아 있는 작은 마이나 새"},{"text":"a large colorful bird gripping the middle of the tusk","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: small(작은)을 large(큰)로, tip(끝)을 middle(가운데)로 바꿔 위치·크기 정보를 모두 왜곡","translation":"상아 가운데를 움켜쥔 크고 화려한 새"}],"sourceQuestion":"3번 지문"},{"keyExpression":"what is seemingly children's culture","passage":"This phenomenon corresponds with a broader, international embrace of what is seemingly children's culture among audiences of diverse ages.","passageTranslation":"이 현상은 다양한 연령대의 관객들 사이에서 겉보기에 아동 문화인 것에 대한 더 광범위하고 국제적인 수용과 일치한다.","qType":"correct","questionText":"'what is seemingly children's culture'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"material conventionally perceived as belonging to childhood","isCorrect":true,"optionType":"correct","explanation":"올바름: seemingly를 conventionally perceived as로, children's culture를 belonging to childhood로 재표현하여 의미 유지","translation":"전통적으로 아동기에 속하는 것으로 인식되는 소재"},{"text":"content that is exclusively and definitively for children","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: seemingly(겉보기에)의 불확실성·외관 의미를 제거하고 exclusively and definitively(배타적이고 확정적으로)로 대체하여 의미 반전","translation":"배타적으로 그리고 확정적으로 아이들만을 위한 콘텐츠"},{"text":"content that appears on the surface to be made for kids","isCorrect":true,"optionType":"correct","explanation":"올바름: seemingly를 appears on the surface로 풀어쓰고 children's culture를 content made for kids로 구체화하여 의미 보존","translation":"표면적으로 아이들을 위해 만들어진 것처럼 보이는 콘텐츠"},{"text":"culture that children themselves have independently created","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: children's culture(아동 대상 문화)를 children themselves have independently created(아이들이 스스로 창작한 것)로 행위 주체를 바꿔 의미 왜곡","translation":"아이들 스스로가 독립적으로 창조한 문화"}],"sourceQuestion":"1번 지문"},{"keyExpression":"These birds often perch on the backs of rhinos, oxen, and other large mammals and pick off insects","passage":"These birds often perch on the backs of rhinos, oxen, and other large mammals and pick off insects.","passageTranslation":"이 새들은 코뿔소, 황소 및 다른 대형 포유류의 등에 자주 앉아 곤충을 골라 먹는다.","qType":"correct","questionText":"'These birds often perch on the backs of rhinos, oxen, and other large mammals and pick off insects'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"these birds chase away rhinos and oxen to protect their nesting grounds","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: perch on(위에 앉음)을 chase away(쫓아냄)로, 협력 관계를 경쟁 관계로 완전히 왜곡","translation":"이 새들은 둥지 영역을 보호하기 위해 코뿔소와 황소를 쫓아낸다"},{"text":"these birds regularly rest on the surfaces of large mammals like rhinos to consume their parasitic insects","isCorrect":true,"optionType":"correct","explanation":"올바름: perch→rest on surfaces, pick off insects→consume parasitic insects로 먹이 섭취 행위와 위치를 정확히 paraphrase","translation":"이 새들은 코뿔소 같은 대형 포유류의 표면에 규칙적으로 앉아 기생 곤충을 먹는다"},{"text":"large mammals such as rhinos deliberately feed insects to the birds as a defensive strategy","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: 새가 스스로 곤충을 먹는 것을 포유류가 의도적으로 곤충을 먹인다는 방향으로 인과와 주체를 역전","translation":"코뿔소 같은 대형 포유류는 방어 전략으로 의도적으로 새에게 곤충을 먹인다"},{"text":"these birds habitually land on large animals such as rhinos and oxen to feed on insects","isCorrect":true,"optionType":"correct","explanation":"올바름: often perch→habitually land, pick off→feed on으로 장소와 행동을 정확히 paraphrase","translation":"이 새들은 먹이를 먹기 위해 코뿔소나 황소 같은 큰 동물 위에 습관적으로 내려앉는다"}],"sourceQuestion":"2번 지문"},{"keyExpression":"not supported by the realities of consumption","passage":"The old prejudice that children's film is some other realm, separate from (and forever subordinate to) a more legitimate cinema for adults is not supported by the realities of consumption.","passageTranslation":"아동 영화가 어른을 위한 보다 정통한 영화로부터 분리된 (그리고 영원히 종속된) 또 다른 영역이라는 오래된 편견은 소비의 현실에 의해 지지되지 않는다.","qType":"incorrect","questionText":"'not supported by the realities of consumption'을(를) 잘못 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"irrelevant to any discussion of film distribution strategies","isCorrect":true,"optionType":"incorrect","explanation":"잘못됨: realities of consumption(소비의 현실)을 film distribution strategies(배급 전략)로 대체하고 not supported를 irrelevant로 바꿔 논리 구조를 완전히 다른 맥락으로 왜곡","translation":"영화 배급 전략에 관한 어떠한 논의와도 무관하다"},{"text":"undermined by the evidence of how people actually watch films","isCorrect":false,"optionType":"correct","explanation":"올바름: not supported를 undermined로, realities of consumption을 evidence of how people actually watch films로 풀어쓰며 의미 유지","translation":"사람들이 실제로 영화를 보는 방식에 관한 증거에 의해 약화된다"},{"text":"disproved by observable patterns of audience engagement","isCorrect":false,"optionType":"correct","explanation":"올바름: not supported by를 disproved by로, realities of consumption을 observable patterns of audience engagement로 재표현하여 핵심 의미 동일","translation":"관찰 가능한 관객 참여 패턴에 의해 반증된다"},{"text":"contradicted by the actual viewing habits of audiences","isCorrect":false,"optionType":"correct","explanation":"올바름: not supported by를 contradicted by로, realities of consumption을 actual viewing habits of audiences로 구체화하여 의미 보존","translation":"관객들의 실제 관람 습관에 의해 반박된다"},{"text":"confirmed by the consistent trends in how audiences consume media","isCorrect":true,"optionType":"incorrect","explanation":"잘못됨: not supported(지지되지 않음)를 confirmed(확인됨)로 반의어 대체하여 논리 방향을 완전히 반전","translation":"관객들이 미디어를 소비하는 방식의 일관된 추세에 의해 확인된다"}],"sourceQuestion":"1번 지문"},{"keyExpression":"human activities are putting pressure on nature and upsetting the balance of ecosystems","passage":"However, human activities are putting pressure on nature and upsetting the balance of ecosystems. As a result, many species are declining, and some are now threatened with extinction.","passageTranslation":"그러나 인간 활동이 자연에 압박을 가하고 생태계의 균형을 무너뜨리고 있다. 그 결과, 많은 종이 감소하고 있으며 일부는 이제 멸종 위협에 처해 있다.","qType":"incorrect","questionText":"'human activities are putting pressure on nature and upsetting the balance of ecosystems'을(를) 잘못 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"actions taken by humans are straining natural environments and disrupting ecological equilibrium","isCorrect":false,"optionType":"correct","explanation":"올바름: putting pressure→straining, upsetting the balance→disrupting ecological equilibrium으로 인간의 부정적 영향을 정확히 paraphrase","translation":"인간이 취하는 행동들이 자연환경에 부담을 주고 생태적 균형을 무너뜨리고 있다"},{"text":"the impact of human behavior is destabilizing ecosystems by disturbing their natural balance","isCorrect":false,"optionType":"correct","explanation":"올바름: putting pressure→impact/destabilizing, upsetting the balance→disturbing their natural balance로 원인-결과 구조를 보존","translation":"인간 행동의 영향이 자연의 균형을 교란함으로써 생태계를 불안정하게 만들고 있다"},{"text":"human-driven forces are imposing stress on the natural world and throwing ecosystems out of balance","isCorrect":false,"optionType":"correct","explanation":"올바름: human activities→human-driven forces, putting pressure→imposing stress, upsetting→throwing out of balance로 의미를 다른 어휘·구조로 충실히 재현","translation":"인간이 주도하는 힘들이 자연계에 스트레스를 가하고 생태계의 균형을 무너뜨리고 있다"},{"text":"human activities are gradually restoring the balance of ecosystems in various regions","isCorrect":true,"optionType":"incorrect","explanation":"잘못됨: upsetting the balance(균형 파괴)를 restoring the balance(균형 회복)으로 결과를 정반대로 왜곡","translation":"인간 활동이 다양한 지역에서 생태계의 균형을 점진적으로 회복시키고 있다"}],"sourceQuestion":"2번 지문"},{"keyExpression":"attracted 59 per cent of theatrical admissions","passage":"in 2007, eleven Danish children's and youth films attracted 59 per cent of theatrical admissions, and in 2014, German children's films comprised seven out of the top twenty films at the national box office.","passageTranslation":"2007년에 덴마크 아동·청소년 영화 11편이 극장 입장객의 59퍼센트를 끌어들였고, 2014년에는 독일 아동 영화들이 전국 박스오피스 상위 20개 작품 중 7편을 차지했다.","qType":"correct","questionText":"'attracted 59 per cent of theatrical admissions'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"generated 59 per cent of total film production costs","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: theatrical admissions(극장 입장 수)를 film production costs(제작 비용)로 대체하여 수익·흥행 맥락을 제작 비용 맥락으로 왜곡","translation":"전체 영화 제작 비용의 59퍼센트를 발생시켰다"},{"text":"drew the majority of moviegoers to the box office","isCorrect":true,"optionType":"correct","exp
