on":"코끼리는 새에게 먹이터이자 위협으로부터의 피난처 역할을 한다"},{"text":"the elephant provides the bird with nourishment and protection against natural enemies","isCorrect":false,"optionType":"correct","explanation":"올바름: food source→nourishment, safe haven from predators→protection against natural enemies로 상호 이익의 내용을 정확히 재표현","translation":"코끼리는 새에게 먹이와 천적으로부터의 보호를 제공한다"},{"text":"by hosting the bird, the elephant grants it both a feeding opportunity and shelter from danger","isCorrect":false,"optionType":"correct","explanation":"올바름: food source→feeding opportunity, safe haven→shelter from danger로 코끼리가 제공하는 두 가지 혜택을 모두 보존","translation":"새를 받아들임으로써 코끼리는 새에게 먹이 기회와 위험으로부터의 피난처를 동시에 부여한다"}],"sourceQuestion":"2번 지문"},{"keyExpression":"what is seemingly children's culture","passage":"This phenomenon corresponds with a broader, international embrace of what is seemingly children's culture among audiences of diverse ages.","passageTranslation":"이 현상은 다양한 연령대의 관객들 사이에서 겉보기에 아동 문화인 것에 대한 더 광범위하고 국제적인 수용과 일치한다.","qType":"correct","questionText":"'what is seemingly children's culture'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"forms of entertainment typically labeled as child-oriented","isCorrect":true,"optionType":"correct","explanation":"올바름: seemingly children's culture를 typically labeled as child-oriented forms of entertainment로 구체화하여 핵심 의미 동일","translation":"전형적으로 아동 지향적이라고 분류되는 오락의 형태들"},{"text":"content that is exclusively and definitively for children","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: seemingly(겉보기에)의 불확실성·외관 의미를 제거하고 exclusively and definitively(배타적이고 확정적으로)로 대체하여 의미 반전","translation":"배타적으로 그리고 확정적으로 아이들만을 위한 콘텐츠"},{"text":"culture that children themselves have independently created","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: children's culture(아동 대상 문화)를 children themselves have independently created(아이들이 스스로 창작한 것)로 행위 주체를 바꿔 의미 왜곡","translation":"아이들 스스로가 독립적으로 창조한 문화"}],"sourceQuestion":"1번 지문"},{"keyExpression":"corresponds with a broader, international embrace","passage":"This phenomenon corresponds with a broader, international embrace of what is seemingly children's culture among audiences of diverse ages.","passageTranslation":"이 현상은 다양한 연령대의 관객들 사이에서 겉보기에 아동 문화인 것에 대한 더 광범위하고 국제적인 수용과 일치한다.","qType":"correct","questionText":"'corresponds with a broader, international embrace'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"results from a decline in international film funding","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: corresponds with(상관관계)를 results from(인과관계)으로 논리 구조를 바꾸고 embrace를 decline로 반전시켜 의미 왜곡","translation":"국제 영화 자금 지원의 감소에서 비롯된다"},{"text":"is consistent with an expanding cross-border enthusiasm","isCorrect":true,"optionType":"correct","explanation":"올바름: corresponds with를 is consistent with로, broader international embrace를 expanding cross-border enthusiasm으로 재구성하여 핵심 의미 동일","translation":"확장되는 국경을 초월한 열의와 일치한다"},{"text":"contradicts the global rejection of mainstream culture","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: corresponds with(일치함)를 contradicts(모순됨)로, embrace(수용)를 rejection(거부)으로 이중 반의어 대체하여 의미 완전 반전","translation":"주류 문화에 대한 세계적 거부와 모순된다"}],"sourceQuestion":"1번 지문"},{"keyExpression":"the beauty of relationships in Shaaz Jung's photograph lies in the cooperation that helps species survive in the wild","passage":"In the end, the beauty of relationships in Shaaz Jung's photograph lies in the cooperation that helps species survive in the wild.","passageTranslation":"결국, 샤즈 정의 사진 속 관계의 아름다움은 야생에서 종들이 생존하는 데 도움을 주는 협력에 있다.","qType":"correct","questionText":"'the beauty of relationships in Shaaz Jung's photograph lies in the cooperation that helps species survive in the wild'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"Shaaz Jung's photo illustrates how species in the wild inevitably harm one another to survive","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: cooperation(협력)을 harm one another(서로 해침)으로 대체하여 공생을 적대 관계로 완전히 왜곡","translation":"샤즈 정의 사진은 야생의 종들이 생존하기 위해 필연적으로 서로를 해치는 방식을 보여준다"},{"text":"the photograph's artistic value is diminished by the competitive struggle between species for dominance","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: beauty lies in cooperation(협력의 아름다움)을 competitive struggle(경쟁적 투쟁)으로 반대 개념으로 대체하여 의미 역전","translation":"사진의 예술적 가치는 지배를 위한 종들 간의 경쟁적 투쟁으로 감소된다"},{"text":"the profound value of the photo's depicted relationships stems from how joint effort sustains life in natural habitats","isCorrect":true,"optionType":"correct","explanation":"올바름: beauty→profound value, cooperation→joint effort, survive in the wild→sustains life in natural habitats로 함축된 주장을 논리적으로 paraphrase","translation":"사진에 묘사된 관계의 깊은 가치는 자연 서식지에서 공동의 노력이 생명을 지속시키는 방식에서 비롯된다"}],"sourceQuestion":"2번 지문"},{"keyExpression":"Symbiotic, or mutualistic, relationships occur in nature when two species interact in ways that benefit each other","passage":"Symbiotic, or mutualistic, relationships occur in nature when two species interact in ways that benefit each other. One species might get food or protection, and the other might receive cleaning, warning signals, or assistance that helps it survive.","passageTranslation":"공생적, 즉 상리공생적 관계는 두 종이 서로에게 이익이 되는 방식으로 상호작용할 때 자연에서 발생한다. 한 종은 먹이나 보호를 얻을 수 있고, 다른 종은 청소, 경고 신호, 또는 생존에 도움이 되는 지원을 받을 수 있다.","qType":"correct","questionText":"'Symbiotic, or mutualistic, relationships occur in nature when two species interact in ways that benefit each other'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"two species compete with each other to form mutualistic bonds in nature","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: interact in ways that benefit each other를 compete with each other로 대체하여 협력 관계를 경쟁 관계로 의미 역전","translation":"두 종은 자연에서 공생적 유대를 형성하기 위해 서로 경쟁한다"},{"text":"symbiotic relationships develop when one species dominates another","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: benefit each other(서로 이익)를 one species dominates another(일방적 지배)로 바꿔 상호성의 핵심 의미를 완전히 왜곡","translation":"공생 관계는 한 종이 다른 종을 지배할 때 발전한다"},{"text":"when two species help one another through their relationship, symbiosis occurs","isCorrect":true,"optionType":"correct","explanation":"올바름: interact in ways that benefit each other를 help one another through their relationship으로 바꾸고, occur를 유지하여 조건-결과 구조 보존","translation":"두 종이 관계를 통해 서로를 도울 때 공생이 발생한다"}],"sourceQuestion":"3번 지문"},{"keyExpression":"These birds often perch on the backs of rhinos, oxen, and other large mammals and pick off insects","passage":"These birds often perch on the backs of rhinos, oxen, and other large mammals and pick off insects.","passageTranslation":"이 새들은 코뿔소, 황소 및 다른 대형 포유류의 등에 자주 앉아 곤충을 골라 먹는다.","qType":"incorrect","questionText":"'These birds often perch on the backs of rhinos, oxen, and other large mammals and pick off insects'을(를) 잘못 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"it is common for these birds to settle on the bodies of large herbivores and remove insects from them","isCorrect":false,"optionType":"correct","explanation":"올바름: often→common, perch on→settle on, pick off→remove로 동일한 공생 행동을 재표현","translation":"이 새들이 대형 초식동물의 몸에 앉아 곤충을 제거하는 것은 흔한 일이다"},{"text":"these birds habitually land on large animals such as rhinos and oxen to feed on insects","isCorrect":false,"optionType":"correct","explanation":"올바름: often perch→habitually land, pick off→feed on으로 장소와 행동을 정확히 paraphrase","translation":"이 새들은 먹이를 먹기 위해 코뿔소나 황소 같은 큰 동물 위에 습관적으로 내려앉는다"},{"text":"these birds regularly rest on the surfaces of large mammals like rhinos to consume their parasitic insects","isCorrect":false,"optionType":"correct","explanation":"올바름: perch→rest on surfaces, pick off insects→consume parasitic insects로 먹이 섭취 행위와 위치를 정확히 paraphrase","translation":"이 새들은 코뿔소 같은 대형 포유류의 표면에 규칙적으로 앉아 기생 곤충을 먹는다"},{"text":"large mammals such as rhinos deliberately feed insects to the birds as a defensive strategy","isCorrect":true,"optionType":"incorrect","explanation":"잘못됨: 새가 스스로 곤충을 먹는 것을 포유류가 의도적으로 곤충을 먹인다는 방향으로 인과와 주체를 역전","translation":"코뿔소 같은 대형 포유류는 방어 전략으로 의도적으로 새에게 곤충을 먹인다"}],"sourceQuestion":"2번 지문"},{"keyExpression":"The myna bird acts as a cleaner for the elephant by eating parasites such as lice or ticks that irritate its skin","passage":"The myna bird acts as a cleaner for the elephant by eating parasites such as lice or ticks that irritate its skin. Meanwhile, the elephant offers the bird a food source and a safe haven from predators.","passageTranslation":"마이나 새는 코끼리의 피부를 자극하는 이나 진드기 같은 기생충을 먹음으로써 코끼리를 위한 청소부 역할을 한다. 한편, 코끼리는 새에게 먹이 공급원과 포식자로부터의 안전한 피난처를 제공한다.","qType":"incorrect","questionText":"'The myna bird acts as a cleaner for the elephant by eating parasites such as lice or ticks that irritate its skin'을(를) 잘못 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"the myna bird spreads parasites that benefit the elephant's skin","isCorrect":true,"optionType":"incorrect","explanation":"잘못됨: eating parasites(기생충을 먹음)를 spreads parasites(기생충을 퍼뜨림)로, irritate(자극하다)를 benefit(이익을 주다)으로 바꿔 의미 완전 왜곡","translation":"마이나 새는 코끼리의 피부에 이로운 기생충을 퍼뜨린다"},{"text":"the myna bird removes skin-irritating insects from the elephant","isCorrect":false,"optionType":"correct","explanation":"올바름: acts as a cleaner + eating parasites를 removes skin-irritating insects로 기능과 행위를 통합하여 의미 유지","translation":"마이나 새는 코끼리의 피부를 자극하는 곤충들을 제거한다"},{"text":"by consuming parasites on the elephant, the bird serves a cleaning role","isCorrect":false,"optionType":"correct","explanation":"올바름: by eating parasites와 acts as a cleaner의 인과 구조를 그대로 유지하며 주어를 재배치하여 paraphrasing","translation":"코끼리의 기생충을 먹음으로써 새는 청소 역할을 수행한다"},{"text":"the elephant protects the myna bird from skin diseases","isCorrect":true,"optionType":"incorrect","explanation":"잘못됨: 주어와 목적어를 역전시키고(코끼리→새), 행위 방향도 인과 역전하여 원래 의미를 왜곡","translation":"코끼리는 마이나 새를 피부 질병으로부터 보호한다"},{"text":"the bird helps the elephant by feeding on irritating pests on its body","isCorrect":false,"optionType":"correct","explanation":"올바름: lice or ticks(기생충)를 irritating pests로, acts as a cleaner를 helps로 재표현하여 관계 의미 보존","translation":"새는 코끼리 몸의 성가신 해충을 먹음으로써 코끼리를 돕는다"}],"sourceQuestion":"3번 지문"},{"keyExpression":"human activities are putting pressure on nature and upsetting the balance of ecosystems","passage":"However, human activities are putting pressure on nature and upsetting the balance of ecosystems. As a result, many species are declining, and some are now threatened with extinction.","passageTranslation":"그러나 인간의 활동이 자연에 압력을 가하고 생태계의 균형을 깨뜨리고 있다. 그 결과, 많은 종이 감소하고 있으며 일부는 이제 멸종 위기에 처해 있다.","qType":"correct","questionText":"'human activities are putting pressure on nature and upsetting the balance of ecosystems'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"human-caused interference is threatening the stability of natural environments","isCorrect":true,"optionType":"correct","explanation":"올바름: putting pressure on nature를 human-caused interference, upsetting the balance of ecosystems를 threatening the stability of natural environments로 추상→구체 전환하여 핵심 의미 재구성","translation":"인간이 초래한 간섭이 자연환경의 안정성을 위협하고 있다"},{"text":"nature is adapting successfully to the changes caused by human progress","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: 원문의 부정적 영향(pressure, upsetting)을 adapting successfully로 바꾸어 인간 활동에 의한 피해를 자연의 적응으로 왜곡","translation":"자연은 인간의 발전으로 인한 변화에 성공적으로 적응하고 있다"},{"text":"human activities are helping restore the balance of damaged ecosystems","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: putting pressure on + upsetting the balance를 helping restore the balance로 완전히 반대되는 의미로 대체하여 인과 방향을 역전","translation":"인간의 활동이 손상된 생태계의 균형 회복을 돕고 있다"}],"sourceQuestion":"3번 지문"},{"keyExpression":"Delicately perched on the tip of the elephant's tusk is a small black myna bird","passage":"Delicately perched on the tip of the elephant's tusk is a small black myna bird. Framed against smoky green foliage, the bird and elephant look at each other almost as if sharing a silent moment in mutual respect.","passageTranslation":"코끼리 상아의 끝에 작은 검은 마이나 새가 섬세하게 앉아 있다. 연기처럼 뿌연 녹색 잎들을 배경으로, 새와 코끼리는 마치 서로 조용한 순간을 상호 존중 속에 나누는 것처럼 서로를 바라보고 있다.","qType":"incorrect","questionText":"'Delicately perched on the tip of the elephant's tusk is a small black myna bird'을(를) 잘못 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"a small myna bird carefully balanced on the tusk's end","isCorrect":false,"optionType":"correct","explanation":"올바름: delicately perched의 함축(조심스럽게 균형을 잡고 앉은)을 carefully balanced로 구체화","translation":"상아 끝에 조심스럽게 균형을 잡고 있는 작은 마이나 새"},{"text":"a tiny myna bird resting gently at the edge of the tusk","isCorrect":false,"optionType":"correct","explanation":"올바름: delicately perched를 resting gently로, tip을 edge로 유의어 대체하여 의미 유지","translation":"상아 끝에 살며시 앉아 있는 작은 마이나 새"},{"text":"a myna bird lightly settled at the very tip of the ivory","isCorrect":false,"optionType":"correct","explanation":"올바름: delicately=lightly, perched=settled, tusk=ivory로 각각 대응하여 도치 구문 의미를 충실히 재현","translation":"상아의 바로 끝부분에 가볍게 내려앉은 마이나 새"},{"text":"a myna bird flying away from the elephant's tusk","isCorrect":true,"optionType":"incorrect","explanation":"잘못됨: perched(앉아 있는)를 flying away(날아가는)로 동작 방향을 완전히 반전시켜 의미 왜곡","translation":"코끼리 상아에서 날아가는 마이나 새"}],"sourceQuestion":"3번 지문"},{"keyExpression":"considerable crossover in audience composition","passage":"The considerable crossover in audience composition for children's films can be shown by the fact that, in 2007, eleven Danish children's and youth films attracted 59 per cent of theatrical admissions.","passageTranslation":"아동 영화의 관객 구성에서 나타나는 상당한 교차 현상은, 2007년에 덴마크 아동·청소년 영화 11편이 극장 입장객의 59퍼센트를 끌어들였다는 사실로 입증될 수 있다.","qType":"incorrect","questionText":"'considerable crossover in audience composition'을(를) 잘못 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"a substantial blending of viewers from various demographics","isCorrect":false,"optionType":"correct","explanation":"올바름: considerable을 substantial로, crossover를 blending으로, audience composition을 various demographics로 전환하여 의미 동일","translation":"다양한 인구 통계층 시청자들의 상당한 혼합"},{"text":"significant overlap in who actually watches the films","isCorrect":false,"optionType":"correct","explanation":"올바름: considerable을 significant로, crossover in audience composition을 overlap in who actually watches로 구체화하여 의미 보존","translation":"실제로 영화를 보는 사람들 사이에 상당한 중복이 있다"},{"text":"a notably mixed viewership that spans different age groups","isCorrect":false,"optionType":"correct","explanation":"올바름: crossover를 mixed viewership으로, audience composition을 different age groups로 재표현하여 의미 유지","translation":"다양한 연령대에 걸친 눈에 띄게 혼합된 시청자층"},{"text":"a sharp divide between adult and child viewers","isCorrect":true,"optionType":"incorrect","explanation":"잘못됨: crossover(교차·중복)를 divide(분리)로 반의어 대체하여 의미 완전히 반전","translation":"성인과 아동 시청자 사이의 뚜렷한 분리"}],"sourceQuestion":"1번 지문"},{"keyExpression":"consumed by audiences of all ages","passage":"films supposedly made for children have always been consumed by audiences of all ages, particularly in commercial cinemas.","passageTranslation":"아이들을 위해 만들어졌다고 여겨지는 영화들은 특히 상업 영화관에서 항상 모든 연령대의 관객들에 의해 소비되어 왔다.","qType":"correct","questionText":"'consumed by audiences of all ages'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"drawing in spectators regardless of their age","isCorrect":true,"optionType":"correct","explanation":"올바름: consumed를 능동적 유입(drawing in)으로 전환하고 all ages를 regardless of their age로 재표현하여 핵심 의미 유지","translation":"나이에 관계없이 관객들을 끌어들인다"},{"text":"produced exclusively for younger demographics","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: consumed(소비)를 produced(제작)로 바꾸고 all ages를 younger demographics로 반전시켜 의미 왜곡","translation":"오로지 젊은 인구 계층을 위해 제작된다"},{"text":"restricted to child audiences in theatrical settings","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: all ages를 child audiences로 축소하고 consumed를 restricted로 대체하여 원문의 의미를 반전","translation":"극장 환경에서 아동 관객에게만 제한된다"}],"sourceQuestion":"1번 지문"},{"keyExpression":"forever subordinate to a more legitimate cinema for adults","passage":"The old prejudice that children's film is some other realm, separate from (and forever subordinate to) a more legitimate cinema for adults is not supported by the realities of consumption.","passageTranslation":"아동 영화가 어른을 위한 보다 정통한 영화로부터 분리된 (그리고 영원히 종속된) 또 다른 영역이라는 오래된 편견은 소비의 현실에 의해 지지되지 않는다.","qType":"correct","questionText":"'forever subordinate to a more legitimate cinema for adults'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"permanently regarded as inferior to mainstream films aimed at grown-ups","isCorrect":true,"optionType":"correct","explanation":"올바름: forever를 permanently로, subordinate to를 regarded as inferior to로, legitimate cinema for adults를 mainstream films aimed at grown-ups로 재표현하여 의미 유지","translation":"성인을 대상으로 한 주류 영화보다 영구적으로 열등한 것으로 여겨진"},{"text":"increasingly surpassing adult films in critical acclaim","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: subordinate to(아래에 종속됨)를 surpassing(능가함)으로 완전히 반의어 대체하여 의미 반전","translation":"비평적 호평에서 성인 영화를 점점 능가하는"},{"text":"occasionally recognized as equal in value to adult cinema","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: forever subordinate(영원히 종속적)를 occasionally recognized as equal(가끔 동등하게 인정)로 바꿔 위계 관계를 평등 관계로 반전","translation":"가끔 성인 영화와 동등한 가치를 지닌 것으로 인정된"}],"sourceQuestion":"1번 지문"},{"keyExpression":"Symbiotic, or mutualistic, relationships occur in nature when two species interact in ways that benefit each other","passage":"Symbiotic, or mutualistic, relationships occur in nature when two species interact in ways that benefit each other. One species might get food or protection, and the other might receive cleaning, warning signals, or assistance that helps it survive.","passageTranslation":"공생적, 즉 상리공생적 관계는 두 종이 서로에게 이익이 되는 방식으로 상호작용할 때 자연에서 발생한다. 한 종은 먹이나 보호를 얻을 수 있고, 다른 종은 청소, 경고 신호, 또는 생존에 도움이 되는 지원을 받을 수 있다.","qType":"correct","questionText":"'Symbiotic, or mutualistic, relationships occur in nature when two species interact in ways that benefit each other'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"two species compete with each other to form mutualistic bonds in nature","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: interact in ways that benefit each other를 compete with each other로 대체하여 협력 관계를 경쟁 관계로 의미 역전","translation":"두 종은 자연에서 공생적 유대를 형성하기 위해 서로 경쟁한다"},{"text":"mutualism arises when two different species gain advantages from their interaction","isCorrect":true,"optionType":"correct","explanation":"올바름: Symbiotic/mutualistic를 mutualism으로, interact in ways that benefit each other를 gain advantages from their interaction으로 논리 구조를 유지하며 재표현","translation":"공생은 서로 다른 두 종이 상호작용으로부터 이익을 얻을 때 발생한다"},{"text":"in nature, two species living together for mutual benefit form a symbiotic bond","isCorrect":true,"optionType":"correct","explanation":"올바름: interact in ways that benefit each other를 living together for mutual benefit으로 추상→구체 전환하고, symbiotic relationship를 symbiotic bond로 restate","translation":"자연에서 상호 이익을 위해 함께 사는 두 종은 공생적 유대를 형성한다"},{"text":"symbiotic relationships develop when one species dominates another","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: benefit each other(서로 이익)를 one species dominates another(일방적 지배)로 바꿔 상호성의 핵심 의미를 완전히 왜곡","translation":"공생 관계는 한 종이 다른 종을 지배할 때 발전한다"}],"sourceQuestion":"3번 지문"},{"keyExpression":"forever subordinate to a more legitimate cinema for adults","passage":"The old prejudice that children's film is some other realm, separate from (and forever subordinate to) a more legitimate cinema for adults is not supported by the realities of consumption.","passageTranslation":"아동 영화가 어른을 위한 보다 정통한 영화로부터 분리된 (그리고 영원히 종속된) 또 다른 영역이라는 오래된 편견은 소비의 현실에 의해 지지되지 않는다.","qType":"correct","questionText":"'forever subordinate to a more legitimate cinema for adults'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"occasionally recognized as equal in value to adult cinema","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: forever subordinate(영원히 종속적)를 occasionally recognized as equal(가끔 동등하게 인정)로 바꿔 위계 관계를 평등 관계로 반전","translation":"가끔 성인 영화와 동등한 가치를 지닌 것으로 인정된"},{"text":"increasingly surpassing adult films in critical acclaim","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: subordinate to(아래에 종속됨)를 surpassing(능가함)으로 완전히 반의어 대체하여 의미 반전","translation":"비평적 호평에서 성인 영화를 점점 능가하는"},{"text":"consistently treated as secondary to adult-oriented cinematic art","isCorrect":true,"optionType":"correct","explanation":"올바름: subordinate to를 secondary to로, legitimate cinema for adults를 adult-oriented cinematic art로 전환하여 핵심 의미 동일","translation":"성인 지향 영화 예술에 지속적으로 부차적인 것으로 취급된"}],"sourceQuestion":"1번 지문"},{"keyExpression":"Symbiotic, or mutualistic, relationships occur in nature when two species interact in ways that benefit each other","passage":"Symbiotic, or mutualistic, relationships occur in nature when two species interact in ways that benefit each other.","passageTranslation":"공생, 즉 상리적 관계는 두 종이 서로에게 이익이 되는 방식으로 상호작용할 때 자연에서 나타난다.","qType":"correct","questionText":"'Symbiotic, or mutualistic, relationships occur in nature when two species interact in ways that benefit each other'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"mutualistic relationships only exist between members of the same species","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: two species(두 종)를 same species(같은 종)으로 대체하여 조건 자체를 왜곡","translation":"상리적 관계는 같은 종의 개체들 사이에서만 존재한다"},{"text":"symbiotic relationships form when one species exploits another for its exclusive gain","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: benefit each other(서로 이익)를 exclusive gain(일방적 이익)으로 대체하여 기생 관계로 의미 왜곡","translation":"공생 관계는 한 종이 자신만의 이익을 위해 다른 종을 이용할 때 형성된다"},{"text":"in nature, two species develop cooperative bonds when their interactions yield advantages for both sides","isCorrect":true,"optionType":"correct","explanation":"올바름: symbiotic relationships→cooperative bonds, benefit each other→yield advantages for both sides로 상호 이익 관계를 정확히 재표현","translation":"자연에서 두 종은 상호작용이 양측 모두에 이점을 줄 때 협력적 유대를 형성한다"}],"sourceQuestion":"2번 지문"},{"keyExpression":"Delicately perched on the tip of the elephant's tusk is a small black myna bird","passage":"Delicately perched on the tip of the elephant's tusk is a small black myna bird. Framed against smoky green foliage, the bird and elephant look at each other almost as if sharing a silent moment in mutual respect.","passageTranslation":"코끼리 상아의 끝에 작은 검은 마이나 새가 섬세하게 앉아 있다. 연기처럼 뿌연 녹색 잎들을 배경으로, 새와 코끼리는 마치 서로 조용한 순간을 상호 존중 속에 나누는 것처럼 서로를 바라보고 있다.","qType":"correct","questionText":"'Delicately perched on the tip of the elephant's tusk is a small black myna bird'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"a myna bird flying away from the elephant's tusk","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: perched(앉아 있는)를 flying away(날아가는)로 동작 방향을 완전히 반전시켜 의미 왜곡","translation":"코끼리 상아에서 날아가는 마이나 새"},{"text":"a large colorful bird gripping the middle of the tusk","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: small(작은)을 large(큰)로, tip(끝)을 middle(가운데)로 바꿔 위치·크기 정보를 모두 왜곡","translation":"상아 가운데를 움켜쥔 크고 화려한 새"},{"text":"a myna bird lightly settled at the very tip of the ivory","isCorrect":true,"optionType":"correct","explanation":"올바름: delicately=lightly, perched=settled, tusk=ivory로 각각 대응하여 도치 구문 의미를 충실히 재현","translation":"상아의 바로 끝부분에 가볍게 내려앉은 마이나 새"}],"sourceQuestion":"3번 지문"},{"keyExpression":"Acacia trees host ants that live in their hollow thorns and feed on nectar provided by the tree","passage":"Acacia trees host ants that live in their hollow thorns and feed on nectar provided by the tree. In return, the ants defend the tree against herbivores that want to eat the tree's leaves.","passageTranslation":"아카시아 나무는 빈 가시 속에 살며 나무가 제공하는 꿀을 먹는 개미들을 수용한다. 그 대가로 개미들은 나무의 잎을 먹으려는 초식동물로부터 나무를 지킨다.","qType":"incorrect","questionText":"'Acacia trees host ants that live in their hollow thorns and feed on nectar provided by the tree'을(를) 잘못 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"acacia trees absorb nutrients from ants that dig into their thorns","isCorrect":true,"optionType":"incorrect","explanation":"잘못됨: 혜택의 방향을 역전시켜 나무가 개미로부터 영양분을 흡수한다고 바꾸고, live in을 dig into로 대체하여 관계의 성격을 왜곡","translation":"아카시아 나무는 가시를 파고드는 개미로부터 영양분을 흡수한다"},{"text":"ants inhabit the empty spines of acacia trees and consume the tree's sweet fluid","isCorrect":false,"optionType":"correct","explanation":"올바름: hollow thorns를 empty spines로, feed on nectar를 consume the tree's sweet fluid로 구체화하여 의미 보존","translation":"개미는 아카시아 나무의 빈 가시 속에 살며 나무의 단물을 먹는다"},{"text":"ants make their home in the tree's hollow thorns and eat nectar the tree produces","isCorrect":false,"optionType":"correct","explanation":"올바름: host ants that live in을 ants make their home in으로, provided by the tree를 the tree produces로 능동 구문으로 전환하여 의미 충실히 재현","translation":"개미는 나무의 빈 가시 속에 보금자리를 만들고 나무가 생산하는 꿀을 먹는다"},{"text":"the acacia tree provides shelter and food for ants living inside its thorns","isCorrect":false,"optionType":"correct","explanation":"올바름: host ants that live in their hollow thorns를 provides shelter, feed on nectar provided by the tree를 food로 재구성하여 나무의 역할 의미 유지","translation":"아카시아 나무는 가시 속에 사는 개미에게 쉼터와 먹이를 제공한다"},{"text":"ants avoid acacia trees because their thorns produce harmful chemicals","isCorrect":true,"optionType":"incorrect","explanation":"잘못됨: host ants(개미를 수용함)를 avoid(피하다)로 반전시키고, nectar(꿀)를 harmful chemicals(해로운 화학물질)로 대체하여 관계를 공생에서 회피로 왜곡","translation":"개미는 아카시아 나무의 가시가 해로운 화학물질을 생성하기 때문에 피한다"}],"sourceQuestion":"3번 지문"},{"keyExpression":"These birds often perch on the backs of rhinos, oxen, and other large mammals and pick off insects","passage":"These birds often perch on the backs of rhinos, oxen, and other large mammals and pick off insects.","passageTranslation":"이 새들은 코뿔소, 황소 및 다른 대형 포유류의 등에 자주 앉아 곤충을 골라 먹는다.","qType":"correct","questionText":"'These birds often perch on the backs of rhinos, oxen, and other large mammals and pick off insects'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"these birds chase away rhinos and oxen to protect their nesting grounds","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: perch on(위에 앉음)을 chase away(쫓아냄)로, 협력 관계를 경쟁 관계로 완전히 왜곡","translation":"이 새들은 둥지 영역을 보호하기 위해 코뿔소와 황소를 쫓아낸다"},{"text":"it is common for these birds to settle on the bodies of large herbivores and remove insects from them","isCorrect":true,"optionType":"correct","explanation":"올바름: often→common, perch on→settle on, pick off→remove로 동일한 공생 행동을 재표현","translation":"이 새들이 대형 초식동물의 몸에 앉아 곤충을 제거하는 것은 흔한 일이다"},{"text":"large mammals such as rhinos deliberately feed insects to the birds as a defensive strategy","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: 새가 스스로 곤충을 먹는 것을 포유류가 의도적으로 곤충을 먹인다는 방향으로 인과와 주체를 역전","translation":"코뿔소 같은 대형 포유류는 방어 전략으로 의도적으로 새에게 곤충을 먹인다"}],"sourceQuestion":"2번 지문"},{"keyExpression":"human activities are putting pressure on nature and upsetting the balance of ecosystems","passage":"However, human activities are putting pressure on nature and upsetting the balance of ecosystems. As a result, many species are declining, and some are now threatened with extinction.","passageTranslation":"그러나 인간의 활동이 자연에 압력을 가하고 생태계의 균형을 깨뜨리고 있다. 그 결과, 많은 종이 감소하고 있으며 일부는 이제 멸종 위기에 처해 있다.","qType":"incorrect","questionText":"'human activities are putting pressure on nature and upsetting the balance of ecosystems'을(를) 잘못 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"human-caused interference is threatening the stability of natural environments","isCorrect":false,"optionType":"correct","explanation":"올바름: putting pressure on nature를 human-caused interference, upsetting the balance of ecosystems를 threatening the stability of natural environments로 추상→구체 전환하여 핵심 의미 재구성","translation":"인간이 초래한 간섭이 자연환경의 안정성을 위협하고 있다"},{"text":"the actions of people are straining the natural world and disrupting ecological harmony","isCorrect":false,"optionType":"correct","explanation":"올바름: human activities를 actions of people로, putting pressure를 straining으로, upsetting the balance of ecosystems를 disrupting ecological harmony로 각각 대응하여 의미 보존","translation":"사람들의 행동이 자연계에 부담을 주고 생태적 조화를 방해하고 있다"},{"text":"nature is adapting successfully to the changes caused by human progress","isCorrect":true,"optionType":"incorrect","explanation":"잘못됨: 원문의 부정적 영향(pressure, upsetting)을 adapting successfully로 바꾸어 인간 활동에 의한 피해를 자연의 적응으로 왜곡","translation":"자연은 인간의 발전으로 인한 변화에 성공적으로 적응하고 있다"},{"text":"what humans do is disturbing natural ecosystems and destabilizing their balance","isCorrect":false,"optionType":"correct","explanation":"올바름: human activities를 what humans do로, putting pressure + upsetting the balance를 disturbing + destabilizing으로 재표현하여 인과 구조와 의미 유지","translation":"인간이 하는 행동은 자연 생태계를 교란하고 균형을 불안정하게 만들고 있다"}],"sourceQuestion":"3번 지문"},{"keyExpression":"the old prejudice that children's film is some other realm","passage":"The old prejudice that children's film is some other realm, separate from (and forever subordinate to) a more legitimate cinema for adults is not supported by the realities of consumption.","passageTranslation":"아동 영화가 어른을 위한 보다 정통한 영화로부터 분리된 (그리고 영원히 종속된) 또 다른 영역이라는 오래된 편견은 소비의 현실에 의해 지지되지 않는다.","qType":"correct","questionText":"'the old prejudice that children's film is some other realm'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"the conventional misconception that children's films exist in isolation","isCorrect":true,"optionType":"correct","explanation":"올바름: old prejudice를 conventional misconception으로, some other realm을 exist in isolation으로 구체화하여 핵심 의미 동일","translation":"아동 영화가 고립되어 존재한다는 관습적인 오해"},{"text":"a recent development that integrates children's film into mainstream cinema","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: old prejudice(오래된 편견)를 recent development(최근 발전)로, 분리·배제의 의미를 통합의 의미로 완전히 반전","translation":"아동 영화를 주류 영화에 통합시키는 최근의 발전"},{"text":"the well-founded belief that children's film deserves its own space","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: old prejudice(편견·오류)를 well-founded belief(근거 있는 믿음)로 바꿔 부정적 함의를 긍정적으로 전환하여 의미 왜곡","translation":"아동 영화가 자체적인 공간을 가질 자격이 있다는 타당한 믿음"}],"sourceQuestion":"1번 지문"},{"keyExpression":"These birds often perch on the backs of rhinos, oxen, and other large mammals and pick off insects","passage":"These birds often perch on the backs of rhinos, oxen, and other large mammals and pick off insects. The hosts benefit from reduced irritation and sometimes alert the birds to danger.","passageTranslation":"이 새들은 종종 코뿔소, 황소, 그리고 다른 대형 포유류의 등에 앉아 곤충을 골라 먹는다. 숙주는 자극이 줄어드는 혜택을 받으며 때로는 새들에게 위험을 경고하기도 한다.","qType":"incorrect","questionText":"'These birds often perch on the backs of rhinos, oxen, and other large mammals and pick off insects'을(를) 잘못 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"the birds land on big animals and remove bugs from their bodies","isCorrect":false,"optionType":"correct","explanation":"올바름: perch on을 land on으로, pick off insects를 remove bugs로 구체적 동작 의미를 유지하며 재표현","translation":"새들은 큰 동물에 내려앉아 몸에서 벌레를 제거한다"},{"text":"by settling on large mammals, the birds feed on the insects living on them","isCorrect":false,"optionType":"correct","explanation":"올바름: perch on을 settling on으로, pick off insects를 feed on the insects living on them으로 행위와 목적을 구체화하여 의미 보존","translation":"큰 포유류 위에 앉음으로써 새들은 그들 위에 사는 곤충을 먹는다"},{"text":"the birds chase large mammals away to claim their feeding territory","isCorrect":true,"optionType":"incorrect","explanation":"잘못됨: perch on(위에 앉다)를 chase away(쫓아내다)로 완전히 반대되는 행동으로 대체하여 공생 관계를 영토 경쟁으로 왜곡","translation":"새들은 먹이 영역을 차지하기 위해 큰 포유류를 쫓아낸다"},{"text":"the birds rest on rhinos and similar large animals, eating the insects found there","isCorrec  in nature when two species interact in ways that benefit each other.","passageTranslation":"공생, 즉 상리적 관계는 두 종이 서로에게 이익이 되는 방식으로 상호작용할 때 자연에서 나타난다.","qType":"incorrect","questionText":"'Symbiotic, or mutualistic, relationships occur in nature when two species interact in ways that benefit each other'을(를) 잘못 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"in nature, two species develop cooperative bonds when their interactions yield advantages for both sides","isCorrect":false,"optionType":"correct","explanation":"올바름: symbiotic relationships→cooperative bonds, benefit each other→yield advantages for both sides로 상호 이익 관계를 정확히 재표현","translation":"자연에서 두 종은 상호작용이 양측 모두에 이점을 줄 때 협력적 유대를 형성한다"},{"text":"symbiotic relationships form when one species exploits another for its exclusive gain","isCorrect":true,"optionType":"incorrect","explanation":"잘못됨: benefit each other(서로 이익)를 exclusive gain(일방적 이익)으로 대체하여 기생 관계로 의미 왜곡","translation":"공생 관계는 한 종이 자신만의 이익을 위해 다른 종을 이용할 때 형성된다"},{"text":"when organisms of different species gain from living or working together, a mutualistic bond is said to exist","isCorrect":false,"optionType":"correct","explanation":"올바름: benefit each other→gain from living together, symbiotic relationship→mutualistic bond로 정의적 인과 구조를 보존","translation":"다른 종의 유기체들이 함께 살거나 일함으로써 이익을 얻을 때, 상리적 유대가 존재한다고 한다"},{"text":"mutualistic relationships only exist between members of the same species","isCorrect":true,"optionType":"incorrect","explanation":"잘못됨: two species(두 종)를 same species(같은 종)으로 대체하여 조건 자체를 왜곡","translation":"상리적 관계는 같은 종의 개체들 사이에서만 존재한다"},{"text":"mutual partnerships in the natural world arise when two organisms engage in mutually advantageous exchanges","isCorrect":false,"optionType":"correct","explanation":"올바름: symbiotic/mutualistic→mutual partnerships, benefit each other→mutually advantageous exchanges로 개념 정의를 정확히 paraphrase","translation":"자연계에서 상호적 관계는 두 유기체가 서로 유익한 교환에 참여할 때 발생한다"}],"sourceQuestion":"2번 지문"},{"keyExpression":"implies ownership by children","passage":"The term 'children's film' implies ownership by children — their cinema — but films supposedly made for children have always been consumed by audiences of all ages.","passageTranslation":"'아동 영화'라는 용어는 아이들의 소유권 — 그들의 영화 — 을 암시하지만, 아이들을 위해 만들어졌다고 여겨지는 영화들은 항상 모든 연령대의 관객들에 의해 소비되어 왔다.","qType":"correct","questionText":"'implies ownership by children'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"suggests that children are the intended audience","isCorrect":true,"optionType":"correct","explanation":"올바름: implies를 suggests로, ownership을 intended audience로 전환하여 함축적 소유 관계를 구체적 대상 지정으로 재표현","translation":"아이들이 의도된 관객임을 암시한다"},{"text":"denies any adult involvement in children's film production","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: 소유권 암시를 성인 배제로 인과 역전시켜 원문의 의미를 완전히 반전","translation":"아동 영화 제작에 성인의 관여를 부정한다"},{"text":"proves that children have legal rights over film content","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: implies(암시)를 proves(증명)로 강화하고 ownership을 legal rights로 구체화하여 사실적 법적 권리라는 의미로 왜곡","translation":"아이들이 영화 콘텐츠에 대한 법적 권리를 가짐을 증명한다"},{"text":"signals that children are the primary claim holders of the medium","isCorrect":true,"optionType":"correct","explanation":"올바름: implies를 signals로, ownership을 claim holders로 추상화하여 의미 유지","translation":"아이들이 그 매체의 주된 권리 보유자임을 나타낸다"}],"sourceQuestion":"1번 지문"},{"keyExpression":"Acacia trees host ants that live in their hollow thorns and feed on nectar provided by the tree","passage":"Acacia trees host ants that live in their hollow thorns and feed on nectar provided by the tree.","passageTranslation":"아카시아 나무는 빈 가시 안에 살며 나무가 제공하는 꿀을 먹는 개미들을 품는다.","qType":"incorrect","questionText":"'Acacia trees host ants that live in their hollow thorns and feed on nectar provided by the tree'을(를) 잘못 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"acacia trees shelter ants inside their empty thorns and supply them with nectar as nourishment","isCorrect":false,"optionType":"correct","explanation":"올바름: host→shelter, hollow thorns→empty thorns, feed on nectar provided by→supply them with nectar로 나무의 제공자 역할을 정확히 paraphrase","translation":"아카시아 나무는 빈 가시 안에 개미를 보호하고 영양분으로 꿀을 공급한다"},{"text":"ants inhabit the cavities of acacia thorns and consume the nectar that the tree produces","isCorrect":false,"optionType":"correct","explanation":"올바름: live in hollow thorns→inhabit the cavities of thorns, feed on nectar provided→consume nectar the tree produces로 개미의 관점에서 정확히 재표현","translation":"개미는 아카시아 가시의 공동에 살며 나무가 생산하는 꿀을 먹는다"},{"text":"acacia trees drive ants away by producing toxic nectar in their thorns","isCorrect":true,"optionType":"incorrect","explanation":"잘못됨: host/provide nectar(수용·제공)를 drive away/toxic(쫓아냄·독성)으로 협력 관계를 적대 관계로 완전히 반전","translation":"아카시아 나무는 가시에 독성 꿀을 생산하여 개미를 쫓아낸다"},{"text":"the acacia tree provides both living space within its thorns and food in the form of nectar to ants","isCorrect":false,"optionType":"correct","explanation":"올바름: host→provides living space, hollow thorns→within its thorns, nectar→food in the form of nectar로 나무의 이중 역할을 명시적으로 paraphrase","translation":"아카시아 나무는 가시 안의 생활 공간과 꿀 형태의 먹이 모두를 개미에게 제공한다"}],"sourceQuestion":"2번 지문"},{"keyExpression":"attracted 59 per cent of theatrical admissions","passage":"in 2007, eleven Danish children's and youth films attracted 59 per cent of theatrical admissions, and in 2014, German children's films comprised seven out of the top twenty films at the national box office.","passageTranslation":"2007년에 덴마크 아동·청소년 영화 11편이 극장 입장객의 59퍼센트를 끌어들였고, 2014년에는 독일 아동 영화들이 전국 박스오피스 상위 20개 작품 중 7편을 차지했다.","qType":"correct","questionText":"'attracted 59 per cent of theatrical admissions'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"generated 59 per cent of total film production costs","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: theatrical admissions(극장 입장 수)를 film production costs(제작 비용)로 대체하여 수익·흥행 맥락을 제작 비용 맥락으로 왜곡","translation":"전체 영화 제작 비용의 59퍼센트를 발생시켰다"},{"text":"accounted for more than half of all cinema ticket sales","isCorrect":true,"optionType":"correct","explanation":"올바름: attracted를 accounted for로, 59 per cent를 more than half로 근사 재표현하여 극장 흥행 규모의 의미 보존","translation":"전체 영화관 티켓 판매의 절반 이상을 차지했다"},{"text":"were rejected by the majority of cinema audiences","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: attracted(끌어들임)를 rejected(거부됨)로 반의어 대체하여 인과 관계를 완전히 반전","translation":"대다수의 영화관 관객들에 의해 외면당했다"}],"sourceQuestion":"1번 지문"},{"keyExpression":"mist-shrouded image shows a lone elephant standing behind a tree covered in haze","passage":"Taken by wildlife photographer Shaaz Jung in the jungles of South India, the mist-shrouded image shows a lone elephant standing behind a tree covered in haze.","passageTranslation":"남인도 정글에서 야생 사진작가 샤즈 정이 촬영한 안개 가득한 이 사진은, 안개에 덮인 나무 뒤에 홀로 서 있는 코끼리 한 마리를 보여준다.","qType":"correct","questionText":"'mist-shrouded image shows a lone elephant standing behind a tree covered in haze'을(를) 올바로 paraphrasing한 표현을 모두 고르시오.","options":[{"text":"the image clearly reveals an elephant in bright, open sunlight","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: mist-shrouded(안개에 덮인)를 bright sunlight(밝은 햇빛)으로 반대 분위기로 대체","translation":"이미지는 밝은 햇빛 아래 코끼리를 선명하게 보여준다"},{"text":"a group of elephants emerge from the fog in the photograph","isCorrect":false,"optionType":"incorrect","explanation":"잘못됨: lone(혼자)를 group(무리)으로 반의어 대체하여 의미 왜곡","translation":"사진 속 안개에서 코끼리 무리가 나타난다"},{"text":"a single elephant veiled in atmospheric haze is depicted in the image","isCorrect":true,"optionType":"correct","explanation":"올바름: lone→single, mist-shrouded→veiled in atmospheric haze로 시각적 묘사를 유지","translation":"대기의 안개에 감싸인 코끼리 한 마리가 이미지에 묘사된다"}],"sourceQuestion":"2번 지문"}]};
var QS=CONFIG.questions||[];
var TOTAL=QS.length;
var SET_SIZE=10;
var SETS=(function(){var s=[];for(var i=0;i<TOTAL;i+=SET_SIZE)s.push(QS.slice(i,i+SET_SIZE));return s;})();
var CIRCLED=["①","②","③","④","⑤","⑥"];
var answers={};var selections={};var currentSet=0;
var _tLast=0;var _busy=false;var _curPos=-1;
function esc(s){if(s==null)return"";var d=document.createElement("div");d.textContent=String(s);return d.innerHTML}
function setH(t,sub){var h=document.getElementById("hTitle");var p=document.getElementById("hSub");if(h)h.textContent=t;if(p)p.textContent=sub}
function gi(si,pi){return si*SET_SIZE+pi}
function showIndex(){
  setH(CONFIG.title,"Paraphrasing 표현 테스트");
  var chips=SETS.map(function(sq,si){
    var base=si*SET_SIZE;var done=0,correct=0;
    for(var i=0;i<sq.length;i++){var a=answers[base+i];if(a){done++;if(a.isCorrect)correct++;}}
    var allDone=(done===sq.length);
    var pct=done>0?Math.round(correct/sq.length*100):null;
    var passed=pct!==null&&pct>=CONFIG.passThreshold;
    var scoreHTML=pct===null
      ?"<span style='font-size:.78rem;color:#9ca3af'>미응시</span>"
      :(allDone?"<span style='font-weight:700;color:"+(passed?"#10b981":"#ef4444")+";'>"+(passed?"✅ ":"❌ ")+pct+"%</span>"
             :"<span style='font-weight:700;color:#f59e0b'>📝 "+done+"/"+sq.length+"</span>");
    return "<div class='set-card"+(allDone?" done":"")+"'onclick='enterSet("+si+")'>"
           +"<div><div style='font-weight:700'>세트 "+(si+1)+" <span style='font-size:.8rem;color:#6b7280;font-weight:400'>("+sq.length+"문제)</span></div></div>"
           +"<div>"+scoreHTML+"</div></div>";
  }).join("");
  var app=document.getElementById("app");if(!app)return;
  app.innerHTML="<div class='fade' style='text-align:center;padding:16px 0'>"
    +"<div style='font-size:2.5rem;margin-bottom:8px'>🔄</div>"
    +"<h2 style='font-size:1.2rem;font-weight:700;color:#1f2937;margin-bottom:4px'>Paraphrasing 표현 테스트</h2>"
    +"<p style='color:#6b7280;font-size:.85rem;margin-bottom:16px'>전체 "+TOTAL+"문제 · "+CONFIG.passThreshold+"% 이상 통과</p>"
    +"</div><div class='set-list'>"+chips+"</div>";
}
function enterSet(si){currentSet=si;_curPos=-1;showQ(0)}
function showQ(pos){
  if(pos!==_curPos){try{window.scrollTo(0,0)}catch(e){}_curPos=pos;}
  var si=currentSet;var qs=SETS[si];
  if(!qs||pos<0||pos>=qs.length){showIndex();return;}
  var gidx=gi(si,pos);var q=qs[pos];var answered=answers[gidx];
  var sel=selections[gidx]||{};
  setH("세트 "+(si+1),"문제 "+(pos+1)+"/"+qs.length);
  var pct=Math.round((pos+1)/qs.length*100);
  var isTypeA=q.qType==="correct";
  var correctCount=q.options.filter(function(o){return o.isCorrect}).length;
  var optsHTML=q.options.map(function(o,i){
    var cls="";var chkTxt="";
    if(answered){
      var wasSel=!!(answered.selected&&answered.selected[i]);
      if(isTypeA){
        if(o.isCorrect&&wasSel){cls="a-corr-hit";chkTxt="✓"}
        else if(o.isCorrect&&!wasSel){cls="a-corr-miss";chkTxt="○"}
        else if(!o.isCorrect&&wasSel){cls="a-wrong-sel";chkTxt="✕"}
        else{cls="a-wrong-unsel"}
      }else{
        if(o.isCorrect&&wasSel){cls="b-ans-hit";chkTxt="✓"}
        else if(o.isCorrect&&!wasSel){cls="b-ans-miss";chkTxt="○"}
        else if(!o.isCorrect&&wasSel){cls="b-corr-sel";chkTxt="✓"}
        else{cls="b-corr-unsel"}
      }
    }else if(sel[i]){cls="selected";chkTxt="✓"}
    return "<button class='chk-btn "+cls+"' onclick='toggleOpt("+pos+","+i+")' "+(answered?"disabled":"")+" data-idx='"+i+"'>"
           +"<div class='chk-box'>"+chkTxt+"</div>"
           +"<span>"+esc(o.text)+"</span></button>";
  }).join("");
  var feedbackHTML="";
  if(answered){
    var cidxs=[];
    q.options.forEach(function(o,i){if(o.isCorrect)cidxs.push(i)});
    var cLabel=cidxs.map(function(i){return CIRCLED[i]}).join(", ");
    feedbackHTML="<div class='fb "+(answered.isCorrect?"ok":"ng")+"'>"
      +(answered.isCorrect?"✅ 정답!":"❌ 오답 — 정답: "+cLabel)
      +"</div>"
      +"<div class='explain-box'><div class='ex-title'>해설</div>"
      +q.options.map(function(o,i){
        var tag;
        if(isTypeA){tag=o.isCorrect?"<span class='tag-ok'>[올바른 paraphrasing]</span>":"<span class='tag-ng'>[잘못된 paraphrasing]</span>"}
        else{tag=o.isCorrect?"<span class='tag-ng'>[잘못된 paraphrasing]</span>":"<span class='tag-ok'>[올바른 paraphrasing]</span>"}
        return "<div class='ex-item'><strong>"+CIRCLED[i]+" "+esc(o.text)+"</strong> "+tag
               +"<br><span class='trans'>→ "+esc(o.translation||o.explanation)+"</span></div>";
      }).join("")+"</div>";
  }
  var passageSection="";
  if(q.passage){
    passageSection="<button class='show-passage-btn' id='pbtn' onclick='togglePassage()'>📄 지문 보기</button>"
                  +"<div class='passage-box' id='pbox' style='display:none'>"+esc(q.passage)+"</div>";
  }
  var hintColor=answered?(answered.isCorrect?"#166534":"#991b1b"):"#4f46e5";
  var hintHTML=CONFIG.showCountHint
    ?"<div class='q-hint' style='background:rgba(139,92,246,.08);border:1px solid rgba(139,92,246,.2);color:#374151'>정답 개수 : <span style='font-size:1.5em;font-weight:900;color:"+hintColor+"'>"+correctCount+"</span>개</div>"
    :"<div class='q-hint' style='background:#f8fafc;color:#64748b;border:1px solid #e2e8f0'>"+(isTypeA?"<span style='color:#059669;font-weight:800'>올바른</span>":"<span style='color:#e11d48;font-weight:800'>잘못된</span>")+" paraphrasing을 모두 선택 후 제출하세요</div>";
  var typeBadge=isTypeA
    ?"<div class='type-badge ok'>✅ 올바른 paraphrasing 찾기</div>"
    :"<div class='type-badge ng'>❌ 잘못된 paraphrasing 찾기</div>";
  var app=document.getElementById("app");if(!app)return;
  app.innerHTML="<div class='fade'>"
    +"<div class='q-counter'>"+(pos+1)+" / "+qs.length+"</div>"
    +"<div class='prog-bar'><div class='prog-fill' style='width:"+pct+"%;background:"+(isTypeA?"#059669":"#dc2626")+"'></div></div>"
    +(q.sourceQuestion?"<div style='display:inline-block;background:#fef3c7;color:#b45309;padding:4px 12px;border-radius:20px;font-size:.78rem;font-weight:600;margin-bottom:10px'>"+esc(q.sourceQuestion)+"</div>":"")
    +typeBadge
    +"<div class='key-box'>"
    +"<div class='expr'>“"+esc(q.keyExpression)+"”</div>"
    +"<div class='qtext'>"+(isTypeA
      ?"위 표현을 <span style='color:#059669;font-weight:800'>올바르게</span> paraphrasing 한 것을 모두 고르시오."
      :"위 표현을 <span style='color:#e11d48;font-weight:800'>잘못</span> paraphrasing 한 것을 모두 고르시오.")
    +"</div></div>"
    +passageSection
    +hintHTML
    +"<div class='opts'>"+optsHTML+"</div>"
    +feedbackHTML
    +"<div class='nav-bar'>"
    +"<button class='nav-btn prev' onclick='showQ("+(pos-1)+")' "+(pos<=0?"disabled":"")+">← 이전</button>"
    +"<button class='nav-btn home' onclick='showIndex()'>목록</button>"
    +(!answered
      ?"<button class='nav-btn next' onclick='submitAnswer("+pos+")'>✓ 제출</button>"
      :"<button class='nav-btn next' onclick='"+(pos<qs.length-1?"showQ("+(pos+1)+")":"showSetResult()")+"'>→ "+(pos<qs.length-1?"다음":"결과")+"</button>")
    +"</div></div>";
}
function toggleOpt(pos,optIdx){
  var _n=Date.now();if(_n-_tLast<280)return;_tLast=_n;
  var gidx=gi(currentSet,pos);
  if(answers[gidx])return;
  if(!selections[gidx])selections[gidx]={};
  if(selections[gidx][optIdx])delete selections[gidx][optIdx];
  else selections[gidx][optIdx]=true;
  showQ(pos);
}
function submitAnswer(pos){
  try{
  var gidx=gi(currentSet,pos);
  if(answers[gidx])return;
  var q=SETS[currentSet][pos];
  if(!q)return;
  var sel=selections[gidx]||{};
  var isCorrect=true;
  for(var i=0;i<q.options.length;i++){
    var wasSel=!!sel[i];var shouldSel=q.options[i].isCorrect;
    if(wasSel!==shouldSel){isCorrect=false;break}
  }
  answers[gidx]={selected:sel,isCorrect:isCorrect};
  showQ(pos);
  }catch(e){console.error("submitAnswer err",e)}
}
function togglePassage(){
  var b=document.getElementById("pbox");var btn=document.getElementById("pbtn");
  if(!b)return;
  if(b.style.display==="none"){b.style.display="block";if(btn)btn.textContent="📄 지문 숨기기"}
  else{b.style.display="none";if(btn)btn.textContent="📄 지문 보기"}
}
function showSetResult(){
  var si=currentSet;var qs=SETS[si];var base=si*SET_SIZE;
  var total=qs.length;var correct=0;
  for(var i=0;i<total;i++){var a=answers[base+i];if(a&&a.isCorrect)correct++}
  var pct=Math.round(correct/total*100);
  var passed=pct>=CONFIG.passThreshold;
  setH("세트 "+(si+1)+" 결과",passed?"통과":"미달");
  var app=document.getElementById("app");if(!app)return;
  app.innerHTML="<div class='fade' style='text-align:center;padding:16px 0'>"
    +"<div class='score-circle "+(passed?"pass":"fail")+"'>"+(pct)+"%</div>"
    +"<p style='font-size:1.1rem;font-weight:700;color:"+(passed?"#10b981":"#ef4444")+"'>"+(passed?"통과!":"미달")+"</p>"
    +"<p style='color:#6b7280;font-size:.88rem;margin-top:8px'>"+correct+"/"+total+"문제 정답 · 기준 "+CONFIG.passThreshold+"%</p>"
    +"</div>"
    +"<div style='margin-top:16px'><button class='btn btn-primary' onclick='showIndex()'>목록으로</button></div>";
}
try{history.pushState(null,"",location.href);
window.addEventListener("popstate",function(){
  history.pushState(null,"",location.href);
  showIndex();
});}catch(e){}
showIndex();
</script>
