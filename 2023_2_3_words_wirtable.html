 help you to see it as a lesson in acceptance.","sentenceKo":"만약 당신이 당신의 과제가 행해져야 한다는 사실을 받아들이기로 결정한다면, 당신의 상황이 삶으로부터의 선물임을 인식하는 것으로부터 시작하라; 이것은 당신이 그것을 수용의 교훈으로 보는 것을 도울 것이다."},{"english":"obstacle","korean":"장애물","sentence":"If you want to get over an obstacle so that your idea can become the solution-based policy you've long dreamed of, you can't have an all-or-nothing mentality.","sentenceKo":"만약 당신의 아이디어가 당신이 오랫동안 꿈꿔온 해결책 기반 정책이 될 수 있도록 장애물을 극복하고 싶다면, 당신은 전부 아니면 전무의 사고방식을 가질 수 없다."},{"english":"get over","korean":"극복하다","sentence":"If you want to get over an obstacle so that your idea can become the solution-based policy you've long dreamed of, you can't have an all-or-nothing mentality.","sentenceKo":"만약 당신의 아이디어가 당신이 오랫동안 꿈꿔온 해결책 기반 정책이 될 수 있도록 장애물을 극복하고 싶다면, 당신은 전부 아니면 전무의 사고방식을 가질 수 없다."},{"english":"alter","korean":"변경하다, 바꾸다","sentence":"You have to be willing to alter your idea and let others influence its outcome.","sentenceKo":"당신은 기꺼이 당신의 아이디어를 변경하고 다른 사람들이 그것의 결과에 영향을 미치도록 해야 한다."},{"english":"outcome","korean":"결과","sentence":"You have to be willing to alter your idea and let others influence its outcome.","sentenceKo":"당신은 기꺼이 당신의 아이디어를 변경하고 다른 사람들이 그것의 결과에 영향을 미치도록 해야 한다."},{"english":"fund","korean":"자금을 대다","sentence":"Even if what emerges isn't as well-funded as you wished, or doesn't match how you originally conceived the bill, you'll have still succeeded in ensuring that kids in troubled areas have access to clean water.","sentenceKo":"비록 나타나는 것이 당신이 원했던 만큼 충분한 자금을 받지 못했거나, 당신이 원래 법안을 구상했던 방식과 일치하지 않더라도, 당신은 여전히 어려운 지역의 아이들이 깨끗한 물에 접근할 수 있도록 보장하는 데 성공한 것이다."},{"english":"ensure","korean":"보장하다, 확실하게 하다","sentence":"Even if what emerges isn't as well-funded as you wished, or doesn't match how you originally conceived the bill, you'll have still succeeded in ensuring that kids in troubled areas have access to clean water.","sentenceKo":"비록 나타나는 것이 당신이 원했던 만큼 충분한 자금을 받지 못했거나, 당신이 원래 법안을 구상했던 방식과 일치하지 않더라도, 당신은 여전히 어려운 지역의 아이들이 깨끗한 물에 접근할 수 있도록 보장하는 데 성공한 것이다."},{"english":"have access to","korean":"~에 접근하다","sentence":"Even if what emerges isn't as well-funded as you wished, or doesn't match how you originally conceived the bill, you'll have still succeeded in ensuring that kids in troubled areas have access to clean water.","sentenceKo":"비록 나타나는 것이 당신이 원했던 만큼 충분한 자금을 받지 못했거나, 당신이 원래 법안을 구상했던 방식과 일치하지 않더라도, 당신은 여전히 어려운 지역의 아이들이 깨끗한 물에 접근할 수 있도록 보장하는 데 성공한 것이다."},{"english":"relevance","korean":"관련성, 타당성","sentence":"Brands that fail to grow and develop lose their relevance.","sentenceKo":"성장하고 발전하지 못하는 브랜드는 관련성을 잃는다."},{"english":"assume","korean":"가정하다","sentence":"Assuming he or she did not make an ambitious move, more often than not, this individual is a victim of having failed to stay relevant and embrace the advances in his or her industry.","sentenceKo":"그 또는 그녀가 야심찬 움직임을 보이지 않았다고 가정하면, 대부분의 경우, 이 개인은 관련성을 유지하고 자신의 산업의 발전을 받아들이는 데 실패한 희생자이다."},{"english":"embrace","korean":"받아들이다, 포용하다","sentence":"Assuming he or she did not make an ambitious move, more often than not, this individual is a victim of having failed to stay relevant and embrace the advances in his or her industry.","sentenceKo":"그 또는 그녀가 야심찬 움직임을 보이지 않았다고 가정하면, 대부분의 경우, 이 개인은 관련성을 유지하고 자신의 산업의 발전을 받아들이는 데 실패한 희생자이다."},{"english":"integrate","korean":"통합하다","sentence":"Those who embraced the technology were able to integrate it into their work styles and excel.","sentenceKo":"그 기술을 받아들인 사람들은 그것을 자신들의 업무 스타일에 통합하고 뛰어날 수 있었다."},{"english":"excel","korean":"뛰어나다","sentence":"Those who embraced the technology were able to integrate it into their work styles and excel.","sentenceKo":"그 기술을 받아들인 사람들은 그것을 자신들의 업무 스타일에 통합하고 뛰어날 수 있었다."},{"english":"resistant","korean":"저항하는","sentence":"Those who were resistant many times found few opportunities to advance their careers and in many cases were ultimately let go through early retirement for failure to stay relevant and update their skills.","sentenceKo":"저항했던 사람들은 많은 경우에 경력을 발전시킬 기회를 거의 찾지 못했고, 많은 경우에 관련성을 유지하고 기술을 업데이트하는 데 실패하여 궁극적으로 조기 퇴직을 통해 해고되었다."},{"english":"consequence","korean":"결과","sentence":"What consequences of eating too many grapes and other sweet fruit could there possibly be for our brains?","sentenceKo":"너무 많은 포도와 다른 달콤한 과일을 먹는 것의 결과가 우리 뇌에 어떤 것이 있을 수 있을까?"},{"english":"shed light","korean":"밝히다, 규명하다","sentence":"A few large studies have helped to shed some light.","sentenceKo":"몇몇 대규모 연구가 어느 정도 밝히는 데 도움을 주었다."},{"english":"intake","korean":"섭취","sentence":"In one, higher fruit intake in older, cognitively healthy adults was linked with less volume in the hippocampus.","sentenceKo":"한 연구에서, 인지적으로 건강한 노인들의 더 높은 과일 섭취는 해마의 부피 감소와 연관되었다."},{"english":"isolate","korean":"분리하다, 고립시키다","sentence":"In this study, however, the researchers isolated various components of the subjects' diets and found that fruit didn't seem to be doing their memory centers any favors.","sentenceKo":"그러나 이 연구에서 연구자들은 피험자들의 식단의 다양한 구성 요소를 분리했고, 과일이 그들의 기억 중추에 어떤 도움도 주지 않는 것처럼 보인다는 것을 발견했다."},{"english":"component","korean":"구성 요소","sentence":"In this study, however, the researchers isolated various components of the subjects' diets and found that fruit didn't seem to be doing their memory centers any favors.","sentenceKo":"그러나 이 연구에서 연구자들은 피험자들의 식단의 다양한 구성 요소를 분리했고, 과일이 그들의 기억 중추에 어떤 도움도 주지 않는 것처럼 보인다는 것을 발견했다."},{"english":"inverse","korean":"역의, 반대의","sentence":"Another study from the Mayo Clinic saw a similar inverse relationship between fruit intake and volume of the cortex, the large outer layer of the brain.","sentenceKo":"Mayo Clinic의 또 다른 연구는 과일 섭취와 뇌의 큰 외부 층인 피질의 부피 사이에 유사한 역의 관계를 보였다."},{"english":"excessive","korean":"과도한","sentence":"Researchers in the latter study noted that excessive consumption of high-sugar fruit (such as mangoes, bananas, and pineapples) may cause metabolic and cognitive problems as much as processed carbs do.","sentenceKo":"후자의 연구의 연구자들은 (망고, 바나나, 파인애플과 같은) 고당분 과일의 과도한 섭취가 가공 탄수화물만큼이나 대사 및 인지 문제를 일으킬 수 있다고 언급했다."},{"english":"consumption","korean":"소비, 섭취","sentence":"Researchers in the latter study noted that excessive consumption of high-sugar fruit (such as mangoes, bananas, and pineapples) may cause metabolic and cognitive problems as much as processed carbs do.","sentenceKo":"후자의 연구의 연구자들은 (망고, 바나나, 파인애플과 같은) 고당분 과일의 과도한 섭취가 가공 탄수화물만큼이나 대사 및 인지 문제를 일으킬 수 있다고 언급했다."},{"english":"self-conscious","korean":"자의식이 있는","sentence":"Winning turns on a self-conscious awareness that others are watching.","sentenceKo":"승리는 다른 사람들이 보고 있다는 자의식 있는 인식에 달려있다."},{"english":"awareness","korean":"인식","sentence":"Winning turns on a self-conscious awareness that others are watching.","sentenceKo":"승리는 다른 사람들이 보고 있다는 자의식 있는 인식에 달려있다."},{"english":"under the radar","korean":"눈에 띄지 않게","sentence":"It's a lot easier to move under the radar when no one knows you and no one is paying attention.","sentenceKo":"아무도 당신을 모르고 아무도 주의를 기울이지 않을 때 눈에 띄지 않게 움직이는 것이 훨씬 쉽다."},{"english":"mess up","korean":"망치다, 실수하다","sentence":"You can mess up and be rough and get dirty because no one even knows you're there.","sentenceKo":"당신은 망치고 거칠게 굴고 더러워질 수 있다, 왜냐하면 아무도 당신이 거기 있다는 것조차 모르기 때문이다."},{"english":"observe","korean":"관찰하다","sentence":"But as soon as you start to win, and others start to notice, you're suddenly aware that you're being observed.","sentenceKo":"하지만 당신이 이기기 시작하고, 다른 사람들이 알아차리기 시작하자마자, 당신은 갑자기 당신이 관찰되고 있다는 것을 인식한다."},{"english":"flaw","korean":"결점","sentence":"You worry that others will discover your flaws and weaknesses, and you start hiding your true personality, so you can be a good role model and good citizen and a leader that others can respect.","sentenceKo":"당신은 다른 사람들이 당신의 결점과 약점을 발견할까봐 걱정하고, 당신은 진정한 성격을 숨기기 시작한다, 그래서 당신은 좋은 역할 모델이자 좋은 시민이자 다른 사람들이 존경할 수 있는 리더가 될 수 있다."},{"english":"role model","korean":"역할 모델","sentence":"You worry that others will discover your flaws and weaknesses, and you start hiding your true personality, so you can be a good role model and good citizen and a leader that others can respect.","sentenceKo":"당신은 다른 사람들이 당신의 결점과 약점을 발견할까봐 걱정하고, 당신은 진정한 성격을 숨기기 시작한다, 그래서 당신은 좋은 역할 모델이자 좋은 시민이자 다른 사람들이 존경할 수 있는 리더가 될 수 있다."},{"english":"at the expense of","korean":"~을 희생하여","sentence":"But if you do it at the expense of being who you really are, making decisions that please others instead of pleasing yourself, you're not going to be in that position very long.","sentenceKo":"하지만 만약 당신이 진정한 자신을 희생하여 그것을 하고, 자신을 기쁘게 하는 대신 다른 사람들을 기쁘게 하는 결정을 한다면, 당신은 그 위치에 오래 있지 못할 것이다."},{"english":"apologize","korean":"사과하다","sentence":"When you start apologizing for who you are, you stop growing and you stop winning.","sentenceKo":"당신이 당신이 누구인지에 대해 사과하기 시작할 때, 당신은 성장을 멈추고 승리를 멈춘다."},{"english":"permanently","korean":"영구적으로","sentence":"When you start apologizing for who you are, you stop growing and you stop winning. Permanently.","sentenceKo":"당신이 당신이 누구인지에 대해 사과하기 시작할 때, 당신은 성장을 멈추고 승리를 멈춘다. 영구적으로."},{"english":"account for","korean":"차지하다","sentence":"In each age group except 12 to 13-year-olds, those who said they read books once a month or less accounted for the largest proportion.","sentenceKo":"12~13세를 제외한 각 연령 그룹에서, 한 달에 한 번 이하로 책을 읽는다고 말한 사람들이 가장 큰 비율을 차지했다."},{"english":"proportion","korean":"비율","sentence":"In each age group except 12 to 13-year-olds, those who said they read books once a month or less accounted for the largest proportion.","sentenceKo":"12~13세를 제외한 각 연령 그룹에서, 한 달에 한 번 이하로 책을 읽는다고 말한 사람들이 가장 큰 비율을 차지했다."},{"english":"respond","korean":"응답하다","sentence":"More than one fifth of the age group of 18 to 19 years responded that they never read any book.","sentenceKo":"18~19세 연령 그룹의 5분의 1 이상이 어떤 책도 전혀 읽지 않는다고 응답했다."},{"english":"portrait","korean":"초상화","sentence":"British photographer Julia Margaret Cameron is considered one of the greatest portrait photographers of the 19th century.","sentenceKo":"영국 사진작가 Julia Margaret Cameron은 19세기의 가장 위대한 초상화 사진작가 중 한 명으로 여겨진다."},{"english":"devote","korean":"헌신하다","sentence":"Given a camera as a gift by her daughter in December 1863, she quickly and energetically devoted herself to the art of photography.","sentenceKo":"1863년 12월 딸로부터 선물로 카메라를 받은 그녀는 빠르고 열정적으로 사진 예술에 헌신했다."},{"english":"convert","korean":"전환하다","sentence":"She cleared out a chicken coop and converted it into studio space where she began to work as a photographer.","sentenceKo":"그녀는 닭장을 치우고 그것을 스튜디오 공간으로 전환하여 사진작가로 일하기 시작했다."},{"english":"convince","korean":"설득하다","sentence":"Cameron made illustrative studio photographs, convincing friends and family members to pose for photographs, fitting them in theatrical costumes and carefully composing them into scenes.","sentenceKo":"Cameron은 설명적인 스튜디오 사진을 만들었고, 친구들과 가족 구성원들을 설득하여 사진을 위해 포즈를 취하게 하고, 연극 의상을 입히고 신중하게 장면으로 구성했다."},{"english":"criticize","korean":"비판하다","sentence":"Criticized for her so-called bad technique by art critics in her own time, she ignored convention and experimented with composition and focus.","sentenceKo":"자신의 시대에 예술 비평가들에 의해 소위 나쁜 기술로 비판받았지만, 그녀는 관습을 무시하고 구도와 초점을 실험했다."},{"english":"convention","korean":"관습","sentence":"Criticized for her so-called bad technique by art critics in her own time, she ignored convention and experimented with composition and focus.","sentenceKo":"자신의 시대에 예술 비평가들에 의해 소위 나쁜 기술로 비판받았지만, 그녀는 관습을 무시하고 초점을 실험했다."},{"english":"experiment","korean":"실험하다","sentence":"Criticized for her so-called bad technique by art critics in her own time, she ignored convention and experimented with composition and focus.","sentenceKo":"자신의 시대에 예술 비평가들에 의해 소위 나쁜 기술로 비판받았지만, 그녀는 관습을 무시하고 구도와 초점을 실험했다."},{"english":"composition","korean":"구도, 구성","sentence":"Criticized for her so-called bad technique by art critics in her own time, she ignored convention and experimented with composition and focus.","sentenceKo":"자신의 시대에 예술 비평가들에 의해 소위 나쁜 기술로 비판받았지만, 그녀는 관습을 무시하고 구도와 초점을 실험했다."},{"english":"spiritual","korean":"영적인, 정신적인","sentence":"Later critics appreciated her valuing of spiritual depth over technical perfection and now consider her rain will send out a danger alert to protect me.","sentenceKo":"그리고 만약 내가 불확실하다면, 내 뇌는 나를 보호하기 위해 위험 경보를 보낼 것이다."},{"english":"dependence","korean":"의존","sentence":"The dependence on certainty all those millennia ago ensured our survival to the present day, and the danger-alert system continues to protect us.","sentenceKo":"수천 년 전 그 모든 확실성에 대한 의존은 현재까지 우리의 생존을 보장했고, 위험 경보 시스템은 계속해서 우리를 보호한다."},{"english":"vague","korean":"모호한","sentence":"This is achieved by our brains labeling new, vague, or unpredictable everyday events and experiences as uncertain.","sentenceKo":"이것은 우리의 뇌가 새롭고, 모호하거나, 예측 불가능한 일상적 사건과 경험들을 불확실한 것으로 분류함으로써 달성된다."},{"english":"unpredictable","korean":"예측할 수 없는","sentence":"This is achieved by our brains labeling new, vague, or unpredictable everyday events and experiences as uncertain.","sentenceKo":"이것은 우리의 뇌가 새롭고, 모호하거나, 예측 불가능한 일상적 사건과 경험들을 불확실한 것으로 분류함으로써 달성된다."},{"english":"virtue","korean":"미덕, 장점","sentence":"Robert Blattberg and Steven Hoch noted that, in a changing environment, it is not clear that consistency is always a virtue and that one of the advantages of human judgment is the ability to detect change.","sentenceKo":"Robert Blattberg와 Steven Hoch는 변화하는 환경에서, 일관성이 항상 미덕인 것은 분명하지 않고 인간 판단의 장점 중 하나는 변화를 감지하는 능력이라고 언급했다."},{"english":"consistency","korean":"일관성","sentence":"Robert Blattberg and Steven Hoch noted that, in a changing environment, it is not clear that consistency is always a virtue and that one of the advantages of human judgment is the ability to detect change.","sentenceKo":"Robert Blattberg와 Steven Hoch는 변화하는 환경에서, 일관성이 항상 미덕인 것은 분명하지 않고 인간 판단의 장점 중 하나는 변화를 감지하는 능력이라고 언급했다."},{"english":"detect","korean":"감지하다","sentence":"Robert Blattberg and Steven Hoch noted that, in a changing environment, it is not clear that consistency is always a virtue and that one of the advantages of human judgment is the ability to detect change.","sentenceKo":"Robert Blattberg와 Steven Hoch는 변화하는 환경에서, 일관성이 항상 미덕인 것은 분명하지 않고 인간 판단의 장점 중 하나는 변화를 감지하는 능력이라고 언급했다."},{"english":"examine","korean":"조사하다","sentence":"Blattberg and Hoch examined this possibility by having supermarket managers forecast demand for certain products and then creating a composite forecast by averaging these judgments with the forecasts of statistical models based on past data.","sentenceKo":"Blattberg와 Hoch는 슈퍼마켓 관리자들로 하여금 특정 제품에 대한 수요를 예측하게 하고, 그 다음 이러한 판단을 과거 데이터에 기반한 통계 모델의 예측과 평균화하여 종합 예측을 만듦으로써 이 가능성을 조사했다."},{"english":"forecast","korean":"예측하다","sentence":"Blattberg and Hoch examined this possibility by having supermarket managers forecast demand for certain products and then creating a composite forecast by averaging these judgments with the forecasts of statistical models based on past data.","sentenceKo":"Blattberg와 Hoch는 슈퍼마켓 관리자들로 하여금 특정 제품에 대한 수요를 예측하게 하고, 그 다음 이러한 판단을 과거 데이터에 기반한 통계 모델의 예측과 평균화하여 종합 예측을 만듦으로써 이 가능성을 조사했다."},{"english":"composite","korean":"종합의, 복합의","sentence":"The logic was that statistical models deny stable conditions and therefore cannot account for the effects on demand of novel events such as actions taken by competitors or the introduction of new products.","sentenceKo":"논리는 통계 모델이 안정적인 조건을 부인하므로 경쟁자들이 취한 행동이나 신제품 도입과 같은 새로운 사건들이 수요에 미치는 영향을 설명할 수 없다는 것이었다."},{"english":"account for","korean":"설명하다","sentence":"The logic was that statistical models deny stable conditions and therefore cannot account for the effects on demand of novel events such as actions taken by competitors or the introduction of new products.","sentenceKo":"논리는 통계 모델이 안정적인 조건을 부인하므로 경쟁자들이 취한 행동이나 신제품 도입과 같은 새로운 사건들이 수요에 미치는 영향을 설명할 수 없다는 것이었다."},{"english":"novel","korean":"새로운","sentence":"The logic was that statistical models deny stable conditions and therefore cannot account for the effects on demand of novel events such as actions taken by competitors or the introduction of new products.","sentenceKo":"논리는 통계 모델이 안정적인 조건을 부인하므로 경쟁자들이 취한 행동이나 신제품 도입과 같은 새로운 사건들이 수요에 미치는 영향을 설명할 수 없다는 것이었다."},{"english":"incorporate","korean":"포함하다, 통합하다","sentence":"Humans, however, can incorporate these novel factors in their judgments.","sentenceKo":"그러나 인간은 이러한 새로운 요인들을 자신들의 판단에 포함할 수 있다."},{"english":"helpless","korean":"무력한","sentence":"Free play is nature's means of teaching children that they are not helpless.","sentenceKo":"자유로운 놀이는 아이들에게 그들이 무력하지 않다는 것을 가르치는 자연의 수단이다."},{"english":"assert","korean":"주장하다, 행사하다","sentence":"In play, away from adults, children really do have control and can practice asserting it.","sentenceKo":"놀이에서, 어른들로부터 떨어져서, 아이들은 실제로 통제력을 가지고 있고 그것을 행사하는 연습을 할 수 있다."},{"english":"deliberately","korean":"의도적으로","sentence":"In active outdoor play, children deliberately dose themselves with moderate amounts of fear and they thereby learn how to control not only their bodies, but also their fear.","sentenceKo":"활동적인 야외 놀이에서, 아이들은 의도적으로 적당량의 두려움을 자신에게 주고 그로써 자신들의 몸뿐만 아니라 두려움도 통제하는 방법을 배운다."},{"english":"negotiate","korean":"협상하다","sentence":"In social play children learn how to negotiate with others, how to please others, and how to manage and overcome the anger that can arise from conflicts.","sentenceKo":"사회적 놀이에서 아이들은 다른 사람들과 협상하는 방법, 다른 사람들을 기쁘게 하는 방법, 그리고 갈등에서 발생할 수 있는 분노를 관리하고 극복하는 방법을 배운다."},{"english":"conflict","korean":"갈등","sentence":"In social play children learn how to negotiate with others, how to please others, and how to manage and overcome the anger that can arise from conflicts.","sentenceKo":"사회적 놀이에서 아이들은 다른 사람들과 협상하는 방법, 다른 사람들을 기쁘게 하는 방법, 그리고 갈등에서 발생할 수 있는 분노를 관리하고 극복하는 방법을 배운다."},{"english":"revenue","korean":"수익","sentence":"Many early dot-com investors focused almost entirely on revenue growth instead of net income.","sentenceKo":"많은 초기 닷컴 투자자들은 순이익 대신 거의 전적으로 수익 성장에 초점을 맞췄다."},{"english":"boost","korean":"증가시키다","sentence":"To boost reported revenue, some sites began exchanging ad space.","sentenceKo":"보고된 수익을 증가시키기 위해, 일부 사이트들은 광고 공간을 교환하기 시작했다."},{"english":"exchange","korean":"교환하다","sentence":"To boost reported revenue, some sites began exchanging ad space.","sentenceKo":"보고된 수익을 증가시키기 위해, 일부 사이트들은 광고 공간을 교환하기 시작했다."},{"english":"put an end to","korean":"~을 끝내다","sentence":"This practice was quickly put to an end because accountants felt that it did not meet the criteria of the revenue recognition principle.","sentenceKo":"이 관행은 회계사들이 그것이 수익 인식 원칙의 기준을 충족하지 못한다고 느꼈기 때문에 빨리 끝났다."},{"english":"criteria","korean":"기준","sentence":"This practice was quickly put to an end because accountants felt that it did not meet the criteria of the revenue recognition principle.","sentenceKo":"이 관행은 회계사들이 그것이 수익 인식 원칙의 기준을 충족하지 못한다고 느꼈기 때문에 빨리 끝났다."},{"english":"myth","korean":"신화","sentence":"Scholars of myth have long argued that myth gives structure and meaning to human life; that meaning is amplified when a myth evolves into a world.","sentenceKo":"신화 학자들은 오랫동안 신화가 인간의 삶에 구조와 의미를 부여한다고 주장해왔다; 그 의미는 신화가 세계로 진화할 때 증폭된다."},{"english":"amplify","korean":"증폭시키다","sentence":"Scholars of myth have long argued that myth gives structure and meaning to human life; that meaning is amplified when a myth evolves into a world.","sentenceKo":"신화 학자들은 오랫동안 신화가 인간의 삶에 구조와 의미를 부여한다고 주장해왔다; 그 의미는 신화가 세계로 진화할 때 증폭된다."},{"english":"fulfill","korean":"충족시키다","sentence":"A virtual world's ability to fulfill needs grows when lots and lots of people believe in the world.","sentenceKo":"가상 세계가 욕구를 충족시키는 능력은 많고 많은 사람들이 그 세계를 믿을 때 성장한다."},{"english":"conversely","korean":"반대로","sentence":"Conversely, a virtual world cannot be long sustained by a mere handful of adherents.","sentenceKo":"반대로, 가상 세계는 단지 소수의 추종자들에 의해 오래 지속될 수 없다."},{"english":"sustain","korean":"지속하다","sentence":"Conversely, a virtual world cannot be long sustained by a mere handful of adherents.","sentenceKo":"반대로, 가상 세계는 단지 소수의 추종자들에 의해 오래 지속될 수 없다."},{"english":"immersive","korean":"몰입감 있는","sentence":"My game might be a great game, one that is completely immersive, one that consumes all of my group's time and attention.","sentenceKo":"내 게임은 훌륭한 게임일 수 있고, 완전히 몰입감 있는 게임일 수 있고, 내 그룹의 모든 시간과 관심을 소비하는 게임일 수 있다."},{"english":"ultimately","korean":"궁극적으로","sentence":"If its reach is limited to the ten of us, though, then it's ultimately just a weird hobby, and it has limited social function.","sentenceKo":"하지만 만약 그것의 범위가 우리 10명에게 제한된다면, 그것은 궁극적으로 단지 이상한 취미이고, 제한된 사회적 기능을 가진다."},{"english":"threshold","korean":"한계점, 문턱","sentence":"When that threshold is reached, psychological value can turn into wide-ranging social value.","sentenceKo":"그 한계점에 도달하면, 심리적 가치는 광범위한 사회적 가치로 바뀔 수 있다."},{"english":"harsh","korean":"가혹한","sentence":"It seems natural to describe certain environmental conditions as 'extreme', 'harsh', 'benign' or 'stressful'.","sentenceKo":"특정 환경 조건을 '극단적', '가혹한', '온화한', 또는 '스트레스가 많은'으로 묘사하는 것이 자연스러워 보인다."},{"english":"benign","korean":"온화한","sentence":"It seems natural to describe certain environmental conditions as 'extreme', 'harsh', 'benign' or 'stressful'.","sentenceKo":"특정 환경 조건을 '극단적', '가혹한', '온화한', 또는 '스트레스가 많은'으로 묘사하는 것이 자연스러워 보인다."},{"english":"physiological","korean":"생리학적인","sentence":"But this only means that these conditions are extreme for us, given our particular physiological characteristics and tolerances.","sentenceKo":"하지만 이것은 단지 우리의 특정한 생리학적 특성과 내성을 고려할 때, 이러한 조건들이 우리에게 극단적이라는 것을 의미할 뿐이다."},{"english":"tolerance","korean":"내성","sentence":"But this only means that these conditions are extreme for us, given our particular physiological characteristics and tolerances.","sentenceKo":"하지만 이것은 단지 우리의 특정한 생리학적 특성과 내성을 고려할 때, 이러한 조건들이 우리에게 극단적이라는 것을 의미할 뿐이다."},{"english":"assume","korean":"추정하다","sentence":"It is lazy and dangerous for the ecologist to assume that all other organisms sense the environment in the way we do.","sentenceKo":"생태학자가 다른 모든 유기체들이 우리가 하는 방식으로 환경을 감지한다고 추정하는 것은 게으르고 위험하다."},{"english":"organism","korean":"유기체","sentence":"It is lazy and dangerous for the ecologist to assume that all other organisms sense the environment in the way we do.","sentenceKo":"생태학자가 다른 모든 유기체들이 우리가 하는 방식으로 환경을 감지한다고 추정하는 것은 게으르고 위험하다."},{"english":"emotive","korean":"감정적인","sentence":"Emotive words like harsh and benign, even relativities such as hot and cold, should be used by ecologists only with care.","sentenceKo":"가혹한과 온화한과 같은 감정적인 단어들, 심지어 뜨겁고 차가운과 같은 상대적 표현들은 생태학자들에 의해 신중하게만 사용되어야 한다."},{"english":"rational","korean":"합리적인","sentence":"Human processes differ from rational processes in their outcome.","sentenceKo":"인간의 과정은 그 결과에서 합리적인 과정과 다르다."},{"english":"instinct","korean":"본능","sentence":"Human processes involve instinct, intuition, and other variables that don't necessarily reflect the book and may not even consider the existing data.","sentenceKo":"인간의 과정은 본능, 직관, 그리고 반드시 교과서를 반영하지 않고 기존 데이터를 고려하지 않을 수도 있는 다른 변수들을 포함한다."},{"english":"intuition","korean":"직관","sentence":"Human processes involve instinct, intuition, and other variables that don't necessarily reflect the book and may not even consider the existing data.","sentenceKo":"인간의 과정은 본능, 직관, 그리고 반드시 교과서를 반영하지 않고 기존 데이터를 고려하지 않을 수도 있는 다른 변수들을 포함한다."},{"english":"variable","korean":"변수","sentence":"Human processes involve instinct, intuition, and other variables that don't necessarily reflect the book and may not even consider the existing data.","sentenceKo":"인간의 과정은 본능, 직관, 그리고 반드시 교과서를 반영하지 않고 기존 데이터를 고려하지 않을 수도 있는 다른 변수들을 포함한다."},{"english":"pedestrian","korean":"보행자","sentence":"Likewise, pedestrian crossing signs vary depending on the country with differing appearances of a person crossing the street.","sentenceKo":"마찬가지로, 보행자 횡단 표지판은 거리를 건너는 사람의 다른 외관으로 국가에 따라 다르다."},{"english":"precisely","korean":"정확히","sentence":"However, traffic isn't rational; if you follow the laws precisely, you end up stuck somewhere because other drivers aren't following the laws precisely.","sentenceKo":"그러나 교통은 합리적이지 않다; 만약 당신이 법을 정확히 따른다면, 다른 운전자들이 법을 정확히 따르지 않기 때문에 당신은 어딘가에 갇히게 된다."},{"english":"stuck","korean":"갇힌","sentence":"However, traffic isn't rational; if you follow the laws precisely, you end up stuck somewhere because other ean":"이성, 이유","sentence":"A common but incorrect assumption is that we are creatures of reason when, in fact, we are creatures of both reason and emotion.","sentenceKo":"일반적이지만 잘못된 가정은 우리가 이성의 생물이라는 것인데, 사실, 우리는 이성과 감정 모두의 생물이다."},{"english":"eventually","korean":"결국","sentence":"We cannot get by on reason alone since any reason always eventually leads to a feeling.","sentenceKo":"우리는 이성만으로는 살아갈 수 없는데, 왜냐하면 어떤 이유든 항상 결국 감정으로 이어지기 때문이다."},{"english":"get by","korean":"살아가다","sentence":"We cannot get by on reason alone since any reason always eventually leads to a feeling.","sentenceKo":"우리는 이성만으로는 살아갈 수 없는데, 왜냐하면 어떤 이유든 항상 결국 감정으로 이어지기 때문이다."},{"english":"deep-seated","korean":"깊이 뿌리박힌","sentence":"These deep-seated values, feelings, and emotions we have are rarely a result of reasoning, but can certainly be influenced by reasoning.","sentenceKo":"우리가 가진 이러한 깊이 뿌리박힌 가치관, 감정, 그리고 정서는 거의 추론의 결과가 아니지만, 확실히 추론에 의해 영향을 받을 수 있다."},{"english":"reasoning","korean":"추론","sentence":"These deep-seated values, feelings, and emotions we have are rarely a result of reasoning, but can certainly be influenced by reasoning.","sentenceKo":"우리가 가진 이러한 깊이 뿌리박힌 가치관,감정, 그리고 정서는 거의 추론의 결과가 아니지만, 확실히 추론에 의해 영향을 받을 수 있다."},{"english":"intensity","korean":"강도","sentence":"In the electric organ the muscle cells are connected in larger chunks, which makes the total current intensity larger than in ordinary muscles.","sentenceKo":"전기 기관에서 근육 세포들은 더 큰 덩어리로 연결되어 있어, 전체 전류 강도가 일반 근육보다 더 크다."},{"english":"discharge","korean":"방출하다","sentence":"When the signal is discharged the electric organ will be negatively loaded compared to the head and an electric field is created around the fish.","sentenceKo":"신호가 방출될 때 전기 기관은 머리에 비해 음으로 하전되고 물고기 주위에 전기장이 생성된다."},{"english":"contract","korean":"수축하다","sentence":"A weak electric current is created also in ordinary muscle cells when they contract.","sentenceKo":"약한 전류는 일반 근육 세포가 수축할 때도 생성된다."},{"english":"frequency","korean":"빈도","sentence":"The fish varies the signals by changing the form of the electric field or the frequency of discharging.","sentenceKo":"물고기는 전기장의 형태나 방출의 빈도를 바꿈으로써 신호를 변화시킨다."},{"english":"interference","korean":"간섭","sentence":"If many fish send out signals at the same time, the short range decreases the risk of interference.","sentenceKo":"만약 많은 물고기들이 동시에 신호를 보낸다면, 짧은 범위는 간섭의 위험을 감소시킨다."},{"english":"creativity","korean":"창의성","sentence":"For others, whose creativity is more focused on methods and technique, creativity may lead to solutions that drastically reduce the work necessary to solve a problem.","sentenceKo":"다른 사람들에게는, 그들의 창의성이 방법과 기술에 더 집중되어 있는데, 창의성은 문제를 해결하는 데 필요한 작업을 급격히 줄이는 해결책으로 이어질 수 있다."},{"english":"drastically","korean":"급격히","sentence":"For others, whose creativity is more focused on methods and technique, creativity may lead to solutions that drastically reduce the work necessary to solve a problem.","sentenceKo":"다른 사람들에게는, 그들의 창의성이 방법과 기술에 더 집중되어 있는데, 창의성은 문제를 해결하는 데 필요한 작업을 급격히 줄이는 해결책으로 이어질 수 있다."},{"english":"productivity","korean":"생산성","sentence":"Creativity can have an effect on productivity.","sentenceKo":"창의성은 생산성에 영향을 미칠 수 있다."},{"english":"speciation","korean":"종분화","sentence":"Charles Darwin's approach to the speciation problem is a good example of this; he chose a very difficult and tangled problem, speciation, which led him into a long period of data collection and deliberation.","sentenceKo":"Charles Darwin의 종분화 문제에 대한 접근은 이것의 좋은 예이다; 그는 매우 어렵고 복잡한 문제인 종분화를 선택했고, 그것은 그를 오랜 기간의 데이터 수집과 숙고로 이끌었다."},{"english":"deliberation","korean":"숙고","sentence":"Charles Darwin's approach to the speciation problem is a good example of this; he chose a very difficult and tangled problem, speciation, which led him into a long period of data collection and deliberation.","sentenceKo":"Charles Darwin의 종분화 문제에 대한 접근은 이것의 좋은 예이다; 그는 매우 어렵고 복잡한 문제인 종분화를 선택했고, 그것은 그를 오랜 기간의 데이터 수집과 숙고로 이끌었다."},{"english":"publication","korean":"출판, 발행","sentence":"In such cases creativity may actually decrease productivity (as measured by publication counts) because effort is focused on difficult problems.","sentenceKo":"이러한 경우에 창의성은 실제로 (출판 횟수로 측정되는) 생산성을 감소시킬"}]};
var SET_SIZE = 20;

function shuffle(arr){var a=arr.slice();for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=a[i];a[i]=a[j];a[j]=t}return a}
function esc(str){var d=document.createElement('div');d.textContent=str;return d.innerHTML}
function trim(s){return(s||'').replace(/^\s+|\s+$/g,'')}
function maskWord(sentence,word){if(!sentence||!word)return sentence;var lc=sentence.toLowerCase();var wl=word.toLowerCase();var result='';var i=0;while(i<sentence.length){var idx=lc.indexOf(wl,i);if(idx===-1){result+=sentence.substring(i);break}result+=sentence.substring(i,idx);for(var j=0;j<word.length;j++)result+='_';i=idx+wl.length}return result}
function SimpleSet(){this._m={};this.size=0}
SimpleSet.prototype.add=function(v){var k=String(v);if(!this._m[k]){this._m[k]=true;this.size++}};
SimpleSet.prototype.has=function(v){return this._m[String(v)]===true};
SimpleSet.prototype.clear=function(){this._m={};this.size=0};

/* ═══════════════════════════════════════════════
   Main App
   ═══════════════════════════════════════════════ */
function App(){
  var self=this;
  this.allWords=CONFIG.words;
  this.testType=CONFIG.testType;
  this.passThreshold=CONFIG.passThreshold;
  this.app=document.getElementById('app');
  this.titleEl=document.getElementById('page-title');
  this.subEl=document.getElementById('page-subtitle');
  this.sets=[];
  for(var i=0;i<this.allWords.length;i+=SET_SIZE){
    this.sets.push(this.allWords.slice(i,Math.min(i+SET_SIZE,this.allWords.length)));
  }
  this.totalSets=this.sets.length;

  /* test state */
  this.masteredWords=new SimpleSet();
  this.wrongHistory=[];
  this.setResults=[];
  this.curSet=0;this.round=0;this.roundWords=[];
  this.roundCorrect=[];this.roundWrong=[];
  this.roundHistory=[];this.currentOptions=[];
  this.answered=false;this.setWordsAll=[];this.curQType='mc';

  /* practice state */
  this.pSeen=new SimpleSet();
  this.pSetResults=[];
  this.pCurSet=0;this.pRound=0;
  this.pCards=[];this.pIdx=0;
  this.pKnown=[];this.pUnknown=[];
  this.pFlipped=false;

  document.addEventListener('click',function(e){
    var t=e.target;
    var oi=t.getAttribute('data-option-index');
    if(oi!==null){t.blur();self.checkAnswer(self.currentOptions[parseInt(oi,10)]);return}
    /* flashcard tap-to-flip */
    if(t.closest('.fc-card')&&!t.closest('.fc-btns')&&!t.closest('.btn')){self.flipCard();return}
    var ae=t.closest?t.closest('[data-action]'):null;
    if(ae){var a=ae.getAttribute('data-action');var ar=ae.getAttribute('data-args');
      if(typeof self[a]==='function'){if(ar!==null)self[a](parseInt(ar,10));else self[a]()}}
  },false);
  document.addEventListener('keydown',function(e){
    if(e.key==='Enter'||e.keyCode===13){var inp=document.getElementById('answer-input');if(inp&&document.activeElement===inp)self.submitFillIn()}
  },false);
  this.showHome();
}

App.prototype.render=function(h){this.app.innerHTML=h};
App.prototype.setTitle=function(t){this.titleEl.textContent=t};
App.prototype.setSub=function(t){this.subEl.textContent=t};
App.prototype.toTop=function(){this.app.scrollIntoView?this.app.scrollIntoView({behavior:'smooth',block:'start'}):window.scrollTo(0,0)};

/* ─── Home Screen ─── */

  this.setTitle(CONFIG.title);

  var tl={multiple_choice:'객관식',fill_in:'주관식',mixed:'혼합'}[this.testType]||this.testType;

      '<div class="ig">'+

        '<div class="ic"><div class="lb">통과 기준</div><div class="vl">'+this.passThreshold+'%</div></div></div>'+
      '</div>'+
      '<button class="btn btn-practice" data-action="startPractice" style="font-size:1.05rem">🃏 플래시카드 연습</button>'+

};

App.prototype.startPractice=function(){
  this.pSeen=new SimpleSet();
  this.pSetResults=[];
  this.pCurSet=0;
  this.showPracticeMap();
};

App.prototype.showPracticeMap=function(){
  this.setTitle(CONFIG.title);
  var totalSeen=this.pSeen.size;
  var pct=this.allWords.length>0?Math.round((totalSeen/this.allWords.length)*100):0;
  this.setSub('연습 '+pct+'% ('+totalSeen+'/'+this.allWords.length+')');

  var setsHtml='';
  for(var i=0;i<this.totalSets;i++){
    var sw=this.sets[i];
    var res=null;
    for(var r=0;r<this.pSetResults.length;r++){if(this.pSetResults[r].setIdx===i){res=this.pSetResults[r];break}}
    var seen=0;for(var w=0;w<sw.length;w++){if(this.pSeen.has(trim(sw[w].english).toLowerCase()))seen++}
    var done=!!res;var sPct=Math.round((seen/sw.length)*100);
    var cls,icon,stxt,act=' data-action="practiceSet" data-args="'+i+'"';
    if(done&&sPct===100){cls='p-dn';icon='⭐';stxt='완벽'}
    else if(done){cls='p-dn';icon='✅';stxt=sPct+'%'}
    else{cls='p-cur';icon='▶';stxt='시작'}

    setsHtml+='<div class="sc-w"><div class="s-card '+cls+'"'+act+'>'+
      '<div class="sn">세트 '+(i+1)+'</div>'+
      '<div class="sw">'+sw.length+'개 단어</div>'+
      '<div class="sb"><div class="sbf" style="width:'+sPct+'%"></div></div>'+
      '<div class="ss">'+icon+' '+stxt+'</div>'+
    '</div></div>';
  }

  var allDone=this.pSetResults.length===this.totalSets;

  this.render(
    '<div class="fade">'+
      '<div style="text-align:center;margin-bottom:16px">'+
        '<div style="font-size:2.2rem;margin-bottom:6px">🃏</div>'+
        '<h2 style="font-size:1.1rem;font-weight:700;color:#0f172a;margin-bottom:3px">플래시카드 연습</h2>'+
        '<p style="color:#64748b;font-size:.82rem;word-break:keep-all">카드를 넘기며 단어를 익히세요</p>'+
      '</div>'+
      '<div class="ob">'+
        '<div class="ob-top"><span style="color:#64748b">연습 진행률</span><span style="font-weight:700;color:#8b5cf6">'+pct+'%</span></div>'+
        '<div class="ob-bar"><div class="ob-fill" style="width:'+pct+'%;background:#8b5cf6"></div></div>'+
        '<div class="ob-sub">'+totalSeen+' / '+this.allWords.length+' 단어 학습</div>'+
      '</div>'+
      '<div class="sg">'+setsHtml+'</div>'+
      (allDone?'<div class="alert alert-g" style="margin-bottom:14px">모든 세트 연습 완료! 테스트에 도전해보세요.</div>':'')+
      '<div class="jump-bar"><p>연습이 충분하면 바로 테스트로!</p>'+
        '<button class="btn btn-accent" data-action="startFullTest" style="font-size:.92rem">📝 테스트 시작하기</button>'+
      '</div>'+
      '<button class="btn btn-ghost" data-action="showHome" style="margin-top:6px">← 처음으로</button>'+
    '</div>'
  );
  this.toTop();
};

/* start practice set */
App.prototype.practiceSet=function(idx){
  this.pCurSet=idx;
  this.pRound=0;
  var sw=this.sets[idx];
  /* unseen words first, if retrying show all */
  var unseen=[];
  for(var i=0;i<sw.length;i++){if(!this.pSeen.has(trim(sw[i].english).toLowerCase()))unseen.push(sw[i])}
  this.pCards=unseen.length>0?shuffle(unseen):shuffle(sw.slice());
  this.pIdx=0;this.pKnown=[];this.pUnknown=[];this.pFlipped=false;
  this.pRound++;
  this.showCard();
};

App.prototype.showCard=function(){
  if(this.pIdx>=this.pCards.length){this.endPracticeRound();return}
  this.pFlipped=false;
  var word=this.pCards[this.pIdx];
  var total=this.pCards.length;
  var pct=Math.round((this.pIdx/total)*100);

  var dotsHtml='';
  for(var d=0;d<total;d++){
    var dc='fc-dot';
    if(d<this.pIdx){
      var wasKnown=false;
      for(var k=0;k<this.pKnown.length;k++){if(this.pKnown[k].english===this.pCards[d].english){wasKnown=true;break}}
      dc+=wasKnown?' ok':' ng';
    }else if(d===this.pIdx){dc+=' now'}
    dotsHtml+='<div class="'+dc+'"></div>';
  }

  this.setTitle('세트 '+(this.pCurSet+1)+' 연습');
  this.setSub(this.pRound+'라운드 · '+(this.pIdx+1)+'/'+total);
  this.render(
    '<div class="fade">'+
      '<div style="display:-webkit-box;display:-webkit-flex;display:flex;-webkit-box-pack:justify;-webkit-justify-content:space-between;justify-content:space-between;-webkit-box-align:center;-webkit-align-items:center;align-items:center;margin-bottom:12px">'+
        '<div class="round-tag">세트'+(this.pCurSet+1)+' · '+this.pRound+'R</div>'+
        '<div class="back-link" data-action="showPracticeMap">← 목록</div>'+
      '</div>'+
      '<div class="fc-dots">'+dotsHtml+'</div>'+
      '<div class="prog-bar"><div class="prog-fill" style="width:'+pct+'%;background:#8b5cf6"></div></div>'+
      '<div class="fc-scene">'+
        '<div class="fc-card" id="fc-card">'+
          '<div class="fc-face fc-front">'+
            '<div class="fc-label">한글 뜻</div>'+
            '<div class="fc-word">'+esc(word.korean)+'</div>'+
            (word.sentence?'<div class="fc-sentence" style="font-size:.82rem;color:#6d28d9;margin-top:12px;line-height:1.5;padding:10px 14px;background:rgba(139,92,246,.08);border-radius:10px;word-break:keep-all;border:1px solid rgba(139,92,246,.15)">'+esc(word.sentence)+'</div>':'')+
            '<div class="fc-tap">카드를 탭하여 정답 확인</div>'+
          '</div>'+
          '<div class="fc-face fc-back">'+
            '<div class="fc-label">English</div>'+
            '<div class="fc-word">'+esc(word.english)+'</div>'+
            '<div class="fc-sub">'+esc(word.korean)+'</div>'+
            (word.sentenceKo?'<div class="fc-sentence" style="font-size:.82rem;color:#047857;margin-top:12px;line-height:1.5;padding:10px 14px;background:rgba(16,185,129,.08);border-radius:10px;word-break:keep-all;border:1px solid rgba(16,185,129,.15)">'+esc(word.sentenceKo)+'</div>':'')+
          '</div>'+
        '</div>'+
      '</div>'+
      '<div id="fc-action" style="display:none">'+
        '<div class="fc-btns">'+
          '<button class="btn btn-dunno" data-action="pMarkUnknown">❌ 몰라요</button>'+
          '<button class="btn btn-know" data-action="pMarkKnown">⭕ 알아요</button>'+
        '</div>'+
      '</div>'+
    '</div>'
  );
  this.toTop();
};

App.prototype.flipCard=function(){
  this.pFlipped=!this.pFlipped;
  var el=document.getElementById('fc-card');
  if(el)el.className=this.pFlipped?'fc-card flipped':'fc-card';
  var ab=document.getElementById('fc-action');
  if(ab)ab.style.display=this.pFlipped?'block':'none';
};

App.prototype.pMarkKnown=function(){
  var word=this.pCards[this.pIdx];
  this.pKnown.push(word);
  this.pSeen.add(trim(word.english).toLowerCase());
  this.pIdx++;
  this.showCard();
};

App.prototype.pMarkUnknown=function(){
  var word=this.pCards[this.pIdx];
  this.pUnknown.push(word);
  this.pIdx++;
  this.showCard();
};

App.prototype.endPracticeRound=function(){
  var sw=this.sets[this.pCurSet];
  var seenCount=0;
  for(var i=0;i<sw.length;i++){if(this.pSeen.has(trim(sw[i].english).toLowerCase()))seenCount++}
  var sPct=Math.round((seenCount/sw.length)*100);
  var knownCount=this.pKnown.length;
  var unknownCount=this.pUnknown.length;
  var totalInRound=knownCount+unknownCount;
  var roundPct=totalInRound>0?Math.round((knownCount/totalInRound)*100):0;

  if(unknownCount===0){
    /* set complete — save result */
    var existing=-1;
    for(var r=0;r<this.pSetResults.length;r++){if(this.pSetResults[r].setIdx===this.pCurSet){existing=r;break}}
    var resObj={setIdx:this.pCurSet,rounds:this.pRound,known:seenCount,total:sw.length};
    if(existing>=0)this.pSetResults[existing]=resObj;else this.pSetResults.push(resObj);
    this.showPracticeSetDone();
  }else{
    this.showPracticeRoundResult(roundPct,knownCount,unknownCount,sPct,seenCount,sw.length);
  }
};

App.prototype.showPracticeRoundResult=function(roundPct,knownCount,unknownCount,sPct,seenCount,setTotal){

        '<div class="sr"><span class="sl">❌ 몰라요</span><span class="sv r">'+unknownCount+'개</span></div>'+
      '</div>'+

App.prototype.retryPracticeUnknown=function(){
  this.pCards=shuffle(this.pUnknown.slice());
  this.pIdx=0;this.pKnown=[];this.pUnknown=[];this.pFlipped=false;
  this.pRound++;
  this.showCard();
};

/* ═══════════════════════════════════════════════
   TEST MODE
   ═══════════════════════════════════════════════ */

App.prototype.startFullTest=function(){
  this.masteredWords=new SimpleSet();
  this.wrongHistory=[];
  this.setResults=[];
  this.curSet=0;
  this.showSetMap();
};

App.prototype.showSetMap=function(){
  this.setTitle(CONFIG.title);
  var overallPct=this.allWords.length>0?Math.round((this.masteredWords.size/this.allWords.length)*100):0;
  var passed=overallPct>=this.passThreshold;
  if(this.setResults.length===this.totalSets&&passed){this.showFinalCelebration();return}
  this.setSub('테스트 '+overallPct+'% ('+this.masteredWords.size+'/'+this.allWords.length+')');

  var setsHtml='';
  for(var i=0;i<this.totalSets;i++){
    var sw=this.sets[i];var result=null;
    for(var r=0;r<this.setResults.length;r++){if(this.setResults[r].setIdx===i){result=this.setResults[r];break}}
    var m=0;for(var w=0;w<sw.length;w++){if(this.masteredWords.has(trim(sw[w].english).toLowerCase()))m++}
    var done=!!result;var sPct=Math.round((m/sw.length)*100);
    var cls,icon,stxt,act;
    if(done&&sPct===100){cls='pf';icon='⭐';stxt='완벽';act=' data-action="retrySet" data-args="'+i+'"'}
    else if(done){cls='dn';icon='✅';stxt=sPct+'%';act=' data-action="retrySet" data-args="'+i+'"'}
    else{cls='cur';icon='▶';stxt='시작';act=' data-action="startSet" data-args="'+i+'"'}
    setsHtml+='<div class="sc-w"><div class="s-card '+cls+'"'+act+'><div class="sn">세트 '+(i+1)+'</div><div class="sw">'+sw.length+'개</div><div class="sb"><div class="sbf" style="width:'+sPct+'%"></div></div><div class="ss">'+icon+' '+stxt+'</div></div></div>';
  }
  var barColor=passed?'#10b981':'#f59e0b';
  var failMsg='';
  if(this.setResults.length===this.totalSets&&!passed){failMsg='<div class="alert alert-r" style="margin-bottom:14px">통과 기준 '+this.passThreshold+'%에 미달. 세트를 다시 도전하세요!</div>'}

  this.render(
    '<div class="fade">'+
      '<div style="text-align:center;margin-bottom:16px"><div style="font-size:2.2rem;margin-bottom:6px">📊</div>'+
        '<h2 style="font-size:1.1rem;font-weight:700;color:#0f172a;margin-bottom:3px">테스트 진행 현황</h2>'+
        '<p style="color:#64748b;font-size:.82rem">원하는 세트를 자유롭게 선택하세요</p></div>'+
      '<div class="ob"><div class="ob-top"><span style="color:#64748b">전체 성취도</span><span style="font-weight:700;color:'+barColor+'">'+overallPct+'% / '+this.passThreshold+'%</span></div>'+
        '<div class="ob-bar"><div class="ob-fill" style="width:'+overallPct+'%;background:'+barColor+'"></div><div class="ob-mark" style="left:'+this.passThreshold+'%"></div></div>'+
        '<div class="ob-sub">'+this.masteredWords.size+' / '+this.allWords.length+' 단어</div></div>'+
      failMsg+
      '<div class="sg">'+setsHtml+'</div>'+
      '<button class="btn btn-ghost" data-action="showHome">← 처음으로</button>'+
    '</div>'
  );
  this.toTop();
};

App.prototype.startSet=function(idx){
  this.curSet=idx;this.round=0;this.roundHistory=[];
  var sw=this.sets[idx];this.setWordsAll=sw;
  var un=[];for(var i=0;i<sw.length;i++){if(!this.masteredWords.has(trim(sw[i].english).toLowerCase()))un.push(sw[i])}
  this.roundWords=un.length>0?un:sw.slice();
  this.startSetRound();
};
App.prototype.retrySet=function(idx){this.startSet(idx)};

App.prototype.startSetRound=function(){
  this.round++;this.roundWords=shuffle(this.roundWords);
  this.qIndex=0;this.roundCorrect=[];this.roundWrong=[];this.answered=false;
  this.setTitle('세트 '+(this.curSet+1)+' / '+this.totalSets);
  this.setSub(this.round+'라운드');
  this.showQuestion();
};

App.prototype.getQType=function(){
  if(this.testType==='multiple_choice')return'mc';if(this.testType==='fill_in')return'fill';return Math.random()<.5?'mc':'fill';
};
App.prototype.getOptions=function(word){
  var others=[];for(var i=0;i<this.allWords.length;i++){if(this.allWords[i].english!==word.english)others.push(this.allWords[i])}
  var sh=shuffle(others);var dist=[];for(var j=0;j<Math.min(3,sh.length);j++)dist.push(sh[j].english);
  while(dist.length<3)dist.push('---');dist.push(word.english);return shuffle(dist);
};

App.prototype.showQuestion=function(){
  if(this.qIndex>=this.roundWords.length){this.endSetRound();return}
  this.answered=false;var word=this.roundWords[this.qIndex];
  var total=this.roundWords.length;var pct=Math.round((this.qIndex/total)*100);
  var qType=this.getQType();this.curQType=qType;
  var optsHtml='';
  if(qType==='mc'){
    this.currentOptions=this.getOptions(word);optsHtml='<div class="opts">';
    for(var i=0;i<this.currentOptions.length;i++){optsHtml+='<button class="opt-btn" data-option-index="'+i+'">'+esc(this.currentOptions[i])+'</button>'}
    optsHtml+='</div>';
  }else{
    this.currentOptions=[];
    optsHtml='<div class="inp-area"><input type="text" id="answer-input" class="ans-inp" placeholder="영어 단어를 입력하세요..." autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false"><button class="btn btn-accent" style="margin-top:12px" data-action="submitFillIn">확인</button></div>';
  }
  this.render(
    '<div class="fade">'+
      '<div style="display:-webkit-box;display:-webkit-flex;display:flex;-webkit-box-pack:justify;-webkit-justify-content:space-between;justify-content:space-between;-webkit-box-align:center;-webkit-align-items:center;align-items:center;margin-bottom:12px">'+
        '<div class="round-tag">세트'+(this.curSet+1)+' · '+this.round+'R</div>'+
        '<div class="back-link" data-action="showSetMap">← 목록</div></div>'+
      '<div class="q-counter">'+(this.qIndex+1)+' / '+total+'</div>'+
      '<div class="prog-bar"><div class="prog-fill" style="width:'+pct+'%"></div></div>'+
      '<div class="kor-word">'+esc(word.korean)+
        (word.sentence?'<div style="font-size:.82rem;color:#64748b;margin-top:10px;line-height:1.5;font-weight:400;padding-top:10px;border-top:1px dashed #cbd5e1;word-break:keep-all">'+esc(maskWord(word.sentence,word.english))+'</div>':'')+
      '</div>'+
      '<div class="q-hint">'+(qType==='mc'?'알맞은 영어 단어를 선택하세요':'알맞은 영어 단어를 입력하세요')+'</div>'+
      optsHtml+'</div>'
  );
  this.toTop();
  if(qType==='fill')setTimeout(function(){var inp=document.getElementById('answer-input');if(inp)inp.focus()},150);
};

App.prototype.submitFillIn=function(){
  if(this.answered)return;var inp=document.getElementById('answer-input');if(!inp)return;
  var a=trim(inp.value);if(!a)return;this.checkAnswer(a);
};

App.prototype.checkAnswer=function(answer){
  if(this.answered)return;this.answered=true;
  var word=this.roundWords[this.qIndex];
  var isCorrect=trim(answer).toLowerCase()===trim(word.english).toLowerCase();
  if(isCorrect){this.roundCorrect.push(word);this.masteredWords.add(trim(word.english).toLowerCase())}
  else{this.roundWrong.push({english:word.english,korean:word.korean,sentence:word.sentence||'',sentenceKo:word.sentenceKo||'',userAnswer:answer});
    this.wrongHistory.push({english:word.english,korean:word.korean,sentence:word.sentence||'',sentenceKo:word.sentenceKo||'',userAnswer:answer,round:this.round,set:this.curSet+1})}
  this.showFeedback(isCorrect,word,answer);
};

App.prototype.showFeedback=function(isCorrect,word,userAnswer){
  if(this.curQType==='mc'){
    var btns=document.querySelectorAll('.opt-btn');
    for(var i=0;i<btns.length;i++){btns[i].disabled=true;
      var idx=parseInt(btns[i].getAttribute('data-option-index'),10);var opt=this.currentOptions[idx];
      if(trim(opt).toLowerCase()===trim(word.english).toLowerCase()){btns[i].className+=(isCorrect?' correct':' reveal')}
      else if(trim(opt).toLowerCase()===trim(userAnswer).toLowerCase()){btns[i].className+=' wrong'}}
  }else{var inp=document.getElementById('answer-input');if(inp){inp.disabled=true;inp.className+=(isCorrect?' correct':' wrong')}}
  var fc=document.createElement('div');
  fc.innerHTML=isCorrect?'<div class="fb ok">정답입니다! ✅</div>':'<div class="fb ng">오답입니다 ❌<div class="ans">정답: <strong>'+esc(word.english)+'</strong></div></div>';
  var nb=document.createElement('div');nb.style.marginTop='16px';
  nb.innerHTML='<button class="btn btn-primary" data-action="nextQuestion">다음 문제</button>';
  var ct=this.app.querySelector('div');if(ct){ct.appendChild(fc);ct.appendChild(nb)}
};

App.prototype.nextQuestion=function(){this.qIndex++;this.showQuestion()};

App.prototype.endSetRound=function(){
  var sw=this.setWordsAll;var m=0;
  for(var i=0;i<sw.length;i++){if(this.masteredWords.has(trim(sw[i].english).toLowerCase()))m++}
  this.roundHistory.push({round:this.round,tested:this.roundWords.length,correct:this.roundCorrect.length,wrong:this.roundWrong.length});
  if(m===sw.length||this.roundWrong.length===0)this.showSetComplete();
  else this.showSetRoundSummary();
};

App.prototype.showSetRoundSummary=function(){

  var sPct=Math.round((m/sw.length)*100);var remaining=this.roundWrong.length;

        '<p style="color:#64748b;font-size:.85rem">'+m+'/'+sw.length+' 단어 완료</p></div>'+
      '<div class="card"><div class="sr"><span class="sl">문제 수</span><span class="sv">'+this.roundWords.length+'개</span></div>'+
        '<div class="sr"><span class="sl">정답</span><span class="sv g">'+this.roundCorrect.length+'개</span></div>'+
        '<div class="sr"><span class="sl">오답</span><span class="sv r">'+this.roundWrong.length+'개</span></div></div>'+
      '<div class="alert alert-r">틀린 '+remaining+'개로 다시 도전!</div>'+
      '<button class="btn btn-accent" style="margin-top:14px" data-action="continueSetRound">다음 라운드 ('+remaining+'개)</button></div>'
  );

App.prototype.continueSetRound=function(){
  var next=[];for(var i=0;i<this.roundWrong.length;i++){next.push({english:this.roundWrong[i].english,korean:this.roundWrong[i].korean,sentence:this.roundWrong[i].sentence||'',sentenceKo:this.roundWrong[i].sentenceKo||''})}
  this.roundWords=next;this.startSetRound();
};

App.prototype.showSetComplete=function(){
  var sw=this.setWordsAll;var m=0;
  for(var i=0;i<sw.length;i++){if(this.masteredWords.has(trim(sw[i].english).toLowerCase()))m++}
  var sPct=Math.round((m/sw.length)*100);
  var overallPct=Math.round((this.masteredWords.size/this.allWords.length)*100);
  var passed=overallPct>=this.passThreshold;

  var existing=-1;for(var r=0;r<this.setResults.length;r++){if(this.setResults[r].setIdx===this.curSet){existing=r;break}}
  var resObj={setIdx:this.curSet,rounds:this.round,correct:m,total:sw.length,pct:sPct};
  if(existing>=0)this.setResults[existing]=resObj;else this.setResults.push(resObj);

  var rndHtml='';
  if(this.roundHistory.length>1){rndHtml='<div class="card"><h3>라운드별 기록</h3>';
    for(var h=0;h<this.roundHistory.length;h++){var rh=this.roundHistory[h];rndHtml+='<div class="sr"><span class="sl">'+rh.round+'R ('+rh.tested+'문제)</span><span class="sv">정답 '+rh.correct+' / 오답 '+rh.wrong+'</span></div>'}
    rndHtml+='</div>'}
  var barColor=passed?'#10b981':'#f59e0b';
  var allDone=this.setResults.length===this.totalSets;
  var hasNext=this.curSet<this.totalSets-1;
  var nextNotDone=true;if(hasNext){for(var ns=0;ns<this.setResults.length;ns++){if(this.setResults[ns].setIdx===this.curSet+1){nextNotDone=false;break}}}
  var btnsHtml='';
  if(allDone&&passed){btnsHtml='<button class="btn btn-accent" data-action="showFinalCelebration" style="font-size:1.05rem">🎉 최종 결과</button>'}
  else if(hasNext&&nextNotDone){btnsHtml='<button class="btn btn-accent" data-action="goNextSet">다음 세트 (세트 '+(this.curSet+2)+') →</button><button class="btn btn-ghost" data-action="showSetMap">세트 목록</button>'}
  else{btnsHtml='<button class="btn btn-accent" data-action="showSetMap">세트 목록으로</button>'}

  this.setTitle('세트 '+(this.curSet+1)+' 완료!');this.setSub('전체 '+overallPct+'%');
  this.render(
    '<div class="fade"><div style="text-align:center;margin-bottom:12px"><div style="font-size:2.2rem;margin-bottom:6px">🎯</div>'+
        '<h2 style="font-size:1.1rem;font-weight:700;color:#0f172a;margin-bottom:4px">세트 '+(this.curSet+1)+' 완료!</h2>'+
        '<p style="color:#64748b;font-size:.85rem">'+m+'/'+sw.length+' · '+this.round+'라운드</p></div>'+
      '<div class="sc g">'+sPct+'%</div>'+
      '<div class="card"><h3>세트 결과</h3><div class="sr"><span class="sl">단어 수</span><span class="sv">'+sw.length+'개</span></div>'+
        '<div class="sr"><span class="sl">정복</span><span class="sv g">'+m+'개</span></div>'+
        '<div class="sr"><span class="sl">라운드</span><span class="sv">'+this.round+'회</span></div></div>'+
      rndHtml+
      '<div class="ob"><div class="ob-top"><span style="color:#64748b">전체 진행률</span><span style="font-weight:700;color:#0f172a">'+overallPct+'% / '+this.passThreshold+'%</span></div>'+
        '<div class="ob-bar"><div class="ob-fill" style="width:'+overallPct+'%;background:'+barColor+'"></div><div class="ob-mark" style="left:'+this.passThreshold+'%"></div></div>'+
        '<div class="ob-sub">'+this.masteredWords.size+' / '+this.allWords.length+' 단어</div></div>'+
      btnsHtml+'</div>'
  );

};

App.prototype.goNextSet=function(){this.curSet++;this.startSet(this.curSet)};

/* ─── Final Celebration ─── */
App.prototype.showFinalCelebration=function(){
  var overallPct=Math.round((this.masteredWords.size/this.allWords.length)*100);
  this.setTitle('테스트 완료!');this.setSub('축하합니다!');this.showConfetti();

  var wlHtml='';
  if(this.wrongHistory.length>0){wlHtml='<div class="wl"><h3 style="font-size:.95rem;font-weight:700;color:#0f172a;margin-bottom:10px">틀렸던 문제</h3>';
    for(var w=0;w<this.wrongHistory.length;w++){var wh=this.wrongHistory[w];
      wlHtml+='<div class="wi"><div><div class="ww">'+esc(wh.korean)+'</div><div class="wr">세트'+wh.set+' · '+wh.round+'R</div></div><div style="text-align:right"><div class="wa">'+esc(wh.userAnswer)+'</div><div class="wc">'+esc(wh.english)+'</div></div></div>'}
    wlHtml+='</div>'}
  var ssHtml='<div class="card"><h3>세트별 결과</h3>';
  for(var s=0;s<this.setResults.length;s++){var sr=this.setResults[s];ssHtml+='<div class="sr"><span class="sl">세트 '+(sr.setIdx+1)+' ('+sr.total+')</span><span class="sv">'+sr.pct+'% · '+sr.rounds+'R</span></div>'}
  ssHtml+='</div>';

  this.render(
    '<div class="fade"><div class="celeb"><div class="em">🎉</div><h2>축하합니다!</h2><p>모든 세트를 완료하고<br>테스트를 통과했습니다!</p></div>'+
      '<div class="sc g">'+overallPct+'%</div>'+
      '<div class="card"><h3>최종 결과</h3>'+
        '<div class="sr"><span class="sl">전체 단어</span><span class="sv">'+this.allWords.length+'개</span></div>'+
        '<div class="sr"><span class="sl">정복</span><span class="sv g">'+this.masteredWords.size+'개</span></div>'+
        '<div class="sr"><span class="sl">성취도</span><span class="sv g">'+overallPct+'%</span></div>'+
        '<div class="sr"><span class="sl">세트</span><span class="sv">'+this.totalSets+'</span></div>'+
        '<div class="sr"><span class="sl">총 오답</span><span class="sv'+(this.wrongHistory.length>0?' r':' g')+'">'+this.wrongHistory.length+'회</span></div></div>'+
      ssHtml+wlHtml+
      '<button class="btn btn-accent" style="margin-top:20px" data-action="startFullTest">처음부터 다시</button>'+
      '<button class="btn btn-ghost" data-action="showHome">홈으로</button></div>'
  );
  this.toTop();
};

App.prototype.showConfetti=function(){
  var c=document.createElement('div');c.className='conf';
  var colors=['#f59e0b','#f97316','#10b981','#3b82f6','#8b5cf6','#ec4899','#ef4444'];
  for(var i=0;i<50;i++){var p=document.createElement('i');
    var dur=2+Math.random()*2;var delay=Math.random()*2;
    p.style.cssText='-webkit-animation:fall '+dur+'s '+delay+'s ease-in forwards;animation:fall '+dur+'s '+delay+'s ease-in forwards;left:'+(Math.random()*100)+'%';
    var sz=6+Math.random()*8;p.style.width=sz+'px';p.style.height=sz+'px';
    p.style.borderRadius=Math.random()>.5?'50%':'2px';
    p.style.background=colors[Math.floor(Math.random()*colors.length)];
    c.appendChild(p)}
  document.body.appendChild(c);
  setTimeout(function(){if(c.parentNode)c.parentNode.removeChild(c)},5500);
};

new App();
</script>
</body>
