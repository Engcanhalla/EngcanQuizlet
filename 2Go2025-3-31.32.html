<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2Go2025-3-31.32</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Noto Sans KR",sans-serif;background:linear-gradient(135deg,#1e3a5f 0%,#2d5a87 50%,#1a4a6e 100%);min-height:100vh;padding:16px;display:flex;align-items:center;justify-content:center}
.container{max-width:720px;width:100%;background:#fff;border-radius:24px;box-shadow:0 20px 60px rgba(0,0,0,.3);overflow:hidden}
.header{background:linear-gradient(135deg,#1e3a5f 0%,#2d5a87 100%);padding:24px;color:#fff;text-align:center}
.header h1{font-size:1.3rem;font-weight:700;margin-bottom:4px}
.header p{opacity:.85;font-size:.82rem}
.content{padding:20px}
@keyframes pop{0%{transform:scale(.8);opacity:0}50%{transform:scale(1.05)}100%{transform:scale(1);opacity:1}}
@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-8px)}40%,80%{transform:translateX(8px)}}
.set-list{display:grid;gap:12px;margin-top:8px}
.set-card{background:#f9fafb;border:2px solid #e5e7eb;border-radius:16px;padding:16px 20px;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:space-between}
.set-card:hover{border-color:#3b82f6;background:#eff6ff;transform:translateY(-2px)}
.set-card.done{border-color:#10b981;background:#f0fdf4}
.q-grid{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;padding:10px 0}
.q-chip{width:44px;height:44px;border-radius:12px;border:2px solid #e5e7eb;background:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.95rem;color:#374151;cursor:pointer;transition:all .2s}
.q-chip:hover{border-color:#3b82f6;background:#eff6ff}
.q-chip.correct{border-color:#10b981;background:#ecfdf5;color:#065f46}
.q-chip.wrong{border-color:#ef4444;background:#fef2f2;color:#991b1b}
.progress-bar{height:6px;background:#e5e7eb;border-radius:3px;margin-bottom:14px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,#1e3a5f,#3b82f6);border-radius:3px;transition:width .4s}
.q-counter{text-align:center;font-size:.82rem;color:#6b7280;margin-bottom:6px;font-weight:500}
.key-box{text-align:center;margin:14px 0;padding:18px;background:linear-gradient(135deg,#f0f7ff,#e8f0fe);border-radius:16px;border:2px solid #bfdbfe}
.key-box .expr{font-size:1.4rem;font-weight:800;color:#1e3a5f;margin-bottom:6px;line-height:1.4}
.key-box .qtext{font-size:.95rem;color:#374151;font-weight:500}
.key-box .qtext .hl{color:#ef4444;font-weight:800}
.passage-box{margin:10px 0;padding:12px 16px;background:#f9fafb;border-left:4px solid #3b82f6;border-radius:0 12px 12px 0;font-size:.88rem;color:#4b5563;line-height:1.7;font-style:italic}
.show-passage-btn{margin:4px auto 10px;display:block;padding:6px 14px;background:#eff6ff;color:#3b82f6;border:1px solid #bfdbfe;border-radius:8px;font-size:.78rem;cursor:pointer;font-family:inherit;font-weight:500}
.options{display:grid;gap:10px;margin-top:14px}
.option-btn{padding:14px 18px;background:#fff;border:2px solid #e5e7eb;border-radius:14px;font-size:1.05rem;font-weight:500;cursor:pointer;transition:all .2s;text-align:left;font-family:inherit;color:#1f2937;display:flex;align-items:center;gap:12px}
.option-btn .num{width:32px;height:32px;border-radius:50%;background:#f3f4f6;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.95rem;color:#6b7280;flex-shrink:0;transition:all .2s}
.option-btn:hover:not(:disabled){border-color:#3b82f6;background:#f0f7ff}
.option-btn.correct{border-color:#10b981;background:#ecfdf5;color:#065f46;animation:pop .3s}
.option-btn.correct .num{background:#10b981;color:#fff}
.option-btn.wrong{border-color:#ef4444;background:#fef2f2;color:#991b1b;animation:shake .4s}
.option-btn.wrong .num{background:#ef4444;color:#fff}
.option-btn.reveal{border-color:#10b981;background:#ecfdf5;color:#065f46}
.option-btn.reveal .num{background:#10b981;color:#fff}
.option-btn:disabled{cursor:default;opacity:.85}
.feedback{text-align:center;padding:12px;border-radius:14px;margin-top:12px;font-weight:600;font-size:.95rem}
.feedback.correct-fb{background:#ecfdf5;color:#065f46;border:1px solid #a7f3d0}
.feedback.wrong-fb{background:#fef2f2;color:#991b1b;border:1px solid #fecaca}
.explain-box{margin-top:10px;padding:12px 14px;background:#f9fafb;border-radius:12px;border:1px solid #e5e7eb}
.ex-title{font-size:.95rem;font-weight:700;color:#374151;margin-bottom:8px}
.ex-item{padding:7px 0;border-bottom:1px solid #f3f4f6;font-size:.93rem;line-height:1.7}
.ex-item:last-child{border-bottom:none}
.tag-w{color:#ef4444;font-weight:700;font-size:.82rem}
.tag-o{color:#10b981;font-size:.82rem}
.trans{color:#6b7280;font-size:.9rem}
.nav-bar{display:flex;justify-content:space-between;align-items:center;margin-top:18px;padding-top:14px;border-top:1px solid #e5e7eb;gap:6px}
.nav-btn{padding:9px 16px;border:none;border-radius:10px;font-size:.88rem;font-weight:600;cursor:pointer;transition:all .2s;font-family:inherit;white-space:nowrap}
.nav-btn:hover{transform:translateY(-1px)}
.nav-btn:disabled{opacity:.3;cursor:default;transform:none}
.nav-btn.prev{background:#f3f4f6;color:#374151}
.nav-btn.next{background:linear-gradient(135deg,#1e3a5f,#3b82f6);color:#fff}
.nav-btn.home,.nav-btn.back{background:#f3f4f6;color:#374151}
.score-circle{width:110px;height:110px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:16px auto;font-size:1.8rem;font-weight:800;border:6px solid}
.score-circle.pass{border-color:#10b981;color:#10b981;background:#ecfdf5}
.score-circle.fail{border-color:#ef4444;color:#ef4444;background:#fef2f2}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:12px 24px;border:none;border-radius:12px;font-size:.95rem;font-weight:600;cursor:pointer;transition:all .2s;font-family:inherit}
.btn-primary{background:linear-gradient(135deg,#1e3a5f,#3b82f6);color:#fff}
.btn-block{width:100%}
.opt-list{margin:16px 0}
.opt-item{display:flex;align-items:flex-start;gap:12px;padding:14px 18px;border-radius:12px;border:2px solid #e5e7eb;margin-bottom:8px;font-size:1.05rem;line-height:1.6;color:#1f2937}
.opt-item .onum{width:30px;height:30px;border-radius:50%;background:#f3f4f6;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.9rem;color:#6b7280;flex-shrink:0}
.opt-item.correct{border-color:#ef4444;background:#fef2f2}
.opt-item.correct .onum{background:#ef4444;color:#fff}
.opt-item.wrong{border-color:#10b981;background:#f0fdf4}
.opt-item.wrong .onum{background:#10b981;color:#fff}
.answer-section{margin:16px 0;padding:18px;background:#f0fdf4;border-radius:14px;border:1px solid #a7f3d0}
.ans-label{font-size:.85rem;font-weight:700;color:#065f46;margin-bottom:10px}
.ans-correct{font-size:1.1rem;font-weight:800;color:#dc2626;margin-bottom:12px}
.explain-item{padding:8px 0;border-bottom:1px solid #e5e7eb;font-size:.95rem;line-height:1.7}
.explain-item:last-child{border-bottom:none}
.tag-wrong{color:#ef4444;font-weight:700;font-size:.8rem}

<script>
var CONFIG={"title":"2Go2025-3-31.32","passThreshold":80,"questions":[{"questionNumber":1,"sourceQuestion":"지문 1번","keyExpression":"global circulation and dissemination of music","questionText":"'global circulation and dissemination of music'을 잘못 paraphrasing한 것은?","options":[{"text":"the worldwide spread and distribution of music","isCorrect":false,"explanation":"올바름: 'global'은 'worldwide'로, 'circulation and dissemination'은 'spread and distribution'으로 정확하게 대응된다.","translation":"음악의 전 세계적 확산과 배포"},{"text":"the international flow and sharing of music across borders","isCorrect":false,"explanation":"올바름: 'global circulation'을 'international flow across borders'로, 'dissemination'을 'sharing'으로 바르게 paraphrasing했다.","translation":"국경을 넘는 음악의 국제적 흐름과 공유"},{"text":"the local production and restriction of music within specific regions","isCorrect":true,"explanation":"잘못됨: 'global'(전 세계적)을 'local'(지역적)로, 'circulation and dissemination'(유통 및 보급)을 'production and restriction'(생산 및 제한)으로 바꾸어 의미가 정반대가 되었다.","translation":"특정 지역 내 음악의 지역적 생산과 제한"},{"text":"music being widely circulated and made available to audiences worldwide","isCorrect":false,"explanation":"올바름: 'global circulation'을 'widely circulated worldwide'로, 'dissemination'을 'made available'로 자연스럽게 paraphrasing했다.","translation":"전 세계 청중에게 음악이 널리 유통되고 이용 가능해짐"},{"text":"the broad transmission and popularization of music on a global scale","isCorrect":false,"explanation":"올바름: 'circulation'을 'transmission'으로, 'dissemination'을 'popularization'으로, 'global'을 'on a global scale'로 바르게 paraphrasing했다.","translation":"세계적 규모의 음악의 광범위한 전달과 대중화"}],"passage":"The explosion of popular music in the second half of the twentieth century as well as the global circulation and dissemination of music by the creative industries propelled a new understanding of accessibility in relation to music.","passageTranslation":"20세기 후반 대중음악의 폭발적 성장과 창의 산업에 의한 음악의 전 세계적 유통 및 보급은 음악과 관련된 접근성에 대한 새로운 이해를 촉진시켰다."},{"questionNumber":2,"sourceQuestion":"지문 1번","keyExpression":"propelled a new understanding of accessibility","questionText":"'propelled a new understanding of accessibility'을 잘못 paraphrasing한 것은?","options":[{"text":"drove a fresh perspective on how easily music could be reached by anyone","isCorrect":false,"explanation":"올바름: 'propelled'을 'drove'로, 'new understanding'을 'fresh perspective'로, 'accessibility'를 'how easily music could be reached'로 바르게 paraphrasing했다.","translation":"누구든지 음악에 얼마나 쉽게 접근할 수 있는지에 대한 새로운 시각을 이끌었다"},{"text":"advanced a novel conception of how open music was to the general public","isCorrect":false,"explanation":"올바름: 'propelled'을 'advanced'로, 'new understanding'을 'novel conception'으로, 'accessibility'를 'how open music was to the general public'으로 자연스럽게 바꾸었다.","translation":"일반 대중에게 음악이 얼마나 열려 있는지에 대한 새로운 개념을 발전시켰다"},{"text":"pushed forward a changed view of who could take part in music","isCorrect":false,"explanation":"올바름: 'propelled'을 'pushed forward'로, 'new understanding'을 'changed view'로, 'accessibility'를 'who could take part in music'으로 적절히 바꾸었다.","translation":"누가 음악에 참여할 수 있는지에 대한 변화된 시각을 앞으로 밀어나갔다"},{"text":"blocked any progress in understanding how music could be restricted from the public","isCorrect":true,"explanation":"잘못됨: 'propelled'(촉진시켰다)를 'blocked'(막았다)로, 'new understanding of accessibility'(접근성에 대한 새로운 이해)를 'restricted from the public'(대중으로부터 제한)으로 바꾸어 의미가 완전히 반대가 되었다.","translation":"음악이 대중으로부터 어떻게 제한될 수 있는지에 대한 이해의 어떠한 진전도 막았다"},{"text":"sparked a renewed awareness that music could be available to a much wider audience","isCorrect":false,"explanation":"올바름: 'propelled'을 'sparked'로, 'new understanding of accessibility'를 'renewed awareness that music could be available to a wider audience'로 의미를 살려 paraphrasing했다.","translation":"음악이 훨씬 더 넓은 청중에게 제공될 수 있다는 새로워진 인식을 불러일으켰다"}],"passage":"The explosion of popular music in the second half of the twentieth century as well as the global circulation and dissemination of music by the creative industries propelled a new understanding of accessibility in relation to music.","passageTranslation":"20세기 후반 대중음악의 폭발적 성장과 창의 산업에 의한 음악의 전 세계적 유통 및 보급은 음악과 관련된 접근성에 대한 새로운 이해를 촉진시켰다."},{"questionNumber":3,"sourceQuestion":"지문 1번","keyExpression":"a much more relaxed and inclusive attitude to music making","questionText":"'a much more relaxed and inclusive attitude to music making'을 잘못 paraphrasing한 것은?","options":[{"text":"a considerably more open and welcoming approach to creating music","isCorrect":false,"explanation":"올바름: 'relaxed'를 'open'으로, 'inclusive'를 'welcoming'으로, 'attitude'를 'approach'로 바르게 바꾸었다.","translation":"음악 창작에 대한 훨씬 더 개방적이고 환영하는 접근 방식"},{"text":"a stricter and more exclusive standard reserved for professional music production","isCorrect":true,"explanation":"잘못됨: 'relaxed'(느긋한)를 'stricter'(더 엄격한)로, 'inclusive'(포용적인)를 'exclusive'(배타적인)로 반의어 대체하여 의미가 완전히 반대가 되었다.","translation":"전문적인 음악 제작을 위해 예약된 더 엄격하고 배타적인 기준"},{"text":"a far less rigid and more accepting mindset toward musical participation","isCorrect":false,"explanation":"올바름: 'relaxed'를 'less rigid'로, 'inclusive'를 'accepting'으로, 'attitude'를 'mindset'으로 자연스럽게 paraphrasing했다.","translation":"음악 참여에 대한 훨씬 덜 엄격하고 더 수용적인 사고방식"},{"text":"an easygoing and broad-minded stance on who could make music","isCorrect":false,"explanation":"올바름: 'relaxed'를 'easygoing'으로, 'inclusive'를 'broad-minded'로, 'attitude'를 'stance'로 적절히 paraphrasing했다.","translation":"누가 음악을 만들 수 있는지에 대한 느긋하고 개방적인 입장"},{"text":"a greatly loosened and all-embracing outlook on music creation","isCorrect":false,"explanation":"올바름: 'relaxed'를 'loosened'으로, 'inclusive'를 'all-embracing'으로, 'attitude'를 'outlook'으로 바르게 대응시켰다.","translation":"음악 창작에 대한 크게 완화되고 모든 것을 포용하는 시각"}],"passage":"This led to specific genres such as skiffle, but also, more generally, reflected a much more relaxed and inclusive attitude to music making.","passageTranslation":"이것은 스키플과 같은 특정 장르로 이어졌을 뿐만 아니라, 더 일반적으로는 음악 만들기에 대한 훨씬 더 느긋하고 포용적인 태도를 반영했다."},{"questionNumber":4,"sourceQuestion":"지문 1번","keyExpression":"driven by a spirit of rebellion and freedom","questionText":"'driven by a spirit of rebellion and freedom'을 잘못 paraphrasing한 것은?","options":[{"text":"motivated by a sense of defiance and liberation","isCorrect":false,"explanation":"올바름: 'driven'을 'motivated'로, 'rebellion'을 'defiance'로, 'freedom'을 'liberation'으로 바르게 paraphrasing했다.","translation":"반항심과 해방감에 의해 동기 부여된"},{"text":"fueled by an attitude of resistance and independence","isCorrect":false,"explanation":"올바름: 'driven'을 'fueled'로, 'rebellion'을 'resistance'로, 'freedom'을 'independence'로 자연스럽게 바꾸었다.","translation":"저항과 독립의 태도에 의해 촉진된"},{"text":"powered by an ethos of challenging social norms and embracing liberty","isCorrect":false,"explanation":"올바름: 'driven'을 'powered'로, 'rebellion'을 'challenging social norms'으로, 'freedom'을 'liberty'로 의미를 살려 paraphrasing했다.","translation":"사회 규범에 도전하고 자유를 포용하는 정신에 의해 이끌린"},{"text":"suppressed by a mood of conformity and obedience to authority","isCorrect":true,"explanation":"잘못됨: 'driven'(이끌린)을 'suppressed'(억압된)으로, 'rebellion'(반항)을 'conformity'(순응)으로, 'freedom'(자유)을 'obedience to authority'(권위에 대한 복종)으로 반의어 대체하여 의미가 완전히 반대가 되었다.","translation":"순응과 권위에 대한 복종의 분위기에 의해 억압된"},{"text":"propelled by values of nonconformity and unrestricted self-expression","isCorrect":false,"explanation":"올바름: 'driven'을 'propelled'로, 'rebellion'을 'nonconformity'로, 'freedom'을 'unrestricted self-expression'으로 의미에 맞게 paraphrasing했다.","translation":"비순응과 제약 없는 자기 표현의 가치에 의해 추진된"}],"passage":"While ordinary people had always sung and made music, the popular music movement was driven by a spirit of rebellion and freedom.","passageTranslation":"평범한 사람들이 항상 노래하고 음악을 만들어 왔지만, 대중음악 운동은 반항과 자유의 정신에 의해 이끌렸다."},{"questionNumber":5,"sourceQuestion":"지문 1번","keyExpression":"made it a condition for their music to be non-virtuosic and accessible to all","questionText":"'made it a condition for their music to be non-virtuosic and accessible to all'을 잘못 paraphrasing한 것은?","options":[{"text":"required that their music demand no special skill and remain open to everyone","isCorrect":false,"explanation":"올바름: 'made it a condition'을 'required'로, 'non-virtuosic'을 'demand no special skill'로, 'accessible to all'을 'open to everyone'으로 바르게 바꾸었다.","translation":"자신들의 음악이 특별한 기술을 요구하지 않고 모두에게 열려 있도록 요구했다"},{"text":"insisted that their music stay technically undemanding and available to all listeners","isCorrect":false,"explanation":"올바름: 'made it a condition'을 'insisted'로, 'non-virtuosic'을 'technically undemanding'으로, 'accessible to all'을 'available to all listeners'로 의미를 살렸다.","translation":"자신들의 음악이 기술적으로 까다롭지 않고 모든 청취자에게 이용 가능하도록 주장했다"},{"text":"ensured that only highly skilled performers could master and perform their music","isCorrect":true,"explanation":"잘못됨: 'non-virtuosic'(기교 불필요)를 'only highly skilled performers could master'(고도로 숙련된 연주자만 익힐 수 있는)으로, 'accessible to all'(모두 접근 가능)을 정반대 의미로 바꾸었다.","translation":"고도로 숙련된 연주자들만이 자신들의 음악을 익히고 연주할 수 있도록 보장했다"},{"text":"set as a rule that their music be free from technical complexity and widely accessible","isCorrect":false,"explanation":"올바름: 'made it a condition'을 'set as a rule'로, 'non-virtuosic'을 'free from technical complexity'로, 'accessible to all'을 'widely accessible'로 자연스럽게 paraphrasing했다.","translation":"자신들의 음악이 기술적 복잡성에서 자유롭고 광범위하게 접근 가능해야 한다는 규칙을 세웠다"},{"text":"established that musical ability should not be a barrier to engaging with their genre","isCorrect":false,"explanation":"올바름: 'non-virtuosic and accessible to all'의 핵심 의미를 'musical ability should not be a barrier'로 의역하여 의미가 잘 통한다.","translation":"음악적 능력이 자신들의 장르에 참여하는 데 장벽이 되어서는 안 된다고 확립했다"}],"passage":"This approach led to the punk movement, whose musicians even made it a condition for their music to be non-virtuosic and accessible to all in the 1970s.","passageTranslation":"이러한 접근 방식은 펑크 운동으로 이어졌으며, 그 뮤지션들은 1970년대에 자신들의 음악이 고도의 기교 없이 누구나 접근할 수 있어야 한다는 것을 조건으로 삼기까지 했다."},{"questionNumber":6,"sourceQuestion":"지문 1번","keyExpression":"entirely excluded from music","questionText":"'entirely excluded from music'을 잘못 paraphrasing한 것은?","options":[{"text":"completely shut out from musical participation","isCorrect":false,"explanation":"올바름: 'entirely'를 'completely'로, 'excluded'를 'shut out'으로, 'from music'을 'from musical participation'으로 바르게 paraphrasing했다.","translation":"음악 참여에서 완전히 배제된"},{"text":"wholly denied access to music-making opportunities","isCorrect":false,"explanation":"올바름: 'entirely excluded'를 'wholly denied access'로, 'from music'을 'to music-making opportunities'로 의미를 잘 살렸다.","translation":"음악 창작 기회에 대한 접근이 전적으로 거부된"},{"text":"actively welcomed into music and given prominent roles in the industry","isCorrect":true,"explanation":"잘못됨: 'excluded'(배제된)를 'welcomed'(환영받은)으로, 'entirely excluded from music'(음악에서 완전히 배제)을 'given prominent roles'(중요한 역할을 부여받음)으로 반의어 대체하여 의미가 정반대가 되었다.","translation":"음악계에 적극적으로 환영받고 업계에서 중요한 역할을 부여받은"},{"text":"totally left out from the world of music","isCorrect":false,"explanation":"올바름: 'entirely'를 'totally'로, 'excluded'를 'left out'으로, 'from music'을 'from the world of music'으로 바르게 대응시켰다.","translation":"음악 세계에서 완전히 배제된"},{"text":"barred from any involvement in musical activities","isCorrect":false,"explanation":"올바름: 'entirely excluded from music'을 'barred from any involvement in musical activities'로 의미가 잘 통하게 paraphrasing했다.","translation":"음악 활동에 대한 어떠한 참여도 금지된"}],"passage":"Groups who had been entirely excluded from music revelled in opportunities to create.","passageTranslation":"음악에서 완전히 배제되어 왔던 집단들은 창작할 기회에 즐거워했다."},{"questionNumber":7,"sourceQuestion":"지문 1번","keyExpression":"revelled in opportunities to create","questionText":"'revelled in opportunities to create'을 잘못 paraphrasing한 것은?","options":[{"text":"took great delight in the chance to make and express their own music","isCorrect":false,"explanation":"올바름: 'revelled in'을 'took great delight in'으로, 'opportunities to create'를 'the chance to make and express'로 바르게 paraphrasing했다.","translation":"자신들만의 음악을 만들고 표현할 기회에 큰 즐거움을 느꼈다"},{"text":"enthusiastically embraced newfound chances for creative expression","isCorrect":false,"explanation":"올바름: 'revelled in'을 'enthusiastically embraced'로, 'opportunities to create'를 'newfound chances for creative expression'으로 의미를 살렸다.","translation":"창의적 표현을 위한 새로 발견된 기회들을 열정적으로 받아들였다"},{"text":"rejoiced in having the freedom to produce their own original works","isCorrect":false,"explanation":"올바름: 'revelled in'을 'rejoiced in'으로, 'opportunities to create'를 'freedom to produce their own original works'로 자연스럽게 바꾸었다.","translation":"자신들만의 독창적인 작품을 제작할 자유를 가지게 된 것에 기뻐했다"},{"text":"struggled reluctantly with the burden of being forced to create for the first time","isCorrect":true,"explanation":"잘못됨: 'revelled in'(즐거워했다)을 'struggled reluctantly with the burden'(마지못해 힘겹게 씨름했다)으로, 'opportunities'(기회)를 'burden'(부담)으로 바꾸어 긍정적인 감정을 부정적 감정으로 완전히 왜곡했다.","translation":"처음으로 창작을 해야 한다는 부담감과 마지못해 힘겹게 씨름했다"},{"text":"celebrated the newfound possibilities of taking part in creative activities","isCorrect":false,"explanation":"올바름: 'revelled in'을 'celebrated'로, 'opportunities to create'를 'newfound possibilities of taking part in creative activities'로 적절히 paraphrasing했다.","translation":"창의적 활동에 참여할 새로 발견된 가능성들을 축하했다"}],"passage":"Groups who had been entirely excluded from music revelled in opportunities to create.","passageTranslation":"음악에서 완전히 배제되어 왔던 집단들은 창작할 기회에 즐거워했다."},{"questionNumber":8,"sourceQuestion":"지문 1번","keyExpression":"a sense of novelty and empowerment","questionText":"'a sense of novelty and empowerment'을 잘못 paraphrasing한 것은?","options":[{"text":"a feeling of freshness and increased capability","isCorrect":false,"explanation":"올바름: 'novelty'를 'freshness'로, 'empowerment'를 'increased capability'로 바르게 paraphrasing했다.","translation":"신선함과 증가된 역량의 감각"},{"text":"an awareness of being newly enabled and creatively liberated","isCorrect":false,"explanation":"올바름: 'novelty'를 'newly'로, 'empowerment'를 'enabled and liberated'로 의미를 잘 살렸다.","translation":"새롭게 역량을 갖추고 창의적으로 해방되었다는 인식"},{"text":"a deep feeling of stagnation and powerlessness","isCorrect":true,"explanation":"잘못됨: 'novelty'(새로움)를 'stagnation'(정체)으로, 'empowerment'(역량 강화)를 'powerlessness'(무력감)으로 반의어 대체하여 의미가 완전히 반대가 되었다.","translation":"정체와 무력감의 깊은 감정"},{"text":"a recognition of new possibilities and growing personal agency","isCorrect":false,"explanation":"올바름: 'novelty'를 'new possibilities'로, 'empowerment'를 'growing personal agency'로 자연스럽게 paraphrasing했다.","translation":"새로운 가능성과 성장하는 개인적 주도성에 대한 인식"},{"text":"a perception of innovation and increasing self-determination","isCorrect":false,"explanation":"올바름: 'novelty'를 'innovation'으로, 'empowerment'를 'self-determination'으로 의미에 맞게 바꾸었다.","translation":"혁신과 증가하는 자기 결정에 대한 인식"}],"passage":"This led to a sense of novelty and empowerment in and beyond the music sphere.","passageTranslation":"이것은 음악 영역 안팎에서 새로움과 역량 강화의 감각으로 이어졌다."},{"questionNumber":9,"sourceQuestion":"지문 1번","keyExpression":"in and beyond the music sphere","questionText":"'in and beyond the music sphere'을 잘못 paraphrasing한 것은?","options":[{"text":"within the realm of music and extending into other areas of life","isCorrect":false,"explanation":"올바름: 'in the music sphere'를 'within the realm of music'으로, 'beyond'를 'extending into other areas of life'로 바르게 paraphrasing했다.","translation":"음악의 영역 내에서 그리고 삶의 다른 영역으로 확장되어"},{"text":"both inside the music world and in other domains as well","isCorrect":false,"explanation":"올바름: 'in'을 'inside'로, 'the music sphere'를 'the music world'로, 'beyond'를 'in other domains as well'로 자연스럽게 바꾸었다.","translation":"음악 세계 내부에서뿐만 아니라 다른 영역에서도"},{"text":"strictly confined to the inner workings of the professional music industry","isCorrect":true,"explanation":"잘못됨: 'in and beyond'(안팎으로)를 'strictly confined to'(엄격히 제한된)로 바꾸어 범위가 확장되는 의미를 좁히고 제한하는 의미로 완전히 왜곡했다.","translation":"전문 음악 산업의 내부 작동 방식에 엄격하게 국한된"},{"text":"not only in music but also in broader social and cultural contexts","isCorrect":false,"explanation":"올바름: 'in the music sphere'를 'in music'으로, 'beyond'를 'broader social and cultural contexts'로 의미를 살려 paraphrasing했다.","translation":"음악에서만이 아니라 더 넓은 사회적, 문화적 맥락에서도"},{"text":"across musical contexts and spilling over into wider society","isCorrect":false,"explanation":"올바름: 'in the music sphere'를 'across musical contexts'로, 'beyond'를 'spilling over into wider society'로 적절히 paraphrasing했다.","translation":"음악적 맥락을 가로질러 더 넓은 사회로까지 넘쳐흘러"}],"passage":"This led to a sense of novelty and empowerment in and beyond the music sphere.","passageTranslation":"이것은 음악 영역 안팎에서 새로움과 역량 강화의 감각으로 이어졌다."},{"questionNumber":10,"sourceQuestion":"지문 1번","keyExpression":"the creative industries","questionText":"'the creative industries'를 잘못 paraphrasing한 것은?","options":[{"text":"cultural and entertainment businesses","isCorrect":false,"explanation":"올바름: 'creative industries'를 'cultural and entertainment businesses'로 핵심 의미를 담아 바르게 paraphrasing했다.","translation":"문화 및 엔터테인먼트 사업체들"},{"text":"companies and organizations involved in producing artistic content","isCorrect":false,"explanation":"올바름: 'creative industries'를 'companies and organizations involved in producing artistic content'로 구체적으로 풀어 의미가 잘 통한다.","translation":"예술적 콘텐츠 생산에 관여하는 기업 및 조직들"},{"text":"commercial sectors focused on art, media, and entertainment production","isCorrect":false,"explanation":"올바름: 'creative industries'의 범위를 'art, media, and entertainment production'으로 구체화하여 의미를 잘 살렸다.","translation":"예술, 미디어, 엔터테인먼트 생산에 집중하는 상업 분야"},{"text":"government agencies responsible for regulating and censoring artistic expression","isCorrect":true,"explanation":"잘못됨: 'creative industries'(창의 산업, 즉 음악·미디어 등을 생산하는 민간 기업들)를 'government agencies that censor'(예술 표현을 검열하는 정부 기관)으로 바꾸어 민간·생산의 의미를 공공·규제의 의미로 완전히 왜곡했다.","translation":"예술적 표현의 규제 및 검열을 담당하는 정부 기관"},{"text":"industries built around producing and distributing cultural works for audiences","isCorrect":false,"explanation":"올바름: 'creative industries'를 'industries built around producing and distributing cultural works'로 의미에 맞게 paraphrasing했다.","translation":"청중을 위한 문화적 작품을 생산하고 배포하는 것을 중심으로 구축된 산업들"}],"passage":"The explosion of popular music in the second half of the twentieth century as well as the global circulation and dissemination of music by the creative industries propelled a new understanding of accessibility in relation to music.","passageTranslation":"20세기 후반 대중음악의 폭발적 성장과 창의 산업에 의한 음악의 전 세계적 유통 및 보급은 음악과 관련된 접근성에 대한 새로운 이해를 촉진시켰다."},{"questionNumber":11,"sourceQuestion":"지문 2번","keyExpression":"seldom one-hit wonders","questionText":"'seldom one-hit wonders'을 잘못 paraphrasing한 것은?","options":[{"text":"rarely succeed only once throughout their entire career","isCorrect":false,"explanation":"올바름: 'seldom'을 'rarely'로, 'one-hit wonders'를 'succeed only once'로 바르게 paraphrasing했다.","translation":"자신들의 전체 경력에 걸쳐 단 한 번만 성공하는 경우가 드물다"},{"text":"unlikely to achieve only a single notable breakthrough in their lifetime","isCorrect":false,"explanation":"올바름: 'seldom one-hit wonders'를 'unlikely to achieve only a single notable breakthrough'로 의미를 잘 살렸다.","translation":"평생 단 하나의 주목할 만한 돌파구만을 달성할 가능성이 낮다"},{"text":"not often limited to making just one significant discovery","isCorrect":false,"explanation":"올바름: 'seldom'을 'not often'으로, 'one-hit wonders'를 'limited to making just one significant discovery'로 적절히 바꾸었다.","translation":"단 하나의 중요한 발견을 하는 것에만 한정되는 경우가 많지 않다"},{"text":"typically known for only a single groundbreaking achievement throughout their lives","isCorrect":true,"explanation":"잘못됨: 'seldom'(드물게)을 'typically'(전형적으로)로 바꾸어 의미가 정반대가 되었다. 원문은 위대한 과학자들이 단발성 성공에 그치는 경우가 드물다는 의미이지만, 이 선지는 그들이 대개 한 번의 성취로만 알려진다는 반대 의미가 된다.","translation":"평생 동안 단 하나의 획기적인 업적으로만 전형적으로 알려진"},{"text":"almost never confined to producing just one major scientific contribution","isCorrect":false,"explanation":"올바름: 'seldom'을 'almost never'로, 'one-hit wonders'를 'confined to producing just one major contribution'으로 자연스럽게 paraphrasing했다.","translation":"단 하나의 주요 과학적 기여를 하는 것에만 국한되는 경우가 거의 없다"}],"passage":"Great scientists are seldom one-hit wonders.","passageTranslation":"위대한 과학자들은 단 한 번의 발견에 그치는 경우가 드물다."},{"questionNumber":12,"sourceQuestion":"지문 2번","keyExpression":"involved in multiple discoveries","questionText":"'involved in multiple discoveries'을 잘못 paraphrasing한 것은?","options":[{"text":"responsible for more than one significant scientific finding","isCorrect":false,"explanation":"올바름: 'involved in'을 'responsible for'로, 'multiple discoveries'를 'more than one significant scientific finding'으로 바르게 paraphrasing했다.","translation":"하나 이상의 중요한 과학적 발견에 대해 책임이 있는"},{"text":"credited with contributing to numerous breakthroughs in science","isCorrect":false,"explanation":"올바름: 'involved in'을 'credited with contributing to'로, 'multiple discoveries'를 'numerous breakthroughs'로 의미를 잘 살렸다.","translation":"과학에서 수많은 돌파구에 기여한 것으로 인정받는"},{"text":"narrowly focused on a single specialized area with only one notable result","isCorrect":true,"explanation":"잘못됨: 'involved in multiple discoveries'(여러 발견에 관여한)를 'narrowly focused on a single specialized area with only one notable result'(단 하나의 주목할 만한 결과만 있는 하나의 전문 분야에 좁게 집중된)로 바꾸어 '여러 발견'이라는 핵심을 정반대로 왜곡했다.","translation":"단 하나의 주목할 만한 결과만 있는 하나의 전문 분야에 좁게 집중된"},{"text":"associated with achieving several major advances across different fields","isCorrect":false,"explanation":"올바름: 'involved in'을 'associated with achieving'으로, 'multiple discoveries'를 'several major advances'로 자연스럽게 paraphrasing했다.","translation":"다양한 분야에 걸친 여러 주요 발전을 이룬 것과 관련된"},{"text":"known for participating in a series of important scientific achievements","isCorrect":false,"explanation":"올바름: 'involved in'을 'known for participating in'으로, 'multiple discoveries'를 'a series of important scientific achievements'로 의미에 맞게 바꾸었다.","translation":"일련의 중요한 과학적 성취에 참여한 것으로 알려진"}],"passage":"In fact, well-known scientists are often involved in multiple discoveries, a phenomenon potentially explained by the Matthew effect.","passageTranslation":"실제로, 잘 알려진 과학자들은 종종 여러 발견에 관여하는데, 이 현상은 잠재적으로 마태 효과로 설명될 수 있다."},{"questionNumber":13,"sourceQuestion":"지문 2번","keyExpression":"an initial success may offer a scientist legitimacy","questionText":"'an initial success may offer a scientist legitimacy'을 잘못 paraphrasing한 것은?","options":[{"text":"an early achievement can grant a researcher credibility and recognition","isCorrect":false,"explanation":"올바름: 'initial success'를 'early achievement'로, 'offer legitimacy'를 'grant credibility and recognition'으로 바르게 paraphrasing했다.","translation":"초기 성취는 연구자에게 신뢰성과 인정을 부여할 수 있다"},{"text":"a first breakthrough may lend a scientist authority and professional standing","isCorrect":false,"explanation":"올바름: 'initial success'를 'first breakthrough'로, 'offer legitimacy'를 'lend authority and professional standing'으로 의미를 잘 살렸다.","translation":"첫 번째 돌파구는 과학자에게 권위와 직업적 지위를 부여할 수 있다"},{"text":"an early failure strips a scientist of credibility and causes peers to lose respect","isCorrect":true,"explanation":"잘못됨: 'initial success'(초기 성공)를 'early failure'(초기 실패)로, 'offer legitimacy'(정당성을 부여하다)를 'strips of credibility'(신뢰성을 박탈하다)로 바꾸어 인과관계와 방향이 완전히 반대가 되었다.","translation":"초기 실패는 과학자의 신뢰성을 빼앗고 동료들이 존중심을 잃게 만든다"},{"text":"a preliminary success can establish a researcher's right to be taken seriously","isCorrect":false,"explanation":"올바름: 'initial success'를 'preliminary success'로, 'offer legitimacy'를 'establish the right to be taken seriously'로 의미를 살려 paraphrasing했다.","translation":"예비적 성공은 연구자가 진지하게 받아들여질 권리를 확립할 수 있다"},{"text":"winning early may help a scientist gain the trust and recognition of their peers","isCorrect":false,"explanation":"올바름: 'initial success'를 'winning early'로, 'offer legitimacy'를 'gain the trust and recognition of peers'로 자연스럽게 paraphrasing했다.","translation":"일찍 성공하는 것은 과학자가 동료들의 신뢰와 인정을 얻는 데 도움이 될 수 있다"}],"passage":"Indeed, an initial success may offer a scientist legitimacy, improve peer perception, provide knowledge of how to score and win, enhance social status, and attract resources and quality collaborators, each of these payoffs further increasing her odds of scoring another win.","passageTranslation":"실제로, 초기 성공은 과학자에게 정당성을 부여하고, 동료들의 인식을 개선하고, 점수를 따고 이기는 방법에 대한 지식을 제공하고, 사회적 지위를 높이고, 자원과 우수한 협력자들을 끌어들일 수 있으며, 이러한 보상들 각각이 또 다른 승리를 거둘 가능성을 더욱 높인다."},{"questionNumber":14,"sourceQuestion":"지문 2번","keyExpression":"improve peer perception","questionText":"'improve peer perception'을 잘못 paraphrasing한 것은?","options":[{"text":"enhance how fellow scientists view and regard one's work","isCorrect":false,"explanation":"올바름: 'improve'를 'enhance'로, 'peer perception'을 'how fellow scientists view and regard one's work'로 바르게 paraphrasing했다.","translation":"동료 과학자들이 자신의 연구를 보고 평가하는 방식을 향상시키다"},{"text":"boost the way colleagues think about and evaluate a researcher","isCorrect":false,"explanation":"올바름: 'improve'를 'boost'로, 'peer perception'을 'the way colleagues think about and evaluate'로 의미를 잘 살렸다.","translation":"동료들이 연구자를 생각하고 평가하는 방식을 높이다"},{"text":"raise the opinion that other scientists in the field hold of someone","isCorrect":false,"explanation":"올바름: 'improve'를 'raise'로, 'peer perception'을 'the opinion that other scientists in the field hold'로 자연스럽게 paraphrasing했다.","translation":"그 분야의 다른 과학자들이 누군가에 대해 갖는 의견을 높이다"},{"text":"worsen a scientist's standing and damage their reputation among professional colleagues","isCorrect":true,"explanation":"잘못됨: 'improve'(개선하다)를 'worsen'(악화시키다)으로, 'peer perception'(동료들의 인식)을 'damage their reputation'(명성을 손상시키다)으로 반의어 대체하여 의미가 완전히 반대가 되었다.","translation":"과학자의 위상을 악화시키고 전문 동료들 사이에서 그들의 명성을 손상시키다"},{"text":"positively change how one is perceived and judged by others in their scientific community","isCorrect":false,"explanation":"올바름: 'improve peer perception'을 'positively change how one is perceived and judged by others in their community'로 의미를 살려 풀어 썼다.","translation":"자신의 과학 공동체에서 다른 사람들에게 인식되고 판단되는 방식을 긍정적으로 바꾸다"}],"passage":"Indeed, an initial success may offer a scientist legitimacy, improve peer perception, provide knowledge of how to score and win, enhance social status, and attract resources and quality collaborators, each of these payoffs further increasing her odds of scoring another win.","passageTranslation":"실제로, 초기 성공은 과학자에게 정당성을 부여하고, 동료들의 인식을 개선하고, 점수를 따고 이기는 방법에 대한 지식을 제공하고, 사회적 지위를 높이고, 자원과 우수한 협력자들을 끌어들일 수 있으며, 이러한 보상들 각각이 또 다른 승리를 거둘 가능성을 더욱 높인다."},{"questionNumber":15,"sourceQuestion":"지문 2번","keyExpression":"attract resources and quality collaborators","questionText":"'attract resources and quality collaborators'을 잘못 paraphrasing한 것은?","options":[{"text":"draw in funding and skilled research partners","isCorrect":false,"explanation":"올바름: 'attract'를 'draw in'으로, 'resources'를 'funding'으로, 'quality collaborators'를 'skilled research partners'로 바르게 paraphrasing했다.","translation":"자금 지원과 숙련된 연구 파트너를 끌어들이다"},{"text":"bring in support and talented colleagues to collaborate with","isCorrect":false,"explanation":"올바름: 'attract'를 'bring in'으로, 'resources'를 'support'로, 'quality collaborators'를 'talented colleagues'로 의미를 잘 살렸다.","translation":"협력할 지원과 재능 있는 동료들을 데려오다"},{"text":"gain access to valuable materials and capable co-researchers","isCorrect":false,"explanation":"올바름: 'attract resources'를 'gain access to valuable materials'로, 'quality collaborators'를 'capable co-researchers'로 자연스럽게 paraphrasing했다.","translation":"귀중한 자원과 유능한 공동 연구자들에게 접근권을 얻다"},{"text":"repel potential partners and lose access to the research funding needed","isCorrect":true,"explanation":"잘못됨: 'attract'(끌어들이다)를 'repel'(밀쳐내다)으로, 'resources'를 'lose access to funding'(자금 접근권을 잃다)으로 반의어 대체하여 의미가 완전히 반대가 되었다.","translation":"잠재적 파트너들을 밀쳐내고 필요한 연구 자금에 대한 접근권을 잃다"},{"text":"secure valuable partnerships and sufficient tools to conduct research effectively","isCorrect":false,"explanation":"올바름: 'attract resources and quality collaborators'를 'secure valuable partnerships and sufficient tools'로 의미에 맞게 paraphrasing했다.","translation":"연구를 효과적으로 수행하기 위한 귀중한 파트너십과 충분한 도구를 확보하다"}],"passage":"Indeed, an initial success may offer a scientist legitimacy, improve peer perception, provide knowledge of how to score and win, enhance social status, and attract resources and quality collaborators, each of these payoffs further increasing her odds of scoring another win.","passageTranslation":"실제로, 초기 성공은 과학자에게 정당성을 부여하고, 동료들의 인식을 개선하고, 점수를 따고 이기는 방법에 대한 지식을 제공하고, 사회적 지위를 높이고, 자원과 우수한 협력자들을 끌어들일 수 있으며, 이러한 보상들 각각이 또 다른 승리를 거둘 가능성을 더욱 높인다."},{"questionNumber":16,"sourceQuestion":"지문 2번","keyExpression":"increasing her odds of scoring another win","questionText":"'increasing her odds of scoring another win'을 잘못 paraphrasing한 것은?","options":[{"text":"raising the likelihood of achieving yet another success","isCorrect":false,"explanation":"올바름: 'increasing'을 'raising'으로, 'odds'를 'likelihood'로, 'scoring another win'을 'achieving yet another success'로 바르게 paraphrasing했다.","translation":"또 다른 성공을 달성할 가능성을 높이는"},{"text":"boosting the probability of gaining a further scientific breakthrough","isCorrect":false,"explanation":"올바름: 'increasing odds'를 'boosting the probability'로, 'scoring another win'을 'gaining a further breakthrough'로 의미를 잘 살렸다.","translation":"추가적인 과학적 돌파구를 얻을 확률을 높이는"},{"text":"reducing her chances of ever repeating an earlier achievement in the future","isCorrect":true,"explanation":"잘못됨: 'increasing'(높이는)을 'reducing'(줄이는)으로 반의어 대체하여 의미가 완전히 반대가 되었다. 원문은 또 다른 승리의 가능성이 높아진다는 의미이지만, 이 선지는 반대로 줄어든다는 의미가 된다.","translation":"미래에 이전의 성취를 반복할 가능성을 줄이는"},{"text":"improving her chances of making one more major discovery down the line","isCorrect":false,"explanation":"올바름: 'increasing odds'를 'improving chances'로, 'scoring another win'을 'making one more major discovery'로 자연스럽게 paraphrasing했다.","translation":"앞으로 한 가지 더 중요한 발견을 할 가능성을 개선하는"},{"text":"enhancing the probability that she will succeed again in subsequent endeavors","isCorrect":false,"explanation":"올바름: 'increasing odds'를 'enhancing the probability'로, 'scoring another win'을 'succeed again in subsequent endeavors'로 의미에 맞게 paraphrasing했다.","translation":"그녀가 이후의 노력에서 다시 성공할 확률을 높이는"}],"passage":"Indeed, an initial success may offer a scientist legitimacy, improve peer perception, provide knowledge of how to score and win, enhance social status, and attract resources and quality collaborators, each of these payoffs further increasing her odds of scoring another win.","passageTranslation":"실제로, 초기 성공은 과학자에게 정당성을 부여하고, 동료들의 인식을 개선하고, 점수를 따고 이기는 방법에 대한 지식을 제공하고, 사회적 지위를 높이고, 자원과 우수한 협력자들을 끌어들일 수 있으며, 이러한 보상들 각각이 또 다른 승리를 거둘 가능성을 더욱 높인다."},{"questionNumber":17,"sourceQuestion":"지문 2번","keyExpression":"consistently succeed in their scientific endeavors","questionText":"'consistently succeed in their scientific endeavors'을 잘못 paraphrasing한 것은?","options":[{"text":"continually achieve breakthroughs in their research activities","isCorrect":false,"explanation":"올바름: 'consistently succeed'를 'continually achieve breakthroughs'로, 'scientific endeavors'를 'research activities'로 바르게 paraphrasing했다.","translation":"자신들의 연구 활동에서 지속적으로 돌파구를 달성하다"},{"text":"repeatedly produce successful outcomes in their scientific work","isCorrect":false,"explanation":"올바름: 'consistently succeed'를 'repeatedly produce successful outcomes'로, 'scientific endeavors'를 'scientific work'로 의미를 잘 살렸다.","translation":"자신들의 과학적 연구에서 반복적으로 성공적인 결과를 내다"},{"text":"reliably accomplish significant results across their research career","isCorrect":false,"explanation":"올바름: 'consistently'를 'reliably'로, 'succeed'를 'accomplish significant results'로, 'scientific endeavors'를 'research career'로 자연스럽게 paraphrasing했다.","translation":"자신들의 연구 경력 전반에 걸쳐 신뢰할 수 있게 중요한 결과를 이루다"},{"text":"occasionally stumble upon accidental findings with no particular pattern or intent","isCorrect":true,"explanation":"잘못됨: 'consistently succeed'(지속적으로 성공하다)를 'occasionally stumble upon accidental findings'(우연히 발견에 걸려 넘어지다)로 바꾸어 '지속적·의도적 성공'이라는 의미를 '가끔·우연한 발견'으로 완전히 왜곡했다.","translation":"특정 패턴이나 의도 없이 가끔 우연한 발견에 걸려 넘어지다"},{"text":"keep achieving positive results throughout the course of their scientific career","isCorrect":false,"explanation":"올바름: 'consistently succeed'를 'keep achieving positive results'로, 'scientific endeavors'를 'throughout their scientific career'로 의미에 맞게 paraphrasing했다.","translation":"자신들의 과학적 경력 전반에 걸쳐 긍정적인 결과를 계속 달성하다"}],"passage":"Great scientists have multiple hits and consistently succeed in their scientific endeavors simply because they're exceptionally talented.","passageTranslation":"위대한 과학자들은 여러 번 성공을 거두고 자신들의 과학적 노력에서 지속적으로 성공하는데, 이는 단순히 그들이 예외적으로 재능이 있기 때문이다."},{"questionNumber":18,"sourceQuestion":"지문 2번","keyExpression":"indicative of a hidden talent","questionText":"'indicative of a hidden talent'을 잘못 paraphrasing한 것은?","options":[{"text":"a sign that an underlying ability had existed all along","isCorrect":false,"explanation":"올바름: 'indicative of'를 'a sign that'으로, 'hidden talent'를 'underlying ability that had existed all along'으로 바르게 paraphrasing했다.","translation":"내재적 능력이 줄곧 존재해 왔다는 신호"},{"text":"suggestive of a natural aptitude that was not immediately apparent","isCorrect":false,"explanation":"올바름: 'indicative of'를 'suggestive of'로, 'hidden talent'를 'natural aptitude that was not immediately apparent'로 의미를 잘 살렸다.","translation":"즉각적으로 명백하지 않았던 타고난 소질을 시사하는"},{"text":"evidence of a latent capability that had yet to be fully recognized","isCorrect":false,"explanation":"올바름: 'indicative of'를 'evidence of'로, 'hidden talent'를 'latent capability that had yet to be fully recognized'로 자연스럽게 paraphrasing했다.","translation":"아직 완전히 인정받지 못한 잠재적 능력의 증거"},{"text":"proof that success was solely the result of external circumstances rather than innate ability","isCorrect":true,"explanation":"잘못됨: 'indicative of a hidden talent'(숨겨진 재능의 표시)를 'proof that success was due to external circumstances rather than innate ability'(타고난 능력이 아닌 외부 환경의 결과라는 증거)로 바꾸어 핵심 의미인 '내재적 재능'을 '외부 요인'으로 정반대로 왜곡했다.","translation":"성공이 타고난 능력이 아닌 외부 환경의 결과였다는 증거"},{"text":"a reflection of an innate skill that had not yet been fully brought to light","isCorrect":false,"explanation":"올바름: 'indicative of'를 'a reflection of'로, 'hidden talent'를 'innate skill that had not yet been fully brought to light'로 의미에 맞게 paraphrasing했다.","translation":"아직 완전히 드러나지 않은 타고난 기술의 반영"}],"passage":"Therefore, future success again goes to those who have had success earlier, not because of advantages offered by the previous success, but because the earlier success was indicative of a hidden talent.","passageTranslation":"따라서, 미래의 성공은 다시 이전에 성공을 거둔 사람들에게 돌아가는데, 이전 성공이 제공한 이점 때문이 아니라, 이전 성공이 숨겨진 재능을 시사하기 때문이다."},{"questionNumber":19,"sourceQuestion":"지문 2번","keyExpression":"success alone increases the future probability of success","questionText":"'success alone increases the future probability of success'을 잘못 paraphrasing한 것은?","options":[{"text":"achieving success by itself raises the likelihood of succeeding again later","isCorrect":false,"explanation":"올바름: 'success alone'을 'achieving success by itself'로, 'increases the future probability'를 'raises the likelihood of succeeding again later'로 바르게 paraphrasing했다.","translation":"성공 그 자체만으로 나중에 다시 성공할 가능성을 높인다"},{"text":"merely winning once is enough to boost one's chances of future accomplishment","isCorrect":false,"explanation":"올바름: 'success alone'을 'merely winning once'로, 'increases the future probability of success'를 'boost one's chances of future accomplishment'로 의미를 잘 살렸다.","translation":"단지 한 번 이기는 것만으로도 미래 성취의 가능성을 높이기에 충분하다"},{"text":"the fact of having succeeded enhances the odds of winning yet again","isCorrect":false,"explanation":"올바름: 'success alone'을 'the fact of having succeeded'로, 'increases the future probability'를 'enhances the odds of winning yet again'으로 자연스럽게 paraphrasing했다.","translation":"성공했다는 사실 자체가 또다시 이길 가능성을 높인다"},{"text":"past achievements alone are enough to guarantee that future efforts will end in failure","isCorrect":true,"explanation":"잘못됨: 'increases the future probability of success'(미래 성공 가능성 증가)를 'guarantee that future efforts will end in failure'(미래의 노력이 실패로 끝날 것을 보장)로 바꾸어 '성공 가능성 증가'를 '실패 보장'으로 인과관계와 결과를 완전히 역전시켰다.","translation":"과거의 성취만으로도 미래의 노력이 실패로 끝날 것을 보장하기에 충분하다"},{"text":"winning in itself raises the probability that one will go on to win in the future","isCorrect":false,"explanation":"올바름: 'success alone'을 'winning in itself'로, 'increases the future probability of success'를 'raises the probability that one will go on to win'으로 의미에 맞게 paraphrasing했다.","translation":"이기는 것 자체가 미래에도 계속 이길 확률을 높인다"}],"passage":"The Matthew effect posits that success alone increases the future probability of success, raising the question: Does status dictate outcomes, or does it simply reflect an underlying talent or quality?","passageTranslation":"마태 효과는 성공 자체만으로도 미래의 성공 가능성을 높인다고 주장하며, '지위가 결과를 결정하는가, 아니면 단지 기저에 있는 재능이나 자질을 반영하는 것인가?'라는 질문을 제기한다."},{"questionNumber":20,"sourceQuestion":"지문 2번","keyExpression":"Does status dictate outcomes","questionText":"'Does status dictate outcomes'를 잘못 paraphrasing한 것은?","options":[{"text":"Does one's position or reputation determine the results one achieves","isCorrect":false,"explanation":"올바름: 'status'를 'position or reputation'으로, 'dictate outcomes'를 'determine the results one achieves'로 바르게 paraphrasing했다.","translation":"한 사람의 위치나 명성이 그가 달성하는 결과를 결정하는가"},{"text":"Is it one's social standing that controls what results they end up getting","isCorrect":false,"explanation":"올바름: 'status'를 'social standing'으로, 'dictate outcomes'를 'controls what results they end up getting'으로 의미를 잘 살렸다.","translation":"사람들이 결국 얻게 되는 결과를 통제하는 것이 그들의 사회적 지위인가"},{"text":"Does the level of prestige one holds shape the achievements they ultimately attain","isCorrect":false,"explanation":"올바름: 'status'를 'level of prestige'로, 'dictate outcomes'를 'shape the achievements they ultimately attain'으로 자연스럽게 paraphrasing했다.","translation":"한 사람이 갖는 명성의 수준이 그들이 궁극적으로 달성하는 성취를 형성하는가"},{"text":"Does individual effort and hard work fully explain why certain scientists consistently fail to advance","isCorrect":true,"explanation":"잘못됨: 'status dictate outcomes'(지위가 결과를 결정하는가)를 'individual effort and hard work explain why scientists fail'(노력이 과학자들의 실패를 설명하는가)로 바꾸어 '지위'(외부 요인)를 '노력'(내부 요인)으로, '결과를 결정'을 '실패를 설명'으로 완전히 다른 의미로 왜곡했다.","translation":"개인적 노력과 열심히 일하는 것이 특정 과학자들이 지속적으로 발전하지 못하는 이유를 완전히 설명하는가"},{"text":"Does a person's recognized rank in a field drive the outcomes they are able to produce","isCorrect":false,"explanation":"올바름: 'status'를 'recognized rank in a field'로, 'dictate outcomes'를 'drive the outcomes they are able to produce'로 의미에 맞게 paraphrasing했다.","translation":"분야에서 인정받는 한 사람의 순위가 그들이 낼 수 있는 결과를 이끄는가"}],"passage":"The Matthew effect posits that success alone increases the future probability of success, raising the question: Does status dictate outcomes, or does it simply reflect an underlying talent or quality?","passageTranslation":"마태 효과는 성공 자체만으로도 미래의 성공 가능성을 높인다고 주장하며, '지위가 결과를 결정하는가, 아니면 단지 기저에 있는 재능이나 자질을 반영하는 것인가?'라는 질문을 제기한다."}]};
var QS=CONFIG.questions||[];
var TOTAL=QS.length;
var SET_SIZE=10;
var SETS=(function(){var s=[];for(var i=0;i<TOTAL;i+=SET_SIZE)s.push(QS.slice(i,i+SET_SIZE));return s;})();
var answers={};var currentSet=0;
var CIRCLED=["①","②","③","④","⑤","⑥"];
function esc(s){if(s==null)return "";var d=document.createElement("div");d.textContent=String(s);return d.innerHTML;}
function setH(t,sub){var h=document.getElementById("hTitle");var p=document.getElementById("hSub");if(h)h.textContent=t;if(p)p.textContent=sub;}
function gi(si,pi){return si*SET_SIZE+pi;}
function showIndex(){
  setH(CONFIG.title,"Paraphrasing 표현 테스트");
  var chips=SETS.map(function(sq,si){
    var base=si*SET_SIZE;var len=sq.length;var done=0,correct=0;
    for(var i=0;i<len;i++){var a=answers[base+i];if(a){done++;if(a.isCorrect)correct++;}}
    var allDone=(done===len);
    var pct=done>0?Math.round(correct/len*100):null;
    var passed=pct!==null&&pct>=CONFIG.passThreshold;
    var scoreHTML=pct===null
      ?"<span style='font-size:.78rem;color:#9ca3af;'>미응시</span>"
      :(allDone?"<span style='font-weight:700;color:"+(passed?"#10b981":"#ef4444")+";'>"+(passed?"✅ ":"❌ ")+pct+"%</span>"
             :"<span style='font-weight:700;color:#f59e0b;'>📝 "+done+"/"+len+"</span>");
    return "<div class='set-card"+(allDone?" done":"")+"'onclick='enterSet("+si+")'>"+
           "<div><div style='font-weight:700;'>세트 "+(si+1)+" <span style='font-size:.8rem;color:#6b7280;font-weight:400;'>("+len+"문제)</span></div></div>"+
           "<div>"+scoreHTML+"</div></div>";
  }).join("");
  var app=document.getElementById("app");
  if(!app)return;
  app.innerHTML=
    "<div style='text-align:center;padding:16px 0'>"+
    "<div style='font-size:2.5rem;margin-bottom:8px'>🔄</div>"+
    "<h2 style='font-size:1.2rem;font-weight:700;color:#1f2937;margin-bottom:4px'>Paraphrasing 표현 테스트</h2>"+
    "<p style='color:#6b7280;font-size:.85rem;margin-bottom:16px'>총 "+TOTAL+"문제 · "+CONFIG.passThreshold+"% 이상 통과</p>"+
    "</div>"+
    "<div class='set-list'>"+chips+"</div>";
}
function enterSet(si){currentSet=si;showQ(0);}
function showQ(pos){
  var si=currentSet;var qs=SETS[si];
  if(!qs||pos<0||pos>=qs.length)return;
  var gidx=gi(si,pos);var q=qs[pos];var answered=answers[gidx];
  setH("세트 "+(si+1),"문제 "+(pos+1)+"/"+qs.length);
  var pct=Math.round((pos+1)/qs.length*100);
  var optsHTML=q.options.map(function(o,i){
    var cls="";
    if(answered){
      if(i===answered.selected&&!answered.isCorrect)cls="wrong";
      if(o.isCorrect)cls=(answered.isCorrect&&i===answered.selected)?"correct":"reveal";
    }
    return "<button class='option-btn "+cls+"' onclick='answer("+pos+","+i+")' "+(answered?"disabled":"")+">"+
           "<span class='num'>"+(i+1)+"</span><span>"+esc(o.text)+"</span></button>";
  }).join("");
  var feedbackHTML="";
  if(answered){
    var cidx=q.options.findIndex(function(o){return o.isCorrect;});
    var cLabel=cidx>=0?CIRCLED[cidx]:"?";
    feedbackHTML=
      "<div class='feedback "+(answered.isCorrect?"correct-fb":"wrong-fb")+"'>"+
      (answered.isCorrect?"✅ 정답!":"❌ 오답 — 정답: "+cLabel)+
      "</div>"+
      "<div class='explain-box'><div class='ex-title'>해설</div>"+
      q.options.map(function(o,i){
        var tag=o.isCorrect?"<span class='tag-w'>[오답 — 잘못된 paraphrasing]</span>":"<span class='tag-o'>[올바른 paraphrasing]</span>";
        return "<div class='ex-item'><strong>"+CIRCLED[i]+" "+esc(o.text)+"</strong> "+tag+
               "<br><span class='trans'>→ "+esc(o.translation||o.explanation)+"</span></div>";
      }).join("")+
      "</div>";
  }
  var passageSection="";
  if(q.passage){
    passageSection=
      "<button class='show-passage-btn' id='pbtn' onclick='togglePassage()'>📄 지문 보기</button>"+
      "<div class='passage-box' id='pbox' style='display:none'>"+esc(q.passage)+"</div>";
  }
  var app=document.getElementById("app");
  if(!app)return;
  app.innerHTML=
    "<div class='q-counter'>"+(pos+1)+" / "+qs.length+"</div>"+
    "<div class='progress-bar'><div class='progress-fill' style='width:"+pct+"%'></div></div>"+
    (q.sourceQuestion?"<div style='display:inline-block;background:#fef3c7;color:#b45309;padding:4px 12px;border-radius:20px;font-size:.78rem;font-weight:600;margin-bottom:10px;'>"+esc(q.sourceQuestion)+"</div>":"")+
    "<div class='key-box'>"+
    "<div class='expr'>“"+esc(q.keyExpression)+"”</div>"+
    "<div class='qtext'>위 표현을 <span class='hl'>잘못</span> paraphrasing 한 것은?</div>"+
    "</div>"+
    passageSection+
    "<div class='options'>"+optsHTML+"</div>"+
    feedbackHTML+
    "<div class='nav-bar'>"+
    "<button class='nav-btn prev' onclick='showQ("+(pos-1)+")' "+(pos<=0?"disabled":"")+">← 이전</button>"+
    "<button class='nav-btn home' onclick='showIndex()'>목록</button>"+
    "<button class='nav-btn next' onclick='"+(pos<qs.length-1?"showQ("+(pos+1)+")":"showSetResult()")+"'>→ "+(pos<qs.length-1?"다음":"결과")+"</button>"+
    "</div>";
}
function togglePassage(){
  var b=document.getElementById("pbox");var btn=document.getElementById("pbtn");
  if(!b)return;
  if(b.style.display==="none"){b.style.display="block";if(btn)btn.textContent="📄 지문 숨기기";}
  else{b.style.display="none";if(btn)btn.textContent="📄 지문 보기";}
}
function answer(pos,optIdx){
  var gidx=gi(currentSet,pos);
  if(answers[gidx])return;
  var q=SETS[currentSet][pos];
  var isCorrect=!!(q.options[optIdx]&&q.options[optIdx].isCorrect);
  answers[gidx]={selected:optIdx,isCorrect:isCorrect};
  showQ(pos);
}
function showSetResult(){
  var si=currentSet;var qs=SETS[si];var base=si*SET_SIZE;
  var total=qs.length;var correct=0;
  for(var i=0;i<total;i++){var a=answers[base+i];if(a&&a.isCorrect)correct++;}
  var pct=Math.round(correct/total*100);
  var passed=pct>=CONFIG.passThreshold;
  setH("세트 "+(si+1)+" 결과",passed?"통과":"미달");
  var app=document.getElementById("app");
  if(!app)return;
  app.innerHTML=
    "<div style='text-align:center;padding:16px 0'>"+
    "<div class='score-circle "+(passed?"pass":"fail")+"'>"+pct+"%</div>"+
    "<p style='font-size:1.1rem;font-weight:700;color:"+(passed?"#10b981":"#ef4444")+";'>"+(passed?"통과!":"미달")+"</p>"+
    "<p style='color:#6b7280;font-size:.88rem;margin-top:8px'>"+correct+"/"+total+"문제 정답 · 기준 "+CONFIG.passThreshold+"%</p>"+
    "</div>"+
    "<div style='margin-top:16px'><button class='btn btn-primary btn-block' onclick='showIndex()'>목록으로</button></div>";
}
showIndex();
</script>
</body>
</html>
