<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>vocab-test</title>
<style>*{margin:0;padding:0;box-sizing:border-box;}body{font-family:"Segoe UI","Malgun Gothic",sans-serif;background:#f5f6fa;color:#222;font-size:16px;line-height:1.8;}
.header{background:linear-gradient(135deg,#1a237e,#3949ab);color:#fff;padding:14px 18px;text-align:center;position:sticky;top:0;z-index:100;}.header h1{font-size:17px;font-weight:700;}.header .level-info{font-size:13px;opacity:.85;margin-top:3px;}
.progress-bar{height:5px;background:rgba(255,255,255,.2);border-radius:3px;margin-top:7px;overflow:hidden;}.progress-fill{height:100%;background:#81c784;border-radius:3px;transition:width .3s;}
.content{max-width:680px;margin:0 auto;padding:18px 14px;}.passage{background:#fff;border-radius:10px;padding:18px;box-shadow:0 2px 10px rgba(0,0,0,.06);line-height:2.4;font-size:15px;margin-bottom:14px;}
.blank-select{display:inline-block;}.blank-select select{background:#e3f2fd;border:2px solid #90caf9;border-radius:5px;padding:3px 8px;font-size:14px;font-weight:600;color:#1565c0;cursor:pointer;min-width:90px;font-family:inherit;}
.blank-select.correct select{background:#c8e6c9;border-color:#66bb6a;color:#2e7d32;}.blank-select.wrong select{background:#ffcdd2;border-color:#ef5350;color:#c62828;}
.blank-input{display:inline-block;}.blank-input input{background:#e3f2fd;border:2px solid #90caf9;border-radius:5px;padding:3px 8px;font-size:14px;font-weight:600;color:#1565c0;font-family:inherit;min-width:70px;}
.blank-input.correct input{background:#c8e6c9;border-color:#66bb6a;color:#2e7d32;}.blank-input.wrong input{background:#ffcdd2;border-color:#ef5350;color:#c62828;}
.action-bar{text-align:center;padding:14px;position:sticky;bottom:0;background:#f5f6fa;}
.btn{padding:11px 24px;border:none;border-radius:9px;font-size:15px;font-weight:700;cursor:pointer;}.btn-retry{background:#f57c00;color:#fff;}.btn-next{background:#2e7d32;color:#fff;}
.result-card{background:#fff;border-radius:10px;padding:22px;text-align:center;box-shadow:0 4px 18px rgba(0,0,0,.1);margin:18px 0;}.result-card h2{font-size:20px;margin-bottom:7px;}.score{font-size:46px;font-weight:800;margin:10px 0;}.pass{color:#2e7d32;}.fail{color:#c62828;}
.congrats{background:linear-gradient(135deg,#1a237e,#3949ab);color:#fff;border-radius:10px;padding:28px;text-align:center;margin:18px 0;}
.level-selector{text-align:center;margin:18px 0;}.level-btn{padding:12px 22px;margin:5px;border:none;border-radius:9px;font-size:14px;font-weight:700;cursor:pointer;min-width:110px;}
.easy-btn{background:#e8f5e9;color:#2e7d32;border:2px solid #a5d6a7;}.med-btn{background:#fff3e0;color:#e65100;border:2px solid #ffcc80;}.hard-btn{background:#fce4ec;color:#c62828;border:2px solid #ef9a9a;}
.locked{opacity:.4;cursor:not-allowed;}.done::after{content:"✓";margin-left:5px;}.retry-badge{display:inline-block;background:#fff3e0;color:#e65100;font-size:11px;padding:2px 7px;border-radius:9px;margin-left:5px;}
.hint-prefix{font-weight:700;color:#1565c0;font-size:15px;font-family:Georgia,serif;margin-right:1px;display:inline;}
.input-wrap{display:inline-flex;align-items:center;gap:2px;flex-wrap:nowrap;}
.blank-input input{max-width:calc(100vw - 140px);}
@media(max-width:480px){.passage{font-size:15px;padding:14px 12px;line-height:2.2;}.blank-select select{font-size:13px;min-width:80px;padding:4px 6px;}.blank-input input{font-size:13px;padding:4px 6px;}.btn{padding:13px 22px;font-size:15px;min-height:48px;touch-action:manipulation;}}
</style></head><body>

<div class="content" id="content"></div><div class="action-bar" id="actionBar"></div>

"","tr":""},{"i":86,"t":"is","c":"is","ld":"","tr":""},{"i":87,"t":"none","c":"none","ld":"","tr":"","b":{"easy":{"choices":["all","bone","none"],"correct":2},"medium":{"choices":["no","not","none","neither"],"correct":2,"answer":"none"},"hard":{"answer":"none"}}},{"i":88,"t":"of","c":"of","ld":"","tr":""},{"i":89,"t":"those","c":"those","ld":"","tr":""},{"i":90,"t":"things.","c":"things","ld":"","tr":"."},{"i":91,"t":"It","c":"It","ld":"","tr":""},{"i":92,"t":"has","c":"has","ld":"","tr":""},{"i":93,"t":"no","c":"no","ld":"","tr":""},{"i":94,"t":"physical","c":"physical","ld":"","tr":"","b":{"medium":{"choices":["physically","physicaled","physicking","physical"],"correct":3,"answer":"physical"},"hard":{"answer":"physical"}}},{"i":95,"t":"form.","c":"form","ld":"","tr":"."},{"i":96,"t":"Think","c":"Think","ld":"","tr":""},{"i":97,"t":"of","c":"of","ld":"","tr":""},{"i":98,"t":"the","c":"the","ld":"","tr":""},{"i":99,"t":"idea","c":"idea","ld":"","tr":""},{"i":100,"t":"of","c":"of","ld":"","tr":""},{"i":101,"t":"a","c":"a","ld":"","tr":""},{"i":102,"t":"triangle,","c":"triangle","ld":"","tr":","},{"i":103,"t":"for","c":"for","ld":"","tr":""},{"i":104,"t":"example.","c":"example","ld":"","tr":"."},{"i":105,"t":"Although","c":"Although","ld":"","tr":"","b":{"easy":{"choices":["Because","Although","Altitude"],"correct":1},"medium":{"choices":["Although","Despite","Even","Though being"],"correct":0,"answer":"Although"},"hard":{"answer":"Although"}}},{"i":106,"t":"it","c":"it","ld":"","tr":""},{"i":107,"t":"has","c":"has","ld":"","tr":""},{"i":108,"t":"no","c":"no","ld":"","tr":"","b":{"hard":{"answer":"no"}}},{"i":109,"t":"particular","c":"particular","ld":"","tr":"","b":{"medium":{"choices":["particularly","particularized","particular","particularizing"],"correct":2,"answer":"particular"},"hard":{"answer":"particular"}}},{"i":110,"t":"color","c":"color","ld":"","tr":""},{"i":111,"t":"or","c":"or","ld":"","tr":""},{"i":112,"t":"size,","c":"size","ld":"","tr":","},{"i":113,"t":"it","c":"it","ld":"","tr":""},{"i":114,"t":"somehow","c":"somehow","ld":"","tr":""},{"i":115,"t":"lies","c":"lies","ld":"","tr":"","b":{"easy":{"choices":["truths","lies","tiles"],"correct":1},"medium":{"choices":["laying","lied","lies","laid"],"correct":2,"answer":"lies"},"hard":{"answer":"lies"}}},{"i":116,"t":"within","c":"within","ld":"","tr":"","b":{"medium":{"choices":["inside of","withing","within","withined"],"correct":2,"answer":"within"},"hard":{"answer":"within"}}},{"i":117,"t":"each","c":"each","ld":"","tr":""},{"i":118,"t":"and","c":"and","ld":"","tr":""},{"i":119,"t":"every","c":"every","ld":"","tr":""},{"i":120,"t":"triangle","c":"triangle","ld":"","tr":""},{"i":121,"t":"you","c":"you","ld":"","tr":""},{"i":122,"t":"see.","c":"see","ld":"","tr":"."},{"i":123,"t":"Plato","c":"Plato","ld":"","tr":""},{"i":124,"t":"thought","c":"thought","ld":"","tr":""},{"i":125,"t":"the","c":"the","ld":"","tr":""},{"i":126,"t":"same","c":"same","ld":"","tr":"","b":{"hard":{"answer":"same"}}},{"i":127,"t":"was","c":"was","ld":"","tr":""},{"i":128,"t":"true","c":"true","ld":"","tr":"","b":{"easy":{"choices":["false","truce","true"],"correct":2},"medium":{"choices":["true","truly","trued","truth"],"correct":0,"answer":"true"},"hard":{"answer":"true"}}},{"i":129,"t":"of","c":"of","ld":"","tr":"","b":{"medium":{"choices":["for","about","of","with"],"correct":2,"answer":"of"},"hard":{"answer":"of"}}},{"i":130,"t":"beauty.","c":"beauty","ld":"","tr":"."},{"i":131,"t":"The","c":"The","ld":"","tr":""},{"i":132,"t":"Form","c":"Form","ld":"","tr":""},{"i":133,"t":"of","c":"of","ld":"","tr":""},{"i":134,"t":"Beauty","c":"Beauty","ld":"","tr":""},{"i":135,"t":"somehow","c":"somehow","ld":"","tr":""},{"i":136,"t":"lies","c":"lies","ld":"","tr":"","b":{"easy":{"choices":["truths","tiles","lies"],"correct":2},"medium":{"choices":["laying","lies","lied","laid"],"correct":1,"answer":"lies"},"hard":{"answer":"lies"}}},{"i":137,"t":"within","c":"within","ld":"","tr":"","b":{"hard":{"answer":"within"}}},{"i":138,"t":"each","c":"each","ld":"","tr":""},{"i":139,"t":"and","c":"and","ld":"","tr":""},{"i":140,"t":"every","c":"every","ld":"","tr":""},{"i":141,"t":"beautiful","c":"beautiful","ld":"","tr":""},{"i":142,"t":"thing","c":"thing","ld":"","tr":""},{"i":143,"t":"you","c":"you","ld":"","tr":""},{"i":144,"t":"see.","c":"see","ld":"","tr":"."}],"thresholds":{"easy":80,"medium":80,"hard":80}};

var levels=['easy','medium','hard'];
var levelNames={easy:'쉬움',medium:'중간',hard:'심화'};
var currentLevel=null,blankStates={};
var unlockedLevels={easy:true,medium:true,hard:true};
var completedLevels={easy:false,medium:false,hard:false};
var levelScores={};

function init(){showLevelSelector();}

function showLevelSelector(){
  currentLevel=null;
  document.getElementById('levelInfo').textContent='단계를 선택하세요';
  document.getElementById('progressFill').style.width='0%';
  var c=document.getElementById('content');
  var h='<div class="level-selector"><h2 style="margin-bottom:18px;font-size:17px;">학습 단계 선택</h2>';
  for(var x=0;x<levels.length;x++){
    var lv=levels[x];var done=completedLevels[lv];
    var cls=lv==='medium'?'med':lv;
    h+='<button class="level-btn '+cls+'-btn'+(done?' done':'')+'" onclick="startLevel(\''+lv+'\')">';
    h+=levelNames[lv]+'</button><br>';
  }
  h+='</div>';c.innerHTML=h;
  document.getElementById('actionBar').innerHTML='';
}

function startLevel(level){
  currentLevel=level;blankStates={};
  document.getElementById('levelInfo').textContent=levelNames[level]+' 단계';
  renderPassage();
}

function getBlanksForLevel(level){
  return DATA.words.filter(function(w){return w.b&&w.b[level];});
}

function renderPassage(){
  var c=document.getElementById('content');
  var blanks=getBlanksForLevel(currentLevel);
  var total=blanks.length;
  var answered=0;
  for(var k in blankStates){if(blankStates[k].answered)answered++;}
  document.getElementById('progressFill').style.width=(answered/total*100)+'%';
  var h='<div class="passage">';
  DATA.words.forEach(function(w){
    var bd=w.b&&w.b[currentLevel];
    if(bd){
      var st=blankStates[w.i]||{answered:false,correct:false,attempts:0};
      h+=(w.ld||'');
      if(currentLevel==='hard') h+=renderTypingBlank(w,bd,st);
      else h+=renderSelectBlank(w,bd,st);
      h+=(w.tr||'');
    }else{
      h+=(w.ld||'')+w.c+(w.tr||'');
    }
    h+=' ';
  });
  h+='</div>';c.innerHTML=h;
  if(answered===total) showResults();
  else document.getElementById('actionBar').innerHTML='<button class="btn" style="background:#eee;color:#333;font-size:13px;" onclick="confirmBackToSelector()">📋 단계 선택</button>';
}

function renderSelectBlank(w,bd,st){
  if(st.answered&&st.correct)
    return '<span class="blank-select correct"><select disabled><option>'+bd.choices[bd.correct]+'</option></select></span>';
  if(st.answered&&!st.correct&&st.attempts>=2)
    return '<span class="blank-select wrong"><select disabled><option>'+bd.choices[bd.correct]+' \u2717</option></select></span>';
  var opts='<option value="">___</option>';
  bd.choices.forEach(function(ch,ci){
    if(ch) opts+='<option value="'+ci+'">'+ch+'</option>';
  });
  var rb=st.attempts===1?'<span class="retry-badge">재도전</span>':'';
  return '<span class="blank-select" id="bs'+w.i+'"><select onchange="checkSelect('+w.i+',this.value)">'+opts+'</select>'+rb+'</span>';
}

function renderTypingBlank(w,bd,st){
  if(st.answered&&st.correct)
    return '<span class="blank-input correct"><input disabled value="'+bd.answer+'"></span>';
  if(st.answered&&!st.correct&&st.attempts>=2)
    return '<span class="blank-input wrong"><input disabled value="'+bd.answer+' \u2717"></span>';
  var rb=st.attempts===1?'<span class="retry-badge">재도전</span>':'';
  var parts=bd.answer.split(' ');
  var prefix,rest,ph;
  if(parts.length>1){
    prefix=parts[0]+' ';
    rest=parts.slice(1).join(' ');
    ph='나머지 단어 입력...';
  }else{
    prefix=bd.answer.charAt(0);
    rest=bd.answer.slice(1);
    ph='나머지 스펠링...';
  }
  var sz=Math.max(rest.length+3,6);
  return '<span class="blank-input" id="bs'+w.i+'" data-prefix="'+encodeURIComponent(prefix)+'">'
    +'<span class="hint-prefix">'+prefix+'</span>'
    +'<input size="'+sz+'" placeholder="'+ph+'" onkeydown="if(event.key===\'Enter\')checkType('+w.i+',this.value)">'
    +'<button onclick="checkType('+w.i+',this.parentNode.querySelector(\'input\').value)" style="font-size:11px;padding:4px 8px;margin-left:2px;border:1px solid #90caf9;border-radius:4px;background:#e3f2fd;cursor:pointer;">확인</button>'
    +rb+'</span>';
}

function checkSelect(wordIdx,val){
  if(val==='')return;
  var w=DATA.words.find(function(ww){return ww.i===wordIdx;});
  var bd=w.b[currentLevel];
  var st=blankStates[wordIdx]||{answered:false,correct:false,attempts:0};
  st.attempts++;
  if(parseInt(val)===bd.correct){
    st.answered=true;st.correct=st.attempts===1;
    blankStates[wordIdx]=st;renderPassage();
  }else{
    if(st.attempts>=2){
      st.answered=true;st.correct=false;
      blankStates[wordIdx]=st;renderPassage();
    }else{
      blankStates[wordIdx]=st;
      var el=document.getElementById('bs'+wordIdx);
      if(el){el.classList.add('wrong');setTimeout(function(){el.classList.remove('wrong');renderPassage();},600);}
    }
  }
}

function checkType(wordIdx,val){
  if(!val.trim())return;
  var w=DATA.words.find(function(ww){return ww.i===wordIdx;});
  var bd=w.b[currentLevel];
  var st=blankStates[wordIdx]||{answered:false,correct:false,attempts:0};
  st.attempts++;
  var el=document.getElementById('bs'+wordIdx);
  var prefix=el?decodeURIComponent(el.getAttribute('data-prefix')||''):'';
  var fullAnswer=(prefix+val).trim();
  if(fullAnswer.toLowerCase()===bd.answer.toLowerCase()){
    st.answered=true;st.correct=true;
    blankStates[wordIdx]=st;renderPassage();
  }else{
    if(st.attempts>=2){
      st.answered=true;st.correct=false;
      blankStates[wordIdx]=st;renderPassage();
    }else{
      blankStates[wordIdx]=st;
      if(el){el.classList.add('wrong');setTimeout(function(){el.classList.remove('wrong');renderPassage();},600);}
    }
  }
}

function showResults(){
  var blanks=getBlanksForLevel(currentLevel);
  var total=blanks.length;var correct=0;
  blanks.forEach(function(w){var st=blankStates[w.i];if(st&&st.correct)correct++;});
  var pct=Math.round(correct/total*100);
  var threshold=DATA.thresholds[currentLevel];
  var pass=pct>=threshold;
  levelScores[currentLevel]={correct:correct,total:total,pct:pct};
  var h='<div class="result-card"><h2>'+levelNames[currentLevel]+' 단계 결과</h2>';
  h+='<div class="score '+(pass?'pass':'fail')+'">'+pct+'%</div>';
  h+='<p>'+total+'개 빈칸 중 '+correct+'개 정답 (기준: '+threshold+'%)</p>';
  if(pass){completedLevels[currentLevel]=true;}
  h+='</div>';
  document.getElementById('content').innerHTML+=h;
  var ah='';
  if(!pass){
    ah='<button class="btn btn-retry" onclick="startLevel(\''+currentLevel+'\')">재도전</button>';
  }else{
    var ni=levels.indexOf(currentLevel)+1;
    if(ni<levels.length){
      ah='<button class="btn btn-next" onclick="startLevel(\''+levels[ni]+'\')">다음 단계 →</button>';
    }else{showCongrats();return;}
    ah+=' <button class="btn" style="background:#eee;color:#333;" onclick="showLevelSelector()">단계 선택</button>';
  }
  document.getElementById('actionBar').innerHTML=ah;
}

function showCongrats(){
  var tc=0,tb=0;
  for(var x=0;x<levels.length;x++){
    var s=levelScores[levels[x]];
    if(s){tc+=s.correct;tb+=s.total;}
  }
  var tp=Math.round(tc/tb*100);
  var h='<div class="congrats"><div style="font-size:40px;margin-bottom:10px;">🎉</div>';
  h+='<h2>축하합니다!</h2><p>모든 단계를 통과했습니다!</p>';
  h+='<p style="font-size:19px;font-weight:700;margin-top:10px;">전체 성취도: '+tp+'%</p></div>';
  document.getElementById('content').innerHTML=h;
  document.getElementById('actionBar').innerHTML='<button class="btn" style="background:#eee;color:#333;" onclick="showLevelSelector()">다시 도전</button>';
}

function confirmBackToSelector(){
  if(confirm('테스트를 중단하고 단계 선택으로 돌아갈까요?\n(현재 진행 상황은 초기화됩니다)')){
    showLevelSelector();
  }
}

init();
</script></body></html>
