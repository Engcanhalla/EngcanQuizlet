<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">

<title>2024_1_3_syn 유의어 테스트</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{height:100%;-webkit-text-size-adjust:100%}
body{font-family:'Noto Sans KR',-apple-system,BlinkMacSystemFont,'Malgun Gothic',sans-serif;background:#0f172a;min-height:100%;padding-top:env(safe-area-inset-top,0);padding-bottom:env(safe-area-inset-bottom,0);-webkit-font-smoothing:antialiased;overscroll-behavior-y:contain}
.wrap{max-width:500px;margin:0 auto;min-height:100vh;background:#fff;display:flex;flex-direction:column}
.header{background:#0f172a;padding:20px;color:#fff;text-align:center;position:sticky;top:0;z-index:10;flex-shrink:0}
.header h1{font-size:1.1rem;font-weight:700;margin-bottom:2px;line-height:1.3;word-break:keep-all}
.header p{opacity:.7;font-size:.78rem}
.content{padding:20px 16px 32px;flex:1}
.prog-bar{height:6px;background:#e2e8f0;border-radius:3px;margin-bottom:20px;overflow:hidden}
.prog-fill{height:100%;border-radius:3px;transition:width .4s ease}
.q-counter{text-align:center;font-size:.82rem;color:#64748b;margin-bottom:6px;font-weight:500}
.round-tag{display:inline-block;background:rgba(139,92,246,.12);color:#7c3aed;padding:5px 14px;border-radius:20px;font-size:.78rem;font-weight:700;margin-bottom:14px;border:1px solid rgba(139,92,246,.25)}
.kor-word{text-align:center;font-size:1.5rem;font-weight:700;color:#0f172a;margin:16px 0;padding:20px 16px;background:#f8fafc;border-radius:14px;border:2px solid #e2e8f0;line-height:1.4;word-break:keep-all}
.sentence-area{background:#eff6ff;border:1px solid #bfdbfe;border-radius:12px;padding:12px 16px;font-size:.9rem;color:#1e40af;line-height:1.6;margin-bottom:12px;word-break:keep-all;text-align:center}
.q-hint{text-align:center;font-size:.8rem;color:#8b5cf6;font-weight:600;margin-bottom:12px;padding:8px;background:rgba(139,92,246,.06);border-radius:8px}
/* Multi-select checkbox buttons */
.opts{margin-top:4px;display:flex;flex-direction:column;gap:10px}
.chk-btn{display:flex;align-items:center;gap:12px;width:100%;padding:14px 18px;background:#fff;border:2px solid #e2e8f0;border-radius:14px;font-size:.95rem;font-weight:500;cursor:pointer;transition:all .15s;text-align:left;font-family:inherit;color:#0f172a;min-height:52px;line-height:1.3}
.chk-btn:active{transform:scale(.98)}
.chk-box{width:20px;height:20px;border-radius:5px;border:2px solid #cbd5e1;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:.75rem;font-weight:800;transition:all .15s;background:white}
.chk-btn.selected .chk-box{background:#8b5cf6;border-color:#8b5cf6;color:white}
.chk-btn.selected{border-color:#8b5cf6;background:rgba(139,92,246,.06)}
.chk-btn.correct{border-color:#10b981;background:#ecfdf5;color:#065f46}
.chk-btn.correct .chk-box{background:#10b981;border-color:#10b981;color:white}
.chk-btn.wrong{border-color:#ef4444;background:#fef2f2;color:#991b1b}
.chk-btn.wrong .chk-box{background:#ef4444;border-color:#ef4444;color:white}
.chk-btn.reveal{border-color:#10b981;background:#ecfdf5;color:#065f46}
.chk-btn.reveal .chk-box{border-color:#10b981}
.chk-btn[disabled]{cursor:default}
.syn-tag{display:inline-block;padding:3px 10px;border-radius:20px;font-size:.75rem;font-weight:700;margin-right:3px;margin-bottom:3px}
.syn-tag.s{background:#dcfce7;color:#166534;border:1px solid #86efac}
.syn-tag.a{background:#fee2e2;color:#991b1b;border:1px solid #fca5a5}
.syn-pill{display:inline-flex;flex-direction:column;align-items:center;padding:6px 12px;border-radius:12px;font-size:.82rem;text-align:center;min-width:60px}
.syn-pill.s{background:#dcfce7;color:#166534;border:1px solid #86efac}
.syn-pill.a{background:#fee2e2;color:#991b1b;border:1px solid #fca5a5}
.btn{display:block;width:100%;padding:16px 24px;border:none;border-radius:14px;font-size:1rem;font-weight:600;cursor:pointer;transition:all .15s;font-family:inherit;text-align:center;min-height:52px;line-height:1.2}
.btn:active{transform:scale(.97);opacity:.9}
.btn+.btn{margin-top:10px}
.btn-accent{background:#8b5cf6;color:#fff}
.btn-primary{background:#0f172a;color:#fff}
.btn-secondary{background:#f1f5f9;color:#475569}
.btn-ghost{background:transparent;color:#64748b;border:1px solid #e2e8f0}
.btn-know{background:#10b981;color:#fff}
.btn-dunno{background:#ef4444;color:#fff}
.fb{text-align:center;padding:16px;border-radius:14px;margin-top:16px;font-weight:600;font-size:.95rem}
.fb.ok{background:#ecfdf5;color:#065f46;border:1px solid #a7f3d0}
.fb.ng{background:#fef2f2;color:#991b1b;border:1px solid #fecaca}
.fb .ans{font-weight:400;margin-top:8px;font-size:.85rem}
.card{background:#f8fafc;border-radius:14px;padding:20px 16px;margin-bottom:14px;border:1px solid #e2e8f0}
.card h3{font-size:1rem;font-weight:700;margin-bottom:10px;color:#0f172a}
.sr{display:flex;justify-content:space-between;padding:9px 0;border-bottom:1px solid #e2e8f0;font-size:.88rem;align-items:center}
.sr:last-child{border-bottom:none}
.sl{color:#64748b}
.sv{font-weight:600;color:#0f172a}
.sv.g{color:#10b981}
.sv.r{color:#ef4444}
.sc{width:110px;height:110px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:16px auto;font-size:1.8rem;font-weight:800;border:5px solid}
.sc.g{border-color:#10b981;color:#10b981;background:#ecfdf5}
.sc.r{border-color:#ef4444;color:#ef4444;background:#fef2f2}
.sc.purple{border-color:#8b5cf6;color:#8b5cf6;background:#f5f3ff}
.ig{margin:20px 0}
.ig-row{display:flex;margin-bottom:10px}
.ig-row .ic{flex:1;background:#f8fafc;border-radius:12px;padding:14px 10px;text-align:center;border:1px solid #e2e8f0}
.ig-row .ic+.ic{margin-left:10px}
.ic .lb{font-size:.78rem;color:#64748b;margin-bottom:3px}
.ic .vl{font-size:1rem;font-weight:700;color:#0f172a}
.sg{display:flex;flex-wrap:wrap;margin-bottom:14px;margin-left:-5px;margin-right:-5px}
.sc-w{width:50%;padding:5px;box-sizing:border-box}
.s-card{padding:14px 10px;border-radius:12px;border:2px solid #e2e8f0;background:#fff;text-align:center;transition:all .15s;cursor:default;height:100%}
.s-card .sn{font-weight:700;font-size:.9rem;color:#0f172a;margin-bottom:2px}
.s-card .sw{font-size:.72rem;color:#94a3b8;margin-bottom:8px}
.s-card .sb{height:4px;background:#e2e8f0;border-radius:2px;overflow:hidden;margin-bottom:6px}
.s-card .sbf{height:100%;border-radius:2px;transition:width .3s}
.s-card .ss{font-size:.78rem;font-weight:600;color:#94a3b8}
.s-card.cur{border-color:#8b5cf6;background:#f5f3ff;cursor:pointer}
.s-card.cur .ss{color:#7c3aed}
.s-card.cur .sbf{background:#8b5cf6}
.s-card.dn{border-color:#86efac;background:#f0fdf4;cursor:pointer}
.s-card.dn .ss{color:#059669}
.s-card.dn .sbf{background:#10b981}
.ob{margin-bottom:18px;padding:14px;background:#f8fafc;border-radius:12px;border:1px solid #e2e8f0}
.ob-top{display:flex;justify-content:space-between;margin-bottom:6px;font-size:.82rem}
.ob-bar{height:8px;background:#e2e8f0;border-radius:4px;overflow:hidden;position:relative}
.ob-fill{height:100%;border-radius:4px;transition:width .5s ease}
.ob-mark{position:absolute;top:0;height:100%;width:2px;background:rgba(0,0,0,.25)}
.ob-sub{font-size:.72rem;color:#94a3b8;margin-top:4px}
.wl{margin-top:14px}
.wi{display:flex;justify-content:space-between;align-items:center;padding:12px 14px;background:#fff;border-radius:10px;margin-bottom:8px;border:1px solid #fecaca;font-size:.82rem}
.wi .ww{font-weight:600;color:#0f172a}
.wi .wr{color:#94a3b8;font-size:.72rem}
.wi .wa{color:#ef4444;text-decoration:line-through}
.wi .wc{color:#10b981;font-weight:600}
.celeb{text-align:center;padding:16px 0}
.celeb .em{font-size:3.5rem;margin-bottom:12px}
.celeb h2{font-size:1.3rem;font-weight:800;color:#0f172a;margin-bottom:6px}
.celeb p{color:#64748b;font-size:.9rem;line-height:1.5;word-break:keep-all}
.alert-r{background:#fef2f2;color:#991b1b;border:1px solid #fecaca;padding:14px;border-radius:12px;text-align:center;margin-top:14px;font-size:.88rem;font-weight:600;word-break:keep-all}
.alert-g{background:#ecfdf5;color:#065f46;border:1px solid #a7f3d0;padding:14px;border-radius:12px;text-align:center;margin-top:14px;font-size:.88rem;font-weight:600;word-break:keep-all}
.conf{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:1000;overflow:hidden}
.conf i{position:absolute;top:-12px;display:block}
/* Flashcard */
.fc-scene{perspective:1000px;margin:0 0 24px 0;transform:translateZ(0)}
.fc-card{width:100%;position:relative;cursor:pointer;transform-style:preserve-3d;transition:transform .45s ease;will-change:transform;transform:translateZ(0)}
.fc-card.flipped{transform:rotateY(180deg)}
.fc-face{width:100%;min-height:240px;border-radius:18px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px 20px;backface-visibility:hidden;text-align:center;transform:translateZ(0)}
.fc-front{background:linear-gradient(135deg,#f5f3ff,#ede9fe);border:2px solid #c4b5fd}
.fc-back{position:absolute;top:0;left:0;right:0;background:linear-gradient(135deg,#ecfdf5,#d1fae5);border:2px solid #86efac;transform:rotateY(180deg);min-height:240px}
.fc-front .fc-label{font-size:.75rem;color:#7c3aed;font-weight:600;margin-bottom:10px;text-transform:uppercase;letter-spacing:.5px}
.fc-front .fc-word{font-size:1.8rem;font-weight:800;color:#1e1b4b;word-break:keep-all;line-height:1.3}
.fc-front .fc-tap{font-size:.75rem;color:#a78bfa;margin-top:14px}
.fc-back .fc-label{font-size:.75rem;color:#059669;font-weight:600;margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px}
.fc-back .fc-word{font-size:1.9rem;font-weight:800;color:#064e3b;line-height:1.2}
.fc-back .fc-sub{font-size:.9rem;color:#047857;margin-top:6px;font-weight:500}
.fc-syn{margin-top:14px;width:100%;background:rgba(16,185,129,.08);border-radius:10px;border:1px solid rgba(16,185,129,.2);padding:10px 12px;text-align:left}
.fc-syn .fc-syn-title{font-size:.7rem;font-weight:700;color:#047857;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.fc-ant{margin-top:8px;width:100%;background:rgba(239,68,68,.06);border-radius:10px;border:1px solid rgba(239,68,68,.15);padding:10px 12px;text-align:left}
.fc-ant .fc-ant-title{font-size:.7rem;font-weight:700;color:#b91c1c;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.fc-btns{display:flex;gap:10px;margin-top:8px}
.fc-btns .btn{flex:1;padding:14px 10px;font-size:.92rem;min-height:50px}
.fc-dots{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:16px;justify-content:center}
.fc-dot{width:10px;height:10px;border-radius:50%;background:#e2e8f0;transition:background .2s}
.fc-dot.ok{background:#10b981}
.fc-dot.ng{background:#ef4444}
.fc-dot.now{background:#8b5cf6;transform:scale(1.3)}
.jump-bar{margin-top:20px;padding:14px;background:#f8fafc;border:1px dashed #cbd5e1;border-radius:12px;text-align:center}
.jump-bar p{font-size:.8rem;color:#64748b;margin-bottom:8px}
.back-link{display:inline-block;font-size:.78rem;color:#94a3b8;padding:6px 12px;border-radius:8px;background:#f8fafc;cursor:pointer;border:1px solid #e2e8f0}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes fall{0%{transform:translateY(0) rotate(0);opacity:1}100%{transform:translateY(400px) rotate(720deg);opacity:0}}
.fade{animation:fadeIn .35s ease}
@media(max-width:360px){.kor-word{font-size:1.3rem}.fc-front .fc-word{font-size:1.5rem}.fc-back .fc-word{font-size:1.6rem}.fc-face{min-height:200px;padding:20px 14px}}
</style>

ntonyms":[{"en":"input","ko":"투입"},{"en":"intake","ko":"흡수"}]},{"english":"distinguish","korean":"구별하다","sentence":"Our ability to distinguish detail in the environment is therefore ideally suited to movement at speeds of perhaps five miles per hour and under.","sentenceKo":"따라서 환경의 세부 사항을 구별하는 우리의 능력은 아마도 시속 5마일 이하의 속도로 이동하는 데 이상적으로 적합합니다.","synonyms":[{"en":"differentiate","ko":"구별하다"},{"en":"discern","ko":"식별하다"},{"en":"discriminate","ko":"분간하다"}],"antonyms":[{"en":"confuse","ko":"혼동하다"},{"en":"mix","ko":"섞다"}]},{"english":"appreciation","korean":"감상, 평가","sentence":"On the other hand, pedestrian travel, being much slower, allows for the appreciation of environmental detail.","sentenceKo":"반면에, 보행자 이동은 훨씬 느리기 때문에 환경 세부 사항의 감상을 가능하게 합니다.","synonyms":[{"en":"gratitude","ko":"감사"},{"en":"recognition","ko":"인정"},{"en":"acknowledgment","ko":"감사표시"}],"antonyms":[{"en":"ingratitude","ko":"배은망덕"},{"en":"disregard","ko":"무시"}]},{"english":"polar opposite","korean":"정반대","sentence":"Joggers and bicyclists fall somewhere in between these polar opposites.","sentenceKo":"조깅하는 사람들과 자전거 타는 사람들은 이러한 정반대 사이 어딘가에 속합니다.","synonyms":[{"en":"antithesis","ko":"정반대"},{"en":"contrary","ko":"반대"},{"en":"reverse","ko":"역"}],"antonyms":[{"en":"same","ko":"동일"},{"en":"similar","ko":"유사"}]},{"english":"ordinarily","korean":"일반적으로, 보통","sentence":"Joggers and bicyclists fall somewhere in between these polar opposites; while they travel faster than pedestrians, their rate of speed is ordinarily much slower than that of the typical motorist.","sentenceKo":"조깅하는 사람들과 자전거 타는 사람들은 이러한 정반대 사이 어딘가에 속합니다; 그들은 보행자보다 빠르게 이동하지만, 그들의 속도는 일반적으로 전형적인 운전자의 속도보다 훨씬 느립니다.","synonyms":[{"en":"usually","ko":"보통"},{"en":"normally","ko":"일반적으로"},{"en":"typically","ko":"전형적으로"}],"antonyms":[{"en":"unusually","ko":"이례적으로"},{"en":"rarely","ko":"드물게"}]},{"english":"endure","korean":"견디다, 참다","sentence":"Every species has certain climatic requirements — what degree of heat or cold it can endure, for example.","sentenceKo":"모든 종은 특정한 기후 요구 사항을 가지고 있습니다 - 예를 들어, 어느 정도의 더위나 추위를 견딜 수 있는지.","synonyms":[{"en":"withstand","ko":"견디다"},{"en":"tolerate","ko":"참다"},{"en":"bear","ko":"감내하다"}],"antonyms":[{"en":"surrender","ko":"굴복하다"},{"en":"yield","ko":"항복하다"}]},{"english":"immobile","korean":"움직이지 않는, 고정된","sentence":"Even creatures that appear immobile, like trees and barnacles, are capable of dispersal at some stage of their life.","sentenceKo":"나무와 따개비처럼 움직이지 않는 것처럼 보이는 생물들조차도 그들의 삶의 어느 단계에서는 분산할 수 있습니다.","synonyms":[{"en":"stationary","ko":"정지한"},{"en":"fixed","ko":"고정된"},{"en":"motionless","ko":"움직이지않는"}],"antonyms":[{"en":"mobile","ko":"움직이는"},{"en":"active","ko":"활동적인"}]},{"english":"reproduce","korean":"번식하다","sentence":"A creature must get from the place it is born — often occupied by its parent — to a place where it can survive, grow, and reproduce.","sentenceKo":"생물은 태어난 장소 - 종종 부모가 차지하고 있는 곳 - 에서 생존하고 성장하며 번식할 수 있는 장소로 이동해야 합니다.","synonyms":[{"en":"replicate","ko":"복제하다"},{"en":"breed","ko":"번식하다"},{"en":"duplicate","ko":"복사하다"}],"antonyms":[]},{"english":"respectable","korean":"존경할 만한","sentence":"No respectable boss would say, \"I make it a point to discourage my staff from speaking up, and I maintain a culture that prevents disagreeing viewpoints from ever getting aired.\"","sentenceKo":"존경할 만한 어떤 상사도 \"나는 직원들이 발언하는 것을 막는 것을 원칙으로 하고, 반대 의견이 표명되는 것을 막는 문화를 유지한다\"고 말하지 않을 것입니다.","synonyms":[{"en":"honorable","ko":"존경할만한"},{"en":"reputable","ko":"평판좋은"},{"en":"decent","ko":"괜찮은"}],"antonyms":[{"en":"disreputable","ko":"평판나쁜"},{"en":"shameful","ko":"수치스러운"}]},{"english":"discourage","korean":"막다, 단념시키다","sentence":"No respectable boss would say, \"I make it a point to discourage my staff from speaking up, and I maintain a culture that prevents disagreeing viewpoints from ever getting aired.\"","sentenceKo":"존경할 만한 어떤 상사도 \"나는 직원들이 발언하는 것을 막는 것을 원칙으로 하고, 반대 의견이 표명되는 것을 막는 문화를 유지한다\"고 말하지 않을 것입니다.","synonyms":[{"en":"dishearten","ko":"낙담시키다"},{"en":"deter","ko":"단념시키다"},{"en":"demotivate","ko":"의욕을꺾다"}],"antonyms":[{"en":"encourage","ko":"격려하다"},{"en":"inspire","ko":"고무하다"}]},{"english":"speak up","korean":"의견을 말하다, 소리 내어 말하다","sentence":"No respectable boss would say, \"I make it a point to discourage my staff from speaking up, and I maintain a culture that prevents disagreeing viewpoints from ever getting aired.\"","sentenceKo":"존경할 만한 어떤 상사도 \"나는 직원들이 발언하는 것을 막는 것을 원칙으로 하고, 반대 의견이 표명되는 것을 막는 문화를 유지한다\"고 말하지 않을 것입니다.","synonyms":[{"en":"voice","ko":"목소리내다"},{"en":"express","ko":"표현하다"},{"en":"speak out","ko":"발언하다"}],"antonyms":[{"en":"stay silent","ko":"침묵하다"},{"en":"suppress","ko":"억누르다"}]},{"english":"maintain","korean":"유지하다","sentence":"No respectable boss would say, \"I make it a point to discourage my staff from speaking up, and I maintain a culture that prevents disagreeing viewpoints from ever getting aired.\"","sentenceKo":"존경할 만한 어떤 상사도 \"나는 직원들이 발언하는 것을 막는 것을 원칙으로 하고, 반대 의견이 표명되는 것을 막는 문화를 유지한다\"고 말하지 않을 것입니다.","synonyms":[{"en":"preserve","ko":"보존하다"},{"en":"sustain","ko":"유지하다"},{"en":"keep","ko":"지키다"}],"antonyms":[{"en":"abandon","ko":"포기하다"},{"en":"neglect","ko":"방치하다"}]},{"english":"viewpoint","korean":"관점, 견해","sentence":"No respectable boss would say, \"I make it a point to discourage my staff from speaking up, and I maintain a culture that prevents disagreeing viewpoints from ever getting aired.\"","sentenceKo":"존경할 만한 어떤 상사도 \"나는 직원들이 발언하는 것을 막는 것을 원칙으로 하고, 반대 의견이 표명되는 것을 막는 문화를 유지한다\"고 말하지 않을 것입니다.","synonyms":[{"en":"perspective","ko":"관점"},{"en":"standpoint","ko":"입장"},{"en":"opinion","ko":"의견"}],"antonyms":[]},{"english":"junior","korean":"하급의, 후배의","sentence":"In the interviews, the featured leaders are asked about their management techniques, and regularly claim to continually encourage internal protest from more junior staffers.","sentenceKo":"인터뷰에서, 주목받는 리더들은 그들의 관리 기법에 대해 질문을 받으며, 하급 직원들로부터의 내부 항의를 지속적으로 장려한다고 정기적으로 주장합니다.","synonyms":[{"en":"younger","ko":"더젊은"},{"en":"subordinate","ko":"하급자"},{"en":"novice","ko":"초보자"}],"antonyms":[{"en":"senior","ko":"상급자"},{"en":"elder","ko":"연장자"}]},{"english":"striking","korean":"두드러진, 현저한","sentence":"One of the most striking characteristics of a sleeping animal or person is that they do not respond normally to environmental stimuli.","sentenceKo":"잠자는 동물이나 사람의 가장 두드러진 특징 중 하나는 환경 자극에 정상적으로 반응하지 않는다는 것입니다.","synonyms":[{"en":"remarkable","ko":"눈에띄는"},{"en":"impressive","ko":"인상적인"},{"en":"notable","ko":"주목할만한"}],"antonyms":[{"en":"unremarkable","ko":"평범한"},{"en":"ordinary","ko":"보통의"}]},{"english":"intermediate","korean":"중간의","sentence":"Nevertheless, many animals (including humans) use the intermediate state of drowsiness to derive some benefits of sleep without total perceptual disengagement.","sentenceKo":"그럼에도 불구하고, 많은 동물들(인간 포함)은 전체적인 지각적 분리 없이 수면의 일부 이점을 얻기 위해 졸음의 중간 상태를 사용합니다.","synonyms":[{"en":"middle","ko":"중간의"},{"en":"transitional","ko":"과도기의"},{"en":"halfway","ko":"중간단계의"}],"antonyms":[{"en":"extreme","ko":"극단의"},{"en":"final","ko":"최종의"}]},{"english":"drowsiness","korean":"졸음","sentence":"Nevertheless, many animals (including humans) use the intermediate state of drowsiness to derive some benefits of sleep without total perceptual disengagement.","sentenceKo":"그럼에도 불구하고, 많은 동물들(인간 포함)은 전체적인 지각적 분리 없이 수면의 일부 이점을 얻기 위해 졸음의 중간 상태를 사용합니다.","synonyms":[{"en":"sleepiness","ko":"졸음"},{"en":"fatigue","ko":"피로"},{"en":"lethargy","ko":"무기력"}],"antonyms":[{"en":"alertness","ko":"각성"},{"en":"wakefulness","ko":"깨어있음"}]},{"english":"derive","korean":"얻다, 끌어내다","sentence":"Nevertheless, many animals (including humans) use the intermediate state of drowsiness to derive some benefits of sleep without total perceptual disengagement.","sentenceKo":"그럼에도 불구하고, 많은 동물들(인간 포함)은 전체적인 지각적 분리 없이 수면의 일부 이점을 얻기 위해 졸음의 중간 상태를 사용합니다.","synonyms":[{"en":"obtain","ko":"얻다"},{"en":"extract","ko":"추출하다"},{"en":"gain","ko":"획득하다"}],"antonyms":[]},{"english":"remarkably","korean":"현저하게, 놀랄 만큼","sentence":"For example, in a genuine training situation, Dr Pamela Hinds found that people expert in using mobile phones were remarkably less accurate than novice phone users in judging how long it takes people to learn to use the phones.","sentenceKo":"예를 들어, 실제 훈련 상황에서, Pamela Hinds 박사는 휴대전화 사용 전문가들이 사람들이 전화 사용법을 배우는 데 걸리는 시간을 판단하는 데 있어 초보 전화 사용자들보다 현저하게 덜 정확하다는 것을 발견했습니다.","synonyms":[{"en":"notably","ko":"두드러지게"},{"en":"exceptionally","ko":"특별히"},{"en":"extraordinarily","ko":"비상히"}],"antonyms":[{"en":"ordinarily","ko":"보통"},{"en":"slightly","ko":"약간"}]},{"english":"novice","korean":"초보자","sentence":"For example, in a genuine training situation, Dr Pamela Hinds found that people expert in using mobile phones were remarkably less accurate than novice phone users in judging how long it takes people to learn to use the phones.","sentenceKo":"예를 들어, 실제 훈련 상황에서, Pamela Hinds 박사는 휴대전화 사용 전문가들이 사람들이 전화 사용법을 배우는 데 걸리는 시간을 판단하는 데 있어 초보 전화 사용자들보다 현저하게 덜 정확하다는 것을 발견했습니다.","synonyms":[{"en":"beginner","ko":"초보자"},{"en":"amateur","ko":"아마추어"},{"en":"learner","ko":"학습자"}],"antonyms":[{"en":"expert","ko":"전문가"},{"en":"master","ko":"달인"}]},{"english":"insensitive","korean":"둔감한","sentence":"Experts can become insensitive to how hard a task is for the beginner, an effect referred to as the 'curse of knowledge'.","sentenceKo":"전문가들은 초보자에게 작업이 얼마나 어려운지에 대해 둔감해질 수 있으며, 이는 '지식의 저주'라고 불리는 효과입니다.","synonyms":[{"en":"unfeeling","ko":"무감각한"},{"en":"callous","ko":"냉담한"},{"en":"tactless","ko":"무신경한"}],"antonyms":[{"en":"sensitive","ko":"민감한"},{"en":"compassionate","ko":"동정심있는"}]},{"english":"curse","korean":"저주","sentence":"Experts can become insensitive to how hard a task is for the beginner, an effect referred to as the 'curse of knowledge'.","sentenceKo":"전문가들은 초보자에게 작업이 얼마나 어려운지에 대해 둔감해질 수 있으며, 이는 '지식의 저주'라고 불리는 효과입니다.","synonyms":[{"en":"swear","ko":"욕하다"},{"en":"damn","ko":"저주하다"},{"en":"condemn","ko":"비난하다"}],"antonyms":[{"en":"bless","ko":"축복하다"},{"en":"praise","ko":"칭찬하다"}]},{"english":"acquire","korean":"습득하다","sentence":"Dr Hinds was able to show that as people acquired the skill, they then began to underestimate the level of difficulty of that skill.","sentenceKo":"Hinds 박사는 사람들이 기술을 습득함에 따라 그 기술의 난이도를 과소평가하기 시작한다는 것을 보여줄 수 있었습니다.","synonyms":[{"en":"obtain","ko":"얻다"},{"en":"gain","ko":"획득하다"},{"en":"attain","ko":"취득하다"}],"antonyms":[{"en":"lose","ko":"잃다"},{"en":"relinquish","ko":"포기하다"}]},{"english":"underestimate","korean":"과소평가하다","sentence":"Dr Hinds was able to show that as people acquired the skill, they then began to underestimate the level of difficulty of that skill.","sentenceKo":"Hinds 박사는 사람들이 기술을 습득함에 따라 그 기술의 난이도를 과소평가하기 시작한다는 것을 보여줄 수 있었습니다.","synonyms":[{"en":"undervalue","ko":"과소평가하다"},{"en":"underrate","ko":"낮게평가하다"},{"en":"misjudge","ko":"잘못판단하다"}],"antonyms":[{"en":"overestimate","ko":"과대평가하다"},{"en":"exaggerate","ko":"과장하다"}]},{"english":"assumption","korean":"가정, 추정","sentence":"Knowing that experts forget how hard it was for them to learn, we can understand the need to look at the learning process through students' eyes, rather than making assumptions about how students 'should be' learning.","sentenceKo":"전문가들이 배우는 것이 얼마나 어려웠는지 잊어버린다는 것을 알면, 학생들이 '어떻게 학습해야 하는지'에 대한 가정을 하기보다는 학생들의 눈을 통해 학습 과정을 살펴볼 필요성을 이해할 수 있습니다.","synonyms":[{"en":"supposition","ko":"가정"},{"en":"presumption","ko":"추정"},{"en":"belief","ko":"믿음"}],"antonyms":[{"en":"fact","ko":"사실"},{"en":"certainty","ko":"확실성"}]},{"english":"compose","korean":"작곡하다","sentence":"A group of psychologists studied individuals with severe mental illness who experienced weekly group music therapy, including singing familiar songs and composing original songs.","sentenceKo":"한 심리학자 그룹이 친숙한 노래를 부르고 독창적인 노래를 작곡하는 것을 포함하여 매주 그룹 음악 치료를 경험한 심각한 정신 질환을 가진 개인들을 연구했습니다.","synonyms":[{"en":"create","ko":"창작하다"},{"en":"write","ko":"쓰다"},{"en":"construct","ko":"구성하다"}],"antonyms":[{"en":"destroy","ko":"파괴하다"},{"en":"dismantle","ko":"해체하다"}]},{"english":"efficacy","korean":"효능, 효과","sentence":"Focusing on singing, another group of psychologists reviewed articles on the efficacy of group singing as a mental health treatment for individuals living with a mental health condition in a community setting.","sentenceKo":"노래 부르기에 초점을 맞춰, 다른 심리학자 그룹은 지역 사회 환경에서 정신 건강 상태를 가진 개인들을 위한 정신 건강 치료로서 그룹 노래 부르기의 효능에 관한 논문들을 검토했습니다.","synonyms":[{"en":"effectiveness","ko":"효과성"},{"en":"efficiency","ko":"효율성"},{"en":"potency","ko":"효능"}],"antonyms":[{"en":"inefficacy","ko":"무효"},{"en":"ineffectiveness","ko":"비효과성"}]},{"english":"wellbeing","korean":"웰빙, 안녕","sentence":"The findings showed that, when people with mental health conditions participated in a choir, their mental health and wellbeing significantly improved.","sentenceKo":"연구 결과는 정신 건강 상태를 가진 사람들이 합창단에 참여했을 때 그들의 정신 건강과 웰빙이 상당히 개선되었다는 것을 보여주었습니다.","synonyms":[{"en":"welfare","ko":"복지"},{"en":"health","ko":"건강"},{"en":"wellness","ko":"웰빙"}],"antonyms":[{"en":"illness","ko":"질병"},{"en":"suffering","ko":"고통"}]},{"english":"enhance","korean":"향상시키다","sentence":"Group singing provided enjoyment, improved emotional states, developed a sense of belonging and enhanced self-confidence.","sentenceKo":"그룹 노래 부르기는 즐거움을 제공하고, 감정 상태를 개선하며, 소속감을 발전시키고 자신감을 향상시켰습니다.","synonyms":[{"en":"improve","ko":"개선하다"},{"en":"boost","ko":"향상시키다"},{"en":"strengthen","ko":"강화하다"}],"antonyms":[{"en":"diminish","ko":"감소시키다"},{"en":"weaken","ko":"약화시키다"}]},{"english":"prevail","korean":"우세하다, 만연하다","sentence":"Common sense has prevailed: different sports have made adaptations for children.","sentenceKo":"상식이 우세했습니다: 다양한 스포츠들이 어린이들을 위한 조정을 해왔습니다.","synonyms":[{"en":"triumph","ko":"승리하다"},{"en":"succeed","ko":"성공하다"},{"en":"dominate","ko":"지배하다"}],"antonyms":[{"en":"fail","ko":"실패하다"},{"en":"lose","ko":"지다"}]},{"english":"adaptation","korean":"적응, 조정","sentence":"In a similar way, tennis has adapted the court areas, balls and rackets to make them more appropriate for children under 10. The adaptations are progressive and relate to the age of the child.","sentenceKo":"비슷한 방식으로, 테니스는 10세 미만 어린이들에게 더 적절하도록 코트 영역, 공, 라켓을 조정했습니다. 조정은 점진적이며 어린이의 나이와 관련이 있습니다.","synonyms":[{"en":"adjustment","ko":"적응"},{"en":"modification","ko":"수정"},{"en":"accommodation","ko":"조절"}],"antonyms":[{"en":"rigidity","ko":"경직성"},{"en":"inflexibility","ko":"비융통성"}]},{"english":"progressive","korean":"점진적인","sentence":"The adaptations are progressive and relate to the age of the child.","sentenceKo":"조정은 점진적이며 어린이의 나이와 관련이 있습니다.","synonyms":[{"en":"advanced","ko":"진보적인"},{"en":"forward-thinking","ko":"진취적인"},{"en":"innovative","ko":"혁신적인"}],"antonyms":[{"en":"conservative","ko":"보수적인"},{"en":"traditional","ko":"전통적인"}]},{"english":"relate to","korean":"~와 관련이 있다","sentence":"The adaptations are progressive and relate to the age of the child.","sentenceKo":"조정은 점진적이며 어린이의 나이와 관련이 있습니다.","synonyms":[{"en":"connect to","ko":"연결되다"},{"en":"associate with","ko":"관련되다"},{"en":"identify with","ko":"공감하다"}],"antonyms":[{"en":"disconnect from","ko":"단절되다"},{"en":"differ from","ko":"다르다"}]},{"english":"excel","korean":"뛰어나다","sentence":"With no horses available, the Inca empire excelled at delivering messages on foot.","sentenceKo":"사용 가능한 말이 없었기 때문에, 잉카 제국은 도보로 메시지를 전달하는 데 뛰어났습니다.","synonyms":[{"en":"surpass","ko":"능가하다"},{"en":"outperform","ko":"뛰어나다"},{"en":"shine","ko":"빛나다"}],"antonyms":[{"en":"fail","ko":"실패하다"},{"en":"underperform","ko":"부진하다"}]},{"english":"relay","korean":"전달하다","sentence":"The Inca empire could relay messages 1,000 miles (1,610 km) in three or four days under good conditions.","sentenceKo":"잉카 제국은 좋은 조건 하에서 3~4일 안에 1,000마일(1,610km)의 메시지를 전달할 수 있었습니다.","synonyms":[{"en":"transmit","ko":"전달하다"},{"en":"convey","ko":"전하다"},{"en":"communicate","ko":"의사전달하다"}],"antonyms":[{"en":"withhold","ko":"보류하다"},{"en":"suppress","ko":"억제하다"}]},{"english":"catch sight of","korean":"~을 목격하다","sentence":"If they caught sight of another messenger coming, they hurried out to meet them.","sentenceKo":"다른 전령이 오는 것을 목격하면, 그들은 서둘러 나가 그들을 만났습니다.","synonyms":[{"en":"spot","ko":"발견하다"},{"en":"glimpse","ko":"얼핏보다"},{"en":"notice","ko":"알아채다"}],"antonyms":[{"en":"miss","ko":"놓치다"},{"en":"overlook","ko":"간과하다"}]},{"english":"considerable","korean":"상당한","sentence":"To continue the Thank you example, even though another culture may have an expression that appears translatable (many don't), there may be similar norms for its usage, for example, such that you should say Thank you only when the cost someone has caused is considerable.","sentenceKo":"감사하다는 예를 계속하자면, 다른 문화가 번역 가능해 보이는 표현을 가지고 있을지라도 (많은 문화가 그렇지 않지만), 그 사용에 대한 유사한 규범이 있을 수 있습니다. 예를 들어, 누군가가 야기한 비용이 상당할 때만 감사하다고 말해야 하는 경우입니다.","synonyms":[{"en":"substantial","ko":"상당한"},{"en":"significant","ko":"중요한"},{"en":"notable","ko":"주목할만한"}],"antonyms":[{"en":"insignificant","ko":"미미한"},{"en":"negligible","ko":"무시할만한"}]},{"english":"ridiculous","korean":"우스꽝스러운","sentence":"In such a case it would sound ridiculous (i.e., unexpected, surprising, and worthy of criticism) if you were to thank someone for something so minor as holding a door open for you.","sentenceKo":"그러한 경우, 누군가가 당신을 위해 문을 열어주는 것과 같이 사소한 것에 대해 감사한다면 우스꽝스럽게 (즉, 예상치 못하고, 놀랍고, 비판받을 가치가 있게) 들릴 것입니다.","synonyms":[{"en":"absurd","ko":"터무니없는"},{"en":"preposterous","ko":"우스꽝스러운"},{"en":"foolish","ko":"어리석은"}],"antonyms":[{"en":"reasonable","ko":"합리적인"},{"en":"sensible","ko":"분별있는"}]},{"english":"spiritual","korean":"영적인","sentence":"Long ago, when the world was young, an old Native American spiritual leader Odawa had a dream on a high mountain.","sentenceKo":"오래 전, 세상이 젊었을 때, 늙은 아메리카 원주민 영적 지도자 Odawa는 높은 산에서 꿈을 꾸었습니다.","synonyms":[{"en":"religious","ko":"종교적인"},{"en":"sacred","ko":"신성한"},{"en":"transcendent","ko":"초월적인"}],"antonyms":[{"en":"material","ko":"물질적인"},{"en":"secular","ko":"세속적인"}]},{"english":"capture","korean":"포착하다","sentence":"The good dreams are captured in the web of life and carried with the people.","sentenceKo":"좋은 꿈은 삶의 거미줄에 포착되어 사람들과 함께 운반됩니다.","synonyms":[{"en":"seize","ko":"포착하다"},{"en":"catch","ko":"잡다"},{"en":"trap","ko":"가두다"}],"antonyms":[{"en":"release","ko":"풀어주다"},{"en":"free","ko":"해방하다"}]},{"english":"spin","korean":"실을 뽑다, 회전시키다","sentence":"When Iktomi finished speaking, he spun a web and gave it to Odawa.","sentenceKo":"Iktomi가 말을 마쳤을 때, 그는 거미줄을 만들어 Odawa에게 주었습니다.","synonyms":[{"en":"rotate","ko":"회전하다"},{"en":"turn","ko":"돌다"},{"en":"revolve","ko":"선회하다"}],"antonyms":[{"en":"stop","ko":"멈추다"},{"en":"stabilize","ko":"안정시키다"}]},{"english":"vision","korean":"비전, 환상","sentence":"Use the web to help your people reach their goals. Make good use of their ideas, dreams, and visions.","sentenceKo":"거미줄을 사용하여 당신의 사람들이 목표를 달성하도록 도우십시오. 그들의 아이디어, 꿈, 비전을 잘 활용하십시오.","synonyms":[{"en":"sight","ko":"시력"},{"en":"perspective","ko":"관점"},{"en":"dream","ko":"비전"}],"antonyms":[{"en":"blindness","ko":"맹목"},{"en":"shortsightedness","ko":"근시안"}]},{"english":"cycle","korean":"주기, 순환","sentence":"Iktomi told Odawa about the cycles of life.","sentenceKo":"Iktomi는 Odawa에게 삶의 주기에 대해 말했습니다.","synonyms":[{"en":"rotation","ko":"순환"},{"en":"pattern","ko":"패턴"},{"en":"sequence","ko":"연속"}],"antonyms":[]}]};
var SET_SIZE=20;
function shuffle(a){var b=a.slice();for(var i=b.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=b[i];b[i]=b[j];b[j]=t}return b}
function esc(s){var d=document.createElement('div');d.textContent=s;return d.innerHTML}
function trim(s){return(s||'').replace(/^\s+|\s+$/g,'')}
function maskWord(sen,word){if(!sen||!word)return sen;var lc=sen.toLowerCase(),wl=word.toLowerCase(),res='',i=0;while(i<sen.length){var idx=lc.indexOf(wl,i);if(idx===-1){res+=sen.substring(i);break}res+=sen.substring(i,idx);for(var j=0;j<word.length;j++)res+='_';i=idx+wl.length}return res}
function SimpleSet(){this._m={};this.size=0}
SimpleSet.prototype.add=function(v){var k=String(v);if(!this._m[k]){this._m[k]=true;this.size++}};
SimpleSet.prototype.has=function(v){return this._m[String(v)]===true};
SimpleSet.prototype.clear=function(){this._m={};this.size=0};

function App(){
  var self=this;
  this.allWords=CONFIG.words;
  this.passThreshold=CONFIG.passThreshold;
  this.app=document.getElementById('app');
  this.titleEl=document.getElementById('page-title');
  this.subEl=document.getElementById('page-subtitle');
  this.sets=[];
  for(var i=0;i<this.allWords.length;i+=SET_SIZE){this.sets.push(this.allWords.slice(i,Math.min(i+SET_SIZE,this.allWords.length)))}
  this.totalSets=this.sets.length;
  // test state
  this.masteredWords=new SimpleSet();this.wrongHistory=[];this.setResults=[];
  this.curSet=0;this.round=0;this.roundWords=[];
  this.roundCorrect=[];this.roundWrong=[];this.roundHistory=[];
  this.answered=false;this.setWordsAll=[];
  this.currentOptions=[];this.currentCorrectMap={};this.selectedIdxs={};this.currentKoMap={};
  // practice state
  this.pSeen=new SimpleSet();this.pSetResults=[];this.pCurSet=0;this.pRound=0;
  this.pCards=[];this.pIdx=0;this.pKnown=[];this.pUnknown=[];this.pFlipped=false;

  document.addEventListener('click',function(e){
    var t=e.target.closest('[data-chk]');
    if(t){var ci=parseInt(t.getAttribute('data-chk'),10);self.toggleOption(ci);return}
    if(e.target.closest('.fc-card')&&!e.target.closest('.fc-btns')&&!e.target.closest('.btn')){self.flipCard();return}
    var ae=e.target.closest('[data-action]');
    if(ae){var a=ae.getAttribute('data-action'),ar=ae.getAttribute('data-args');
      if(typeof self[a]==='function'){if(ar!==null)self[a](parseInt(ar,10));else self[a]()}}
  },false);
  this.showHome();
}
App.prototype.render=function(h){this.app.innerHTML=h};
App.prototype.setTitle=function(t){this.titleEl.textContent=t};
App.prototype.setSub=function(t){this.subEl.textContent=t};
App.prototype.toTop=function(){window.scrollTo(0,0)};

/* ── Home ── */
App.prototype.showHome=function(){
  this.setTitle(CONFIG.title);this.setSub('유의어 학습');
  this.render(
    '<div class="fade" style="text-align:center">'+

App.prototype.practiceSet=function(idx){
  this.pCurSet=idx;this.pRound=0;
  var sw=this.sets[idx];
  var unseen=[];for(var i=0;i<sw.length;i++){if(!this.pSeen.has(trim(sw[i].english).toLowerCase()))unseen.push(sw[i])}
  this.pCards=unseen.length>0?shuffle(unseen):shuffle(sw.slice());
  this.pIdx=0;this.pKnown=[];this.pUnknown=[];this.pFlipped=false;this.pRound++;

};
App.prototype.showCard=function(){
  if(this.pIdx>=this.pCards.length){this.endPracticeRound();return}
  this.pFlipped=false;
  var word=this.pCards[this.pIdx];
  var total=this.pCards.length;
  var pct=Math.round((this.pIdx/total)*100);
  var dotsHtml='';
  for(var d=0;d<total;d++){
    var dc='fc-dot';
    if(d<this.pIdx){var wk=false;for(var k=0;k<this.pKnown.length;k++){if(this.pKnown[k].english===this.pCards[d].english){wk=true;break}}dc+=wk?' ok':' ng';}
    else if(d===this.pIdx){dc+=' now'}
    dotsHtml+='<div class="'+dc+'"></div>';
  }
  // Build synonym/antonym tags for back
  var synHtml='',antHtml='';

      word.synonyms.map(function(s){
        var ko=s.ko?'<div style="font-size:.7rem;color:#166534;margin-top:2px;font-weight:400">'+esc(s.ko)+'</div>':'';
        return '<div class="syn-pill s"><div style="font-weight:700">'+esc(s.en)+'</div>'+ko+'</div>';
      }).join('')+
    '</div></div>';
  }
  if(word.antonyms&&word.antonyms.length>0){
    antHtml='<div class="fc-ant"><div class="fc-ant-title">반의어 (Antonyms)</div><div style="display:flex;flex-wrap:wrap;gap:6px;justify-content:center">'+
      word.antonyms.map(function(s){
        var ko=s.ko?'<div style="font-size:.7rem;color:#991b1b;margin-top:2px;font-weight:400">'+esc(s.ko)+'</div>':'';
        return '<div class="syn-pill a"><div style="font-weight:700">'+esc(s.en)+'</div>'+ko+'</div>';
      }).join('')+
    '</div></div>';
  }
  var sentFront=word.sentence?'<div style="font-size:.78rem;color:#6d28d9;margin-top:10px;line-height:1.5;padding:9px 12px;background:rgba(139,92,246,.08);border-radius:10px;word-break:keep-all;border:1px solid rgba(139,92,246,.15)">'+esc(maskWord(word.sentence,word.english))+'</div>':'';
  var sentBack=word.sentenceKo?'<div style="font-size:.78rem;color:#047857;margin-top:8px;line-height:1.5;padding:9px 12px;background:rgba(16,185,129,.08);border-radius:10px;word-break:keep-all;border:1px solid rgba(16,185,129,.15)">'+esc(word.sentenceKo)+'</div>':'';

  this.setTitle('세트 '+(this.pCurSet+1)+' 연습');
  this.setSub(this.pRound+'라운드 · '+(this.pIdx+1)+'/'+total);
  this.render(
    '<div class="fade">'+
    '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">'+
    '<div class="round-tag">세트'+(this.pCurSet+1)+' · '+this.pRound+'R</div>'+
    '<div class="back-link" data-action="showPracticeMap">← 목록</div></div>'+
    '<div class="fc-dots">'+dotsHtml+'</div>'+
    '<div class="prog-bar"><div class="prog-fill" style="width:'+pct+'%;background:#8b5cf6"></div></div>'+
    '<div id="fc-action" style="display:none;margin-bottom:12px">'+
      '<div class="fc-btns">'+
        '<button class="btn btn-dunno" data-action="pMarkUnknown">❌ 몰라요</button>'+
        '<button class="btn btn-know" data-action="pMarkKnown">⭕ 알아요</button>'+
      '</div></div>'+
    '<div class="fc-scene">'+
      '<div class="fc-card" id="fc-card">'+
        '<div class="fc-face fc-front">'+
          '<div class="fc-label">한글 뜻</div>'+
          '<div class="fc-word">'+esc(word.korean)+'</div>'+
          sentFront+
          '<div class="fc-tap">카드를 탭하여 유의어 확인 →</div>'+
        '</div>'+
        '<div class="fc-face fc-back">'+
          '<div class="fc-label">English</div>'+
          '<div class="fc-word">'+esc(word.english)+'</div>'+
          '<div class="fc-sub">'+esc(word.korean)+'</div>'+
          synHtml+antHtml+sentBack+
        '</div>'+
      '</div>'+
    '</div>'+
    '</div>'
  );
};
App.prototype.flipCard=function(){

};
App.prototype.pMarkUnknown=function(){

};
App.prototype.endPracticeRound=function(){
  var sw=this.sets[this.pCurSet];
  var seenCount=0;for(var i=0;i<sw.length;i++){if(this.pSeen.has(trim(sw[i].english).toLowerCase()))seenCount++}
  if(this.pUnknown.length===0){
    var res={setIdx:this.pCurSet,rounds:this.pRound,known:seenCount,total:sw.length};
    var ex=-1;for(var r=0;r<this.pSetResults.length;r++){if(this.pSetResults[r].setIdx===this.pCurSet){ex=r;break}}
    if(ex>=0)this.pSetResults[ex]=res;else this.pSetResults.push(res);
    this.setTitle('세트 '+(this.pCurSet+1)+' 완료!');this.setSub(this.pRound+'라운드');

      '<div style="font-size:2rem;margin-bottom:8px">🎯</div>'+
      '<h2 style="font-size:1.1rem;font-weight:700;color:#0f172a;margin-bottom:6px">세트 '+(this.pCurSet+1)+' 완료!</h2>'+
      '<div class="sc g">100%</div>'+
      (hasNext?'<button class="btn btn-accent" data-action="goNextPracticeSet">다음 세트 →</button>':'')+
      '<button class="btn btn-ghost" data-action="showPracticeMap">세트 목록</button>'+
      '<div class="jump-bar"><p>이제 테스트에 도전!</p>'+
      '<button class="btn btn-primary" data-action="startFullTest">📝 유의어 테스트 시작</button></div></div>');
  }else{
    this.pCards=shuffle(this.pUnknown.slice());this.pIdx=0;this.pKnown=[];this.pUnknown=[];this.pRound++;this.showCard();
  }
};
App.prototype.goNextPracticeSet=function(){this.pCurSet++;this.practiceSet(this.pCurSet)};

/* ── Test Mode ── */
App.prototype.startFullTest=function(){

App.prototype.showSetMap=function(){

    var done=!!result,sPct=Math.round((m/sw.length)*100);

    else if(done){cls='dn';icon='✅';stxt=sPct+'%';act=' data-action="retrySet" data-args="'+i+'"'}
    else{cls='cur';icon='▶';stxt='시작';act=' data-action="startSet" data-args="'+i+'"'}
    setsHtml+='<div class="sc-w"><div class="s-card '+cls+'"'+act+'><div class="sn">세트 '+(i+1)+'</div><div class="sw">'+sw.length+'개</div>'+

    '<p style="color:#64748b;font-size:.82rem">맞는 유의어를 모두 선택하세요</p></div>'+
    '<div class="ob"><div class="ob-top"><span style="color:#64748b">전체 성취도</span><span style="font-weight:700;color:'+barColor+'">'+overallPct+'% / '+this.passThreshold+'%</span></div>'+
    '<div class="ob-bar"><div class="ob-fill" style="width:'+overallPct+'%;background:'+barColor+'"></div>'+
    '<div class="ob-mark" style="left:'+this.passThreshold+'%"></div></div>'+

App.prototype.startSet=function(idx){
  this.curSet=idx;this.round=0;this.roundHistory=[];
  var sw=this.sets[idx];this.setWordsAll=sw;
  var un=[];for(var i=0;i<sw.length;i++){if(!this.masteredWords.has(trim(sw[i].english).toLowerCase()))un.push(sw[i])}
  this.roundWords=un.length>0?un:sw.slice();this.startSetRound();
};
App.prototype.retrySet=function(idx){this.startSet(idx)};
App.prototype.startSetRound=function(){
  this.round++;this.roundWords=shuffle(this.roundWords);
  this.qIndex=0;this.roundCorrect=[];this.roundWrong=[];this.answered=false;
  this.setTitle('세트 '+(this.curSet+1)+' / '+this.totalSets);this.setSub(this.round+'라운드');
  this.showQuestion();
};
App.prototype.buildOptions=function(word){
  var synEn=(word.synonyms||[]).map(function(s){return s.en});
  var antEn=(word.antonyms||[]).map(function(s){return s.en});
  var allCorrect=[word.english].concat(synEn);
  var distractors=antEn;
  var usedCorrect,numD;
  if(allCorrect.length>=4){usedCorrect=allCorrect.slice(0,3);}
  else if(allCorrect.length===3){usedCorrect=allCorrect;}
  else{usedCorrect=allCorrect;}
  numD=Math.max(1,5-usedCorrect.length);
  if(numD>distractors.length)numD=distractors.length;
  var total=usedCorrect.length+numD;
  if(total<4&&distractors.length>numD)numD=Math.min(distractors.length,4-usedCorrect.length);
  var usedD=distractors.slice(0,numD);
  var options=shuffle(usedCorrect.concat(usedD));
  var cmap={};for(var i=0;i<usedCorrect.length;i++){cmap[usedCorrect[i].toLowerCase()]=true;}
  // Build english→korean lookup for all options
  var koMap={};
  koMap[word.english.toLowerCase()]=word.korean;
  for(var i=0;i<(word.synonyms||[]).length;i++){if(word.synonyms[i].ko)koMap[word.synonyms[i].en.toLowerCase()]=word.synonyms[i].ko;}
  for(var i=0;i<(word.antonyms||[]).length;i++){if(word.antonyms[i].ko)koMap[word.antonyms[i].en.toLowerCase()]=word.antonyms[i].ko;}
  return{options:options,correctMap:cmap,correctCount:usedCorrect.length,koMap:koMap};
};
App.prototype.showQuestion=function(){
  if(this.qIndex>=this.roundWords.length){this.endSetRound();return}
  this.answered=false;this.selectedIdxs={};
  var word=this.roundWords[this.qIndex];
  var built=this.buildOptions(word);
  this.currentOptions=built.options;this.currentCorrectMap=built.correctMap;this.currentCorrectCount=built.correctCount;this.currentKoMap=built.koMap;
  var total=this.roundWords.length;
  var pct=Math.round((this.qIndex/total)*100);
  var masked=maskWord(word.sentence,word.english);
  var senHtml=masked?'<div class="sentence-area">'+esc(masked)+'</div>':'';
  var optsHtml='<div class="opts">';
  for(var i=0;i<built.options.length;i++){
    optsHtml+='<button class="chk-btn" data-chk="'+i+'">'+
      '<div class="chk-box"></div>'+
      '<span>'+esc(built.options[i])+'</span></button>';
  }
  optsHtml+='</div>';
  var pluralHint=built.correctCount>1?'정답 '+built.correctCount+'개 — ':'';
  this.setTitle('세트 '+(this.curSet+1)+' / '+this.totalSets);
  this.setSub(this.round+'R · '+(this.qIndex+1)+'/'+total);
  this.render(
    '<div class="fade">'+
    '<div class="prog-bar"><div class="prog-fill" style="width:'+pct+'%;background:#8b5cf6"></div></div>'+
    '<div class="q-counter">'+(this.qIndex+1)+' / '+total+'</div>'+
    '<div class="round-tag">'+this.round+'라운드</div>'+
    '<div class="kor-word">'+esc(word.korean)+'</div>'+
    senHtml+
    '<div class="q-hint">'+pluralHint+'유의어를 모두 선택 후 제출하세요</div>'+
    optsHtml+
    '<button class="btn btn-accent" data-action="submitSynonym" style="margin-top:14px">✓ 제출</button>'+
    '</div>'
  );
};
App.prototype.toggleOption=function(ci){
  if(this.answered)return;
  var btn=document.querySelector('[data-chk="'+ci+'"]');if(!btn)return;
  if(this.selectedIdxs[ci]){delete this.selectedIdxs[ci];btn.classList.remove('selected');btn.querySelector('.chk-box').textContent=''}
  else{this.selectedIdxs[ci]=true;btn.classList.add('selected');btn.querySelector('.chk-box').textContent='✓'}
};
App.prototype.submitSynonym=function(){
  if(this.answered)return;
  this.answered=true;
  var word=this.roundWords[this.qIndex];
  var btns=document.querySelectorAll('.chk-btn');
  var selectedWords=[];
  for(var i=0;i<btns.length;i++){if(this.selectedIdxs[i])selectedWords.push(this.currentOptions[i]);}
  // Check: all correct selected AND no wrong selected
  var isCorrect=true;
  var cmap=this.currentCorrectMap;
  // All correct words must be in selected
  for(var k in cmap){var found=false;for(var j=0;j<selectedWords.length;j++){if(selectedWords[j].toLowerCase()===k){found=true;break}}if(!found){isCorrect=false;break}}
  // No wrong words in selected
  if(isCorrect){for(var j=0;j<selectedWords.length;j++){if(!cmap[selectedWords[j].toLowerCase()]){isCorrect=false;break}}}
  // Visual feedback + append Korean meaning to every button
  for(var i=0;i<btns.length;i++){
    btns[i].disabled=true;btns[i].style.cursor='default';
    var optW=this.currentOptions[i];var isC=!!cmap[optW.toLowerCase()];var wasSel=!!this.selectedIdxs[i];
    if(isC&&wasSel){btns[i].className='chk-btn correct';btns[i].querySelector('.chk-box').textContent='✓'}
    else if(isC&&!wasSel){btns[i].className='chk-btn reveal';btns[i].querySelector('.chk-box').textContent='○'}
    else if(!isC&&wasSel){btns[i].className='chk-btn wrong';btns[i].querySelector('.chk-box').textContent='✕'}
    // Append Korean meaning
    var ko=this.currentKoMap[optW.toLowerCase()]||'';
    if(ko){
      var koEl=document.createElement('span');
      koEl.style.cssText='font-size:.75rem;font-weight:400;color:inherit;opacity:.75;margin-left:6px;';
      koEl.textContent='('+ko+')';
      var spanEl=btns[i].querySelector('span');
      if(spanEl)spanEl.appendChild(koEl);
    }
  }
  // Record result
  if(isCorrect){this.roundCorrect.push(word);this.masteredWords.add(trim(word.english).toLowerCase())}
  else{this.roundWrong.push({english:word.english,korean:word.korean,sentence:word.sentence||'',sentenceKo:word.sentenceKo||'',synonyms:word.synonyms||[],antonyms:word.antonyms||[],userAnswer:selectedWords.join(', ')});
    this.wrongHistory.push({english:word.english,korean:word.korean,userAnswer:selectedWords.join(', '),round:this.round,set:this.curSet+1})}
  var correctList=Object.keys(cmap).join(', ');
  var fb=isCorrect?'<div class="fb ok">정답입니다! ✅</div>':
    '<div class="fb ng">오답입니다 ❌<div class="ans">정답: <strong>'+esc(correctList)+'</strong></div></div>';
  var nb='<button class="btn btn-primary" data-action="nextQuestion" style="margin-top:12px">다음 문제</button>';
  var d=document.createElement('div');d.innerHTML=fb+nb;
  var ct=this.app.querySelector('div');if(ct)ct.appendChild(d);
};
App.prototype.nextQuestion=function(){this.qIndex++;this.showQuestion()};
App.prototype.endSetRound=function(){
  var sw=this.setWordsAll,m=0;
  for(var i=0;i<sw.length;i++){if(this.masteredWords.has(trim(sw[i].english).toLowerCase()))m++}
  this.roundHistory.push({round:this.round,tested:this.roundWords.length,correct:this.roundCorrect.length,wrong:this.roundWrong.length});
  if(m===sw.length||this.roundWrong.length===0)this.showSetComplete();
  else this.showSetRoundSummary();
};
App.prototype.showSetRoundSummary=function(){
  var sw=this.setWordsAll,m=0;
  for(var i=0;i<sw.length;i++){if(this.masteredWords.has(trim(sw[i].english).toLowerCase()))m++}
  var sPct=Math.round((m/sw.length)*100),remaining=this.roundWrong.length;
  this.setSub('세트 '+(this.curSet+1)+' · '+this.round+'R 결과');
  this.render(
    '<div class="fade"><div class="sc r">'+sPct+'%</div>'+
    '<div style="text-align:center;margin:14px 0"><h3 style="font-size:1.1rem;font-weight:700;color:#0f172a;margin-bottom:6px">'+this.round+'라운드 결과</h3>'+
    '<p style="color:#64748b;font-size:.85rem">'+m+'/'+sw.length+' 단어 완료</p></div>'+
    '<div class="card"><div class="sr"><span class="sl">문제 수</span><span class="sv">'+this.roundWords.length+'개</span></div>'+
    '<div class="sr"><span class="sl">정답</span><span class="sv g">'+this.roundCorrect.length+'개</span></div>'+
    '<div class="sr"><span class="sl">오답</span><span class="sv r">'+this.roundWrong.length+'개</span></div></div>'+
    '<div class="alert-r">틀린 '+remaining+'개로 다시 도전!</div>'+
    '<button class="btn btn-accent" style="margin-top:14px" data-action="continueSetRound">다음 라운드 ('+remaining+'개)</button></div>'
  );this.toTop();
};
App.prototype.continueSetRound=function(){
  var next=[];for(var i=0;i<this.roundWrong.length;i++){next.push(this.roundWrong[i])}
  this.roundWords=next;this.startSetRound();
};
App.prototype.showSetComplete=function(){
  var sw=this.setWordsAll,m=0;
  for(var i=0;i<sw.length;i++){if(this.masteredWords.has(trim(sw[i].english).toLowerCase()))m++}
  var sPct=Math.round((m/sw.length)*100);
  var overallPct=Math.round((this.masteredWords.size/this.allWords.length)*100);
  var passed=overallPct>=this.passThreshold;
  var ex=-1;for(var r=0;r<this.setResults.length;r++){if(this.setResults[r].setIdx===this.curSet){ex=r;break}}
  var res={setIdx:this.curSet,rounds:this.round,correct:m,total:sw.length,pct:sPct};
  if(ex>=0)this.setResults[ex]=res;else this.setResults.push(res);
  var allDone=this.setResults.length===this.totalSets;
  var hasNext=this.curSet<this.totalSets-1;
  var btnsHtml='';
  if(allDone&&passed){btnsHtml='<button class="btn btn-accent" data-action="showFinalCelebration" style="font-size:1.05rem">🎉 최종 결과</button>'}
  else if(hasNext){btnsHtml='<button class="btn btn-accent" data-action="goNextSet">다음 세트 →</button><button class="btn btn-ghost" data-action="showSetMap">세트 목록</button>'}
  else{btnsHtml='<button class="btn btn-accent" data-action="showSetMap">세트 목록으로</button>'}
  this.setTitle('세트 '+(this.curSet+1)+' 완료!');this.setSub('전체 '+overallPct+'%');
  this.render(
    '<div class="fade"><div style="text-align:center;margin-bottom:12px">'+
    '<div style="font-size:2rem;margin-bottom:6px">🎯</div>'+
    '<h2 style="font-size:1.1rem;font-weight:700;color:#0f172a;margin-bottom:4px">세트 '+(this.curSet+1)+' 완료!</h2>'+
    '<p style="color:#64748b;font-size:.85rem">'+m+'/'+sw.length+' · '+this.round+'라운드</p></div>'+
    '<div class="sc g">'+sPct+'%</div>'+
    '<div class="card"><h3>세트 결과</h3>'+
    '<div class="sr"><span class="sl">단어 수</span><span class="sv">'+sw.length+'개</span></div>'+
    '<div class="sr"><span class="sl">정복</span><span class="sv g">'+m+'개</span></div>'+
    '<div class="sr"><span class="sl">라운드</span><span class="sv">'+this.round+'회</span></div></div>'+
    '<div class="ob"><div class="ob-top"><span style="color:#64748b">전체 진행률</span><span style="font-weight:700">'+overallPct+'% / '+this.passThreshold+'%</span></div>'+
    '<div class="ob-bar"><div class="ob-fill" style="width:'+overallPct+'%;background:#8b5cf6"></div>'+
    '<div class="ob-mark" style="left:'+this.passThreshold+'%"></div></div>'+
    '<div class="ob-sub">'+this.masteredWords.size+' / '+this.allWords.length+' 단어</div></div>'+
    btnsHtml+'</div>'
  );this.toTop();
};
App.prototype.goNextSet=function(){this.curSet++;this.startSet(this.curSet)};
App.prototype.showFinalCelebration=function(){
  var overallPct=Math.round((this.masteredWords.size/this.allWords.length)*100);
  this.setTitle('테스트 완료!');this.setSub('축하합니다!');this.showConfetti();
  var wlHtml='';
  if(this.wrongHistory.length>0){wlHtml='<div class="wl"><h3 style="font-size:.95rem;font-weight:700;color:#0f172a;margin-bottom:10px">틀렸던 문제</h3>';
    for(var w=0;w<this.wrongHistory.length;w++){var wh=this.wrongHistory[w];
      wlHtml+='<div class="wi"><div><div class="ww">'+esc(wh.korean)+'</div><div class="wr">세트'+wh.set+' · '+wh.round+'R</div></div>'+
        '<div style="text-align:right"><div class="wa">'+esc(wh.userAnswer||'')+'</div><div class="wc">'+esc(wh.english)+'</div></div></div>'}
    wlHtml+='</div>'}
  this.render(
    '<div class="fade"><div class="celeb"><div class="em">🎉</div><h2>축하합니다!</h2><p>유의어 테스트를 통과했습니다!</p></div>'+
    '<div class="sc g">'+overallPct+'%</div>'+
    '<div class="card"><h3>최종 결과</h3>'+
    '<div class="sr"><span class="sl">전체 단어</span><span class="sv">'+this.allWords.length+'개</span></div>'+
    '<div class="sr"><span class="sl">정복</span><span class="sv g">'+this.masteredWords.size+'개</span></div>'+
    '<div class="sr"><span class="sl">성취도</span><span class="sv g">'+overallPct+'%</span></div>'+
    '<div class="sr"><span class="sl">총 오답</span><span class="sv'+(this.wrongHistory.length>0?' r':' g')+'">'+this.wrongHistory.length+'회</span></div></div>'+
    wlHtml+
    '<button class="btn btn-accent" style="margin-top:20px" data-action="startFullTest">처음부터 다시</button>'+
    '<button class="btn btn-ghost" data-action="showHome">홈으로</button></div>'
  );this.toTop();
};
App.prototype.showConfetti=function(){
  var c=document.createElement('div');c.className='conf';
  var cols=['#8b5cf6','#f59e0b','#10b981','#3b82f6','#ec4899','#ef4444'];
  for(var i=0;i<50;i++){var p=document.createElement('i');
    var dur=2+Math.random()*2,delay=Math.random()*2;
    p.style.cssText='animation:fall '+dur+'s '+delay+'s ease-in forwards;left:'+(Math.random()*100)+'%';
    var sz=6+Math.random()*8;p.style.width=sz+'px';p.style.height=sz+'px';
    p.style.borderRadius=Math.random()>.5?'50%':'2px';
    p.style.background=cols[Math.floor(Math.random()*cols.length)];c.appendChild(p)}
  document.body.appendChild(c);setTimeout(function(){if(c.parentNode)c.parentNode.removeChild(c)},5500);
};
new App();
</script>
</body>
</html>
